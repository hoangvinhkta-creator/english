{q:"'Not only ___ he used to be an athlete, but he also competed internationally.'",opts:["did","was","had","would"],a:0,why:"<b>Đúng: did.</b> Đảo ngữ 'Not only did + S + used to...' — với 'used to' (hành động), trợ động từ đảo ngữ là 'did'. 'Not only did he use to be...' Cấu trúc nhấn mạnh phức tạp."},
{q:"Chọn câu tổng hợp band 7 CHÍNH XÁC nhất:",opts:["Although I used to struggling with grammar, I am now used to write complex sentences that would have confused me before.","Although I used to struggle with grammar, I am now used to writing complex sentences that would have confused me before.","Although I use to struggle with grammar, I am now used to write complex sentences.","Although I used to struggle with grammar, I am now used to writing complex sentences what would confuse me."],a:1,why:"<b>Đúng: B.</b> 'used to struggle' (nguyên mẫu, quá khứ) + 'used to writing' (V-ing, quen hiện tại) + mệnh đề quan hệ 'that would have confused me' (điều kiện loại 3 trong mệnh đề quan hệ). Kết hợp nhuần nhuyễn nhiều điểm Chặng 3. Các câu khác sai dạng used to hoặc dùng 'what' sai."}],
writing:[{q:"Viết đoạn tổng kết 8 câu (Speaking Part 2/3) về hành trình học tiếng Anh hoặc sự phát triển bản thân của bạn, kết hợp CÀNG NHIỀU điểm ngữ pháp Chặng 3 càng tốt: hiện tại hoàn thành, quá khứ hoàn thành, used to / be used to, bị động, mệnh đề quan hệ, và ít nhất 1 câu điều kiện.",
model:"<b>Bài mẫu:</b> I used to believe that mastering English was simply impossible for someone like me. Before I started this course, I had never studied grammar systematically, and I was easily discouraged. However, I have made remarkable progress over the past few months, which has completely changed my confidence. I am now used to writing sentences that once seemed far beyond my ability. Grammar rules which had always confused me are finally beginning to make sense. If I had given up at the start, I would have missed this incredible growth. My progress has been noticed by my colleagues, and I have even been asked to help train new staff. Looking ahead, I am confident that if I keep practising, I will reach my goals.<br><b>Tự kiểm tra:</b> Hiện tại hoàn thành (have made, has changed, have been asked)? Quá khứ hoàn thành (had never studied, had confused)? used to/be used to đúng? Bị động (has been noticed, have been asked)? Mệnh đề quan hệ (which, that)? Câu điều kiện (loại 3 'If I had given up...' + loại 1 'if I keep...')?"}]}
}}

LESSONS.push(
/* ===== BÀI 31 ===== */
{id:"g31",stage:4,title:"Bài 31 · Câu phức: tương phản & nhượng bộ",
theory:`<h3>1. Vì sao quan trọng?</h3>
<p>Viết được câu phức thể hiện sự tương phản/nhượng bộ là bước nhảy từ band 5.5 lên 6.5–7. Điểm khó nhất: mỗi từ nối đi với CẤU TRÚC khác nhau (mệnh đề vs cụm danh từ).</p>
<h3>2. although / though / even though + MỆNH ĐỀ (S + V)</h3>
<div class="formula">Although / Even though + S + V, S + V</div>
<div class="example"><b>Although the product is expensive, it sells well.</b><br><span class="vi">Mặc dù sản phẩm đắt, nó vẫn bán chạy. Sau 'although' là cả mệnh đề (the product is expensive).</span></div>
<p>'even though' nhấn mạnh hơn 'although'. 'though' thân mật hơn, có thể đứng cuối câu: It's expensive. I'll buy it, though.</p>
<h3>3. despite / in spite of + DANH TỪ / V-ing (KHÔNG phải mệnh đề)</h3>
<div class="formula">Despite / In spite of + danh từ / V-ing</div>
<div class="example"><b>Despite the high price, it sells well.</b> (+ danh từ)<br><b>Despite being expensive, it sells well.</b> (+ V-ing)<br><span class="vi">Sau 'despite/in spite of' KHÔNG có mệnh đề. Muốn thêm mệnh đề phải viết: 'despite the fact that + S + V'.</span></div>
<table><tr><th>Từ nối</th><th>Theo sau</th><th>Ví dụ</th></tr>
<tr><td>although / even though</td><td>mệnh đề (S+V)</td><td>Although it rained,...</td></tr>
<tr><td>despite / in spite of</td><td>danh từ / V-ing</td><td>Despite the rain,... / Despite raining,...</td></tr>
<tr><td>despite the fact that</td><td>mệnh đề (S+V)</td><td>Despite the fact that it rained,...</td></tr></table>
<h3>4. whereas / while — tương phản HAI Ý ngang nhau</h3>
<div class="example"><b>Some people prefer city life, whereas others prefer the countryside.</b><br><span class="vi">Dùng để đối chiếu hai điều KHÁC nhau (không phải nhượng bộ). Rất hữu ích cho Writing Task 2 và Task 1 so sánh số liệu.</span></div>
<h3>5. however / nevertheless — trạng từ, đứng câu RIÊNG</h3>
<div class="example"><b>The price is high. However, the quality justifies it.</b><br><span class="vi">'however' là trạng từ nối, đứng đầu câu MỚI, sau nó có dấu phẩy. KHÔNG dùng như 'although' để nối trong cùng câu.</span></div>
<p class="muted">⚠️ Lỗi kinh điển: (1) 'Despite it was expensive' — SAI (despite + mệnh đề), phải 'Although it was expensive' hoặc 'Despite the high price'. (2) 'Although..., but...' — SAI, tiếng Anh KHÔNG dùng cả 'although' và 'but' trong một câu. Chỉ chọn một.</p>`,
levels:{
basic:{mcq:[
{q:"___ the rain, we went out.",opts:["Although","Despite","Even though","While"],a:1,why:"<b>Đúng: Despite.</b> Theo sau là danh từ 'the rain' → despite (không mệnh đề)."},
{q:"___ it was raining, we went out.",opts:["Despite","In spite of","Although","Because of"],a:2,why:"<b>Đúng: Although.</b> Theo sau là mệnh đề 'it was raining' → although."},
{q:"The phone is cheap, ___ the tablet is expensive.",opts:["despite","whereas","although","because"],a:1,why:"<b>Đúng: whereas.</b> Đối chiếu hai ý ngang nhau (rẻ >< đắt) → whereas."},
{q:"Despite ___ tired, she finished the work.",opts:["she was","being","was","she is"],a:1,why:"<b>Đúng: being.</b> Sau 'despite' + V-ing → being tired."},
{q:"It's expensive. ___, the quality is excellent.",opts:["Although","Despite","However","Whereas"],a:2,why:"<b>Đúng: However.</b> Trạng từ nối đứng đầu câu mới, có phẩy → However."}],
writing:[{q:"Viết 5 câu tương phản/nhượng bộ về công việc hoặc sản phẩm, dùng mỗi từ một lần: although, despite, whereas, however, in spite of — chú ý cấu trúc theo sau.",
model:"<b>Bài mẫu:</b> Although online shopping is convenient, many customers still prefer visiting physical stores. Despite the rising prices, our sales have remained stable. Samsung TVs are very popular, whereas some smaller brands struggle to compete. Our new product launched successfully. However, we faced several delivery problems. In spite of the economic difficulties, the company continued to grow.<br><b>Tự kiểm tra:</b> although/whereas + mệnh đề (S+V)? despite/in spite of + danh từ hoặc V-ing (không mệnh đề)? however đứng câu riêng có phẩy? Không dùng 'although...but' cùng câu?"}]},
mid:{mcq:[
{q:"Chọn câu ĐÚNG:",opts:["Despite the price was high, people bought it.","Despite the high price, people bought it.","Despite of the high price, people bought it.","Despite high price, people bought it."],a:1,why:"<b>Đúng: B.</b> despite + cụm danh từ 'the high price'. A sai (despite + mệnh đề); C sai ('despite of' không tồn tại); D thiếu 'the'."},
{q:"'___ working hard, he didn't get a promotion.'",opts:["Although","Despite","However","Because"],a:1,why:"<b>Đúng: Despite.</b> Theo sau là V-ing 'working' → despite. ('Although' cần mệnh đề: Although he worked hard.)"},
{q:"Chọn cách viết ĐÚNG với mệnh đề:",opts:["Despite the fact that it was late, they continued.","Despite that it was late, they continued.","Despite it was late, they continued.","Despite of that it was late, they continued."],a:0,why:"<b>Đúng: A.</b> Muốn dùng despite + mệnh đề phải thêm 'the fact that': 'despite the fact that + S + V'."},
{q:"'Sales rose in the north, ___ they fell in the south.'",opts:["despite","whereas","although","however"],a:1,why:"<b>Đúng: whereas.</b> Đối chiếu hai xu hướng số liệu ngang nhau (tăng >< giảm) → whereas. Rất hợp Writing Task 1."},
{q:"Tìm câu SAI:",opts:["Although it was hard, she succeeded.","Even though the task was difficult, he finished it.","Although the plan was risky, but they approved it.","Despite the risks, they approved the plan."],a:2,why:"<b>Đúng (câu SAI): C.</b> Không dùng 'Although...but...' cùng câu — thừa. Bỏ 'but': 'Although the plan was risky, they approved it.'"}],
writing:[{q:"Viết đoạn 6 câu (kiểu Writing Task 2) trình bày hai mặt của một vấn đề (ví dụ: làm việc từ xa, mạng xã hội), dùng đa dạng cấu trúc tương phản: although, despite + V-ing, despite the fact that, whereas, however — mỗi cấu trúc đúng ngữ pháp.",
model:"<b>Bài mẫu:</b> Although remote work offers greater flexibility, it also brings unexpected challenges. Despite allowing employees to save commuting time, it can blur the line between work and personal life. Many workers feel more productive at home, whereas others struggle with isolation and distractions. Despite the fact that technology makes communication easy, face-to-face collaboration is often more effective. However, companies that manage remote teams well tend to retain staff longer. In spite of these drawbacks, remote work is likely to remain popular in the future.<br><b>Tự kiểm tra:</b> although/whereas + mệnh đề? despite + V-ing/danh từ? despite the fact that + mệnh đề? however câu riêng? Không lẫn although với but?"}]},
adv:{mcq:[
{q:"Chọn câu học thuật MẠCH LẠC và ĐÚNG nhất:",opts:["While critics argue that automation destroys jobs, proponents contend that it creates new opportunities.","While critics argue that automation destroys jobs, but proponents contend it creates opportunities.","Despite critics argue automation destroys jobs, proponents contend it creates opportunities.","Although automation destroys jobs, however proponents contend it creates opportunities."],a:0,why:"<b>Đúng: A.</b> 'While + mệnh đề, mệnh đề' đối chiếu hai quan điểm — cấu trúc mở bài Task 2 lý tưởng. B thừa 'but'; C sai (despite + mệnh đề); D thừa 'however' sau 'although'."},
{q:"'___ its many benefits, social media has been criticised for harming mental health.'",opts:["Although","Despite","However","Whereas"],a:1,why:"<b>Đúng: Despite.</b> Theo sau là cụm danh từ 'its many benefits' → Despite. Mẫu mở câu 'Despite its many benefits, X has been criticised for...' rất mạnh và cô đọng."},
{q:"Biến đổi giữ nguyên nghĩa 'Although he was inexperienced, he performed well': chọn bản DANH TỪ HÓA đúng:",opts:["Despite his inexperience, he performed well.","Despite he was inexperienced, he performed well.","Despite of his inexperience, he performed well.","However his inexperience, he performed well."],a:0,why:"<b>Đúng: A.</b> Danh từ hóa mệnh đề: 'he was inexperienced' → 'his inexperience'. Kỹ năng biến đổi mệnh đề↔cụm danh từ là cốt lõi của paraphrase (Bài 39)."},
{q:"'Nonetheless' trong câu 'The evidence is limited; nonetheless, the conclusion seems valid' có chức năng gì?",opts:["Thêm thông tin","Nối tương phản trang trọng (= tuy nhiên)","Chỉ nguyên nhân","Đưa ví dụ"],a:1,why:"<b>Đúng: B.</b> 'nonetheless/nevertheless' = tuy nhiên/dù vậy, trạng từ nối tương phản TRANG TRỌNG hơn 'however'. Dùng sau dấu chấm phẩy hoặc đầu câu mới, luôn có phẩy theo sau."},
{q:"Chọn câu dùng đảo ngữ nhượng bộ ĐÚNG (band 8):",opts:["Difficult though it was, they completed the project.","Difficult although it was, they completed the project.","Though difficult it was, they completed.","Difficult despite it was, they completed."],a:0,why:"<b>Đúng: A.</b> Cấu trúc đảo ngữ nhượng bộ trang trọng: 'Adjective + though + S + V' = 'Although + S + be + adjective'. 'Difficult though it was' = 'Although it was difficult'. Dấu hiệu band 8, sẽ gặp lại ở Bài 34 (đảo ngữ)."}],
writing:[{q:"Viết đoạn nghị luận 8 câu (Writing Task 2) về một vấn đề gây tranh cãi, dùng đa dạng và nâng cao các cấu trúc tương phản/nhượng bộ: 'While + mệnh đề' (đối chiếu quan điểm), 'Despite + cụm danh từ', 'despite the fact that', 'nonetheless/nevertheless', và ít nhất 1 cấu trúc danh từ hóa (Despite his/its + danh từ).",
model:"<b>Bài mẫu:</b> While supporters of nuclear energy emphasise its efficiency, opponents warn of its potential dangers. Despite its ability to produce vast amounts of clean electricity, nuclear power raises serious concerns about waste and safety. Despite the fact that modern reactors are far safer than older ones, public fear remains widespread. Many governments continue to invest in it; nevertheless, others are gradually phasing it out. Renewable sources such as solar and wind are growing rapidly, whereas nuclear expansion has slowed in several countries. Despite these challenges, nuclear energy still plays a vital role in reducing carbon emissions. Its high initial cost is a drawback; nonetheless, the long-term benefits may outweigh it. Ultimately, although no energy source is perfect, a balanced mix is probably the wisest approach.<br><b>Tự kiểm tra:</b> 'While + mệnh đề' đối chiếu quan điểm? 'Despite + danh từ/V-ing' và 'despite the fact that + mệnh đề' đúng? 'nevertheless/nonetheless' câu riêng? Có danh từ hóa (Despite its ability...)? Không lẫn although với but?"}]}
}},
/* ===== BÀI 32 ===== */
{id:"g32",stage:4,title:"Bài 32 · Câu phức: nguyên nhân, kết quả, mục đích",
theory:`<h3>1. Chỉ NGUYÊN NHÂN (tại sao)</h3>
<table><tr><th>Từ nối</th><th>Theo sau</th><th>Ví dụ</th></tr>
<tr><td>because / as / since</td><td>mệnh đề (S+V)</td><td>because it was cheap</td></tr>
<tr><td>because of / due to / owing to</td><td>danh từ / V-ing</td><td>because of the low price</td></tr></table>
<div class="example"><b>Sales fell because the economy weakened.</b> (+ mệnh đề)<br><b>Sales fell because of the weak economy.</b> (+ danh từ)<br><span class="vi">Cùng ý, nhưng 'because' đi với mệnh đề, 'because of' đi với danh từ.</span></div>
<p>'due to' và 'owing to' trang trọng hơn, hợp văn học thuật. 'as/since' chỉ nguyên nhân đã biết, thường đứng đầu câu.</p>
<h3>2. Chỉ KẾT QUẢ (nên, vì thế)</h3>
<p><b>a) so + tính từ/trạng từ + that:</b></p>
<div class="example"><b>The product was so cheap that everyone bought it.</b> (rẻ đến nỗi ai cũng mua)</div>
<p><b>b) such + (a/an) + tính từ + danh từ + that:</b></p>
<div class="example"><b>It was such a good deal that we couldn't refuse.</b><br><span class="vi">so + tính từ TRẦN (so cheap); such + cụm DANH TỪ (such a good deal). Đừng nhầm.</span></div>
<p><b>c) Trạng từ nối: therefore, thus, consequently, as a result</b> (đứng câu riêng, trang trọng):</p>
<div class="example"><b>Demand increased sharply. Therefore, prices rose.</b></div>
<h3>3. Chỉ MỤC ĐÍCH (để làm gì)</h3>
<table><tr><th>Cấu trúc</th><th>Theo sau</th><th>Ví dụ</th></tr>
<tr><td>to / in order to / so as to</td><td>động từ nguyên mẫu</td><td>to save money</td></tr>
<tr><td>so that / in order that</td><td>mệnh đề (S + can/will/would...)</td><td>so that we could save money</td></tr></table>
<div class="example"><b>We lowered prices to attract more customers.</b> (+ V nguyên mẫu)<br><b>We lowered prices so that more customers would come.</b> (+ mệnh đề)<br><span class="vi">Phủ định mục đích: 'so as not to / in order not to + V': He left early so as not to be late.</span></div>
<p class="muted">⚠️ Lỗi phổ biến: (1) 'because of' + mệnh đề (SAI, phải 'because'); (2) 'due to the fact that' dài dòng — nên rút thành 'because'; (3) nhầm 'so' với 'such'; (4) 'for to save money' (SAI — chỉ cần 'to save money').</p>`,
levels:{
basic:{mcq:[
{q:"We stayed home ___ it was raining.",opts:["because","because of","due to","so"],a:0,why:"<b>Đúng: because.</b> Theo sau là mệnh đề 'it was raining' → because."},
{q:"The flight was cancelled ___ the storm.",opts:["because","so","because of","although"],a:2,why:"<b>Đúng: because of.</b> Theo sau là danh từ 'the storm' → because of."},
{q:"It was ___ cold that the lake froze.",opts:["so","such","very","too"],a:0,why:"<b>Đúng: so.</b> so + tính từ trần (cold) + that."},
{q:"It was ___ a good film that I watched it twice.",opts:["so","such","very","too"],a:1,why:"<b>Đúng: such.</b> such + a + tính từ + danh từ (a good film) + that."},
{q:"She studied hard ___ pass the exam.",opts:["for","to","so","because"],a:1,why:"<b>Đúng: to.</b> Mục đích → to + nguyên mẫu (to pass)."}],
writing:[{q:"Viết 5 câu về công việc/quyết định của bạn: 2 câu nguyên nhân (because / because of), 2 câu kết quả (so...that / such...that), 1 câu mục đích (to / so that).",
model:"<b>Bài mẫu:</b> We increased our marketing budget because sales had slowed. The delivery was delayed because of a supplier problem. The demand was so high that we ran out of stock. It was such a successful campaign that we repeated it. We upgraded our website in order to improve the customer experience.<br><b>Tự kiểm tra:</b> because + mệnh đề, because of + danh từ? so + tính từ + that, such + cụm danh từ + that? Mục đích to/in order to + nguyên mẫu?"}]},
mid:{mcq:[
{q:"Chọn câu ĐÚNG:",opts:["Sales rose because of the economy improved.","Sales rose because the economy improved.","Sales rose due to the economy improved.","Sales rose because of improve economy."],a:1,why:"<b>Đúng: B.</b> because + mệnh đề (the economy improved). A, C sai (because of/due to + danh từ, không mệnh đề)."},
{q:"'The traffic was ___ heavy that we missed the meeting.'",opts:["such","so","very","too"],a:1,why:"<b>Đúng: so.</b> so + tính từ trần 'heavy' + that. ('such' cần cụm danh từ: such heavy traffic that...)"},
{q:"'It was ___ that we couldn't finish on time.'",opts:["so difficult task","such a difficult task","so a difficult task","such difficult"],a:1,why:"<b>Đúng: such a difficult task.</b> such + a + tính từ + danh từ đếm được số ít."},
{q:"'Prices increased sharply. ___, many customers switched to cheaper brands.'",opts:["Because","Consequently","Although","So that"],a:1,why:"<b>Đúng: Consequently.</b> Trạng từ nối chỉ kết quả, đứng đầu câu mới, có phẩy → Consequently (= as a result)."},
{q:"'He spoke slowly ___ everyone could understand.'",opts:["to","in order to","so that","because"],a:2,why:"<b>Đúng: so that.</b> Mục đích + MỆNH ĐỀ (everyone could understand) → so that. ('to/in order to' đi với động từ nguyên mẫu, không mệnh đề có chủ ngữ khác.)"}],
writing:[{q:"Viết đoạn 6 câu (kiểu Writing Task 2) phân tích nguyên nhân và hậu quả của một vấn đề (ô nhiễm, thất nghiệp, giá cả...), dùng đa dạng: because/because of/due to, so/such...that, therefore/consequently/as a result, và một câu mục đích.",
model:"<b>Bài mẫu:</b> Air pollution in many cities has worsened because of the rapid increase in private vehicles. The problem has become so serious that residents now suffer from various health issues. Due to weak enforcement of environmental laws, factories continue to release harmful emissions. As a result, respiratory diseases have risen sharply in recent years. Many governments have introduced stricter regulations in order to reduce these emissions. It is such a complex challenge that no single solution will be enough.<br><b>Tự kiểm tra:</b> because + mệnh đề, because of/due to + danh từ? so + tính từ + that, such + cụm danh từ + that? therefore/consequently/as a result câu riêng? mục đích in order to + nguyên mẫu?"}]},
adv:{mcq:[
{q:"Chọn cách viết TRANG TRỌNG và cô đọng nhất (thay 'because'):",opts:["Due to the fact that the data was incomplete, the study was flawed.","Owing to incomplete data, the study was flawed.","Because of the data was incomplete, the study was flawed.","Due to the data was incomplete, the study was flawed."],a:1,why:"<b>Đúng: B.</b> 'Owing to + cụm danh từ' (incomplete data) trang trọng và GỌN. A đúng ngữ pháp nhưng 'due to the fact that' dài dòng nên tránh; C, D sai (due to/because of + danh từ, không mệnh đề)."},
{q:"'So dramatic ___ the decline that the company nearly collapsed.'",opts:["was","did","had","were"],a:0,why:"<b>Đúng: was.</b> Đảo ngữ với 'so + tính từ' đầu câu: 'So dramatic WAS the decline that...' = 'The decline was so dramatic that...'. Cấu trúc nhấn mạnh band 8 (gặp lại ở Bài 34)."},
{q:"Trong văn học thuật, câu nào diễn đạt quan hệ nhân-quả tinh tế nhất?",opts:["The policy failed because people didn't like it.","The policy's failure can be attributed to widespread public opposition.","The policy failed so people opposed it.","People opposed the policy, therefore it failed because of them."],a:1,why:"<b>Đúng: B.</b> 'can be attributed to' (được cho là do) + danh từ hóa ('the policy's failure', 'public opposition') — văn phong học thuật cao. Các cách diễn đạt nhân-quả nâng cao: attribute X to Y, result in, lead to, stem from, give rise to."},
{q:"Chọn động từ chỉ QUAN HỆ NHÂN-QUẢ dùng ĐÚNG:",opts:["Deforestation results in soil erosion.","Deforestation results from soil erosion.","Soil erosion results in deforestation.","Deforestation causes to soil erosion."],a:0,why:"<b>Đúng: A.</b> 'result IN' = dẫn đến (nguyên nhân → kết quả): Deforestation (nguyên nhân) results in soil erosion (kết quả). 'result FROM' ngược lại (kết quả from nguyên nhân). 'cause' không đi với 'to' (cause + tân ngữ trực tiếp)."},
{q:"'The two events are closely linked; ___, establishing causation remains difficult.'",opts:["therefore","however","consequently","thus"],a:1,why:"<b>Đúng: however.</b> Ngữ cảnh có sự TƯƠNG PHẢN (có liên hệ NHƯNG khó chứng minh nhân quả) → however, không phải therefore/thus/consequently (chỉ kết quả). Bẫy: chọn từ nối phải khớp QUAN HỆ LOGIC, không chỉ điền bừa từ trang trọng."}],
writing:[{q:"Viết đoạn nghị luận 8 câu (Writing Task 2) phân tích nguyên nhân-hậu quả của một hiện tượng xã hội, dùng các cấu trúc nhân-quả HỌC THUẬT: 'be attributed to', 'result in / lead to / give rise to', 'owing to + danh từ', 'so + tính từ + that', 'consequently/as a result', và mục đích 'in order to'.",
model:"<b>Bài mẫu:</b> The sharp rise in youth unemployment can be attributed to several interconnected factors. Owing to rapid technological change, many traditional entry-level jobs have disappeared. This shift has given rise to a mismatch between the skills young people possess and those employers demand. The consequences are so severe that many graduates remain jobless for years after finishing their studies. As a result, some are forced to accept low-paid work unrelated to their qualifications. Prolonged unemployment often leads to declining confidence and mental health problems. In order to address this issue, governments should invest in vocational training and career guidance. Unless decisive action is taken, the problem is likely to worsen and give rise to wider social instability.<br><b>Tự kiểm tra:</b> 'be attributed to', 'give rise to', 'lead to', 'result in' dùng đúng chiều nhân-quả? 'Owing to + danh từ'? 'so + tính từ + that'? 'As a result' câu riêng? 'In order to + nguyên mẫu'? Từ nối khớp quan hệ logic?"}]}
}},
/* ===== BÀI 33 ===== */
{id:"g33",stage:4,title:"Bài 33 · Rút gọn mệnh đề & phân từ (participle clauses)",
theory:`<h3>1. Phân từ là gì, để làm gì?</h3>
<p>Rút gọn mệnh đề bằng phân từ giúp câu GỌN và TRANG TRỌNG hơn — dấu hiệu văn band 7. Hai loại phân từ:</p>
<ul><li><b>Phân từ hiện tại (V-ing):</b> mang nghĩa CHỦ ĐỘNG hoặc đang diễn ra</li>
<li><b>Phân từ quá khứ (V3):</b> mang nghĩa BỊ ĐỘNG</li></ul>
<h3>2. Rút gọn mệnh đề CHỈ THỜI GIAN / ĐỒNG THỜI (chủ động → V-ing)</h3>
<div class="example"><b>While I was walking home, I met an old friend.</b><br>→ <b>Walking home, I met an old friend.</b><br><span class="vi">Hai mệnh đề CÙNG chủ ngữ (I) → bỏ chủ ngữ + liên từ, đổi động từ thành V-ing.</span></div>
<h3>3. Rút gọn mệnh đề CHỈ NGUYÊN NHÂN</h3>
<div class="example"><b>Because she felt tired, she went to bed early.</b><br>→ <b>Feeling tired, she went to bed early.</b> (chủ động → V-ing)<br><b>Because it was written in haste, the report had errors.</b><br>→ <b>Written in haste, the report had errors.</b> (bị động → V3)</div>
<h3>4. Phân từ HOÀN THÀNH (Having + V3) — việc xảy ra TRƯỚC</h3>
<div class="example"><b>After he had finished the report, he sent it.</b><br>→ <b>Having finished the report, he sent it.</b><br><span class="vi">'Having + V3' nhấn mạnh việc thứ nhất hoàn tất TRƯỚC việc thứ hai. Rất mạnh cho văn viết.</span></div>
<h3>5. Rút gọn mệnh đề quan hệ (ôn lại Bài 26)</h3>
<table><tr><th>Mệnh đề đầy đủ</th><th>Rút gọn</th></tr>
<tr><td>the man who is standing there</td><td>the man standing there (chủ động → V-ing)</td></tr>
<tr><td>the book which was written by her</td><td>the book written by her (bị động → V3)</td></tr></table>
<h3>6. QUY TẮC VÀNG: cùng chủ ngữ</h3>
<p>Phân từ phải cùng chủ ngữ với mệnh đề chính. Nếu khác chủ ngữ → câu SAI (gọi là 'dangling participle'):</p>
<div class="example"><b>SAI:</b> Walking home, the rain started. (chẳng lẽ 'mưa' đi bộ về nhà?)<br><b>ĐÚNG:</b> Walking home, I got caught in the rain. (I mới là người đi bộ)</div>
<p class="muted">⚠️ Trước khi rút gọn, kiểm tra: hai mệnh đề CÓ cùng chủ ngữ không? Chủ động hay bị động (chọn V-ing hay V3)? Việc nào xảy ra trước (dùng Having + V3)?</p>`,
levels:{
basic:{mcq:[
{q:"___ home, I met my teacher. (Trong khi đi bộ về)",opts:["Walk","Walking","Walked","To walk"],a:1,why:"<b>Đúng: Walking.</b> Rút gọn 'While I was walking' → Walking (V-ing, chủ động)."},
{q:"___ in 1990, the building is now very old.",opts:["Building","Built","Build","To build"],a:1,why:"<b>Đúng: Built.</b> Bị động (tòa nhà ĐƯỢC xây) → V3 'Built'."},
{q:"___ the work, she went home. (Sau khi làm xong)",opts:["Finishing","Having finished","Finished","Finish"],a:1,why:"<b>Đúng: Having finished.</b> Việc xong TRƯỚC khi về → Having + V3."},
{q:"The woman ___ over there is my manager.",opts:["stand","standing","stood","stands"],a:1,why:"<b>Đúng: standing.</b> Rút gọn 'who is standing' → standing (V-ing chủ động)."},
{q:"___ tired, he took a break.",opts:["Feel","Feeling","Felt","To feel"],a:1,why:"<b>Đúng: Feeling.</b> Rút gọn 'Because he felt tired' → Feeling (V-ing)."}],
writing:[{q:"Rút gọn 5 câu sau bằng phân từ: (1) Because she was excited, she couldn't sleep. (2) After I had sent the email, I left. (3) The car which was made in Japan is reliable. (4) While he was driving, he listened to music. (5) Because the report was written carefully, it impressed everyone.",
model:"<b>Đáp án:</b> (1) Being excited, she couldn't sleep. (2) Having sent the email, I left. (3) The car made in Japan is reliable. (4) Driving, he listened to music. / While driving, he listened to music. (5) Written carefully, the report impressed everyone.<br><b>Tự kiểm tra:</b> Chủ động → V-ing, bị động → V3? Việc trước → Having + V3? Cùng chủ ngữ với mệnh đề chính?"}]},
mid:{mcq:[
{q:"Tìm câu SAI (dangling participle):",opts:["Opening the door, I saw a stranger.","Opening the door, a stranger appeared.","Having read the book, she wrote a review.","Written quickly, the essay had mistakes."],a:1,why:"<b>Đúng (câu SAI): B.</b> 'Opening the door' phải cùng chủ ngữ với mệnh đề chính, nhưng ở đây chủ ngữ là 'a stranger' (chẳng lẽ người lạ mở cửa?). Lỗi phân từ treo — chủ ngữ không khớp."},
{q:"'___ by heavy rain, the match was postponed.'",opts:["Affecting","Affected","Having affected","To affect"],a:1,why:"<b>Đúng: Affected.</b> Trận đấu BỊ ảnh hưởng (bị động) → V3 'Affected'."},
{q:"'___ all the data, the team reached a clear conclusion.'",opts:["Analysing","Having analysed","Analysed","Analyse"],a:1,why:"<b>Đúng: Having analysed.</b> Phân tích xong TRƯỚC khi kết luận → Having + V3. Nhấn thứ tự thời gian."},
{q:"Rút gọn 'The students who are taking the exam must be quiet':",opts:["The students taking the exam...","The students taken the exam...","The students take the exam...","The students to take the exam..."],a:0,why:"<b>Đúng: taking.</b> 'who are taking' (chủ động) → taking (V-ing)."},
{q:"'___ from the mistake, they improved their process.' (Sau khi đã học được)",opts:["Learning","Having learned","Learned","Learn"],a:1,why:"<b>Đúng: Having learned.</b> Học được bài học TRƯỚC → Having + V3, rồi cải tiến quy trình."}],
writing:[{q:"Viết đoạn 6 câu kể lại một trải nghiệm hoặc mô tả một quy trình, dùng đa dạng phân từ: V-ing (chủ động/đồng thời), V3 (bị động), Having + V3 (việc trước), và rút gọn mệnh đề quan hệ — chú ý cùng chủ ngữ.",
model:"<b>Bài mẫu:</b> Having worked in retail for years, I have learned to handle difficult situations calmly. Facing an angry customer last week, I stayed polite and listened carefully. The product returned by the customer turned out to be faulty. Realising the mistake was ours, I offered a full refund immediately. Impressed by the quick response, the customer later left a positive review. Having resolved the issue, I felt proud of how our team handled it.<br><b>Tự kiểm tra:</b> Chủ động → V-ing (Facing, Realising), bị động → V3 (returned, Impressed), việc trước → Having + V3? Mỗi phân từ cùng chủ ngữ với mệnh đề chính? Không có phân từ treo?"}]},
adv:{mcq:[
{q:"Chọn câu học thuật rút gọn ĐÚNG và tinh tế nhất:",opts:["Based on recent studies, the theory appears valid.","Basing on recent studies, the theory appears valid.","Base on recent studies, the theory appears valid.","Been based on recent studies, the theory appears valid."],a:0,why:"<b>Đúng: A.</b> 'Based on' (V3, bị động — lý thuyết ĐƯỢC dựa trên) là cụm phân từ cố định mở câu học thuật. 'Basing on' SAI (đây là lỗi rất phổ biến). Ghi nhớ: 'Based on..., Given..., Compared to...' đều là phân từ mở câu chuẩn."},
{q:"'___ that the results were inconclusive, further research is needed.'",opts:["Given","Giving","Give","Been given"],a:0,why:"<b>Đúng: Given.</b> 'Given (that) + mệnh đề' = xét rằng/vì rằng — cụm phân từ mở câu học thuật rất mạnh, chỉ điều kiện/lý do. 'Given the circumstances', 'Given that...' band 7-8."},
{q:"'___ properly, renewable energy could meet most of our needs.'",opts:["Developing","Developed","Having developed","To develop"],a:1,why:"<b>Đúng: Developed.</b> Năng lượng ĐƯỢC phát triển (bị động) → V3 'Developed'. = 'If it is developed properly'. Phân từ bị động rút gọn cả mệnh đề điều kiện. Chủ ngữ ngầm 'renewable energy' khớp mệnh đề chính."},
{q:"Kết hợp: chọn câu GỌN và ĐÚNG nhất thay cho 'Because the policy had been implemented poorly and because it lacked funding, it failed':",opts:["Poorly implemented and lacking funding, the policy failed.","Poorly implementing and lacked funding, the policy failed.","Having poorly implemented and lacking funding, the policy failed.","Poorly implemented and lacked funding, the policy failed."],a:0,why:"<b>Đúng: A.</b> Kết hợp hai phân từ: 'Poorly implemented' (bị động → V3) + 'lacking funding' (chủ động → V-ing). Chính sách BỊ thực thi kém nhưng chủ động THIẾU kinh phí. Phân biệt chủ động/bị động cho từng vế là điểm tinh tế band 8."},
{q:"Tìm câu KHÔNG có lỗi phân từ treo:",opts:["Living in a digital age, information is everywhere.","Living in a digital age, we are surrounded by information.","Having lived abroad, the culture felt familiar.","Written in a hurry, I made many mistakes."],a:1,why:"<b>Đúng: B.</b> 'Living in a digital age' khớp chủ ngữ 'we' (con người sống trong thời đại số). A sai (information không 'sống'); C sai (culture không 'sống ở nước ngoài'); D sai (tôi không 'được viết vội' — bài luận mới bị)."}],
writing:[{q:"Viết đoạn nghị luận 8 câu (Writing Task 2) về một chủ đề học thuật, dùng thành thạo các cụm phân từ mở câu và rút gọn: 'Based on...', 'Given that...', 'Having + V3', phân từ chủ động (V-ing) và bị động (V3), tránh tuyệt đối lỗi phân từ treo.",
model:"<b>Bài mẫu:</b> Given that climate change poses an existential threat, urgent global action is essential. Based on decades of scientific evidence, experts agree that human activity is the primary cause. Having ignored early warnings for too long, many governments now face far greater challenges. Faced with rising sea levels and extreme weather, coastal communities are especially vulnerable. Poorly regulated industries, releasing enormous amounts of carbon, continue to worsen the situation. Supported by international cooperation, however, meaningful progress remains possible. Once implemented, renewable technologies can dramatically reduce emissions. Recognising the scale of the crisis, societies must act decisively before it is too late.<br><b>Tự kiểm tra:</b> 'Given that + mệnh đề', 'Based on + danh từ' đúng? 'Having + V3' cho việc trước? Chủ động V-ing (releasing, Recognising), bị động V3 (Faced, Supported, implemented)? Mọi phân từ cùng chủ ngữ với mệnh đề chính (không treo)?"}]}
}}
);

LESSONS.push(
/* ===== BÀI 34 ===== */
{id:"g34",stage:4,title:"Bài 34 · Đảo ngữ (inversion)",
theory:`<h3>1. Đảo ngữ là gì?</h3>
<p>Bình thường: chủ ngữ + động từ. Đảo ngữ: đưa một cụm phủ định/nhấn mạnh lên ĐẦU câu, rồi ĐẢO trợ động từ lên trước chủ ngữ (như câu hỏi). Đây là dấu hiệu văn band 7–8, thể hiện sự nhấn mạnh trang trọng.</p>
<div class="example"><b>Bình thường:</b> I have never seen such a mess.<br><b>Đảo ngữ:</b> <b>Never</b> have I seen such a mess.<br><span class="vi">'Never' lên đầu → đảo 'have' lên trước 'I'.</span></div>
<h3>2. Công thức chung</h3>
<div class="formula">Cụm phủ định/hạn chế + trợ động từ + chủ ngữ + động từ chính</div>
<p>Nếu câu gốc không có trợ động từ (hiện tại/quá khứ đơn) → mượn do/does/did:</p>
<div class="example"><b>He rarely complains.</b> → <b>Rarely does he complain.</b> (mượn 'does', động từ về nguyên mẫu)</div>
<h3>3. Các cụm thường gây đảo ngữ</h3>
<table><tr><th>Cụm mở đầu</th><th>Ví dụ đảo ngữ</th></tr>
<tr><td>Never / Rarely / Seldom</td><td>Never have I felt so proud.</td></tr>
<tr><td>Hardly ... when / No sooner ... than</td><td>No sooner had we arrived than it rained.</td></tr>
<tr><td>Not only ... but also</td><td>Not only did he apologise, but he also paid.</td></tr>
<tr><td>Only when / Only after / Only by</td><td>Only when I left did I understand.</td></tr>
<tr><td>Little / Not until</td><td>Little did they know... / Not until later did I realise...</td></tr>
<tr><td>Under no circumstances / At no time</td><td>Under no circumstances should you share it.</td></tr></table>
<h3>4. Lưu ý về 'Only when / Not until'</h3>
<p>Với 'Only when + mệnh đề' và 'Not until + mệnh đề', đảo ngữ xảy ra ở MỆNH ĐỀ CHÍNH (vế sau), không phải vế đầu:</p>
<div class="example"><b>Only when the sale ended did we relax.</b><br><span class="vi">Vế 'the sale ended' giữ nguyên; đảo ngữ (did we relax) ở mệnh đề chính.</span></div>
<p class="muted">⚠️ Đảo ngữ chỉ dùng khi muốn NHẤN MẠNH và trong văn trang trọng — đừng lạm dụng. Sai thường gặp: quên đảo trợ động từ ('Never I have seen' → phải 'Never have I seen'); quên đưa động từ về nguyên mẫu sau do/does/did.</p>`,
levels:{
basic:{mcq:[
{q:"Đảo ngữ của 'I have never been so happy':",opts:["Never I have been so happy.","Never have I been so happy.","Never been I have so happy.","Never has I been so happy."],a:1,why:"<b>Đúng: B.</b> Never + have + I + been. Đảo trợ động từ 'have' lên trước chủ ngữ."},
{q:"'Rarely ___ he arrive late.'",opts:["do","does","did","is"],a:1,why:"<b>Đúng: does.</b> Hiện tại đơn, 'he' → mượn 'does'; động từ về nguyên mẫu 'arrive'."},
{q:"'Not only ___ she sing, but she also dances.'",opts:["can","does","did","is"],a:1,why:"<b>Đúng: does.</b> 'Not only does she sing, but she also dances.' Hiện tại đơn → does + sing (nguyên mẫu)."},
{q:"'No sooner ___ we left than it started to rain.'",opts:["have","had","did","were"],a:1,why:"<b>Đúng: had.</b> 'No sooner had + S + V3 than...' → had we left. Cấu trúc quá khứ hoàn thành đảo ngữ."},
{q:"'Seldom ___ I seen such talent.'",opts:["do","have","did","am"],a:1,why:"<b>Đúng: have.</b> 'Seldom have I seen...' — hiện tại hoàn thành, đảo 'have' lên trước 'I'."}],
writing:[{q:"Viết lại 5 câu sau dùng đảo ngữ: (1) I have never worked so hard. (2) He rarely makes mistakes. (3) We had no sooner started than the power went out. (4) She not only leads the team but also trains new staff. (5) I little knew what would happen.",
model:"<b>Đáp án:</b> (1) Never have I worked so hard. (2) Rarely does he make mistakes. (3) No sooner had we started than the power went out. (4) Not only does she lead the team, but she also trains new staff. (5) Little did I know what would happen.<br><b>Tự kiểm tra:</b> Trợ động từ đảo lên trước chủ ngữ? Hiện tại/quá khứ đơn mượn do/does/did + động từ nguyên mẫu? 'No sooner...than', 'Not only...but also' đúng cặp?"}]},
mid:{mcq:[
{q:"'___ had the meeting ended than problems arose.'",opts:["No sooner","Hardly","Not only","Only when"],a:0,why:"<b>Đúng: No sooner.</b> 'No sooner had...than...' (vừa mới...thì...). Đi với 'than'. ('Hardly' đi với 'when'.)"},
{q:"Chọn câu ĐÚNG:",opts:["Only when the sale ended we relaxed.","Only when the sale ended did we relax.","Only when did the sale end we relaxed.","Only when the sale ended relaxed we.","Only when the sale did end we relax."],a:1,why:"<b>Đúng: B.</b> 'Only when + mệnh đề (không đảo), + đảo ngữ ở mệnh đề chính (did we relax)'. Đảo ngữ xảy ra ở VẾ SAU, không phải vế 'only when'."},
{q:"'Under no circumstances ___ you reveal this information.'",opts:["should","you should","should you not","do"],a:0,why:"<b>Đúng: should.</b> 'Under no circumstances should you reveal...' — đảo modal 'should' lên trước 'you'. Câu cấm trang trọng."},
{q:"'Not until she apologised ___ him.'",opts:["I forgave","did I forgive","I did forgive","forgave I"],a:1,why:"<b>Đúng: did I forgive.</b> 'Not until + mệnh đề, + đảo ngữ mệnh đề chính (did I forgive)'. Quá khứ đơn → did + nguyên mẫu."},
{q:"'Hardly ___ the presentation ___ when the questions began.'",opts:["had / finished","did / finish","have / finished","had / finish"],a:0,why:"<b>Đúng: had / finished.</b> 'Hardly had + S + V3 when...' → Hardly had the presentation finished when... (quá khứ hoàn thành đảo ngữ, đi với 'when')."}],
writing:[{q:"Viết đoạn 6 câu kể một trải nghiệm ấn tượng hoặc trình bày quan điểm mạnh, dùng ít nhất 4 cấu trúc đảo ngữ khác nhau (Never, Not only...but also, No sooner...than / Hardly...when, Only when/after, Under no circumstances) — mỗi cấu trúc đúng ngữ pháp.",
model:"<b>Bài mẫu:</b> Never in my career have I faced such a challenging project. No sooner had we launched the new system than serious problems emerged. Not only did the software crash, but it also lost important customer data. Only after working through the night did we manage to restore everything. Under no circumstances would I want to repeat that experience. Rarely have I learned so much from a single failure.<br><b>Tự kiểm tra:</b> Trợ động từ đảo lên trước chủ ngữ? do/does/did + nguyên mẫu cho thì đơn? 'No sooner...than', 'Not only...but also', 'Only after...did' đúng cặp và đúng vị trí đảo?"}]},
adv:{mcq:[
{q:"Chọn câu mở bài Task 2 dùng đảo ngữ ẤN TƯỢNG và ĐÚNG:",opts:["Rarely has a single technology transformed society as profoundly as the internet.","Rarely a single technology has transformed society.","Rarely did a single technology has transformed society.","Rarely have transformed a single technology society."],a:0,why:"<b>Đúng: A.</b> 'Rarely has + S + V3' — đảo ngữ hoàn thành mở bài mạnh mẽ, nhấn mạnh tính độc nhất. Cấu trúc 'Rarely/Never has X been more + adj than...' cực kỳ hiệu quả cho câu chủ đề band 8."},
{q:"'So ___ was the evidence that the theory was quickly accepted.'",opts:["compelling","compellingly","compel","compelled"],a:0,why:"<b>Đúng: compelling.</b> Đảo ngữ 'So + tính từ + be + S + that...': 'So compelling was the evidence that...' = 'The evidence was so compelling that...'. Sau 'So' là TÍNH TỪ (compelling), không phải trạng từ."},
{q:"'Only by ___ significantly in education can a nation ensure long-term prosperity.'",opts:["invest","investing","invested","to invest"],a:1,why:"<b>Đúng: investing.</b> 'Only by + V-ing + can + S + V': sau giới từ 'by' dùng V-ing (investing). Đảo ngữ với 'Only by/Only through + V-ing' rất mạnh cho câu giải pháp Task 2."},
{q:"'Not only ___ the policy fail to reduce poverty, but it also worsened inequality.'",opts:["does","did","has","had"],a:1,why:"<b>Đúng: did.</b> Ngữ cảnh quá khứ ('failed', 'worsened') → 'Not only DID the policy fail...' (did + nguyên mẫu fail). Thì của đảo ngữ phải khớp thì của cả câu."},
{q:"'Little ___ that their decision would change the industry forever.'",opts:["they realised","did they realise","have they realised","they did realise"],a:1,why:"<b>Đúng: did they realise.</b> 'Little did + S + V (nguyên mẫu)': Little did they realise... = They little realised... (họ chẳng hề nhận ra). Cụm kể chuyện band cao, luôn đảo ngữ."}],
writing:[{q:"Viết đoạn nghị luận 8 câu (Writing Task 2) về tầm quan trọng của một vấn đề (giáo dục/môi trường/công nghệ), dùng đảo ngữ NÂNG CAO một cách chọn lọc (không lạm dụng): 'Rarely/Never has...', 'Not only...but also', 'Only by/through + V-ing...can...', 'So + tính từ + be + S + that', và các câu thường xen kẽ để cân bằng.",
model:"<b>Bài mẫu:</b> Rarely has any issue demanded such urgent attention as environmental degradation. So severe are the consequences of inaction that entire ecosystems now face collapse. Not only does pollution threaten human health, but it also undermines economic stability. Governments have introduced various measures, yet these have often proved insufficient. Only by cooperating on a global scale can nations hope to reverse the damage. Individuals, too, have a role to play through more sustainable lifestyles. Never before have citizens had access to so much information about their impact on the planet. Ultimately, only when awareness translates into action will meaningful change occur.<br><b>Tự kiểm tra:</b> Trợ động từ đảo đúng vị trí và đúng thì? 'So + tính từ + be + S + that'? 'Only by/when + ... + đảo ngữ mệnh đề chính'? Có xen câu thường để không lạm dụng đảo ngữ? Ý nghĩa nhấn mạnh hợp lý?"}]}
}},
/* ===== BÀI 35 ===== */
{id:"g35",stage:4,title:"Bài 35 · Câu chẻ & cấu trúc nhấn mạnh (cleft sentences)",
theory:`<h3>1. Câu chẻ để làm gì?</h3>
<p>Câu chẻ (cleft) tách một câu thường thành hai phần để NHẤN MẠNH một thành phần cụ thể. Giúp câu văn linh hoạt, có trọng tâm — kỹ năng band 7 cho cả Writing và Speaking.</p>
<h3>2. It-cleft: It + be + [phần nhấn] + that/who...</h3>
<div class="formula">It + is/was + thành phần nhấn mạnh + that/who + phần còn lại</div>
<div class="example"><b>Câu thường:</b> John broke the window yesterday.<br><b>Nhấn 'John':</b> <b>It was John who</b> broke the window yesterday.<br><b>Nhấn 'the window':</b> <b>It was the window that</b> John broke.<br><b>Nhấn 'yesterday':</b> <b>It was yesterday that</b> John broke the window.</div>
<h3>3. Wh-cleft (What-cleft): What + mệnh đề + be + [phần nhấn]</h3>
<div class="example"><b>Câu thường:</b> I need a break.<br><b>Câu chẻ:</b> <b>What I need is</b> a break.<br><b>We value honesty.</b> → <b>What we value is</b> honesty.<br><span class="vi">Dùng để nhấn mạnh điều mình muốn nói tới, thường ở đầu để tạo trọng tâm.</span></div>
<h3>4. Các biến thể với The thing / The reason / The place / All</h3>
<div class="example"><b>The reason (why) I left was the low salary.</b> (nhấn lý do)<br><b>The thing that impressed me was her honesty.</b><br><b>All I want is a fair chance.</b> (All = the only thing)</div>
<h3>5. Nhấn mạnh bằng trợ động từ 'do/does/did'</h3>
<div class="example"><b>I do understand your concern.</b> (tôi THỰC SỰ hiểu — nhấn mạnh)<br><b>She did finish it on time.</b> (cô ấy ĐÃ hoàn thành đúng hạn thật)<br><span class="vi">Thêm do/does/did trước động từ thường để nhấn mạnh, động từ chính về nguyên mẫu.</span></div>
<p class="muted">⚠️ Trong It-cleft: dùng 'who' khi nhấn người, 'that' cho vật/thời gian/còn lại. Động từ 'be' chia theo thì gốc (It IS.../It WAS...). Đừng lạm dụng — dùng khi cần trọng tâm rõ.</p>`,
levels:{
basic:{mcq:[
{q:"___ Mary who called you, not Jane.",opts:["It was","There was","That was","This is"],a:0,why:"<b>Đúng: It was.</b> It-cleft nhấn người: It was Mary who..."},
{q:"'___ I really want is some peace and quiet.'",opts:["That","What","Which","It"],a:1,why:"<b>Đúng: What.</b> Wh-cleft: What + mệnh đề + be + phần nhấn."},
{q:"'It was in 2020 ___ the pandemic began.'",opts:["who","that","which","when"],a:1,why:"<b>Đúng: that.</b> It-cleft nhấn thời gian → 'that' (không 'who')."},
{q:"'The reason ___ I called is to say thank you.'",opts:["what","that","why","who"],a:2,why:"<b>Đúng: why.</b> 'The reason why + mệnh đề' — nhấn lý do."},
{q:"'I ___ appreciate your help.' (nhấn mạnh: thực sự)",opts:["do","am","did","have"],a:0,why:"<b>Đúng: do.</b> Nhấn mạnh động từ thường bằng 'do' + nguyên mẫu (do appreciate)."}],
writing:[{q:"Viết lại 5 câu để nhấn mạnh thành phần in đậm, dùng câu chẻ: (1) MY MANAGER made the decision. (2) I need TIME, not money. (3) We met in HANOI. (4) HONESTY matters most to me. (5) She DOES work hard (nhấn động từ).",
model:"<b>Bài mẫu:</b> (1) It was my manager who made the decision. (2) What I need is time, not money. (3) It was in Hanoi that we met. (4) What matters most to me is honesty. / The thing that matters most to me is honesty. (5) She does work hard.<br><b>Tự kiểm tra:</b> It-cleft: It + be + phần nhấn + who/that? Wh-cleft: What + mệnh đề + be + phần nhấn? Nhấn động từ bằng do/does/did + nguyên mẫu?"}]},
mid:{mcq:[
{q:"Chọn câu chẻ ĐÚNG nhấn mạnh 'the customer':",opts:["It was the customer who complained.","It was the customer which complained.","What the customer complained.","It the customer who complained."],a:0,why:"<b>Đúng: A.</b> It was + the customer (người) + who + complained. 'which' sai cho người; C thiếu 'be'; D thiếu 'was'."},
{q:"'___ impressed me most was her dedication.'",opts:["That","It","What","Which"],a:2,why:"<b>Đúng: What.</b> Wh-cleft: What + mệnh đề (impressed me most) + was + phần nhấn (her dedication)."},
{q:"Chuyển 'We should focus on quality' thành câu chẻ nhấn 'quality':",opts:["It is quality that we should focus on.","It is quality what we should focus on.","What quality we should focus on.","It is on quality we should focus."],a:0,why:"<b>Đúng: A.</b> It is + quality + that + we should focus on. Giới từ 'on' giữ ở cuối."},
{q:"'___ we lost the deal was poor communication.'",opts:["What","The reason why","It was","That"],a:1,why:"<b>Đúng: The reason why.</b> 'The reason why + mệnh đề + was + nguyên nhân' — nhấn lý do. (Cũng dùng được 'The reason (that)'.)"},
{q:"Nhấn mạnh quá khứ: 'He finished the project' → nhấn 'finished':",opts:["He do finish the project.","He did finish the project.","He does finish the project.","He did finished the project."],a:1,why:"<b>Đúng: He did finish the project.</b> Quá khứ → did + nguyên mẫu (finish). 'did finished' sai (phải nguyên mẫu)."}],
writing:[{q:"Viết đoạn 6 câu (kiểu Speaking Part 2/3 hoặc Writing) trình bày điều bạn coi trọng và lý do cho một quyết định, dùng đa dạng câu chẻ: It-cleft, What-cleft, 'The reason why...', 'The thing that...', và nhấn mạnh bằng do/does/did.",
model:"<b>Bài mẫu:</b> What I value most in my career is continuous learning. It was this belief that led me to teach myself programming. The reason why I started building tools was to make my daily work easier. What surprised me was how much I enjoyed solving technical problems. I do believe that anyone can learn new skills with enough persistence. The thing that keeps me motivated is seeing my colleagues benefit from what I create.<br><b>Tự kiểm tra:</b> What-cleft (What + mệnh đề + be + phần nhấn)? It-cleft (It + be + phần nhấn + that/who)? 'The reason why', 'The thing that' đúng? 'do believe' nhấn mạnh động từ?"}]},
adv:{mcq:[
{q:"Chọn câu chẻ HỌC THUẬT tinh tế nhất để mở đầu một luận điểm:",opts:["It is precisely this lack of regulation that has allowed the problem to grow.","It is this lack of regulation what has allowed the problem to grow.","This lack of regulation is that allowed the problem to grow.","It is precisely this lack of regulation which allowed grow the problem."],a:0,why:"<b>Đúng: A.</b> 'It is precisely + [nguyên nhân] + that + [hệ quả]' — câu chẻ nhấn mạnh với 'precisely/exactly' làm trọng tâm sắc bén. Văn nghị luận band 8. B sai ('what'); C thiếu cấu trúc; D lộn xộn."},
{q:"'What ___ is not more laws but better enforcement.'",opts:["needs","is needed","need","needing"],a:1,why:"<b>Đúng: is needed.</b> Wh-cleft bị động: 'What is needed is...' (điều cần thiết là...). Dùng bị động trong mệnh đề What làm câu khách quan, trang trọng. 'What is required/needed/lacking is...' band 7-8."},
{q:"Biến 'People often overlook the environmental cost' thành câu chẻ nhấn HỆ QUẢ bị bỏ qua:",opts:["It is the environmental cost that people often overlook.","What people overlook the environmental cost.","It is people who the environmental cost overlook.","The environmental cost is what overlook people."],a:0,why:"<b>Đúng: A.</b> 'It is + the environmental cost + that + people often overlook' — nhấn mạnh đối tượng bị bỏ qua. Đưa thông tin quan trọng vào vị trí nhấn mạnh (sau 'It is') là kỹ thuật kiểm soát trọng tâm câu."},
{q:"Chọn cách nhấn mạnh trang trọng thay cho 'Only education can solve this':",opts:["It is only through education that this problem can be solved.","It is only education what can solve this.","Only education is that can solve this.","It is only education solve this problem."],a:0,why:"<b>Đúng: A.</b> 'It is only through education that + [mệnh đề bị động]' — kết hợp It-cleft + 'only through' + bị động. Cực kỳ mạnh cho câu giải pháp Task 2, nhấn mạnh phương tiện duy nhất."},
{q:"'Not until much later ___ realise the significance of what had happened.' — dạng câu chẻ/đảo nào đúng?",opts:["did I","I did","that I","what I"],a:0,why:"<b>Đúng: did I.</b> Đây là đảo ngữ (Bài 34) kết hợp nhấn mạnh: 'Not until + ... + did + S + V'. 'Not until much later did I realise...'. Cả đảo ngữ và câu chẻ đều là công cụ nhấn mạnh — band cao dùng linh hoạt cả hai."}],
writing:[{q:"Viết đoạn nghị luận 8 câu (Writing Task 2) trình bày một luận điểm và giải pháp, dùng đa dạng cấu trúc nhấn mạnh NÂNG CAO: It-cleft (có 'precisely/only through'), What-cleft (kể cả bị động 'What is needed is...'), 'The reason...is', kết hợp cân bằng với câu thường.",
model:"<b>Bài mẫu:</b> It is often assumed that economic growth alone can eliminate poverty, but this view is overly simplistic. What truly determines a nation's progress is not merely its wealth, but how fairly that wealth is distributed. It is precisely this issue of inequality that many governments fail to address. The reason why some economies remain unstable is that their benefits reach only a small elite. What is needed, therefore, is not just growth but inclusive policy. It is only through investment in education and healthcare that long-term development can be achieved. All that citizens ask for is a fair opportunity to improve their lives. Ultimately, it is equality of opportunity that transforms societies most profoundly.<br><b>Tự kiểm tra:</b> It-cleft (It is + phần nhấn + that/who) đúng? What-cleft kể cả bị động (What is needed is)? 'It is precisely/only through...that'? 'The reason why...is'? Có cân bằng câu thường? Trọng tâm nhấn mạnh hợp lý?"}]}
}},
/* ===== BÀI 36 ===== */
{id:"g36",stage:4,title:"Bài 36 · Collocations (kết hợp từ tự nhiên)",
theory:`<h3>1. Collocation là gì? Vì sao quyết định band từ vựng?</h3>
<p>Collocation là những từ ĐI VỚI NHAU một cách tự nhiên trong tiếng Anh. Người bản ngữ nói 'make a decision' chứ không 'do a decision'; 'heavy rain' chứ không 'strong rain'. Dùng đúng collocation là tiêu chí then chốt của Lexical Resource (band 7 yêu cầu 'skilful use of collocation').</p>
<h3>2. make vs do — cặp gây nhầm nhất</h3>
<table><tr><th>MAKE (tạo ra, dẫn đến)</th><th>DO (thực hiện, hoạt động)</th></tr>
<tr><td>make a decision, make progress, make an effort, make a mistake, make money, make a suggestion, make an appointment</td><td>do research, do business, do homework, do a favour, do damage, do your best, do the housework</td></tr></table>
<h3>3. Các động từ + danh từ thông dụng (rất hay dùng trong IELTS)</h3>
<table><tr><th>Collocation</th><th>Nghĩa</th></tr>
<tr><td>take action / take measures</td><td>hành động / áp dụng biện pháp</td></tr>
<tr><td>pay attention (to)</td><td>chú ý</td></tr>
<tr><td>reach a conclusion / an agreement</td><td>đi đến kết luận / thỏa thuận</td></tr>
<tr><td>raise awareness / raise concerns</td><td>nâng cao nhận thức / dấy lên lo ngại</td></tr>
<tr><td>meet a demand / meet a deadline</td><td>đáp ứng nhu cầu / kịp hạn</td></tr>
<tr><td>play a role (in)</td><td>đóng vai trò</td></tr>
<tr><td>have an impact / effect (on)</td><td>có tác động lên</td></tr>
<tr><td>pose a threat / a risk</td><td>gây ra mối đe dọa / rủi ro</td></tr></table>
<h3>4. Tính từ + danh từ & trạng từ + tính từ</h3>
<div class="example"><b>Tính từ mạnh:</b> a key factor, a major issue, a significant impact, widespread concern, a viable solution<br><b>Trạng từ + tính từ:</b> highly effective, deeply concerned, widely accepted, heavily dependent, strongly opposed, closely related</div>
<h3>5. Collocation về xu hướng (rất hữu ích Task 1 & 2)</h3>
<div class="example"><b>a sharp/dramatic increase, a steady rise, a significant decline, a gradual decrease</b><br><b>rise/increase sharply, fall dramatically, grow steadily, decline gradually</b></div>
<p class="muted">⚠️ Học từ vựng theo CỤM, không học từ lẻ. Ghi 'make a decision' thay vì chỉ 'decision'. Sai collocation ('do a decision', 'strong rain', 'say a lie') tụt band ngay cả khi ngữ pháp đúng. Khi gặp từ mới, luôn để ý nó đi với động từ/tính từ nào.</p>`,
levels:{
basic:{mcq:[
{q:"You need to ___ a decision quickly.",opts:["do","make","take","have"],a:1,why:"<b>Đúng: make.</b> 'make a decision' (không 'do a decision')."},
{q:"Scientists ___ research on climate change.",opts:["make","do","take","have"],a:1,why:"<b>Đúng: do.</b> 'do research' (không 'make research')."},
{q:"We must ___ action to reduce pollution.",opts:["do","make","take","give"],a:2,why:"<b>Đúng: take.</b> 'take action' — collocation cố định."},
{q:"Please ___ attention to the safety instructions.",opts:["make","do","pay","give"],a:2,why:"<b>Đúng: pay.</b> 'pay attention to' — collocation cố định."},
{q:"The storm caused ___ rain across the region.",opts:["strong","heavy","big","hard"],a:1,why:"<b>Đúng: heavy.</b> 'heavy rain' (không 'strong/big rain')."}],
writing:[{q:"Viết 5 câu về công việc hoặc một vấn đề xã hội, mỗi câu dùng ít nhất 1 collocation đúng từ bài (make/do/take/pay + danh từ, hoặc tính từ+danh từ như key factor, major issue).",
model:"<b>Bài mẫu:</b> Our team had to make several important decisions this quarter. We did thorough research before launching the new product. The government must take action to control rising prices. Companies should pay attention to customer feedback. Poor communication is a key factor behind many project failures.<br><b>Tự kiểm tra:</b> make a decision, do research, take action, pay attention — đúng động từ? Tính từ + danh từ tự nhiên (key factor, important decisions)? Không dùng collocation sai (do a decision, make research)?"}]},
mid:{mcq:[
{q:"The new policy will have a significant ___ on small businesses.",opts:["affect","impact","effect","affection"],a:1,why:"<b>Đúng: impact.</b> 'have an impact on' (hoặc 'have an effect on'). 'affect' là động từ, không dùng sau 'a significant'."},
{q:"Climate change ___ a serious threat to coastal cities.",opts:["makes","poses","does","gives"],a:1,why:"<b>Đúng: poses.</b> 'pose a threat/risk' — collocation học thuật cố định."},
{q:"We need to ___ awareness about this issue.",opts:["rise","raise","make","grow"],a:1,why:"<b>Đúng: raise.</b> 'raise awareness' (raise = nâng lên, ngoại động từ). 'rise' là nội động từ, không có tân ngữ."},
{q:"Chọn collocation ĐÚNG về xu hướng:",opts:["a sharp increase","a strong increase","a high increase","a big increase"],a:0,why:"<b>Đúng: a sharp increase.</b> 'sharp/dramatic/steep increase' là collocation chuẩn cho tăng mạnh. 'strong/high/big increase' không tự nhiên trong văn học thuật."},
{q:"The two problems are closely ___.",opts:["connect","related","relation","relate"],a:1,why:"<b>Đúng: related.</b> 'closely related' (trạng từ + tính từ). 'closely connected' cũng đúng, nhưng 'connect/relate/relation' sai từ loại ở đây."}],
writing:[{q:"Viết đoạn 6 câu (kiểu Writing Task 2) về một vấn đề xã hội, dùng ít nhất 6 collocation học thuật khác nhau: pose a threat, have an impact on, play a role, raise awareness, take measures, a key/major factor, closely related, widely accepted...",
model:"<b>Bài mẫu:</b> Environmental pollution poses a serious threat to public health worldwide. Rapid industrialisation has had a significant impact on air and water quality. Governments play a crucial role in tackling this problem through regulation. However, education is equally important in raising public awareness. Unless countries take urgent measures, the situation will deteriorate further. It is now widely accepted that economic growth and environmental protection are closely related.<br><b>Tự kiểm tra:</b> pose a threat, have an impact on, play a role, raise awareness, take measures dùng đúng? Tính từ mạnh (serious, significant, crucial, key)? Trạng từ + tính từ (widely accepted, closely related)? Không sai collocation?"}]},
adv:{mcq:[
{q:"Chọn câu có collocation HỌC THUẬT chính xác nhất:",opts:["The study draws a conclusion that the method is effective.","The study reaches the conclusion that the method is effective.","The study makes a conclusion that the method is effective.","The study does a conclusion that the method is effective."],a:1,why:"<b>Đúng: B.</b> 'reach/draw a conclusion' đều đúng, nhưng 'reach the conclusion that...' tự nhiên nhất. 'make/do a conclusion' SAI. Lưu ý: 'draw a conclusion' cũng chuẩn (A gần đúng nhưng 'draws a conclusion that' kém tự nhiên hơn 'reaches the conclusion that')."},
{q:"'The government implemented strict measures to ___ the spread of the disease.'",opts:["curb","cure","cut","carry"],a:0,why:"<b>Đúng: curb.</b> 'curb the spread' (kiềm chế sự lây lan) — collocation học thuật cao cấp. 'curb/curtail/contain/stem the spread' đều mạnh. Chọn động từ chính xác cho danh từ 'spread' là dấu hiệu vốn từ band 7-8."},
{q:"Chọn cụm diễn đạt 'giải quyết vấn đề' TRANG TRỌNG và đa dạng nhất (tránh lặp 'solve'):",opts:["address/tackle the issue","do the issue","make the issue","take the issue"],a:0,why:"<b>Đúng: address/tackle the issue.</b> 'address, tackle, deal with, combat, resolve' là các động từ collocate với 'issue/problem', giúp tránh lặp 'solve'. Đa dạng động từ + danh từ trừu tượng là yêu cầu Lexical Resource band 7."},
{q:"'The findings ___ serious doubts about the current approach.'",opts:["raise","rise","lift","grow"],a:0,why:"<b>Đúng: raise.</b> 'raise doubts/questions/concerns' (dấy lên nghi ngờ). 'raise' còn collocate với awareness, standards, funds, an issue. Đây là một trong những động từ 'quyền lực' nhất trong Writing học thuật."},
{q:"Tìm câu có collocation SAI:",opts:["The policy had a profound effect on the economy.","Renewable energy plays a vital role in reducing emissions.","The report makes a strong emphasis on education.","Experts have expressed deep concern about the trend."],a:2,why:"<b>Đúng (câu SAI): C.</b> 'make an emphasis' SAI — phải 'place/put emphasis on' hoặc 'emphasise'. Các câu khác đúng: 'profound effect', 'play a vital role', 'express concern'. Nắm collocation của 'emphasis' (place/put emphasis on) rất quan trọng."}],
writing:[{q:"Viết đoạn nghị luận 8 câu (Writing Task 2) về một chủ đề (công nghệ/y tế/giáo dục), thể hiện vốn collocation học thuật PHONG PHÚ: dùng các động từ 'quyền lực' (address/tackle, pose, curb, raise, play a role, have an impact), collocation danh từ trừu tượng, tính từ mạnh, và trạng từ+tính từ — tránh lặp từ đơn giản như 'solve/big/good'.",
model:"<b>Bài mẫu:</b> The rapid advancement of artificial intelligence has had a profound impact on the modern workforce. While automation offers substantial benefits, it also poses a significant threat to traditional employment. Many low-skilled jobs are being replaced, which raises serious concerns about widening inequality. Governments and companies must take decisive measures to address these challenges. Investing in education and retraining programmes can play a vital role in helping workers adapt. It is widely acknowledged that a proactive approach is far more effective than a reactive one. Failure to tackle this issue could give rise to widespread social unrest. Ultimately, striking a balance between technological progress and human welfare is a key priority for policymakers.<br><b>Tự kiểm tra:</b> Động từ quyền lực (have an impact, pose a threat, raise concerns, take measures, address/tackle, play a role, give rise to) đúng collocation? Tính từ mạnh (profound, substantial, significant, key)? Trạng từ+tính từ (widely acknowledged)? Tránh lặp solve/big/good?"}]}
}},
/* ===== BÀI 37 ===== */
{id:"g37",stage:4,title:"Bài 37 · Cấu tạo từ (word formation)",
theory:`<h3>1. Vì sao phải nắm cấu tạo từ?</h3>
<p>Từ một gốc, tiếng Anh tạo ra cả một 'gia đình từ' (word family) bằng cách thêm tiền tố/hậu tố. Nắm được giúp bạn: (1) dùng đúng từ loại trong câu, (2) mở rộng vốn từ nhanh, (3) paraphrase bằng cách đổi từ loại. Đây là điểm hay mất ở IELTS Reading (điền từ) và Writing.</p>
<h3>2. Hậu tố tạo DANH TỪ</h3>
<table><tr><th>Hậu tố</th><th>Ví dụ</th></tr>
<tr><td>-tion / -sion</td><td>educate→education, decide→decision</td></tr>
<tr><td>-ment</td><td>develop→development, achieve→achievement</td></tr>
<tr><td>-ness</td><td>happy→happiness, aware→awareness</td></tr>
<tr><td>-ity</td><td>able→ability, active→activity</td></tr>
<tr><td>-ance/-ence</td><td>important→importance, differ→difference</td></tr>
<tr><td>-er/-or/-ist (người)</td><td>teach→teacher, act→actor, science→scientist</td></tr></table>
<h3>3. Hậu tố tạo TÍNH TỪ</h3>
<table><tr><th>Hậu tố</th><th>Ví dụ</th></tr>
<tr><td>-al</td><td>nature→natural, culture→cultural</td></tr>
<tr><td>-ous</td><td>danger→dangerous, fame→famous</td></tr>
<tr><td>-ive</td><td>create→creative, effect→effective</td></tr>
<tr><td>-able/-ible</td><td>rely→reliable, response→responsible</td></tr>
<tr><td>-ful / -less</td><td>use→useful / use→useless</td></tr></table>
<h3>4. Hậu tố tạo ĐỘNG TỪ & TRẠNG TỪ</h3>
<div class="example"><b>Động từ:</b> -ise/-ize (modern→modernise), -en (wide→widen), -ify (simple→simplify)<br><b>Trạng từ:</b> -ly (quick→quickly, careful→carefully)</div>
<h3>5. Tiền tố đổi NGHĨA (thường tạo nghĩa phủ định/ngược)</h3>
<table><tr><th>Tiền tố</th><th>Nghĩa</th><th>Ví dụ</th></tr>
<tr><td>un- / in- / im- / ir- / il-</td><td>không, phủ định</td><td>unhappy, incorrect, impossible, irregular, illegal</td></tr>
<tr><td>dis-</td><td>ngược lại</td><td>agree→disagree</td></tr>
<tr><td>mis-</td><td>sai</td><td>understand→misunderstand</td></tr>
<tr><td>over- / under-</td><td>quá / thiếu</td><td>overestimate / underestimate</td></tr>
<tr><td>re-</td><td>lại</td><td>write→rewrite</td></tr></table>
<h3>6. Ví dụ 'gia đình từ' hoàn chỉnh</h3>
<div class="example"><b>analyse</b> (v) → <b>analysis</b> (n) → <b>analyst</b> (n-người) → <b>analytical</b> (adj) → <b>analytically</b> (adv)<br><b>economy</b> (n) → <b>economic</b> (adj-thuộc kinh tế) / <b>economical</b> (adj-tiết kiệm) → <b>economist</b> (n-người) → <b>economically</b> (adv)</div>
<p class="muted">⚠️ Chú ý (1) thay đổi chính tả khi thêm hậu tố (happy→happiness, able→ability); (2) một số cặp tính từ dễ nhầm nghĩa (economic vs economical, historic vs historical); (3) xác định ĐÚNG từ loại cần điền dựa vào vị trí trong câu (sau 'the' cần danh từ, trước danh từ cần tính từ...).</p>`,
levels:{
basic:{mcq:[
{q:"Danh từ của 'decide' là:",opts:["decision","decisive","decidely","deciding"],a:0,why:"<b>Đúng: decision.</b> decide (v) → decision (n), hậu tố -sion."},
{q:"Tính từ của 'nature' là:",opts:["naturally","nature","natural","naturalise"],a:2,why:"<b>Đúng: natural.</b> nature (n) → natural (adj), hậu tố -al."},
{q:"Điền từ đúng: 'The government must improve the ___ system.' (educate)",opts:["educate","education","educational","educated"],a:2,why:"<b>Đúng: educational.</b> Trước danh từ 'system' cần TÍNH TỪ → educational."},
{q:"Trạng từ của 'careful' là:",opts:["careless","carefully","carefulness","care"],a:1,why:"<b>Đúng: carefully.</b> careful (adj) → carefully (adv), hậu tố -ly."},
{q:"Từ trái nghĩa của 'possible' (dùng tiền tố):",opts:["unpossible","dispossible","impossible","nonpossible"],a:2,why:"<b>Đúng: impossible.</b> Tiền tố 'im-' trước 'p' → impossible."}],
writing:[{q:"Với mỗi gốc, viết 1 câu dùng đúng từ loại yêu cầu: (1) success → tính từ. (2) develop → danh từ. (3) create → tính từ. (4) analyse → danh từ. (5) rely → tính từ.",
model:"<b>Bài mẫu:</b> (1) Our new campaign was very successful. (2) The rapid development of technology has changed our lives. (3) Children are naturally creative. (4) A careful analysis of the data revealed the problem. (5) We need a reliable supplier for this product.<br><b>Tự kiểm tra:</b> successful (adj), development (n), creative (adj), analysis (n), reliable (adj) — đúng từ loại và chính tả? Vị trí trong câu có khớp từ loại không?"}]},
mid:{mcq:[
{q:"'The scientist made an important ___.' (discover)",opts:["discover","discovery","discovered","discovering"],a:1,why:"<b>Đúng: discovery.</b> Sau 'an important' (tính từ) cần DANH TỪ → discovery."},
{q:"'Her argument was highly ___.' (persuade)",opts:["persuade","persuasion","persuasive","persuasively"],a:2,why:"<b>Đúng: persuasive.</b> Sau 'highly' (trạng từ) + là bổ ngữ cho 'argument' cần TÍNH TỪ → persuasive."},
{q:"Phân biệt: 'This is an ___ solution — it saves a lot of money.'",opts:["economic","economical","economy","economist"],a:1,why:"<b>Đúng: economical.</b> 'economical' = tiết kiệm (saves money). 'economic' = thuộc kinh tế (economic growth). Cặp dễ nhầm."},
{q:"'They ___ the difficulty of the task.' (nghĩa: đánh giá thấp)",opts:["estimated","overestimated","underestimated","misestimated"],a:2,why:"<b>Đúng: underestimated.</b> Tiền tố 'under-' = thiếu/thấp → underestimate (đánh giá thấp). 'over-' = quá cao."},
{q:"'The instructions were ___, so everyone got confused.' (nghĩa: gây hiểu lầm/không rõ — dùng dạng phủ định của 'clear')",opts:["clearly","unclear","clearness","cleared"],a:1,why:"<b>Đúng: unclear.</b> Tiền tố 'un-' + clear (tính từ) → unclear (không rõ ràng)."}],
writing:[{q:"Viết đoạn 6 câu (kiểu Writing Task 2) về một chủ đề, cố ý dùng nhiều từ trong cùng word family và đúng từ loại: ví dụ với 'economy/economic/economical', 'develop/development/developed', 'rely/reliable/reliability', và ít nhất 2 từ có tiền tố (un-/over-/under-/mis-).",
model:"<b>Bài mẫu:</b> Rapid economic development has transformed many developing countries in recent decades. However, this growth is often unsustainable and unequally distributed. Governments frequently underestimate the environmental cost of industrialisation. A reliable long-term strategy requires balancing prosperity with sustainability. Unfortunately, short-term thinking sometimes leads to misguided policies. True development, therefore, depends not only on wealth but also on the reliability of institutions.<br><b>Tự kiểm tra:</b> Từ cùng gia đình đúng từ loại (economic, development, developing, reliable, reliability)? Tiền tố đúng nghĩa (unsustainable, unequally, underestimate, misguided)? Vị trí trong câu khớp từ loại?"}]},
adv:{mcq:[
{q:"'The ___ of renewable energy has accelerated in recent years.' (proliferate)",opts:["proliferate","proliferation","proliferative","proliferated"],a:1,why:"<b>Đúng: proliferation.</b> Sau 'The' + trước 'of' cần DANH TỪ → proliferation (sự gia tăng nhanh). Nhận diện từ loại qua vị trí ngữ pháp là kỹ năng cốt lõi cho Reading gap-fill."},
{q:"Chọn câu dùng word family ĐA DẠNG và ĐÚNG nhất:",opts:["The globalise of trade has benefits and drawbacks.","The globalisation of trade has both benefits and drawbacks.","The global of trade has benefits and drawbacks.","The globally of trade has benefits and drawbacks."],a:1,why:"<b>Đúng: B.</b> 'The globalisation of' — cần danh từ sau 'The...of'. globalise (v) → globalisation (n). Danh từ hóa động từ ('nominalisation') là đặc trưng văn học thuật band 7-8."},
{q:"Phân biệt cặp dễ nhầm: 'It was a ___ moment that changed the course of the nation.'",opts:["historic","historical","history","historically"],a:0,why:"<b>Đúng: historic.</b> 'historic' = mang tính lịch sử/trọng đại (a historic moment). 'historical' = thuộc về lịch sử/có thật trong lịch sử (a historical document). Cặp dễ nhầm band cao."},
{q:"'The committee's decision proved ___, as it ignored key evidence.' (dùng tiền tố nghĩa 'thiếu suy xét/sai lầm')",opts:["thoughtful","thoughtless","thoughtfully","thought"],a:1,why:"<b>Đúng: thoughtless.</b> Hậu tố '-less' = thiếu → thoughtless (thiếu suy nghĩ, cẩu thả). Đối lập với '-ful' (thoughtful). Chọn hậu tố đúng để tạo sắc thái nghĩa mong muốn."},
{q:"Nominalisation (danh từ hóa) làm câu học thuật hơn. Chọn bản danh từ hóa của 'The economy grew rapidly, which surprised analysts':",opts:["The rapid growth of the economy surprised analysts.","The economy rapid grew surprised analysts.","The economy growth rapidly surprised analysts.","The grow of economy rapidly surprised analysts."],a:0,why:"<b>Đúng: A.</b> Danh từ hóa: 'grew rapidly' → 'the rapid growth of'. Nominalisation biến mệnh đề thành cụm danh từ, giúp câu cô đọng, khách quan, trang trọng — đặc trưng band 7-8. Chú ý chính tả (grow→growth)."}],
writing:[{q:"Viết đoạn nghị luận 8 câu (Writing Task 2) sử dụng NOMINALISATION (danh từ hóa) và word family đa dạng để tạo giọng học thuật: biến động từ/tính từ thành danh từ (grow→growth, develop→development, aware→awareness, implement→implementation), dùng tiền tố/hậu tố chính xác, và phân biệt đúng các cặp dễ nhầm.",
model:"<b>Bài mẫu:</b> The rapid expansion of urban populations has created significant challenges for governments worldwide. Poor urban planning often results in the deterioration of infrastructure and rising inequality. The implementation of effective housing policies is therefore essential for sustainable development. Public awareness of environmental issues has also grown, driving demand for greener cities. However, the unequal distribution of resources continues to undermine progress. A reliance on short-term solutions frequently proves counterproductive in the long run. What is required is a fundamental transformation in the way cities are designed and managed. Ultimately, the success of any strategy depends on the cooperation of both authorities and citizens.<br><b>Tự kiểm tra:</b> Có nominalisation (expansion, deterioration, implementation, distribution, reliance, transformation, cooperation)? Word family đúng từ loại? Tiền tố/hậu tố chính xác (unequal, counterproductive, sustainable)? Câu cô đọng, khách quan?"}]}
}}
);
