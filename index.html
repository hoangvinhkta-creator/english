{q:"'That's a really interesting question, let me think...' là:",opts:["Lỗi ngập ngừng","Discourse marker 'câu giờ' tự nhiên, giữ mạch nói mượt","Câu thừa","Bài học thuộc"],a:1,why:"<b>Đúng: B.</b> Cụm câu giờ tự nhiên giúp bạn có thời gian nghĩ mà vẫn giữ mạch, nghe rất tự nhiên."},
{q:"'Chunking' trong lời nói là:",opts:["Nói từng từ rời","Chia lời thành các CỤM Ý, nghỉ ngắn giữa các cụm","Nói thật nhanh","Không nghỉ"],a:1,why:"<b>Đúng: B.</b> Nói theo cụm ý (thought groups) tạo nhịp tự nhiên, dễ hiểu — đặc trưng lời nói band cao."},
{q:"Band 8 Pronunciation KHÔNG phải là:",opts:["Rõ ràng, dễ hiểu","Giọng bản ngữ hoàn hảo","Ngữ điệu tốt","Trọng âm đúng"],a:1,why:"<b>Đúng: Giọng bản ngữ hoàn hảo.</b> Không cần giọng Tây; cần rõ ràng, ngữ điệu/trọng âm/nhịp tốt và dễ hiểu."}],
writing:[{q:"Luyện discourse markers. Viết một câu trả lời Speaking (tiếng Anh, 4-5 câu) cho 'What do you think about working from home?', chèn ít nhất 3 discourse marker tự nhiên (well, to be honest, having said that, the thing is, on top of that...) đúng chỗ.",
model:"<b>Bài mẫu:</b> Well, to be honest, I think working from home has become a real game-changer for a lot of people. The thing is, it gives you so much more flexibility — you can manage your own time and skip that exhausting commute. Having said that, it's not perfect; some people really struggle to stay focused at home, and on top of that, it can get quite lonely without colleagues around. So overall, I'd say it works brilliantly for some but not for everyone.<br><b>Tự kiểm tra:</b> Có ít nhất 3 discourse marker (Well, to be honest, The thing is, Having said that, on top of that)? Chúng đặt đúng chỗ và nghe TỰ NHIÊN (không gượng)? Câu trả lời trôi chảy, mạch lạc, có quan điểm rõ?"}]},
mid:{mcq:[
{q:"'Having said that' dùng để:",opts:["Thêm ý cùng chiều","Chuyển sang ý ĐỐI LẬP/nhượng bộ một cách tự nhiên (= tuy nhiên)","Kết thúc","Đưa ví dụ"],a:1,why:"<b>Đúng: B.</b> 'Having said that' = tuy vậy — discourse marker tự nhiên để chuyển sang ý đối lập, mượt hơn 'however' trong lời nói."},
{q:"Trọng âm từ SAI ('COMfortable' → 'comFORTable') gây:",opts:["Không sao","Khó hiểu và hạ điểm Pronunciation","Nghe hay hơn","Band cao hơn"],a:1,why:"<b>Đúng: B.</b> Sai trọng âm từ (nhất là từ dài) gây khó hiểu và trực tiếp hạ Pronunciation. Từ 'comfortable' nhấn âm đầu (COMf-)."},
{q:"Nhịp điệu tiếng Anh tự nhiên đạt được bằng:",opts:["Nhấn mọi từ đều nhau","Nhấn từ nội dung (danh/động/tính từ), lướt từ chức năng (a, the, of, to)","Nói đều đều","Nói to dần"],a:1,why:"<b>Đúng: B.</b> Tiếng Anh có nhịp trọng âm: nhấn content words, lướt function words. Điều này tạo 'nhạc điệu' tự nhiên."},
{q:"Ngữ điệu (intonation) LÊN giọng cuối câu thường báo hiệu:",opts:["Câu kể khẳng định","Câu hỏi (nhất là Yes/No) hoặc sự chưa hoàn tất/liệt kê","Kết thúc dứt khoát","Sự tức giận"],a:1,why:"<b>Đúng: B.</b> Lên giọng cuối: câu hỏi Yes/No, hoặc báo hiệu 'còn nữa' (liệt kê chưa xong). Xuống giọng: câu kể, kết thúc dứt khoát."},
{q:"Nếu bí ý giữa câu ở Part 2, cách band 8 xử lý:",opts:["Im lặng dài","Dùng cụm câu giờ/diễn giải tự nhiên ('what I mean is...', 'or rather...') để tiếp tục mượt","Nói tiếng Việt","Bắt đầu lại"],a:1,why:"<b>Đúng: B.</b> Dùng cụm tự nhiên để tự sửa/diễn giải ('or rather', 'what I mean is') giữ mạch nói mượt, thể hiện sự linh hoạt band cao."}],
writing:[{q:"Viết một câu trả lời Part 2 (tiếng Anh, khoảng 150-180 từ) cho cue card 'Describe a place you like to visit', thể hiện đặc điểm lời nói band 8: chunking (đánh dấu chỗ nghỉ bằng /), discourse markers tự nhiên, và ngôn ngữ trôi chảy — viết như thể bạn đang NÓI.",
model:"<b>Bài mẫu (đánh dấu chunking bằng /):</b> So / one place I absolutely love visiting / is a small coffee shop / near my old university. / Well, / it's nothing fancy, / to be honest, / but there's just something about it / that makes me feel completely at home. / The thing is, / I used to go there almost every day / when I was studying, / so it holds a lot of memories for me. / Whenever I step inside, / I'm hit by this wonderful smell of fresh coffee, / and the owner, / who's known me for years, / always greets me with a smile. / I usually grab my favourite corner seat / by the window, / order an iced coffee, / and just watch the world go by. / Having said that, / it's not only about the coffee — / it's the peaceful atmosphere / that really draws me back. / That's why, / no matter how busy life gets, / I always find my way back to that little place.<br><b>Tự kiểm tra:</b> Có chia cụm ý (chunking) hợp lý? Discourse markers tự nhiên (So, Well, to be honest, The thing is, Having said that)? Ngôn ngữ trôi chảy, nghe như NÓI (không như văn viết)? Có phát triển đủ ý, mạch lạc, cảm xúc?"}]},
adv:{mcq:[
{q:"Đặc điểm CHÍNH của Fluency & Coherence band 8 (khác band 7) là:",opts:["Nói nhanh hơn","Nói trôi chảy với rất ít do dự đáng kể; phát triển chủ đề mạch lạc, đầy đủ và phù hợp; do dự liên quan đến NỘI DUNG chứ không phải ngôn ngữ","Không dùng filler","Nói liên tục không nghỉ"],a:1,why:"<b>Đúng: B.</b> Band 8: 'fluent with only very occasional repetition or self-correction', 'develops topics coherently and appropriately'. Điểm mấu chốt: sự trôi chảy KHÔNG bị gián đoạn bởi việc vật lộn tìm từ/sửa ngữ pháp; khi ngừng, đó là để cân nhắc Ý (giống người bản ngữ suy nghĩ), và chủ đề được phát triển đầy đủ, mạch lạc, đúng trọng tâm. Không phải tốc độ, mà là sự MƯỢT MÀ và mạch lạc trong phát triển ý."},
{q:"Về Coherence trong Speaking band 8, yếu tố tinh vi là:",opts:["Nói to rõ","Tổ chức ý mạch lạc với cohesive devices tự nhiên (linh hoạt như văn nói: 'that's why', 'the point is', 'in that sense'), phát triển câu trả lời có logic thay vì rời rạc","Dùng nhiều idiom","Nói thật dài"],a:1,why:"<b>Đúng: B.</b> Coherence trong nói là MẠCH LẠC về ý: câu trả lời có mở-triển khai-chốt, các ý nối nhau logic, dùng discourse markers/cohesive devices phù hợp văn nói ('that's why', 'the thing is', 'in that sense', 'which brings me to'). Một người nói trôi chảy (fluent) nhưng ý nhảy cóc, lan man, không đi đến đâu thì vẫn thiếu coherence. Band 8 cần nói MƯỢT VÀ có tổ chức ý rõ ràng — đặc biệt quan trọng ở Part 3 khi lập luận trừu tượng."},
{q:"Về Pronunciation band 8, 'sử dụng hiệu quả các đặc điểm ngữ âm' nghĩa là:",opts:["Có giọng bản ngữ","Dùng trọng âm, ngữ điệu, nhịp điệu, nối âm một cách CHỦ ĐỘNG để truyền đạt nghĩa và thái độ chính xác; dễ hiểu xuyên suốt dù có thể còn dấu vết accent","Nói không accent","Bắt chước người Anh"],a:1,why:"<b>Đúng: B.</b> Band 8 Pronunciation: dùng đầy đủ và HIỆU QUẢ các đặc điểm ngữ âm (trọng âm từ/câu, ngữ điệu, nhịp, nối âm) để truyền đạt nghĩa tinh tế, duy trì dễ hiểu xuyên suốt. Accent (dấu vết ngôn ngữ mẹ đẻ) được chấp nhận MIỄN LÀ không cản trở sự dễ hiểu. Mấu chốt không phải 'xóa accent' mà là dùng ngữ âm để phục vụ giao tiếp: ngữ điệu thể hiện đúng thái độ, trọng âm nhấn đúng từ khóa, nhịp điệu tự nhiên. Một người có accent Việt nhẹ nhưng ngữ điệu và trọng âm xuất sắc, cực dễ hiểu, hoàn toàn đạt band 8."},
{q:"Vì sao luyện nói về chủ đề QUEN THUỘC hằng ngày lại quan trọng cho fluency band 8?",opts:["Vì chủ đề dễ","Vì nó tự động hóa việc diễn đạt ý bằng tiếng Anh (giảm dịch trong đầu), giải phóng năng lượng nhận thức để tập trung vào NỘI DUNG và ngữ điệu — nền tảng của sự trôi chảy tự nhiên","Vì đề thi luôn quen thuộc","Vì không cần từ vựng"],a:1,why:"<b>Đúng: B.</b> Fluency đến từ TỰ ĐỘNG HÓA: khi diễn đạt các ý thông thường bằng tiếng Anh đã thành phản xạ (không phải dịch), 'băng thông' nhận thức được giải phóng để lo NỘI DUNG (nói gì thông minh) và cách truyền đạt (ngữ điệu, nhấn nhá). Luyện nói hằng ngày về chủ đề quen (một ngày của bạn, ý kiến về tin tức, mô tả thứ quanh bạn) xây dựng chính sự tự động này. Ngược lại, người luôn dịch trong đầu tiêu tốn năng lượng vào ngôn ngữ nên nghe chậm, ngập ngừng — dù có thể viết tốt. Đây là lý do người 'giỏi ngữ pháp' vẫn có thể yếu fluency."},
{q:"Chiến lược 'về đích' cho Speaking từ 7 lên 8 nên tập trung:",opts:["Học thuộc nhiều mẫu câu","Tự động hóa diễn đạt (giảm dịch), làm giàu discourse markers linh hoạt, tinh chỉnh trọng âm/ngữ điệu, và luyện phát triển ý mạch lạc ở Part 3 — thu âm và phân tích theo 4 tiêu chí","Nói nhanh hơn","Chỉ học idiom"],a:1,why:"<b>Đúng: B.</b> Từ 7 lên 8 ở Speaking là cuộc 'tinh chỉnh' đa mặt: (1) tự động hóa để tăng fluency (nghĩ bằng Anh, không dịch), (2) làm giàu kho discourse markers để nối ý và câu giờ tự nhiên, (3) tinh chỉnh Pronunciation (trọng âm từ dài, ngữ điệu biểu cảm, nối âm), (4) rèn phát triển ý MẠCH LẠC, trừu tượng ở Part 3. Cốt lõi là thu âm bản thân, tự đánh giá theo TỪNG tiêu chí (hoặc nhờ người có chuyên môn), xác định tiêu chí đang kéo điểm và luyện trúng nó. Học thuộc mẫu phản tác dụng (nghe máy móc); nói nhanh không phải fluency."}],
writing:[{q:"Viết một câu trả lời Part 3 BAND 8 (tiếng Anh, 6-8 câu) cho câu hỏi trừu tượng, thể hiện: fluency (viết như nói, mạch trôi chảy), coherence (ý tổ chức logic), discourse markers tự nhiên, và lập luận phát triển đầy đủ. Câu hỏi: 'Some people say that traditional skills and ways of life are being lost. Do you think this matters?'",
model:"<b>Bài mẫu:</b> That's a really thought-provoking question, and I'd say it definitely matters, though perhaps not in every case. The thing is, traditional skills — like handcrafts or regional cooking — often carry a huge amount of cultural identity and history, so when they disappear, we lose more than just a technique; we lose a part of who we are as a community. Having said that, I think we need to be realistic, because some old ways of doing things naturally fade simply because better alternatives come along, and that's not necessarily a bad thing. What worries me more is when valuable knowledge is lost purely through neglect, rather than genuine progress. Take traditional farming methods, for instance — some of them are remarkably sustainable, and it would be a real shame to abandon them just because they seem old-fashioned. So on balance, I'd argue it comes down to being selective: we should embrace progress, but at the same time make a conscious effort to preserve the traditions that still hold real value.<br><b>Tự kiểm tra:</b> Fluency (viết như NÓI, mạch trôi chảy)? Coherence (mở-triển khai-chốt logic)? Discourse markers tự nhiên (That's..., The thing is, Having said that, for instance, So on balance)? Lập luận sâu, có sắc thái (không phải mọi truyền thống mất đều xấu; phân biệt 'tiến bộ' vs 'bỏ bê')? Ví dụ tích hợp (farming methods)? Nghe tự nhiên, không học thuộc?"}]}
}},
/* ===== BÀI 57 ===== */
{id:"g57",stage:6,title:"Bài 57 · Speaking band 8 — từ vựng, ngữ pháp & Part 3",
theory:`<h3>1. Lexical Resource trong Speaking band 8</h3>
<p>Band 8: dùng vốn từ RỘNG, LINH HOẠT để bàn mọi chủ đề; dùng từ ít phổ biến và idiomatic một cách TỰ NHIÊN và chính xác; diễn giải khéo (paraphrase) khi thiếu một từ cụ thể. Điểm khác band 7: sự CHÍNH XÁC và TỰ NHIÊN cao hơn, ít 'vấp' từ hơn.</p>
<h3>2. Idiomatic language trong lời nói (khác văn viết)</h3>
<p>Nói tự nhiên dùng nhiều cụm khẩu ngữ mà văn viết học thuật tránh:</p>
<div class="example"><b>a game-changer, to be honest, at the end of the day, it's a bit of a mixed bag, that's a tough call, to get the hang of, off the top of my head, when it comes to..., there's no denying that...</b></div>
<p>Dùng đúng ngữ cảnh và tự nhiên → tăng điểm. Nhồi hoặc dùng sai → phản tác dụng.</p>
<h3>3. Grammar trong Speaking band 8</h3>
<p>Dùng ĐA DẠNG cấu trúc phức một cách TỰ NHIÊN trong lời nói: điều kiện ('If I had to choose...'), hoàn thành ('I've always believed...'), so sánh, mệnh đề quan hệ, giả định. Phần lớn không lỗi. Nhưng: TỰ NHIÊN quan trọng — câu phức trong nói nên trôi chảy, không 'gồng'.</p>
<h3>4. Part 3 band 8 — tư duy trừu tượng & mở rộng</h3>
<p>Part 3 phân biệt band cao rõ nhất. Yêu cầu:</p>
<ul>
<li><b>Trả lời trừu tượng, khái quát:</b> bàn xu hướng xã hội, không chỉ kinh nghiệm cá nhân.</li>
<li><b>Lập luận & bảo vệ quan điểm:</b> nêu ý + lý do + ví dụ, xét nhiều góc.</li>
<li><b>Ngôn ngữ suy đoán/giả định:</b> 'it might well lead to...', 'presumably', 'in all likelihood', 'if that were the case...'.</li>
<li><b>So sánh & tương phản:</b> quá khứ vs hiện tại, nhóm này vs nhóm kia.</li>
</ul>
<h3>5. Kỹ thuật mở rộng câu trả lời Part 3</h3>
<div class="example"><b>Nêu ý → giải thích → ví dụ/minh họa → xét mặt khác → (khái quát/dự đoán).</b><br>'I think... (ý). This is mainly because... (lý do). For example... (ví dụ). That said, it could be argued that... (mặt khác). So in the long run, it's likely that... (dự đoán).'</div>
<p class="muted">⚠️ Part 3 band 8 KHÔNG phải nói dài lan man. Đó là lập luận TRỌNG TÂM, có chiều sâu, ngôn ngữ linh hoạt, xét nhiều góc — nhưng vẫn trực tiếp và mạch lạc. Tránh: trả lời quá ngắn (như Part 1), hoặc nói dài mà không có lập luận rõ.</p>`,
levels:{
basic:{mcq:[
{q:"Lexical Resource Speaking band 8 chú trọng:",opts:["Nhồi từ khó","Từ rộng, linh hoạt, chính xác, TỰ NHIÊN; diễn giải khéo khi thiếu từ","Chỉ từ đơn giản","Nhiều thành ngữ cliché"],a:1,why:"<b>Đúng: B.</b> Band 8 là dùng từ chính xác, tự nhiên, linh hoạt — kể cả paraphrase khi thiếu một từ cụ thể."},
{q:"'a game-changer' trong lời nói là:",opts:["Lỗi","Cụm idiomatic tự nhiên (thứ tạo thay đổi lớn) — hợp văn nói","Quá trang trọng","Sai ngữ pháp"],a:1,why:"<b>Đúng: B.</b> Cụm khẩu ngữ tự nhiên, dùng đúng chỗ trong nói sẽ nâng điểm Lexical Resource."},
{q:"Part 3 khác Part 1 ở chỗ cần:",opts:["Trả lời ngắn hơn","Tư duy TRỪU TƯỢNG, lập luận, xét nhiều góc (không chỉ kinh nghiệm cá nhân)","Chỉ nói về bản thân","Không cần lý do"],a:1,why:"<b>Đúng: B.</b> Part 3 đòi hỏi bàn vấn đề trừu tượng/xã hội, lập luận và bảo vệ quan điểm — nơi thể hiện band cao."},
{q:"Ngôn ngữ suy đoán nào phù hợp Part 3?",opts:["Definitely, always, never","It might well lead to..., presumably, in all likelihood","Yes, no","I don't know"],a:1,why:"<b>Đúng: B.</b> Ngôn ngữ suy đoán/thận trọng (might well, presumably) thể hiện tư duy tinh tế, tránh khẳng định tuyệt đối."},
{q:"Cấu trúc mở rộng câu trả lời Part 3 hợp lý:",opts:["Chỉ nêu ý","Ý → giải thích → ví dụ → xét mặt khác → dự đoán","Nói thật dài không cấu trúc","Trả lời một từ"],a:1,why:"<b>Đúng: B.</b> Chuỗi ý-lý do-ví dụ-mặt khác-dự đoán giúp câu trả lời sâu, đầy đủ, mạch lạc."}],
writing:[{q:"Luyện mở rộng Part 3. Trả lời câu hỏi (tiếng Anh, 5-6 câu) theo cấu trúc ý → lý do → ví dụ → mặt khác: 'Do you think money can buy happiness?' Dùng ít nhất một cụm idiomatic và một cụm suy đoán.",
model:"<b>Bài mẫu:</b> Well, to be honest, I think money can buy a certain kind of happiness, but only up to a point. The main reason is that having enough money removes a lot of stress — you can afford good healthcare, a comfortable home, and the freedom to do what you enjoy. For example, someone struggling to pay their bills is understandably going to be unhappy, and a bit of financial security would clearly make a huge difference. That said, once your basic needs are met, more money doesn't necessarily bring more joy; in fact, some of the wealthiest people are famously miserable. So in all likelihood, it comes down to how you use money rather than how much you have — at the end of the day, relationships and purpose probably matter far more.<br><b>Tự kiểm tra:</b> Có cấu trúc ý → lý do → ví dụ → mặt khác → dự đoán? Cụm idiomatic (to be honest, a huge difference, at the end of the day)? Suy đoán (in all likelihood, doesn't necessarily)? Lập luận có sắc thái (đến một mức nào đó, tùy cách dùng tiền)?"}]},
mid:{mcq:[
{q:"'When it comes to education, I believe...' — cụm 'when it comes to' giúp:",opts:["Sai ngữ pháp","Dẫn vào chủ đề một cách tự nhiên (= về vấn đề...)","Kết thúc","Đưa số liệu"],a:1,why:"<b>Đúng: B.</b> 'when it comes to + chủ đề' là cách dẫn ý tự nhiên, linh hoạt trong lời nói band cao."},
{q:"Cấu trúc điều kiện nào tự nhiên cho Part 3?",opts:["If I will have money...","If I had to choose, I would say...","If I have chosen...","If choosing..."],a:1,why:"<b>Đúng: B.</b> 'If I had to choose, I would...' (điều kiện loại 2) — cách diễn đạt giả định tự nhiên, thể hiện ngữ pháp linh hoạt."},
{q:"Trả lời Part 3 QUÁ NGẮN (như Part 1) sẽ:",opts:["Tốt vì ngắn gọn","Bỏ lỡ cơ hội thể hiện lập luận/từ vựng/ngữ pháp band cao — Part 3 cần khai triển","Được điểm cao","Đúng yêu cầu"],a:1,why:"<b>Đúng: B.</b> Part 3 là nơi 'khoe' khả năng lập luận và ngôn ngữ. Trả lời cụt lủn bỏ lỡ cơ hội ghi điểm band cao."},
{q:"So sánh quá khứ-hiện tại ('In the past... whereas nowadays...') ở Part 3 giúp:",opts:["Làm dài","Thể hiện tư duy phân tích + ngữ pháp (thì, tương phản) — làm câu trả lời sâu hơn","Gây rối","Không cần"],a:1,why:"<b>Đúng: B.</b> So sánh quá khứ-nay thể hiện khả năng phân tích xu hướng và dùng đa dạng thì + cấu trúc tương phản — nâng cả ý lẫn ngôn ngữ."},
{q:"Khi không biết một từ cụ thể ở Part 3, band 8 sẽ:",opts:["Im lặng","Diễn giải (paraphrase) khéo léo để truyền đạt ý bằng từ khác","Nói tiếng Việt","Bỏ ý đó"],a:1,why:"<b>Đúng: B.</b> Khả năng paraphrase khi thiếu từ chính xác là dấu hiệu band 8 (linh hoạt), giữ mạch nói mà vẫn truyền đạt được ý."}],
writing:[{q:"Viết câu trả lời Part 3 (tiếng Anh, 6-7 câu) cho câu hỏi, thể hiện ngữ pháp ĐA DẠNG tự nhiên (điều kiện, so sánh quá khứ-nay, mệnh đề quan hệ) và từ vựng linh hoạt: 'How has the role of technology in education changed over the years, and is this a good thing?'",
model:"<b>Bài mẫu:</b> Technology has completely transformed education over the past couple of decades. In the past, students relied almost entirely on textbooks and face-to-face lessons, whereas nowadays they have access to a vast range of online resources that would have been unimaginable to previous generations. On the whole, I'd say this is a positive development, mainly because it makes learning far more flexible and accessible — someone in a remote village who has an internet connection can now study courses from top universities. That said, if I had to point out a downside, I'd argue that over-reliance on screens can sometimes reduce genuine human interaction, which is such an important part of learning. So while technology has undoubtedly opened up incredible opportunities, I think the key is striking a balance rather than letting it replace teachers altogether. In all likelihood, the classrooms of the future will blend the best of both worlds.<br><b>Tự kiểm tra:</b> So sánh quá khứ-nay (In the past... whereas nowadays)? Điều kiện (would have been unimaginable; if I had to point out)? Mệnh đề quan hệ (that would have been..., who has an internet connection, which is such an important part)? Từ vựng linh hoạt (transformed, unimaginable, over-reliance, striking a balance)? Lập luận có sắc thái? Nghe tự nhiên?"}]},
adv:{mcq:[
{q:"Điều phân biệt rõ nhất câu trả lời Part 3 band 8 với band 6.5 là:",opts:["Độ dài","Khả năng tư duy TRỪU TƯỢNG và lập luận có chiều sâu, dùng ngôn ngữ linh hoạt (suy đoán, nhượng bộ, khái quát) để phát triển ý một cách tự nhiên và mạch lạc","Nói nhanh","Dùng từ khó"],a:1,why:"<b>Đúng: B.</b> Part 3 band 8 thể hiện: tư duy trừu tượng (bàn xu hướng, nguyên lý, giả định 'what if'), lập luận phát triển qua nhiều bước logic, ngôn ngữ LINH HOẠT (suy đoán 'it might well', nhượng bộ 'admittedly', khái quát 'by and large'), và xét nhiều góc — tất cả một cách TỰ NHIÊN, mạch lạc, không gồng. Band 6.5 thường trả lời cụ thể/kinh nghiệm cá nhân, lập luận nông, ngôn ngữ ít linh hoạt. Không phải độ dài hay từ khó, mà là CHẤT LƯỢNG tư duy + sự tự nhiên khi diễn đạt nó."},
{q:"Về idiomatic language trong Speaking band 8, nguyên tắc quan trọng nhất là:",opts:["Càng nhiều idiom càng tốt","Dùng TỰ NHIÊN và ĐÚNG NGỮ CẢNH — vài cụm khẩu ngữ đắt giá đúng chỗ (a mixed bag, a tough call, no denying that) tốt hơn nhồi nhiều idiom hoặc dùng sai/gượng","Chỉ dùng idiom hiếm","Tránh idiom khẩu ngữ"],a:1,why:"<b>Đúng: B.</b> Idiomatic trong nói (khác viết) bao gồm nhiều cụm khẩu ngữ tự nhiên ('it's a bit of a mixed bag', 'that's a tough call', 'there's no denying that', 'get the hang of'). Chúng nâng điểm khi dùng ĐÚNG NGỮ CẢNH và tự nhiên. Nhưng nhồi quá nhiều, dùng sai nghĩa, hay chèn gượng ép làm lời nói thiếu tự nhiên và lộ điểm yếu — phản tác dụng. Chất lượng và sự tự nhiên (đúng chỗ, đúng sắc thái) quan trọng hơn số lượng. Giám khảo đánh giá khả năng dùng chúng KHÉO, không phải biết nhiều."},
{q:"Một thí sinh nói trôi chảy, nhiều idiom, nhưng ở Part 3 chỉ đưa ý kiến nông, không lập luận. Band Speaking bị giới hạn vì:",opts:["Không sao nếu trôi chảy","Coherence (phát triển ý) và có thể cả Lexical/Grammar không được thể hiện đầy đủ; Part 3 đòi hỏi CHIỀU SÂU lập luận, không chỉ sự trôi chảy bề mặt","Vì dùng idiom","Vì nói nhanh"],a:1,why:"<b>Đúng: B.</b> Trôi chảy (Fluency) chỉ là một trong bốn tiêu chí. Nếu ở Part 3, thí sinh nói mượt nhưng ý nông, không lập luận, không xét nhiều góc, thì: (1) Coherence bị ảnh hưởng (chủ đề không được phát triển đầy đủ, có chiều sâu), (2) không tạo cơ hội thể hiện ngữ pháp phức và từ vựng tinh vi mà lập luận sâu đòi hỏi. Part 3 được thiết kế để phân biệt band cao qua CHIỀU SÂU tư duy. Sự trôi chảy 'rỗng' (nói nhiều mà không nói được gì sâu) không đủ cho band 8 — cần cả trôi chảy LẪN thực chất."},
{q:"Ngôn ngữ suy đoán và nhượng bộ ('it may well be that...', 'admittedly...', 'to some degree') ở Part 3 thể hiện điều gì về band?",opts:["Sự thiếu chắc chắn (điểm yếu)","Tư duy tinh tế, cân nhắc — thể hiện khả năng xét vấn đề nhiều chiều và diễn đạt sắc thái, đặc trưng người dùng ngôn ngữ ở trình độ cao","Sự lảng tránh","Vốn từ nghèo"],a:1,why:"<b>Đúng: B.</b> Trái với trực giác, ngôn ngữ suy đoán/nhượng bộ KHÔNG phải dấu hiệu yếu — nó thể hiện SỰ TINH TẾ. Người dùng ngôn ngữ trình độ cao hiếm khi khẳng định tuyệt đối về vấn đề phức tạp; họ dùng hedging ('it may well', 'to some extent', 'arguably') và nhượng bộ ('admittedly', 'granted') để thể hiện họ nhận ra sự phức tạp và xét nhiều góc. Điều này đòi hỏi cả tư duy chín chắn LẪN ngôn ngữ linh hoạt (modal verbs, trạng từ tình thái, cấu trúc nhượng bộ) — chính xác là những gì band 8 tìm kiếm. Khẳng định tuyệt đối ('X always causes Y', 'everyone knows') nghe ngây thơ và kém tinh tế hơn."},
{q:"Chiến lược luyện Part 3 hiệu quả nhất để đạt band 8 là:",opts:["Học thuộc câu trả lời mẫu cho nhiều chủ đề","Luyện TƯ DUY: tập lập luận về các chủ đề trừu tượng (xét nguyên nhân-hệ quả, hai mặt, quá khứ-tương lai), xây kho ngôn ngữ lập luận/suy đoán linh hoạt, và thu âm để tự đánh giá chiều sâu + sự tự nhiên","Chỉ học idiom","Nói thật nhiều bất kể chất lượng"],a:1,why:"<b>Đúng: B.</b> Part 3 kiểm tra khả năng SUY NGHĨ và diễn đạt tư duy đó một cách linh hoạt — không thể học thuộc (câu hỏi vô cùng đa dạng, và bài học thuộc nghe máy móc). Luyện đúng: (1) rèn TƯ DUY phản biện — với mỗi chủ đề trừu tượng, tập xét nguyên nhân-hệ quả, hai mặt, so quá khứ-tương lai, đưa ví dụ; (2) xây 'bộ khung' ngôn ngữ lập luận linh hoạt (nêu ý, hedging, nhượng bộ, khái quát, suy đoán) để dùng cho MỌI chủ đề; (3) thu âm, tự đánh giá chiều sâu lập luận và sự tự nhiên. Đây là luyện KHẢ NĂNG (transferable), không phải học thuộc NỘI DUNG."}],
writing:[{q:"Viết câu trả lời Part 3 BAND 8 (tiếng Anh, 7-9 câu) cho câu hỏi trừu tượng khó, thể hiện TOÀN DIỆN: tư duy trừu tượng & lập luận sâu, ngôn ngữ suy đoán/nhượng bộ linh hoạt, ngữ pháp đa dạng tự nhiên (điều kiện, so sánh, mệnh đề quan hệ), từ vựng & idiomatic chính xác, và phát triển ý mạch lạc. Câu hỏi: 'Some people believe that in the future, machines will replace human workers in most jobs. What are your views on this?'",
model:"<b>Bài mẫu:</b> That's a fascinating question, and it's one that people are increasingly worried about. My view is that while automation will undoubtedly transform the job market, the idea that machines will replace humans in most jobs is probably an overstatement. The main reason I say this is that, historically, every major technological shift has destroyed certain jobs but created entirely new ones that nobody could have predicted — so it may well be that the same thing happens again. Take the rise of computers, for instance: they eliminated a lot of clerical work, yet they gave birth to whole industries that now employ millions. That said, I do think the transition could be painful, particularly for workers in routine manual or administrative roles, who are the most vulnerable to being automated. Admittedly, this time might be different, given how rapidly artificial intelligence is advancing into areas we once thought were uniquely human. But even so, there are certain qualities — creativity, empathy, complex judgement — that machines are unlikely to replicate any time soon. So on balance, I'd argue that rather than mass unemployment, what we're more likely to see is a fundamental reshaping of work, which means the real challenge is making sure people are equipped with the skills to adapt.<br><b>Tự kiểm tra:</b> Tư duy trừu tượng & lập luận sâu (bài học lịch sử, phân biệt loại công việc)? Suy đoán/nhượng bộ linh hoạt (probably, it may well be, That said, Admittedly, even so, on balance)? Ngữ pháp đa dạng (điều kiện 'could have predicted', mệnh đề quan hệ 'who are the most vulnerable', so sánh)? Từ vựng & idiomatic (an overstatement, gave birth to, on balance, equipped with)? Xét nhiều góc, phát triển mạch lạc? Nghe tự nhiên như nói, không học thuộc?"}]}
}}

/* ===== BÀI 58 ===== */
{id:"g58",stage:6,title:"Bài 58 · Reading band 8 — suy luận, tốc độ & dạng khó nhất",
theory:`<h3>1. Điều gì cản band 8 Reading (35+/40 câu)?</h3>
<p>Ở band 7 (khoảng 30-32 câu đúng), thí sinh đọc-hiểu tốt nhưng mất điểm ở: (1) các câu đòi hỏi SUY LUẬN tinh vi, (2) tốc độ chưa đủ cho bài 3 khó, (3) các dạng bẫy tinh vi nhất (Y/N/NG về quan điểm, Matching phức tạp). Band 8 cần độ chính xác cao HƠN dưới áp lực thời gian.</p>
<h3>2. Suy luận (inference) — không chỉ tìm thông tin bề mặt</h3>
<p>Nhiều câu band cao không có đáp án 'nằm sẵn' trong một câu, mà đòi hỏi HIỂU HÀM Ý từ nhiều câu. Vẫn phải căn cứ vào bài, nhưng là suy ra kết luận hợp lý từ bằng chứng:</p>
<div class="example"><b>Bài:</b> "Despite initial skepticism, the method gained widespread acceptance within a decade."<br><b>Suy ra:</b> Phương pháp ban đầu KHÔNG được tin tưởng (skepticism) → nhận định 'The method was immediately accepted' là FALSE.</div>
<h3>3. Xử lý paraphrase sâu ở band 8</h3>
<p>Đáp án band cao được paraphrase RẤT SÂU — không chỉ đổi từ đồng nghĩa mà đổi cả cấu trúc. Phải nhận ra 'the scheme was abandoned owing to insufficient funds' = 'they stopped the project because they ran out of money'. Nhận diện paraphrase nhiều tầng là kỹ năng cốt lõi.</p>
<h3>4. Tốc độ: đọc chủ động, không đọc lại nhiều lần</h3>
<p>Band 8 cần đọc HIỆU QUẢ: skim nắm cấu trúc bài nhanh, scan định vị chính xác, đọc kỹ đúng vùng — và TIN vào lần đọc đầu, hạn chế đọc đi đọc lại (ngốn thời gian). Với bài 3 (khó nhất, thường trừu tượng/học thuật), phân bổ đủ thời gian bằng cách làm bài 1-2 gọn.</p>
<h3>5. Làm chủ dạng khó nhất</h3>
<ul>
<li><b>Yes/No/Not Given (quan điểm tác giả):</b> phân biệt điều tác giả TIN với điều tác giả chỉ TRÌNH BÀY. Tìm ngôn ngữ bộc lộ quan điểm.</li>
<li><b>Matching Information:</b> quét cả bài, một đoạn có thể chứa nhiều/không đáp án — tốn giờ, làm sau.</li>
<li><b>Multiple choice nhiều lựa chọn tinh vi:</b> loại trừ 'đúng một nửa'; đáp án đúng khớp CHÍNH XÁC, không thừa không thiếu.</li>
</ul>
<p class="muted">⚠️ Band 8 Reading là trò chơi của ĐỘ CHÍNH XÁC dưới ÁP LỰC. Sai lầm 'đắt' nhất: (1) dùng kiến thức ngoài thay vì bám bài (nhất là inference & Y/N/NG); (2) đọc lại quá nhiều gây cháy giờ; (3) chọn đáp án 'gần đúng' thay vì đáp án khớp chính xác. Luyện đến khi độ chính xác ổn định ở 35+/40 dưới thời gian thật.</p>`,
levels:{
basic:{mcq:[
{q:"Điều cản band 8 Reading (35+/40) chủ yếu:",opts:["Không biết từ vựng","Câu đòi SUY LUẬN tinh vi, tốc độ cho bài 3, dạng bẫy tinh vi","Bài quá dài","Không có mẹo"],a:1,why:"<b>Đúng: B.</b> Band 8 mất điểm ở suy luận tinh vi, tốc độ, và các dạng bẫy khó nhất — cần độ chính xác cao dưới áp lực."},
{q:"Câu 'suy luận' (inference) đòi hỏi:",opts:["Tìm đáp án nằm sẵn một câu","Suy ra kết luận hợp lý từ bằng chứng trong bài (vẫn bám bài, không dùng kiến thức ngoài)","Dùng kiến thức cá nhân","Đoán bừa"],a:1,why:"<b>Đúng: B.</b> Inference là suy ra hàm ý từ bằng chứng trong bài — vẫn phải căn cứ vào văn bản, không dùng kiến thức ngoài."},
{q:"Bài: 'Despite initial skepticism, the method later gained acceptance.' Nhận định 'The method was immediately accepted' →",opts:["TRUE","FALSE","NOT GIVEN","YES"],a:1,why:"<b>Đúng: FALSE.</b> 'initial skepticism' + 'later gained acceptance' → ban đầu KHÔNG được chấp nhận ngay → 'immediately accepted' mâu thuẫn → FALSE."},
{q:"Với bài 3 (khó nhất), chiến lược thời gian:",opts:["Làm cuối cùng, hết giờ thì thôi","Làm bài 1-2 GỌN để dành đủ thời gian cho bài 3","Bỏ bài 3","Đọc bài 3 trước tiên thật kỹ"],a:1,why:"<b>Đúng: B.</b> Làm bài 1-2 hiệu quả để dành đủ thời gian cho bài 3 khó — tránh cháy giờ ở bài quan trọng nhất."},
{q:"Đọc đi đọc lại nhiều lần một đoạn:",opts:["Tăng độ chính xác","Ngốn thời gian — band 8 cần TIN lần đọc đầu, hạn chế đọc lại","Luôn cần thiết","Không ảnh hưởng"],a:1,why:"<b>Đúng: B.</b> Đọc lại quá nhiều gây cháy giờ. Band 8 đọc chủ động, hiệu quả, tin vào lần đọc đầu."}],
writing:[{q:"Luyện suy luận. Đọc: 'While early electric cars suffered from limited range and high costs, recent advances in battery technology have addressed both issues, and sales have risen accordingly.' Xác định T/F/NG và GIẢI THÍCH: (1) Early electric cars were expensive. (2) Battery improvements had no effect on sales. (3) Electric cars are now the most popular type of vehicle.",
model:"<b>Đáp án:</b> (1) TRUE — 'high costs' xác nhận đắt (suy ra 'expensive'). (2) FALSE — bài nói cải tiến pin giải quyết vấn đề VÀ 'sales have risen accordingly' (doanh số tăng theo) → mâu thuẫn với 'had no effect on sales'. (3) NOT GIVEN — bài nói doanh số TĂNG nhưng KHÔNG nói xe điện là loại phổ biến NHẤT → không đủ thông tin.<br><b>Tự kiểm tra:</b> (1) suy ra 'expensive' từ 'high costs' (paraphrase)? (2) nhận ra 'accordingly' nối cải tiến với tăng doanh số → phủ nhận 'no effect'? (3) phân biệt 'tăng' với 'phổ biến nhất' (không suy diễn quá xa)? Bám bài, không dùng kiến thức ngoài?"}]},
mid:{mcq:[
{q:"Paraphrase sâu: bài 'the initiative was scrapped due to budget constraints' = đáp án nào?",opts:["The plan succeeded despite money problems.","The project was cancelled because of a lack of funds.","The budget was increased for the plan.","The initiative continued as planned."],a:1,why:"<b>Đúng: B.</b> scrapped=cancelled, initiative=project, due to budget constraints=because of a lack of funds. Paraphrase nhiều tầng (đổi cả từ và cấu trúc)."},
{q:"Y/N/NG về quan điểm tác giả: cần phân biệt:",opts:["Sự thật với ý kiến","Điều tác giả TIN (quan điểm) với điều tác giả chỉ TRÌNH BÀY (thông tin)","Câu dài với câu ngắn","Đầu bài với cuối bài"],a:1,why:"<b>Đúng: B.</b> Y/N/NG xét QUAN ĐIỂM tác giả — phải tìm ngôn ngữ bộc lộ lập trường ('I would argue', 'unfortunately', 'remarkably'), phân biệt với việc chỉ trình bày sự kiện."},
{q:"Multiple choice: đáp án đúng band cao thường:",opts:["Chứa nhiều từ giống bài nhất","Khớp CHÍNH XÁC ý (không thừa không thiếu); distractor có thể chứa nhiều từ trùng bài hơn để bẫy","Là đáp án dài nhất","Luôn là B"],a:1,why:"<b>Đúng: B.</b> Đáp án đúng khớp chính xác ý, thường được paraphrase; distractor lại chứa nhiều từ trùng bài để bẫy người 'săn từ'. Phải đối chiếu Ý, không đếm từ trùng."},
{q:"Dạng Matching Information tốn giờ nên:",opts:["Làm đầu tiên","Cân nhắc làm SAU các dạng theo thứ tự (vì phải quét cả bài, một đoạn có thể nhiều/không đáp án)","Bỏ qua","Đoán hết"],a:1,why:"<b>Đúng: B.</b> Matching Information không theo thứ tự, tốn thời gian quét cả bài — làm sau các dạng nhanh hơn để tối ưu thời gian."},
{q:"Khi hai đáp án Multiple choice đều 'nghe đúng', cách quyết định:",opts:["Chọn cái dài hơn","Đối chiếu TỪNG chi tiết với bài; loại cái có một chi tiết thừa/sai/không được bài xác nhận","Đoán","Chọn cái đầu"],a:1,why:"<b>Đúng: B.</b> Đáp án đúng phải được bài XÁC NHẬN hoàn toàn; đáp án 'gần đúng' thường có một chi tiết thừa hoặc không được nêu. Đối chiếu tỉ mỉ để loại."}],
writing:[{q:"Viết một 'quy trình đạt độ chính xác cao' cho Reading band 8 (6-8 câu tiếng Anh): cách xử lý câu suy luận, cách nhận diện paraphrase sâu, cách phân biệt FALSE/NOT GIVEN và Y/N/NG, và cách quản lý thời gian để không hy sinh độ chính xác ở bài 3.",
model:"<b>Bài mẫu tham khảo:</b> To achieve a high band in reading, I focus on accuracy under time pressure rather than merely reading quickly. For inference questions, I draw logical conclusions strictly from the evidence in the text, resisting the temptation to rely on my own knowledge. I train myself to recognise deep paraphrasing, where both the vocabulary and the sentence structure are changed, since the correct answer rarely repeats the exact words of the passage. When dealing with True, False and Not Given, I carefully distinguish between a statement the text contradicts and one it simply does not address, and for Yes, No and Not Given, I look specifically for language that reveals the author's opinion rather than mere facts. To protect my accuracy on the demanding third passage, I complete the first two efficiently and avoid rereading sections unnecessarily, trusting my first careful reading. For time-consuming question types such as Matching Information, I leave them until after I have secured the more straightforward marks. Above all, I choose the option that the text fully supports, eliminating any answer containing even a single unverified detail.<br><b>Tự kiểm tra:</b> Có nêu cách xử lý suy luận (bám bằng chứng, không dùng kiến thức ngoài)? Nhận diện paraphrase sâu? Phân biệt FALSE/NOT GIVEN và Y/N/NG (quan điểm)? Quản lý thời gian bảo vệ bài 3? Chọn đáp án được bài XÁC NHẬN hoàn toàn?"}]},
adv:{mcq:[
{q:"Nguồn lỗi tinh vi nhất khiến thí sinh giỏi vẫn mất điểm ở Y/N/NG (quan điểm) là:",opts:["Không biết từ","Nhầm việc tác giả TRÌNH BÀY một quan điểm (của người khác) với việc tác giả ĐỒNG Ý với nó; phải tìm ngôn ngữ đánh giá bộc lộ lập trường THẬT của tác giả","Đọc quá nhanh","Bài quá dài"],a:1,why:"<b>Đúng: B.</b> Bẫy tinh vi nhất của Y/N/NG: tác giả thường TRÌNH BÀY quan điểm của các bên ('Some researchers claim X') mà không nhất thiết đồng ý. Thí sinh dễ nhầm 'bài có nhắc đến X' với 'tác giả tin X'. Phải tìm ngôn ngữ ĐÁNH GIÁ bộc lộ lập trường thật của tác giả: từ chỉ thái độ ('surprisingly', 'unfortunately', 'crucially'), động từ quan điểm ('I contend', 'this suggests'), hoặc cách tác giả phản biện/ủng hộ. Nếu tác giả chỉ tường thuật mà không lộ lập trường về nhận định → NOT GIVEN, dù nhận định có được 'nhắc' trong bài."},
{q:"Vì sao 'đọc lại nhiều lần' lại đặc biệt nguy hiểm ở band 8 (dù có vẻ giúp chính xác)?",opts:["Không nguy hiểm","Nó ngốn thời gian theo cấp số nhân, khiến cháy giờ ở bài 3 — mất nhiều câu dễ hơn số câu khó cứu được; band 8 cần đọc CHỦ ĐỘNG một lần hiệu quả, chỉ đọc lại có mục tiêu đúng vùng","Vì bài không cho đọc lại","Vì làm rối"],a:1,why:"<b>Đúng: B.</b> Đọc lại toàn đoạn nhiều lần là 'kẻ trộm thời gian' âm thầm. Nó có vẻ tăng chính xác cho MỘT câu, nhưng cái giá là thời gian cho các câu khác — dẫn đến vội vàng/bỏ sót ở bài 3 (khó nhất). Về tổng thể, mất nhiều điểm dễ hơn số điểm khó 'cứu' được. Band 8 đọc CHỦ ĐỘNG: một lần skim hiệu quả để nắm cấu trúc, scan định vị chính xác, đọc kỹ ĐÚNG vùng cần — và khi cần xác nhận, quay lại ĐÚNG câu liên quan (đọc lại có mục tiêu), không đọc lại lan man. Quản lý thời gian là một phần của độ chính xác ở band cao."},
{q:"Khi một câu Multiple choice có đáp án đúng được paraphrase sâu VÀ một distractor chứa nhiều từ trùng bài, thí sinh band 8 làm gì?",opts:["Chọn cái nhiều từ trùng","Đối chiếu Ý NGHĨA: xác nhận đáp án đúng khớp chính xác ý bài dù dùng từ khác; nhận ra distractor 'quen từ' nhưng lệch ý/thừa chi tiết — không để sự trùng từ đánh lừa","Chọn ngẫu nhiên","Bỏ qua"],a:1,why:"<b>Đúng: B.</b> Đây là bẫy kinh điển band cao: đáp án ĐÚNG được paraphrase sâu (ít từ trùng), còn distractor cố tình lặp nhiều từ/cụm từ bài để 'nghe quen'. Thí sinh 'săn từ trùng' rơi bẫy. Band 8 đối chiếu Ý NGHĨA, không đếm từ: xác minh đáp án đúng có TRUYỀN ĐẠT chính xác ý bài (dù diễn đạt khác), và phát hiện distractor 'quen từ' thực ra lệch nghĩa, thêm chi tiết không có, hoặc đảo quan hệ. Sự trùng từ là tín hiệu ĐÁNG NGỜ, không phải bằng chứng đúng."},
{q:"Để nâng độ chính xác Reading từ ~32 lên 36+/40, luyện tập nên tập trung vào:",opts:["Làm thật nhiều đề mới không phân tích","PHÂN TÍCH sâu các câu SAI: xác định loại bẫy (paraphrase bỏ lỡ? inference sai? nhầm F/NG? bị distractor 'quen từ'?), tìm MẪU lỗi lặp lại của mình, và luyện đúng loại đó dưới thời gian thật","Chỉ học từ vựng","Đọc báo mỗi ngày"],a:1,why:"<b>Đúng: B.</b> Từ 32 lên 36+ là loại bỏ các lỗi hệ thống còn sót. Điều này đòi hỏi PHÂN TÍCH LỖI có hệ thống: với mỗi câu sai, chẩn đoán chính xác NGUYÊN NHÂN (bỏ lỡ paraphrase sâu? suy luận vượt bằng chứng? nhầm FALSE với NOT GIVEN? bị distractor 'quen từ' bẫy? cháy giờ nên đoán?). Sau nhiều đề, các MẪU lỗi lặp lại lộ ra — đó là trọng tâm luyện. Chỉ 'cày' đề mới mà không phân tích thì lặp lại cùng lỗi. Đọc báo giúp tốc độ/từ vựng nền nhưng không trực tiếp sửa lỗi làm bài. Kết hợp: luyện có bấm giờ (áp lực thật) + phân tích lỗi sâu (sửa mẫu lỗi) là con đường lên 36+."},
{q:"Vai trò của việc 'bám tuyệt đối vào văn bản' quan trọng nhất ở dạng câu nào?",opts:["Chỉ ở completion","Ở inference và Y/N/NG/T/F/NG — nơi cám dỗ dùng kiến thức ngoài/suy diễn vượt bằng chứng là lớn nhất và gây lỗi nhiều nhất","Ở Matching Headings","Ở tất cả như nhau"],a:1,why:"<b>Đúng: B.</b> Nguyên tắc 'chỉ căn cứ vào bài' áp dụng cho MỌI dạng, nhưng cám dỗ vi phạm — và hậu quả — lớn nhất ở inference và T/F/NG & Y/N/NG. Vì các dạng này liên quan đến SUY RA và đánh giá nhận định, não tự động 'lấp' bằng kiến thức/logic đời thường: thấy nhận định 'nghe hợp lý' liền chọn TRUE/YES dù bài không xác nhận (biến NOT GIVEN thành sai), hoặc suy diễn vượt quá điều bài nói. Ở completion/Matching, đáp án 'nằm' rõ hơn trong bài nên ít bị cám dỗ này. Kỷ luật band 8: với inference, chỉ suy ra điều bài THỰC SỰ HÀM Ý qua bằng chứng; với T/F/NG & Y/N/NG, chỉ dùng thông tin/quan điểm bài NÊU RÕ, coi 'không tìm thấy bằng chứng' = NOT GIVEN, bất kể trực giác."}],
writing:[{q:"Viết một bản 'chẩn đoán & kế hoạch' Reading (8-10 câu tiếng Anh) để nâng từ ~32/40 lên 36+/40: nêu các loại lỗi tinh vi thường gặp ở band cao (bỏ lỡ paraphrase sâu, suy luận vượt bằng chứng, nhầm FALSE/NOT GIVEN, bị distractor 'quen từ'), cách bạn sẽ chẩn đoán mẫu lỗi của mình, và luyện tập có mục tiêu dưới áp lực thời gian.",
model:"<b>Bài mẫu tham khảo:</b> To raise my reading score from around thirty-two to thirty-six or above, I need to eliminate the subtle errors that still cost me marks under time pressure. The most common of these, I have found, are failing to recognise deeply paraphrased answers, drawing inferences that go beyond what the text actually supports, and confusing 'False' with 'Not Given'. I am also occasionally misled by distractors that repeat words from the passage but distort its meaning. To diagnose my personal patterns, I will keep a detailed error log after each timed practice test, categorising every mistake by its underlying cause rather than simply noting that I got it wrong. Over several tests, this should reveal which one or two error types account for most of my lost marks, allowing me to target them directly. For paraphrase recognition, I will deliberately practise matching sentences to their heavily reworded equivalents. For True/False/Not Given, I will drill the discipline of basing every judgement strictly on the text and treating any absence of evidence as 'Not Given'. Crucially, I will do all of this under strict timed conditions, since accuracy achieved without time pressure means little in the real exam. By combining rigorous error analysis with targeted, timed practice, I expect to close the gap to band eight.<br><b>Tự kiểm tra:</b> Có nêu các loại lỗi tinh vi band cao? Có cách chẩn đoán MẪU lỗi (error log phân loại theo nguyên nhân)? Luyện có mục tiêu vào loại lỗi 'ruột'? Nhấn mạnh luyện dưới ÁP LỰC THỜI GIAN? Mạch lạc, ngôn ngữ band cao?"}]}
}},
/* ===== BÀI 59 ===== */
{id:"g59",stage:6,title:"Bài 59 · Listening band 8 — giọng, tốc độ & bẫy tinh vi",
theory:`<h3>1. Điều gì cản band 8 Listening (35+/40)?</h3>
<p>Band 7 nghe tốt nhưng mất điểm ở: Part 3-4 (tốc độ cao, học thuật, nhiều người), các giọng (accent) khác nhau, bẫy paraphrase/distractor tinh vi nhất, và chi tiết nhỏ (số nhiều/ít, chính tả). Band 8 cần bắt được HÀM Ý và chi tiết dưới tốc độ tự nhiên.</p>
<h3>2. Làm quen ĐA GIỌNG (accents)</h3>
<p>IELTS dùng nhiều giọng: Anh, Úc, Mỹ, New Zealand, Canada. Band 8 cần nghe thoải mái mọi giọng. Luyện: nghe podcast/tin tức từ nhiều nguồn (BBC, ABC Australia, NPR...) để tai quen các biến thể phát âm.</p>
<h3>3. Part 3 (hội thoại nhiều người) — theo dõi quan điểm</h3>
<p>Nhiều người nói, đồng ý/phản bác nhau nhanh. Band 8 cần: theo dõi AI nói gì, nhận ra khi ai đó ĐỔI Ý hoặc bị thuyết phục, và bắt được sắc thái đồng tình/nghi ngờ ('I suppose so, but...' = chưa hẳn đồng ý).</p>
<h3>4. Part 4 (bài giảng độc thoại) — nghe theo CẤU TRÚC</h3>
<p>Nghe liền mạch, ít nghỉ. Bám các 'signpost' báo hiệu chuyển ý: 'moving on to...', 'a further point...', 'this brings us to...', 'in contrast...'. Chúng giúp định vị bạn đang ở câu hỏi nào và không bị 'lạc'.</p>
<h3>5. Bẫy tinh vi nhất ở band cao</h3>
<ul>
<li><b>Paraphrase sâu:</b> câu hỏi 'reduce costs', audio nói 'cut down on spending' — phải nhận ra tức thì.</li>
<li><b>Distractor 'sửa thông tin':</b> 'It's on the third floor... oh wait, they've moved it to the second' — đáp án cuối.</li>
<li><b>Distractor 'đủ điều kiện':</b> 'I'd love to come, but only if the meeting finishes early' — nghe kỹ điều kiện/phủ định.</li>
<li><b>Chi tiết nhỏ:</b> số nhiều/ít, đúng chính tả tên riêng (nghe đánh vần).</li>
</ul>
<p class="muted">⚠️ Band 8 Listening là bắt được HÀM Ý và chi tiết dưới tốc độ tự nhiên với mọi giọng. Sai lầm 'đắt': (1) 'săn từ khóa' đơn thuần (bỏ lỡ paraphrase, dính distractor 'quen từ'); (2) không quen giọng lạ; (3) mất tập trung ở Part 4; (4) lỗi chi tiết (số nhiều/ít, chính tả). Luyện nghe đa dạng nguồn + phân tích câu sai.</p>`,
levels:{
basic:{mcq:[
{q:"IELTS Listening dùng:",opts:["Chỉ giọng Anh","Nhiều giọng: Anh, Úc, Mỹ, New Zealand, Canada...","Chỉ giọng Mỹ","Giọng máy"],a:1,why:"<b>Đúng: Nhiều giọng.</b> Band 8 cần nghe thoải mái mọi giọng — luyện nghe đa nguồn (BBC, ABC, NPR...)."},
{q:"Ở Part 4 (bài giảng), 'signpost' như 'moving on to...' giúp:",opts:["Không giúp gì","Báo hiệu chuyển ý — định vị bạn đang ở câu hỏi nào, không bị lạc","Làm rối","Là bẫy"],a:1,why:"<b>Đúng: B.</b> Các từ dẫn cấu trúc giúp theo dõi mạch bài giảng và biết câu hỏi tiếp theo sắp tới."},
{q:"Câu hỏi 'reduce costs', audio nói 'cut down on spending'. Đây là:",opts:["Lỗi","Paraphrase — phải nhận ra tức thì","Bẫy bỏ qua","Không liên quan"],a:1,why:"<b>Đúng: Paraphrase.</b> Audio diễn đạt lại; band 8 phải nhận diện paraphrase sâu ngay lập tức."},
{q:"'It's on the third floor... oh wait, the second' — đáp án:",opts:["Third floor","Second floor","Cả hai","Không rõ"],a:1,why:"<b>Đúng: Second floor.</b> 'oh wait' báo hiệu thông tin được sửa — lấy đáp án cuối cùng."},
{q:"'I'd love to come, but only if the meeting finishes early' cho biết:",opts:["Chắc chắn đến","Đến CÓ ĐIỀU KIỆN (chỉ nếu họp xong sớm) — nghe kỹ điều kiện","Không đến","Đã đến rồi"],a:1,why:"<b>Đúng: B.</b> 'but only if' là điều kiện — không phải khẳng định chắc chắn. Nghe kỹ điều kiện/phủ định là chìa khóa band cao."}],
writing:[{q:"Luyện nhận diện distractor. Cho các đoạn (transcript), xác định đáp án ĐÚNG và giải thích bẫy: (1) 'The workshop was going to be on Friday, but it's now been rescheduled to Thursday.' → Ngày workshop? (2) 'Tickets are usually 20 dollars, though members get in for 15.' → Giá vé thành viên? (3) 'I think we should paint it blue. — Actually, green might work better. — Yes, let's go with that.' → Màu cuối cùng?",
model:"<b>Đáp án:</b> (1) Thursday — 'but it's now been rescheduled to' báo hiệu đổi từ Friday sang Thursday (distractor sửa thông tin). (2) $15 — giá thường là $20, nhưng câu hỏi hỏi giá THÀNH VIÊN ($15); 'though members get in for 15' (distractor 'đủ điều kiện'/bổ sung). (3) Green — đề xuất đầu là blue, nhưng 'Actually, green might work better' + 'Yes, let's go with that' → chốt green (distractor trong hội thoại, theo dõi ý cuối được đồng thuận).<br><b>Tự kiểm tra:</b> (1) bắt 'rescheduled to' = đổi? (2) bám đúng câu hỏi (giá thành viên, không phải giá thường)? (3) theo dõi hội thoại đến ý được ĐỒNG THUẬN cuối cùng, không chộp đề xuất đầu?"}]},
mid:{mcq:[
{q:"Ở Part 3 (nhiều người), 'I suppose so, but...' thể hiện:",opts:["Đồng ý hoàn toàn","Đồng ý MIỄN CƯỠNG/chưa hẳn (có 'but' theo sau) — phải nghe sắc thái","Phản đối hoàn toàn","Không liên quan"],a:1,why:"<b>Đúng: B.</b> 'I suppose so, but...' = đồng ý nửa vời, có bảo lưu. Band 8 bắt được sắc thái đồng tình/nghi ngờ, không chỉ nội dung bề mặt."},
{q:"Chiến thuật cho Part 3 khi nhiều người đổi ý:",opts:["Chỉ nghe người nói nhiều nhất","Theo dõi AI nói gì và nhận ra khi ai đó ĐỔI Ý hoặc bị thuyết phục","Đoán theo thứ tự","Bỏ qua"],a:1,why:"<b>Đúng: B.</b> Trong hội thoại, quan điểm có thể đổi chủ hoặc thay đổi. Phải theo dõi ai nói gì và khi nào ý kiến thay đổi."},
{q:"Vì sao 'săn từ khóa' đơn thuần rủi ro ở band 8?",opts:["Không rủi ro","Đáp án đúng thường được PARAPHRASE (từ khác); distractor lại chứa đúng từ khóa câu hỏi để bẫy","Từ khóa quá dài","Audio quá chậm"],a:1,why:"<b>Đúng: B.</b> Đề band cao đặt từ khóa câu hỏi vào phương án SAI để bẫy; đáp án đúng diễn đạt lại. Phải hiểu Ý, nghe ngữ cảnh trọn vẹn."},
{q:"Để không 'lạc' ở Part 4 (nghe liền mạch):",opts:["Nhắm mắt","Bám signpost (firstly, moving on, in contrast, finally) và đọc trước câu hỏi để biết cần nghe gì","Ghi mọi từ","Chỉ nghe cuối"],a:1,why:"<b>Đúng: B.</b> Signpost giúp định vị trong bài giảng; đọc trước câu hỏi giúp biết thông tin cần bắt — chống 'lạc' hiệu quả."},
{q:"Cách hiệu quả nhất làm quen nhiều giọng (accent):",opts:["Chỉ nghe đề IELTS","Nghe đa dạng nguồn thật (BBC, ABC Australia, NPR, podcast) để tai quen các biến thể phát âm","Chỉ nghe giọng Mỹ","Đọc phụ đề"],a:1,why:"<b>Đúng: B.</b> Tiếp xúc đa dạng giọng qua nguồn thật giúp tai quen biến thể phát âm — thiết yếu cho band 8 khi đề dùng nhiều giọng."}],
writing:[{q:"Viết một 'kế hoạch luyện Listening band 8' (6-8 câu tiếng Anh): cách làm quen đa giọng, chiến thuật cho Part 3 (theo dõi quan điểm) và Part 4 (nghe theo cấu trúc), cách xử lý bẫy tinh vi (paraphrase, distractor sửa thông tin/điều kiện), và cách tránh lỗi chi tiết.",
model:"<b>Bài mẫu tham khảo:</b> To reach band eight in listening, I first need to feel comfortable with the full range of accents used in the test, so I will regularly listen to British, Australian and North American sources such as the BBC, ABC and NPR. For Part 3, where several speakers interact, I will focus on tracking who says what and on recognising when someone changes their mind or expresses only reluctant agreement through phrases like 'I suppose so, but'. In Part 4, which is delivered as a continuous lecture, I will follow the speaker's signposts — such as 'moving on to' and 'in contrast' — to stay oriented and anticipate the next answer. Throughout, I will listen for meaning rather than simply hunting for keywords, because the correct answers are usually paraphrased while the distractors often repeat the exact words from the questions. I will also stay alert to correction signals like 'actually' and to conditions such as 'only if', which frequently change the answer. To avoid careless mistakes, I will double-check spelling and singular or plural forms whenever I transfer my answers. Finally, after each practice test, I will analyse every incorrect answer to identify exactly which type of trap caught me. This targeted approach should steadily push my accuracy above thirty-five out of forty.<br><b>Tự kiểm tra:</b> Có cách làm quen đa giọng (nguồn thật)? Chiến thuật Part 3 (theo dõi quan điểm/đổi ý) và Part 4 (signpost)? Nghe Ý không săn từ khóa? Xử lý distractor (sửa thông tin, điều kiện)? Tránh lỗi chi tiết (chính tả, số nhiều/ít)? Phân tích câu sai?"}]},
adv:{mcq:[
{q:"Đặc điểm cốt lõi của người nghe band 8 (khác band 7) là:",opts:["Nghe nhanh hơn","Hiểu trọn vẹn nội dung chi tiết VÀ hàm ý dưới tốc độ tự nhiên với mọi giọng, bắt được sắc thái (thái độ, điều kiện, sự thay đổi ý) — không chỉ thông tin bề mặt","Biết nhiều từ","Ghi chép nhanh"],a:1,why:"<b>Đúng: B.</b> Band 8 Listening là hiểu ĐẦY ĐỦ: cả chi tiết cụ thể lẫn HÀM Ý/sắc thái, dưới tốc độ nói tự nhiên, với đa dạng giọng. Điều này bao gồm bắt được thái độ (đồng tình miễn cưỡng, hoài nghi), điều kiện ('only if'), sự thay đổi ý trong hội thoại, và ý được diễn đạt gián tiếp. Band 7 nghe tốt thông tin trực tiếp nhưng dễ mất các sắc thái tinh vi và chi tiết dưới áp lực. Không phải nghe 'nhanh hơn' mà hiểu SÂU và ĐẦY ĐỦ hơn."},
{q:"Trong Part 3, khi người A đề xuất một ý và người B đáp 'Well, that's one way of looking at it...', điều này thường báo hiệu:",opts:["B hoàn toàn đồng ý","B sắp đưa ra quan điểm KHÁC/phản biện nhẹ nhàng — 'that's one way...' thường mở đầu cho sự bất đồng lịch sự","B không hiểu","Cuộc nói chuyện kết thúc"],a:1,why:"<b>Đúng: B.</b> 'That's one way of looking at it, but...' là cách bất đồng LỊCH SỰ điển hình trong tiếng Anh — nó thừa nhận ý kia rồi sắp đưa ra góc nhìn khác. Người nghe band 8 nhận ra các tín hiệu bất đồng tinh tế này (khác với đồng ý thẳng). Các cụm tương tự: 'I see your point, but...', 'I'm not so sure...', 'Fair enough, though...'. Bắt được sắc thái đồng ý/bất đồng gián tiếp là then chốt cho các câu Matching quan điểm ở Part 3 — nơi đáp án phụ thuộc vào việc AI thực sự nghĩ gì, không phải bề mặt lời nói."},
{q:"Kỹ năng 'dự đoán' (prediction) ở band 8 tinh vi hơn band 7 thế nào?",opts:["Không khác","Không chỉ đoán LOẠI TỪ cần điền, mà còn dự đoán HƯỚNG lập luận/nội dung sắp tới dựa trên ngữ cảnh và signpost — giúp xử lý tốc độ cao và paraphrase","Đoán đáp án luôn","Không cần nghe"],a:1,why:"<b>Đúng: B.</b> Ở band 7, prediction chủ yếu là đoán loại từ cho chỗ trống (số? tên? danh từ?). Ở band 8, prediction tinh vi hơn: dựa vào ngữ cảnh, signpost và logic bài, người nghe DỰ ĐOÁN hướng nội dung/lập luận sắp tới ('người này đang nêu vấn đề, có lẽ sắp đề xuất giải pháp'). Sự dự đoán chủ động này giảm tải nhận thức, giúp theo kịp tốc độ cao và nhận ra paraphrase nhanh hơn (vì đã 'chờ đợi' ý đó dưới dạng nào đó). Đây là nghe CHỦ ĐỘNG ở mức cao — tai và não luôn đi trước một bước, thay vì bị động chờ từng từ."},
{q:"Vì sao lỗi chi tiết (số nhiều/ít, chính tả) đặc biệt 'đắt' ở band 8?",opts:["Không đắt","Ở band 8, thí sinh đã nghe đúng phần lớn nội dung, nên các điểm mất còn lại chủ yếu là lỗi chi tiết nhỏ; loại bỏ chúng là cách trực tiếp nhất để đạt 35+/40","Vì giám khảo khắt khe","Vì audio nhanh"],a:1,why:"<b>Đúng: B.</b> Ở trình độ band 8, thí sinh đã hiểu và bắt đúng phần lớn nội dung — 'khoảng cách' còn lại tới 35-38/40 thường nằm ở các lỗi chi tiết có thể tránh: viết sai chính tả (dù nghe đúng), sai số nhiều/ít, vượt giới hạn từ, chép nhầm khi transfer. Mỗi lỗi như vậy = mất trọn một câu dù đã 'nghe đúng'. Vì thế ở band cao, kỷ luật chi tiết (rà chính tả, kiểm số nhiều/ít, đếm từ, cẩn thận khi chép đáp án) mang lại 'lợi tức' cao — nó biến những câu 'nghe đúng nhưng viết sai' thành điểm. Đây là loại điểm dễ 'cứu' nhất khi đã có nền nghe tốt."},
{q:"Để nâng Listening từ ~32 lên 36+/40, trọng tâm luyện tập nên là:",opts:["Nghe càng nhiều càng tốt không phân tích","Nghe đa giọng ở tốc độ tự nhiên + PHÂN TÍCH mọi câu sai (loại bẫy nào: paraphrase bỏ lỡ? distractor? sắc thái? chi tiết?) + luyện chép chính tả/chi tiết chính xác","Chỉ làm đề IELTS cũ","Đọc transcript thay vì nghe"],a:1,why:"<b>Đúng: B.</b> Từ 32 lên 36+ đòi hỏi tấn công đa mặt vào các điểm yếu còn lại: (1) mở rộng tiếp xúc với đa giọng ở tốc độ TỰ NHIÊN (không chỉ đề luyện chậm) để tai quen biến thể; (2) PHÂN TÍCH sâu mọi câu sai — chẩn đoán chính xác loại bẫy (paraphrase không nhận ra? distractor 'quen từ'/sửa thông tin? bỏ lỡ sắc thái đồng ý/điều kiện? lỗi chi tiết?) để tìm mẫu lỗi 'ruột'; (3) luyện riêng kỷ luật chi tiết (chính tả, số nhiều/ít, giới hạn từ). Sau khi nghe, đọc transcript để xác nhận chỗ mình nghe sót và VÌ SAO. Chỉ 'nghe nhiều' thụ động không đủ; phải nghe CHỦ ĐỘNG + phân tích lỗi có hệ thống. Đọc transcript THAY nghe thì phản tác dụng (không rèn tai)."}],
writing:[{q:"Viết một bản 'chẩn đoán & kế hoạch' Listening (8-10 câu tiếng Anh) để nâng từ ~32/40 lên 36+/40: nêu các điểm yếu tinh vi ở band cao (giọng lạ, Part 3-4, paraphrase/distractor tinh vi, sắc thái, lỗi chi tiết), cách chẩn đoán mẫu lỗi của mình qua phân tích câu sai, và luyện tập có mục tiêu (nghe đa giọng tốc độ thật, kỷ luật chi tiết).",
model:"<b>Bài mẫu tham khảo:</b> To raise my listening score from around thirty-two to thirty-six or above, I must address the subtle weaknesses that remain at this level. I still occasionally struggle with unfamiliar accents and with the faster, more academic language of Parts 3 and 4, so I will expose myself daily to a variety of authentic sources at natural speed, including Australian and North American broadcasts. I am also sometimes caught out by deep paraphrasing, by distractors that correct earlier information, and by subtle signals of attitude such as reluctant agreement. To diagnose my personal patterns, I will keep an error log after every practice test, recording not just which questions I missed but exactly why — whether I failed to recognise a paraphrase, fell for a 'familiar-word' distractor, missed a nuance, or simply made a careless spelling error. Over time, this will reveal the one or two trap types responsible for most of my lost marks, so that I can target them directly. For Part 3, I will practise tracking each speaker's stance and noticing when opinions shift, while for Part 4 I will train myself to follow the lecturer's signposts. Crucially, I will also tighten my discipline on small details, double-checking spelling, singular and plural forms, and word limits whenever I write my answers, since at this level a single careless error costs a whole mark. By combining wide, natural-speed listening with rigorous analysis of my mistakes, I am confident I can close the remaining gap to band eight.<br><b>Tự kiểm tra:</b> Có nêu điểm yếu tinh vi band cao (giọng, Part 3-4, paraphrase/distractor, sắc thái, chi tiết)? Chẩn đoán mẫu lỗi qua error log phân loại theo nguyên nhân? Luyện đa giọng tốc độ THẬT? Kỷ luật chi tiết? Mạch lạc, ngôn ngữ band cao?"}]}
}},
/* ===== BÀI 60 ===== */
{id:"g60",stage:6,title:"Bài 60 · Chiến lược về đích & tự đánh giá + ôn tập Chặng 6",
theory:`<h3>1. Nguyên lý 'về đích': band tổng bị kéo bởi kỹ năng YẾU NHẤT</h3>
<p>Overall là trung bình 4 kỹ năng. Muốn lên band tổng, hiệu quả nhất là nâng kỹ năng THẤP nhất, không phải làm kỹ năng mạnh mạnh hơn. Chẩn đoán đúng 'nút thắt' và dồn lực vào đó.</p>
<h3>2. Tự đánh giá theo TIÊU CHÍ (không cảm tính)</h3>
<p>Giám khảo chấm theo tiêu chí cụ thể. Bạn cũng nên tự đánh giá theo chúng:</p>
<ul>
<li><b>Writing:</b> Task Response, Coherence & Cohesion, Lexical Resource, Grammar (mỗi 25%).</li>
<li><b>Speaking:</b> Fluency & Coherence, Lexical Resource, Grammar, Pronunciation (mỗi 25%).</li>
<li>Với mỗi bài viết/nói, hỏi: tiêu chí nào đang yếu nhất? Vì sao? Sửa thế nào?</li>
</ul>
<h3>3. Chẩn đoán 'nút thắt' của từng kỹ năng</h3>
<table><tr><th>Kỹ năng</th><th>Câu hỏi chẩn đoán</th></tr>
<tr><td>Listening</td><td>Mất điểm ở Part nào? Loại bẫy nào? (paraphrase/distractor/chi tiết)</td></tr>
<tr><td>Reading</td><td>Dạng câu nào sai nhiều? Cháy giờ hay sai độ chính xác?</td></tr>
<tr><td>Writing</td><td>Tiêu chí nào yếu? (ý nông? liên kết máy móc? từ hạn chế? lỗi ngữ pháp?)</td></tr>
<tr><td>Speaking</td><td>Tiêu chí nào yếu? (ngập ngừng? từ đơn điệu? câu đơn giản? phát âm?)</td></tr></table>
<h3>4. Công cụ tự-cải-thiện mạnh nhất</h3>
<ul>
<li><b>Nhật ký lỗi:</b> ghi mọi lỗi được chỉ ra, phân loại → thấy mẫu lỗi 'ruột'.</li>
<li><b>Thu âm (Speaking) & nhờ chấm (Writing):</b> tự đánh giá theo tiêu chí, so bài mẫu band cao.</li>
<li><b>Luyện có bấm giờ:</b> mô phỏng áp lực thật.</li>
<li><b>Phân tích câu sai:</b> hiểu VÌ SAO sai, không chỉ đếm điểm.</li>
</ul>
<h3>5. Bạn đã học gì ở Chặng 6?</h3>
<ul>
<li>Task Response band 8: lập luận sâu, tư duy phản biện (Bài 51)</li>
<li>Coherence & Cohesion band 8: mạch lạc tinh vi (Bài 52)</li>
<li>Lexical Resource band 8: chính xác & tinh tế (Bài 53)</li>
<li>Grammar band 8: đa dạng & chính xác; sửa lỗi hóa thạch (Bài 54-55)</li>
<li>Speaking band 8: trôi chảy, phát âm, từ vựng, Part 3 (Bài 56-57)</li>
<li>Reading & Listening band 8: suy luận, tốc độ, bẫy tinh vi (Bài 58-59)</li>
</ul>
<p class="muted">⚠️ Nguyên tắc về đích: NỖ LỰC ĐÚNG HƯỚNG thắng nỗ lực nhiều. Cày đề mù quáng, né kỹ năng yếu, không phân tích lỗi = phí thời gian. Chẩn đoán đúng nút thắt + luyện trúng đích + tự đánh giá theo tiêu chí = con đường ngắn nhất lên band mục tiêu.</p>`,
levels:{
basic:{mcq:[
{q:"Để nâng band TỔNG hiệu quả nhất, nên tập trung:",opts:["Kỹ năng mạnh nhất","Kỹ năng YẾU nhất (nút thắt kéo điểm tổng)","Kỹ năng dễ nhất","Ngẫu nhiên"],a:1,why:"<b>Đúng: Kỹ năng yếu nhất.</b> Overall là trung bình; kỹ năng thấp nhất kéo cả bộ xuống, nên nâng nó hiệu quả nhất."},
{q:"Nên tự đánh giá bài viết/nói theo:",opts:["Cảm tính 'có vẻ ổn'","TIÊU CHÍ cụ thể (Task Response, Coherence, Lexical, Grammar...)","Độ dài","Số từ khó"],a:1,why:"<b>Đúng: Theo tiêu chí.</b> Giám khảo chấm theo tiêu chí; tự đánh giá theo chúng giúp biết chính xác cần sửa gì."},
{q:"Công cụ tự-cải-thiện mạnh cho Speaking là:",opts:["Đoán","Thu âm bản thân và tự đánh giá theo tiêu chí","Học thuộc bài","Nói nhanh"],a:1,why:"<b>Đúng: Thu âm.</b> Nghe lại bản thu giúp phát hiện ngập ngừng, lỗi, đơn điệu mà lúc nói không nhận ra."},
{q:"'Nhật ký lỗi' giúp:",opts:["Không giúp gì","Thấy MẪU lỗi lặp lại của mình → sửa có mục tiêu","Nộp cho giám khảo","Học thuộc"],a:1,why:"<b>Đúng: B.</b> Ghi và phân loại lỗi giúp nhận ra loại lỗi 'ruột' để luyện trúng đích, biến sửa lỗi thành có mục tiêu."},
{q:"Nguyên tắc 'về đích' cốt lõi:",opts:["Cày càng nhiều đề càng tốt","NỖ LỰC ĐÚNG HƯỚNG (chẩn đoán nút thắt + luyện trúng đích) thắng nỗ lực nhiều mù quáng","Né kỹ năng yếu","Chỉ luyện kỹ năng mạnh"],a:1,why:"<b>Đúng: B.</b> Chẩn đoán đúng nút thắt và luyện trúng đích hiệu quả hơn nhiều so với cày đề mù quáng."}],
writing:[{q:"Tự chẩn đoán toàn diện: viết (tiếng Anh, 6-8 câu) đánh giá cả 4 kỹ năng của bạn — kỹ năng nào là 'nút thắt', tiêu chí/loại lỗi cụ thể nào đang kéo điểm, và ưu tiên luyện gì trong giai đoạn về đích.",
model:"<b>Bài mẫu tham khảo:</b> Having assessed my performance across all four skills, I have concluded that writing is currently my main bottleneck, holding back my overall score. Within writing, my weakest criterion is grammatical accuracy: although I can use complex structures, I make recurring errors with articles and prepositions that make my mistakes systematic. My speaking is slightly stronger, but I still hesitate when discussing abstract topics in Part 3. Reading and listening are my most reliable skills, so I will maintain them with regular timed practice rather than devoting most of my time to them. During this final phase, my top priority will be eliminating my fossilised grammar errors through targeted editing and an error log, followed by developing greater fluency and depth in Part 3 speaking. By focusing my energy on these specific weaknesses rather than practising everything equally, I expect to raise my overall band most efficiently.<br><b>Tự kiểm tra:</b> Có xác định 'nút thắt' (kỹ năng yếu nhất)? Có chỉ ra TIÊU CHÍ/loại lỗi cụ thể (không chung chung)? Có ưu tiên luyện trúng đích thay vì dàn trải? Thể hiện tư duy chiến lược?"}]},
mid:{mcq:[
{q:"Thí sinh được 7,7,7,5.5. Muốn Overall 7.0, cách hiệu quả nhất:",opts:["Nâng ba kỹ năng 7 lên 7.5","Nâng kỹ năng 5.5 lên 6.5+ (nó đang kéo điểm tổng)","Bỏ kỹ năng yếu","Thi lại ngay"],a:1,why:"<b>Đúng: B.</b> (7+7+7+5.5)/4=6.625→6.5. Nâng kỹ năng 5.5 lên 6.5 cho (7+7+7+6.5)/4=6.875→7.0. Nâng kỹ năng yếu nhất tác động lớn nhất lên Overall."},
{q:"Luyện đề mà điểm 'chững lại' (plateau) thường do:",opts:["Đã đạt giới hạn","Không phân tích lỗi / né kỹ năng yếu / cày đề mà không hiểu vì sao sai","Đề quá dễ","Không đủ đề"],a:1,why:"<b>Đúng: B.</b> Plateau thường do nỗ lực SAI hướng: làm đề mà không phân tích, né phần yếu. Cần chẩn đoán và luyện trúng đích để bứt phá."},
{q:"Với Writing, cách tự đánh giá tốt nhất khi không có giáo viên:",opts:["Đọc lướt tự khen","So bài mình với BÀI MẪU band cao theo từng tiêu chí, và dùng nhật ký lỗi","Đếm từ","Chỉ xem độ dài"],a:1,why:"<b>Đúng: B.</b> So sánh có hệ thống với bài mẫu band cao (theo từng tiêu chí) + nhật ký lỗi giúp thấy khoảng cách cụ thể cần lấp."},
{q:"Luyện có BẤM GIỜ quan trọng vì:",opts:["Không quan trọng","Mô phỏng áp lực thật — kỹ năng đạt được không bấm giờ có thể sụp dưới áp lực phòng thi","Làm căng thẳng","Tốn thời gian"],a:1,why:"<b>Đúng: B.</b> Áp lực thời gian là một phần của bài thi thật. Kỹ năng phải ổn định DƯỚI áp lực mới đáng tin ở phòng thi."},
{q:"Sau khi làm một đề, việc quan trọng NHẤT là:",opts:["Ghi điểm rồi làm đề khác","PHÂN TÍCH vì sao sai từng câu (loại bẫy/lỗi gì), rút ra bài học","Nghỉ ngơi","Khoe điểm"],a:1,why:"<b>Đúng: B.</b> Phân tích lỗi biến mỗi đề thành bài học. Chỉ ghi điểm rồi làm tiếp thì lặp lại cùng lỗi mãi."}],
writing:[{q:"Viết một 'kế hoạch về đích 3 tuần' chi tiết (tiếng Anh, 8-10 câu) dựa trên chẩn đoán nút thắt của bạn: mỗi tuần tập trung gì, cách luyện trúng đích kỹ năng/tiêu chí yếu, cách tự đánh giá tiến bộ theo tiêu chí, và cách mô phỏng áp lực phòng thi.",
model:"<b>Bài mẫu tham khảo:</b> My three-week final plan is built around my main bottleneck, which is grammatical accuracy in writing. In the first week, I will concentrate on eliminating my fossilised errors: each day I will write one Task 2 paragraph and then edit it in separate passes, checking articles, prepositions and subject-verb agreement one category at a time. I will record every error in a log to reveal my recurring patterns. In the second week, I will shift to developing depth and coherence, practising full Task 2 essays under timed conditions and comparing them against band-eight model answers, criterion by criterion. Alongside this, I will maintain my reading and listening with two timed practice tests to keep them sharp. In the third week, I will simulate the real exam as closely as possible, completing full papers under strict timing to build stamina and to ensure my skills hold up under pressure. Throughout, I will assess my progress not by a vague sense of improvement but by tracking specific measures, such as the number of grammar errors per essay and the range of structures I use accurately. After every practice session, I will analyse my mistakes to understand their causes rather than simply noting my score. By targeting my specific weaknesses and rehearsing under realistic conditions, I aim to reach my target band with confidence.<br><b>Tự kiểm tra:</b> Kế hoạch dựa trên NÚT THẮT cụ thể? Mỗi tuần có trọng tâm rõ, luyện trúng đích tiêu chí yếu? Có duy trì kỹ năng mạnh (không bỏ bê)? Tự đánh giá theo THƯỚC ĐO cụ thể (số lỗi/bài)? Mô phỏng áp lực phòng thi (timed, full papers)? Có phân tích lỗi?"}]},
adv:{mcq:[
{q:"Vì sao chẩn đoán 'nút thắt' theo TIÊU CHÍ quan trọng hơn cảm nhận chung 'tôi yếu Writing'?",opts:["Không quan trọng","Vì 'yếu Writing' quá mơ hồ để hành động; biết CHÍNH XÁC tiêu chí yếu (VD 'ý nông' vs 'lỗi ngữ pháp' vs 'liên kết máy móc') mới cho phép luyện tập ĐÚNG và đo được tiến bộ","Vì nghe chuyên nghiệp","Vì giám khảo yêu cầu"],a:1,why:"<b>Đúng: B.</b> 'Tôi yếu Writing' không dẫn đến hành động cụ thể — Writing có 4 tiêu chí rất khác nhau, mỗi cái cần cách luyện khác. Nếu nút thắt thật là GRAMMAR ACCURACY (lỗi hóa thạch), thì luyện thêm ý tưởng/từ vựng vô ích. Chẩn đoán theo TIÊU CHÍ ('Task Response ổn, Coherence ổn, nhưng Grammar bị kéo bởi lỗi mạo từ/giới từ lặp lại') biến vấn đề mơ hồ thành mục tiêu cụ thể, đo được: bạn biết chính xác luyện gì (khử lỗi mạo từ/giới từ) và đo tiến bộ thế nào (số lỗi/bài giảm). Đây là khác biệt giữa cải thiện có định hướng và 'cày' mù quáng."},
{q:"Một thí sinh giỏi cả 4 kỹ năng nhưng luôn kẹt Overall 7.0 (7,7,7,7). Chiến lược lên 7.5 khác gì trường hợp có kỹ năng yếu rõ?",opts:["Giống hệt","Không có nút thắt đơn lẻ, nên cần nâng ĐỀU vài kỹ năng lên 7.5; nên chọn kỹ năng DỄ nâng nhất (thường là kỹ năng tiếp nhận: Listening/Reading, có thể luyện độ chính xác nhanh) làm đòn bẩy","Bỏ cuộc","Chỉ luyện Speaking"],a:1,why:"<b>Đúng: B.</b> Khi 4 kỹ năng đều bằng nhau (7,7,7,7 → Overall 7.0), không có một nút thắt đơn lẻ để dồn lực. Để lên 7.5 Overall cần tổng ≥ 29/4 (VD 7.5+7+7+7.5=29→7.25→7.5, hoặc 7.5+7.5+7+7=29). Chiến lược: nâng 1-2 kỹ năng lên 7.5. Nên chọn kỹ năng DỄ nâng nhất làm đòn bẩy — thường là Listening/Reading (kỹ năng TIẾP NHẬN có đáp án đúng/sai rõ ràng, có thể tăng độ chính xác qua luyện đề + phân tích lỗi tương đối nhanh), hơn là Writing/Speaking (kỹ năng SẢN SINH, tiến bộ chậm hơn). Chẩn đoán ở đây không phải 'kỹ năng nào yếu' mà 'kỹ năng nào có tỷ lệ cải-thiện-trên-công-sức cao nhất'."},
{q:"Giá trị lớn nhất của việc so bài mình với bài mẫu band cao (thay vì chỉ được cho điểm) là:",opts:["Biết điểm","Thấy CỤ THỂ khoảng cách ở từng tiêu chí — bài mẫu triển khai ý sâu thế nào, liên kết ra sao, dùng từ/cấu trúc gì — biến 'band 8' trừu tượng thành các đặc điểm cụ thể để học theo","Để chép","Để nản"],a:1,why:"<b>Đúng: B.</b> Một con điểm ('bài này 6.5') cho biết bạn ĐANG Ở đâu nhưng không cho biết band cao TRÔNG NHƯ THẾ NÀO hay làm sao tới đó. So sánh trực tiếp bài mình với bài mẫu band 8 CÙNG ĐỀ, theo từng tiêu chí, làm lộ khoảng cách CỤ THỂ: 'bài mẫu đào ý này sâu hơn qua 3 câu, mình chỉ 1 câu'; 'chỗ này mẫu dùng tham chiếu, mình lặp từ'; 'mẫu dùng cấu trúc điều kiện, mình dùng câu đơn'. Điều này biến mục tiêu trừu tượng ('viết hay hơn') thành các kỹ thuật cụ thể để bắt chước và luyện. Đây là cách 'học từ hình mẫu' — mạnh hơn nhiều so với chỉ biết mình thiếu điểm."},
{q:"Về mặt tâm lý-chiến lược, sai lầm phổ biến nhất của thí sinh ở giai đoạn về đích là:",opts:["Luyện quá ít","Né kỹ năng/tiêu chí yếu (vì luyện nó khó chịu) và dồn thời gian vào phần đã mạnh (vì cảm giác 'làm được' dễ chịu) — dẫn đến điểm tổng không nhúc nhích","Ngủ nhiều","Luyện Speaking"],a:1,why:"<b>Đúng: B.</b> Đây là cạm bẫy tâm lý sâu sắc: luyện kỹ năng YẾU thì khó chịu (làm sai nhiều, chậm tiến, nản), trong khi luyện kỹ năng MẠNH thì dễ chịu (làm tốt, cảm giác năng suất). Nên thí sinh vô thức né phần yếu và 'trốn' vào phần mạnh — cảm thấy bận rộn, chăm chỉ, nhưng điểm tổng KHÔNG tăng vì nút thắt (kỹ năng yếu) vẫn nguyên. Vượt qua đòi hỏi kỷ luật đối mặt với sự khó chịu: dồn phần lớn thời gian vào đúng chỗ đau (kỹ năng/tiêu chí yếu nhất), chấp nhận cảm giác vụng về khi luyện nó, và chỉ duy trì (không dồn lực) cho phần đã mạnh. Nhận ra thiên kiến này là bước đầu để luyện ĐÚNG HƯỚNG."},
{q:"Đâu là dấu hiệu một chiến lược ôn thi THỰC SỰ hiệu quả (khác 'trông chăm chỉ')?",opts:["Bỏ nhiều giờ mỗi ngày","Thời gian dồn vào đúng kỹ năng/tiêu chí yếu nhất; mỗi buổi luyện có mục tiêu cụ thể + phân tích lỗi; tiến bộ đo được theo thước đo cụ thể; luyện dưới áp lực thời gian thật","Làm nhiều đề nhất","Học nhiều từ vựng"],a:1,why:"<b>Đúng: B.</b> 'Trông chăm chỉ' (nhiều giờ, nhiều đề) không đảm bảo hiệu quả. Dấu hiệu chiến lược THỰC SỰ hiệu quả: (1) phân bổ thời gian THEO CHẨN ĐOÁN — phần lớn công sức vào nút thắt, không dàn đều; (2) mỗi buổi có MỤC TIÊU cụ thể (VD 'hôm nay khử lỗi mạo từ') chứ không 'làm đại một đề'; (3) luôn kèm PHÂN TÍCH LỖI (hiểu vì sao sai); (4) tiến bộ ĐO ĐƯỢC theo thước đo cụ thể (số lỗi/bài, số câu đúng/40, số ngập ngừng/phút) chứ không cảm tính; (5) luyện dưới ÁP LỰC THỜI GIAN thật. Đây là 'luyện tập chủ đích' (deliberate practice) — chất lượng và định hướng của nỗ lực, không phải khối lượng, quyết định tốc độ tiến bộ."}],
writing:[{q:"Tổng hợp Chặng 6: viết một bản 'chiến lược về đích toàn diện' (10-12 câu tiếng Anh) cho hành trình từ band hiện tại lên band mục tiêu, tích hợp mọi nguyên lý đã học: chẩn đoán nút thắt theo tiêu chí, phân bổ thời gian theo chẩn đoán (đối mặt phần yếu, duy trì phần mạnh), công cụ tự-cải-thiện (nhật ký lỗi, thu âm, so bài mẫu), luyện dưới áp lực, và đo tiến bộ theo thước đo cụ thể. Trình bày mạch lạc, ngôn ngữ band 8.",
model:"<b>Bài mẫu tham khảo:</b> A truly effective final strategy must be built on precise diagnosis rather than indiscriminate effort. My first step is to identify not merely which skill is weakest, but exactly which criterion within it is holding me back — for instance, distinguishing shallow idea development from systematic grammatical errors, since each demands a completely different remedy. Having pinpointed this bottleneck, I will allocate the majority of my time to it, even though working on my weakest area is uncomfortable, while maintaining my stronger skills with only occasional practice. This means consciously resisting the natural temptation to retreat into the skills I already perform well, which feels productive but leaves my overall band unchanged. To make my practice deliberate, I will set a specific objective for each session and follow it with rigorous error analysis, asking not just what I got wrong but why. An error log will help me detect the recurring patterns that most damage my score, transforming vague weaknesses into concrete targets. For my productive skills, I will record my speaking and compare my writing against band-eight model answers, criterion by criterion, so that abstract goals become specific techniques I can imitate. Crucially, I will rehearse everything under strict timed conditions, because a skill that collapses under pressure is of little use in the exam room. I will also track my progress through concrete measures — such as errors per essay and correct answers out of forty — rather than relying on a vague feeling of improvement. Above all, I will remember that the quality and direction of my effort matter far more than its sheer quantity. By diagnosing accurately, practising deliberately, and confronting my weaknesses head-on, I am confident that I can reach my target band as efficiently as possible.<br><b>Tự kiểm tra:</b> Có chẩn đoán nút thắt theo TIÊU CHÍ cụ thể? Phân bổ thời gian theo chẩn đoán + đối mặt phần yếu, duy trì phần mạnh (nhận ra thiên kiến né tránh)? Công cụ tự-cải-thiện (nhật ký lỗi, thu âm, so bài mẫu)? Luyện dưới áp lực thời gian? Đo tiến bộ theo thước đo cụ thể? Nhấn 'nỗ lực đúng hướng > khối lượng'? Ngôn ngữ band 8, mạch lạc?"}]}
}}
);

TESTS.push(
{id:"t16",stage:6,title:"Kiểm tra 16 — Task Response, Coherence & Lexical band 8 (Bài 51-53)",desc:"12 câu · lập luận sâu, mạch lạc tinh vi, từ vựng chính xác",
 qs:[
 {q:"Band 8 Task Response khác band 7 chủ yếu ở:",opts:["Viết dài hơn","Chiều SÂU và độ SẮC của tư duy/lập luận","Từ khó hơn","Nhiều đoạn hơn"],a:1,skill:"taskresp8",why:"Band 8 là chất lượng tư duy, không phải độ dài."},
 {q:"Lập trường 'tinh tế' (nuanced) nghĩa là:",opts:["Không nêu lập trường","Thừa nhận phức tạp, đặt điều kiện thay vì đồng ý/phản đối tuyệt đối","Đổi ý giữa bài","Nói chung chung"],a:1,skill:"taskresp8",why:"Lập trường tinh tế thể hiện tư duy sắc sảo."},
 {q:"Điều đóng trần Task Response ở band 7:",opts:["Lập trường tinh tế","Ý phát triển đủ nhưng NÔNG (dừng ở 'vì nó tốt')","Ví dụ trúng đích","Trả lời đủ đề"],a:1,skill:"taskresp8",why:"Ý nông chưa đạt chiều sâu band 8."},
 {q:"'Coherence' (mạch lạc) chủ yếu về:",opts:["Từ nối bề mặt","Ý tưởng sắp xếp LOGIC, dễ theo dõi","Chính tả","Độ dài câu"],a:1,skill:"cohesion8",why:"Coherence là tổ chức ý logic (bức tranh lớn)."},
 {q:"Cohesion band 8 lý tưởng là:",opts:["Nhồi nhiều từ nối","Liên kết MƯỢT, tự nhiên đến gần như 'vô hình'","Từ nối đầu mọi câu","Lặp từ khóa"],a:1,skill:"cohesion8",why:"Band 8 liên kết mượt, không phô trương."},
 {q:"'This trend', 'such measures' là ví dụ của:",opts:["Từ nối","Tham chiếu (referencing) — nối ngược không lặp","Lỗi","Ví dụ"],a:1,skill:"cohesion8",why:"Referencing nối lại ý đã nêu mà không lặp từ."},
 {q:"Lỗi Cohesion 'đóng trần band 7' phổ biến:",opts:["Dùng tham chiếu","Nhồi từ nối đầu MỌI câu (máy móc)","Phân đoạn rõ","Liên kết bằng ý"],a:1,skill:"cohesion8",why:"Nhồi 'Moreover, Furthermore' bị coi là mechanical."},
 {q:"Lexical Resource band 8 chú trọng nhất:",opts:["Dùng nhiều từ khó","Truyền đạt nghĩa CHÍNH XÁC với từ đa dạng, lỗi hiếm","Từ dài","Nhiều thành ngữ"],a:1,skill:"lexical8",why:"Band 8 là dùng từ chính xác, linh hoạt, lỗi hiếm."},
 {q:"Chọn collocation ĐÚNG:",opts:["do a mistake","make a mistake","take a mistake","have a mistake"],a:1,skill:"lexical8",why:"'make a mistake' — collocation cố định."},
 {q:"Nhồi từ 'kêu' nhưng SAI ngữ cảnh thì:",opts:["Luôn tăng điểm","Còn TỆ HƠN dùng từ đơn giản đúng","Không ảnh hưởng","Band 9"],a:1,skill:"lexical8",why:"Đúng nghĩa trước, 'đắt' sau; từ khó sai lộ điểm yếu."},
 {q:"'Thang trừu tượng' khai triển ý là kéo lập luận từ:",opts:["Dài đến ngắn","Cụ thể (cá nhân) lên tác động rộng (xã hội, dài hạn)","Khó đến dễ","Kết đến mở"],a:1,skill:"taskresp8",why:"Kéo từ cá nhân → xã hội → dài hạn tạo chiều sâu."},
 {q:"Thay 'a big problem' bằng cụm band cao:",opts:["a large problem","a pressing problem","a huge problem","a fat problem"],a:1,skill:"lexical8",why:"'a pressing problem' tinh tế hơn big/large/huge."}]},
{id:"t17",stage:6,title:"Kiểm tra 17 — Grammar band 8 & sửa lỗi (Bài 54-55)",desc:"12 câu · đa dạng cấu trúc, độ chính xác, lỗi hóa thạch",
 qs:[
 {q:"Band 8 Grammar yêu cầu:",opts:["Chỉ câu đơn đúng","Đa dạng cấu trúc VÀ phần lớn không lỗi","Câu phức bất kể lỗi","Câu càng dài càng tốt"],a:1,skill:"grammar8",why:"Cần cả RANGE lẫn ACCURACY."},
 {q:"Sửa: 'The number of students ___ increasing.'",opts:["are","is","were","have"],a:1,skill:"grammar8",why:"'The number of...is' (số ít)."},
 {q:"Nếu câu phức khiến bạn dễ mắc lỗi, tốt hơn là:",opts:["Cứ viết dù sai","Tách thành hai câu ĐÚNG","Bỏ ý đó","Viết thật dài"],a:1,skill:"grammar8",why:"Hai câu đúng tốt hơn một câu phức sai."},
 {q:"Cấu trúc song song ĐÚNG:",opts:["patience, skill, and being creative","patience, skill, and creativity","to be patient, skilled, and creativity","patient, skill, and creative"],a:1,skill:"grammar8",why:"Ba danh từ song song: patience, skill, creativity."},
 {q:"'Not only did she lead, ___ she also mentored.'",opts:["and","but","so","because"],a:1,skill:"grammar8",why:"'Not only...but also' — cặp cố định."},
 {q:"Sửa: 'Government should protect ___ environment.'",opts:["Ø ... Ø","The ... the","A ... an","The ... a"],a:1,skill:"errors",why:"Cả hai danh từ xác định → 'the'."},
 {q:"'Success depends ___ hard work.'",opts:["of","on","in","at"],a:1,skill:"errors",why:"'depend on' — giới từ cố định."},
 {q:"Danh từ nào KHÔNG đếm được?",opts:["car","information","student","idea"],a:1,skill:"errors",why:"'information' không đếm được, đi động từ số ít."},
 {q:"'She is good at ___ problems.'",opts:["solve","to solve","solving","solved"],a:2,skill:"errors",why:"Sau giới từ 'at' → V-ing."},
 {q:"'A number of students ___ absent.'",opts:["is","was","are","has"],a:2,skill:"errors",why:"'A number of' + số nhiều → are (khác 'The number of...is')."},
 {q:"Cách khử lỗi 'hóa thạch' hiệu quả nhất:",opts:["Bỏ qua","Ghi nhật ký lỗi + rà soát riêng từng loại ở cuối bài","Viết nhanh hơn","Dùng câu đơn"],a:1,skill:"errors",why:"Biết lỗi hay mắc + soát riêng từng loại là hiệu quả nhất."},
 {q:"Vì sao lỗi 'hóa thạch' nguy hiểm cho band 8?",opts:["Không khác lỗi khác","Lặp lại thành HỆ THỐNG — điều band 8 không cho phép","Khó sửa","Giám khảo ghét"],a:1,skill:"errors",why:"Lỗi hệ thống (lặp) khác lỗi 'occasional' mà band 8 chấp nhận."}]},
{id:"t18",stage:6,title:"Kiểm tra 18 — Speaking, Reading, Listening band 8 & về đích (Bài 56-60)",desc:"12 câu · band 8 cả 4 kỹ năng, chiến lược về đích",
 qs:[
 {q:"Fluency band 8: do dự (nếu có) chủ yếu để:",opts:["Tìm từ/ngữ pháp","Tìm NỘI DUNG/ý tưởng","Nghỉ mệt","Nhớ bài học thuộc"],a:1,skill:"speakadv",why:"Do dự để nghĩ Ý, không vật lộn với từ/ngữ pháp."},

 {q:"Part 3 khác Part 1 ở chỗ cần:",opts:["Trả lời ngắn hơn","Tư duy TRỪU TƯỢNG, lập luận, xét nhiều góc","Chỉ nói về bản thân","Không cần lý do"],a:1,skill:"speakadv",why:"Part 3 đòi hỏi bàn trừu tượng, lập luận — nơi thể hiện band cao."},

/* ===== BÀI 61 ===== */
{id:"g61",stage:7,title:"Bài 61 · Band 9 là gì & khoảng cách 8 → 9",
theory:`<h3>1. Band 9 nghĩa là gì?</h3>
<p>Band 9 = 'Expert user' — sử dụng tiếng Anh <b>thành thạo hoàn toàn</b>: chính xác, trôi chảy, và hiểu đầy đủ. Đây gần mức người bản ngữ có học thức. KHÔNG có nghĩa 'hoàn hảo tuyệt đối không một lỗi' trong mọi khoảnh khắc, mà là kiểm soát ngôn ngữ ở mức cao đến độ lỗi cực hiếm và không đáng kể.</p>
<h3>2. Khoảng cách 8 → 9 tinh vi thế nào?</h3>
<table><tr><th>Tiêu chí</th><th>Band 8</th><th>Band 9</th></tr>
<tr><td>Task Response</td><td>Xử lý đầy đủ, sâu sắc</td><td>Xử lý HOÀN TOÀN thấu đáo, ý phát triển trọn vẹn, không chỗ nào 'hụt'</td></tr>
<tr><td>Coherence</td><td>Mạch lạc, liên kết mượt</td><td>Mạch lạc đến mức 'không nhận ra' cơ chế; tổ chức tự nhiên hoàn hảo</td></tr>
<tr><td>Lexical</td><td>Rộng, chính xác, lỗi hiếm</td><td>Kiểm soát TRỌN VẸN, tự nhiên và tinh tế; hầu như không lỗi</td></tr>
<tr><td>Grammar</td><td>Đa dạng, phần lớn không lỗi</td><td>Đa dạng ĐẦY ĐỦ với độ chính xác gần TUYỆT ĐỐI; lỗi chỉ như của người bản ngữ</td></tr></table>
<h3>3. Ba phẩm chất phân biệt band 9</h3>
<ul>
<li><b>Độ chính xác gần tuyệt đối:</b> lỗi cực hiếm, và nếu có thì là loại 'trượt tay' (slip) như người bản ngữ, không phải lỗi hệ thống.</li>
<li><b>Sự TỰ NHIÊN hoàn toàn:</b> ngôn ngữ nghe như của người bản ngữ có học thức — không 'dịch', không gượng, đúng sắc thái mọi lúc.</li>
<li><b>Sự linh hoạt & tinh tế:</b> điều chỉnh ngôn ngữ chính xác theo ngữ cảnh, sắc thái, mục đích; diễn đạt được cả những ý phức tạp, tinh vi nhất một cách rõ ràng.</li>
</ul>
<h3>4. Band 9 có thực tế không?</h3>
<p>Band 9 rất hiếm và không cần thiết cho hầu hết mục đích (đại học thường yêu cầu 6.5-7.5). Nhưng hiểu chuẩn band 9 giúp bạn hình dung 'đỉnh' và tinh chỉnh về phía đó. Ngay cả khi mục tiêu là 8.0, tư duy band 9 (chính xác tuyệt đối, tự nhiên, tinh tế) nâng chất lượng tổng thể.</p>
<h3>5. Con đường 8 → 9: TINH CHỈNH, không phải học thêm cấu trúc</h3>
<p>Ở band 8 bạn đã có mọi 'công cụ'. Lên 9 là MÀI GIŨA: loại bỏ những lỗi 'trượt tay' cuối cùng, làm ngôn ngữ tự nhiên hơn (qua tiếp xúc sâu tiếng Anh chất lượng), và đạt sự chính xác + tinh tế trong TỪNG lựa chọn từ và cấu trúc. Đây là hành trình của sự hoàn thiện qua tiếp xúc lâu dài, không phải học 'mẹo' mới.</p>
<p class="muted">⚠️ Band 9 KHÔNG phải là dùng từ hiếm nhất hay câu phức nhất. Đó là sự THÀNH THẠO — dùng đúng từ, đúng cấu trúc, đúng sắc thái, một cách tự nhiên và chính xác, để diễn đạt ý một cách rõ ràng và hiệu quả nhất. Đôi khi lựa chọn band 9 là một từ ĐƠN GIẢN nhưng CHÍNH XÁC tuyệt đối.</p>`,
levels:{
basic:{mcq:[
{q:"Band 9 (Expert user) nghĩa là:",opts:["Hoàn hảo tuyệt đối không lỗi mọi lúc","Sử dụng tiếng Anh thành thạo hoàn toàn: chính xác, trôi chảy, hiểu đầy đủ (lỗi cực hiếm)","Dùng từ hiếm nhất","Nói nhanh nhất"],a:1,why:"<b>Đúng: B.</b> Band 9 là thành thạo hoàn toàn, gần mức bản ngữ có học thức — lỗi cực hiếm, không phải 'hoàn hảo tuyệt đối'."},
{q:"Con đường 8 → 9 chủ yếu là:",opts:["Học thêm nhiều cấu trúc mới","TINH CHỈNH: loại lỗi 'trượt tay' cuối, tăng tự nhiên & tinh tế","Dùng từ khó hơn","Viết dài hơn"],a:1,why:"<b>Đúng: B.</b> Band 8 đã có mọi công cụ; lên 9 là mài giũa sự tự nhiên và chính xác, không học 'mẹo' mới."},
