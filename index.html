/* ===== BÀI 12 ===== */
{id:"g12",stage:2,title:"Bài 12 · Quá khứ đơn — động từ thường (khẳng định)",
theory:`<h3>1. Động từ QUY TẮC: thêm -ed</h3>
<p>Diễn tả hành động đã XONG trong quá khứ. Đa số động từ chỉ cần thêm <b>-ed</b>.</p>
<div class="formula">Chủ ngữ + động từ-ed (mọi chủ ngữ như nhau — KHÔNG chia theo ngôi!)</div>
<p><b>Tin vui:</b> Khác hiện tại đơn (phải nhớ thêm s cho he/she/it), quá khứ đơn dùng CHUNG một dạng cho tất cả: I worked, she worked, they worked.</p>
<table><tr><th>Quy tắc thêm -ed</th><th>Ví dụ</th></tr>
<tr><td>Đa số: + ed</td><td>work → worked, play → played</td></tr>
<tr><td>Tận cùng 'e': + d</td><td>like → liked, live → lived</td></tr>
<tr><td>Phụ âm + y: y → ied</td><td>study → studied, try → tried</td></tr>
<tr><td>1 nguyên âm + 1 phụ âm (nhấn): gấp đôi</td><td>stop → stopped, plan → planned</td></tr></table>
<h3>2. Động từ BẤT QUY TẮC: phải học thuộc</h3>
<p>Nhiều động từ thông dụng KHÔNG theo quy tắc -ed. Đây là danh sách cốt lõi PHẢI thuộc:</p>
<table><tr><th>Nguyên mẫu</th><th>Quá khứ</th><th>Nghĩa</th></tr>
<tr><td>go</td><td>went</td><td>đi</td></tr><tr><td>have</td><td>had</td><td>có</td></tr>
<tr><td>do</td><td>did</td><td>làm</td></tr><tr><td>make</td><td>made</td><td>làm/tạo</td></tr>
<tr><td>buy</td><td>bought</td><td>mua</td></tr><tr><td>sell</td><td>sold</td><td>bán</td></tr>
<tr><td>see</td><td>saw</td><td>thấy</td></tr><tr><td>get</td><td>got</td><td>lấy/nhận</td></tr>
<tr><td>come</td><td>came</td><td>đến</td></tr><tr><td>take</td><td>took</td><td>lấy/cầm</td></tr>
<tr><td>eat</td><td>ate</td><td>ăn</td></tr><tr><td>give</td><td>gave</td><td>cho</td></tr>
<tr><td>say</td><td>said</td><td>nói</td></tr><tr><td>tell</td><td>told</td><td>kể</td></tr>
<tr><td>think</td><td>thought</td><td>nghĩ</td></tr><tr><td>find</td><td>found</td><td>tìm thấy</td></tr></table>
<div class="example"><b>I bought a new phone last week.</b><br><span class="vi">Tôi đã mua điện thoại mới tuần trước. — 'buy' bất quy tắc → 'bought', không phải 'buyed'.</span></div>
<div class="example"><b>She studied English for two years.</b><br><span class="vi">Cô ấy đã học tiếng Anh 2 năm. — 'study' → 'studied' (y thành ied).</span></div>
<p class="muted">⚠️ Lỗi phổ biến: thêm -ed cho động từ bất quy tắc ('goed', 'buyed', 'thinked' — đều SAI). Không có cách nào ngoài học thuộc bảng bất quy tắc dần dần.</p>`,
levels:{
basic:{mcq:[
{q:"I ___ to work at 8 a.m. yesterday.",opts:["go","went","goed","gone"],a:1,why:"<b>Đúng: went.</b> 'go' bất quy tắc → went. 'goed' SAI (không tồn tại)."},
{q:"She ___ a new laptop last month.",opts:["buyed","bought","buy","buys"],a:1,why:"<b>Đúng: bought.</b> 'buy' → bought (bất quy tắc), không 'buyed'."},
{q:"They ___ football yesterday.",opts:["play","played","plaied","playd"],a:1,why:"<b>Đúng: played.</b> 'play' nguyên âm+y → chỉ thêm 'ed' = played (không đổi y)."},
{q:"We ___ dinner at a restaurant last night.",opts:["have","had","haved","has"],a:1,why:"<b>Đúng: had.</b> 'have' → had (bất quy tắc)."},
{q:"He ___ hard for the exam.",opts:["studyed","studied","studed","study"],a:1,why:"<b>Đúng: studied.</b> 'study' phụ âm+y → y thành 'ied' = studied."}],
writing:[{q:"Viết 5 câu kể những việc bạn đã làm hôm qua (ít nhất 2 động từ bất quy tắc: go, buy, have, see, make...).",
model:"<b>Bài mẫu:</b> Yesterday, I woke up early and went to work. I checked the supplier prices and made a report. At noon, I had lunch with my colleagues. After work, I bought some groceries. In the evening, I watched a film and relaxed.<br><b>Tự kiểm tra:</b> Động từ quy tắc thêm -ed đúng (checked, watched, relaxed)? Bất quy tắc đúng dạng (woke, went, made, had, bought)? MỌI chủ ngữ dùng chung 1 dạng quá khứ (không thêm s)?"}]},
mid:{mcq:[
{q:"The store ___ at 9 and we ___ home late.",opts:["closed / went","closed / goed","close / went","closed / go"],a:0,why:"<b>Đúng: closed / went.</b> 'close' → closed (thêm d vì tận cùng e); 'go' → went. Cả hai đều quá khứ."},
{q:"He ___ me the truth, so I ___ him.",opts:["telled / believed","told / believed","told / believeed","tell / believed"],a:1,why:"<b>Đúng: told / believed.</b> 'tell' → told (bất quy tắc); 'believe' → believed (thêm d)."},
{q:"We ___ a lot of money because prices ___ last year.",opts:["saved / rised","saved / rose","saved / raised","save / rose"],a:1,why:"<b>Đúng: saved / rose.</b> 'save' → saved; 'rise' (tự tăng) → rose (bất quy tắc). Phân biệt rise/rose (nội động từ) với raise/raised (ngoại động từ)."},
{q:"She ___ the report yesterday and ___ it to the manager.",opts:["wrote / sended","writed / sent","wrote / sent","wrote / sendd"],a:2,why:"<b>Đúng: wrote / sent.</b> 'write' → wrote; 'send' → sent. Cả hai bất quy tắc."},
{q:"They ___ in Ha Noi for ten years before they ___ to Da Nang.",opts:["lived / moved","lived / moveed","live / moved","lived / move"],a:0,why:"<b>Đúng: lived / moved.</b> 'live' → lived; 'move' → moved (đều thêm d vì tận cùng e)."}],
writing:[{q:"Viết đoạn 6 câu kể về một ngày làm việc bận rộn gần đây (dùng ít nhất 5 động từ bất quy tắc khác nhau).",
model:"<b>Bài mẫu:</b> Last Monday was extremely busy. A supplier sent me three new price lists in the morning. I found several errors and told my manager immediately. We had a quick meeting and made a decision to delay the orders. In the afternoon, two customers came to buy televisions, and I gave them a good discount. By the end of the day, I felt exhausted but satisfied.<br><b>Tự kiểm tra:</b> Bất quy tắc đúng dạng (sent, found, told, had, made, came, gave, felt)? Không thêm -ed vào bất quy tắc? Câu quy tắc thêm -ed đúng (delayed... nếu có)?"}]},
adv:{mcq:[
{q:"Chọn câu ĐÚNG hoàn toàn:",opts:["The company grew rapidly and its profits doubled.","The company growed rapidly and its profits doubleed.","The company grew rapidly and its profits doubles.","The company grow rapidly and its profits doubled."],a:0,why:"<b>Đúng: A.</b> 'grow' → grew (bất quy tắc); 'double' → doubled (thêm d). B sai cả hai; C sai 'doubles' (hiện tại); D sai 'grow'."},
{q:"'The new policy ___ significant controversy when it ___ introduced.'",opts:["caused / was","caused / were","cause / was","causeed / was"],a:0,why:"<b>Đúng: caused / was.</b> 'cause' → caused; 'introduce' ở dạng bị động quá khứ → 'was introduced' (it → was). Kết hợp quá khứ đơn chủ động và bị động."},
{q:"'Researchers ___ that the results ___ their hypothesis.'",opts:["found / confirmed","find / confirmed","found / confirm","founded / confirmed"],a:0,why:"<b>Đúng: found / confirmed.</b> 'find' → found (bất quy tắc). CHÚ Ý: 'found' cũng là nguyên mẫu của 'thành lập' — đừng nhầm 'founded' (thành lập) với 'found' (quá khứ của find)."},
{q:"Trong Writing Task 1 (mô tả biểu đồ quá khứ), câu nào ĐÚNG?",opts:["Sales rose sharply in 2020, then fell slightly the following year.","Sales rised sharply in 2020, then falled slightly.","Sales rose sharp in 2020, then fell slight.","Sales was rise sharply in 2020."],a:0,why:"<b>Đúng: A.</b> 'rise' → rose, 'fall' → fell (bất quy tắc); trạng từ 'sharply/slightly' (không phải tính từ sharp/slight). B sai dạng quá khứ; C sai trạng từ; D sai cấu trúc."},
{q:"'By the time we arrived, the sale ___ already ___.'",opts:["was / ended","had / ended","did / end","has / ended"],a:1,why:"<b>Đúng: had / ended.</b> Hành động (sale kết thúc) xảy ra TRƯỚC một mốc quá khứ khác (we arrived) → quá khứ hoàn thành 'had ended'. Đây là bước đệm sang Chặng 3, nhưng nền tảng V-ed/bất quy tắc là gốc."}],
writing:[{q:"Viết đoạn 8 câu (kiểu IELTS Speaking Part 2) kể về một thành công hoặc trải nghiệm đáng nhớ trong quá khứ, dùng đa dạng động từ quá khứ (cả quy tắc và bất quy tắc), có mốc thời gian rõ ràng.",
model:"<b>Bài mẫu:</b> Two years ago, I decided to build a price-comparison tool for my store. At first, I knew almost nothing about programming. I spent every evening watching tutorials and made countless mistakes. Slowly, I understood the basics and wrote my first working code. When I finished the tool, my manager was impressed and my colleagues found it very useful. That project taught me that persistence matters more than talent. It completely changed how I saw my own abilities.<br><b>Tự kiểm tra:</b> Quy tắc thêm -ed đúng (decided, spent→bất quy tắc, watched, finished, changed)? Bất quy tắc đúng (knew, spent, made, understood, wrote, was, found, taught, saw)? Mốc thời gian 'Two years ago'?"}]}
}},
/* ===== BÀI 13 ===== */
{id:"g13",stage:2,title:"Bài 13 · Quá khứ đơn — phủ định & câu hỏi (did / didn't)",
theory:`<h3>1. Vấn đề giống hiện tại đơn: cần trợ động từ</h3>
<p>Ở hiện tại đơn ta dùng do/does. Ở quá khứ, cả phủ định lẫn câu hỏi đều dùng MỘT trợ động từ duy nhất: <b>did</b> (cho mọi chủ ngữ).</p>
<h3>2. Câu phủ định</h3>
<div class="formula">Chủ ngữ + <b>didn't</b> + động từ NGUYÊN MẪU</div>
<div class="example"><b>I didn't go to work yesterday.</b><br><span class="vi">Tôi đã KHÔNG đi làm hôm qua. — Chú ý: 'go' (nguyên mẫu), KHÔNG phải 'went'.</span></div>
<p><b>ĐIỂM CỐT LÕI:</b> Khi có 'did/didn't', dấu hiệu quá khứ (V2/-ed) CHUYỂN sang 'did', động từ chính VỀ NGUYÊN MẪU. Viết "I didn't went" là SAI — phải "I didn't go".</p>
<h3>3. Câu hỏi Yes/No</h3>
<div class="formula"><b>Did</b> + chủ ngữ + động từ NGUYÊN MẪU ?</div>
<div class="example"><b>Did you buy the tickets?</b> — Yes, I did. / No, I didn't.<br><span class="vi">Bạn đã mua vé chưa? — động từ 'buy' (nguyên mẫu), s/quá khứ nằm ở 'did'.</span></div>
<h3>4. Câu hỏi Wh-</h3>
<div class="formula">Từ hỏi + did + chủ ngữ + động từ nguyên mẫu ?</div>
<div class="example"><b>What did you do last weekend?</b> — I visited my family.<br><b>Where did she go?</b> — She went to the market.<br><span class="vi">Câu hỏi dùng 'go' (nguyên mẫu vì có did), câu trả lời dùng 'went' (vì không còn did).</span></div>
<p class="muted">⚠️ Ba lỗi chết người: (1) "I didn't went" → didn't GO. (2) "Did you went?" → Did you GO? (3) "You bought it?" thiếu Did → "Did you buy it?". Nhớ: có DID thì động từ về nguyên mẫu.</p>`,
levels:{
basic:{mcq:[
{q:"I ___ go to the party last night.",opts:["didn't","don't","wasn't","not"],a:0,why:"<b>Đúng: didn't.</b> Phủ định quá khứ → didn't + go (nguyên mẫu). 'don't' là hiện tại; 'wasn't' dùng cho to be."},
{q:"___ you see the new products?",opts:["Do","Did","Was","Were"],a:1,why:"<b>Đúng: Did.</b> Câu hỏi quá khứ → Did + you + see (nguyên mẫu)."},
{q:"She ___ come to work yesterday.",opts:["didn't","doesn't","wasn't","not"],a:0,why:"<b>Đúng: didn't.</b> didn't + come (nguyên mẫu, KHÔNG 'came')."},
{q:"Chọn câu ĐÚNG:",opts:["Did you went home?","Did you go home?","Did you goed home?","You did go home?"],a:1,why:"<b>Đúng: B.</b> Did + go (nguyên mẫu). A để 'went' sau did (sai); C 'goed' không tồn tại."},
{q:"What time ___ the meeting start?",opts:["do","did","was","were"],a:1,why:"<b>Đúng: did.</b> Hỏi giờ trong quá khứ → did + start (nguyên mẫu)."}],
writing:[{q:"Chuyển 3 câu sau thành (a) phủ định và (b) câu hỏi: (1) He bought a car. (2) They went to Hue. (3) She finished the report.",
model:"<b>Đáp án:</b> (1a) He didn't buy a car. (1b) Did he buy a car? (2a) They didn't go to Hue. (2b) Did they go to Hue? (3a) She didn't finish the report. (3b) Did she finish the report?<br><b>Tự kiểm tra:</b> Sau didn't/Did, động từ VỀ NGUYÊN MẪU chưa (buy không bought, go không went, finish không finished)?"}]},
mid:{mcq:[
{q:"'Why ___ you ___ me about the price change?'",opts:["did / tell","did / told","didn't / told","do / tell"],a:0,why:"<b>Đúng: did / tell.</b> Câu hỏi quá khứ: did + tell (nguyên mẫu). 'did...told' sai vì để quá khứ ở cả hai chỗ."},
{q:"We ___ have enough stock, so we ___ the order.",opts:["didn't / cancelled","don't / cancelled","didn't / canceled","wasn't / cancelled"],a:0,why:"<b>Đúng: didn't / cancelled.</b> 'didn't have' (nguyên mẫu have) + 'cancelled' (động từ chính của mệnh đề sau, quá khứ bình thường vì không có did)."},
{q:"'___ the customers ___ satisfied with the service?'",opts:["Did / were","Were / (không cần)","Did / be","Was / were"],a:1,why:"<b>Đúng: Were (dùng 'Were the customers satisfied?').</b> 'satisfied' đi với to be, không phải động từ thường → dùng Were, KHÔNG dùng did. Bẫy: did chỉ cho động từ thường; câu có tính từ/to be thì dùng was/were."},
{q:"He ___ the invoices yesterday? No, he ___.",opts:["Did / send / didn't","Did send / didn't","Did / send... didn't","Did he send / didn't"],a:3,why:"<b>Đúng: Did he send / didn't.</b> Câu hỏi: Did he send...? Trả lời ngắn: No, he didn't. Động từ 'send' nguyên mẫu."},
{q:"'How ___ you ___ about the problem?'",opts:["did / find out","did / found out","do / find out","did / finding out"],a:0,why:"<b>Đúng: did / find out.</b> did + find out (nguyên mẫu). Phrasal verb 'find out' (phát hiện) giữ nguyên mẫu sau did."}],
writing:[{q:"Viết đoạn hội thoại 6 câu: một người hỏi bạn về kỳ nghỉ vừa qua (đi đâu, làm gì, có thích không), bạn trả lời (dùng ít nhất 3 câu hỏi Did + 1 câu phủ định).",
model:"<b>Bài mẫu:</b><br>— Did you go anywhere last weekend?<br>— Yes, I did. I went to Ha Long Bay.<br>— What did you do there?<br>— I took a boat tour and visited some caves.<br>— Did you like it?<br>— I loved it, but I didn't have enough time to see everything.<br><b>Tự kiểm tra:</b> Did + nguyên mẫu (go, do, like)? Câu trả lời quá khứ đúng (went, took, visited, loved)? didn't + have (nguyên mẫu)?"}]},
adv:{mcq:[
{q:"Chọn câu KHÔNG có lỗi:",opts:["Did the results confirmed the theory?","Why didn't they responded to the email?","When did the trend begin to reverse?","How did prices rose so quickly?"],a:2,why:"<b>Đúng: C.</b> 'When did the trend begin...' — did + begin (nguyên mẫu), đúng. A sai ('confirmed' phải 'confirm'); B sai ('responded' phải 'respond'); D sai ('rose' phải 'rise'). Quy tắc: sau did LUÔN nguyên mẫu."},
{q:"'Not only ___ the company miss its target, but it also ___ money.'",opts:["did / lost","did / lose","didn't / lose","was / lost"],a:1,why:"<b>Đúng: did / lose.</b> Đảo ngữ 'Not only' đầu câu → did + động từ nguyên mẫu (miss, lose). Cấu trúc band 7+ nhưng dựa trên quy tắc 'did + nguyên mẫu' bạn học hôm nay."},
{q:"'I didn't realise how much the market ___ until I checked the data.'",opts:["change","changed","had changed","did change"],a:2,why:"<b>Đúng: had changed.</b> Mệnh đề sau 'how much' diễn tả điều đã xảy ra TRƯỚC thời điểm 'I checked' → quá khứ hoàn thành 'had changed'. Lưu ý: KHÔNG dùng did ở đây vì đây không phải câu hỏi trực tiếp."},
{q:"Trong Speaking Part 2 (kể chuyện quá khứ), cách phủ định nào tự nhiên nhất?",opts:["I no went there.","I didn't go there because I hadn't finished my work.","I don't went there.","I wasn't go there."],a:1,why:"<b>Đúng: B.</b> 'didn't go' (nguyên mẫu) + lý do dùng quá khứ hoàn thành 'hadn't finished' — mượt và đúng thì. A, C, D đều sai cấu trúc phủ định quá khứ."},
{q:"'Rarely ___ such a dramatic drop in sales.' (Hiếm khi chúng tôi chứng kiến...)",opts:["we saw","did we see","we did see","saw we"],a:1,why:"<b>Đúng: did we see.</b> 'Rarely' đầu câu → đảo ngữ với did + chủ ngữ + động từ nguyên mẫu 'see'. Nền tảng did + nguyên mẫu áp dụng cả trong đảo ngữ."}],
writing:[{q:"Viết đoạn 8 câu kể về một lần mọi việc KHÔNG diễn ra như kế hoạch (dùng nhiều câu phủ định didn't + nguyên mẫu, và ít nhất 2 câu hỏi tu từ hoặc câu hỏi trong lời kể).",
model:"<b>Bài mẫu:</b> Last month, we planned a big promotion, but almost nothing went as expected. The supplier didn't deliver the stock on time, and we didn't receive the new price lists until the last minute. Why didn't we prepare a backup plan? I still ask myself that. On the launch day, the website crashed, and many customers didn't manage to place their orders. We didn't reach our sales target, and I felt responsible. However, we learned a lot, and we didn't make the same mistakes again.<br><b>Tự kiểm tra:</b> Mọi 'didn't' theo sau là NGUYÊN MẪU (deliver, receive, prepare, manage, reach, make)? Câu hỏi trong lời kể có 'did/didn't + nguyên mẫu'? Các động từ khẳng định vẫn ở quá khứ (planned, went, crashed, felt, learned)?"}]}
}}
);

LESSONS.push(
/* ===== BÀI 14 ===== */
{id:"g14",stage:2,title:"Bài 14 · Tương lai: will và be going to",
theory:`<h3>1. Hai cách nói về tương lai — khác nhau về sắc thái</h3>
<p>Tiếng Anh có 2 cách chính diễn tả tương lai, và chọn cách nào phụ thuộc vào Ý.</p>
<h3>2. WILL — quyết định tức thì, dự đoán, lời hứa</h3>
<div class="formula">Chủ ngữ + <b>will</b> + động từ nguyên mẫu (mọi chủ ngữ như nhau)</div>
<ul>
<li><b>Quyết định ngay lúc nói:</b> The phone is ringing. I'll answer it. (Tôi sẽ nghe máy — quyết định ngay.)</li>
<li><b>Dự đoán:</b> I think it will rain tomorrow. (Tôi nghĩ mai sẽ mưa.)</li>
<li><b>Lời hứa:</b> I will help you. (Tôi sẽ giúp bạn.)</li>
</ul>
<p>Viết tắt: I will = I'll · will not = <b>won't</b>. Câu hỏi: Will you help me?</p>
<h3>3. BE GOING TO — kế hoạch đã định, dự đoán có bằng chứng</h3>
<div class="formula">Chủ ngữ + am/is/are + <b>going to</b> + động từ nguyên mẫu</div>
<ul>
<li><b>Kế hoạch đã quyết định TRƯỚC:</b> I'm going to start a business next year. (Tôi dự định... — đã lên kế hoạch.)</li>
<li><b>Dự đoán có dấu hiệu rõ:</b> Look at those clouds! It's going to rain. (Nhìn mây kìa — sắp mưa, có bằng chứng.)</li>
</ul>
<h3>4. So sánh nhanh</h3>
<div class="example"><b>A:</b> "I'm thirsty." <b>B:</b> "I'll get you some water." (quyết định NGAY → will)<br><b>I'm going to visit my parents this weekend.</b> (kế hoạch ĐÃ định từ trước → going to)</div>
<p class="muted">⚠️ Sau will và going to, động từ LUÔN nguyên mẫu: "I will go" (không 'will goes', không 'will went'). Và đừng quên to be trong 'be going to': "I am going to" chứ không "I going to".</p>`,
levels:{
basic:{mcq:[
{q:"I think it ___ be sunny tomorrow.",opts:["will","going to","is","was"],a:0,why:"<b>Đúng: will.</b> Dự đoán/ý kiến ('I think') → will + be (nguyên mẫu)."},
{q:"She ___ start a new job next week.",opts:["will going to","is going to","going to","will to"],a:1,why:"<b>Đúng: is going to.</b> Kế hoạch đã định → is going to + start. 'will going to' sai (không dùng cả hai)."},
{q:"The phone is ringing. I ___ answer it.",opts:["am going to","will","going to","would"],a:1,why:"<b>Đúng: will.</b> Quyết định NGAY lúc nói → will. (Không phải kế hoạch định trước nên không dùng going to.)"},
{q:"Câu phủ định của 'I will help': ",opts:["I willn't help","I won't help","I not will help","I don't will help"],a:1,why:"<b>Đúng: won't help.</b> will not = won't. 'willn't' không tồn tại."},
{q:"We ___ going to buy a new car.",opts:["will","are","is","am"],a:1,why:"<b>Đúng: are.</b> 'We' + be going to → are going to. Đừng quên to be."}],
writing:[{q:"Viết 4 câu về tương lai: 2 câu kế hoạch đã định (be going to), 2 câu quyết định/dự đoán (will).",
model:"<b>Bài mẫu:</b> I'm going to take the IELTS exam next year. (kế hoạch) My brother is going to open a shop. (kế hoạch) I think prices will rise soon. (dự đoán) Don't worry, I'll help you with the report. (quyết định/lời hứa)<br><b>Tự kiểm tra:</b> 'be going to' có to be (am/is/are) đầy đủ? Sau will/going to là nguyên mẫu? Kế hoạch định trước → going to, quyết định ngay → will?"}]},
mid:{mcq:[
{q:"'Look at that truck! It ___ hit the wall!'",opts:["will","is going to","goes to","will to"],a:1,why:"<b>Đúng: is going to.</b> Dự đoán CÓ BẰNG CHỨNG trước mắt (nhìn thấy) → be going to. 'will' dùng cho dự đoán chung chung không bằng chứng."},
{q:"'Have you decided?' — 'Yes, I ___ accept the offer.'",opts:["will","am going to","going to","would"],a:1,why:"<b>Đúng: am going to.</b> 'Have you decided?' → đã có quyết định TRƯỚC → be going to. Nếu quyết định ngay lúc trả lời thì mới dùng will."},
{q:"'This bag is heavy.' — 'OK, I ___ carry it for you.'",opts:["am going to","will","going to","carry"],a:1,why:"<b>Đúng: will.</b> Đề nghị giúp NGAY lúc nói (chưa định trước) → will. Đây là dấu hiệu kinh điển của will: phản ứng tức thì."},
{q:"They ___ probably ___ the deadline if they keep this pace.",opts:["are / miss","will / miss","will / missing","are going / miss"],a:1,why:"<b>Đúng: will / miss.</b> 'probably' + dự đoán → will + miss (nguyên mẫu). 'will missing' sai (phải nguyên mẫu)."},
{q:"'What ___ you ___ after you finish this course?'",opts:["will / do","are / going to do","do / going to","will / doing"],a:1,why:"<b>Đúng: are / going to do.</b> Hỏi về KẾ HOẠCH tương lai → be going to: 'What are you going to do?'. (Cũng chấp nhận 'What will you do?' nhưng đáp án A viết sai cấu trúc.)"}],
writing:[{q:"Viết đoạn 6 câu về kế hoạch của bạn cho năm tới (dùng chủ yếu 'be going to' cho kế hoạch, và 'will' cho dự đoán/hy vọng).",
model:"<b>Bài mẫu:</b> Next year, I'm going to focus seriously on my English. I'm going to study for at least two hours every day. I believe this effort will pay off. I'm also going to apply for a better position at work. If I improve my skills, I think my career will grow. It won't be easy, but I'm going to try my best.<br><b>Tự kiểm tra:</b> Kế hoạch cụ thể → 'be going to' (có to be)? Dự đoán/niềm tin → 'will'? Sau cả hai là nguyên mẫu? 'won't' dùng đúng cho phủ định?"}]},
adv:{mcq:[
{q:"Trong IELTS Speaking Part 2, kể kế hoạch tương lai, câu nào tự nhiên nhất?",opts:["I will going to travel.","I'm planning to travel around Asia, and I'm going to start with Japan.","I travel next year will.","I going to travel and will travel."],a:1,why:"<b>Đúng: B.</b> 'I'm planning to' + 'I'm going to start' — diễn đạt kế hoạch mượt, đa dạng. A sai (will + going to); C, D sai cấu trúc."},
{q:"'By 2030, experts predict that renewable energy ___ most of our electricity.'",opts:["is going to provide","will provide","provides","will providing"],a:1,why:"<b>Đúng: will provide.</b> Dự đoán chuyên gia về tương lai xa → will. 'will providing' sai (phải nguyên mẫu). Trong Writing về xu hướng tương lai, 'will + nguyên mẫu' là chuẩn."},
{q:"Phân biệt: câu nào diễn tả một sự sắp xếp gần như CHẮC CHẮN đã lên lịch?",opts:["I'll meet the supplier tomorrow.","I'm meeting the supplier tomorrow at 3 p.m.","I'm going to meet the supplier someday.","I will probably meet the supplier."],a:1,why:"<b>Đúng: B.</b> Hiện tại tiếp diễn ('I'm meeting...tomorrow at 3') diễn tả LỊCH HẸN cố định đã sắp xếp — chắc chắn hơn cả 'going to'. Đây là cách dùng nâng cao: tiếp diễn cho lịch hẹn tương lai gần đã chốt."},
{q:"'If the trend continues, the population ___ by 20% within a decade.'",opts:["will grow","is growing","grows","grew"],a:0,why:"<b>Đúng: will grow.</b> Câu điều kiện loại 1 (if + hiện tại, mệnh đề chính will + nguyên mẫu). Dự đoán hệ quả tương lai → will. Nền tảng cho câu điều kiện học ở Chặng 3."},
{q:"Chọn câu có sắc thái ĐÚNG nhất cho lời hứa trang trọng:",opts:["We're going to refund your money.","We will refund your money within 7 days.","We refund your money.","We refunding your money."],a:1,why:"<b>Đúng: B.</b> 'will' diễn tả LỜI HỨA/cam kết trang trọng (dịch vụ khách hàng). 'be going to' nghe như kế hoạch nội bộ hơn là cam kết với khách. C, D sai thì."}],
writing:[{q:"Viết đoạn 8 câu (kiểu Writing Task 2 hoặc Speaking Part 3) về việc công nghệ SẼ thay đổi công việc/cuộc sống thế nào trong tương lai, dùng 'will' cho dự đoán và phân biệt với kế hoạch cá nhân 'be going to'.",
model:"<b>Bài mẫu:</b> In my opinion, technology will transform the workplace dramatically over the next decade. Many routine jobs will be replaced by automation, and workers will need to learn new skills. However, I don't think machines will replace humans completely. New kinds of jobs will certainly emerge. Personally, I'm going to prepare for this change by improving my digital skills. I'm also going to learn more about data analysis. If I adapt early, I believe I will stay competitive. The future won't be easy, but it will be full of opportunities.<br><b>Tự kiểm tra:</b> Dự đoán chung → 'will + nguyên mẫu'? Kế hoạch cá nhân → 'be going to'? Có dùng bị động tương lai 'will be replaced'? 'won't' cho phủ định?"}]}
}},
/* ===== BÀI 15 ===== */
{id:"g15",stage:2,title:"Bài 15 · So sánh hơn (comparatives)",
theory:`<h3>1. So sánh hai đối tượng: "hơn"</h3>
<p>Dùng khi so sánh A với B: "A cao HƠN B", "A đắt HƠN B". Quy tắc phụ thuộc vào ĐỘ DÀI của tính từ.</p>
<h3>2. Tính từ NGẮN (1 âm tiết): thêm -er + than</h3>
<div class="formula">tính từ + <b>-er</b> + than</div>
<table><tr><th>Tính từ</th><th>So sánh hơn</th><th>Ví dụ</th></tr>
<tr><td>cheap (rẻ)</td><td>cheaper</td><td>This TV is cheaper than that one.</td></tr>
<tr><td>tall (cao)</td><td>taller</td><td>He is taller than me.</td></tr>
<tr><td>big (to)</td><td>bigger</td><td>gấp đôi phụ âm: big→bigger</td></tr>
<tr><td>easy (dễ)</td><td>easier</td><td>y→ier: easy→easier</td></tr></table>
<h3>3. Tính từ DÀI (2+ âm tiết): more + tính từ + than</h3>
<div class="formula"><b>more</b> + tính từ + than</div>
<div class="example"><b>This phone is more expensive than that one.</b><br><span class="vi">Điện thoại này đắt hơn cái kia. — 'expensive' dài (3 âm tiết) → more expensive, KHÔNG 'expensiver'.</span></div>
<div class="example"><b>English is more difficult than I thought.</b><br><span class="vi">'difficult' dài → more difficult.</span></div>
<h3>4. Bất quy tắc (phải thuộc)</h3>
<table><tr><th>Tính từ</th><th>So sánh hơn</th></tr>
<tr><td>good (tốt)</td><td><b>better</b></td></tr><tr><td>bad (xấu/tệ)</td><td><b>worse</b></td></tr>
<tr><td>far (xa)</td><td><b>further / farther</b></td></tr><tr><td>little (ít)</td><td><b>less</b></td></tr>
<tr><td>much/many (nhiều)</td><td><b>more</b></td></tr></table>
<p class="muted">⚠️ Lỗi phổ biến: (1) 'more' + tính từ ngắn ('more cheap' → phải 'cheaper'); (2) 'gooder' → phải 'better'; (3) quên 'than' khi so sánh 2 vật; (4) 'more...er' cùng lúc (more taller — SAI).</p>`,
levels:{
basic:{mcq:[
{q:"This laptop is ___ than that one.",opts:["cheaper","more cheap","cheapest","cheap"],a:0,why:"<b>Đúng: cheaper.</b> 'cheap' ngắn (1 âm tiết) → cheaper. 'more cheap' sai."},
{q:"My new phone is ___ than my old one.",opts:["gooder","better","more good","best"],a:1,why:"<b>Đúng: better.</b> 'good' bất quy tắc → better. 'gooder'/'more good' đều sai."},
{q:"A motorbike is ___ than a car.",opts:["more expensive","expensiver","cheaper","cheapest"],a:2,why:"<b>Đúng: cheaper.</b> Xe máy RẺ hơn ô tô → cheaper (nghĩa hợp lý). 'expensiver' sai dạng."},
{q:"This exercise is ___ than the last one.",opts:["difficulter","more difficult","difficultest","difficult"],a:1,why:"<b>Đúng: more difficult.</b> 'difficult' dài (3 âm tiết) → more difficult."},
{q:"Today is ___ than yesterday.",opts:["hoter","hotter","more hot","hottest"],a:1,why:"<b>Đúng: hotter.</b> 'hot' = 1 nguyên âm + 1 phụ âm → gấp đôi t = hotter."}],
writing:[{q:"Viết 5 câu so sánh các sản phẩm hoặc sự vật (dùng cả tính từ ngắn -er và tính từ dài more..., ít nhất 1 bất quy tắc better/worse).",
model:"<b>Bài mẫu:</b> Samsung TVs are more popular than some other brands in our store. This model is bigger but cheaper than last year's. Online shopping is more convenient than visiting a shop. However, the service in physical stores is often better. Delivery in the city is faster than in rural areas.<br><b>Tự kiểm tra:</b> Tính từ ngắn → -er (bigger, cheaper, faster)? Tính từ dài → more (more popular, more convenient)? better (bất quy tắc)? Có 'than' sau mỗi so sánh?"}]},
mid:{mcq:[
{q:"The new system is ___ and ___ than the old one.",opts:["faster / more reliable","more fast / reliabler","faster / reliabler","more fast / more reliable"],a:0,why:"<b>Đúng: faster / more reliable.</b> 'fast' ngắn → faster; 'reliable' dài → more reliable. Mỗi tính từ theo quy tắc riêng của nó."},
{q:"Business is ___ this year than last year.",opts:["worse","worser","more bad","baddest"],a:0,why:"<b>Đúng: worse.</b> 'bad' → worse (bất quy tắc). 'worser'/'more bad' đều sai."},
{q:"The further you go from the city, the ___ the prices become.",opts:["lower","more low","lowest","low"],a:0,why:"<b>Đúng: lower.</b> 'low' ngắn → lower. Cấu trúc 'the + so sánh, the + so sánh' (càng...càng...) — nâng cao nhưng hữu ích."},
{q:"My English is ___ now than it was six months ago.",opts:["gooder","more good","much better","betterer"],a:2,why:"<b>Đúng: much better.</b> 'better' (bất quy tắc) + 'much' để nhấn mạnh mức độ ('tốt hơn NHIỀU'). 'much/far/a lot' + so sánh hơn = cách nhấn mạnh."},
{q:"Chọn câu ĐÚNG:",opts:["This is more better than that.","This is better than that.","This is more good than that.","This is gooder than that."],a:1,why:"<b>Đúng: B.</b> 'better' đã là so sánh hơn, KHÔNG thêm 'more' (more better = lỗi kép). Chỉ 'better than'."}],
writing:[{q:"Viết đoạn 6 câu so sánh hai lựa chọn (ví dụ: mua hàng online vs tại cửa hàng, hoặc hai thành phố), dùng ít nhất 1 cấu trúc nhấn mạnh (much/far + so sánh) và 1 bất quy tắc.",
model:"<b>Bài mẫu:</b> Living in a big city is quite different from living in the countryside. Cities are far more convenient, with better transport and more job opportunities. However, the countryside is much quieter and cleaner. The cost of living is also lower there. For me, city life is more exciting, but it is also more stressful. Overall, each choice is better for different kinds of people.<br><b>Tự kiểm tra:</b> Tính từ ngắn -er, dài more? 'much/far + so sánh' để nhấn? better/lower đúng? Mỗi câu so sánh có than (hoặc ngầm hiểu)?"}]},
adv:{mcq:[
{q:"Trong Writing Task 1, câu so sánh số liệu nào CHÍNH XÁC nhất?",opts:["Sales in 2020 were higher than 2019.","Sales in 2020 were higher than those in 2019.","Sales in 2020 were more high than 2019.","Sales in 2020 were higher than 2019 was."],a:1,why:"<b>Đúng: B.</b> So sánh phải cùng loại: 'sales in 2020' với 'THOSE (=sales) in 2019' — dùng 'those' để tránh lặp và đảm bảo so sánh ngang hàng. A so sánh 'sales' với '2019' (một con số năm) — không ngang hàng, lỗi tinh tế band 7."},
{q:"'The more you practise, the ___ you become.'",opts:["confident","more confident","confidenter","most confident"],a:1,why:"<b>Đúng: more confident.</b> Cấu trúc 'The + so sánh..., the + so sánh...' (càng...càng...). 'confident' dài → more confident. Cấu trúc này rất giá trị cho Speaking/Writing band 7."},
{q:"'This method is considerably ___ effective than the previous one.'",opts:["more","much","very","so"],a:0,why:"<b>Đúng: more.</b> 'effective' dài → more effective; 'considerably' (đáng kể) là trạng từ nhấn mạnh so sánh, đứng TRƯỚC 'more'. 'very/so' không dùng với so sánh hơn."},
{q:"Chọn câu diễn đạt học thuật tốt nhất:",opts:["Renewable energy is gooder for the environment.","Renewable energy is significantly more environmentally friendly than fossil fuels.","Renewable energy is more good than fossil fuels.","Renewable energy is environmentally friendlier a lot.","Renewable energy is more friendly environment."],a:1,why:"<b>Đúng: B.</b> 'significantly more environmentally friendly than' — trạng từ nhấn mạnh + so sánh dài + than đầy đủ, văn phong học thuật. Các đáp án khác sai dạng so sánh hoặc sai vị trí."},
{q:"'Nowadays, people are becoming ___ aware of environmental issues.'",opts:["increasing","increasingly more","more and more","much"],a:2,why:"<b>Đúng: more and more.</b> 'more and more aware' = ngày càng ý thức hơn — diễn tả xu hướng tăng dần. 'increasingly' cũng đúng nhưng đi một mình ('increasingly aware'), không 'increasingly more'. Cụm 'more and more + tính từ' rất tự nhiên."}],
writing:[{q:"Viết đoạn nghị luận 8 câu so sánh hai phương án cho một vấn đề xã hội (ví dụ: giao thông công cộng vs xe cá nhân), dùng đa dạng cấu trúc so sánh: -er/more, nhấn mạnh (significantly/far/much + so sánh), 'the more...the more', và bất quy tắc.",
model:"<b>Bài mẫu:</b> Public transport offers several advantages over private vehicles. Firstly, it is significantly cheaper than owning a car, especially in big cities. Buses and trains are also far more environmentally friendly, as they produce fewer emissions per passenger. However, private cars are often more convenient and much faster for short trips. Interestingly, the more cars there are on the road, the worse traffic congestion becomes. In this sense, public transport is a better long-term solution. It is not always more comfortable, but its benefits for society are greater. Overall, encouraging public transport is wiser than expanding roads.<br><b>Tự kiểm tra:</b> -er/more đúng độ dài tính từ? Nhấn mạnh 'significantly/far/much + so sánh'? 'the more...the worse' đúng cấu trúc? better/worse/greater/wiser (bất quy tắc & ngắn) đúng? 'than' đầy đủ?"}]}
}},
/* ===== BÀI 16 ===== */
{id:"g16",stage:2,title:"Bài 16 · So sánh nhất (superlatives)",
theory:`<h3>1. So sánh trong NHÓM (từ 3 trở lên): "nhất"</h3>
<p>"Cái RẺ NHẤT", "người CAO NHẤT", "sản phẩm PHỔ BIẾN NHẤT". Luôn đi kèm <b>the</b>.</p>
<h3>2. Tính từ NGẮN: the + tính từ + -est</h3>
<div class="formula"><b>the</b> + tính từ + <b>-est</b></div>
<table><tr><th>Tính từ</th><th>So sánh nhất</th><th>Ví dụ</th></tr>
<tr><td>cheap</td><td>the cheapest</td><td>This is the cheapest TV in the store.</td></tr>
<tr><td>big</td><td>the biggest</td><td>gấp đôi: the biggest</td></tr>
<tr><td>easy</td><td>the easiest</td><td>y→iest: the easiest</td></tr></table>
<h3>3. Tính từ DÀI: the most + tính từ</h3>
<div class="formula"><b>the most</b> + tính từ</div>
<div class="example"><b>This is the most expensive phone we sell.</b><br><span class="vi">Đây là điện thoại đắt nhất chúng tôi bán. — 'expensive' dài → the most expensive.</span></div>
<div class="example"><b>She is the most experienced salesperson on our team.</b><br><span class="vi">'experienced' dài → the most experienced.</span></div>
<h3>4. Bất quy tắc</h3>
<table><tr><th>Tính từ</th><th>So sánh hơn</th><th>So sánh nhất</th></tr>
<tr><td>good</td><td>better</td><td><b>the best</b></td></tr>
<tr><td>bad</td><td>worse</td><td><b>the worst</b></td></tr>
<tr><td>far</td><td>further</td><td><b>the furthest</b></td></tr>
<tr><td>much/many</td><td>more</td><td><b>the most</b></td></tr></table>
<p class="muted">⚠️ Ghi nhớ: so sánh nhất LUÔN có 'the'. So sánh nhất thường đi với 'in' (nơi chốn: in the store, in the world) hoặc 'of' (nhóm: of all). Lỗi: 'the most cheapest' (thừa), 'most tallest' (thiếu the + thừa).</p>`,
levels:{
basic:{mcq:[
{q:"This is ___ TV in our store.",opts:["the cheapest","the most cheap","cheapest","cheaper"],a:0,why:"<b>Đúng: the cheapest.</b> 'cheap' ngắn → the cheapest. So sánh nhất cần 'the'."},
{q:"He is ___ worker on the team.",opts:["the best","the goodest","the most good","best"],a:0,why:"<b>Đúng: the best.</b> 'good' → the best (bất quy tắc). Cần 'the'."},
{q:"It's ___ phone we have.",opts:["the most expensive","the expensivest","most expensive","expensivest"],a:0,why:"<b>Đúng: the most expensive.</b> 'expensive' dài → the most expensive."},
{q:"Everest is ___ mountain in the world.",opts:["the highest","the most high","highest","higher"],a:0,why:"<b>Đúng: the highest.</b> 'high' ngắn → the highest. Đi với 'in the world'."},
{q:"That was ___ day of my life.",opts:["the worst","the baddest","the most bad","worse"],a:0,why:"<b>Đúng: the worst.</b> 'bad' → the worst (bất quy tắc)."}],
writing:[{q:"Viết 5 câu dùng so sánh nhất về cửa hàng/công việc của bạn (best-selling product, most popular brand, cheapest item...). Dùng cả -est, the most, và 1 bất quy tắc.",
model:"<b>Bài mẫu:</b> Televisions are the best-selling products in our store. Samsung is the most popular brand among our customers. The cheapest item we sell is a small electric fan. Our newest model has the biggest screen. December is the busiest month of the year for us.<br><b>Tự kiểm tra:</b> Mọi so sánh nhất có 'the'? Tính từ ngắn -est (cheapest, biggest, busiest), dài the most? best (bất quy tắc)? Đi với in/of?"}]},
mid:{mcq:[
{q:"This is ___ product we've ever launched.",opts:["the successfulest","the most successful","most successful","the more successful"],a:1,why:"<b>Đúng: the most successful.</b> 'successful' dài → the most successful. Đi với 'we've ever launched' (từng)."},
{q:"Of all the suppliers, this one offers ___ prices.",opts:["the lowest","the most low","lowest","lower"],a:0,why:"<b>Đúng: the lowest.</b> 'low' ngắn → the lowest. 'Of all...' báo hiệu so sánh nhất."},
{q:"Chọn câu ĐÚNG:",opts:["This is the most cheapest option.","This is the cheapest option.","This is cheapest option.","This is the more cheap option."],a:1,why:"<b>Đúng: B.</b> 'the cheapest' — KHÔNG thêm 'most' (the most cheapest = lỗi kép). C thiếu 'the'."},
{q:"He is one of ___ people I know.",opts:["the most hardworking","the hardworkingest","most hardworking","the more hardworking"],a:0,why:"<b>Đúng: the most hardworking.</b> 'hardworking' dài → the most hardworking. Cấu trúc 'one of the + so sánh nhất + danh từ số nhiều'."},
{q:"December is ___ month for sales.",opts:["the better","the best","the most good","best"],a:1,why:"<b>Đúng: the best.</b> 'good' → the best. Cần 'the'; 'the better' là so sánh HƠN (chỉ 2), không phải nhất."}],
writing:[{q:"Viết đoạn 6 câu giới thiệu những điều 'nhất' về công ty/thành phố/đất nước bạn (dùng cấu trúc 'one of the most...', so sánh nhất + in/of, và ít nhất 1 bất quy tắc best/worst).",
model:"<b>Bài mẫu:</b> Vietnam is one of the most beautiful countries in Southeast Asia. Ha Noi, the capital, is one of the oldest cities in the region. Vietnamese food is among the healthiest and most flavourful in the world. For me, the best time to visit is autumn, when the weather is the most pleasant. The biggest challenge for tourists is often the traffic. Still, the friendliest people I have ever met live here.<br><b>Tự kiểm tra:</b> 'the + -est' / 'the most + dài'? 'one of the most + danh từ số nhiều'? best/friendliest đúng? Đi với in/of? Không có lỗi kép 'most -est'?"}]},
adv:{mcq:[
{q:"Trong Writing Task 1, câu nào mô tả giá trị CAO NHẤT chính xác nhất?",opts:["The highest figure was recorded in 2020, at approximately 5 million.","The most high figure was in 2020.","2020 had the more high figure.","The figure of 2020 was the highest than others."],a:0,why:"<b>Đúng: A.</b> 'The highest figure was recorded in...' — so sánh nhất chuẩn + bị động + số liệu. B sai dạng; C sai; D thừa 'than' (so sánh nhất không đi với than)."},
{q:"'This is by far ___ decision we have ever made.'",opts:["the importantest","the most important","the more important","most important"],a:1,why:"<b>Đúng: the most important.</b> 'important' dài → the most important; 'by far' là cụm nhấn mạnh so sánh nhất (vượt trội hẳn). 'by far the best/most...' rất tự nhiên ở band cao."},
{q:"Chọn câu KHÔNG có lỗi:",opts:["It's the most unique product.","It's one of the most innovative products on the market.","It's the innovativest product.","It's more innovative product of all."],a:1,why:"<b>Đúng: B.</b> 'one of the most innovative products' đúng hoàn toàn. A sai logic ('unique' = duy nhất, không có 'most unique'); C sai dạng; D thiếu 'the' và sai cấu trúc."},
{q:"'Air pollution is ___ serious problem facing many cities today.'",opts:["the most","the more","most","the best"],a:0,why:"<b>Đúng: the most.</b> 'the most serious problem' = vấn đề nghiêm trọng nhất. Cấu trúc 'the most + tính từ + danh từ + facing...' rất hữu ích cho Writing Task 2 mở bài."},
{q:"'Of the three options, the last one is ___.'",opts:["the most practical","more practical","the more practical","practical"],a:0,why:"<b>Đúng: the most practical.</b> So sánh trong nhóm 3 → so sánh NHẤT (the most practical). Nếu chỉ 2 option thì mới dùng 'the more practical'. Số lượng đối tượng quyết định dùng hơn hay nhất."}],
writing:[{q:"Viết đoạn nghị luận 8 câu về 'vấn đề quan trọng nhất' mà xã hội/giới trẻ/đất nước bạn đang đối mặt, dùng so sánh nhất đa dạng, cấu trúc 'one of the most', 'by far', và phân biệt đúng hơn/nhất theo số lượng đối tượng.",
model:"<b>Bài mẫu:</b> In my view, education is by far the most important issue facing young people today. Among all the challenges, access to quality learning is the most decisive factor for future success. The best opportunities in life often go to those with the strongest skills. However, one of the biggest problems is that education is not equally available to everyone. In rural areas, schools are frequently the least funded and the worst equipped. Comparing the two, urban students clearly have the greater advantage. Solving this is one of the most difficult but most necessary tasks for any government. Ultimately, the country that invests the most in its people will be the most prosperous.<br><b>Tự kiểm tra:</b> 'the most + dài' / 'the -est'? 'by far the most', 'one of the biggest', 'the least/worst' đúng? Khi chỉ 2 đối tượng dùng 'the greater' (hơn)? Không lỗi kép, không thừa 'than'?"}]}
}}
);

LESSONS.push(
/* ===== BÀI 17 ===== */
{id:"g17",stage:2,title:"Bài 17 · Động từ khiếm khuyết: can / can't / could",
theory:`<h3>1. CAN là gì?</h3>
<p><b>can</b> là "động từ khiếm khuyết" (modal verb) — đứng trước động từ chính để thêm nghĩa: khả năng, xin phép, đề nghị.</p>
<div class="formula">Chủ ngữ + <b>can</b> + động từ NGUYÊN MẪU (mọi chủ ngữ như nhau — KHÔNG thêm s, KHÔNG dùng to/do)</div>
<h3>2. Ba nghĩa chính của CAN</h3>
<ul>
<li><b>Khả năng (biết làm gì):</b> I can speak English. (Tôi biết nói tiếng Anh.)</li>
<li><b>Xin phép / cho phép:</b> Can I use your phone? (Tôi dùng điện thoại của bạn được không?)</li>
<li><b>Đề nghị giúp đỡ:</b> Can I help you? (Tôi giúp gì được cho bạn?)</li>
</ul>
<h3>3. Phủ định & câu hỏi</h3>
<div class="example"><b>Phủ định:</b> cannot = <b>can't</b>. I can't drive. (Tôi không biết lái xe.)<br><b>Câu hỏi:</b> đảo can lên đầu — Can you swim? — Yes, I can. / No, I can't.</div>
<p>Chú ý: KHÔNG dùng do/does với can. Sai: "Do you can?" → Đúng: "Can you?".</p>
<h3>4. COULD — quá khứ của can & lịch sự hơn</h3>
<ul>
<li><b>Khả năng trong quá khứ:</b> When I was young, I could run very fast. (Hồi nhỏ tôi có thể chạy rất nhanh.)</li>
<li><b>Xin phép/đề nghị LỊCH SỰ hơn can:</b> Could you help me, please? (Bạn có thể giúp tôi không? — lịch sự hơn 'Can you').</li>
</ul>
<div class="example"><b>Could you send me the price list?</b><br><span class="vi">Anh gửi tôi bảng giá được không ạ? — 'Could' nhã nhặn hơn 'Can', rất hợp trong công việc và IELTS Speaking.</span></div>
<p class="muted">⚠️ Sau can/could LUÔN là động từ nguyên mẫu (không to, không -s, không -ed): "She can go" (không 'can goes', không 'can to go').</p>`,
levels:{
basic:{mcq:[
{q:"I ___ speak three languages.",opts:["can","cans","can to","do can"],a:0,why:"<b>Đúng: can.</b> can + speak (nguyên mẫu). 'cans'/'can to' đều sai — modal không chia và không có 'to'."},
{q:"___ you help me, please?",opts:["Do","Can","Are","Does"],a:1,why:"<b>Đúng: Can.</b> Đề nghị/xin phép → Can + you + help. Không dùng Do với can."},
{q:"She ___ drive; she never learned.",opts:["can't","doesn't can","can not to","cann't"],a:0,why:"<b>Đúng: can't.</b> cannot = can't. 'doesn't can' sai (không kết hợp do với modal); 'cann't' sai chính tả."},
{q:"When I was a child, I ___ swim very well.",opts:["can","could","cans","can to"],a:1,why:"<b>Đúng: could.</b> Khả năng trong QUÁ KHỨ → could (quá khứ của can)."},
{q:"___ I ask you a question?",opts:["Can","Do","Am","Does"],a:0,why:"<b>Đúng: Can.</b> Xin phép → Can I...? Lịch sự hơn có thể dùng 'Could I'."}],
writing:[{q:"Viết 5 câu về khả năng của bạn (can/can't) và 2 câu đề nghị lịch sự (Could you...?).",
model:"<b>Bài mẫu:</b> I can use Excel and analyse data quickly. I can speak basic English, but I can't write formal reports yet. I could not code at all two years ago, but now I can build simple websites. Could you give me some feedback on my writing? Could you recommend a good grammar book?<br><b>Tự kiểm tra:</b> Sau can/could/can't là NGUYÊN MẪU? Không thêm s, không 'to', không kết hợp do? 'Could you...?' cho đề nghị lịch sự?"}]},
mid:{mcq:[
{q:"'___ you tell me the price of this model?' (lịch sự trong công việc)",opts:["Do","Could","Are","Does"],a:1,why:"<b>Đúng: Could.</b> 'Could you...' lịch sự hơn 'Can you', phù hợp giao tiếp công việc/khách hàng."},
{q:"He ___ finish the report on time because he had too much work.",opts:["can't","couldn't","can not","doesn't could"],a:1,why:"<b>Đúng: couldn't.</b> Không thể làm gì trong QUÁ KHỨ ('had too much work') → couldn't (could not)."},
{q:"Chọn câu ĐÚNG:",opts:["She can speaks French.","She can speak French.","She cans speak French.","She can to speak French."],a:1,why:"<b>Đúng: B.</b> can + speak (nguyên mẫu, không s, không to). Modal verb không bao giờ chia."},
{q:"'I'm sorry, I ___ come to the meeting tomorrow. I'll be away.'",opts:["can't","couldn't","don't can","can not to"],a:0,why:"<b>Đúng: can't.</b> Không thể làm gì trong tương lai gần → can't (hiện tại). 'couldn't' dùng cho quá khứ."},
{q:"'___ I take a message?' — cách nói lịch sự khi trả lời điện thoại:",opts:["Do","Can / Could","Am","Does"],a:1,why:"<b>Đúng: Can / Could.</b> 'Can/Could I take a message?' — mẫu câu cố định khi nghe điện thoại hộ ai đó. Cả can và could đều dùng được, could lịch sự hơn."}],
writing:[{q:"Viết đoạn hội thoại 6 câu chăm sóc khách hàng: khách hỏi bạn có thể làm gì cho họ (giao hàng, giảm giá, đổi trả), bạn trả lời lịch sự bằng can/could/can't.",
model:"<b>Bài mẫu:</b><br>Khách: Could you deliver this TV to my house?<br>Bạn: Of course. We can deliver it tomorrow morning.<br>Khách: Can I pay by card?<br>Bạn: Certainly, you can pay by card or cash.<br>Khách: Could you give me a small discount?<br>Bạn: I'm sorry, I can't reduce the price further, but I can offer free installation.<br><b>Tự kiểm tra:</b> Could you/Can I dùng đúng cho đề nghị/xin phép? Sau can/could là nguyên mẫu? can't cho từ chối lịch sự?"}]},
adv:{mcq:[
{q:"'The data ___ be interpreted in several ways.' (có thể được diễn giải)",opts:["can","cans","can to","could to"],a:0,why:"<b>Đúng: can.</b> can + be interpreted (bị động nguyên mẫu). 'can be + V3' là cấu trúc học thuật rất hữu ích: diễn tả khả năng ở dạng bị động."},
{q:"Trong IELTS Speaking, để nói về khả năng CÓ THỂ xảy ra (không chắc chắn), câu nào tự nhiên nhất?",opts:["Technology can solve many problems, but it can also create new ones.","Technology cans solve problems.","Technology can to solve problems.","Technology could solving problems."],a:0,why:"<b>Đúng: A.</b> 'can... but can also...' diễn tả khả năng hai mặt, tư duy cân bằng band cao. Các đáp án khác sai dạng modal."},
{q:"'___ it be argued that social media does more harm than good?' (Liệu có thể lập luận rằng...)",opts:["Can","Could","Both A and B are acceptable","Do"],a:2,why:"<b>Đúng: cả Can và Could đều được.</b> 'Could it be argued that...' (could nhã và giả định hơn) và 'Can it be argued that...' đều mở đầu câu hỏi tu từ học thuật. Cấu trúc 'it can/could be argued/said that' rất mạnh trong Writing."},
{q:"'When I first started, I ___ barely write a full sentence in English.'",opts:["can","could","can't","couldn't"],a:1,why:"<b>Đúng: could.</b> Khả năng (hạn chế) trong quá khứ → could. 'could barely' = hầu như không thể. Kể về sự tiến bộ trong Speaking Part 2 rất hay dùng cấu trúc này."},
{q:"Chọn câu diễn đạt khả năng lịch sự và trang trọng nhất cho email công việc:",opts:["Can you send me the report? Now.","I was wondering if you could possibly send me the report.","You can send me the report.","Send me the report, you could.","Could send me report you?"],a:1,why:"<b>Đúng: B.</b> 'I was wondering if you could possibly...' — mức độ lịch sự cao nhất, chuẩn email công việc trang trọng. 'could' + 'possibly' + 'I was wondering' làm mềm yêu cầu. Các câu khác quá trực tiếp hoặc sai cấu trúc."}],
writing:[{q:"Viết đoạn 8 câu (kiểu Speaking Part 3 hoặc Writing) thảo luận công nghệ CÓ THỂ giúp gì và KHÔNG THỂ làm gì cho giáo dục, dùng đa dạng can/can't/could + cấu trúc bị động 'can be done'.",
model:"<b>Bài mẫu:</b> Technology can transform education in many powerful ways. For example, online platforms can provide access to knowledge for students in remote areas. Lessons can be recorded and watched at any time, which is extremely convenient. However, technology alone cannot replace good teachers. A machine can deliver information, but it can't inspire or motivate a child the way a human can. In the past, students could only learn from physical books, so the change is remarkable. Still, we could argue that too much screen time may harm young learners. Overall, technology can support education, but it cannot solve every problem on its own.<br><b>Tự kiểm tra:</b> Sau can/can't/could là nguyên mẫu? 'can be + V3' (bị động) đúng? could cho quá khứ/giả định? Diễn tả được cả khả năng và giới hạn?"}]}
}},
/* ===== BÀI 18 ===== */
{id:"g18",stage:2,title:"Bài 18 · must / have to / should (nghĩa vụ & lời khuyên)",
theory:`<h3>1. Ba modal về nghĩa vụ — mức độ khác nhau</h3>
<table><tr><th>Từ</th><th>Nghĩa</th><th>Mức độ</th></tr>
<tr><td><b>must</b></td><td>phải (bắt buộc, người nói tự thấy cần)</td><td>mạnh, chủ quan</td></tr>
<tr><td><b>have to</b></td><td>phải (bắt buộc từ quy định/hoàn cảnh bên ngoài)</td><td>mạnh, khách quan</td></tr>
<tr><td><b>should</b></td><td>nên (lời khuyên, gợi ý)</td><td>nhẹ</td></tr></table>
<div class="formula">must / should + động từ NGUYÊN MẪU · have to = have/has to + nguyên mẫu</div>
<h3>2. Ví dụ phân biệt</h3>
<div class="example"><b>I must finish this today.</b> (tôi TỰ thấy phải xong — thôi thúc nội tâm)<br><b>I have to wear a uniform at work.</b> (quy định công ty bắt buộc — bên ngoài)<br><b>You should see a doctor.</b> (lời khuyên — nên thôi, không bắt buộc)</div>
<h3>3. Phủ định — ĐIỂM BẪY QUAN TRỌNG</h3>
<table><tr><th>Phủ định</th><th>Nghĩa</th></tr>
<tr><td><b>mustn't</b> (must not)</td><td>CẤM (không được phép làm)</td></tr>
<tr><td><b>don't/doesn't have to</b></td><td>KHÔNG CẦN (không bắt buộc, nhưng làm cũng được)</td></tr>
<tr><td><b>shouldn't</b></td><td>không nên</td></tr></table>
<div class="example"><b>You mustn't smoke here.</b> = Cấm hút thuốc.<br><b>You don't have to come.</b> = Bạn không cần đến (tùy bạn).<br><span class="vi">Hai câu này nghĩa HOÀN TOÀN KHÁC nhau — đây là bẫy kinh điển.</span></div>
<h3>4. have to có thì (must thì không)</h3>
<p>Quá khứ: had to (I had to work). Tương lai: will have to. — 'must' hầu như chỉ dùng ở hiện tại; muốn nói quá khứ/tương lai phải mượn 'have to'.</p>
<p class="muted">⚠️ Sau must/should là nguyên mẫu, KHÔNG 'to': "You must go" (không 'must to go'). Nhưng 'have TO' thì có 'to': "I have to go".</p>`,
levels:{
basic:{mcq:[
{q:"You ___ study hard to pass the exam.",opts:["must","must to","musts","do must"],a:0,why:"<b>Đúng: must.</b> must + study (nguyên mẫu). 'must to'/'musts' đều sai — modal không có 'to', không chia."},
{q:"I ___ wear a uniform at work. It's a company rule.",opts:["should","have to","must to","having to"],a:1,why:"<b>Đúng: have to.</b> Quy định BÊN NGOÀI (company rule) → have to."},
{q:"You look tired. You ___ get some rest.",opts:["should","must not","have to","shouldn't"],a:0,why:"<b>Đúng: should.</b> Lời khuyên nhẹ nhàng → should."},
{q:"You ___ smoke in the hospital. It's forbidden.",opts:["don't have to","mustn't","shouldn't","should"],a:1,why:"<b>Đúng: mustn't.</b> CẤM (forbidden) → mustn't. 'don't have to' nghĩa 'không cần' — sai ở đây."},
{q:"It's Sunday, so I ___ go to work.",opts:["mustn't","don't have to","shouldn't","must"],a:1,why:"<b>Đúng: don't have to.</b> Không CẦN đi làm (nhưng không bị cấm) → don't have to. 'mustn't' nghĩa 'bị cấm' — sai."}],
writing:[{q:"Viết 5 câu về quy định và lời khuyên tại nơi làm việc của bạn (dùng must, have to, should, mustn't, don't have to — mỗi từ ít nhất 1 lần).",
model:"<b>Bài mẫu:</b> Employees have to arrive by 8 a.m. every day. We must check every product before delivery. You should always be polite to customers. Staff mustn't share customer data with anyone. On weekends, we don't have to wear formal clothes.<br><b>Tự kiểm tra:</b> must/should + nguyên mẫu (không to)? have to + nguyên mẫu? mustn't = cấm, don't have to = không cần (đúng nghĩa)?"}]},
mid:{mcq:[
{q:"Phân biệt: 'You ___ tell anyone. It's a secret.'",opts:["don't have to","mustn't","shouldn't have to","don't must"],a:1,why:"<b>Đúng: mustn't.</b> CẤM tiết lộ (bí mật) → mustn't. 'don't have to' (không cần) sẽ sai nghĩa hoàn toàn."},
{q:"Yesterday I ___ work late because of a deadline.",opts:["must","had to","have to","musted"],a:1,why:"<b>Đúng: had to.</b> Nghĩa vụ trong QUÁ KHỨ → had to (must không có dạng quá khứ). 'musted' không tồn tại."},
{q:"'You ___ worry. Everything is under control.'",opts:["mustn't","don't have to","shouldn't","don't should"],a:1,why:"<b>Đúng: don't have to (hoặc needn't).</b> 'You don't have to worry' = bạn không cần lo. Ở ngữ cảnh trấn an, 'don't have to worry' tự nhiên. ('mustn't worry' nghĩa 'cấm lo' — cũng dùng được nhưng nghĩa mạnh hơn; đáp án chuẩn A2 là don't have to.)"},
{q:"Chọn câu ĐÚNG:",opts:["She must to finish it.","She must finish it.","She musts finish it.","She have to finishes it."],a:1,why:"<b>Đúng: B.</b> must + finish (nguyên mẫu, không to). Các đáp án khác sai dạng modal/have to."},
{q:"'Students ___ submit their assignments online; paper copies are not accepted.'",opts:["should","have to","don't have to","shouldn't"],a:1,why:"<b>Đúng: have to.</b> Quy định bắt buộc (chỉ nhận online) → have to. 'should' quá nhẹ cho một quy định cứng."}],
writing:[{q:"Viết đoạn 6 câu đưa lời khuyên cho người mới học tiếng Anh (dùng should/shouldn't cho lời khuyên, must/have to cho điều bắt buộc, don't have to cho điều không cần thiết).",
model:"<b>Bài mẫu:</b> If you want to learn English well, you should practise every day. You must be patient, because progress takes time. You have to make mistakes in order to improve, so don't be afraid of them. You shouldn't compare yourself to others too much. You don't have to learn every word in the dictionary; focus on the most common ones. Above all, you should enjoy the process.<br><b>Tự kiểm tra:</b> should/shouldn't (lời khuyên) + nguyên mẫu? must/have to (bắt buộc)? don't have to (không cần)? Phân biệt đúng sắc thái từng từ?"}]},
adv:{mcq:[
{q:"'The report ___ be submitted by Friday; late submissions will be rejected.'",opts:["should","must","doesn't have to","shouldn't"],a:1,why:"<b>Đúng: must.</b> Quy định cứng có hậu quả rõ (bị từ chối) → must + be submitted (bị động). 'must be + V3' là cấu trúc quy định trang trọng."},
{q:"Trong Writing Task 2, câu khuyến nghị nào MẠNH và trang trọng nhất?",opts:["Governments should really do something about it.","Governments must take immediate action to address this issue.","Governments have to fix it.","Governments should to act."],a:1,why:"<b>Đúng: B.</b> 'must take immediate action to address' — mạnh mẽ, trang trọng, collocation chuẩn. A dùng 'really' văn nói; C thô; D sai ('should to')."},
{q:"'We ___ have prepared a backup plan, but we didn't.' (lẽ ra nên...)",opts:["should","must","should have","have to"],a:2,why:"<b>Đúng: should have.</b> 'should have + V3' = lẽ ra nên (nhưng đã không) — tiếc nuối về quá khứ. Cấu trúc band 6.5+ diễn tả sự hối tiếc, rất hữu ích cho Speaking."},
{q:"Phân biệt sắc thái: câu nào diễn tả suy luận LOGIC (chắc hẳn là)?",opts:["He must be very tired after working all night.","He must work all night.","He should be tired.","He has to be tired."],a:0,why:"<b>Đúng: A.</b> 'must' ở đây KHÔNG phải nghĩa vụ mà là SUY LUẬN chắc chắn: 'chắc hẳn anh ấy mệt' (dựa trên bằng chứng làm cả đêm). 'must + be' để suy đoán logic là cách dùng nâng cao quan trọng."},
{q:"'You ___ worn a seatbelt — you could have been seriously injured.' (Lẽ ra bạn phải...)",opts:["should have","must have","have to","should"],a:0,why:"<b>Đúng: should have.</b> 'should have + V3' = lẽ ra phải (trách nhẹ về quá khứ). Phân biệt với 'must have + V3' (chắc hẳn đã — suy luận). Ngữ cảnh 'could have been injured' cho thấy đây là lời trách/tiếc."}],
writing:[{q:"Viết đoạn nghị luận 8 câu (Writing Task 2) đề xuất giải pháp cho một vấn đề xã hội, dùng: must/should cho khuyến nghị mạnh/nhẹ, 'must be + V3' (bị động), và ít nhất 1 lần 'should have + V3' hoặc 'must + be' (suy luận).",
model:"<b>Bài mẫu:</b> To tackle traffic congestion, governments must invest heavily in public transport. Cities should encourage people to cycle or walk for short journeys. Strict regulations must be introduced to limit the number of private cars in city centres. Drivers should not be allowed to enter certain areas during peak hours. In my view, many cities should have acted on this problem years ago, but it is not too late. The situation must be getting worse in rapidly growing economies. Citizens also have to change their habits, not just wait for the government. Ultimately, both authorities and individuals should share responsibility.<br><b>Tự kiểm tra:</b> must/should + nguyên mẫu cho khuyến nghị? 'must be + V3' bị động đúng? 'should have + V3' cho tiếc nuối? 'must be getting' cho suy luận? Sắc thái mạnh/nhẹ hợp lý?"}]}
}},
/* ===== BÀI 19 ===== */
{id:"g19",stage:2,title:"Bài 19 · Lượng từ: some / any / much / many / a lot of",
theory:`<h3>1. some vs any</h3>
<table><tr><th>Từ</th><th>Dùng khi</th><th>Ví dụ</th></tr>
<tr><td><b>some</b></td><td>câu KHẲNG ĐỊNH (một ít/vài)</td><td>I have some money.</td></tr>
<tr><td><b>any</b></td><td>câu PHỦ ĐỊNH & câu HỎI</td><td>I don't have any money. / Do you have any money?</td></tr></table>
<p>Ngoại lệ: dùng <b>some</b> trong câu hỏi khi MỜI hoặc ĐỀ NGHỊ: "Would you like some tea?" (mời), "Can I have some water?" (xin).</p>
<h3>2. much vs many — đếm được hay không</h3>
<table><tr><th>Từ</th><th>Dùng với</th><th>Ví dụ</th></tr>
<tr><td><b>many</b></td><td>danh từ ĐẾM ĐƯỢC số nhiều</td><td>many books, many people</td></tr>
<tr><td><b>much</b></td><td>danh từ KHÔNG đếm được</td><td>much water, much money, much time</td></tr></table>
<p>much/many thường dùng trong câu phủ định và câu hỏi: "How many products?", "There isn't much time."</p>
<h3>3. a lot of / lots of — dùng cho CẢ HAI loại</h3>
<div class="example"><b>a lot of</b> books (đếm được) · <b>a lot of</b> money (không đếm được)<br><span class="vi">'a lot of' tiện vì dùng được cho mọi danh từ, hợp câu khẳng định. Trong câu khẳng định, người ta thường dùng 'a lot of' thay vì 'much'.</span></div>
<h3>4. a few vs a little</h3>
<table><tr><th>Từ</th><th>Nghĩa</th><th>Dùng với</th></tr>
<tr><td><b>a few</b></td><td>một vài (ít nhưng đủ)</td><td>đếm được: a few friends</td></tr>
<tr><td><b>a little</b></td><td>một chút</td><td>không đếm được: a little sugar</td></tr></table>
<p class="muted">⚠️ Nhớ theo cặp: many/a few → đếm được (số nhiều). much/a little → không đếm được. Xác định danh từ đếm được hay không (Bài 7) là chìa khóa chọn đúng lượng từ.</p>`,
levels:{
basic:{mcq:[
{q:"I need ___ help with this.",opts:["some","any","many","much"],a:0,why:"<b>Đúng: some.</b> Câu khẳng định → some. ('help' không đếm được nên không dùng many.)"},
{q:"Do you have ___ questions?",opts:["some","any","much","a little"],a:1,why:"<b>Đúng: any.</b> Câu HỎI → any. 'questions' đếm được."},
{q:"There isn't ___ water in the bottle.",opts:["many","much","a few","some"],a:1,why:"<b>Đúng: much.</b> 'water' không đếm được + câu phủ định → much."},
{q:"How ___ people came to the meeting?",opts:["much","many","a little","any"],a:1,why:"<b>Đúng: many.</b> 'people' đếm được số nhiều → many. 'How many' hỏi số lượng đếm được."},
{q:"We sold ___ TVs last month.",opts:["much","a lot of","a little","any"],a:1,why:"<b>Đúng: a lot of.</b> Câu khẳng định + 'TVs' → a lot of (dùng được cho đếm được). 'much' không dùng với đếm được."}],
writing:[{q:"Viết 5 câu về cửa hàng của bạn dùng: some, any, many, much, a lot of (mỗi từ ít nhất 1 lần, chú ý đếm được vs không đếm được).",
model:"<b>Bài mẫu:</b> We have some new products this week. We don't have any washing machines in stock right now. Many customers ask about air conditioners in summer. There isn't much space in the storage room. We make a lot of money during holiday sales.<br><b>Tự kiểm tra:</b> some (khẳng định), any (phủ định/hỏi)? many + đếm được, much + không đếm? a lot of dùng cho cả hai? Danh từ đếm được có 's'?"}]},
mid:{mcq:[
{q:"Would you like ___ coffee?",opts:["any","some","many","a few"],a:1,why:"<b>Đúng: some.</b> Ngoại lệ: dùng 'some' trong câu hỏi khi MỜI. 'coffee' không đếm được nên không dùng many/a few."},
{q:"I have ___ friends in Ha Noi, so I visit often.",opts:["a little","much","a few","any"],a:2,why:"<b>Đúng: a few.</b> 'friends' đếm được → a few (một vài). 'a little' dùng cho không đếm được."},
{q:"There is ___ sugar left; we need to buy more.",opts:["a few","little","many","any"],a:1,why:"<b>Đúng: little.</b> 'little' (rất ít, không đủ) + không đếm được (sugar). Khác 'a little' (một chút, đủ dùng). 'little' không có 'a' mang nghĩa TIÊU CỰC (thiếu)."},
{q:"'How ___ time do we have before the deadline?'",opts:["many","much","a few","any"],a:1,why:"<b>Đúng: much.</b> 'time' không đếm được → How much time. ('How many' chỉ cho đếm được.)"},
{q:"Chọn câu ĐÚNG:",opts:["I don't have many informations.","I don't have much information.","I don't have many information.","I have any information."],a:1,why:"<b>Đúng: B.</b> 'information' không đếm được → much + không có 's'. A, C sai (informations + many); D sai (any trong câu khẳng định)."}],
writing:[{q:"Viết đoạn 6 câu mô tả tình hình kinh doanh gần đây (dùng many/much/a lot of, a few/a little, và phân biệt little/few (tiêu cực) với a little/a few (tích cực)).",
model:"<b>Bài mẫu:</b> Business has been quite good this quarter. We sold a lot of televisions and made a good profit. However, we had a few problems with late deliveries. There was little time to prepare for the holiday rush, which caused some stress. Fortunately, we still have a little money left to invest in marketing. With a few improvements, next quarter should be even better.<br><b>Tự kiểm tra:</b> many/a few + đếm được, much/a little + không đếm? 'little/few' (thiếu, tiêu cực) vs 'a little/a few' (đủ, tích cực) dùng đúng sắc thái? a lot of cho khẳng định?"}]},
adv:{mcq:[
{q:"Trong Writing học thuật, cách diễn đạt nào TRANG TRỌNG hơn 'a lot of problems'?",opts:["much problems","numerous problems / a great deal of","many much problems","lots problems"],a:1,why:"<b>Đúng: numerous problems / a great deal of.</b> 'numerous' (đếm được) và 'a great deal of' (không đếm) trang trọng hơn 'a lot of' trong văn viết. 'a considerable amount of', 'a significant number of' cũng là lựa chọn band 7."},
{q:"'___ research has been conducted on this topic in recent years.'",opts:["Many","A great deal of","A few","Numerous"],a:1,why:"<b>Đúng: A great deal of.</b> 'research' không đếm được → 'a great deal of / much'. 'many/a few/numerous' chỉ cho đếm được. Đây là bẫy: nhiều danh từ học thuật (research, evidence, information) không đếm được."},
{q:"'Only ___ students passed the difficult exam.' (rất ít — nghĩa tiêu cực)",opts:["a few","few","little","much"],a:1,why:"<b>Đúng: few.</b> 'few' (không có 'a') = rất ít, nhấn sự THIẾU/HIẾM, mang nghĩa tiêu cực. 'a few' = một vài (trung tính/tích cực). 'Only few students passed' nhấn mạnh kết quả kém."},
{q:"Chọn câu học thuật CHÍNH XÁC nhất:",opts:["There is much evidences to support this.","There is considerable evidence to support this claim.","There are many evidence to support this.","There is a lot evidence to support this."],a:1,why:"<b>Đúng: B.</b> 'considerable evidence' (evidence không đếm, không 's', đi với considerable/much) — trang trọng và đúng. A sai ('evidences'); C sai (many + evidence); D thiếu 'of' (a lot OF)."},
{q:"'A significant ___ of consumers now prefer online shopping.'",opts:["amount","number","many","much"],a:1,why:"<b>Đúng: number.</b> 'consumers' ĐẾM ĐƯỢC → 'a significant number of'. 'amount of' chỉ dùng cho KHÔNG đếm được (a significant amount of money). Phân biệt number of (đếm được) vs amount of (không đếm) là điểm band 7."}],
writing:[{q:"Viết đoạn nghị luận 8 câu (Writing Task 2) về một xu hướng, dùng lượng từ HỌC THUẬT đa dạng: a significant number of / a great deal of / considerable / numerous, và phân biệt đúng number of vs amount of, few/little (tiêu cực) vs a few/a little.",
model:"<b>Bài mẫu:</b> In recent years, a significant number of people have started working from home. A great deal of research suggests that remote work can increase productivity. Numerous companies have reported considerable savings on office costs. However, there is little evidence that it suits every type of job. In fact, few employees enjoy the isolation that comes with it. A considerable amount of communication is lost when teams rarely meet in person. Only a few industries have fully embraced this model so far. Overall, while remote work brings many benefits, it also creates a number of new challenges.<br><b>Tự kiểm tra:</b> 'a significant number of' + đếm được, 'a great deal of/amount of' + không đếm? numerous/considerable đúng loại danh từ? 'little/few' (tiêu cực) vs 'a few/a little'? Không thêm 's' vào research/evidence?"}]}
}},
/* ===== BÀI 20 ===== */
{id:"g20",stage:2,title:"Bài 20 · Đại từ tân ngữ (me/him/her/us/them) & ôn tập Chặng 2",
theory:`<h3>1. Đại từ CHỦ NGỮ vs TÂN NGỮ</h3>
<p>Chủ ngữ (làm hành động) đứng ĐẦU câu; tân ngữ (nhận hành động) đứng SAU động từ hoặc giới từ.</p>
<table><tr><th>Chủ ngữ</th><th>Tân ngữ</th><th>Ví dụ</th></tr>
<tr><td>I</td><td><b>me</b></td><td>She called me.</td></tr>
<tr><td>you</td><td><b>you</b></td><td>I saw you.</td></tr>
<tr><td>he</td><td><b>him</b></td><td>I know him.</td></tr>
<tr><td>she</td><td><b>her</b></td><td>He helped her.</td></tr>
<tr><td>it</td><td><b>it</b></td><td>I bought it.</td></tr>
<tr><td>we</td><td><b>us</b></td><td>They invited us.</td></tr>
<tr><td>they</td><td><b>them</b></td><td>I met them.</td></tr></table>
<h3>2. Sau GIỚI TỪ luôn dùng tân ngữ</h3>
<div class="example"><b>This gift is for her.</b> (không 'for she')<br><b>Come with us.</b> (không 'with we')<br><b>I'm talking to him.</b> (không 'to he')</div>
<h3>3. Lỗi kinh điển: "between you and I" (SAI)</h3>
<p>Sau giới từ 'between' phải dùng tân ngữ: <b>between you and me</b>. Nhiều người bản ngữ cũng sai câu này!</p>
<h3>4. Ôn tập Chặng 2 — bạn đã học</h3>
<ul>
<li>Quá khứ đơn: was/were, V-ed & bất quy tắc, did/didn't (Bài 11–13)</li>
<li>Tương lai: will & be going to (Bài 14)</li>
<li>So sánh hơn & nhất: -er/more, -est/the most (Bài 15–16)</li>
<li>Modal: can/could, must/have to/should (Bài 17–18)</li>
<li>Lượng từ: some/any, much/many, a few/a little (Bài 19)</li>
</ul>
<p class="muted">⚠️ Đừng nhầm đại từ tân ngữ với TÍNH TỪ sở hữu (Bài 10): her là tân ngữ (I saw her) NHƯNG cũng là tính từ sở hữu (her book). Phân biệt qua vị trí: sau động từ/giới từ = tân ngữ; trước danh từ = sở hữu.</p>`,
levels:{
basic:{mcq:[
{q:"I saw ___ at the store yesterday. (anh ấy)",opts:["he","him","his","he's"],a:1,why:"<b>Đúng: him.</b> Sau động từ 'saw' → tân ngữ 'him'. 'he' là chủ ngữ (đứng đầu câu)."},
{q:"This present is for ___. (bạn ấy - cô)",opts:["she","her","hers","she's"],a:1,why:"<b>Đúng: her.</b> Sau giới từ 'for' → tân ngữ 'her'."},
{q:"Can you help ___? (chúng tôi)",opts:["we","us","our","ours"],a:1,why:"<b>Đúng: us.</b> Sau động từ 'help' → tân ngữ 'us'."},
{q:"I called ___ but they didn't answer. (họ)",opts:["they","them","their","theirs"],a:1,why:"<b>Đúng: them.</b> Sau 'called' → tân ngữ 'them'."},
{q:"Come with ___! (tôi)",opts:["I","me","my","mine"],a:1,why:"<b>Đúng: me.</b> Sau giới từ 'with' → tân ngữ 'me'."}],
writing:[{q:"Viết 5 câu dùng đại từ tân ngữ (me, him, her, us, them) — mỗi câu 1 đại từ khác nhau, ít nhất 2 câu có tân ngữ sau giới từ.",
model:"<b>Bài mẫu:</b> My manager trusts me with important tasks. I sent him the report this morning. Customers often ask her for advice. The company gave us a bonus last month. I work with them every day.<br><b>Tự kiểm tra:</b> Sau động từ/giới từ dùng TÂN NGỮ (me/him/her/us/them), không dùng chủ ngữ (I/he/she/we/they)?"}]},
mid:{mcq:[
{q:"Between you and ___, I think the plan will fail.",opts:["I","me","myself","mine"],a:1,why:"<b>Đúng: me.</b> Sau 'between' → tân ngữ: 'between you and me'. 'between you and I' là lỗi rất phổ biến nhưng SAI."},
{q:"My boss and ___ went to the meeting together.",opts:["me","I","myself","mine"],a:1,why:"<b>Đúng: I.</b> Đây là CHỦ NGỮ của câu (làm hành động 'went') → 'I'. Mẹo: bỏ 'My boss and' → 'I went' (không 'Me went'). Vị trí quyết định, không phải 'lịch sự'."},
{q:"She explained the problem to ___. (tôi và anh ấy)",opts:["I and he","me and him","he and I","him and I"],a:1,why:"<b>Đúng: me and him.</b> Sau giới từ 'to' → cả hai đều tân ngữ: me, him. (Trang trọng hơn: 'him and me'.)"},
{q:"Chọn câu ĐÚNG:",opts:["Her and me are friends.","She and I are friends.","Her and I are friends.","She and me are friends."],a:1,why:"<b>Đúng: B.</b> Chủ ngữ của câu → 'She and I' (cả hai là chủ ngữ). Mẹo: 'She is / I am' → 'She and I'. 'Her and me' là tân ngữ, sai vị trí."},
{q:"I don't know ___. Can you introduce me to ___? (cô ấy / cô ấy)",opts:["her / she","she / her","her / her","she / she"],a:2,why:"<b>Đúng: her / her.</b> 'know her' (sau động từ) và 'to her' (sau giới từ) — cả hai tân ngữ. 'her' vừa là tân ngữ vừa là tính từ sở hữu, ở đây là tân ngữ."}],
writing:[{q:"Viết đoạn 6 câu kể về mối quan hệ với đồng nghiệp/bạn bè, dùng đúng cả đại từ chủ ngữ (khi làm hành động) và tân ngữ (khi nhận hành động/sau giới từ), gồm 1 câu 'between... and me'.",
model:"<b>Bài mẫu:</b> My colleague Vinh and I work closely together. He helps me with coding, and I help him with data analysis. Between you and me, he is the smartest person on our team. Our manager often gives us difficult projects because she trusts us. I really enjoy working with them. They make every day more interesting for me.<br><b>Tự kiểm tra:</b> Chủ ngữ (He, I, She, They) đứng đầu/làm hành động? Tân ngữ (me, him, us, them) sau động từ/giới từ? 'between you and me' đúng?"}]},
adv:{mcq:[
{q:"'It was ___ who first noticed the pricing error.' (chính tôi)",opts:["me","I","myself","mine"],a:1,why:"<b>Đúng: I.</b> Trong cấu trúc nhấn mạnh 'It was + đại từ + who...', văn phong trang trọng dùng CHỦ NGỮ 'I' (It was I who...). Văn nói thường dùng 'me', nhưng chuẩn ngữ pháp và học thuật là 'I'. Điểm tinh tế band 7."},
{q:"'The award was given to my team and ___.'",opts:["I","me","myself","mine"],a:1,why:"<b>Đúng: me.</b> Sau giới từ 'to' → tân ngữ 'me' (to my team and me). Bẫy: nhiều người chọn 'I' vì tưởng lịch sự hơn — nhưng sau giới từ luôn là tân ngữ."},
{q:"Chọn câu KHÔNG có lỗi:",opts:["Him and his brother started the company.","He and his brother started the company.","Me and him are partners.","Her works harder than me.","Them arrived late."],a:1,why:"<b>Đúng: B.</b> 'He and his brother' là chủ ngữ → dùng 'He'. A sai ('Him' chủ ngữ); C sai ('Me... are'); D sai ('Her works'); E sai ('Them arrived')."},
{q:"'She is much more experienced than ___.' (so sánh — văn trang trọng)",opts:["me","I","I am","both I and I am acceptable"],a:3,why:"<b>Đúng: cả 'I' và 'I am' đều chấp nhận được.</b> Sau 'than' trong văn TRANG TRỌNG dùng chủ ngữ + trợ động từ: 'than I am' (đầy đủ) hoặc 'than I'. Văn nói dùng 'than me'. IELTS Writing an toàn nhất là 'than I am'."},
{q:"'The manager asked my colleague and ___ to prepare the report.'",opts:["I","me","myself","mine"],a:1,why:"<b>Đúng: me.</b> Tân ngữ của 'asked' → 'me' (asked my colleague and me). Mẹo: bỏ 'my colleague and' → 'asked me' (không 'asked I')."}],
writing:[{q:"Viết đoạn tự đánh giá 8 câu về hành trình học Chặng 2 của bạn: bạn ĐÃ học được gì (quá khứ đơn), SẼ làm gì tiếp (tương lai), so sánh trình độ trước và giờ (so sánh hơn), điều bạn CÓ THỂ/NÊN làm (modal) — dùng đúng đại từ chủ ngữ & tân ngữ xuyên suốt.",
model:"<b>Bài mẫu:</b> Over the past few weeks, I studied all ten lessons of this stage, and they helped me a lot. Before, I couldn't use the past tense correctly, but now I can. My grammar is much stronger than it was, and I feel more confident than before. My teacher — well, this website — explained everything clearly to me. Next, I'm going to review the lessons I found difficult and practise them again. I should focus more on irregular verbs, because I still make some mistakes with them. Between you and me, comparatives were the easiest part for me. I believe these foundations will help me reach the next stage.<br><b>Tự kiểm tra:</b> Quá khứ (studied, couldn't, was)? Tương lai (I'm going to, will)? So sánh (stronger, more confident than)? Modal (can, should)? Đại từ: me/them (tân ngữ) vs I (chủ ngữ) đúng vị trí? 'between you and me'?"}]}
}}
);

TESTS.push(
{id:"t4",stage:2,title:"Kiểm tra 4 — Quá khứ đơn (Bài 11–13)",desc:"12 câu · was/were, V-ed & bất quy tắc, did/didn't",
 qs:[
 {q:"I ___ tired after work yesterday.",opts:["was","were","am","did"],a:0,skill:"pastbe",why:"'I' → was; 'yesterday' quá khứ."},
 {q:"They ___ at the party last night.",opts:["was","were","are","did"],a:1,skill:"pastbe",why:"'They' → were."},
 {q:"She ___ a new phone last week.",opts:["buy","buyed","bought","buys"],a:2,skill:"pastverb",why:"'buy' bất quy tắc → bought."},
 {q:"We ___ to the cinema on Sunday.",opts:["go","went","goed","gone"],a:1,skill:"pastverb",why:"'go' → went (bất quy tắc)."},
 {q:"He ___ hard for the test.",opts:["studyed","studied","study","studies"],a:1,skill:"pastverb",why:"'study' → studied (y→ied)."},
 {q:"I ___ go to work yesterday.",opts:["didn't","don't","wasn't","not"],a:0,skill:"pastq",why:"Phủ định quá khứ → didn't + go (nguyên mẫu)."},

/* ===== BÀI 21 ===== */
{id:"g21",stage:3,title:"Bài 21 · Hiện tại hoàn thành (present perfect)",
theory:`<h3>1. Công thức</h3>
<div class="formula">Chủ ngữ + <b>have / has</b> + <b>V3</b> (quá khứ phân từ)</div>
<p>I/you/we/they → <b>have</b>. He/she/it → <b>has</b>. V3 là cột thứ 3 của động từ: go→gone, see→seen, do→done, be→been. Động từ quy tắc: V3 = V-ed (worked, finished).</p>
<h3>2. Khi nào dùng? — ĐÂY LÀ ĐIỂM CỐT LÕI</h3>
<p>Hiện tại hoàn thành nối QUÁ KHỨ với HIỆN TẠI. Hành động xảy ra trong quá khứ nhưng <b>còn liên quan/ảnh hưởng tới bây giờ</b>, và thường <b>KHÔNG nói rõ thời điểm</b>.</p>
<ul>
<li><b>Kinh nghiệm sống (đã từng):</b> I have visited Japan. (Tôi đã từng đến Nhật — không quan trọng khi nào.)</li>
<li><b>Việc vừa xong, còn kết quả:</b> She has finished the report. (Cô ấy làm xong rồi — giờ báo cáo đã sẵn sàng.)</li>
<li><b>Bắt đầu quá khứ, kéo dài đến giờ:</b> We have lived here for ten years. (Vẫn đang sống ở đây.)</li>
</ul>
<h3>3. Trạng từ đi kèm (dấu hiệu nhận biết)</h3>
<table><tr><th>Từ</th><th>Nghĩa & vị trí</th><th>Ví dụ</th></tr>
<tr><td><b>ever</b></td><td>đã từng (trong câu hỏi)</td><td>Have you ever eaten sushi?</td></tr>
<tr><td><b>never</b></td><td>chưa bao giờ</td><td>I have never been abroad.</td></tr>
<tr><td><b>already</b></td><td>đã rồi (khẳng định)</td><td>I have already done it.</td></tr>
<tr><td><b>yet</b></td><td>chưa/đã…chưa (cuối câu phủ định & hỏi)</td><td>She hasn't arrived yet.</td></tr>
<tr><td><b>just</b></td><td>vừa mới</td><td>They have just left.</td></tr>
<tr><td><b>for / since</b></td><td>trong/từ khi (khoảng thời gian)</td><td>for two years / since 2020</td></tr></table>
<h3>4. Phủ định & câu hỏi</h3>
<div class="example"><b>Phủ định:</b> have not = haven't · has not = hasn't. I haven't seen him.<br><b>Câu hỏi:</b> Have you finished? — Yes, I have. / No, I haven't.<br><b>Wh-:</b> What have you done? / How long has she worked here?</div>
<p class="muted">⚠️ Lỗi phổ biến: (1) dùng V2 thay V3 ("I have went" → phải "have GONE"); (2) quên has cho he/she/it ("She have" → "She HAS"); (3) đặt 'yet' sai chỗ. Nhớ: sau have/has LUÔN là V3.</p>`,
levels:{
basic:{mcq:[
{q:"I ___ finished my homework.",opts:["have","has","am","did"],a:0,why:"<b>Đúng: have.</b> 'I' → have + finished (V3)."},
{q:"She ___ never been to London.",opts:["have","has","is","did"],a:1,why:"<b>Đúng: has.</b> 'She' → has + been. 'never' báo hiệu hiện tại hoàn thành."},
{q:"Chọn dạng V3 đúng của 'go':",opts:["went","gone","goed","going"],a:1,why:"<b>Đúng: gone.</b> go→went (V2)→gone (V3). Sau have/has dùng V3 = gone."},
{q:"Have you ___ eaten Vietnamese pho?",opts:["never","ever","yet","just"],a:1,why:"<b>Đúng: ever.</b> 'Have you ever...?' = bạn đã từng...? 'ever' dùng trong câu hỏi về kinh nghiệm."},
{q:"They ___ just arrived.",opts:["have","has","are","did"],a:0,why:"<b>Đúng: have.</b> 'They' → have + just + arrived (V3)."}],
writing:[{q:"Viết 5 câu về kinh nghiệm/trải nghiệm của bạn dùng hiện tại hoàn thành (ít nhất 1 câu với 'never', 1 câu với 'already/just', 1 câu hỏi 'Have you ever...?').",
model:"<b>Bài mẫu:</b> I have worked in electronics retail for several years. I have never studied abroad, but I would like to. I have already learned two stages of grammar on this website. My colleague has just started a new project. Have you ever tried to learn English online?<br><b>Tự kiểm tra:</b> have/has đúng ngôi? Sau have/has là V3 (worked, studied, learned, started, tried)? Trạng từ (never/already/just) đặt giữa have và V3?"}]},
mid:{mcq:[
{q:"She ___ the email, so you don't need to send it again.",opts:["already sent","has already sent","have already sent","already has sent"],a:1,why:"<b>Đúng: has already sent.</b> 'She' → has; 'already' đứng GIỮA has và V3 (sent). Trật tự: has + already + V3."},
{q:"'___ they finished the project ___?'",opts:["Have / yet","Has / yet","Have / already","Did / yet"],a:0,why:"<b>Đúng: Have / yet.</b> 'they' → Have; 'yet' đứng CUỐI câu hỏi/phủ định = 'đã…chưa?'."},
{q:"I ___ him since we graduated.",opts:["haven't seen","didn't see","don't see","haven't saw"],a:0,why:"<b>Đúng: haven't seen.</b> 'since' + mốc quá khứ đến giờ → hiện tại hoàn thành. V3 của see = seen (không 'saw')."},
{q:"We ___ in this house for fifteen years.",opts:["live","lived","have lived","are living"],a:2,why:"<b>Đúng: have lived.</b> 'for fifteen years' + vẫn đang sống → hiện tại hoàn thành 'have lived'."},
{q:"Chọn câu ĐÚNG:",opts:["He has wrote three reports today.","He has written three reports today.","He have written three reports.","He has write three reports."],a:1,why:"<b>Đúng: B.</b> has + written (V3 của write). 'wrote' là V2 (sai sau has); C sai 'have'; D sai 'write'."}],
writing:[{q:"Viết đoạn 6 câu về những thành tựu/thay đổi trong công việc hoặc học tập của bạn gần đây (dùng hiện tại hoàn thành với already/yet/just/for/since, chú ý V3).",
model:"<b>Bài mẫu:</b> My English has improved a lot since I started studying seriously. I have already completed twenty grammar lessons, and I have just begun the B1 stage. I haven't taken a real IELTS test yet, but I feel more confident. For the past three months, I have practised writing almost every day. My manager has noticed my progress and has given me more responsibility. Overall, I have learned that consistency matters more than talent.<br><b>Tự kiểm tra:</b> Sau have/has là V3? since + mốc, for + khoảng? already/just giữa have và V3, yet cuối câu? Có nối quá khứ với hiện tại?"}]},
adv:{mcq:[
{q:"'This ___ one of the most challenging projects I ___ ever ___.'",opts:["is / have / worked on","is / have / working","was / did / work","is / has / worked on"],a:0,why:"<b>Đúng: is / have / worked on.</b> Cấu trúc kinh điển: 'This is one of the best/worst... (that) I have ever + V3'. Mệnh đề quan hệ dùng hiện tại hoàn thành với 'ever'. Rất hữu ích cho Speaking Part 2."},
{q:"Trong IELTS Writing, câu nào diễn tả ĐÚNG một xu hướng kéo dài đến hiện tại?",opts:["The number of users grew significantly over the past decade.","The number of users has grown significantly over the past decade.","The number of users grows over the past decade.","The number of users is growing over the past decade."],a:1,why:"<b>Đúng: B.</b> 'over the past decade' (khoảng thời gian kéo dài ĐẾN hiện tại) → hiện tại hoàn thành 'has grown'. 'grew' (A) ngắt kết nối với hiện tại. Cụm 'over the past/last + thời gian' luôn đi với perfect."},
{q:"'Never before ___ such rapid technological change.'",opts:["we have seen","have we seen","we have saw","did we see"],a:1,why:"<b>Đúng: have we seen.</b> Đảo ngữ với 'Never before' đầu câu → have + chủ ngữ + V3. Cấu trúc nhấn mạnh band 7-8, gốc vẫn là present perfect (have + seen)."},
