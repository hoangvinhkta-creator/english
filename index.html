/* ===== BÀI 38 ===== */
{id:"g38",stage:4,title:"Bài 38 · Từ vựng học thuật & văn phong trang trọng (register)",
theory:`<h3>1. 'Register' là gì?</h3>
<p>Register là mức độ trang trọng của ngôn ngữ. IELTS Writing (đặc biệt Task 2) và Reading học thuật yêu cầu văn phong TRANG TRỌNG. Dùng từ thân mật/văn nói làm tụt band Lexical Resource, dù ngữ pháp đúng.</p>
<h3>2. Thay từ thân mật bằng từ học thuật</h3>
<table><tr><th>Thân mật (tránh)</th><th>Học thuật (nên dùng)</th></tr>
<tr><td>get</td><td>obtain, acquire, receive</td></tr>
<tr><td>buy</td><td>purchase</td></tr>
<tr><td>a lot of / lots of</td><td>numerous, a great deal of, a significant number of</td></tr>
<tr><td>big / huge</td><td>significant, substantial, considerable</td></tr>
<tr><td>show</td><td>demonstrate, indicate, reveal, illustrate</td></tr>
<tr><td>find out</td><td>discover, determine, establish</td></tr>
<tr><td>help</td><td>assist, facilitate, contribute to</td></tr>
<tr><td>need</td><td>require</td></tr>
<tr><td>get worse / get better</td><td>deteriorate / improve</td></tr>
<tr><td>kids</td><td>children / young people</td></tr>
<tr><td>things</td><td>factors, aspects, elements, issues</td></tr></table>
<h3>3. Tránh PHRASAL VERBS thân mật — dùng động từ đơn trang trọng</h3>
<div class="example"><b>find out → discover · put off → postpone · give up → abandon · look into → investigate · deal with → address · cut down → reduce · go up → increase</b></div>
<h3>4. Tránh trong văn học thuật</h3>
<ul>
<li><b>Viết tắt:</b> don't → do not, can't → cannot, it's → it is</li>
<li><b>Đại từ 'you' chung chung:</b> 'you can see that...' → 'it can be seen that...' hoặc 'one can observe that...'</li>
<li><b>Từ cảm thán/tuyệt đối:</b> tránh 'always, never, totally, a lot' → dùng 'often, rarely, largely, considerably'</li>
<li><b>Câu hỏi tu từ quá nhiều & giọng quá cá nhân</b></li>
</ul>
<h3>5. Danh từ hóa tạo giọng khách quan (ôn Bài 37)</h3>
<div class="example"><b>Thân mật:</b> People pollute rivers, and this is really bad.<br><b>Học thuật:</b> The pollution of rivers has serious consequences.</div>
<p class="muted">⚠️ Trang trọng KHÔNG có nghĩa là dùng từ càng khó càng tốt. Dùng từ học thuật CHÍNH XÁC và tự nhiên. Nhồi từ 'kêu' nhưng sai ngữ cảnh còn tệ hơn từ đơn giản đúng. Ưu tiên: đúng nghĩa → đúng collocation → trang trọng.</p>`,
levels:{
basic:{mcq:[
{q:"Chọn từ TRANG TRỌNG thay cho 'buy' trong văn học thuật:",opts:["get","purchase","grab","pick up"],a:1,why:"<b>Đúng: purchase.</b> 'purchase' trang trọng hơn 'buy/get/grab'."},
{q:"Thay 'a lot of problems' bằng cụm học thuật:",opts:["lots of problems","numerous problems","tons of problems","loads of problems"],a:1,why:"<b>Đúng: numerous problems.</b> 'numerous' trang trọng; 'lots of/tons of/loads of' đều thân mật."},
{q:"Dạng trang trọng của 'find out':",opts:["discover","figure out","check out","dig up"],a:0,why:"<b>Đúng: discover.</b> Động từ đơn 'discover' trang trọng hơn phrasal verb 'find out'."},
{q:"Chọn câu TRANG TRỌNG hơn:",opts:["Kids don't like doing homework.","Children often dislike doing homework.","Kids don't like homework a lot.","Kids hate homework."],a:1,why:"<b>Đúng: B.</b> 'Children' (không 'kids'), 'often' (không tuyệt đối), không viết tắt, 'dislike' trang trọng."},
{q:"Thay 'the situation got worse' bằng:",opts:["got more bad","deteriorated","went down","became worse a lot"],a:1,why:"<b>Đúng: deteriorated.</b> 'deteriorate' là động từ đơn trang trọng cho 'get worse'."}],
writing:[{q:"Viết lại 5 câu thân mật sau thành văn học thuật: (1) Kids get a lot of stuff from the internet. (2) The economy got worse. (3) We need to find out the cause. (4) A lot of things are bad about this. (5) The government should deal with pollution.",
model:"<b>Bài mẫu:</b> (1) Young people obtain a great deal of information from the internet. (2) The economy deteriorated. (3) We need to determine the cause. (4) Numerous aspects of this are problematic. (5) The government should address pollution.<br><b>Tự kiểm tra:</b> Thay từ thân mật (kids→young people, get→obtain, stuff→information, a lot of→a great deal of/numerous, find out→determine, deal with→address)? Không viết tắt? Không dùng 'things/bad' chung chung?"}]},
mid:{mcq:[
{q:"Chọn câu học thuật nhất:",opts:["Lots of people think it's a big problem.","Many people consider it a significant problem.","A lot of people think it's a huge problem.","People think it's really a big problem."],a:1,why:"<b>Đúng: B.</b> 'Many' (không lots of/a lot of), 'consider' (không think), 'significant' (không big/huge), không viết tắt."},
{q:"Thay phrasal verb: 'The meeting was ___ until next week.' (put off)",opts:["put off","postponed","called off","set up"],a:1,why:"<b>Đúng: postponed.</b> 'postpone' = hoãn (trang trọng cho 'put off')."},
{q:"Chọn cách diễn đạt KHÁCH QUAN thay 'you can clearly see that...':",opts:["you can clearly see that","it is evident that","you know that","obviously you see"],a:1,why:"<b>Đúng: it is evident that.</b> Tránh 'you' chung chung; dùng 'it is evident/clear/apparent that' để khách quan hóa."},
{q:"'The new method ___ that productivity can be improved.' (chọn động từ học thuật cho 'shows')",opts:["shows","demonstrates","tells","says"],a:1,why:"<b>Đúng: demonstrates.</b> 'demonstrate/indicate/reveal' trang trọng hơn 'show'; 'tell/say' không dùng cho phương pháp/dữ liệu."},
{q:"Tìm câu KHÔNG phù hợp văn học thuật:",opts:["The results indicate a strong correlation.","This can't be true, right?","The evidence suggests otherwise.","Further research is required."],a:1,why:"<b>Đúng (câu KHÔNG phù hợp): B.</b> 'can't' (viết tắt) + câu hỏi tu từ thân mật '...right?' + giọng quá đời thường. Các câu khác đều trang trọng, khách quan."}],
writing:[{q:"Viết đoạn 6 câu (kiểu Writing Task 2) về một chủ đề, giữ văn phong HỌC THUẬT nghiêm ngặt: không viết tắt, không phrasal verb thân mật, không 'you/kids/things/a lot of', dùng động từ trang trọng (demonstrate/indicate/require/address) và cụm khách quan (it is widely believed/evident that...).",
model:"<b>Bài mẫu:</b> It is widely believed that access to higher education significantly improves an individual's career prospects. Numerous studies indicate that graduates tend to earn considerably more over their lifetimes. However, the rising cost of tuition has made university unaffordable for many young people. This situation requires urgent attention from policymakers. Evidence suggests that investing in scholarships can substantially widen access. Ultimately, addressing educational inequality should be regarded as a national priority.<br><b>Tự kiểm tra:</b> Không viết tắt, không phrasal verb thân mật, không 'you/kids/things/a lot of'? Động từ trang trọng (indicate, require, address)? Cụm khách quan (It is widely believed/Evidence suggests)? Tính từ mạnh (significant/considerable/substantial)?"}]},
adv:{mcq:[
{q:"Chọn câu có register HỌC THUẬT hoàn hảo nhất:",opts:["The govt should sort out the housing crisis ASAP.","The government should address the housing crisis as a matter of urgency.","The government needs to deal with housing problems really fast.","Authorities gotta fix housing issues quickly."],a:1,why:"<b>Đúng: B.</b> Không viết tắt (government không govt), động từ trang trọng (address), cụm học thuật ('as a matter of urgency' không 'ASAP/really fast'). A, C, D đều có yếu tố thân mật/văn nói."},
{q:"'While the benefits are clear, one must ___ the potential drawbacks.' (chọn động từ học thuật)",opts:["think about","consider","look at","check out"],a:1,why:"<b>Đúng: consider.</b> 'consider' trang trọng; kết hợp với 'one must' (đại từ khách quan thay 'you') tạo giọng học thuật cao. Tránh phrasal verbs (think about/look at/check out)."},
{q:"Cách nào diễn đạt QUAN ĐIỂM một cách học thuật, tránh 'I think' quá cá nhân?",opts:["I think that this is wrong.","It could be argued that this approach is flawed.","In my opinion I think this is bad.","Everyone knows this is wrong."],a:1,why:"<b>Đúng: B.</b> 'It could be argued that...' đưa quan điểm một cách khách quan, có tính học thuật, để ngỏ cho phản biện. Tránh 'I think...bad' (đơn giản), 'In my opinion I think' (thừa), 'Everyone knows' (khái quát quá mức)."},
{q:"Chọn từ CHÍNH XÁC về sắc thái: 'The two variables are ___ correlated, though causation is unproven.'",opts:["strongly","totally","completely","a lot"],a:0,why:"<b>Đúng: strongly.</b> 'strongly correlated' là collocation học thuật chuẩn. 'totally/completely' quá tuyệt đối (không phù hợp khi 'causation is unproven'); 'a lot' thân mật. Chọn trạng từ vừa đúng collocation vừa đúng mức độ thận trọng."},
{q:"Tìm câu mắc lỗi register (KHÔNG phù hợp Task 2):",opts:["This essay will examine both perspectives.","Let's face it, the system is broken.","The following analysis considers several factors.","It is important to weigh both arguments carefully."],a:1,why:"<b>Đúng (câu lỗi): B.</b> 'Let's face it' là thành ngữ văn nói, quá thân mật và mang giọng chủ quan mạnh — không phù hợp văn nghị luận học thuật. Các câu khác đều trang trọng, khách quan."}],
writing:[{q:"Viết đoạn mở bài + 1 đoạn thân bài (8 câu) cho một đề Writing Task 2, đạt register HỌC THUẬT chuẩn band 7+: tuyệt đối không viết tắt/phrasal verb thân mật/từ tuyệt đối/'you'; dùng động từ và cụm trang trọng, đại từ khách quan ('it is argued that', 'one could contend'), và mức độ thận trọng phù hợp.",
model:"<b>Bài mẫu:</b> In recent decades, the increasing reliance on technology in education has become a subject of considerable debate. While some contend that digital tools enhance learning, others argue that they may undermine essential skills. It is undeniable that technology provides students with unprecedented access to information. Furthermore, interactive platforms can facilitate personalised learning and increase engagement. However, it could be argued that excessive screen time diminishes concentration and weakens face-to-face communication. Numerous educators have expressed concern that traditional skills, such as handwriting, are gradually being neglected. One must therefore consider both the advantages and the potential drawbacks before drawing any firm conclusion. Ultimately, technology should be regarded as a valuable supplement rather than a replacement for conventional teaching.<br><b>Tự kiểm tra:</b> Không viết tắt/phrasal verb thân mật/'you'? Động từ trang trọng (contend, argue, enhance, facilitate, diminish)? Cụm khách quan (It is undeniable/It could be argued/One must consider)? Mức độ thận trọng (may, could, gradually)? Danh từ hóa?"}]}
}},
/* ===== BÀI 39 ===== */
{id:"g39",stage:4,title:"Bài 39 · Paraphrase (diễn đạt lại)",
theory:`<h3>1. Vì sao paraphrase là kỹ năng SỐNG CÒN của IELTS?</h3>
<p>Paraphrase = diễn đạt lại một ý bằng từ ngữ/cấu trúc khác mà GIỮ NGUYÊN nghĩa. Nó xuất hiện ở MỌI phần: Writing (viết lại đề bài ở mở bài, tránh lặp từ), Reading (đáp án diễn đạt lại thông tin bài đọc), Listening, Speaking. Không paraphrase được = lặp từ = tụt band.</p>
<h3>2. Bốn kỹ thuật paraphrase cốt lõi</h3>
<p><b>a) Thay từ đồng nghĩa (synonyms):</b></p>
<div class="example"><b>Gốc:</b> Cars cause a lot of pollution.<br><b>Paraphrase:</b> Vehicles produce a great deal of contamination.</div>
<p><b>b) Đổi từ loại (word form — ôn Bài 37):</b></p>
<div class="example"><b>Gốc:</b> The population grew quickly.<br><b>Paraphrase:</b> There was a rapid growth in the population.</div>
<p><b>c) Đổi thể chủ động ↔ bị động (ôn Bài 25):</b></p>
<div class="example"><b>Gốc:</b> Scientists conducted the research.<br><b>Paraphrase:</b> The research was conducted by scientists.</div>
<p><b>d) Đổi cấu trúc câu (mệnh đề ↔ cụm, đảo trật tự):</b></p>
<div class="example"><b>Gốc:</b> Because prices rose, demand fell.<br><b>Paraphrase:</b> The rise in prices led to a fall in demand. / A decline in demand resulted from higher prices.</div>
<h3>3. Kết hợp NHIỀU kỹ thuật cùng lúc (paraphrase mạnh nhất)</h3>
<div class="example"><b>Đề:</b> Some people believe that children should start school at a very young age.<br><b>Mở bài:</b> It is argued by many that formal education ought to begin in early childhood.<br><span class="vi">Đã đổi: some people→many, believe→argue (+bị động), children→early childhood, start school→formal education begin, very young age→early. Bốn kỹ thuật cùng lúc.</span></div>
<h3>4. Điều KHÔNG nên/không thể paraphrase</h3>
<p>Không cần thay danh từ riêng, thuật ngữ chuyên môn, con số. 'IELTS' vẫn là 'IELTS'; 'photosynthesis' vẫn là 'photosynthesis'. Đừng ép synonym gượng ép làm sai nghĩa (ví dụ 'economic' ≠ 'cheap' trong mọi ngữ cảnh).</p>
<p class="muted">⚠️ Paraphrase phải GIỮ ĐÚNG nghĩa gốc. Sai lầm nguy hiểm: chọn synonym sai sắc thái làm lệch nghĩa. 'big' có thể là 'large/significant/major' tùy ngữ cảnh — không phải lúc nào cũng thay được. Ưu tiên đúng nghĩa hơn là 'khác từ bằng mọi giá'.</p>`,
levels:{
basic:{mcq:[
{q:"Paraphrase tốt cho 'Cars cause pollution':",opts:["Cars make pollution.","Vehicles produce pollution.","Cars cause pollutions.","Car cause pollution."],a:1,why:"<b>Đúng: Vehicles produce pollution.</b> Thay 'cars→vehicles' và 'cause→produce' (đồng nghĩa), giữ nghĩa."},
{q:"Đổi từ loại: 'Technology developed rapidly' →",opts:["The rapid development of technology","Technology rapid development","The develop of technology rapidly","Technology developing rapid"],a:0,why:"<b>Đúng: The rapid development of technology.</b> developed (v) → development (n), rapidly (adv) → rapid (adj)."},
{q:"Đổi sang bị động: 'People speak English worldwide' →",opts:["English speaks worldwide.","English is spoken worldwide.","English is speak worldwide.","English spoken worldwide."],a:1,why:"<b>Đúng: English is spoken worldwide.</b> Bị động: is + spoken (V3)."},
{q:"Synonym học thuật cho 'important':",opts:["big","significant","nice","real"],a:1,why:"<b>Đúng: significant.</b> 'significant/crucial/vital/essential' là đồng nghĩa học thuật của 'important'."},
{q:"Paraphrase cho 'a lot of people':",opts:["much people","a large number of people","many peoples","lots people"],a:1,why:"<b>Đúng: a large number of people.</b> 'a large number of' (đếm được) = a lot of people. 'much' sai (không đếm được); 'peoples' sai số nhiều."}],
writing:[{q:"Paraphrase 5 câu sau (đổi ít nhất 2 yếu tố mỗi câu): (1) Many students find exams stressful. (2) The government built new roads. (3) Pollution is increasing quickly. (4) Technology has changed our lives. (5) People buy a lot of things online.",
model:"<b>Bài mẫu:</b> (1) A large number of learners consider examinations stressful. (2) New roads were constructed by the government. (3) There is a rapid rise in pollution. (4) Our lives have been transformed by technology. (5) Numerous products are purchased online.<br><b>Tự kiểm tra:</b> Mỗi câu đổi ≥2 yếu tố (đồng nghĩa / từ loại / chủ-bị động / cấu trúc)? Nghĩa gốc được GIỮ NGUYÊN? Không sai sắc thái synonym?"}]},
mid:{mcq:[
{q:"Paraphrase NÀO giữ đúng nghĩa 'Regular exercise improves health'?",opts:["Health improves regular exercise.","Health can be improved through regular physical activity.","Regular exercise is improved by health.","Exercise regularly improve health."],a:1,why:"<b>Đúng: B.</b> Bị động + synonym (exercise→physical activity, improve→be improved through). A, C đảo sai nghĩa (health không cải thiện exercise); D sai ngữ pháp."},
{q:"Đề: 'Some think advertising influences children too much.' Mở bài paraphrase tốt nhất:",opts:["Some people think adverts influence kids too much.","It is believed by many that children are excessively affected by advertising.","Advertising influences children too much, some think.","Some think that advertising has too much influence on children."],a:1,why:"<b>Đúng: B.</b> Kết hợp: some think→believed by many (+bị động), influences→are affected, too much→excessively, giữ 'advertising/children' (từ khóa). Paraphrase toàn diện, đúng nghĩa. D chỉ đảo trật tự nhẹ, còn lặp nhiều."},
{q:"Chọn paraphrase SAI NGHĨA (bẫy synonym):",opts:["'cheap products' → 'inexpensive products'","'economic growth' → 'cheap growth'","'reduce costs' → 'lower expenses'","'a major issue' → 'a significant problem'"],a:1,why:"<b>Đúng (paraphrase SAI): B.</b> 'economic' (thuộc kinh tế) KHÔNG phải 'cheap' (rẻ) — đây là 'economical'. Đổi 'economic growth' thành 'cheap growth' làm SAI hoàn toàn nghĩa. Cảnh báo bẫy synonym sai sắc thái."},
{q:"Đổi cấu trúc nhân-quả: 'Prices rose because demand increased' →",opts:["The increase in demand led to a rise in prices.","Prices rose because of demand increased.","The rise in prices caused demand to increase.","Demand increased because prices rose."],a:0,why:"<b>Đúng: A.</b> 'The increase in demand led to a rise in prices' — danh từ hóa + 'led to' giữ đúng chiều nhân-quả (cầu tăng → giá tăng). C và D đảo ngược nhân-quả (sai nghĩa); B sai ngữ pháp."},
{q:"Paraphrase cho 'It is difficult to solve this problem':",opts:["This problem is difficult to be solved.","Solving this problem is challenging.","This problem solves difficultly.","It is difficult solving this problem."],a:1,why:"<b>Đúng: B.</b> 'Solving this problem is challenging' — đổi cấu trúc (danh động từ làm chủ ngữ) + synonym (difficult→challenging). A sai ngữ pháp ('to be solved' sau 'difficult'); C, D không tự nhiên."}],
writing:[{q:"Cho đề: 'Nowadays, many people prefer to shop online rather than in physical stores. What are the advantages and disadvantages?' Viết đoạn mở bài (4-5 câu) paraphrase đề bài rồi nêu luận đề — kết hợp NHIỀU kỹ thuật paraphrase, tránh chép lại đề.",
model:"<b>Bài mẫu:</b> In the modern era, an increasing number of consumers choose to make their purchases over the internet instead of visiting traditional shops. This shift in shopping behaviour has been driven largely by convenience and technological progress. While online shopping offers considerable benefits, it also presents certain drawbacks that cannot be ignored. This essay will examine both the merits and the limitations of this growing trend.<br><b>Tự kiểm tra:</b> Đã paraphrase đề (nowadays→in the modern era, many people→an increasing number of consumers, prefer→choose, shop online→make purchases over the internet, physical stores→traditional shops, advantages/disadvantages→benefits/drawbacks & merits/limitations)? Giữ đúng nghĩa? Không chép nguyên cụm từ đề?"}]},
adv:{mcq:[
{q:"Đề Reading gốc: 'The scheme was abandoned due to a lack of funding.' Câu nào là paraphrase ĐÚNG (dạng câu hỏi True/False/Not Given)?",opts:["The project was cancelled because there was insufficient money.","The project failed because it was poorly designed.","The scheme succeeded despite financial problems.","The funding for the scheme was abandoned."],a:0,why:"<b>Đúng: A.</b> abandoned→cancelled, scheme→project, due to→because, lack of funding→insufficient money — paraphrase giữ đúng nghĩa. B thêm thông tin sai (poorly designed); C ngược nghĩa; D lệch nghĩa (fund bị bỏ, không phải scheme)."},
{q:"Chọn paraphrase HỌC THUẬT cao cấp nhất cho 'Governments should spend more money on public transport':",opts:["Governments should spend more money on public transport.","Increased public investment in mass transit systems is highly advisable.","Government must spend a lot on public transport.","Public transport needs more money from governments."],a:1,why:"<b>Đúng: B.</b> Danh từ hóa toàn diện: spend more money→increased investment, public transport→mass transit systems, should→is highly advisable. Biến mệnh đề thành cụm danh từ trừu tượng — paraphrase band 8."},
{q:"Paraphrase kết hợp đảo cấu trúc + bị động cho 'Researchers have found that stress affects memory':",opts:["Stress has been found to affect memory.","Memory affects stress, researchers found.","Researchers affect memory with stress.","Stress found memory affected."],a:0,why:"<b>Đúng: A.</b> 'Stress has been found to affect memory' — cấu trúc 'S + has been found to + V' (bị động + động từ nguyên mẫu), giữ đúng chiều (stress → memory). B, C đảo sai nhân quả; D sai ngữ pháp."},
{q:"Vì sao 'The elderly' là paraphrase tốt cho 'old people' nhưng KHÔNG nên đổi 'diabetes' trong bài?",opts:["Vì 'the elderly' sai nghĩa","Vì thuật ngữ chuyên môn/danh từ riêng nên giữ nguyên, còn từ thông thường thì nên paraphrase","Vì 'diabetes' quá dễ","Vì không có từ đồng nghĩa nào cả"],a:1,why:"<b>Đúng: B.</b> 'old people'→'the elderly' là paraphrase từ thông thường hợp lý. Nhưng thuật ngữ chuyên môn ('diabetes', 'photosynthesis'), danh từ riêng, con số thì GIỮ NGUYÊN — ép synonym sẽ sai nghĩa. Biết CÁI GÌ nên/không nên paraphrase là kỹ năng band cao."},
{q:"Chọn câu paraphrase mắc lỗi LỆCH NGHĨA tinh vi:",opts:["'most people' → 'the majority of individuals'","'in most cases' → 'usually'","'a few countries' → 'many countries'","'tends to increase' → 'often rises'"],a:2,why:"<b>Đúng (lỗi lệch nghĩa): C.</b> 'a few countries' (một vài — ít) KHÔNG phải 'many countries' (nhiều). Đây là lỗi paraphrase làm lệch NGHĨA ĐỊNH LƯỢNG — cực kỳ nguy hiểm ở Reading và Writing. Các đáp án khác giữ đúng nghĩa."}],
writing:[{q:"Cho đề: 'In many countries, the gap between the rich and the poor is widening. What problems does this cause, and what solutions can you suggest?' Viết đoạn mở bài (mở bài paraphrase đề) + câu chủ đề cho 1 đoạn thân bài (tổng 6-7 câu), kết hợp NHIỀU kỹ thuật paraphrase ở trình độ cao (danh từ hóa, đồng nghĩa học thuật, đổi cấu trúc), giữ tuyệt đối đúng nghĩa.",
model:"<b>Bài mẫu:</b> In numerous nations across the globe, the disparity in wealth between the affluent and the disadvantaged is steadily growing. This widening economic divide has given rise to a range of serious social consequences that demand urgent attention. The present essay will explore the principal problems associated with this trend before proposing a number of viable solutions. One of the most damaging effects of increasing inequality is the erosion of social cohesion. As the gap between the wealthiest and the poorest expands, feelings of resentment and injustice tend to intensify, which can ultimately threaten social stability.<br><b>Tự kiểm tra:</b> Paraphrase đề (many countries→numerous nations, gap between rich and poor→disparity in wealth between the affluent and the disadvantaged, widening→steadily growing, problems→consequences/effects, solutions→viable solutions)? Danh từ hóa (disparity, divide, erosion)? Đồng nghĩa học thuật đúng sắc thái? Giữ ĐÚNG nghĩa và mức độ định lượng?"}]}
}},
/* ===== BÀI 40 ===== */
{id:"g40",stage:4,title:"Bài 40 · Từ nối, mạch lạc & giọng thận trọng + ôn tập Chặng 4",
theory:`<h3>1. Cohesion & Coherence — tiêu chí chiếm 25% điểm Writing</h3>
<p>Bài viết band cao cần LIÊN KẾT (cohesion) mượt mà và MẠCH LẠC (coherence) rõ ràng. Công cụ: từ nối, từ tham chiếu, và cách sắp xếp ý logic.</p>
<h3>2. Từ nối theo CHỨC NĂNG (dùng đúng chức năng mới hiệu quả)</h3>
<table><tr><th>Chức năng</th><th>Từ nối</th></tr>
<tr><td>Thêm ý</td><td>moreover, furthermore, in addition, additionally, besides</td></tr>
<tr><td>Tương phản</td><td>however, nevertheless, on the other hand, in contrast, conversely</td></tr>
<tr><td>Nguyên nhân-kết quả</td><td>therefore, thus, consequently, as a result, hence</td></tr>
<tr><td>Ví dụ</td><td>for instance, for example, to illustrate, namely</td></tr>
<tr><td>Nhấn mạnh</td><td>indeed, in fact, notably, particularly</td></tr>
<tr><td>Kết luận</td><td>in conclusion, to sum up, overall, ultimately</td></tr>
<tr><td>Trình tự</td><td>firstly, subsequently, finally, meanwhile</td></tr></table>
<h3>3. Từ THAM CHIẾU tránh lặp (referencing)</h3>
<div class="example"><b>this / these / such / it / they:</b> Air pollution is a serious issue. <b>This problem</b> affects millions. → 'This problem' thay cho 'air pollution', tránh lặp.<br><span class="vi">'such measures', 'these findings', 'the former/the latter' giúp nối ý và tránh lặp từ — dấu hiệu mạch lạc band 7.</span></div>
<h3>4. Giọng THẬN TRỌNG (hedging) — cực quan trọng cho học thuật</h3>
<p>Văn học thuật tránh khẳng định tuyệt đối. Dùng ngôn ngữ thận trọng để câu đáng tin và tinh tế hơn:</p>
<table><tr><th>Thay vì (tuyệt đối)</th><th>Hedging (thận trọng)</th></tr>
<tr><td>X causes Y</td><td>X may/might/can contribute to Y</td></tr>
<tr><td>This is true</td><td>This appears/seems to be the case</td></tr>
<tr><td>Everyone agrees</td><td>It is generally accepted / Many would argue</td></tr>
<tr><td>always / never</td><td>tend to / rarely / in most cases</td></tr>
<tr><td>It is</td><td>It could be argued that / arguably / to some extent</td></tr></table>
<h3>5. Bạn đã học gì ở Chặng 4?</h3>
<ul>
<li>Câu phức: tương phản, nhân-quả-mục đích, phân từ rút gọn (Bài 31–33)</li>
<li>Cấu trúc nhấn mạnh: đảo ngữ, câu chẻ (Bài 34–35)</li>
<li>Từ vựng: collocations, cấu tạo từ, register học thuật (Bài 36–38)</li>
<li>Paraphrase & từ nối/mạch lạc/hedging (Bài 39–40)</li>
</ul>
<p class="muted">⚠️ Đừng nhồi từ nối vào ĐẦU mọi câu — 'Moreover, Furthermore, In addition' liên tiếp gây phản tác dụng, giám khảo coi là dùng máy móc. Dùng vừa đủ, đúng chức năng logic, kết hợp từ tham chiếu để liên kết tự nhiên. Hedging thể hiện tư duy học thuật chín chắn, không phải sự thiếu chắc chắn.</p>`,
levels:{
basic:{mcq:[
{q:"'The plan was expensive. ___, it was very effective.'",opts:["Moreover","However","Therefore","For example"],a:1,why:"<b>Đúng: However.</b> Quan hệ TƯƠNG PHẢN (đắt >< hiệu quả) → However."},
{q:"'Sales increased. ___, profits also rose.'",opts:["However","Moreover","In contrast","For instance"],a:1,why:"<b>Đúng: Moreover.</b> THÊM ý cùng chiều (doanh số tăng + lợi nhuận tăng) → Moreover."},
{q:"'Demand fell sharply. ___, we reduced production.'",opts:["However","For example","Therefore","In addition"],a:2,why:"<b>Đúng: Therefore.</b> Quan hệ NGUYÊN NHÂN-KẾT QUẢ → Therefore."},
{q:"Chọn cách hedging cho 'Junk food causes obesity':",opts:["Junk food always causes obesity.","Junk food may contribute to obesity.","Junk food causes obesity totally.","Junk food is obesity."],a:1,why:"<b>Đúng: Junk food may contribute to obesity.</b> 'may contribute to' thận trọng hơn 'causes' tuyệt đối."},
{q:"'Pollution is a big issue. ___ issue affects everyone.'",opts:["This","It","That","Such"],a:0,why:"<b>Đúng: This.</b> 'This issue' tham chiếu lại 'pollution', tránh lặp từ và nối ý."}],
writing:[{q:"Viết đoạn 5 câu về một chủ đề, dùng ít nhất 3 từ nối khác CHỨC NĂNG (thêm ý / tương phản / kết quả), 1 từ tham chiếu (this/these/such), và 1 cụm hedging (may/tend to/it seems that).",
model:"<b>Bài mẫu:</b> Social media has transformed how people communicate. Moreover, it has created new business opportunities. However, this technology may also have negative effects on mental health. Studies suggest that excessive use tends to increase anxiety among young users. Therefore, such platforms should be used in moderation.<br><b>Tự kiểm tra:</b> Từ nối đúng chức năng (Moreover-thêm, However-tương phản, Therefore-kết quả)? Từ tham chiếu (this technology, such platforms) tránh lặp? Hedging (may, tends to, suggest)?"}]},
mid:{mcq:[
{q:"Tìm từ nối SAI chức năng: 'The results were poor. Furthermore, we abandoned the project.'",opts:["Furthermore đúng","Nên là 'Therefore' (kết quả), không phải 'Furthermore' (thêm ý)","Nên là 'However'","Nên là 'For example'"],a:1,why:"<b>Đúng: B.</b> Quan hệ ở đây là NGUYÊN NHÂN-KẾT QUẢ (kết quả kém → bỏ dự án), nên dùng 'Therefore', không phải 'Furthermore' (thêm ý cùng loại). Chọn từ nối phải khớp quan hệ LOGIC."},
{q:"Chọn cách diễn đạt THẬN TRỌNG (hedging) nhất:",opts:["Technology will definitely replace all jobs.","Technology is likely to replace certain jobs.","Technology replaces all jobs.","Technology never replaces jobs."],a:1,why:"<b>Đúng: B.</b> 'is likely to' + 'certain jobs' (không 'all') — thận trọng, tránh tuyệt đối. Các câu khác quá tuyệt đối (definitely/all/never), thiếu tính học thuật."},
{q:"'Two solutions were proposed. The ___ focuses on prevention, while the ___ emphasises treatment.'",opts:["first / second","former / latter","one / other","this / that"],a:1,why:"<b>Đúng: former / latter.</b> 'the former' (cái đầu) / 'the latter' (cái sau) — cặp tham chiếu học thuật thanh lịch để nối và phân biệt hai thứ đã nêu."},
{q:"'Many factors affect health. ___, diet plays a crucial role.'",opts:["However","In particular","In contrast","Nevertheless"],a:1,why:"<b>Đúng: In particular.</b> Nhấn mạnh/cụ thể hóa một yếu tố trong nhiều yếu tố → In particular (= notably/particularly). Không phải tương phản."},
{q:"Câu nào LIÊN KẾT tốt với câu trước 'Renewable energy has many benefits'?",opts:["Renewable energy is expensive.","These advantages, however, come at a cost.","Solar power exists.","People like energy."],a:1,why:"<b>Đúng: B.</b> 'These advantages' tham chiếu lại 'many benefits' (liên kết) + 'however' báo hiệu tương phản sắp tới (mạch lạc). Câu vừa nối ngược vừa dẫn ý mới — cohesion tốt."}],
writing:[{q:"Viết đoạn thân bài 6 câu (Writing Task 2) hoàn chỉnh: 1 câu chủ đề, các câu phát triển dùng từ nối đúng chức năng và ĐA DẠNG (không lặp), từ tham chiếu (this/these/such/the former-latter), và giọng hedging phù hợp — tránh nhồi từ nối máy móc.",
model:"<b>Bài mẫu:</b> One major advantage of remote work is the flexibility it offers employees. By eliminating the daily commute, it allows workers to manage their time more efficiently. This freedom, in turn, can lead to greater job satisfaction and productivity. However, such benefits are not universal; some individuals may struggle with isolation or distractions at home. Studies suggest that the effectiveness of remote work largely depends on the nature of the job and the discipline of the worker. Overall, while flexibility is clearly valuable, it appears to suit certain roles far better than others.<br><b>Tự kiểm tra:</b> Từ nối đa dạng đúng chức năng (in turn, However, Overall)? Tham chiếu (This freedom, such benefits) tránh lặp? Hedging (may, suggest, largely, appears to)? Không nhồi từ nối đầu mọi câu?"}]},
adv:{mcq:[
{q:"Chọn đoạn có LIÊN KẾT mạch lạc và hedging học thuật tốt nhất:",opts:["Pollution is bad. Moreover pollution is bad. Furthermore it is bad.","Air pollution poses serious risks. Such risks, it seems, are often underestimated by policymakers, who may prioritise short-term economic gains.","Pollution causes everything. Everyone knows this always.","Pollution. However. Therefore. In conclusion.","Pollution is bad and it is bad and moreover bad."],a:1,why:"<b>Đúng: B.</b> 'Such risks' (tham chiếu, tránh lặp) + 'it seems' và 'may' (hedging) + mệnh đề quan hệ nối ý — mạch lạc và học thuật. Các đáp án khác lặp từ, tuyệt đối hóa, hoặc nhồi từ nối rỗng."},
{q:"'The evidence is compelling; ___, some scholars remain unconvinced.'",opts:["therefore","nonetheless","moreover","for instance"],a:1,why:"<b>Đúng: nonetheless.</b> Quan hệ TƯƠNG PHẢN trang trọng (bằng chứng thuyết phục NHƯNG vẫn có người hoài nghi) → nonetheless (= nevertheless). 'therefore' (kết quả) và 'moreover' (thêm ý) sai chức năng."},
{q:"Chọn câu HEDGING tinh tế và học thuật nhất:",opts:["Social media definitely destroys real relationships.","Social media arguably has the potential to undermine face-to-face relationships to some extent.","Social media totally ruins relationships always.","Social media is bad for relationships, everyone agrees."],a:1,why:"<b>Đúng: B.</b> 'arguably' + 'has the potential to' + 'to some extent' — ba lớp hedging thể hiện tư duy cân nhắc, thận trọng, đặc trưng band 8. Các câu khác tuyệt đối hóa (definitely/totally/always/everyone agrees) — kém học thuật."},
{q:"Vì sao lạm dụng từ nối (Firstly...Moreover...Furthermore...In addition ở mỗi câu) lại HẠI cho band?",opts:["Vì chúng sai ngữ pháp","Vì giám khảo coi là dùng máy móc, thiếu tự nhiên; liên kết tốt cần cả tham chiếu và mạch ý, không chỉ từ nối đầu câu","Vì chúng quá khó","Vì không được dùng từ nối trong IELTS"],a:1,why:"<b>Đúng: B.</b> Tiêu chí Coherence & Cohesion band 7+ yêu cầu liên kết TỰ NHIÊN, dùng 'a range of cohesive devices... but not mechanically'. Nhồi từ nối đầu mỗi câu bị đánh giá là máy móc. Cohesion thực sự đến từ mạch ý logic + tham chiếu + từ nối dùng vừa đủ."},
{q:"Kết hợp Chặng 4: chọn câu thể hiện NHIỀU kỹ năng band cao nhất:",opts:["Not only does automation increase efficiency, but it also raises profound ethical concerns that, arguably, have yet to be adequately addressed.","Automation is good but also bad and it increases efficiency a lot.","Automation increases efficiency. It raises concerns. This is bad.","Automation, it increases efficiency and raise concerns really."],a:0,why:"<b>Đúng: A.</b> Kết hợp: đảo ngữ ('Not only does...but also'), collocation ('raises concerns'), tính từ mạnh ('profound'), mệnh đề quan hệ nối ý ('that...'), hedging ('arguably'), bị động hoàn thành ('have yet to be addressed'). Nhiều kỹ năng Chặng 4 trong một câu mạch lạc — band 8."}],
writing:[{q:"Viết một đoạn kết luận HOÀN CHỈNH (6-8 câu) cho đề Writing Task 2 bất kỳ về công nghệ/xã hội, TỔNG HỢP các kỹ năng Chặng 4: câu phức (tương phản/nhân-quả), ít nhất 1 cấu trúc nhấn mạnh (đảo ngữ hoặc câu chẻ), collocation & từ vựng học thuật, từ nối đúng chức năng, tham chiếu, và hedging — đồng thời giữ mạch lạc, không nhồi nhét.",
model:"<b>Bài mẫu:</b> In conclusion, while technological progress has undoubtedly transformed modern society, its long-term consequences remain a subject of considerable debate. It is precisely this uncertainty that makes a balanced approach so essential. On the one hand, innovation has the potential to solve pressing global challenges; on the other, it may give rise to new forms of inequality if left unregulated. Rarely has humanity possessed such powerful tools, and with this power comes significant responsibility. Governments, businesses, and individuals must therefore collaborate to ensure that these advances benefit society as a whole. Only by striking a careful balance between progress and caution can we hope to build a sustainable future. Ultimately, technology should be regarded not as an end in itself, but as a means to human flourishing.<br><b>Tự kiểm tra:</b> Câu phức (while..., if left unregulated)? Nhấn mạnh (It is precisely this...that / Rarely has... / Only by...can)? Collocation & từ học thuật (considerable debate, pressing challenges, give rise to)? Từ nối đúng chức năng (In conclusion, therefore, Ultimately)? Tham chiếu (this uncertainty, this power, these advances)? Hedging (undoubtedly, may, has the potential to)? Mạch lạc, không nhồi nhét?"}]}
}}
);

TESTS.push(
{id:"t10",stage:4,title:"Kiểm tra 10 — Câu phức (Bài 31–33)",desc:"12 câu · tương phản, nhân-quả-mục đích, phân từ",
 qs:[
 {q:"___ the rain, we went out.",opts:["Although","Despite","Even though","While"],a:1,skill:"contrast",why:"despite + danh từ (the rain)."},
 {q:"___ it was raining, we went out.",opts:["Despite","In spite of","Although","Because of"],a:2,skill:"contrast",why:"although + mệnh đề (it was raining)."},
 {q:"The phone is cheap, ___ the tablet is expensive.",opts:["despite","whereas","although","because"],a:1,skill:"contrast",why:"whereas đối chiếu hai ý ngang nhau."},
 {q:"We stayed home ___ it was raining.",opts:["because","because of","due to","so"],a:0,skill:"causeresult",why:"because + mệnh đề."},
 {q:"The flight was cancelled ___ the storm.",opts:["because","so","because of","although"],a:2,skill:"causeresult",why:"because of + danh từ (the storm)."},
 {q:"It was ___ cold that the lake froze.",opts:["so","such","very","too"],a:0,skill:"causeresult",why:"so + tính từ trần (cold) + that."},
 {q:"It was ___ a good film that I watched it twice.",opts:["so","such","very","too"],a:1,skill:"causeresult",why:"such + a + tính từ + danh từ + that."},
 {q:"She studied hard ___ pass the exam.",opts:["for","to","so","because"],a:1,skill:"causeresult",why:"mục đích → to + nguyên mẫu."},
 {q:"___ home, I met my teacher. (Trong khi đi bộ về)",opts:["Walk","Walking","Walked","To walk"],a:1,skill:"participle",why:"rút gọn chủ động → V-ing (Walking)."},
 {q:"___ in 1990, the building is now old.",opts:["Building","Built","Build","To build"],a:1,skill:"participle",why:"bị động → V3 (Built)."},
 {q:"___ the work, she went home. (Sau khi làm xong)",opts:["Finishing","Having finished","Finished","Finish"],a:1,skill:"participle",why:"việc trước → Having + V3."},
 {q:"Chọn câu ĐÚNG:",opts:["Despite the price was high, people bought it.","Despite the high price, people bought it.","Despite of the high price, people bought it.","Although the high price, people bought it."],a:1,skill:"contrast",why:"despite + cụm danh từ (the high price)."}]},
{id:"t11",stage:4,title:"Kiểm tra 11 — Đảo ngữ & nhấn mạnh (Bài 34–35)",desc:"12 câu · inversion, cleft sentences",
 qs:[
 {q:"Đảo ngữ của 'I have never been so happy':",opts:["Never I have been so happy.","Never have I been so happy.","Never been I have so happy.","Never has I been so happy."],a:1,skill:"inversion",why:"Never + have + I + been."},
 {q:"'Rarely ___ he arrive late.'",opts:["do","does","did","is"],a:1,skill:"inversion",why:"hiện tại đơn, 'he' → does + nguyên mẫu."},
 {q:"'No sooner ___ we left than it rained.'",opts:["have","had","did","were"],a:1,skill:"inversion",why:"No sooner had + S + V3 than."},
 {q:"'Under no circumstances ___ you reveal this.'",opts:["should","you should","do","should you not"],a:0,skill:"inversion",why:"đảo modal 'should' lên trước 'you'."},
 {q:"'Not only ___ she sing, but she also dances.'",opts:["can","does","did","is"],a:1,skill:"inversion",why:"Not only does she sing (hiện tại đơn)."},
 {q:"___ Mary who called you, not Jane.",opts:["It was","There was","That was","This is"],a:0,skill:"cleft",why:"It-cleft nhấn người: It was Mary who."},
 {q:"'___ I really want is some peace.'",opts:["That","What","Which","It"],a:1,skill:"cleft",why:"Wh-cleft: What + mệnh đề + be + phần nhấn."},
 {q:"'It was in 2020 ___ the pandemic began.'",opts:["who","that","which","when"],a:1,skill:"cleft",why:"It-cleft nhấn thời gian → that."},
 {q:"'The reason ___ I called is to say thank you.'",opts:["what","that","why","who"],a:2,skill:"cleft",why:"The reason why + mệnh đề."},
 {q:"'I ___ appreciate your help.' (nhấn mạnh)",opts:["do","am","did","have"],a:0,skill:"cleft",why:"nhấn động từ thường bằng do + nguyên mẫu."},
 {q:"'Only when the sale ended ___ we relax.'",opts:["did","do","have","were"],a:0,skill:"inversion",why:"Only when + mệnh đề, + đảo ngữ (did we relax) ở mệnh đề chính."},
 {q:"'___ impressed me most was her honesty.'",opts:["That","It","What","Which"],a:2,skill:"cleft",why:"Wh-cleft: What + mệnh đề + was + phần nhấn."}]},
{id:"t12",stage:4,title:"Kiểm tra 12 — Từ vựng học thuật (Bài 36–40)",desc:"12 câu · collocations, word form, register, paraphrase, linking",
 qs:[
 {q:"You need to ___ a decision quickly.",opts:["do","make","take","have"],a:1,skill:"collocation",why:"make a decision."},
 {q:"We must ___ action to reduce pollution.",opts:["do","make","take","give"],a:2,skill:"collocation",why:"take action."},
 {q:"Climate change ___ a serious threat.",opts:["makes","poses","does","gives"],a:1,skill:"collocation",why:"pose a threat."},
 {q:"Danh từ của 'decide':",opts:["decision","decisive","decidely","deciding"],a:0,skill:"wordform",why:"decide → decision (-sion)."},
 {q:"'The government must improve the ___ system.' (educate)",opts:["educate","education","educational","educated"],a:2,skill:"wordform",why:"trước danh từ 'system' cần tính từ → educational."},
 {q:"Từ trái nghĩa của 'possible' (tiền tố):",opts:["unpossible","dispossible","impossible","nonpossible"],a:2,skill:"wordform",why:"im- trước p → impossible."},
 {q:"Chọn từ TRANG TRỌNG thay 'buy':",opts:["get","purchase","grab","pick up"],a:1,skill:"register",why:"purchase trang trọng hơn buy."},
 {q:"Dạng trang trọng của 'find out':",opts:["discover","figure out","check out","dig up"],a:0,skill:"register",why:"discover (động từ đơn) thay find out."},
 {q:"Thay 'the situation got worse':",opts:["got more bad","deteriorated","went down","became worse a lot"],a:1,skill:"register",why:"deteriorate = get worse (trang trọng)."},
 {q:"Paraphrase tốt cho 'Cars cause pollution':",opts:["Cars make pollution.","Vehicles produce pollution.","Cars cause pollutions.","Car cause pollution."],a:1,skill:"paraphrase",why:"cars→vehicles, cause→produce (đồng nghĩa)."},
 {q:"'The plan was expensive. ___, it was very effective.'",opts:["Moreover","However","Therefore","For example"],a:1,skill:"linking",why:"tương phản → However."},
 {q:"Chọn cách hedging cho 'Junk food causes obesity':",opts:["Junk food always causes obesity.","Junk food may contribute to obesity.","Junk food causes obesity totally.","Junk food is obesity."],a:1,skill:"linking",why:"'may contribute to' thận trọng (hedging)."}]}
);

/* ===== BÀI 41 ===== */
{id:"g41",stage:5,title:"Bài 41 · Tổng quan kỳ thi IELTS & chiến lược chung",
theory:`<h3>1. IELTS là gì và có gì trong đề?</h3>
<p>IELTS đo 4 kỹ năng, chấm theo thang band 0–9 (có nửa band: 6.5, 7.0...). Điểm tổng (Overall) là trung bình 4 kỹ năng, làm tròn về nửa band gần nhất.</p>
<table><tr><th>Kỹ năng</th><th>Thời gian</th><th>Số câu / phần</th></tr>
<tr><td>Listening (Nghe)</td><td>~30 phút + thời gian chuyển đáp án</td><td>40 câu, 4 phần</td></tr>
<tr><td>Reading (Đọc)</td><td>60 phút</td><td>40 câu, 3 bài đọc (Academic)</td></tr>
<tr><td>Writing (Viết)</td><td>60 phút</td><td>Task 1 (≥150 từ) + Task 2 (≥250 từ)</td></tr>
<tr><td>Speaking (Nói)</td><td>11–14 phút</td><td>3 phần, phỏng vấn trực tiếp</td></tr></table>
<h3>2. Academic hay General Training?</h3>
<p>Hai bản chung phần Listening và Speaking. Khác ở Reading và Writing:</p>
<ul><li><b>Academic:</b> để du học/định cư nghề chuyên môn. Writing Task 1 = mô tả biểu đồ/số liệu.</li>
<li><b>General Training:</b> để định cư/làm việc. Writing Task 1 = viết thư (letter).</li></ul>
<p class="muted">Giáo trình này tập trung bản <b>Academic</b> (phổ biến nhất cho du học).</p>
<h3>3. Band điểm nói lên điều gì?</h3>
<table><tr><th>Band</th><th>Trình độ</th></tr>
<tr><td>5.0–5.5</td><td>Trung cấp — giao tiếp cơ bản, còn nhiều lỗi</td></tr>
<tr><td>6.0–6.5</td><td>Khá — đủ cho phần lớn chương trình đại học</td></tr>
<tr><td>7.0–7.5</td><td>Tốt — kiểm soát ngôn ngữ tốt, ít lỗi</td></tr>
<tr><td>8.0–9.0</td><td>Rất tốt đến thành thạo như bản ngữ</td></tr></table>
<h3>4. Ba nguyên tắc chiến lược sống còn</h3>
<ul>
<li><b>Quản lý thời gian:</b> Reading không có thời gian chuyển đáp án riêng — phải tự canh 20 phút/bài. Writing: dành ~20 phút Task 1, ~40 phút Task 2 (Task 2 chiếm điểm cao hơn).</li>
<li><b>KHÔNG bỏ trống:</b> IELTS không trừ điểm câu sai. Không biết vẫn phải đoán.</li>
<li><b>Đọc kỹ yêu cầu:</b> giới hạn từ ('NO MORE THAN TWO WORDS') mà viết 3 từ là sai, dù nội dung đúng.</li>
</ul>
<h3>5. Lộ trình luyện đề thông minh</h3>
<p>Không chỉ làm đề rồi chấm điểm. Sau mỗi đề: (1) xem lại câu sai, (2) hiểu VÌ SAO sai (bẫy gì, từ nào không nghe/đọc được), (3) ghi lại từ vựng/collocation mới, (4) với Writing/Speaking, so bài mình với bài mẫu band 7+ để thấy khoảng cách.</p>
<p class="muted">⚠️ Sai lầm phổ biến: học từ vựng lẻ mà không luyện dạng đề; làm hàng trăm đề nhưng không phân tích lỗi; bỏ bê Writing/Speaking (khó tự chấm) để chỉ luyện Nghe/Đọc (dễ chấm). Cân bằng cả 4 kỹ năng.</p>`,
levels:{
basic:{mcq:[
{q:"Thang điểm IELTS chạy từ:",opts:["0 đến 10","1 đến 100","0 đến 9","A đến F"],a:2,why:"<b>Đúng: 0 đến 9.</b> IELTS chấm theo band 0–9, có cả nửa band (6.5, 7.0...)."},
{q:"Phần Reading (Academic) có bao nhiêu câu?",opts:["30 câu","40 câu","50 câu","20 câu"],a:1,why:"<b>Đúng: 40 câu.</b> Reading Academic: 3 bài đọc, tổng 40 câu, 60 phút."},
{q:"Writing Task 2 yêu cầu viết tối thiểu bao nhiêu từ?",opts:["150 từ","200 từ","250 từ","300 từ"],a:2,why:"<b>Đúng: 250 từ.</b> Task 2 tối thiểu 250 từ; Task 1 tối thiểu 150 từ. Viết thiếu bị trừ điểm."},
{q:"Nếu không chắc đáp án Listening/Reading, bạn nên:",opts:["Bỏ trống","Đoán một đáp án","Viết nhiều đáp án","Bỏ qua cả bài"],a:1,why:"<b>Đúng: Đoán một đáp án.</b> IELTS không trừ điểm câu sai, nên luôn đoán, không bao giờ bỏ trống."},
{q:"Trong 60 phút Writing, bạn nên dành cho Task 2 khoảng:",opts:["20 phút","30 phút","40 phút","10 phút"],a:2,why:"<b>Đúng: 40 phút.</b> Task 2 chiếm điểm cao hơn nên dành ~40 phút; Task 1 ~20 phút."}],
writing:[{q:"Tự đánh giá điểm xuất phát: viết 5 câu (bằng tiếng Anh) mô tả trình độ hiện tại của bạn ở từng kỹ năng và mục tiêu band bạn muốn đạt. Đây là bài luyện tự nhận thức, không có đáp án đúng/sai.",
model:"<b>Bài mẫu tham khảo:</b> At the moment, my reading is probably my strongest skill, as I can understand most texts with some effort. However, my speaking is quite weak because I rarely have the chance to practise with others. My listening is improving, but I still miss details when people speak quickly. Writing is challenging for me, especially organising my ideas clearly. My goal is to achieve an overall band of 6.5, with at least 6.0 in every skill.<br><b>Gợi ý:</b> Xác định rõ kỹ năng mạnh/yếu giúp bạn phân bổ thời gian luyện tập hợp lý. Kỹ năng yếu nhất thường cần nhiều thời gian nhất — đừng né tránh nó."}]},
mid:{mcq:[
{q:"Điểm Overall được tính thế nào?",opts:["Cộng 4 kỹ năng","Trung bình 4 kỹ năng, làm tròn về nửa band","Lấy kỹ năng cao nhất","Lấy kỹ năng thấp nhất"],a:1,why:"<b>Đúng: Trung bình 4 kỹ năng, làm tròn về nửa band gần nhất.</b> VD: 6+7+6+7=26/4=6.5. Nếu 6+6+6+7=25/4=6.25 → làm tròn thành 6.5."},
{q:"Điểm khác biệt lớn nhất giữa Academic và General Training là:",opts:["Phần Listening","Phần Speaking","Phần Reading và Writing","Không có gì khác"],a:2,why:"<b>Đúng: Reading và Writing.</b> Listening và Speaking giống nhau. Academic Writing Task 1 mô tả biểu đồ; General viết thư."},
{q:"Vì sao Reading dễ 'cháy' thời gian hơn Listening?",opts:["Bài đọc dài hơn","Reading KHÔNG có thời gian chuyển đáp án riêng — phải tự canh giờ","Reading khó hơn","Không có lý do"],a:1,why:"<b>Đúng: Reading không có thời gian chuyển đáp án riêng.</b> Listening cho thêm thời gian chép đáp án (bản giấy); Reading phải điền trực tiếp trong 60 phút, nên cần tự canh ~20 phút/bài."},
{q:"Cách luyện đề nào HIỆU QUẢ nhất để lên band?",opts:["Làm thật nhiều đề, không xem lại","Làm đề rồi phân tích kỹ vì sao sai, ghi từ mới","Chỉ học từ vựng","Chỉ xem video mẹo"],a:1,why:"<b>Đúng: Làm đề rồi PHÂN TÍCH lỗi.</b> Làm đề mà không hiểu vì sao sai thì lặp lại lỗi mãi. Phân tích lỗi + ghi từ vựng mới mới thực sự tiến bộ."},
{q:"Yêu cầu 'Write NO MORE THAN TWO WORDS'. Đáp án 'a large house' (3 từ) sẽ:",opts:["Được chấp nhận","Bị tính SAI dù nghĩa đúng","Được nửa điểm","Tùy giám khảo"],a:1,why:"<b>Đúng: Bị tính SAI.</b> Vượt giới hạn từ = sai, dù nội dung đúng. Phải đọc kỹ yêu cầu số từ và tuân thủ tuyệt đối. (Số đếm như 'twenty' tính 1 từ; '20' cũng được.)"}],
writing:[{q:"Lập một kế hoạch luyện thi 4 tuần (viết bằng tiếng Anh, khoảng 6-8 câu): mỗi tuần tập trung gì, phân bổ thời gian cho 4 kỹ năng ra sao dựa trên điểm mạnh/yếu của bạn.",
model:"<b>Bài mẫu tham khảo:</b> In the first week, I will focus on understanding the format of all four sections by doing one full practice test. Since speaking is my weakest skill, I will practise it every day, recording myself answering common questions. During the second week, I will concentrate on writing, learning essay structures and practising Task 2 three times. In the third week, I will target reading and listening strategies, especially the question types I find difficult. Throughout the month, I will spend at least thirty minutes daily reviewing new vocabulary and collocations. In the final week, I will do two complete mock tests under timed conditions to build stamina. After each test, I will carefully analyse my mistakes rather than simply checking my score.<br><b>Gợi ý:</b> Kế hoạch tốt cần: (1) dành nhiều thời gian cho kỹ năng yếu, (2) luyện đề có bấm giờ, (3) luôn có bước phân tích lỗi, (4) đều đặn mỗi ngày thay vì dồn cục."}]},
adv:{mcq:[
{q:"Thí sinh đạt 6.5 Overall nhưng trường yêu cầu 'tối thiểu 6.0 mỗi kỹ năng'. Bạn được 7,7,7,5. Kết quả:",opts:["Đạt, vì Overall 6.5","KHÔNG đạt, vì một kỹ năng dưới 6.0","Đạt, vì trung bình cao","Được thi lại miễn phí"],a:1,why:"<b>Đúng: KHÔNG đạt.</b> Overall = (7+7+7+5)/4 = 6.5, nhưng yêu cầu 'tối thiểu 6.0 mỗi kỹ năng' bị phá vỡ bởi điểm 5.0. Nhiều thí sinh chỉ nhìn Overall mà quên yêu cầu điểm sàn từng kỹ năng — cần luyện đều để không có kỹ năng nào 'kéo' cả bộ hồ sơ."},
{q:"Chiến lược phân bổ thời gian Reading nào tối ưu cho người nhắm band 7+?",opts:["Làm tuần tự, dừng lâu ở câu khó","Làm bài dễ trước, đánh dấu câu khó quay lại sau, canh 20 phút/bài","Đọc kỹ toàn bộ 3 bài trước khi làm","Làm bài 3 trước vì khó nhất"],a:1,why:"<b>Đúng: B.</b> Bài đọc thường tăng dần độ khó; nhưng trong mỗi bài, làm câu dễ trước để 'ăn chắc' điểm, đánh dấu câu khó quay lại — tránh mắc kẹt. Canh nghiêm 20 phút/bài để không bỏ sót bài 3. Dừng lâu ở một câu khó là sai lầm 'cháy giờ' kinh điển."},
{q:"Về mặt chiến lược tổng thể, vì sao nên ưu tiên đầu tư Writing/Speaking hơn là chỉ cày Listening/Reading?",opts:["Vì chúng dễ hơn","Vì đó là kỹ năng SẢN SINH, khó tự cải thiện và thường là điểm nghẽn; Nghe/Đọc dễ tự luyện và lên điểm nhanh hơn","Vì chúng chiếm nhiều điểm hơn","Không nên, hãy bỏ Writing"],a:1,why:"<b>Đúng: B.</b> Nghe/Đọc là kỹ năng TIẾP NHẬN, có đáp án rõ ràng, dễ tự luyện và cải thiện nhanh. Viết/Nói là kỹ năng SẢN SINH, cần phản hồi từ người có chuyên môn và thời gian dài để tiến bộ — nên thường là 'nút thắt cổ chai'. Đầu tư sớm và đều cho chúng là chiến lược khôn ngoan."},
{q:"Một thí sinh viết Task 2 rất hay nhưng chỉ 220 từ. Hệ quả về điểm?",opts:["Không sao nếu hay","Bị phạt điểm Task Response vì dưới 250 từ, dù chất lượng tốt","Được cộng điểm vì ngắn gọn","Chỉ mất 0.5 điểm"],a:1,why:"<b>Đúng: B.</b> Dưới 250 từ bị phạt tiêu chí Task Response/Achievement bất kể chất lượng. Giám khảo còn có thể cho rằng ý chưa được phát triển đầy đủ. Luôn viết đủ 260–290 từ để an toàn mà không lan man."},
{q:"Đâu là dấu hiệu của việc luyện thi KÉM hiệu quả dù bỏ nhiều giờ?",opts:["Ghi chép từ vựng mới mỗi ngày","Làm đề liên tục nhưng điểm chững lại vì không phân tích lỗi và không luyện kỹ năng yếu","Bấm giờ khi làm đề","Thu âm bài nói để tự nghe lại"],a:1,why:"<b>Đúng: B.</b> 'Cày' đề mà điểm chững (plateau) thường do: chỉ làm đề mình thích/giỏi, không phân tích tại sao sai, né kỹ năng yếu. Nỗ lực phải ĐÚNG HƯỚNG — chất lượng phân tích quan trọng hơn số lượng đề."}],
writing:[{q:"Viết một đoạn tự phân tích (8-10 câu, tiếng Anh) về chiến lược cá nhân để đạt mục tiêu band của bạn: xác định 'nút thắt cổ chai' (kỹ năng yếu nhất), nguyên nhân gốc rễ, và 3 hành động cụ thể để khắc phục trong 4 tuần tới. Dùng ngôn ngữ mạch lạc, có từ nối.",
model:"<b>Bài mẫu tham khảo:</b> After analysing my recent practice tests, I have identified speaking as the main bottleneck preventing me from reaching my target of band 7. The root cause is twofold: firstly, I lack regular opportunities to speak English, and secondly, I tend to translate from Vietnamese in my head, which slows my fluency. To address this, I will take three concrete actions over the next month. First, I will record myself answering Part 2 cue cards every day and listen back critically to identify hesitations and repeated errors. Second, I will build a bank of flexible phrases and topic vocabulary so that I can respond more spontaneously. Third, I will find a speaking partner or use an online platform to simulate the real interview at least twice a week. In addition, I will continue reviewing grammar mistakes that appear in both my writing and speaking, since accuracy affects both scores. By focusing my energy on this weakest area rather than repeatedly practising skills I am already comfortable with, I expect to make measurable progress. Ultimately, consistent and targeted effort is far more valuable than simply completing a large number of tests.<br><b>Tự kiểm tra:</b> Có xác định rõ kỹ năng yếu nhất và NGUYÊN NHÂN GỐC? Có đúng 3 hành động CỤ THỂ (đo lường được)? Dùng từ nối mạch lạc (firstly, secondly, in addition, ultimately)? Giọng phân tích chín chắn?"}]}

/* ===== BÀI 42 ===== */
{id:"g42",stage:5,title:"Bài 42 · Listening — dạng câu hỏi & chiến thuật",
theory:`<h3>1. Cấu trúc phần Nghe</h3>
<p>40 câu, 4 phần, độ khó TĂNG DẦN. Nghe MỘT LẦN duy nhất.</p>
<table><tr><th>Phần</th><th>Bối cảnh</th><th>Ví dụ</th></tr>
<tr><td>Part 1</td><td>Hội thoại đời thường (2 người)</td><td>đặt phòng, hỏi thông tin dịch vụ</td></tr>
<tr><td>Part 2</td><td>Độc thoại đời thường (1 người)</td><td>giới thiệu sự kiện, hướng dẫn tham quan</td></tr>
<tr><td>Part 3</td><td>Hội thoại học thuật (2–4 người)</td><td>sinh viên thảo luận bài tập với giảng viên</td></tr>
<tr><td>Part 4</td><td>Bài giảng học thuật (1 người)</td><td>lecture về một chủ đề nghiên cứu</td></tr></table>
<h3>2. Các dạng câu hỏi thường gặp</h3>
<ul>
<li><b>Form/Note/Table completion</b> (điền vào chỗ trống): phổ biến ở Part 1, 4</li>
<li><b>Multiple choice</b> (chọn A/B/C): Part 2, 3</li>
<li><b>Matching</b> (nối): nối tên với đặc điểm, ý kiến</li>
<li><b>Map/Plan labelling</b> (điền nhãn bản đồ/sơ đồ): Part 2 — cần từ chỉ phương hướng</li>
<li><b>Sentence completion</b></li>
</ul>
<h3>3. Chiến thuật VÀNG: DỰ ĐOÁN trước khi nghe</h3>
<p>Trước mỗi phần có vài giây đọc câu hỏi. HÃY tận dụng để:</p>
<ul>
<li>Gạch chân TỪ KHÓA trong câu hỏi</li>
<li>Với chỗ trống: đoán LOẠI TỪ cần điền (số? tên riêng? danh từ? ngày tháng?)</li>
<li>VD: 'The tour starts at ___ ' → chắc chắn điền GIỜ. 'Cost: £___ ' → điền SỐ TIỀN.</li>
</ul>
<h3>4. Cảnh giác với BẪY (distractors)</h3>
<p>Người nói thường đưa thông tin SAI trước rồi SỬA LẠI:</p>
<div class="example">"The meeting is on Monday... <b>sorry, no, it's been moved to Wednesday</b>."<br><span class="vi">Đáp án đúng là Wednesday, không phải Monday. Nghe kỹ các từ SỬA: sorry, actually, in fact, but, however, instead.</span></div>
<h3>5. Mẹo tránh mất điểm oan</h3>
<ul>
<li>Nghe là mất luôn — không dừng lại tiếc câu vừa lỡ, tập trung câu tiếp theo ngay.</li>
<li>Đề giấy: cẩn thận khi chép sang phiếu trả lời — đúng chính tả, đúng số thứ tự.</li>
<li>Chính tả SAI = câu SAI (dù nghe đúng). Số nhiều/ít cũng phải đúng.</li>
<li>Viết đáp án theo đúng ngữ pháp câu (điền vào chỗ trống phải hợp văn phạm).</li>
</ul>
<p class="muted">⚠️ Sai lầm phổ biến: (1) không đọc trước câu hỏi nên bị động; (2) chăm chăm chờ đúng TỪ trong câu hỏi mà bỏ lỡ cách diễn đạt PARAPHRASE (câu hỏi nói 'children', audio nói 'kids/youngsters'); (3) mải viết câu trước, lỡ câu sau.</p>`,
levels:{
basic:{mcq:[
{q:"Phần Nghe được phát mấy lần?",opts:["Hai lần","Một lần duy nhất","Ba lần","Tùy phần"],a:1,why:"<b>Đúng: Một lần duy nhất.</b> IELTS Listening chỉ phát một lần, nên phải tập trung cao độ."},
{q:"Với chỗ trống 'The tour costs £___', bạn nên đoán loại từ nào?",opts:["Tên người","Số tiền","Ngày tháng","Địa điểm"],a:1,why:"<b>Đúng: Số tiền.</b> Dấu £ báo hiệu điền một con số tiền. Dự đoán loại từ giúp nghe có định hướng."},
{q:"Nên làm gì trong vài giây trước khi mỗi phần bắt đầu?",opts:["Nhắm mắt nghỉ","Đọc trước câu hỏi và gạch từ khóa","Viết sẵn đáp án","Đọc phần sau"],a:1,why:"<b>Đúng: Đọc trước câu hỏi và gạch từ khóa.</b> Dự đoán trước giúp bạn chủ động, biết cần nghe thông tin gì."},
{q:"Nghe: 'It's on Monday... sorry, actually Wednesday.' Đáp án đúng là:",opts:["Monday","Wednesday","Cả hai","Không có"],a:1,why:"<b>Đúng: Wednesday.</b> Từ 'sorry, actually' báo hiệu thông tin ĐƯỢC SỬA — đáp án cuối cùng mới đúng."},
{q:"Nếu lỡ mất một câu, bạn nên:",opts:["Dừng lại nghĩ về nó","Tập trung ngay vào câu tiếp theo","Bỏ cả phần","Quay lại nghe"],a:1,why:"<b>Đúng: Tập trung ngay câu tiếp theo.</b> Audio không dừng — tiếc câu cũ sẽ làm mất thêm câu mới."}],
writing:[{q:"Luyện dự đoán: với 5 câu điền chỗ trống sau, viết ra LOẠI TỪ bạn mong đợi nghe được (số/tên/danh từ/giờ/địa điểm...): (1) 'Name: ___' (2) 'Departure time: ___' (3) 'Price: $___' (4) 'The library is on ___ Street' (5) 'You need to bring a ___'.",
model:"<b>Đáp án gợi ý:</b> (1) tên riêng của người (chú ý có thể phải đánh vần). (2) một mốc GIỜ (VD 9.30 am). (3) một con SỐ tiền. (4) tên đường — một danh từ riêng hoặc số. (5) một danh từ chỉ vật (đồ vật cần mang theo, VD 'passport', 'umbrella').<br><b>Gợi ý:</b> Thói quen dự đoán loại từ trước khi nghe giúp bạn 'bắt' đúng thông tin và không bị phân tâm bởi chi tiết thừa. Với tên riêng, luôn sẵn sàng nghe phần đánh vần (spelling)."}]},
mid:{mcq:[
{q:"Câu hỏi ghi 'children' nhưng audio nói 'youngsters'. Đây là:",opts:["Lỗi của đề","Paraphrase — bạn phải nhận ra từ đồng nghĩa","Bẫy nên bỏ qua","Thông tin thừa"],a:1,why:"<b>Đúng: Paraphrase.</b> Audio hiếm khi lặp y nguyên từ trong câu hỏi; nó dùng từ đồng nghĩa (children = kids/youngsters/the young). Phải luyện nhận diện paraphrase khi nghe."},
{q:"Trong Map labelling, kỹ năng ngôn ngữ nào QUAN TRỌNG nhất?",opts:["Số đếm","Từ chỉ phương hướng/vị trí (opposite, next to, turn left)","Tên riêng","Thì động từ"],a:1,why:"<b>Đúng: Từ chỉ phương hướng/vị trí.</b> Điền nhãn bản đồ đòi hỏi hiểu 'opposite, next to, at the end of, on your left, straight ahead'. Ôn kỹ nhóm từ này."},
{q:"Với câu Multiple choice có 3 lựa chọn, các phương án SAI thường:",opts:["Không được nhắc đến","Được nhắc đến trong audio nhưng bị phủ nhận/không chính xác","Luôn là phương án A","Dài hơn phương án đúng"],a:1,why:"<b>Đúng: Được nhắc đến nhưng bị phủ nhận.</b> Distractor thường lặp lại từ trong các phương án sai để đánh lừa. Phải nghe TRỌN Ý, không chỉ 'bắt từ khóa' đơn lẻ."},
{q:"Đáp án nghe được là 'books' nhưng bạn viết 'book'. Kết quả:",opts:["Đúng","SAI — số nhiều/ít phải chính xác","Được nửa điểm","Tùy giám khảo"],a:1,why:"<b>Đúng: SAI.</b> Số nhiều/ít sai = câu sai. Nghe kỹ đuôi '-s' và điền đúng dạng số phù hợp ngữ pháp câu."},
{q:"Độ khó các phần Nghe thường:",opts:["Giảm dần","Tăng dần (Part 4 khó nhất)","Như nhau","Ngẫu nhiên"],a:1,why:"<b>Đúng: Tăng dần.</b> Part 1 dễ nhất (đời thường), Part 4 khó nhất (bài giảng học thuật, ít nghỉ). Giữ tập trung, đừng đuối ở cuối."}],
writing:[{q:"Nghe (đọc transcript) đoạn sau và trả lời: 'Well, the museum opens at nine, but the special exhibition doesn't start until half past ten. Entry is normally twelve pounds, though students pay just eight.' — Điền: (a) Museum opening time; (b) Exhibition start time; (c) Student price. Sau đó giải thích bạn đã tránh bẫy nào.",
model:"<b>Đáp án:</b> (a) 9.00 / nine o'clock. (b) 10.30 / half past ten. (c) £8 / eight pounds.<br><b>Bẫy đã tránh:</b> (1) Giờ mở cửa (9) khác giờ triển lãm bắt đầu (10.30) — dễ nhầm nếu chỉ 'bắt' con số đầu tiên. (2) Giá vé thường là £12, nhưng câu hỏi hỏi giá SINH VIÊN (£8) — từ 'though students pay just eight' là chỗ sửa/bổ sung. Phải nghe trọn ý và bám đúng cái câu hỏi yêu cầu, không chộp con số đầu tiên nghe được.<br><b>Gợi ý:</b> Audio luôn cài nhiều con số/mốc thời gian gần nhau để thử xem bạn có bám đúng yêu cầu không."}]},
adv:{mcq:[
{q:"Chiến thuật tối ưu cho dạng Matching (nối người với ý kiến) ở Part 3?",opts:["Đọc hết đáp án rồi nghe","Nắm chắc TÊN từng người và nghe QUAN ĐIỂM của họ, vì họ có thể phản bác nhau","Chỉ nghe người nói nhiều nhất","Đoán theo thứ tự"],a:1,why:"<b>Đúng: B.</b> Trong hội thoại nhiều người, các nhân vật thường đồng ý/phản bác lẫn nhau ('I think X' — 'Actually, I disagree'). Phải theo dõi AI nói gì, vì ý kiến có thể đổi chủ. Nghe cả sắc thái đồng tình/phản đối, không chỉ nội dung."},
{q:"Vì sao 'bắt từ khóa' đơn thuần là chiến thuật RỦI RO ở band cao?",opts:["Vì không có từ khóa","Vì đáp án đúng thường được PARAPHRASE và distractor lại chứa đúng từ khóa của câu hỏi","Vì từ khóa quá dài","Vì audio quá nhanh"],a:1,why:"<b>Đúng: B.</b> Đề band cao cố tình đặt từ khóa của câu hỏi vào phương án SAI để bẫy người 'săn từ'. Đáp án đúng thì được diễn đạt lại bằng từ khác. Phải hiểu Ý, nghe ngữ cảnh trọn vẹn, không phản xạ máy móc theo từ trùng khớp."},
{q:"Ở Part 4 (bài giảng), điều gì giúp bạn không bị 'lạc' khi không có quãng nghỉ giữa câu hỏi?",opts:["Nhắm mắt tập trung","Bám theo các từ chỉ dẫn cấu trúc bài giảng (firstly, moving on, another factor, finally) để định vị mình đang ở đâu","Ghi lại mọi từ","Chỉ nghe câu cuối"],a:1,why:"<b>Đúng: B.</b> Part 4 thường nghe liền mạch, dễ tụt lại. Các 'signpost' (firstly, next, turning to, in contrast, finally) báo hiệu người nói chuyển ý — bám vào chúng giúp bạn biết câu hỏi tiếp theo sắp tới. Đây là kỹ năng nghe theo CẤU TRÚC diễn ngôn."},
{q:"Đáp án điền chỗ trống phải vừa đúng nội dung, vừa:",opts:["Dài hơn 3 từ","Đúng ngữ pháp và trong giới hạn từ cho phép","Viết hoa toàn bộ","Có dấu câu"],a:1,why:"<b>Đúng: B.</b> Đáp án phải khớp NGỮ PHÁP của câu (VD chỗ trống sau 'a' cần danh từ số ít) VÀ tuân giới hạn từ ('NO MORE THAN TWO WORDS'). Nghe đúng nhưng viết sai dạng ngữ pháp hoặc thừa từ vẫn mất điểm. Đọc lại cả câu sau khi điền để kiểm tra."},
{q:"Thí sinh giỏi làm gì trong 30 giây kiểm tra cuối mỗi phần?",opts:["Nghỉ ngơi","Rà chính tả, dạng số nhiều/ít, và đọc trước câu hỏi phần sau nếu kịp","Đổi hết đáp án","Đếm số câu đã làm"],a:1,why:"<b>Đúng: B.</b> Tận dụng khoảng nghỉ để: rà lỗi chính tả và số nhiều/ít (nguyên nhân mất điểm oan hàng đầu), đảm bảo đáp án hợp ngữ pháp, và LƯỚT trước câu hỏi phần kế tiếp để chuẩn bị. Thí sinh band cao không bao giờ 'nghỉ' trong lúc thi Nghe."}],
writing:[{q:"Viết một 'bảng chiến thuật Listening' cá nhân (8-10 câu, tiếng Anh) tổng hợp cách bạn sẽ xử lý từng dạng câu hỏi (completion, multiple choice, matching, map) và cách phòng tránh các bẫy chính (paraphrase, distractor sửa thông tin, chính tả). Trình bày mạch lạc, có thứ tự.",
model:"<b>Bài mẫu tham khảo:</b> To perform well in the listening test, I will apply a specific strategy for each question type. For completion tasks, I will always predict the type of word required — whether a number, a name, or a noun — and pay close attention to spelling and singular or plural forms. When facing multiple-choice questions, I will listen for the whole idea rather than isolated keywords, because distractors often repeat the exact words from the wrong options. For matching questions in Part 3, I will keep track of who says what, since speakers frequently agree or disagree with one another. In map-labelling tasks, I will revise directional language such as 'opposite', 'next to' and 'at the end of' beforehand. Throughout the test, I will remember that the audio usually paraphrases the questions, so I must recognise synonyms instead of waiting for identical words. I will also stay alert to correction signals like 'sorry', 'actually' and 'in fact', which indicate that the first piece of information has been changed. If I miss an answer, I will immediately move on rather than dwelling on it. Finally, I will use every spare moment to check my spelling and to preview the questions in the next section. This structured approach should help me avoid the careless errors that cost so many marks.<br><b>Tự kiểm tra:</b> Có nêu chiến thuật riêng cho ≥3 dạng câu hỏi? Có đề cập phòng tránh paraphrase, distractor, lỗi chính tả/số nhiều? Mạch lạc, có thứ tự (for..., when..., finally)?"}]}

/* ===== BÀI 43 ===== */
{id:"g43",stage:5,title:"Bài 43 · Reading — đọc lướt, đọc quét & quản lý thời gian",
theory:`<h3>1. Thử thách lớn nhất của Reading: THỜI GIAN</h3>
<p>3 bài đọc dài, 40 câu, chỉ 60 phút, KHÔNG có thời gian chép đáp án riêng. Bạn KHÔNG có đủ thời gian đọc kỹ từng từ. Bí quyết là đọc CÓ CHIẾN LƯỢC, không đọc tuyến tính từng chữ.</p>
<h3>2. Hai kỹ năng đọc cốt lõi</h3>
<ul>
<li><b>Skimming (đọc lướt):</b> đọc nhanh để nắm Ý CHÍNH và bố cục bài. Đọc câu đầu mỗi đoạn (thường là câu chủ đề), lướt phần còn lại. Mục đích: biết bài nói về gì, mỗi đoạn nói gì.</li>
<li><b>Scanning (đọc quét):</b> quét nhanh để tìm THÔNG TIN CỤ THỂ (tên, số, năm, từ khóa) mà không đọc hết. Mắt di chuyển nhanh tìm 'mục tiêu'.</li>
</ul>
<h3>3. Quy trình làm bài hiệu quả</h3>
<ol>
<li><b>Skim bài đọc</b> (~2-3 phút): nắm chủ đề, ý mỗi đoạn. Chưa đọc câu hỏi.</li>
<li><b>Đọc câu hỏi</b>, gạch từ khóa.</li>
<li><b>Scan</b> tìm vùng chứa đáp án dựa trên từ khóa.</li>
<li><b>Đọc KỸ</b> chỉ đoạn/câu liên quan để chốt đáp án.</li>
</ol>
<h3>4. Quản lý thời gian: quy tắc 20 phút/bài</h3>
<p>Chia đều: ~20 phút mỗi bài. Bài 1 thường dễ nhất — làm nhanh, để dành thời gian cho bài 3 khó hơn. Nếu một câu quá khó, ĐÁNH DẤU và bỏ qua, quay lại sau. Đừng để một câu 'nuốt' 5 phút.</p>
<h3>5. Câu hỏi có theo thứ tự bài đọc không?</h3>
<p>Phần lớn các dạng (True/False/Not Given, completion, multiple choice) có đáp án XUẤT HIỆN THEO THỨ TỰ trong bài. Tức đáp án câu 5 nằm sau đáp án câu 4 trong bài. Ngoại lệ: <b>Matching Headings</b> và <b>Matching Information</b> KHÔNG theo thứ tự — phải quét cả bài.</p>
<p class="muted">⚠️ Sai lầm phổ biến: (1) đọc kỹ toàn bộ bài trước khi làm → cháy giờ; (2) tra mọi từ mới → mất tập trung (đoán nghĩa từ ngữ cảnh); (3) dừng quá lâu ở câu khó; (4) quên rằng phần lớn đáp án theo thứ tự, nên tìm mò khắp bài cho câu đã biết vùng.</p>`,
levels:{
basic:{mcq:[
{q:"'Skimming' là kỹ năng:",opts:["Đọc kỹ từng từ","Đọc lướt nhanh để nắm ý chính","Tra từ điển","Dịch cả bài"],a:1,why:"<b>Đúng: Đọc lướt nhanh nắm ý chính.</b> Skimming giúp nắm chủ đề và bố cục bài mà không đọc từng chữ."},
{q:"'Scanning' dùng để:",opts:["Nắm ý chính","Tìm thông tin cụ thể (tên, số, năm)","Đọc kỹ toàn bài","Ghi nhớ cả bài"],a:1,why:"<b>Đúng: Tìm thông tin cụ thể.</b> Scanning là quét nhanh tìm 'mục tiêu' như con số, tên riêng, từ khóa."},
{q:"Mỗi bài đọc nên dành khoảng bao nhiêu phút?",opts:["10 phút","20 phút","30 phút","40 phút"],a:1,why:"<b>Đúng: 20 phút.</b> 60 phút / 3 bài = 20 phút/bài. Canh giờ để không bỏ sót bài cuối."},
{q:"Khi gặp một câu quá khó, bạn nên:",opts:["Ngồi giải đến khi ra","Đánh dấu, bỏ qua, quay lại sau","Bỏ cả bài","Đoán rồi không quay lại"],a:1,why:"<b>Đúng: Đánh dấu, bỏ qua, quay lại sau.</b> Đừng để một câu khó 'nuốt' thời gian của nhiều câu dễ khác."},
{q:"Gặp từ mới không biết nghĩa, tốt nhất nên:",opts:["Tra từ điển ngay","Đoán nghĩa qua ngữ cảnh","Bỏ cả câu","Dịch sang tiếng Việt"],a:1,why:"<b>Đúng: Đoán nghĩa qua ngữ cảnh.</b> Không được dùng từ điển khi thi. Đoán nghĩa từ câu xung quanh là kỹ năng thiết yếu."}],
writing:[{q:"Luyện skimming: đọc LƯỚT đoạn sau trong 20 giây rồi viết 1 câu tóm tắt ý chính (tiếng Anh). Đoạn: 'Bees play a vital role in agriculture. As they move from flower to flower, they transfer pollen, enabling plants to reproduce. Without this process, known as pollination, many crops that humans rely on would fail. Recently, however, bee populations have declined sharply due to pesticides, disease and habitat loss, raising serious concerns among scientists.'",
model:"<b>Câu tóm tắt mẫu:</b> Bees are essential for crop pollination, but their populations are declining due to several threats.<br><b>Gợi ý:</b> Skimming tốt là nắm được: chủ đề (bees & pollination), và ý then chốt (vai trò quan trọng + đang suy giảm vì nhiều nguyên nhân). Bạn KHÔNG cần nhớ chi tiết (pesticides, disease...) ở bước skim — chỉ nắm bức tranh lớn. Chi tiết sẽ scan lại khi cần trả lời câu hỏi cụ thể."}]},
mid:{mcq:[
{q:"Quy trình làm bài Reading tối ưu là:",opts:["Đọc kỹ cả bài → làm câu hỏi","Skim bài → đọc câu hỏi, gạch từ khóa → scan tìm vùng → đọc kỹ đoạn liên quan","Đọc câu hỏi → dịch cả bài","Làm câu hỏi theo trí nhớ"],a:1,why:"<b>Đúng: B.</b> Skim nắm bố cục trước, rồi dùng từ khóa câu hỏi để scan đúng vùng, cuối cùng đọc kỹ chỉ phần cần thiết. Đọc kỹ cả bài trước là 'cái bẫy cháy giờ'."},
{q:"Dạng câu hỏi nào KHÔNG theo thứ tự bài đọc?",opts:["True/False/Not Given","Sentence completion","Matching Headings","Multiple choice"],a:2,why:"<b>Đúng: Matching Headings.</b> Matching Headings/Information không theo thứ tự — phải xét cả bài. Đa số dạng khác thì đáp án xuất hiện theo thứ tự."},
{q:"Biết đáp án đa số theo thứ tự giúp ích thế nào?",opts:["Không giúp gì","Nếu đã tìm được đáp án câu 4, thì đáp án câu 5 nằm SAU đó trong bài — thu hẹp vùng tìm","Cho phép đoán bừa","Bỏ qua từ khóa"],a:1,why:"<b>Đúng: B.</b> Tính thứ tự giúp thu hẹp vùng tìm kiếm: đã định vị câu 4 thì câu 5 ở phía sau. Tiết kiệm thời gian scan đáng kể."},
{q:"Bài đọc số mấy thường DỄ nhất, nên làm nhanh để dành giờ?",opts:["Bài 1","Bài 2","Bài 3","Đều như nhau"],a:0,why:"<b>Đúng: Bài 1.</b> Độ khó thường tăng dần. Làm bài 1 nhanh gọn để dành thêm thời gian cho bài 3 khó nhất."},
{q:"Câu chủ đề (nắm ý cả đoạn) thường nằm ở:",opts:["Cuối đoạn","Câu đầu đoạn (thường là)","Giữa đoạn","Không đâu cả"],a:1,why:"<b>Đúng: Câu đầu đoạn.</b> Câu chủ đề thường mở đầu đoạn. Đọc câu đầu mỗi đoạn khi skim giúp nắm nhanh ý mỗi đoạn — rất hữu ích cho Matching Headings."}],
writing:[{q:"Luyện scanning: trong đoạn ở phần Cơ bản (về bees), hãy 'quét' để trả lời NHANH 3 câu (không đọc lại kỹ toàn đoạn): (1) Quá trình chuyển phấn hoa gọi là gì? (2) Nêu 3 nguyên nhân khiến ong suy giảm. (3) Ai đang lo ngại? Sau đó mô tả cách mắt bạn di chuyển khi scan.",
model:"<b>Đáp án:</b> (1) pollination. (2) pesticides, disease, habitat loss. (3) scientists.<br><b>Cách scan:</b> Với câu (1), mắt quét tìm từ khóa liên quan 'transfer pollen' và bắt cụm 'known as pollination'. Với (2), quét tìm cụm liệt kê nguyên nhân sau 'due to'. Với (3), quét tìm danh từ chỉ người ở cuối đoạn ('concerns among scientists'). Scanning là để mắt lướt nhanh tìm ĐÚNG mục tiêu (danh từ, cụm 'known as', 'due to'), KHÔNG đọc từng chữ.<br><b>Gợi ý:</b> Các từ dẫn như 'known as', 'due to', 'such as', 'including' thường đứng ngay trước thông tin đáp án — học cách 'bắt' chúng khi quét."}]},
adv:{mcq:[
{q:"Vì sao đọc kỹ (close reading) toàn bộ bài là chiến lược THẤT BẠI ở Reading?",opts:["Vì bài quá dễ","Vì 60 phút không đủ để đọc kỹ 3 bài dài; phải đọc chọn lọc, chỉ đọc sâu vùng chứa đáp án","Vì không được phép","Vì bài không quan trọng"],a:1,why:"<b>Đúng: B.</b> Reading kiểm tra khả năng ĐỊNH VỊ và XỬ LÝ thông tin dưới áp lực thời gian, không phải đọc-hiểu toàn diện. Skim để nắm bản đồ bài, rồi chỉ 'đào sâu' đúng vùng có đáp án. Đọc kỹ tuyến tính từng câu là cách chắc chắn cháy giờ và bỏ sót bài 3."},
{q:"Chiến thuật tối ưu cho Matching Headings (dạng KHÔNG theo thứ tự, khó)?",opts:["Đọc từng heading rồi tìm khắp bài","Đọc kỹ câu đầu và câu cuối mỗi đoạn để nắm Ý CHÍNH đoạn, rồi khớp với heading; làm đoạn dễ trước","Đoán theo thứ tự","Chọn heading dài nhất"],a:1,why:"<b>Đúng: B.</b> Matching Headings kiểm tra khả năng nắm Ý CHÍNH mỗi đoạn (không phải chi tiết). Câu đầu/cuối đoạn thường chứa ý chủ đạo. Làm các đoạn bạn chắc chắn trước để loại dần heading, thu hẹp lựa chọn cho đoạn khó. Cảnh giác heading 'bẫy' chỉ khớp một chi tiết nhỏ chứ không phải ý chính cả đoạn."},
{q:"Trong True/False/Not Given, khác biệt then chốt giữa FALSE và NOT GIVEN là:",opts:["Không có khác biệt","FALSE = bài NÓI NGƯỢC lại thông tin; NOT GIVEN = bài KHÔNG đề cập/không đủ thông tin để xác định","FALSE dễ hơn","NOT GIVEN luôn là đáp án cuối"],a:1,why:"<b>Đúng: B.</b> FALSE: bài đọc chứa thông tin MÂU THUẪN trực tiếp với nhận định. NOT GIVEN: bài KHÔNG cung cấp thông tin để khẳng định hay phủ định. Nhầm lẫn hai cái này là lỗi phổ biến nhất. Mẹo: NOT GIVEN khi bạn 'không tìm thấy bằng chứng nào'; FALSE khi bạn 'tìm thấy bằng chứng NGƯỢC lại'. Đừng dùng kiến thức bên ngoài — chỉ căn cứ vào bài."},
{q:"Khi nào tính 'đáp án theo thứ tự' có thể khiến bạn mắc bẫy?",opts:["Không bao giờ","Khi trộn các dạng câu hỏi — dạng Matching Headings/Information xen vào không theo thứ tự, nên đừng máy móc giả định mọi câu đều tuần tự","Khi bài quá dài","Khi có nhiều số"],a:1,why:"<b>Đúng: B.</b> Một bài đọc có thể có nhiều NHÓM câu hỏi khác nhau. Nhóm completion/TFNG theo thứ tự, nhưng nhóm Matching thì không. Phải biết mình đang làm dạng nào để áp dụng đúng giả định về thứ tự — máy móc áp một quy tắc cho mọi dạng sẽ sai."},
{q:"Kỹ thuật nào giúp trả lời nhanh mà vẫn chính xác dạng completion (điền từ từ bài)?",opts:["Viết từ đồng nghĩa","Xác định LOẠI TỪ cần điền (danh/động/tính từ) từ ngữ pháp câu, rồi scan vùng đáp án tìm từ khớp — và LẤY ĐÚNG TỪ trong bài","Tự nghĩ ra từ","Điền bừa"],a:1,why:"<b>Đúng: B.</b> Dạng completion (điền từ lấy từ bài) đòi hỏi: (1) phân tích ngữ pháp chỗ trống để biết cần loại từ gì, (2) scan đúng vùng, (3) chép CHÍNH XÁC từ trong bài (không đổi dạng, không dùng đồng nghĩa), (4) tuân giới hạn từ. Tự đổi thành từ đồng nghĩa là lỗi khiến mất điểm dù hiểu đúng nghĩa."}],
writing:[{q:"Viết 'quy trình làm bài Reading' cá nhân (8-10 câu, tiếng Anh) áp dụng cho một bài đọc 20 phút: các bước từ skim đến chốt đáp án, cách phân bổ thời gian, cách xử lý dạng theo thứ tự vs không theo thứ tự (Matching Headings), và cách phân biệt FALSE với NOT GIVEN. Trình bày như một checklist mạch lạc.",
model:"<b>Bài mẫu tham khảo:</b> When I begin a reading passage, I first spend two to three minutes skimming it to understand the overall topic and the main idea of each paragraph, focusing on the opening sentences. I then read the questions carefully and underline the keywords before scanning the passage to locate the relevant sections. Because most question types follow the order of the text, once I have found the answer to one question, I know the next answer will appear later in the passage, which saves valuable time. However, for Matching Headings, I remind myself that the answers are not sequential, so I concentrate on identifying the central idea of each paragraph rather than isolated details. When dealing with True, False and Not Given questions, I distinguish carefully between a statement that the text directly contradicts, which is False, and one that the text simply does not mention, which is Not Given. I make sure to rely only on the information in the passage and never on my own outside knowledge. If a question proves too difficult, I mark it and move on immediately, returning to it only if time allows. For gap-fill questions, I identify the type of word required and copy it exactly from the text, respecting the word limit. Throughout, I keep a strict eye on the clock, allowing roughly twenty minutes per passage. This disciplined routine helps me stay accurate without running out of time.<br><b>Tự kiểm tra:</b> Có nêu đủ các bước (skim → gạch từ khóa → scan → đọc kỹ vùng)? Có xử lý riêng dạng theo thứ tự vs Matching Headings? Có phân biệt FALSE vs NOT GIVEN rõ ràng? Có quản lý thời gian 20 phút/bài và xử lý câu khó? Mạch lạc như checklist?"}]}
}}
);
