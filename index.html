{q:"Ở band 9, nếu có lỗi thì thường là:",opts:["Lỗi hệ thống","Lỗi 'trượt tay' (slip) hiếm như của người bản ngữ","Lỗi ngữ pháp cơ bản","Lỗi mọi câu"],a:1,why:"<b>Đúng: B.</b> Lỗi band 9 cực hiếm và thuộc loại 'trượt tay' tự nhiên, không phải lỗi hệ thống."},
{q:"Lựa chọn band 9 đôi khi là:",opts:["Từ hiếm nhất","Một từ ĐƠN GIẢN nhưng CHÍNH XÁC tuyệt đối cho ngữ cảnh","Câu phức nhất","Nhiều thành ngữ"],a:1,why:"<b>Đúng: B.</b> Band 9 là dùng ĐÚNG từ cho đúng sắc thái — đôi khi từ đơn giản chính xác hơn từ 'kêu'."},
{q:"Band 9 có cần thiết cho hầu hết mục đích không?",opts:["Luôn cần","Không — đại học thường yêu cầu 6.5-7.5; nhưng hiểu chuẩn band 9 giúp tinh chỉnh","Chỉ để du học","Bắt buộc mọi nơi"],a:1,why:"<b>Đúng: B.</b> Band 9 rất hiếm và ít khi cần; nhưng tư duy band 9 (chính xác, tự nhiên) nâng chất lượng dù mục tiêu thấp hơn."}],
writing:[{q:"Suy ngẫm về band 9. Viết một đoạn (5-6 câu tiếng Anh) giải thích, theo hiểu biết của bạn, điều gì phân biệt một bài viết band 9 với band 8 — tập trung vào sự tự nhiên, độ chính xác, và tinh tế, thay vì 'từ khó' hay 'câu dài'.",
model:"<b>Bài mẫu tham khảo:</b> What truly distinguishes band nine writing from band eight is not the use of rarer words or more elaborate sentences, but a sense of complete naturalness and control. A band nine writer selects precisely the right word for every nuance, so that the language reads as though written by a highly educated native speaker rather than someone reaching for impressive vocabulary. Errors are virtually absent, and any that do occur resemble the occasional slips that even fluent writers make. The ideas are developed so thoroughly and organised so seamlessly that the reader never notices the underlying structure. In essence, band nine represents effortless mastery: the language serves the meaning perfectly, without ever drawing attention to itself.<br><b>Tự kiểm tra:</b> Có nhấn mạnh sự TỰ NHIÊN (như bản ngữ có học thức)? Độ chính xác (lỗi gần như không có)? Tinh tế (chọn đúng từ cho sắc thái)? Phân biệt với 'từ khó/câu dài'? Chính đoạn của bạn có tự nhiên, chính xác không?"}]},
mid:{mcq:[
{q:"Task Response band 9 khác band 8 ở:",opts:["Dài hơn","Xử lý HOÀN TOÀN thấu đáo, mọi khía cạnh phát triển trọn vẹn, không chỗ nào 'hụt'","Nhiều ý hơn","Nhiều ví dụ hơn"],a:1,why:"<b>Đúng: B.</b> Band 9 xử lý đề hoàn toàn thấu đáo, không khía cạnh nào bị bỏ lửng hay xử lý hời hợt — trọn vẹn ở mọi phần."},
{q:"Sự TỰ NHIÊN band 9 đạt được chủ yếu qua:",opts:["Học thuộc mẫu","Tiếp xúc SÂU và LÂU DÀI với tiếng Anh chất lượng (đọc/nghe nhiều) đến khi ngôn ngữ 'thấm'","Dùng từ điển","Dịch cẩn thận"],a:1,why:"<b>Đúng: B.</b> Sự tự nhiên đến từ tiếp xúc sâu, lâu dài (đọc sách, nghe tài liệu chất lượng) — ngôn ngữ trở thành phản xạ, không 'dịch'."},
{q:"Ở band 9, độ đa dạng ngữ pháp đi kèm:",opts:["Nhiều lỗi hơn","Độ chính xác gần TUYỆT ĐỐI (lỗi chỉ như người bản ngữ)","Câu đơn giản","Ít cấu trúc hơn"],a:1,why:"<b>Đúng: B.</b> Band 9 = đa dạng đầy đủ VÀ chính xác gần tuyệt đối cùng lúc — đây là điều rất khó, phân biệt với band 8 (còn lỗi 'occasional')."},
{q:"Tư duy band 9 giúp ích gì cho người nhắm band 8?",opts:["Không giúp gì","Nâng chất lượng tổng thể — hướng tới chính xác tuyệt đối, tự nhiên, tinh tế cải thiện cả bài dù không đạt 9","Làm nản lòng","Chỉ phí thời gian"],a:1,why:"<b>Đúng: B.</b> Ngay cả khi mục tiêu là 8.0, hướng tới chuẩn band 9 (mài giũa sự chính xác và tự nhiên) nâng chất lượng tổng thể của bài."},
{q:"Coherence band 9 được mô tả là:",opts:["Nhiều từ nối","Mạch lạc đến mức 'không nhận ra' cơ chế — tổ chức tự nhiên, hoàn hảo","Ít liên kết","Đoạn ngắn"],a:1,why:"<b>Đúng: B.</b> Band 9 mạch lạc hoàn hảo đến mức người đọc không để ý đến 'cấu trúc' — ý chảy tự nhiên như thể không cần nỗ lực tổ chức."}],
writing:[{q:"Viết một đoạn thân bài (7-8 câu tiếng Anh) cho một đề Task 2 bạn chọn, cố gắng đạt các phẩm chất band 9: độ chính xác tuyệt đối (không lỗi), sự tự nhiên (như bản ngữ có học thức), và tinh tế (chọn đúng từ cho sắc thái). Sau đó tự đánh giá xem có chỗ nào chưa thật tự nhiên/chính xác.",
model:"<b>Bài mẫu tham khảo:</b> One of the strongest arguments for prioritising renewable energy lies in its capacity to reconcile economic and environmental objectives that are too often treated as irreconcilable. Far from imposing a burden on national economies, the transition to cleaner power has increasingly proven to be a source of growth in its own right, generating employment in manufacturing, installation and research. Denmark offers a telling illustration: by investing early and consistently in wind power, it has not only reduced its carbon footprint but also established itself as a global exporter of the very technology it pioneered. Critics who dismiss renewables as prohibitively expensive tend to overlook how sharply costs have fallen, to the point where solar and wind are now among the cheapest sources of electricity in many regions. What once seemed an idealistic aspiration has, in short, become a hard-headed economic calculation. Seen in this light, continued investment represents not a sacrifice but an opportunity that forward-looking governments can ill afford to ignore.<br><b>Tự kiểm tra:</b> Có lỗi ngữ pháp/từ vựng nào không (mục tiêu: không)? Ngôn ngữ nghe TỰ NHIÊN, như bản ngữ có học thức (reconcile...irreconcilable, a telling illustration, hard-headed, ill afford)? Từ chọn CHÍNH XÁC cho sắc thái? Ý phát triển trọn vẹn, mạch lạc tự nhiên? Có chỗ nào còn 'gượng' hoặc 'dịch' không?"}]},
adv:{mcq:[
{q:"Mô tả CHÍNH XÁC nhất về band 9 (Expert user) là:",opts:["Không bao giờ mắc bất kỳ lỗi nào","Kiểm soát tiếng Anh đầy đủ, phù hợp, chính xác và trôi chảy với sự hiểu biết hoàn chỉnh; lỗi (nếu có) cực hiếm và như của người bản ngữ","Dùng từ vựng học thuật nhất","Viết dài và phức tạp nhất"],a:1,why:"<b>Đúng: B.</b> Band 9: 'has fully operational command of the language: appropriate, accurate and fluent with complete understanding'. Điểm mấu chốt: không phải 'zero lỗi tuyệt đối' (ngay người bản ngữ cũng trượt tay), mà là kiểm soát ĐẦY ĐỦ và PHÙ HỢP — dùng đúng ngôn ngữ cho đúng ngữ cảnh, chính xác gần tuyệt đối, trôi chảy hoàn toàn, hiểu trọn vẹn. 'Appropriate' (phù hợp) quan trọng: band 9 chọn đúng register, đúng sắc thái, không chỉ 'đúng ngữ pháp'."},
{q:"Vì sao 'dùng từ đơn giản chính xác' đôi khi là lựa chọn band 9, còn 'nhồi từ hiếm' thì không?",opts:["Từ hiếm bị cấm","Vì band 9 là dùng ngôn ngữ phục vụ NGHĨA một cách chính xác và tự nhiên nhất; một từ đơn giản dùng hoàn hảo truyền đạt ý rõ hơn một từ hiếm dùng lệch sắc thái hoặc gượng ép","Từ đơn giản dễ hơn","Giám khảo thích từ đơn giản"],a:1,why:"<b>Đúng: B.</b> Bản chất band 9 là sự THÀNH THẠO phục vụ giao tiếp: ngôn ngữ trở nên 'trong suốt', chuyển tải ý một cách chính xác, tự nhiên, không thu hút sự chú ý về chính nó. Người dùng band 9 chọn từ vì nó ĐÚNG NHẤT cho sắc thái và ngữ cảnh — đôi khi đó là từ đơn giản, quen thuộc dùng hoàn hảo. Ngược lại, 'nhồi' từ hiếm để gây ấn tượng thường dẫn đến lệch sắc thái, collocation sai, hoặc văn phong không tự nhiên — dấu hiệu của người CỐ GẮNG tỏ ra giỏi, trái ngược với sự thành thạo thoải mái của band 9. Sự tinh tế nằm ở lựa chọn ĐÚNG, không phải KHÓ."},
{q:"Bản chất của hành trình 8 → 9 khác gì với các chặng trước (VD 6 → 7)?",opts:["Giống hệt","Các chặng trước chủ yếu là XÂY DỰNG (học thêm cấu trúc, từ vựng, kỹ năng mới); 8 → 9 chủ yếu là HOÀN THIỆN qua tiếp xúc sâu — mài giũa sự tự nhiên, loại lỗi cuối, đạt tinh tế, một quá trình chậm và tích lũy","Dễ hơn","Chỉ cần học mẹo"],a:1,why:"<b>Đúng: B.</b> Các chặng đầu là mở rộng NĂNG LỰC: thêm cấu trúc ngữ pháp, mở rộng vốn từ, học kỹ năng làm bài. Đến band 8, người học đã sở hữu gần như toàn bộ 'bộ công cụ'. Hành trình 8 → 9 khác về BẢN CHẤT: không phải thêm công cụ, mà là HOÀN THIỆN cách dùng chúng — đạt sự tự nhiên như bản ngữ, loại bỏ những lỗi 'trượt tay' cuối cùng, phát triển sự tinh tế trong từng lựa chọn. Điều này đến chủ yếu qua TIẾP XÚC SÂU và LÂU DÀI với tiếng Anh chất lượng cao (đọc rộng, nghe nhiều, viết và nhận phản hồi tinh tế), một quá trình tích lũy chậm, không thể 'nhồi' bằng mẹo. Đó là lý do band 9 hiếm: nó đòi hỏi sự đắm mình lâu dài, gần như 'sống' trong ngôn ngữ."},
{q:"Tại sao hiểu chuẩn band 9 vẫn hữu ích ngay cả với thí sinh nhắm band 7-7.5?",opts:["Không hữu ích","Vì nó cung cấp một 'ngôi sao dẫn đường' về chất lượng: hướng tới độ chính xác, tự nhiên và tinh tế của band 9 (dù không đạt) sẽ kéo chất lượng tổng thể của bài lên, giúp đạt band mục tiêu vững hơn","Để khoe","Chỉ gây áp lực"],a:1,why:"<b>Đúng: B.</b> Chuẩn band 9 hoạt động như một 'ngôi sao Bắc Đẩu' — bạn không cần chạm tới nó để hưởng lợi từ việc nhắm về hướng đó. Một thí sinh nhắm 7.0 mà nội tâm hóa các nguyên tắc band 9 (chọn từ chính xác cho sắc thái, loại bỏ lỗi hệ thống, làm ngôn ngữ tự nhiên hơn, phát triển ý thấu đáo) sẽ tạo ra bài viết/nói chất lượng cao hơn hẳn so với người chỉ nhắm 'đủ 7'. Hướng tới sự xuất sắc kéo toàn bộ chất lượng lên, tạo 'biên an toàn' để đạt và vượt band mục tiêu. Ngoài ra, các phẩm chất band 9 (chính xác, tự nhiên, tinh tế) là những kỹ năng ngôn ngữ THẬT, giá trị vượt ra ngoài kỳ thi."},
{q:"Điều gì KHÔNG phải là đặc điểm của band 9?",opts:["Sự tự nhiên hoàn toàn như bản ngữ có học thức","Cố ý dùng cấu trúc phức tạp và từ hiếm nhất có thể để gây ấn tượng","Độ chính xác gần tuyệt đối","Điều chỉnh ngôn ngữ tinh tế theo ngữ cảnh và sắc thái"],a:1,why:"<b>Đúng: B (đây KHÔNG phải đặc điểm band 9).</b> Cố ý nhồi cấu trúc phức và từ hiếm 'để gây ấn tượng' thực ra TRÁI với band 9. Band 9 đặc trưng bởi sự thành thạo THOẢI MÁI và TỰ NHIÊN: ngôn ngữ phục vụ ý một cách chính xác và trong suốt, không phô trương. Người band 9 dùng cấu trúc phức và từ ít phổ biến KHI CHÚNG LÀ LỰA CHỌN ĐÚNG NHẤT cho ý và ngữ cảnh — không phải để 'trình diễn'. Nỗ lực gây ấn tượng lộ liễu (thay vì để ngôn ngữ tự nhiên phục vụ giao tiếp) là dấu hiệu của band THẤP hơn, của người đang 'với' tới trình độ chưa thực sự làm chủ. Ba đặc điểm còn lại (tự nhiên, chính xác gần tuyệt đối, tinh tế theo ngữ cảnh) đúng là bản chất band 9."}],
writing:[{q:"Viết một đoạn phân tích (8-10 câu tiếng Anh) đạt chất lượng cao nhất bạn có thể, về chủ đề: 'What does it truly mean to master a language?' Hãy để chính đoạn văn thể hiện các phẩm chất bạn mô tả — chính xác tuyệt đối, tự nhiên, tinh tế. Sau đó tự đánh giá đoạn theo chuẩn band 9.",
model:"<b>Bài mẫu tham khảo:</b> To master a language is to reach the point at which it ceases to feel like a foreign system and begins to function as an extension of one's own thought. True mastery is not measured by the size of one's vocabulary or the complexity of one's sentences, but by the effortless precision with which meaning is conveyed. A person who has genuinely mastered a language chooses each word not because it is impressive, but because it is exactly right, capturing a shade of meaning that a lesser choice would blur. Crucially, this command extends beyond mere accuracy to a feel for register, tone and cultural nuance — knowing instinctively when to be formal and when to be playful, when a proverb will land and when it will jar. Such fluency is rarely the product of study alone; it is cultivated through years of immersion, of reading, listening and living within the language until its rhythms become second nature. Errors, at this level, do not vanish entirely, but they resemble the occasional slips of a native speaker rather than the systematic mistakes of a learner. Perhaps the surest sign of mastery is invisibility: the language draws no attention to itself, allowing thought to pass through it unimpeded. In this sense, to master a language is not to conquer it, but to inhabit it so completely that the boundary between speaker and speech dissolves.<br><b>Tự kiểm tra:</b> Đoạn có lỗi nào không (mục tiêu: không)? Ngôn ngữ tự nhiên như bản ngữ có học thức? Từ chọn chính xác cho sắc thái (blur, jar, land, inhabit, dissolves)? Ý phát triển sâu, mạch lạc hoàn hảo? Có 'trong suốt' — phục vụ ý mà không phô trương? Chỗ nào (nếu có) còn có thể tự nhiên/chính xác hơn?"}]}
}},
/* ===== BÀI 62 ===== */
{id:"g62",stage:7,title:"Bài 62 · Writing Task 2 band 9 — lập luận & phát triển hoàn hảo",
theory:`<h3>1. Task 2 band 9: xử lý đề HOÀN TOÀN thấu đáo</h3>
<p>Band 9 trả lời mọi phần của đề một cách đầy đủ; mọi ý chính được phát triển TRỌN VẸN, được hỗ trợ và mở rộng đầy đủ; lập trường rõ ràng, phát triển tốt và hoàn toàn thuyết phục. Không chỗ nào 'hụt', không ý nào bỏ lửng.</p>
<h3>2. Lập luận band 9: chiều sâu + sự cân nhắc tinh tế</h3>
<ul>
<li><b>Đào sâu đến tận cùng:</b> mỗi luận điểm được truy đến hệ quả sâu xa nhất, không dừng nửa chừng.</li>
<li><b>Cân nhắc đa chiều tự nhiên:</b> nhận ra và xử lý các phản biện, ngoại lệ, sắc thái một cách mượt mà — không gượng.</li>
<li><b>Lập trường chín chắn:</b> tinh tế mà vẫn rõ ràng; thể hiện sự phán đoán trưởng thành về vấn đề phức tạp.</li>
</ul>
<h3>3. Ví dụ band 9: tích hợp hoàn hảo</h3>
<p>Ví dụ không 'dán vào' mà được DỆT vào lập luận — nó minh họa chính xác, tự nhiên, và thường tự nó đẩy lập luận tiến thêm. Ví dụ có thể tinh tế, cụ thể, đáng tin, và phục vụ đúng mục đích lập luận.</p>
<h3>4. Cấu trúc band 9: tổ chức 'vô hình'</h3>
<p>Bài band 9 có thể theo cấu trúc chuẩn nhưng thực hiện nó mượt đến mức tự nhiên. Chuyển ý, chuyển đoạn liền mạch; mỗi đoạn phát triển một khối ý logic; toàn bài đọc như một dòng chảy lập luận thống nhất, không phải các 'khối' ghép lại.</p>
<h3>5. Mở bài & kết bài band 9</h3>
<div class="example"><b>Mở bài band 9:</b> không công thức máy móc — dẫn dắt vào vấn đề một cách tự nhiên, paraphrase đề tinh tế, nêu lập trường rõ và tinh tế.<br><b>Kết bài band 9:</b> không chỉ 'lặp lại' — tổng hợp lập luận một cách sâu sắc, có thể nâng lên một tầm nhìn rộng hơn hoặc một hàm ý sâu, mà không đưa ý mới lạc đề.</div>
<p class="muted">⚠️ Band 9 Task 2 KHÔNG phải bài dài nhất hay 'kêu' nhất. Đó là bài mà mỗi câu đóng góp, mỗi ý được đào trọn vẹn, lập luận sắc bén và cân nhắc, ngôn ngữ chính xác và tự nhiên, và toàn bài thuyết phục hoàn toàn. Chất lượng tư duy + sự hoàn thiện ngôn ngữ, không phải sự phô trương.</p>`,
levels:{
basic:{mcq:[
{q:"Task 2 band 9 xử lý đề:",opts:["Đủ mức tối thiểu","HOÀN TOÀN thấu đáo — mọi phần đầy đủ, mọi ý phát triển trọn vẹn","Chỉ phần dễ","Càng nhiều ý càng tốt"],a:1,why:"<b>Đúng: B.</b> Band 9 trả lời mọi phần đề đầy đủ, mọi ý chính được phát triển trọn vẹn, không chỗ nào hụt."},
{q:"Ví dụ band 9 được:",opts:["Dán vào rời rạc","DỆT vào lập luận — minh họa chính xác, tự nhiên, đẩy lập luận tiến thêm","Bỏ qua","Là số liệu giả"],a:1,why:"<b>Đúng: B.</b> Ví dụ band 9 tích hợp hữu cơ vào lập luận, không phải phần trang trí 'dán' vào."},
{q:"Kết bài band 9 nên:",opts:["Chỉ lặp lại mở bài","Tổng hợp sâu sắc, có thể nâng lên tầm nhìn rộng hơn, KHÔNG thêm ý mới lạc đề","Đưa ý tưởng hoàn toàn mới","Bỏ trống"],a:1,why:"<b>Đúng: B.</b> Kết bài band 9 tổng hợp lập luận sâu sắc, không chỉ 'lặp lại' máy móc — nhưng không lạc sang ý mới."},
{q:"Band 9 Task 2 KHÔNG phải là:",opts:["Bài mỗi câu đóng góp","Bài dài nhất, 'kêu' nhất, phô trương nhất","Lập luận sắc bén","Ngôn ngữ tự nhiên"],a:1,why:"<b>Đúng: Bài phô trương.</b> Band 9 là chất lượng tư duy + hoàn thiện ngôn ngữ, không phải độ dài hay sự 'kêu'."},
{q:"Cấu trúc bài band 9:",opts:["Không có cấu trúc","Tổ chức mượt đến mức 'vô hình' — dòng chảy lập luận thống nhất, không phải các khối ghép","Phức tạp khó theo","Nhiều đoạn ngắn"],a:1,why:"<b>Đúng: B.</b> Band 9 tổ chức tự nhiên, liền mạch — bài đọc như một dòng chảy thống nhất, không phải các khối rời."}],
writing:[{q:"Viết phần MỞ BÀI band 9 (3-4 câu tiếng Anh) cho đề sau — dẫn dắt tự nhiên, paraphrase tinh tế, lập trường rõ và tinh tế: 'In many countries, the gap between the rich and the poor is widening. What problems does this cause, and what can be done to address them?'",
model:"<b>Bài mẫu tham khảo:</b> Across much of the world, the divide between the wealthiest and the poorest members of society has grown steadily wider in recent decades, a trend that shows little sign of reversing. Far from being a matter of mere statistics, this deepening inequality carries profound consequences for social cohesion, economic stability and individual opportunity. While no single measure can fully close such a gap, a combination of progressive taxation and targeted investment in education offers the most realistic path forward. This essay will examine the principal problems that widening inequality creates before considering how they might most effectively be addressed.<br><b>Tự kiểm tra:</b> Dẫn dắt vào vấn đề tự nhiên (không công thức máy móc 'Nowadays...')? Paraphrase đề tinh tế (gap between rich and poor → divide between wealthiest and poorest; widening → grown wider)? Nêu lập trường/hướng trả lời rõ và tinh tế? Ngôn ngữ chính xác, tự nhiên, không lỗi?"}]},
mid:{mcq:[
{q:"Lập luận band 9 khác band 8 chủ yếu ở:",opts:["Dài hơn","Chiều sâu đào đến tận cùng + cân nhắc đa chiều TỰ NHIÊN + phán đoán chín chắn về vấn đề phức tạp","Nhiều từ nối","Nhiều ví dụ"],a:1,why:"<b>Đúng: B.</b> Band 9 truy lập luận đến hệ quả sâu nhất, xử lý phản biện/sắc thái mượt mà, thể hiện sự chín chắn — vượt band 8 về độ tinh tế."},
{q:"Chuyển đoạn band 9 nên:",opts:["Dùng 'Firstly, Secondly'","Liền mạch, tự nhiên — câu chuyển nối ý đoạn trước với đoạn sau một cách mượt mà","Không chuyển","Bắt đầu đoạn mới đột ngột"],a:1,why:"<b>Đúng: B.</b> Band 9 chuyển đoạn mượt, tạo dòng chảy — không dựa vào từ đánh số máy móc mà nối ý tự nhiên."},
{q:"Lập trường band 9 là:",opts:["Mơ hồ để an toàn","Tinh tế (nhận ra phức tạp) MÀ VẪN rõ ràng, nhất quán, thuyết phục","Cực đoan một chiều","Không có lập trường"],a:1,why:"<b>Đúng: B.</b> Band 9 cân bằng hoàn hảo giữa tinh tế (thấy nhiều mặt) và rõ ràng (lập trường vững, thuyết phục) — không mơ hồ, không cực đoan."},
{q:"Mỗi đoạn thân bài band 9:",opts:["Chứa nhiều ý rời","Phát triển MỘT khối ý logic một cách trọn vẹn, thống nhất","Chỉ một câu","Không câu chủ đề"],a:1,why:"<b>Đúng: B.</b> Mỗi đoạn band 9 là một khối ý logic thống nhất, được phát triển trọn vẹn — nền tảng của mạch lạc hoàn hảo."},
{q:"Ví dụ band 9 lý tưởng:",opts:["Số liệu giả gây ấn tượng","Cụ thể, đáng tin, tích hợp chặt vào lập luận và phục vụ đúng mục đích","Càng nhiều càng tốt","Chung chung"],a:1,why:"<b>Đúng: B.</b> Ví dụ band 9 cụ thể, đáng tin, dệt vào lập luận và minh họa chính xác — chất lượng và sự tích hợp quan trọng hơn số lượng."}],
writing:[{q:"Viết một đoạn thân bài band 9 (8-10 câu tiếng Anh) cho đề về bất bình đẳng ở phần Cơ bản (vấn đề & giải pháp), chọn viết về VẤN ĐỀ: đào sâu một vấn đề chính của bất bình đẳng đến tận cùng hệ quả, tích hợp ví dụ chặt chẽ, xử lý sắc thái, ngôn ngữ chính xác và tự nhiên. Sau đó tự đánh giá theo chuẩn band 9.",
model:"<b>Bài mẫu tham khảo:</b> Perhaps the most corrosive consequence of widening inequality is the gradual erosion of social mobility, which undermines the very promise that effort and talent will be rewarded. When wealth becomes concentrated in the hands of a shrinking elite, access to the resources that enable advancement — quality education, professional networks, even good health — increasingly depends on the circumstances of one's birth rather than one's ability. A child born into poverty may possess every ounce of the potential of a wealthier peer, yet find the ladder of opportunity has had its lower rungs removed. Over time, this entrenchment breeds not only individual frustration but a corrosive sense of injustice that can fracture the bonds holding a society together. History offers sobering illustrations of what follows when large segments of a population come to believe the system is rigged against them, from social unrest to the erosion of trust in democratic institutions. What makes this problem so insidious is that it is self-reinforcing: inequality begets diminished opportunity, which in turn deepens inequality for the next generation. Left unaddressed, it threatens to transform a temporary economic disparity into a permanent and hereditary divide.<br><b>Tự kiểm tra:</b> Đào một vấn đề (mobility/mobility erosion) đến tận cùng hệ quả (individual → social → thế hệ sau)? Ví dụ/minh họa tích hợp chặt (child born into poverty; history)? Xử lý sắc thái (self-reinforcing, insidious)? Ngôn ngữ chính xác, tự nhiên (corrosive, entrenchment, rigged, insidious, hereditary)? KHÔNG lỗi? Mạch lạc, mỗi câu đóng góp?"}]},
adv:{mcq:[
{q:"Đặc điểm CHÍNH của Task Response band 9 (khác band 8) là:",opts:["Bài dài hơn nhiều","Xử lý MỌI phần của đề đầy đủ; mọi ý chính được phát triển TRỌN VẸN, hỗ trợ và mở rộng đầy đủ; không có phần nào bị xử lý hời hợt hay bỏ lửng","Nhiều từ vựng học thuật hơn","Nhiều đoạn hơn"],a:1,why:"<b>Đúng: B.</b> Band 9 Task Response: 'fully addresses all parts of the task', 'presents a fully developed position', 'ideas are relevant, fully extended and well supported'. Khác biệt tinh tế với band 8: band 8 xử lý đề 'sufficiently' và ý 'well extended'; band 9 là HOÀN TOÀN và TRỌN VẸN — không một khía cạnh nào của đề bị bỏ qua hay xử lý nông, mọi ý được đào đến cùng. Đây là sự khác biệt giữa 'rất tốt' và 'trọn vẹn không tì vết' về mặt nội dung."},
{q:"Vì sao ví dụ 'được dệt vào lập luận' lại là dấu hiệu band 9, khác với ví dụ 'được dán vào'?",opts:["Không khác","Vì ở band 9 ví dụ không phải phần bổ sung tách rời mà là bộ phận hữu cơ của lập luận — nó minh họa chính xác luận điểm, xuất hiện tự nhiên trong mạch, và thường tự nó làm sáng tỏ hoặc đẩy lập luận tiến thêm","Vì band 9 không cần ví dụ","Vì ví dụ phải dài"],a:1,why:"<b>Đúng: B.</b> Ở các band thấp hơn, ví dụ thường bị 'dán' vào một cách máy móc và tách biệt ('For example, in my country...') như một mục bắt buộc phải có. Ở band 9, ranh giới giữa 'lập luận' và 'ví dụ' mờ đi: ví dụ được dẫn vào một cách mượt mà đúng nơi nó củng cố luận điểm, minh họa CHÍNH XÁC ý đang bàn (không lệch, không chung chung), và thường tự nó tiết lộ thêm một khía cạnh hoặc đẩy lập luận sang bước tiếp theo. Ví dụ trở thành công cụ tư duy, không phải phần trang trí. Sự tích hợp liền mạch này phản ánh cả tư duy mạch lạc lẫn khả năng ngôn ngữ dệt các thành phần thành một tổng thể thống nhất."},
{q:"Về kết bài band 9, điều gì phân biệt nó với kết bài band 7-8 'tốt'?",opts:["Dài hơn","Nó không chỉ tóm tắt mà TỔNG HỢP lập luận một cách sâu sắc — có thể chưng cất thành một nhận định cô đọng, nâng lên một hàm ý hoặc tầm nhìn rộng hơn, để lại ấn tượng về sự chín chắn — mà không đưa ý mới lạc đề","Có nhiều từ nối hơn","Nhắc lại mọi ý chi tiết"],a:1,why:"<b>Đúng: B.</b> Kết bài band 7-8 'tốt' thường tóm tắt rõ ràng lập trường và các ý chính — đủ và đúng. Kết bài band 9 vượt lên: nó TỔNG HỢP (không chỉ liệt kê lại) lập luận thành một nhận định cô đọng, sắc bén; nó có thể nâng góc nhìn lên một tầm cao hơn — một hàm ý xã hội sâu xa, một sự cân nhắc cuối cùng tinh tế, hoặc một khung nhìn rộng đặt vấn đề vào bối cảnh lớn hơn — để lại cho người đọc cảm giác về chiều sâu và sự chín chắn. Điều then chốt: nó làm điều này mà KHÔNG mở ra ý mới cần tranh luận (điều sẽ phá vỡ cấu trúc). Đó là nghệ thuật 'đóng' bài một cách vừa cô đọng vừa vang vọng."},
{q:"Một bài đạt Grammar và Lexical band 9 nhưng Task Response chỉ band 7 sẽ có vấn đề gì về mặt tổng thể?",opts:["Không vấn đề gì","Ngôn ngữ hoàn hảo không cứu được nội dung thiếu sót — nếu đề không được xử lý đầy đủ hoặc ý phát triển nông, điểm Task Response vẫn giới hạn ở 7 và kéo điểm Writing tổng xuống, bất kể ngôn ngữ xuất sắc","Vẫn được band 9 tổng","Task Response không quan trọng"],a:1,why:"<b>Đúng: B.</b> Bốn tiêu chí Writing độc lập và mỗi cái 25%. Ngôn ngữ band 9 (Grammar + Lexical hoàn hảo) KHÔNG bù được cho nội dung yếu: nếu bài không trả lời đầy đủ mọi phần đề, hoặc ý phát triển nông/lập trường không rõ, thì Task Response vẫn bị chấm ở band 7 — và điểm Writing là trung bình bốn tiêu chí, nên nó kéo tổng xuống. Đây là bài học quan trọng: sự xuất sắc ngôn ngữ và sự thấu đáo nội dung là hai chiều KHÁC NHAU, cả hai đều cần thiết. Một số thí sinh giỏi ngôn ngữ mải mê trau chuốt câu chữ mà quên đọc kỹ đề và phát triển ý trọn vẹn — bài 'đẹp' nhưng không 'đắt' về nội dung. Band 9 thực sự đòi hỏi CẢ ngôn ngữ hoàn hảo LẪN tư duy thấu đáo, được thể hiện đồng thời."},
{q:"Đâu là hiểu lầm phổ biến nhất về bài Task 2 'band 9'?",opts:["Rằng nó cần lập luận sâu","Rằng nó phải dùng cấu trúc phức tạp nhất, từ vựng hiếm nhất và dài nhất có thể — trong khi thực chất band 9 là mỗi câu ĐÓNG GÓP, ngôn ngữ chính xác và tự nhiên phục vụ lập luận, và toàn bài thuyết phục hoàn toàn","Rằng nó cần ví dụ tốt","Rằng nó cần lập trường rõ"],a:1,why:"<b>Đúng: B.</b> Hiểu lầm tai hại nhất là đánh đồng band 9 với sự PHỨC TẠP và PHÔ TRƯƠNG tối đa — nhồi câu dài nhiều mệnh đề, từ vựng càng hiếm càng tốt, bài càng dài càng ấn tượng. Thực tế ngược lại: band 9 đặc trưng bởi sự CHÍNH XÁC, TỰ NHIÊN và HIỆU QUẢ. Mỗi câu đóng góp cho lập luận (không có câu 'độn' để kéo dài); ngôn ngữ được chọn vì nó ĐÚNG NHẤT (đôi khi đơn giản); độ dài vừa đủ để phát triển ý trọn vẹn mà không lan man; và trên hết, toàn bài THUYẾT PHỤC hoàn toàn nhờ chất lượng tư duy và sự rõ ràng. Sự phức tạp phô trương thực ra thường HẠ điểm (làm câu tối nghĩa, tăng lỗi, giọng thiếu tự nhiên). Band 9 là sự thanh lịch của sự chính xác, không phải sự rối rắm của sự phô trương."}],
writing:[{q:"Viết một bài Task 2 band 9 HOÀN CHỈNH (khoảng 280-320 từ, tiếng Anh) cho đề: 'Some people believe that competition among children should be encouraged, while others think children should be taught to cooperate. Discuss both views and give your own opinion.' Thể hiện mọi phẩm chất band 9: xử lý đề hoàn toàn thấu đáo (cả hai view + opinion rõ), lập luận sâu và cân nhắc, ví dụ tích hợp, cấu trúc mượt 'vô hình', ngôn ngữ chính xác và tự nhiên không lỗi. Tự đánh giá sau khi viết.",
model:"<b>Bài mẫu tham khảo (~305 từ):</b> Few questions divide educators more sharply than whether children thrive on competition or cooperation. While both instincts have their advocates, I would argue that the two are not truly opposed, and that a thoughtful upbringing should cultivate each in its proper place.<br><br>Those who champion competition point, with some justification, to its power to motivate. A degree of rivalry can push children to discover the limits of their ability, to develop resilience in the face of setbacks, and to prepare for a world in which competition is, for better or worse, inescapable. A child who has learned to lose a game gracefully and try again has acquired something genuinely valuable. Pushed too far, however, competition exacts a heavy toll: it can breed anxiety, corrode self-worth in those who repeatedly fall short, and reduce the joy of learning to a relentless scramble for superiority.<br><br>The case for cooperation rests on equally firm ground. Human achievement, from scientific discovery to the running of a household, depends overwhelmingly on the ability to work with others. Children taught to share, to listen and to pursue common goals develop the empathy and social intelligence that no examination can measure, yet which prove indispensable throughout life. The danger, of course, is that an exclusive emphasis on harmony may leave children ill-equipped for the competitive pressures they will inevitably encounter.<br><br>In my view, the dichotomy is a false one. The healthiest approach is not to choose between competition and cooperation but to help children understand when each is appropriate — to compete without hostility and to cooperate without losing their individuality. A child who masters both will be far better prepared for adult life than one schooled narrowly in either. Ultimately, the goal of education should be balance, not the triumph of one impulse over the other.<br><b>Tự kiểm tra:</b> Xử lý HOÀN TOÀN đề (bàn CẢ HAI view đầy đủ + opinion rõ, tinh tế)? Lập luận sâu, cân nhắc cả mặt lợi/hại mỗi bên? Lập trường tinh tế mà rõ ('false dichotomy', 'balance')? Ví dụ tích hợp (child losing a game; household)? Cấu trúc mượt, chuyển đoạn tự nhiên? Ngôn ngữ chính xác, tự nhiên (champion, exacts a heavy toll, indispensable, ill-equipped)? KHÔNG lỗi? Mỗi câu đóng góp? Kết bài tổng hợp sâu, không ý mới?"}]}
}},
/* ===== BÀI 63 ===== */
{id:"g63",stage:7,title:"Bài 63 · Độ chính xác tuyệt đối & tự biên tập",
theory:`<h3>1. Band 9 = độ chính xác gần TUYỆT ĐỐI</h3>
<p>Grammar band 9: 'dùng đa dạng đầy đủ cấu trúc với độ chính xác và linh hoạt hoàn toàn'. Lexical band 9: 'kiểm soát đầy đủ đặc trưng từ vựng; lỗi hiếm hoi chỉ là trượt tay'. Để đạt điều này, kỹ năng TỰ BIÊN TẬP (self-editing) là tối quan trọng.</p>
<h3>2. Nghệ thuật tự biên tập (proofreading)</h3>
<p>Ngay cả người rất giỏi cũng mắc lỗi 'trượt tay' khi viết dưới áp lực. Điều phân biệt band 9 là khả năng TỰ PHÁT HIỆN và SỬA chúng. Dành 2-3 phút cuối để rà soát có hệ thống.</p>
<h3>3. Rà soát theo LƯỢT (mỗi lượt một loại lỗi)</h3>
<table><tr><th>Lượt rà</th><th>Kiểm tra gì</th></tr>
<tr><td>Lượt 1 — Ngữ pháp</td><td>Thì, hòa hợp chủ-vị, mạo từ, giới từ, số nhiều/ít</td></tr>
<tr><td>Lượt 2 — Từ vựng</td><td>Collocation, chọn từ đúng sắc thái, từ lặp</td></tr>
<tr><td>Lượt 3 — Rõ ràng</td><td>Câu nào tối nghĩa/mơ hồ? Tham chiếu (this/it) có rõ?</td></tr>
<tr><td>Lượt 4 — Task/chính tả</td><td>Trả lời đủ đề? Đủ từ? Chính tả, dấu câu?</td></tr></table>
<h3>4. Các lỗi 'trượt tay' thường gặp cần soát</h3>
<ul>
<li>Quên 's' ở động từ ngôi thứ 3 số ít (he go → he goes) hoặc danh từ số nhiều.</li>
<li>Thì không nhất quán (đang quá khứ nhảy sang hiện tại).</li>
<li>Mạo từ thiếu/thừa (nhất là với người Việt).</li>
<li>Câu thiếu động từ chính, hoặc hai mệnh đề nối sai (run-on/comma splice).</li>
<li>Chọn nhầm từ gần giống (affect/effect, their/there).</li>
</ul>
<h3>5. Sự rõ ràng — thước đo cuối cùng</h3>
<p>Band 9 KHÔNG chỉ 'không lỗi' mà còn RÕ RÀNG hoàn hảo: mỗi câu truyền đạt ý chính xác, không mơ hồ, không bắt người đọc 'đoán'. Khi rà, hỏi: 'Câu này có thể hiểu nhầm không? Có cách nào nói rõ hơn không?' Sự rõ ràng là dấu hiệu của tư duy mạch lạc.</p>
<p class="muted">⚠️ Tự biên tập KHÔNG phải viết lại cả bài (không đủ giờ). Đó là rà soát TRÚNG ĐÍCH các lỗi bạn hay mắc + các câu tối nghĩa. Biết 'điểm yếu' của mình (qua nhật ký lỗi) giúp rà nhanh và hiệu quả. Một bài band 8 sạch lỗi 'trượt tay' có thể chạm band 9 về accuracy.</p>`,
levels:{
basic:{mcq:[
{q:"Grammar band 9 yêu cầu:",opts:["Câu đơn giản","Đa dạng đầy đủ cấu trúc với độ chính xác gần TUYỆT ĐỐI","Nhiều câu phức bất kể lỗi","Câu dài"],a:1,why:"<b>Đúng: B.</b> Band 9: đa dạng đầy đủ VÀ chính xác gần tuyệt đối cùng lúc — lỗi chỉ như 'trượt tay' của người bản ngữ."},
{q:"Kỹ năng tối quan trọng để đạt độ chính xác band 9:",opts:["Viết nhanh","TỰ BIÊN TẬP (self-editing/proofreading) — tự phát hiện và sửa lỗi 'trượt tay'","Dùng từ khó","Viết dài"],a:1,why:"<b>Đúng: B.</b> Ngay người giỏi cũng trượt tay dưới áp lực; band 9 tự phát hiện và sửa được — kỹ năng tự biên tập là then chốt."},
{q:"Cách rà soát hiệu quả nhất:",opts:["Đọc lướt một lần","Rà theo LƯỢT — mỗi lượt tập trung một loại lỗi","Nhờ người khác","Viết lại cả bài"],a:1,why:"<b>Đúng: B.</b> Rà theo lượt (ngữ pháp / từ vựng / rõ ràng / chính tả) hiệu quả hơn cố soát tất cả cùng lúc."},
{q:"'affect' và 'effect' là ví dụ của:",opts:["Từ đồng nghĩa","Cặp từ gần giống dễ nhầm — cần soát kỹ","Collocation","Thành ngữ"],a:1,why:"<b>Đúng: B.</b> affect (động từ, tác động) vs effect (danh từ, hệ quả) — cặp dễ nhầm 'trượt tay', cần soát."},
{q:"Band 9 KHÔNG chỉ 'không lỗi' mà còn:",opts:["Dài","RÕ RÀNG hoàn hảo — mỗi câu truyền đạt ý chính xác, không mơ hồ","Nhiều từ khó","Nhiều đoạn"],a:1,why:"<b>Đúng: B.</b> Band 9 yêu cầu cả không lỗi LẪN sự rõ ràng — mỗi câu truyền đạt ý chính xác, không bắt người đọc đoán."}],
writing:[{q:"Luyện tự biên tập. Sửa TẤT CẢ lỗi trong đoạn sau (có nhiều lỗi 'trượt tay'): 'Nowadays, technology have change our life in many way. It effect how we work, communicate and learning. Although it bring many benefit, but it also create problem. For example, many peoples spend too much time on their phone, which lead to health issue.'",
model:"<b>Đoạn đã sửa:</b> Nowadays, technology <b>has changed</b> our <b>lives</b> in many <b>ways</b>. It <b>affects</b> how we work, communicate and <b>learn</b>. Although it <b>brings</b> many <b>benefits</b>, it also <b>creates problems</b>. For example, many <b>people</b> spend too much time on their <b>phones</b>, which <b>leads</b> to health <b>issues</b>.<br><b>Các lỗi đã sửa:</b> 'have change'→'has changed' (hòa hợp + thì); 'life'→'lives', 'way'→'ways', 'benefit'→'benefits', 'problem'→'problems', 'issue'→'issues', 'phone'→'phones' (số nhiều); 'effect'→'affects' (động từ + ngôi 3 số ít); 'learning'→'learn' (song song với work, communicate); 'Although...but'→bỏ 'but' (không dùng cả hai); 'bring'→'brings', 'create'→'creates', 'lead'→'leads' (ngôi 3 số ít); 'peoples'→'people' (people đã là số nhiều).<br><b>Tự kiểm tra:</b> Đã bắt hết lỗi hòa hợp chủ-vị (has, affects, brings, creates, leads)? Số nhiều (lives, ways, benefits, problems, people, phones, issues)? Thì (has changed)? Song song (learn)? 'Although...but' thừa? affect vs effect?"}]},
mid:{mcq:[
{q:"Lỗi 'comma splice' là:",opts:["Thiếu dấu phẩy","Nối hai mệnh đề độc lập chỉ bằng dấu phẩy (thiếu liên từ/dấu chấm phẩy)","Dùng quá nhiều dấu phẩy","Không có lỗi"],a:1,why:"<b>Đúng: B.</b> VD 'It was late, I went home' — hai mệnh đề độc lập nối bằng dấu phẩy là sai; cần 'so'/dấu chấm/chấm phẩy."},
{q:"Khi rà soát tham chiếu (this/it), cần đảm bảo:",opts:["Dùng càng nhiều càng tốt","Mỗi 'this/it' RÕ RÀNG chỉ về cái gì (không mơ hồ)","Tránh hoàn toàn","Luôn thêm danh từ"],a:1,why:"<b>Đúng: B.</b> Tham chiếu mơ hồ gây khó hiểu. Rà để đảm bảo mỗi 'this/it' chỉ rõ về một ý/vật cụ thể."},
{q:"Thì không nhất quán ('He walked in and sits down') cần sửa thành:",opts:["Giữ nguyên","'He walked in and sat down' (nhất quán quá khứ)","'He walks in and sat down'","'He walk in and sits down'"],a:1,why:"<b>Đúng: B.</b> Giữ thì nhất quán: cả hai động từ quá khứ (walked, sat). Nhảy thì giữa chừng là lỗi 'trượt tay' phổ biến."},
{q:"Mục tiêu của tự biên tập trong bài thi là:",opts:["Viết lại cả bài","Rà soát TRÚNG ĐÍCH các lỗi hay mắc + câu tối nghĩa trong 2-3 phút cuối","Đọc cho vui","Đếm từ"],a:1,why:"<b>Đúng: B.</b> Không đủ giờ viết lại; rà trúng đích (lỗi 'ruột' của mình + câu mơ hồ) trong ít phút cuối là hiệu quả nhất."},
{q:"Câu 'The report which was written by the team who worked hard was good' có vấn đề gì?",opts:["Sai ngữ pháp","Đúng ngữ pháp nhưng RỐI — nên tách/đơn giản hóa cho rõ ràng (sự rõ ràng band 9)","Thiếu động từ","Sai thì"],a:1,why:"<b>Đúng: B.</b> Câu đúng ngữ pháp nhưng nhiều mệnh đề chồng làm rối. Band 9 chuộng sự RÕ RÀNG — có thể viết 'The report, written by a hard-working team, was excellent.'"}],
writing:[{q:"Viết một đoạn (7-8 câu tiếng Anh) về một chủ đề, cố ý dùng cấu trúc đa dạng. Sau đó THỰC HIỆN tự biên tập 4 lượt (ngữ pháp / từ vựng / rõ ràng / chính ttả) và ghi lại: bạn đã kiểm hoặc sửa gì ở mỗi lượt. Mục tiêu: đoạn cuối hoàn toàn không lỗi và rõ ràng.",
model:"<b>Bài mẫu (đoạn đã biên tập):</b> The increasing reliance on artificial intelligence in the workplace has sparked considerable debate. On the one hand, AI systems can process vast quantities of data far more quickly than any human, which allows companies to make better-informed decisions. On the other hand, there are legitimate concerns that automation may displace workers whose roles involve routine tasks. While some argue that new technologies have always created as many jobs as they destroy, this optimistic view may underestimate the speed of the current transformation. What seems clear is that education systems will need to adapt, equipping people with the skills that machines cannot easily replicate. Ultimately, the impact of AI will depend less on the technology itself than on how wisely societies choose to manage it.<br><br><i>Tự biên tập 4 lượt:</i><br>• Lượt 1 (ngữ pháp): kiểm hòa hợp chủ-vị ('reliance...has', 'systems can', 'concerns that automation may'), thì nhất quán (hiện tại), mạo từ ('the workplace', 'the current transformation', 'the technology'), số nhiều (systems, decisions, workers, tasks, jobs, skills, societies).<br>• Lượt 2 (từ vựng): collocation ('sparked debate', 'process data', 'displace workers', 'better-informed decisions'); tránh lặp (dùng 'AI systems'/'automation'/'new technologies'/'machines' đa dạng); chọn từ chính xác ('legitimate concerns', 'underestimate').<br>• Lượt 3 (rõ ràng): mỗi 'this/what' rõ ('this optimistic view' — rõ chỉ ý trước; 'What seems clear'); không câu tối nghĩa.<br>• Lượt 4 (task/chính tả): đủ ý cân bằng hai mặt; chính tả ('artificial', 'quantities', 'replicate'); dấu câu đúng.<br><b>Tự kiểm tra:</b> Đoạn của bạn có thực hiện đủ 4 lượt? Mỗi lượt có kiểm/sửa cụ thể? Đoạn cuối không lỗi và rõ ràng?"}]},
adv:{mcq:[
{q:"Grammar band 9 ('full flexibility and accuracy') khác band 8 ('majority error-free') tinh vi thế nào?",opts:["Không khác","Band 9: đa dạng đầy đủ với độ chính xác gần tuyệt đối VÀ sự linh hoạt hoàn toàn (điều chỉnh cấu trúc chính xác theo ý/ngữ cảnh); lỗi chỉ là 'trượt tay' hiếm như bản ngữ. Band 8 vẫn có lỗi 'occasional' đáng kể hơn","Band 9 dùng câu dài hơn","Band 9 cấm lỗi tuyệt đối"],a:1,why:"<b>Đúng: B.</b> Band 8: 'wide range', 'majority of sentences error-free', 'occasional errors'. Band 9: 'full range with full flexibility and accuracy', lỗi chỉ là 'slips' hiếm 'characteristic of native speaker speech'. Ba khác biệt tinh vi: (1) ĐỘ CHÍNH XÁC cao hơn (gần tuyệt đối vs 'phần lớn không lỗi'); (2) LINH HOẠT hoàn toàn — không chỉ dùng được nhiều cấu trúc mà điều chỉnh chúng CHÍNH XÁC theo sắc thái/ngữ cảnh/nhấn mạnh mong muốn; (3) lỗi còn lại thuộc loại 'trượt tay' tự nhiên (như bản ngữ đôi khi mắc), không phải lỗi do thiếu hiểu biết. Đây là sự khác biệt giữa 'rất giỏi' và 'thành thạo như bản ngữ'."},
{q:"Vì sao 'sự rõ ràng' (clarity) là một phần thiết yếu của band 9, không chỉ là 'không lỗi'?",opts:["Không phải, chỉ cần không lỗi","Vì mục đích của ngôn ngữ là truyền đạt ý; một câu có thể đúng ngữ pháp nhưng vẫn mơ hồ, rối hoặc dễ hiểu nhầm — band 9 đòi hỏi ý được truyền đạt CHÍNH XÁC và không mơ hồ, phản ánh tư duy mạch lạc","Vì rõ ràng dễ hơn","Vì giám khảo lười đọc"],a:1,why:"<b>Đúng: B.</b> 'Không lỗi' và 'rõ ràng' là hai điều khác nhau. Một câu như 'The report which the team who worked on the project that the manager assigned completed was good' đúng ngữ pháp nhưng rối đến mức khó theo. Band 9 (đặc biệt qua tiêu chí Coherence và ẩn trong Task Response) đòi hỏi ý được truyền đạt CHÍNH XÁC, KHÔNG mơ hồ, và người đọc hiểu ngay không phải 'giải mã'. Sự rõ ràng phản ánh không chỉ khả năng ngôn ngữ mà cả tư duy mạch lạc — biết chính xác mình muốn nói gì và diễn đạt nó theo cách trong sáng nhất. Đôi khi điều này nghĩa là tách một câu phức rối thành hai câu rõ, hoặc chọn cách diễn đạt đơn giản hơn nhưng minh bạch hơn. Ngôn ngữ band 9 'trong suốt' — nó không bao giờ trở thành vật cản giữa ý và người đọc."},
{q:"Chiến lược tự biên tập hiệu quả nhất cho một thí sinh band 8 muốn chạm accuracy band 9 là:",opts:["Cố viết hoàn hảo ngay lần đầu","Chấp nhận rằng lỗi 'trượt tay' là không thể tránh khi viết dưới áp lực, và xây dựng THÓI QUEN rà soát trúng đích cuối bài — tập trung vào các loại lỗi 'ruột' của bản thân (qua nhật ký lỗi) và các câu có nguy cơ tối nghĩa","Nhờ người khác sửa","Viết câu đơn giản để tránh lỗi"],a:1,why:"<b>Đúng: B.</b> Ngay cả người viết xuất sắc cũng mắc lỗi 'trượt tay' khi soạn dưới áp lực thời gian — cố 'viết hoàn hảo lần đầu' là kỳ vọng phi thực tế và gây tê liệt. Điều phân biệt accuracy band 9 không phải là 'không bao giờ tạo ra lỗi' mà là KHÔNG ĐỂ LỖI SỐNG SÓT trong bản cuối — tức khả năng TỰ PHÁT HIỆN và sửa. Chiến lược hiệu quả: (1) chấp nhận rà soát là bước bắt buộc, dành 2-3 phút cuối; (2) biết chính xác 'điểm yếu' của mình qua nhật ký lỗi (mạo từ? thì? số nhiều/ít?) để rà TRÚNG ĐÍCH thay vì đọc lướt chung chung; (3) đặc biệt soi các câu phức dài (nơi lỗi và sự tối nghĩa hay ẩn nấp). Viết câu đơn giản để 'tránh lỗi' thì hy sinh RANGE — không phải giải pháp band 9 (vốn cần cả đa dạng lẫn chính xác). Giải pháp là dám dùng cấu trúc phức RỒI rà soát kỹ."},
{q:"Về mặt tâm lý, rào cản lớn nhất khiến thí sinh band 8 không tự phát hiện lỗi 'trượt tay' của mình là:",opts:["Không biết ngữ pháp","Xu hướng đọc lại bài và thấy điều mình ĐỊNH viết chứ không phải điều thực sự có trên giấy — não tự 'sửa' lỗi khi đọc; cần kỹ thuật đọc chậm, có ý thức, rà từng loại lỗi để vượt qua","Lười","Thiếu thời gian"],a:1,why:"<b>Đúng: B.</b> Đây là một hiện tượng nhận thức sâu sắc và ít người nhận ra: khi đọc lại bài của chính mình, não 'điền vào' điều bạn ĐỊNH viết, khiến bạn 'nhìn thấy' câu đúng dù trên giấy là câu sai — nó tự động bỏ qua lỗi thiếu 's', mạo từ thiếu, từ lặp. Đây là lý do lỗi 'trượt tay' của chính mình khó tự bắt hơn lỗi của người khác nhiều. Vượt qua đòi hỏi kỹ thuật CHỦ ĐỘNG chống lại xu hướng này: (1) đọc CHẬM, có ý thức, gần như 'chỉ tay' từng từ; (2) rà theo LƯỢT một loại lỗi cụ thể (khi chỉ tìm 'mạo từ', não tập trung vào đúng thứ đó, khó bị 'lấp' hơn); (3) nếu có thể, để bài 'nghỉ' vài phút trước khi rà (giảm hiệu ứng 'thấy điều mình định viết'). Hiểu rào cản nhận thức này là bước đầu để xây dựng thói quen tự biên tập thực sự hiệu quả — nó giải thích tại sao 'đọc lại một lượt' hời hợt thường vô ích."},
{q:"Câu nào thể hiện sự LINH HOẠT ngữ pháp band 9 (điều chỉnh cấu trúc chính xác theo mục đích)?",opts:["Chỉ dùng một loại câu","Chọn cấu trúc phù hợp với sắc thái mong muốn: đảo ngữ để nhấn mạnh ('Never before had...'), bị động để dịch chuyển trọng tâm, câu chẻ để làm nổi bật, mệnh đề rút gọn để cô đọng — mỗi lựa chọn phục vụ một mục đích diễn đạt cụ thể","Câu càng dài càng linh hoạt","Dùng mọi cấu trúc ngẫu nhiên"],a:1,why:"<b>Đúng: B.</b> 'Linh hoạt' (flexibility) ở band 9 không chỉ là 'biết nhiều cấu trúc' mà là dùng ĐÚNG cấu trúc để đạt ĐÚNG hiệu ứng diễn đạt mong muốn. Người band 9 điều khiển cú pháp như một công cụ tinh vi: dùng ĐẢO NGỮ ('Never before had society faced...') để nhấn mạnh và tạo trọng lượng; dùng BỊ ĐỘNG để dịch trọng tâm sang đối tượng chịu tác động hoặc khi tác nhân không quan trọng; dùng CÂU CHẺ ('It was precisely this failure that...') để làm nổi bật một thành phần; dùng MỆNH ĐỀ RÚT GỌN để cô đọng; dùng CẤU TRÚC SONG SONG để tạo nhịp và sự cân đối. Mỗi lựa chọn là CÓ CHỦ ĐÍCH, phục vụ nghĩa và sắc thái — không phải 'khoe' cấu trúc ngẫu nhiên. Đây là sự khác biệt giữa 'biết cấu trúc' (band 7-8) và 'điều khiển cấu trúc để phục vụ ý' (band 9): cú pháp trở thành phương tiện biểu đạt tinh tế, không phải mục đích tự thân."}],
writing:[{q:"Bài luyện tổng hợp: viết một đoạn văn phức tạp band 9 (8-10 câu tiếng Anh) về một chủ đề trừu tượng bạn chọn, cố ý dùng đa dạng cấu trúc phức VÀ điều chỉnh chúng có chủ đích (đảo ngữ để nhấn mạnh, bị động để dịch trọng tâm, câu chẻ, mệnh đề rút gọn, song song). Sau đó tự biên tập 4 lượt và xác nhận: không lỗi, hoàn toàn rõ ràng, và mỗi cấu trúc phức phục vụ một mục đích diễn đạt. Ghi lại mục đích của ít nhất 3 lựa chọn cấu trúc.",
model:"<b>Bài mẫu tham khảo:</b> Rarely in human history has a single technology transformed daily life as profoundly as the internet has. What began as a tool for sharing academic research has evolved into an infrastructure upon which modern economies, relationships and even political movements now depend. This dependence, however, carries risks that are only gradually being understood. Personal data, once considered private, is routinely harvested and traded, often without the meaningful consent of those to whom it belongs. It is precisely this erosion of privacy, rather than any dramatic technological failure, that poses the gravest threat to individual autonomy in the digital age. Governments, caught between the demands of security and the protection of civil liberties, have struggled to respond coherently. Regulating an entity as borderless and fast-moving as the internet is, admittedly, no simple task. Yet the difficulty of the challenge is no excuse for inaction, for the longer societies delay, the more entrenched harmful practices become. If we are to preserve the freedoms we value, the time to establish clear and enforceable digital rights is now.<br><br><i>Mục đích của các lựa chọn cấu trúc:</i><br>• Đảo ngữ 'Rarely...has a single technology transformed' — nhấn mạnh tính chưa từng có của tác động, tạo mở đầu có trọng lượng.<br>• Câu chẻ 'It is precisely this erosion of privacy...that poses' — làm NỔI BẬT chính xác đâu là mối đe dọa lớn nhất, tương phản với kỳ vọng ('any dramatic failure').<br>• Mệnh đề rút gọn 'caught between the demands...' — cô đọng, chèn thông tin về tình thế của chính phủ mà không cần một câu riêng.<br>• Bị động 'is routinely harvested and traded' — dịch trọng tâm sang HÀNH ĐỘNG với dữ liệu, làm mờ (đúng chủ đích) đối tượng thực hiện.<br>• Câu điều kiện + đảo trật tự 'the longer...the more...' — thể hiện quan hệ tỷ lệ, tạo tính khẩn thiết.<br><b>Tự kiểm tra:</b> Không lỗi (đã rà 4 lượt)? Hoàn toàn rõ ràng, không câu tối nghĩa? Mỗi cấu trúc phức có MỤC ĐÍCH diễn đạt rõ (không 'khoe' ngẫu nhiên)? Ngôn ngữ tự nhiên, chính xác? Ghi được mục đích ≥3 lựa chọn cấu trúc?"}]}
}}
);

LESSONS.push(
/* ===== BÀI 64 ===== */
{id:"g64",stage:7,title:"Bài 64 · Lexical Resource band 9 — chính xác & tự nhiên hoàn toàn",
theory:`<h3>1. Lexical Resource band 9 là gì?</h3>
<p>Mô tả band 9: 'sử dụng đầy đủ đặc trưng vốn từ với sự tự nhiên và tinh tế hoàn toàn; lỗi hiếm hoi chỉ là trượt tay'. Nghĩa là: vốn từ rộng như bản ngữ có học thức, dùng CHÍNH XÁC và TỰ NHIÊN mọi lúc, với sự nhạy cảm tinh tế về sắc thái, register và văn cảnh.</p>
<h3>2. Ba tầng của độ chính xác từ vựng band 9</h3>
<ul>
<li><b>Nghĩa (denotation):</b> chọn từ đúng nghĩa gốc — điều cơ bản.</li>
<li><b>Sắc thái (connotation):</b> chọn từ đúng 'màu' cảm xúc/thái độ. 'thrifty' (tiết kiệm - tích cực) vs 'stingy' (keo kiệt - tiêu cực) vs 'frugal' (giản dị - trung tính).</li>
<li><b>Register (văn phong):</b> chọn từ đúng mức trang trọng. 'kids' (thân mật) vs 'children' (trung tính) vs 'offspring' (trang trọng/kỹ thuật).</li>
</ul>
<h3>3. Sự TỰ NHIÊN — dấu ấn band 9</h3>
<p>Người band 9 dùng collocation và cụm từ như bản ngữ, không bao giờ 'gượng'. Họ biết 'a heated debate' (không 'a hot debate'), 'commit a crime' (không 'do a crime'), 'a foregone conclusion', 'to bear fruit'. Sự tự nhiên này đến từ tiếp xúc sâu, không phải học danh sách.</p>
<h3>4. Sự tinh tế — chọn từ chính xác cho sắc thái mong muốn</h3>
<div class="example">Cùng ý 'nói': <b>state</b> (nêu), <b>assert</b> (khẳng định mạnh), <b>claim</b> (tuyên bố - hàm ý chưa chắc), <b>contend</b> (lập luận), <b>concede</b> (thừa nhận), <b>maintain</b> (kiên trì cho rằng). Band 9 chọn CHÍNH XÁC từ khớp sắc thái ý muốn truyền đạt.</div>
<h3>5. Diễn giải (paraphrase) linh hoạt band 9</h3>
<p>Band 9 diễn đạt cùng một ý bằng nhiều cách chính xác khác nhau, và khi thiếu một từ cụ thể, diễn giải khéo léo không lộ. Sự linh hoạt này giúp tránh lặp và điều chỉnh sắc thái tinh vi.</p>
<p class="muted">⚠️ Cạm bẫy band 9: (1) 'với' tới từ hiếm để gây ấn tượng → gượng, sai sắc thái; (2) idiom/cliché dùng sai văn cảnh; (3) lặp từ do vốn thụ động chưa 'chín'. Band 9 KHÔNG phải biết nhiều từ hiếm — mà dùng đúng từ, đúng sắc thái, đúng văn phong, một cách tự nhiên. Đôi khi từ hoàn hảo là một từ quen thuộc.</p>`,
levels:{
basic:{mcq:[
{q:"Lexical Resource band 9 nghĩa là:",opts:["Biết nhiều từ hiếm nhất","Vốn từ rộng, dùng chính xác & TỰ NHIÊN mọi lúc, tinh tế về sắc thái/register","Dùng nhiều thành ngữ","Câu dài"],a:1,why:"<b>Đúng: B.</b> Band 9 là dùng từ chính xác, tự nhiên, tinh tế — không phải biết nhiều từ hiếm."},
{q:"'thrifty' (tích cực) vs 'stingy' (tiêu cực) khác nhau về:",opts:["Nghĩa gốc","Sắc thái (connotation) — 'màu' cảm xúc/thái độ","Chính tả","Độ dài"],a:1,why:"<b>Đúng: Sắc thái.</b> Cùng chỉ 'tiết kiệm' nhưng thrifty khen, stingy chê — band 9 chọn đúng sắc thái."},
{q:"'kids' vs 'children' vs 'offspring' khác nhau về:",opts:["Nghĩa","Register (mức trang trọng)","Số lượng","Giới tính"],a:1,why:"<b>Đúng: Register.</b> kids (thân mật) - children (trung tính) - offspring (trang trọng). Chọn đúng văn phong là tinh tế band 9."},
{q:"Collocation tự nhiên: 'a ___ debate' (tranh luận sôi nổi):",opts:["hot","heated","warm","boiling"],a:1,why:"<b>Đúng: heated.</b> 'a heated debate' là collocation tự nhiên, không 'a hot debate'. Band 9 dùng collocation như bản ngữ."},
{q:"Band 9 đạt sự tự nhiên chủ yếu qua:",opts:["Học danh sách từ","Tiếp xúc SÂU với tiếng Anh chất lượng (đọc/nghe nhiều)","Dùng từ điển","Dịch cẩn thận"],a:1,why:"<b>Đúng: B.</b> Sự tự nhiên đến từ tiếp xúc sâu, lâu dài — collocation và cụm từ trở thành phản xạ, không 'học thuộc'."}],
writing:[{q:"Luyện chọn từ theo sắc thái. Với mỗi ngữ cảnh, chọn từ CHÍNH XÁC nhất và giải thích: (1) Một chính trị gia [state/assert/concede] rằng đối thủ có điểm đúng. (2) Nhà khoa học [claim/contend/maintain] một lý thuyết gây tranh cãi mà chưa có bằng chứng đầy đủ. (3) Mô tả một người tiết kiệm một cách đáng khen: [thrifty/stingy/miserly].",
model:"<b>Đáp án:</b> (1) <b>concede</b> — thừa nhận điểm đúng của đối thủ (hàm ý nhượng bộ); 'state/assert' không có sắc thái nhượng bộ. (2) <b>claim</b> — tuyên bố điều chưa được chứng minh (hàm ý 'chưa chắc đúng'); phù hợp lý thuyết gây tranh cãi thiếu bằng chứng. ('contend/maintain' cũng dùng được nhưng 'claim' làm nổi bật sự chưa được xác nhận.) (3) <b>thrifty</b> — tiết kiệm đáng khen; 'stingy/miserly' mang nghĩa chê (keo kiệt).<br><b>Tự kiểm tra:</b> Hiểu 'concede' hàm ý nhượng bộ (khác 'state' trung tính)? 'claim' gợi ý chưa chắc chắn? 'thrifty' tích cực vs 'stingy/miserly' tiêu cực? Chọn từ theo SẮC THÁI mong muốn, không chỉ 'đúng nghĩa chung'?"}]},
mid:{mcq:[
{q:"'commit a crime' — cách nói SAI band 9 sẽ là:",opts:["commit a crime","do a crime","perpetrate a crime","carry out a crime"],a:1,why:"<b>Đúng (cách SAI): do a crime.</b> Collocation đúng là 'commit a crime'. 'do a crime' lộ vốn từ chưa 'chín' — band 9 dùng collocation tự nhiên."},
{q:"Chọn từ 'nói' chính xác cho 'khẳng định MẠNH MẼ, dứt khoát':",opts:["mention","assert","suggest","hint"],a:1,why:"<b>Đúng: assert.</b> assert = khẳng định mạnh. mention (nhắc qua), suggest (gợi ý), hint (ám chỉ) yếu hơn nhiều. Band 9 chọn đúng mức độ."},
{q:"'a foregone conclusion' nghĩa là:",opts:["Một kết luận sai","Một kết cục đã được định trước/chắc chắn xảy ra","Một kết luận vội","Một kết luận cũ"],a:1,why:"<b>Đúng: B.</b> Cụm idiomatic tự nhiên = điều chắc chắn sẽ xảy ra. Band 9 dùng các cụm như vậy đúng văn cảnh."},
{q:"Vì sao lặp từ (dùng 'important' 6 lần) chưa đạt band 9?",opts:["Không sao","Cho thấy vốn từ chủ động chưa 'chín' — band 9 điều chỉnh linh hoạt (crucial, vital, pivotal, paramount) theo sắc thái","Tăng nhấn mạnh","Đúng phong cách"],a:1,why:"<b>Đúng: B.</b> Band 9 có vốn từ chủ động phong phú, thay đổi linh hoạt theo sắc thái — lặp một từ lộ giới hạn."},
{q:"Khi thiếu một từ cụ thể, band 9 sẽ:",opts:["Dừng lại","Diễn giải (paraphrase) khéo léo, không lộ, truyền đạt chính xác ý bằng cách khác","Dùng từ sai","Bỏ ý"],a:1,why:"<b>Đúng: B.</b> Khả năng diễn giải linh hoạt, không lộ 'lỗ hổng', là dấu hiệu band 9 — luôn truyền đạt được ý chính xác."}],
writing:[{q:"Viết một đoạn (7-8 câu tiếng Anh) về một chủ đề trừu tượng, thể hiện Lexical Resource band 9: từ chọn CHÍNH XÁC cho sắc thái, collocation tự nhiên như bản ngữ, register nhất quán (học thuật), TRÁNH lặp từ và TRÁNH 'với' từ hiếm gượng ép. Sau đó chỉ ra 3 lựa chọn từ tinh tế nhất của bạn và vì sao chúng chính xác.",
model:"<b>Bài mẫu tham khảo:</b> The debate over whether ambition is a virtue or a vice is far from straightforward. On one hand, a healthy measure of ambition can spur individuals to realise their potential and to contribute meaningfully to society. Without it, many of humanity's greatest achievements would never have come to fruition. On the other hand, ambition unchecked by ethical restraint can curdle into a ruthless pursuit of success at any cost, trampling relationships and principles alike. History is littered with figures whose boundless drive brought them to the pinnacle of power, only to precipitate their eventual downfall. What distinguishes admirable ambition from its corrosive counterpart, then, is not its intensity but its direction and the values that temper it. Ambition, in essence, is neither inherently noble nor inherently base; it is a force whose moral character is determined entirely by how it is channelled.<br><br><i>3 lựa chọn từ tinh tế:</i><br>• 'curdle into' — gợi hình ảnh biến chất (như sữa hỏng), truyền tải chính xác sắc thái tiêu cực của ambition biến thành thứ độc hại; tự nhiên và sống động hơn 'turn into'.<br>• 'precipitate' — 'thúc đẩy/gây ra (nhanh, đột ngột)' downfall; chính xác hơn 'cause', hàm ý sự sụp đổ nhanh do chính tham vọng.<br>• 'temper' (động từ) — 'điều hòa/làm dịu' (values that temper it); collocation tinh tế, gợi ý các giá trị KIỀM CHẾ tham vọng, chính xác hơn 'control'.<br><b>Tự kiểm tra:</b> Từ chọn chính xác sắc thái (curdle, ruthless, corrosive, temper)? Collocation tự nhiên (come to fruition, the pinnacle of power)? Register học thuật nhất quán? KHÔNG lặp từ (đa dạng cách nói ambition/drive)? KHÔNG có từ hiếm 'gượng'? Chỉ ra được 3 lựa chọn tinh tế và lý do?"}]},
adv:{mcq:[
{q:"Điều gì phân biệt Lexical Resource band 9 với band 8 tinh vi nhất?",opts:["Band 9 dùng từ hiếm hơn","Band 9: sự tự nhiên và tinh tế HOÀN TOÀN — kiểm soát đầy đủ sắc thái/register, dùng từ chính xác một cách vô thức như bản ngữ; lỗi chỉ là 'trượt tay'. Band 8 vẫn có 'occasional inaccuracies' trong lựa chọn từ/collocation","Band 9 dùng nhiều idiom hơn","Band 9 câu dài hơn"],a:1,why:"<b>Đúng: B.</b> Band 8 Lexical: 'wide resource, fluent and flexible, skilful use of uncommon items', nhưng 'occasional inaccuracies in word choice and collocation'. Band 9: 'full flexibility and precise usage', lỗi chỉ là 'occasional slips'. Khác biệt tinh vi: ở band 8 vẫn có những chỗ chọn từ hơi lệch hoặc collocation hơi 'sai một chút'; ở band 9 sự chính xác và tự nhiên là HOÀN TOÀN — người viết kiểm soát sắc thái và văn phong một cách gần như vô thức, như bản ngữ có học thức, và những lỗi hiếm hoi còn lại chỉ là 'trượt tay' không phản ánh giới hạn thực sự về vốn từ. Đây là sự khác biệt giữa 'rất thành thạo với vài chỗ chưa hoàn hảo' và 'thành thạo trọn vẹn, tự nhiên như bản ngữ'."},
{q:"Vì sao 'với' tới từ hiếm để gây ấn tượng lại TRÁI với band 9?",opts:["Từ hiếm bị cấm","Vì band 9 đặc trưng bởi sự dùng từ CHÍNH XÁC và TỰ NHIÊN; 'với' tới từ hiếm thường dẫn đến sai sắc thái, sai collocation hoặc văn phong gượng — dấu hiệu của người CỐ tỏ ra giỏi, không phải sự thành thạo thoải mái","Vì giám khảo không biết từ hiếm","Vì từ hiếm khó đọc"],a:1,why:"<b>Đúng: B.</b> Có một nghịch lý sâu sắc: nỗ lực CỐ Ý dùng từ hiếm/'ấn tượng' thường là dấu hiệu của band THẤP hơn, không cao hơn. Lý do: khi 'với' tới một từ chưa thực sự nắm vững, người viết dễ (1) chọn sai sắc thái ('The results were catastrophic' cho một thất bại nhỏ), (2) sai collocation ('perform a decision'), (3) tạo văn phong không tự nhiên/không nhất quán register. Điều này bộc lộ rằng vốn từ chưa 'chín' — họ BIẾT từ nhưng chưa CẢM được cách dùng tự nhiên. Ngược lại, người band 9 dùng từ vì nó ĐÚNG NHẤT cho ý và ngữ cảnh, thoải mái, không gắng sức — đôi khi đó là từ quen thuộc dùng hoàn hảo. Sự thành thạo thực sự biểu hiện qua sự PHÙ HỢP và TỰ NHIÊN, không qua sự phô trương vốn từ. Giám khảo phân biệt rõ 'dùng từ khó đúng và tự nhiên' (band 9) với 'nhồi từ khó để gây ấn tượng' (thường lộ điểm yếu)."},
{q:"Sự nhạy cảm về REGISTER quan trọng thế nào ở band 9?",opts:["Không quan trọng","Rất quan trọng — band 9 duy trì register phù hợp và nhất quán (VD học thuật cho essay), tránh trộn lẫn từ quá thân mật/khẩu ngữ vào văn trang trọng; sự nhạy cảm này phản ánh hiểu biết văn hóa-ngôn ngữ sâu","Chỉ với văn nói","Chỉ cần đúng nghĩa"],a:1,why:"<b>Đúng: B.</b> Register (mức độ trang trọng và tính phù hợp văn cảnh) là một chiều tinh tế của Lexical Resource mà band 9 làm chủ hoàn toàn. Trong một bài luận học thuật, band 9 duy trì register trang trọng nhất quán — dùng 'children' không 'kids', 'a great deal of' không 'loads of', 'insufficient' không 'not enough' ở nơi phù hợp — và tránh trộn lẫn từ khẩu ngữ/tiếng lóng làm 'lệch tông'. Ngược lại, trong văn nói (Speaking), register có thể thoải mái hơn, và band 9 biết điều chỉnh phù hợp. Sự nhạy cảm này không chỉ là 'biết từ trang trọng' mà là CẢM được đâu là từ phù hợp với ngữ cảnh, mục đích và đối tượng — một hiểu biết ngôn ngữ-văn hóa sâu sắc mà người bản ngữ có học thức sở hữu. Trộn register (VD 'The government's policy was pretty rubbish' trong essay trang trọng) là dấu hiệu vốn từ chưa tinh tế, dù mỗi từ 'đúng nghĩa'."},
{q:"Chiến lược hiệu quả nhất để phát triển vốn từ hướng tới band 9 là:",opts:["Học thuộc danh sách từ hiếm mỗi ngày","Đắm mình trong tiếng Anh chất lượng cao (đọc rộng: báo chất lượng, văn học, tiểu luận; nghe nội dung phong phú), học từ trong NGỮ CẢNH và CỤM, để cảm nhận sắc thái/collocation/register trở thành phản xạ tự nhiên","Dùng từ điển đồng nghĩa","Chỉ luyện đề IELTS"],a:1,why:"<b>Đúng: B.</b> Vốn từ band 9 — với sự tự nhiên, chính xác sắc thái và nhạy cảm register — KHÔNG thể xây bằng cách học danh sách từ hiếm (điều này tạo vốn từ 'chết', biết nghĩa nhưng không cảm được cách dùng, dẫn đến chính lỗi 'với từ hiếm gượng'). Nó đòi hỏi ĐẮM MÌNH lâu dài trong tiếng Anh chất lượng cao: đọc RỘNG (báo uy tín như The Economist/The Guardian, tiểu luận, văn học) và nghe nội dung phong phú (podcast trí tuệ, phim tài liệu, diễn thuyết). Qua đó, học từ trong NGỮ CẢNH THẬT — thấy 'temper' được dùng thế nào, 'foregone conclusion' xuất hiện ở đâu, register nào hợp văn cảnh nào — cho đến khi sắc thái, collocation và register trở thành CẢM GIÁC tự nhiên, không phải kiến thức phải 'tra'. Đây là cách người bản ngữ có học thức xây vốn từ: qua tiếp xúc, không qua ghi nhớ danh sách. Từ điển đồng nghĩa đặc biệt nguy hiểm (các 'đồng nghĩa' hiếm khi thay thế được nhau về sắc thái/collocation). Đây là hành trình dài, giải thích tại sao band 9 Lexical hiếm."},
{q:"Một câu dùng toàn từ đơn giản nhưng CHÍNH XÁC tuyệt đối và tự nhiên, so với câu nhồi từ hiếm nhưng hơi lệch sắc thái — về Lexical Resource, câu nào tốt hơn?",opts:["Câu nhiều từ hiếm luôn tốt hơn","Câu từ đơn giản nhưng chính xác và tự nhiên — vì Lexical Resource đánh giá sự CHÍNH XÁC và TỰ NHIÊN trong truyền đạt nghĩa, không phải độ hiếm của từ; tuy nhiên band 9 lý tưởng kết hợp cả sự chính xác LẪN vốn từ rộng khi phù hợp","Bằng nhau","Không đánh giá được"],a:1,why:"<b>Đúng: B.</b> Giữa hai lựa chọn này, câu từ đơn giản nhưng chính xác và tự nhiên tốt hơn về Lexical Resource, vì tiêu chí này đánh giá khả năng dùng từ để truyền đạt nghĩa CHÍNH XÁC và phù hợp, không thưởng cho độ hiếm tự thân. Một từ hiếm dùng lệch sắc thái/collocation là một LỖI (giảm điểm), trong khi một từ quen thuộc dùng hoàn hảo là sự chính xác (đạt điểm). ĐIỀU QUAN TRỌNG cần hiểu đúng: điều này KHÔNG có nghĩa 'nên dùng từ đơn giản để an toàn' — vì Lexical Resource band 8-9 CŨNG đòi hỏi vốn từ RỘNG, dùng được từ ít phổ biến và idiomatic. Band 9 LÝ TƯỞNG là kết hợp cả hai: vốn từ rộng VÀ dùng mọi từ (dù hiếm hay quen) một cách chính xác, tự nhiên, đúng sắc thái. Bài học cốt lõi: sự chính xác và tự nhiên là ĐIỀU KIỆN BẮT BUỘC (không thể hy sinh để 'khoe' từ hiếm), và trên nền tảng đó, mở rộng vốn từ để có thể chọn từ chính xác NHẤT — đôi khi là từ ít phổ biến, đôi khi là từ quen thuộc — cho mỗi sắc thái cụ thể. Từ hiếm phục vụ sự chính xác, không thay thế nó."}],
writing:[{q:"Viết một đoạn văn band 9 (8-10 câu tiếng Anh) về chủ đề trừu tượng bạn chọn, thể hiện Lexical Resource ở mức cao nhất: vốn từ rộng dùng CHÍNH XÁC cho sắc thái, collocation hoàn toàn tự nhiên, register học thuật nhất quán, sự linh hoạt (không lặp), và ngôn ngữ idiomatic hợp văn phong dùng tinh tế — nhưng TUYỆT ĐỐI không 'gượng' hay 'với' từ hiếm. Sau đó phân tích 4 lựa chọn từ tinh tế nhất và giải thích vì sao mỗi cái là lựa chọn CHÍNH XÁC (về sắc thái/collocation/register).",
model:"<b>Bài mẫu tham khảo:</b> The pursuit of happiness, often held up as the ultimate aim of human existence, is a more elusive endeavour than it first appears. Modern societies, with their relentless emphasis on material acquisition, frequently equate happiness with prosperity, yet a wealth of research suggests that the correlation is far weaker than commonly assumed. Once a certain threshold of comfort has been reached, the accumulation of further riches yields diminishing returns, and may even breed a corrosive dissatisfaction as expectations continually outpace attainment. Genuine contentment, it seems, springs less from what we possess than from the quality of our relationships, the sense of purpose that animates our days, and our capacity to appreciate what we already have. This is not to romanticise poverty, which imposes its own undeniable hardships, but rather to question the assumption that ever-greater affluence is the surest path to fulfilment. Perhaps the deepest irony is that the very restlessness which drives material ambition can itself become an obstacle to the peace of mind it purports to secure. In the end, happiness may prove to be less a destination to be reached than a way of travelling.<br><br><i>4 lựa chọn từ tinh tế:</i><br>• 'elusive endeavour' — 'elusive' (khó nắm bắt) chính xác cho việc theo đuổi hạnh phúc vốn khó định nghĩa/đạt được; collocation với 'endeavour' (nỗ lực nghiêm túc) giữ register trang trọng.<br>• 'corrosive dissatisfaction' — 'corrosive' (ăn mòn) truyền tải chính xác sắc thái phá hủy dần dần của sự bất mãn; mạnh và hình tượng hơn 'harmful', đúng văn phong.<br>• 'animates our days' — 'animate' (làm sinh động/thổi hồn) là lựa chọn tinh tế cho purpose, gợi ý mục đích tiếp sức cho cuộc sống; tự nhiên và giàu sắc thái hơn 'motivates'.<br>• 'purports to secure' — 'purport' (được cho là/tự nhận) hàm ý tinh tế rằng điều đó CHƯA CHẮC đạt được (mỉa mai nhẹ), chính xác cho lập luận về nghịch lý; 'aims to'/'tries to' mất sắc thái hoài nghi này.<br><b>Tự kiểm tra:</b> Vốn từ rộng dùng chính xác sắc thái (elusive, corrosive, animates, purports, diminishing returns)? Collocation hoàn toàn tự nhiên (held up as, springs from, outpace attainment)? Register học thuật nhất quán? Linh hoạt, KHÔNG lặp? Idiomatic tinh tế ('less a destination...than a way of travelling')? KHÔNG 'gượng'/không 'với' từ hiếm? Phân tích được 4 lựa chọn tinh tế với lý do sắc thái/collocation/register?"}]}
}},
/* ===== BÀI 65 ===== */
{id:"g65",stage:7,title:"Bài 65 · Grammatical Range & Accuracy band 9",
theory:`<h3>1. Grammar band 9: đa dạng ĐẦY ĐỦ + chính xác & linh hoạt HOÀN TOÀN</h3>
<p>Mô tả band 9: 'sử dụng đầy đủ đặc trưng cấu trúc với sự linh hoạt và chính xác hoàn toàn; lỗi hiếm hoi chỉ là trượt tay của người bản ngữ'. Nghĩa là: dùng mọi loại cấu trúc một cách chính xác, và ĐIỀU KHIỂN chúng linh hoạt để phục vụ ý và sắc thái mong muốn.</p>
<h3>2. 'Full range' — làm chủ toàn bộ kho cấu trúc</h3>
<p>Band 9 sử dụng thoải mái mọi cấu trúc đã học ở các chặng trước — điều kiện các loại và hỗn hợp, đảo ngữ, câu chẻ, mệnh đề quan hệ (kể cả rút gọn), bị động đa dạng, phân từ, danh động từ/nguyên mẫu, cấu trúc song song, câu phức nhiều tầng — VÀ dùng chúng ĐÚNG, TỰ NHIÊN.</p>
<h3>3. 'Full flexibility' — điều khiển cú pháp phục vụ ý</h3>
<p>Đây là điểm cốt lõi phân biệt band 9. Không chỉ 'biết' cấu trúc, mà CHỌN cấu trúc để đạt hiệu ứng chính xác:</p>
<table><tr><th>Muốn</th><th>Chọn cấu trúc</th></tr>
<tr><td>Nhấn mạnh</td><td>Đảo ngữ (Never had...), câu chẻ (It was X that...)</td></tr>
<tr><td>Dịch trọng tâm</td><td>Bị động (X was done by Y → trọng tâm vào X)</td></tr>
<tr><td>Cô đọng</td><td>Mệnh đề rút gọn, phân từ</td></tr>
<tr><td>Tạo nhịp/cân đối</td><td>Cấu trúc song song</td></tr>
<tr><td>Thể hiện quan hệ tinh tế</td><td>Điều kiện hỗn hợp, mệnh đề nhượng bộ lồng</td></tr></table>
<h3>4. Độ chính xác gần tuyệt đối</h3>
<p>Ở band 9, ngay cả câu phức nhất cũng đúng. Lỗi cực hiếm và thuộc loại 'trượt tay' (một 's' bị bỏ sót khi viết nhanh) — như người bản ngữ đôi khi mắc, không phải lỗi do thiếu hiểu biết. Điều này đòi hỏi cả sự làm chủ LẪN tự biên tập (Bài 63).</p>
<h3>5. Sự TỰ NHIÊN của câu phức band 9</h3>
<p>Câu phức band 9 không bao giờ 'gồng' — chúng trôi chảy, rõ ràng, dễ theo dù nhiều tầng. Band 9 biết khi nào câu phức phục vụ ý và khi nào một câu ngắn sắc bén hiệu quả hơn. Sự đa dạng về ĐỘ DÀI và ĐỘ PHỨC TẠP câu (mix câu dài và ngắn) tạo nhịp điệu tự nhiên.</p>
<p class="muted">⚠️ Band 9 Grammar KHÔNG phải 'câu càng phức càng tốt'. Đó là điều khiển cú pháp một cách CHÍNH XÁC, LINH HOẠT và TỰ NHIÊN để phục vụ ý — biết chọn đúng cấu trúc cho đúng mục đích, giữ mọi thứ rõ ràng và gần như không lỗi. Đôi khi câu band 9 hoàn hảo là một câu đơn ngắn, đặt đúng chỗ.</p>`,
levels:{
basic:{mcq:[
{q:"Grammar band 9 yêu cầu:",opts:["Câu càng phức càng tốt","Đa dạng ĐẦY ĐỦ cấu trúc với chính xác & linh hoạt HOÀN TOÀN","Chỉ câu đơn đúng","Câu dài"],a:1,why:"<b>Đúng: B.</b> Band 9: dùng mọi cấu trúc chính xác VÀ điều khiển chúng linh hoạt phục vụ ý — không phải 'càng phức càng tốt'."},
{q:"'Full flexibility' (linh hoạt hoàn toàn) nghĩa là:",opts:["Dùng nhiều cấu trúc ngẫu nhiên","CHỌN cấu trúc để đạt hiệu ứng chính xác (nhấn mạnh, dịch trọng tâm, cô đọng...)","Câu dài nhất","Không có lỗi"],a:1,why:"<b>Đúng: B.</b> Linh hoạt = điều khiển cú pháp có chủ đích, chọn đúng cấu trúc cho đúng mục đích diễn đạt."},
{q:"Để NHẤN MẠNH, band 9 có thể dùng:",opts:["Câu đơn thường","Đảo ngữ (Never had...) hoặc câu chẻ (It was X that...)","Bị động","Câu hỏi"],a:1,why:"<b>Đúng: B.</b> Đảo ngữ và câu chẻ tạo sự nhấn mạnh — công cụ cú pháp band 9 dùng có chủ đích."},
{q:"Ở band 9, lỗi (nếu có) thường là:",opts:["Lỗi hệ thống","'Trượt tay' hiếm như người bản ngữ, không do thiếu hiểu biết","Lỗi cơ bản","Lỗi mọi câu"],a:1,why:"<b>Đúng: B.</b> Band 9 chính xác gần tuyệt đối; lỗi còn lại chỉ là 'trượt tay' tự nhiên, cực hiếm."},
{q:"Nhịp điệu tự nhiên band 9 đạt được qua:",opts:["Chỉ câu dài","Đa dạng ĐỘ DÀI câu (mix câu dài và ngắn sắc bén)","Chỉ câu ngắn","Câu đều nhau"],a:1,why:"<b>Đúng: B.</b> Trộn câu dài phức và câu ngắn sắc tạo nhịp điệu tự nhiên — dấu hiệu văn band cao."}],
writing:[{q:"Luyện điều khiển cú pháp có chủ đích. Viết lại câu trung tính sau theo 3 cách để đạt 3 hiệu ứng khác nhau (tiếng Anh): 'The government's failure to act caused the crisis.' → (1) nhấn mạnh bằng câu chẻ; (2) nhấn mạnh bằng đảo ngữ với 'Never'; (3) dịch trọng tâm sang 'the crisis' bằng bị động.",
model:"<b>Đáp án:</b><br>(1) Câu chẻ: <b>It was the government's failure to act that caused the crisis.</b> (làm nổi bật chính 'sự không hành động' là nguyên nhân)<br>(2) Đảo ngữ với Never: <b>Never had a government's inaction had such catastrophic consequences.</b> (nhấn mạnh mức độ chưa từng có — điều chỉnh nhẹ ý để hợp cấu trúc)<br>(3) Bị động dịch trọng tâm: <b>The crisis was caused by the government's failure to act.</b> (đưa 'the crisis' lên đầu làm trọng tâm)<br><b>Tự kiểm tra:</b> Câu chẻ 'It was...that...' làm nổi bật đúng thành phần? Đảo ngữ 'Never had...' đúng ngữ pháp (trợ động từ đảo lên trước chủ ngữ)? Bị động dịch trọng tâm sang 'the crisis'? Hiểu MỖI cấu trúc phục vụ một hiệu ứng khác nhau?"}]},
mid:{mcq:[
{q:"Điều kiện HỖN HỢP: 'If she had studied medicine, she ___ a doctor now.'",opts:["would be","would have been","will be","is"],a:0,why:"<b>Đúng: would be.</b> Điều kiện hỗn hợp: quá khứ (had studied) → hiện tại (would be now). Band 9 dùng linh hoạt loại này."},
{q:"Mệnh đề rút gọn để CÔ ĐỌNG: 'Because he was exhausted, he stopped.' →",opts:["Being exhausted, he stopped.","He exhausted, stopped.","Exhausted him, he stopped.","He was exhausted stopped."],a:0,why:"<b>Đúng: Being exhausted, he stopped.</b> Rút gọn mệnh đề lý do bằng phân từ — cô đọng, tự nhiên band cao."},
{q:"Khi nào một câu NGẮN sắc bén tốt hơn câu phức?",opts:["Không bao giờ","Khi cần nhấn mạnh dứt khoát hoặc tạo tương phản nhịp điệu sau chuỗi câu dài","Câu ngắn luôn kém","Chỉ ở kết bài"],a:1,why:"<b>Đúng: B.</b> Band 9 biết câu ngắn sắc, đặt đúng chỗ (sau câu dài), tạo nhấn mạnh và nhịp — không phải lúc nào câu phức cũng tốt hơn."},
{q:"Cấu trúc song song tạo hiệu ứng:",opts:["Gây rối","Nhịp điệu, sự cân đối và làm rõ quan hệ giữa các ý ngang hàng","Sai ngữ pháp","Làm dài"],a:1,why:"<b>Đúng: B.</b> Song song (X, Y, and Z cùng dạng) tạo nhịp, cân đối và nhấn mạnh các ý ngang hàng — công cụ tu từ band 9."},
{q:"Câu phức band 9 khác câu phức band 6 ở:",opts:["Dài hơn","RÕ RÀNG và ĐÚNG dù nhiều tầng — không 'gồng', dễ theo; band 6 câu phức dễ rối/sai","Nhiều mệnh đề hơn","Nhiều từ nối hơn"],a:1,why:"<b>Đúng: B.</b> Câu phức band 9 trôi chảy, rõ ràng, chính xác dù phức tạp. Band 6 câu phức thường rối, khó theo hoặc sai ngữ pháp."}],
writing:[{q:"Viết một đoạn (7-8 câu tiếng Anh) về một chủ đề, thể hiện Grammar band 9: đa dạng cấu trúc phức ĐIỀU KHIỂN CÓ CHỦ ĐÍCH (ít nhất một đảo ngữ/câu chẻ để nhấn mạnh, một bị động dịch trọng tâm, một mệnh đề rút gọn, một cấu trúc song song), MIX câu dài và ngắn tạo nhịp, và MỌI câu chính xác. Sau đó chỉ ra mục đích của 3 lựa chọn cấu trúc.",
model:"<b>Bài mẫu tham khảo:</b> The digital revolution has reshaped nearly every aspect of modern life. Rarely has a single innovation spread so rapidly or penetrated so deeply into the fabric of society. Information that once took days to travel across continents is now transmitted in an instant, and communities that were previously isolated have been connected as never before. Yet this transformation, remarkable as it is, has come at a cost. It is the erosion of privacy, more than any other consequence, that should give us pause. Driven by the relentless logic of data collection, corporations now know more about individuals than those individuals often know about themselves. We must decide, and decide soon, how to balance the undeniable benefits of connectivity against the fundamental right to a private life.<br><br><i>Mục đích của 3 lựa chọn cấu trúc:</i><br>• Đảo ngữ 'Rarely has a single innovation spread...' — nhấn mạnh tính chưa từng có của tốc độ lan tỏa, tạo mở đầu mạnh mẽ sau câu chủ đề.<br>• Bị động dịch trọng tâm 'Information...is now transmitted in an instant' — đưa 'information' (đối tượng quan tâm) lên làm trọng tâm, làm mờ tác nhân (không quan trọng ai truyền).<br>• Câu chẻ 'It is the erosion of privacy...that should give us pause' — làm NỔI BẬT chính xác đâu là hệ quả đáng lo nhất giữa nhiều hệ quả.<br>• (Thêm) Câu ngắn 'Yet this transformation...has come at a cost' + 'We must decide, and decide soon' — tạo nhấn mạnh dứt khoát và nhịp tương phản sau các câu dài.<br><b>Tự kiểm tra:</b> Đa dạng cấu trúc điều khiển có chủ đích (đảo ngữ, câu chẻ, bị động, rút gọn 'Driven by...')? Mix câu dài/ngắn tạo nhịp? MỌI câu chính xác? Rõ ràng dù phức tạp? Chỉ ra được mục đích ≥3 lựa chọn cấu trúc?"}]},
adv:{mcq:[
{q:"Điểm phân biệt CỐT LÕI giữa Grammar band 9 và band 8 là:",opts:["Band 9 câu dài hơn","Band 9 có 'full flexibility' — điều khiển cú pháp CHÍNH XÁC để phục vụ mọi sắc thái ý, với độ chính xác gần tuyệt đối; band 8 dùng đa dạng cấu trúc tốt nhưng còn 'occasional errors' và ít 'điều khiển' tinh vi hơn","Band 9 dùng cấu trúc hiếm hơn","Band 9 không dùng câu đơn"],a:1,why:"<b>Đúng: B.</b> Band 8: 'wide range of structures', 'majority error-free', 'occasional errors'. Band 9: 'full range with full flexibility and accuracy', lỗi chỉ 'slips'. Hai khác biệt cốt lõi: (1) FLEXIBILITY — band 9 không chỉ DÙNG được nhiều cấu trúc mà ĐIỀU KHIỂN chúng một cách tinh vi để đạt hiệu ứng diễn đạt chính xác (nhấn mạnh, sắc thái, nhịp điệu, trọng tâm); cú pháp trở thành công cụ biểu đạt có chủ đích. (2) ACCURACY — gần tuyệt đối, ngay cả câu phức nhất cũng đúng, lỗi còn lại chỉ là 'trượt tay' tự nhiên. Band 8 đã rất giỏi (đa dạng + phần lớn đúng) nhưng band 9 là sự LÀM CHỦ hoàn toàn — cú pháp phục vụ ý một cách chính xác, linh hoạt và gần như không tì vết, như một nhạc công điều khiển nhạc cụ đã thuần thục."},
{q:"Tại sao 'điều khiển cú pháp phục vụ ý' quan trọng hơn 'dùng nhiều cấu trúc phức'?",opts:["Không quan trọng hơn","Vì mục đích của ngữ pháp là truyền đạt ý và sắc thái chính xác; band 9 chọn cấu trúc vì nó đạt ĐÚNG hiệu ứng mong muốn (không phải để 'đa dạng'); dùng cấu trúc phức ngẫu nhiên/không mục đích có thể làm câu rối hoặc lệch trọng tâm","Vì cấu trúc phức khó","Vì giám khảo đếm cấu trúc"],a:1,why:"<b>Đúng: B.</b> Đây là chuyển biến tư duy quan trọng nhất về ngữ pháp band 9: từ 'dùng nhiều cấu trúc để trông đa dạng' (tư duy band 7) sang 'điều khiển cú pháp để phục vụ ý' (tư duy band 9). Ngữ pháp không phải mục đích tự thân — nó là phương tiện truyền đạt ý và sắc thái. Người band 9 hỏi: 'Tôi muốn NHẤN MẠNH điều này → dùng đảo ngữ/câu chẻ; muốn TRỌNG TÂM vào đối tượng → bị động; muốn CÔ ĐỌNG → rút gọn; muốn tạo NHỊP/tương phản → mix câu dài-ngắn.' Mỗi lựa chọn cú pháp là CÓ CHỦ ĐÍCH, đạt một hiệu ứng cụ thể. Ngược lại, nhồi cấu trúc phức 'để đa dạng' mà không có mục đích thường phản tác dụng: câu trở nên rối rắm, trọng tâm bị lệch, hoặc giọng thiếu tự nhiên. 'Full flexibility' của band 9 chính là khả năng này — làm chủ cú pháp đến mức dùng nó như công cụ biểu đạt tinh vi, không phải để trình diễn. Đây là lý do một câu ĐƠN đặt đúng chỗ có thể là lựa chọn band 9 hoàn hảo (khi cần sự dứt khoát/nhấn mạnh), trong khi một câu phức rối là dấu hiệu band thấp hơn."},
{q:"Vai trò của sự đa dạng ĐỘ DÀI câu (không chỉ độ phức tạp) ở band 9 là:",opts:["Không quan trọng","Tạo NHỊP ĐIỆU và sự nhấn mạnh tự nhiên: câu dài phát triển ý phức tạp, câu ngắn sắc bén tạo điểm nhấn/tương phản; sự biến đổi này phản ánh khả năng điều khiển văn phong tinh tế của bản ngữ có học thức","Câu phải đều nhau","Chỉ câu dài mới band cao","Chỉ câu ngắn mới rõ"],a:1,why:"<b>Đúng: B.</b> Một khía cạnh tinh tế nhưng quan trọng của band 9 là sự đa dạng về ĐỘ DÀI câu, không chỉ độ phức tạp. Văn xuôi band 9 có NHỊP ĐIỆU: các câu dài, nhiều mệnh đề phát triển những ý phức tạp và tạo dòng chảy; xen kẽ với những câu ngắn, sắc bén tạo điểm nhấn mạnh mẽ hoặc sự tương phản. Một câu ngắn dứt khoát ('Yet this was not the case.' / 'The consequences were severe.') sau một chuỗi câu dài tạo hiệu ứng nhấn mạnh mạnh mẽ và cho người đọc 'nghỉ'. Ngược lại, văn toàn câu dài phức tạp trở nên nặng nề, khó theo và đơn điệu; văn toàn câu ngắn thì giật cục, thiếu sự phát triển. Khả năng điều khiển nhịp điệu qua đa dạng độ dài câu là dấu hiệu của người viết THÀNH THẠO, cảm được 'âm nhạc' của văn xuôi — một phẩm chất của bản ngữ có học thức mà band 9 sở hữu. Nó cũng liên quan đến 'flexibility': biết khi nào cần câu dài để phát triển và khi nào câu ngắn để nhấn mạnh là một phần của việc điều khiển cú pháp phục vụ ý."},
{q:"Để đạt độ chính xác band 9 với câu phức, sự kết hợp nào là cần thiết?",opts:["Chỉ cần biết ngữ pháp","Làm chủ thực sự cấu trúc (dùng đúng một cách tự nhiên, không phải 'ghép công thức') KẾT HỢP với kỹ năng tự biên tập nghiêm ngặt để bắt các lỗi 'trượt tay' còn sót — vì ngay cả người giỏi cũng trượt tay khi viết câu phức dưới áp lực","Viết câu đơn để an toàn","Nhờ người khác sửa"],a:1,why:"<b>Đúng: B.</b> Độ chính xác band 9 với câu phức đòi hỏi HAI yếu tố kết hợp. Thứ nhất, LÀM CHỦ THỰC SỰ: dùng các cấu trúc phức (điều kiện hỗn hợp, đảo ngữ, mệnh đề lồng nhau) một cách TỰ NHIÊN và đúng, không phải 'ghép công thức' một cách gượng ép (điều dễ dẫn đến lỗi). Sự làm chủ này đến từ luyện tập lâu dài đến khi cấu trúc trở thành phản xạ. Thứ hai, TỰ BIÊN TẬP nghiêm ngặt (Bài 63): ngay cả người viết xuất sắc cũng tạo ra lỗi 'trượt tay' khi soạn câu phức nhiều tầng dưới áp lực thời gian — một 's' bị bỏ, một sự hòa hợp bị lệch trong câu dài, một mệnh đề bị 'treo'. Điều phân biệt accuracy band 9 không phải 'không bao giờ mắc lỗi' mà là KHÔNG ĐỂ LỖI SỐNG SÓT trong bản cuối. Vì câu phức là nơi lỗi hay ẩn nấp nhất, rà soát chúng đặc biệt kỹ là thiết yếu. Lưu ý: 'viết câu đơn để an toàn' KHÔNG phải giải pháp — nó hy sinh RANGE và FLEXIBILITY (cũng cần cho band 9). Giải pháp đúng là DÁM dùng câu phức (làm chủ + có chủ đích) RỒI rà soát kỹ."},
{q:"Một câu đơn ngắn, đặt đúng chỗ, có thể là lựa chọn Grammar band 9 khi:",opts:["Không bao giờ — band 9 cần câu phức","Khi nó phục vụ một mục đích diễn đạt cụ thể: tạo nhấn mạnh dứt khoát, một điểm nhấn tương phản sau câu dài, hoặc sự rõ ràng sắc bén — thể hiện sự điều khiển cú pháp có chủ đích, không phải sự giới hạn","Chỉ ở mở bài","Chỉ khi hết ý"],a:1,why:"<b>Đúng: B.</b> Đây là một hiểu biết tinh tế nhưng quan trọng: band 9 KHÔNG có nghĩa 'mọi câu phải phức tạp'. Trái lại, một câu đơn ngắn, ĐẶT ĐÚNG CHỖ và CÓ CHỦ ĐÍCH, là biểu hiện của sự điều khiển cú pháp bậc cao. Nó có thể phục vụ nhiều mục đích diễn đạt: tạo NHẤN MẠNH dứt khoát ('The result was catastrophic.'); tạo điểm nhấn TƯƠNG PHẢN về nhịp điệu sau một chuỗi câu dài phức tạp (cho người đọc 'nghỉ' và làm ý nổi bật); hoặc đạt sự RÕ RÀNG sắc bén cho một luận điểm then chốt. Điều then chốt là câu đơn này là một LỰA CHỌN CÓ CHỦ ĐÍCH trong bối cảnh một văn bản thể hiện đầy đủ range và flexibility (có cả câu phức đa dạng ở nơi khác) — nó cho thấy người viết ĐIỀU KHIỂN cú pháp để phục vụ ý, biết chọn đúng công cụ cho đúng khoảnh khắc. Điều này hoàn toàn khác với việc CHỈ dùng được câu đơn (do giới hạn năng lực) — đó mới là band thấp. Sự khác biệt nằm ở CHỦ ĐÍCH và BỐI CẢNH: câu đơn của band 9 là lựa chọn tu từ trong một 'bảng màu' phong phú; câu đơn của band thấp là giới hạn của 'bảng màu'. 'Full flexibility' bao gồm cả sự tự do dùng câu đơn khi nó là lựa chọn tốt nhất."}],
writing:[{q:"Bài luyện tổng hợp Grammar band 9: viết một đoạn văn phức tạp (9-11 câu tiếng Anh) về một chủ đề trừu tượng, thể hiện 'full range with full flexibility': đa dạng cấu trúc phức được ĐIỀU KHIỂN CÓ CHỦ ĐÍCH (đảo ngữ, câu chẻ, điều kiện hỗn hợp, bị động dịch trọng tâm, mệnh đề rút gọn, song song), MIX câu dài phức và câu ngắn sắc bén tạo nhịp điệu, và độ chính xác gần tuyệt đối. Sau đó phân tích: mục đích diễn đạt của ít nhất 4 lựa chọn cấu trúc, và vai trò của (các) câu ngắn trong nhịp điệu đoạn.",
model:"<b>Bài mẫu tham khảo:</b> Few forces have shaped human civilisation as decisively as our relationship with the natural world. For millennia, humanity regarded nature as an inexhaustible resource, to be exploited without consequence. That assumption has proved catastrophically mistaken. Had our ancestors understood the fragility of the ecosystems on which they depended, the environmental crises we now confront might well have been averted. It is not ignorance alone, however, that has brought us to this precipice, but a persistent unwillingness to sacrifice short-term gain for long-term survival. Warned repeatedly by scientists, governments have too often prioritised economic expansion over ecological stability. The consequences are becoming impossible to ignore. Forests that took centuries to grow are being felled in a matter of years, species that evolved over aeons are vanishing, and weather patterns that sustained agriculture for generations are growing dangerously erratic. What is required now is not merely awareness but action — decisive, coordinated and sustained. If we continue to hesitate, future generations will inherit a diminished and inhospitable world; if we act with resolve, we may yet preserve the remarkable planet that gave rise to us.<br><br><i>Phân tích mục đích cấu trúc:</i><br>• Đảo ngữ 'Few forces have shaped...as decisively as' — mở đầu mạnh mẽ, nhấn mạnh tầm quan trọng chưa từng có của chủ đề.<br>• Điều kiện hỗn hợp/đảo 'Had our ancestors understood...might well have been averted' — thể hiện quan hệ giả định quá khứ-kết quả một cách trang trọng, cô đọng (đảo 'Had' thay 'If...had').<br>• Câu chẻ 'It is not ignorance alone...but a persistent unwillingness...' — làm nổi bật CHÍNH XÁC nguyên nhân thật (không phải ngu dốt mà là sự thiếu ý chí), tạo tương phản.<br>• Mệnh đề rút gọn 'Warned repeatedly by scientists' — cô đọng, chèn thông tin bối cảnh vào đầu câu về chính phủ.<br>• Cấu trúc song song 'Forests...are being felled..., species...are
