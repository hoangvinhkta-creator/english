/* ===== BÀI 50 ===== */
{id:"g50",stage:5,title:"Bài 50 · Speaking — phát âm, độ trôi chảy & tiêu chí band + ôn tập Chặng 5",
theory:`<h3>1. Bốn tiêu chí Speaking — hiểu để tự nâng band</h3>
<table><tr><th>Tiêu chí</th><th>Band 6</th><th>Band 7-8</th></tr>
<tr><td>Fluency & Coherence</td><td>Nói được nhưng còn ngập ngừng, lặp</td><td>Trôi chảy tự nhiên, mạch lạc, ít nỗ lực rõ rệt</td></tr>
<tr><td>Lexical Resource</td><td>Đủ từ cho chủ đề quen</td><td>Từ đa dạng, chính xác, có idiom/collocation tự nhiên</td></tr>
<tr><td>Grammar</td><td>Câu đơn giản đúng, câu phức còn lỗi</td><td>Đa dạng cấu trúc phức, phần lớn không lỗi</td></tr>
<tr><td>Pronunciation</td><td>Hiểu được nhưng còn khó ở chỗ</td><td>Rõ ràng, ngữ điệu/trọng âm hiệu quả, dễ hiểu suốt</td></tr></table>
<h3>2. Phát âm: 4 yếu tố then chốt (không phải 'giọng bản ngữ')</h3>
<ul>
<li><b>Trọng âm từ (word stress):</b> PHOtograph vs phoTOGrapher — sai trọng âm gây khó hiểu.</li>
<li><b>Trọng âm câu (sentence stress):</b> nhấn từ mang nghĩa chính (danh/động/tính từ), lướt từ chức năng (a, the, of).</li>
<li><b>Ngữ điệu (intonation):</b> lên/xuống giọng — câu hỏi Yes/No lên giọng cuối; câu kể xuống giọng. Giọng đều đều (monotone) nghe kém.</li>
<li><b>Nối âm (connected speech):</b> 'an apple' → /ə-næpəl/; người bản ngữ nối từ, không tách rời từng từ.</li>
</ul>
<h3>3. Trôi chảy: chất lượng hơn tốc độ</h3>
<p>Trôi chảy KHÔNG phải nói nhanh. Nói quá nhanh làm phát âm mờ và mất ngữ điệu. Nói với tốc độ vừa phải, rõ ràng, có nhịp nghỉ tự nhiên (giữa các ý) tốt hơn nhiều. Ngập ngừng để tìm Ý (tự nhiên) khác với ngập ngừng vì bí TỪ (mất điểm).</p>
<h3>4. Đa dạng ngữ pháp trong lời nói</h3>
<p>Chủ động 'khoe' cấu trúc (một cách tự nhiên): thì hoàn thành ('I've been learning...'), câu điều kiện ('If I had more time, I would...'), câu phức (although, which), so sánh. Nhưng ĐỘ CHÍNH XÁC quan trọng — câu phức sai nhiều còn tệ hơn câu đơn đúng.</p>
<h3>5. Bạn đã học gì ở Chặng 5?</h3>
<ul>
<li>Tổng quan kỳ thi & chiến lược chung (Bài 41)</li>
<li>Listening: dạng câu hỏi & bẫy (Bài 42)</li>
<li>Reading: đọc lướt/quét, quản lý thời gian, dạng câu khó (Bài 43-44)</li>
<li>Writing Task 1: biểu đồ & dạng đặc biệt (Bài 45-46)</li>
<li>Writing Task 2: cấu trúc & phát triển ý (Bài 47-48)</li>
<li>Speaking: chiến thuật 3 phần & phát âm/tiêu chí (Bài 49-50)</li>
</ul>
<p class="muted">⚠️ Nhớ: giám khảo chấm theo TIÊU CHÍ, không theo 'bạn có vẻ giỏi'. Biết mình yếu tiêu chí nào (fluency? grammar? phát âm?) để luyện trúng đích. Thu âm và nghe lại bản thân là cách tự đánh giá hiệu quả nhất. Sự tự nhiên và rõ ràng luôn thắng sự 'màu mè' gượng ép.</p>`,
levels:{
basic:{mcq:[
{q:"Speaking có mấy tiêu chí chấm?",opts:["Hai","Ba","Bốn","Năm"],a:2,why:"<b>Đúng: Bốn.</b> Fluency & Coherence, Lexical Resource, Grammatical Range & Accuracy, Pronunciation — mỗi cái 25%."},
{q:"IELTS có yêu cầu giọng bản ngữ (Anh/Mỹ) không?",opts:["Có, bắt buộc","KHÔNG — chỉ cần rõ ràng, dễ hiểu, có ngữ điệu/trọng âm tốt","Chỉ band 9","Có, giọng Anh"],a:1,why:"<b>Đúng: KHÔNG.</b> Accent không phải vấn đề nếu lời nói rõ ràng và dễ hiểu. Trọng âm, ngữ điệu, sự rõ ràng mới quan trọng."},
{q:"'Trôi chảy' (fluency) có nghĩa là:",opts:["Nói thật nhanh","Nói mạch lạc, tự nhiên với nhịp nghỉ hợp lý — KHÔNG phải nói nhanh","Không bao giờ ngừng","Nói to"],a:1,why:"<b>Đúng: B.</b> Trôi chảy là mạch nói tự nhiên, không phải tốc độ. Nói quá nhanh làm mờ phát âm và mất ngữ điệu."},
{q:"Từ 'photographer' được nhấn trọng âm ở âm tiết:",opts:["PHO-","-TOG-","-ra-","-pher"],a:1,why:"<b>Đúng: -TOG- (phoTOGrapher).</b> Trọng âm từ đúng rất quan trọng; sai trọng âm gây khó hiểu."},
{q:"Cách tự đánh giá phát âm/trôi chảy hiệu quả nhất là:",opts:["Nhờ bạn đoán","Thu âm giọng mình và nghe lại","Đọc sách","Không cần"],a:1,why:"<b>Đúng: Thu âm và nghe lại.</b> Nghe lại giúp bạn phát hiện lỗi phát âm, ngập ngừng, lặp từ mà lúc nói không nhận ra."}],
writing:[{q:"Tự đánh giá 4 tiêu chí Speaking của bản thân (viết 4-5 câu tiếng Anh): bạn mạnh/yếu tiêu chí nào (fluency, vocab, grammar, pronunciation), và một hành động cụ thể để cải thiện tiêu chí yếu nhất.",
model:"<b>Bài mẫu tham khảo:</b> Among the four speaking criteria, I feel my vocabulary is relatively strong, as I can usually find the words I need for familiar topics. However, my fluency is probably my weakest area, because I tend to hesitate and translate from Vietnamese in my head before speaking. My grammar is fairly accurate in simple sentences, but I make mistakes when I attempt more complex structures. To improve my fluency, I plan to record myself speaking for two minutes every day and gradually reduce my pauses by thinking directly in English rather than translating.<br><b>Gợi ý:</b> Hiểu rõ tiêu chí yếu nhất giúp luyện trúng đích. Nếu yếu fluency → luyện nói hằng ngày, giảm dịch trong đầu. Nếu yếu grammar → luyện cấu trúc phức đến khi tự động. Nếu yếu pronunciation → luyện trọng âm/ngữ điệu, thu âm so sánh."}]},
mid:{mcq:[
{q:"Ngữ điệu (intonation) đều đều (monotone) gây ấn tượng:",opts:["Rất tốt","Kém — nghe buồn tẻ, khó truyền đạt nghĩa và cảm xúc","Không ảnh hưởng","Band 9"],a:1,why:"<b>Đúng: Kém.</b> Giọng đều đều làm mất khả năng truyền đạt nghĩa/thái độ. Lên xuống giọng tự nhiên giúp người nghe dễ theo và điểm Pronunciation cao hơn."},
{q:"Về ngữ pháp trong Speaking, điều nào ĐÚNG?",opts:["Chỉ nên dùng câu đơn cho an toàn","Nên đa dạng cấu trúc phức, nhưng ĐỘ CHÍNH XÁC quan trọng — câu phức sai nhiều còn tệ hơn câu đơn đúng","Câu càng phức tạp càng tốt bất kể lỗi","Ngữ pháp không được chấm"],a:1,why:"<b>Đúng: B.</b> Grammatical Range AND Accuracy — cần cả đa dạng lẫn chính xác. Cố nhồi câu phức mà sai liên tục hạ điểm; cân bằng giữa 'khoe' cấu trúc và giữ chính xác."},
{q:"Nối âm (connected speech) như 'an apple' → /ə-næpəl/ giúp:",opts:["Nói khó hơn","Lời nói nghe TỰ NHIÊN và trôi chảy hơn, giống người bản ngữ","Sai ngữ pháp","Không cần thiết"],a:1,why:"<b>Đúng: B.</b> Người bản ngữ nối âm giữa các từ. Tách rời từng từ ('an... apple') nghe cứng và kém tự nhiên. Nối âm cải thiện cả fluency lẫn pronunciation."},
{q:"Ở Part 2, ngập ngừng kiểu nào CHẤP NHẬN được?",opts:["Ngập ngừng dài vì bí từ","Nhịp nghỉ ngắn tự nhiên giữa các ý (như đang suy nghĩ nội dung)","Im lặng 10 giây","Lặp lại câu nhiều lần"],a:1,why:"<b>Đúng: B.</b> Nhịp nghỉ tự nhiên giữa các ý (để chuyển ý, suy nghĩ nội dung) là bình thường. Ngập ngừng dài vì bí TỪ/ngữ pháp mới là dấu hiệu hạ điểm Fluency."},
{q:"Trọng âm câu (sentence stress) đúng là nhấn vào:",opts:["Mọi từ như nhau","Từ mang nghĩa chính (danh/động/tính từ), lướt từ chức năng (a, the, of, to)","Từ đầu câu","Từ cuối câu"],a:1,why:"<b>Đúng: B.</b> Tiếng Anh có nhịp: nhấn từ nội dung (content words), lướt từ chức năng (function words). Điều này tạo 'nhạc điệu' tự nhiên của tiếng Anh và giúp truyền đạt nghĩa."}],
writing:[{q:"Viết một đoạn (tiếng Anh, 6-8 câu) trả lời một câu hỏi Part 3, cố ý 'khoe' đa dạng ngữ pháp một cách TỰ NHIÊN: dùng ít nhất một thì hoàn thành, một câu điều kiện, một câu phức (although/which), và một so sánh — nhưng giữ chính xác. Câu hỏi: 'How has the way people communicate changed over the past twenty years?'",
model:"<b>Bài mẫu:</b> The way people communicate has changed dramatically over the past two decades. Twenty years ago, most people relied on phone calls and letters, whereas nowadays instant messaging and video calls have become the norm. This shift, which has been driven largely by smartphones and social media, means that we can now stay in touch far more easily than before. Although these tools have made communication faster and more convenient, I sometimes feel that conversations have become shorter and less meaningful. If people made more effort to talk face to face, I believe their relationships would be stronger. Personally, I have noticed that I communicate with distant friends much more often than I used to, but perhaps with less depth. Overall, technology has transformed not just how we communicate, but also the very nature of our connections.<br><b>Tự kiểm tra:</b> Có thì hoàn thành (has changed, has been driven, have noticed)? Câu điều kiện (If people made..., would be)? Câu phức (whereas, which, Although)? So sánh (more easily than, shorter and less meaningful)? Các cấu trúc CHÍNH XÁC và tự nhiên, không gượng?"}]},
adv:{mcq:[
{q:"Thí sinh nói tiếng Anh với accent Việt rõ nhưng ngữ điệu tốt, trọng âm đúng, rất dễ hiểu. Band Pronunciation có thể:",opts:["Tối đa 6 vì có accent","Vẫn đạt 8 — accent không giới hạn band nếu lời nói rõ ràng, dùng hiệu quả các đặc điểm ngữ âm và dễ hiểu suốt","Tối đa 5","Chỉ 7 nếu accent nhẹ"],a:1,why:"<b>Đúng: B.</b> IELTS đánh giá HIỆU QUẢ GIAO TIẾP qua ngữ âm, không phải mức độ 'giống bản ngữ'. Một người có accent nhưng dùng tốt trọng âm, ngữ điệu, nhịp điệu và dễ hiểu xuyên suốt hoàn toàn có thể đạt band 8. Ám ảnh 'xóa accent' là hiểu sai tiêu chí — hãy tập trung vào sự RÕ RÀNG và các đặc điểm ngữ âm."},
{q:"Đặc điểm tinh vi nào của Coherence (không chỉ Fluency) ở band 8 trong Speaking?",opts:["Nói to","Sắp xếp ý mạch lạc, dùng từ nối/tham chiếu tự nhiên, phát triển câu trả lời có logic rõ ràng chứ không chỉ nói liên tục","Nói nhanh","Nhiều idiom"],a:1,why:"<b>Đúng: B.</b> Coherence là MẠCH LẠC về Ý — sắp xếp lập luận có logic, dùng cohesive devices (however, that's why, in that case) tự nhiên, phát triển câu trả lời mạch lạc. Một người nói trôi chảy (fluent) nhưng ý lộn xộn, nhảy cóc thì vẫn thiếu coherence. Band 8 cần cả hai: nói mượt VÀ ý được tổ chức logic."},
{q:"Cân bằng tối ưu giữa 'độ chính xác' và 'độ đa dạng' ngữ pháp ở band cao là:",opts:["Chỉ chính xác, dùng câu đơn","Dùng ĐA DẠNG cấu trúc phức và duy trì độ chính xác cao (phần lớn câu không lỗi); mắc lỗi nhỏ hiếm hoi vẫn chấp nhận ở band 8","Chỉ đa dạng, kệ lỗi","Câu càng dài càng tốt"],a:1,why:"<b>Đúng: B.</b> Band 8 Grammar = 'wide range of structures' VỚI 'majority of sentences error-free' và chỉ 'occasional' lỗi nhỏ. Cần CẢ đa dạng (nhiều loại câu phức) LẪN chính xác (phần lớn không lỗi). Chỉ dùng câu đơn đúng giới hạn ở range thấp; dùng câu phức nhưng sai nhiều giới hạn ở accuracy thấp. Nghệ thuật là mở rộng range mà vẫn giữ accuracy."},
{q:"Vì sao 'nói nhanh để tỏ ra trôi chảy' là chiến thuật SAI?",opts:["Vì mất sức","Vì tốc độ cao thường làm mờ phát âm, mất trọng âm/ngữ điệu và tăng lỗi; fluency thật là mạch nói TỰ NHIÊN, rõ ràng, không phải tốc độ","Vì giám khảo không kịp nghe","Vì bị trừ điểm tốc độ"],a:1,why:"<b>Đúng: B.</b> Fluency được đánh giá qua sự MƯỢT MÀ và TỰ NHIÊN của mạch nói, không phải số từ/phút. Nói quá nhanh phản tác dụng: phát âm mờ (hạ Pronunciation), ngữ điệu phẳng, và thường kéo theo lỗi ngữ pháp/từ. Người band 8 nói với tốc độ vừa phải, rõ ràng, có nhịp nghỉ tự nhiên — nghe THOẢI MÁI và tự tin, không hối hả."},
{q:"Chiến lược 'về đích' hiệu quả nhất cho Speaking khi đã ở band 6.5 muốn lên 7.5?",opts:["Học thuộc nhiều bài mẫu","Xác định tiêu chí đang kéo điểm (thường là fluency hoặc grammar accuracy), luyện có mục tiêu vào đúng nó, thu âm-phân tích, và tăng tiếp xúc nói thực tế","Chỉ học từ vựng khó","Nói nhanh hơn"],a:1,why:"<b>Đúng: B.</b> Band tổng bị kéo bởi tiêu chí YẾU NHẤT. Từ 6.5 lên 7.5 cần: (1) chẩn đoán tiêu chí nào đang là 'nút thắt' (thu âm và tự đánh giá theo 4 tiêu chí, hoặc nhờ người có chuyên môn), (2) luyện có mục tiêu vào đúng nó (VD nếu là accuracy → luyện đến khi cấu trúc phức tự động đúng), (3) tăng giờ nói thực tế để tự nhiên hóa. Luyện dàn trải hoặc học thuộc không giải quyết nút thắt cụ thể."}],
writing:[{q:"Tổng hợp Chặng 5: viết một 'bản kế hoạch luyện Speaking về đích' (8-10 câu, tiếng Anh) để nâng từ band hiện tại lên band mục tiêu, dựa trên hiểu biết 4 tiêu chí. Nêu: tiêu chí yếu nhất của bạn và cách chẩn đoán, 3 hành động luyện có mục tiêu, và cách bạn sẽ tự đánh giá tiến bộ. Trình bày mạch lạc, dùng ngôn ngữ band cao.",
model:"<b>Bài mẫu tham khảo:</b> Having analysed my speaking performance against the four assessment criteria, I have concluded that fluency and coherence represent my main bottleneck. The clearest evidence of this is that, when I record and listen back to myself, I notice frequent hesitations and moments where I search for words rather than ideas. To address this systematically, I intend to take three targeted actions over the coming weeks. Firstly, I will practise speaking for two minutes on a random topic every day, deliberately pushing myself to keep going without long pauses, which should train me to think directly in English. Secondly, I will build a bank of flexible discourse markers — such as 'having said that' and 'that's precisely why' — so that I can link my ideas more smoothly and buy myself thinking time naturally. Thirdly, I will focus on maintaining grammatical accuracy while using complex structures, since occasional errors under pressure are currently costing me marks. To monitor my progress, I will record a two-minute response each week and compare it with the previous one, paying close attention to the number of hesitations and self-corrections. In addition, I will try to arrange regular conversation practice with a partner to simulate the pressure of the real interview. Ultimately, I am convinced that consistent, focused practice aimed at my specific weakness will be far more effective than simply speaking at random or memorising model answers.<br><b>Tự kiểm tra:</b> Có xác định tiêu chí yếu nhất VÀ cách chẩn đoán (thu âm)? Đúng 3 hành động CỤ THỂ, có mục tiêu? Có cách tự đánh giá tiến bộ (so sánh bản thu hằng tuần)? Ngôn ngữ band cao (discourse markers, targeted, systematically)? Mạch lạc?"}]}
}}
);

/* ============================ CHẶNG 6 · TINH LUYỆN 7.0 → 8.5 ============================ */
LESSONS.push(
/* ===== BÀI 51 ===== */
{id:"g51",stage:6,title:"Bài 51 · Task Response band 8 — lập luận & tư duy phản biện",
theory:`<h3>1. Khoảng cách band 7 → band 8 ở Task Response</h3>
<p>Band 7: trả lời đủ mọi phần đề, ý chính rõ, được phát triển. Band 8: trả lời đề một cách <b>ĐẦY ĐỦ và SÂU SẮC</b>, ý được khai triển với chiều sâu tư duy, lập trường tinh tế (nuanced), không có ý nào 'thừa' hay lạc.</p>
<h3>2. Ba đặc điểm của Task Response band 8</h3>
<ul>
<li><b>Trả lời trực diện, đầy đủ mọi khía cạnh:</b> không né tránh phần khó của đề, xử lý mọi từ khóa quan trọng.</li>
<li><b>Lập trường tinh tế (nuanced position):</b> không đơn giản 'hoàn toàn đồng ý' — mà 'đồng ý với điều kiện', 'đúng trong phần lớn trường hợp nhưng có ngoại lệ'.</li>
<li><b>Ý được khai triển sâu và liên quan chặt:</b> mỗi ý chính được phát triển qua chuỗi lập luận logic đến hệ quả sâu xa, mọi ví dụ đều trúng đích.</li>
</ul>
<h3>3. Lập trường TINH TẾ khác lập trường ĐƠN GIẢN thế nào?</h3>
<div class="example"><b>Đơn giản (band 7):</b> I completely agree that technology improves education.<br><b>Tinh tế (band 8):</b> While technology has undeniably enhanced education in many respects, its benefits depend heavily on how thoughtfully it is integrated — a distinction that is often overlooked.<br><span class="vi">Lập trường tinh tế thừa nhận sự phức tạp, đặt điều kiện, thể hiện tư duy sắc sảo.</span></div>
<h3>4. Kỹ thuật khai triển sâu: 'thang trừu tượng'</h3>
<p>Kéo lập luận từ cụ thể lên tác động rộng: cá nhân → cộng đồng → xã hội/kinh tế → dài hạn.</p>
<div class="example">Free healthcare helps individuals afford treatment (cá nhân) → a healthier workforce is more productive (kinh tế) → this reduces the long-term burden on the state and strengthens social equality (xã hội, dài hạn).</div>
<h3>5. Tránh các 'bẫy' đóng trần Task Response ở band 7</h3>
<ul>
<li>Ý phát triển đủ nhưng NÔNG (dừng ở 'vì nó tốt/tiện' mà không đào tiếp).</li>
<li>Lập trường quá chung chung, thiếu sắc thái.</li>
<li>Có câu/ý 'lấp chỗ' không đóng góp cho lập luận.</li>
<li>Ví dụ chung chung hoặc không thật sự minh họa cho ý.</li>
</ul>
<p class="muted">⚠️ Band 8 KHÔNG phải là viết dài hơn hay từ khó hơn — mà là CHIỀU SÂU và ĐỘ SẮC của tư duy. Một bài band 8 có thể ngắn gọn nhưng mỗi câu đều 'có trọng lượng', mỗi ý đều được đẩy đến tận cùng logic.</p>`,
levels:{
basic:{mcq:[
{q:"Band 8 Task Response khác band 7 chủ yếu ở:",opts:["Viết dài hơn","Chiều SÂU và độ SẮC của tư duy/lập luận","Từ khó hơn","Nhiều đoạn hơn"],a:1,why:"<b>Đúng: Chiều sâu và độ sắc.</b> Band 8 là về chất lượng tư duy, không phải độ dài hay từ vựng 'kêu'."},
{q:"Lập trường 'tinh tế' (nuanced) nghĩa là:",opts:["Không nêu lập trường","Thừa nhận sự phức tạp, đặt điều kiện thay vì đồng ý/phản đối tuyệt đối","Đổi ý giữa bài","Nói chung chung"],a:1,why:"<b>Đúng: B.</b> Lập trường tinh tế thừa nhận phức tạp ('đồng ý với điều kiện...'), thể hiện tư duy sắc sảo hơn 'hoàn toàn đồng ý'."},
{q:"'Thang trừu tượng' để khai triển ý là kéo lập luận từ:",opts:["Dài đến ngắn","Cụ thể (cá nhân) lên tác động rộng (xã hội, dài hạn)","Khó đến dễ","Kết đến mở"],a:1,why:"<b>Đúng: B.</b> Kéo từ tác động cá nhân → cộng đồng → xã hội/kinh tế → dài hạn để tạo chiều sâu lập luận."},
{q:"Điều nào đóng trần Task Response ở band 7?",opts:["Lập trường tinh tế","Ý phát triển đủ nhưng NÔNG, dừng ở 'vì nó tốt/tiện'","Ví dụ trúng đích","Trả lời đủ đề"],a:1,why:"<b>Đúng: B.</b> Ý nông (không đào tiếp sau 'vì nó tốt') là dấu hiệu band 7, chưa đạt chiều sâu band 8."},
{q:"Bài band 8 lý tưởng:",opts:["Càng dài càng tốt","Mỗi câu 'có trọng lượng', mỗi ý đẩy đến tận cùng logic, không câu thừa","Nhiều ý nông","Nhiều từ hiếm"],a:1,why:"<b>Đúng: B.</b> Band 8 chú trọng mỗi câu đóng góp, mỗi ý sâu — chất lượng hơn số lượng."}],
writing:[{q:"Luyện lập trường TINH TẾ. Cho đề 'Universities should only offer subjects that are useful for future careers. Do you agree?', viết một câu thesis ĐƠN GIẢN rồi viết lại thành câu thesis TINH TẾ (nuanced) band 8.",
model:"<b>Bài mẫu:</b><br><i>Đơn giản:</i> I disagree that universities should only offer career-focused subjects.<br><i>Tinh tế (band 8):</i> While I acknowledge the value of career-oriented education, I firmly believe that restricting universities to purely vocational subjects would be short-sighted, as it overlooks the broader intellectual and social purposes that higher education is meant to serve.<br><b>Tự kiểm tra:</b> Câu tinh tế có thừa nhận giá trị phía đối lập ('While I acknowledge...')? Có nêu lập trường rõ nhưng KHÔNG tuyệt đối đơn giản? Có gợi mở chiều sâu (broader purposes) để triển khai? Thể hiện tư duy cân nhắc?"}]},
mid:{mcq:[
{q:"Chuỗi lập luận nào SÂU hơn (band 8)?",opts:["Free education is good because it helps students.","Free education enables talented but poor students to attend university, which produces a more skilled workforce, ultimately boosting the entire economy.","Free education is helpful and nice.","Education should be free."],a:1,why:"<b>Đúng: B.</b> B kéo chuỗi nhân-quả từ cá nhân (poor students) → lực lượng lao động → kinh tế (thang trừu tượng). A, C, D dừng ở mức nông."},
{q:"Một bài trả lời ĐỦ đề nhưng mọi ý đều nông sẽ đạt Task Response khoảng:",opts:["Band 8","Band 6-7 (ý chưa được khai triển sâu)","Band 9","Band 4"],a:1,why:"<b>Đúng: B.</b> Trả lời đủ đề là điều kiện cần nhưng chưa đủ cho band 8; ý phải được khai triển SÂU. Ý nông giới hạn ở band 6-7."},
{q:"Câu 'lấp chỗ' không đóng góp cho lập luận ảnh hưởng band vì:",opts:["Làm bài ngắn","Band 8 yêu cầu MỌI ý liên quan chặt và đóng góp; câu thừa làm loãng lập luận","Không ảnh hưởng","Tăng điểm độ dài"],a:1,why:"<b>Đúng: B.</b> Band 8 đòi hỏi sự tập trung, mọi câu phục vụ lập luận. Câu 'độn' làm loãng và lộ sự thiếu chặt chẽ."},
{q:"Cách nâng một ý từ nông lên sâu là:",opts:["Thêm tính từ","Hỏi tiếp 'Rồi sao? Dẫn đến gì? Tác động rộng hơn?' và khai triển hệ quả","Thêm ví dụ chung chung","Lặp lại ý"],a:1,why:"<b>Đúng: B.</b> Đào sâu bằng cách kéo chuỗi hệ quả (rồi sao → tác động rộng), không phải thêm tính từ hay lặp lại."},
{q:"Lập trường tinh tế phù hợp nhất khi đề:",opts:["Chỉ có một đáp án đúng","Phức tạp, có nhiều góc độ hợp lý — thể hiện bạn nhận ra sự phức tạp đó","Quá dễ","Không có tranh luận"],a:1,why:"<b>Đúng: B.</b> Hầu hết đề Task 2 phức tạp; lập trường tinh tế cho thấy bạn nhận ra và xử lý được sự phức tạp — dấu hiệu tư duy band cao."}],
writing:[{q:"Viết một đoạn thân bài (6-8 câu tiếng Anh) đạt Task Response band 8 cho luận điểm: 'Reducing working hours would improve people's quality of life.' Yêu cầu: khai triển ý theo 'thang trừu tượng' (cá nhân → xã hội/kinh tế), lập luận sâu, và có một sắc thái tinh tế (điều kiện/ngoại lệ).",
model:"<b>Bài mẫu:</b> Shortening the standard working week could substantially enhance people's overall wellbeing, provided it is implemented thoughtfully. At an individual level, fewer working hours would give employees more time to rest, pursue hobbies and nurture relationships, all of which are essential for mental health. This improvement in personal wellbeing, in turn, tends to translate into higher motivation and productivity during working hours, meaning that output need not necessarily fall. On a broader scale, a society in which people are less exhausted and more fulfilled is likely to experience lower rates of stress-related illness, thereby easing the burden on healthcare systems. That said, the benefits are not guaranteed for everyone: for lower-paid workers whose income depends on hours worked, a reduction could create financial hardship unless accompanied by fair wage adjustments. It is therefore not the reduction in hours alone, but the manner in which it is introduced, that ultimately determines whether quality of life genuinely improves.<br><b>Tự kiểm tra:</b> Khai triển theo thang trừu tượng (cá nhân → năng suất → xã hội/y tế)? Lập luận có chiều sâu (chuỗi nhân-quả)? Có sắc thái tinh tế (điều kiện 'provided...', ngoại lệ 'for lower-paid workers')? Kết luận đoạn tinh tế ('not X alone, but Y')? Mọi câu đóng góp cho lập luận?"}]},
adv:{mcq:[
{q:"Đặc điểm CỐT LÕI phân biệt Task Response band 8 với band 7 là:",opts:["Độ dài bài","Ý được 'fully extended' với chiều sâu và mọi khía cạnh đề được xử lý thấu đáo, lập trường được phát triển tinh tế và nhất quán","Số từ nối","Số ví dụ"],a:1,why:"<b>Đúng: B.</b> Mô tả band 8 Task Response: đề được xử lý 'sufficiently' về mọi phần, ý chính 'fully extended and well supported', lập trường rõ và phát triển xuyên suốt. Khác biệt then chốt với band 7 là ĐỘ THẤU ĐÁO và CHIỀU SÂU — mọi khía cạnh được khai triển tận nơi, không có phần nào bị xử lý hời hợt."},
{q:"Vì sao lập trường tinh tế lại RỦI RO nếu làm không khéo?",opts:["Luôn tốt","Có thể trở nên MƠ HỒ nếu không nêu rõ lập trường tổng thể; phải cân bằng giữa thừa nhận phức tạp và giữ quan điểm rõ ràng, nhất quán","Luôn xấu","Bị cấm"],a:1,why:"<b>Đúng: B.</b> Lập trường tinh tế thể hiện tư duy sắc, NHƯNG nếu chỉ 'một mặt thế này, mặt khác thế kia' mà không có lập trường tổng thể rõ ràng thì thành 'ba phải' — hạ Task Response (giám khảo không rõ bạn nghĩ gì). Nghệ thuật: thừa nhận phức tạp/điều kiện NHƯNG vẫn có một lập trường chủ đạo rõ ràng, nhất quán từ đầu đến cuối."},
{q:"Trong một bài band 8, vai trò của ví dụ khác band 6 thế nào?",opts:["Chỉ để làm dài","Ví dụ được TÍCH HỢP chặt vào lập luận, minh họa CHÍNH XÁC ý đang bàn và thường tự nó đẩy lập luận tiến thêm, thay vì chỉ 'dán' vào","Càng nhiều càng tốt","Phải là số liệu thật"],a:1,why:"<b>Đúng: B.</b> Ở band 6, ví dụ thường bị 'dán' rời rạc ('For example, many people...'). Ở band 8, ví dụ được dệt vào mạch lập luận: nó minh họa chính xác luận điểm VÀ thường làm sáng tỏ thêm/đẩy lập luận tiến lên. Ví dụ không phải phần trang trí mà là bộ phận hữu cơ của lập luận."},
{q:"Một thí sinh viết bài rất dài, nhiều ý, nhưng Task Response chỉ 6.5. Nguyên nhân khả dĩ nhất?",opts:["Viết quá ngắn","Nhiều ý nhưng mỗi ý NÔNG (không khai triển sâu), có thể có ý lạc/thừa, lập trường thiếu nhất quán — 'rộng mà không sâu'","Dùng từ dễ","Có kết bài"],a:1,why:"<b>Đúng: B.</b> Lỗi 'rộng mà không sâu' rất phổ biến: thí sinh nhồi nhiều ý để 'trông phong phú' nhưng không ý nào được đào sâu, đôi khi có ý lạc đề hoặc mâu thuẫn. Band 8 chuộng ÍT ý được khai triển thấu đáo hơn NHIỀU ý nông. Độ dài không cứu được sự thiếu chiều sâu."},
{q:"Cách hiệu quả nhất để đẩy một lập luận đến 'chiều sâu band 8'?",opts:["Thêm nhiều tính từ mạnh","Truy vấn hệ quả nhiều tầng (dẫn đến gì → rồi sao → tác động rộng/dài hạn) VÀ lường trước phản biện để củng cố, đến khi lập luận 'chạm đáy' logic","Lặp lại ý bằng từ khác","Trích dẫn giả"],a:1,why:"<b>Đúng: B.</b> Chiều sâu band 8 đến từ: (1) truy vấn chuỗi hệ quả nhiều tầng cho đến tác động sâu xa nhất (kinh tế/xã hội/dài hạn), (2) lường trước và xử lý phản biện (concession-rebuttal) để lập luận vững. Đây là tư duy 'đào đến tận cùng' — mỗi luận điểm được đẩy đến giới hạn logic của nó, không dừng nửa chừng ở mức 'nghe hợp lý là được'."}],
writing:[{q:"Viết một đoạn thân bài BAND 8 HOÀN CHỈNH (8-10 câu tiếng Anh) cho đề: 'Some believe that governments should prioritise economic growth above environmental protection. To what extent do you agree?' Đoạn phải: có lập trường tinh tế, khai triển sâu theo thang trừu tượng, tích hợp một ví dụ chặt chẽ, xử lý một phản biện (concession-rebuttal), và mọi câu đều đóng góp cho lập luận.",
model:"<b>Bài mẫu:</b> The notion that economic growth should take precedence over environmental protection rests on a false dichotomy that ultimately undermines both goals. Proponents of this view argue that prioritising the economy creates jobs and raises living standards, and in the short term this may well appear true. However, such reasoning fails to recognise that unchecked growth frequently erodes the very natural resources on which long-term prosperity depends. When forests are cleared and rivers polluted in the name of rapid development, the immediate economic gains are often outweighed by the subsequent costs of environmental degradation — from declining agricultural yields to escalating public health expenditure. The experience of several rapidly industrialising nations illustrates this vividly: cities that grew explosively while ignoring pollution now face crippling healthcare burdens and reduced productivity caused by contaminated air and water. Admittedly, developing economies may lack the resources to pursue growth and sustainability simultaneously, and this constraint deserves genuine consideration. Yet even here, the choice is rarely binary, since investment in green technology can itself drive economic expansion while safeguarding the environment. Viewed in this light, treating growth and protection as competing priorities is not merely unwise but self-defeating, for a ruined environment can sustain no lasting prosperity.<br><b>Tự kiểm tra:</b> Lập trường tinh tế (bác bỏ 'false dichotomy' thay vì đơn giản đồng ý/phản đối)? Khai triển sâu theo thang trừu tượng (gains ngắn hạn → chi phí dài hạn → y tế, năng suất)? Ví dụ tích hợp chặt (các nước công nghiệp hóa nhanh)? Concession-rebuttal ('Admittedly...Yet even here...')? Mọi câu đóng góp, không câu thừa? Kết đoạn sắc ('self-defeating...no lasting prosperity')?"}]}
}},
/* ===== BÀI 52 ===== */
{id:"g52",stage:6,title:"Bài 52 · Coherence & Cohesion band 8 — mạch lạc tinh vi",
theory:`<h3>1. Coherence vs Cohesion — hai mặt của một tiêu chí</h3>
<ul>
<li><b>Coherence (mạch lạc):</b> ý tưởng được sắp xếp logic, dễ theo dõi — bức tranh lớn về tổ chức.</li>
<li><b>Cohesion (liên kết):</b> các câu/đoạn được nối với nhau bằng công cụ ngôn ngữ (từ nối, tham chiếu) — chất keo bề mặt.</li>
</ul>
<h3>2. Khoảng cách band 7 → 8</h3>
<p>Band 7: dùng công cụ liên kết tốt, đôi khi hơi máy móc; phân đoạn hợp lý. Band 8: liên kết <b>MƯỢT đến mức gần như 'vô hình'</b> — người đọc không để ý đến 'cơ chế' nối vì nó tự nhiên; quản lý tham chiếu và phân đoạn khéo léo.</p>
<h3>3. Cohesion band 8: vượt khỏi 'Firstly, Secondly, Moreover'</h3>
<p>Band cao dùng liên kết TINH VI hơn từ nối đầu câu:</p>
<ul>
<li><b>Tham chiếu (referencing):</b> this trend, such measures, the former/the latter, these concerns — nối ngược mà không lặp.</li>
<li><b>Thay thế & lược bỏ:</b> 'Some support the policy; others do not' (lược 'support the policy').</li>
<li><b>Liên kết bằng Ý:</b> câu sau phát triển tự nhiên từ câu trước, không cần từ nối vẫn mạch lạc.</li>
<li><b>Từ nối tinh tế:</b> in this respect, by the same token, paradoxically, consequently — dùng ĐÚNG CHỖ, không nhồi.</li>
</ul>
<h3>4. 'Information flow': cũ → mới</h3>
<p>Câu mạch lạc thường bắt đầu bằng thông tin ĐÃ BIẾT (nối với câu trước) rồi đưa thông tin MỚI ở cuối. Kỹ thuật này (given-new) tạo dòng chảy tự nhiên:</p>
<div class="example"><b>Solar power is becoming cheaper. This affordability</b> (nối lại ý cũ) <b>has driven its rapid adoption</b> (thông tin mới).</div>
<h3>5. Phân đoạn (paragraphing) band 8</h3>
<p>Mỗi đoạn MỘT ý trung tâm rõ ràng (unity), có câu chủ đề, và chuyển đoạn mượt. Đoạn không quá ngắn (1-2 câu) cũng không phình to lộn xộn nhiều ý.</p>
<p class="muted">⚠️ Lỗi 'đóng trần band 7' về Cohesion: (1) nhồi từ nối đầu MỌI câu (Moreover... Furthermore... In addition...) — bị coi là 'mechanical'; (2) lặp từ thay vì tham chiếu; (3) tham chiếu mơ hồ ('this' không rõ chỉ cái gì); (4) đoạn thiếu tính thống nhất. Cohesion band 8 mượt và ẩn, không phô trương.</p>`,
levels:{
basic:{mcq:[
{q:"'Coherence' (mạch lạc) chủ yếu về:",opts:["Từ nối bề mặt","Ý tưởng được sắp xếp LOGIC, dễ theo dõi","Chính tả","Độ dài câu"],a:1,why:"<b>Đúng: B.</b> Coherence là tổ chức ý logic (bức tranh lớn); Cohesion là liên kết bề mặt bằng công cụ ngôn ngữ."},
{q:"Cohesion band 8 lý tưởng là:",opts:["Nhồi nhiều từ nối","Liên kết MƯỢT, tự nhiên đến gần như 'vô hình'","Dùng từ nối đầu mọi câu","Lặp từ khóa nhiều"],a:1,why:"<b>Đúng: B.</b> Band 8 liên kết mượt, không phô trương; người đọc không để ý 'cơ chế' vì nó tự nhiên."},
{q:"'This trend', 'such measures', 'the former' là ví dụ của:",opts:["Từ nối","Tham chiếu (referencing) — nối ngược mà không lặp","Lỗi ngữ pháp","Ví dụ"],a:1,why:"<b>Đúng: Tham chiếu.</b> Referencing nối lại ý đã nêu mà không lặp từ, giúp liên kết tinh vi."},
{q:"Lỗi Cohesion 'đóng trần band 7' phổ biến là:",opts:["Dùng tham chiếu","Nhồi từ nối đầu MỌI câu (bị coi là máy móc)","Phân đoạn rõ","Liên kết bằng ý"],a:1,why:"<b>Đúng: B.</b> Nhồi 'Moreover, Furthermore...' đầu mọi câu bị đánh giá là 'mechanical', giới hạn ở band 7."},
{q:"Mỗi đoạn văn band 8 nên có:",opts:["Nhiều ý trung tâm","MỘT ý trung tâm rõ ràng (tính thống nhất)","Không câu chủ đề","Càng ngắn càng tốt"],a:1,why:"<b>Đúng: B.</b> Mỗi đoạn một ý trung tâm (unity), có câu chủ đề — nền tảng của mạch lạc."}],
writing:[{q:"Luyện tham chiếu thay lặp từ. Viết lại đoạn sau cho MƯỢT hơn bằng cách dùng tham chiếu (this/these/such/it) thay vì lặp: 'Pollution is a serious problem. Pollution affects health. Pollution also damages the environment. Governments must reduce pollution.'",
model:"<b>Bài mẫu:</b> Pollution is a serious problem that affects human health and damages the environment. For these reasons, governments must take urgent action to reduce it.<br><i>Hoặc:</i> Pollution poses a serious threat to both public health and the natural environment. This growing problem is one that governments must address without delay.<br><b>Tự kiểm tra:</b> Đã thay các lần lặp 'pollution' bằng tham chiếu (it, this problem, these reasons)? Câu gộp mượt hơn, không cụt lủn lặp lại? Ý vẫn rõ ràng, tham chiếu không mơ hồ?"}]},
mid:{mcq:[
{q:"Nguyên tắc 'given-new' (cũ→mới) trong dòng thông tin là:",opts:["Câu bắt đầu bằng thông tin mới","Câu bắt đầu bằng thông tin ĐÃ BIẾT (nối câu trước), đưa thông tin MỚI ở cuối","Không quan trọng","Luôn dùng bị động"],a:1,why:"<b>Đúng: B.</b> Bắt đầu bằng cái đã biết (nối ý trước), kết bằng cái mới — tạo dòng chảy tự nhiên, mạch lạc."},
{q:"Câu nào liên kết TỰ NHIÊN với 'Solar power is becoming cheaper'?",opts:["Wind power is also renewable.","This affordability has accelerated its adoption worldwide.","Cars produce pollution.","People like the sun."],a:1,why:"<b>Đúng: B.</b> 'This affordability' nối lại ý 'cheaper' (given) rồi đưa thông tin mới (adoption) — dòng chảy given-new mượt mà."},
{q:"Kỹ thuật lược bỏ (ellipsis): 'Some students passed the exam; others ___.' Cách band cao:",opts:["others failed the exam","others did not","others also passed the exam","others exam"],a:1,why:"<b>Đúng: others did not.</b> Lược bỏ phần lặp ('pass the exam') → 'others did not'. Ellipsis giúp câu gọn, liên kết tinh tế."},
{q:"Tham chiếu 'this' bị coi là LỖI khi:",opts:["Rõ ràng chỉ về cái gì","MƠ HỒ — không rõ 'this' chỉ ý/vật nào","Đứng đầu câu","Có danh từ theo sau"],a:1,why:"<b>Đúng: B.</b> 'This' mơ hồ (không rõ chỉ gì) gây khó hiểu. Mẹo: thêm danh từ sau this ('this trend', 'this issue') để rõ ràng."},
{q:"Từ nối tinh tế nào phù hợp cho quan hệ 'cũng theo cách đó/tương tự vậy'?",opts:["However","By the same token","In contrast","Nevertheless"],a:1,why:"<b>Đúng: By the same token.</b> = theo cùng logic đó/tương tự vậy. Từ nối tinh tế dùng đúng chỗ (không phổ thông như 'similarly') là dấu hiệu band cao."}],
writing:[{q:"Viết một đoạn (6-7 câu tiếng Anh) về một chủ đề bạn chọn, thể hiện Cohesion band 8: dùng tham chiếu đa dạng (this/these/such/the former-latter), ít nhất một lần lược bỏ hoặc thay thế, dòng thông tin given-new, và TỪ NỐI TINH TẾ dùng đúng chỗ — TRÁNH nhồi 'Moreover/Furthermore' đầu mỗi câu.",
model:"<b>Bài mẫu:</b> The rise of remote work has fundamentally altered the modern workplace. This shift, accelerated by recent global events, has brought both opportunities and challenges. On the one hand, employees enjoy greater flexibility and save considerable time; on the other, many struggle with isolation and blurred boundaries between work and home. The former group tends to thrive in autonomous environments, whereas the latter often benefits from more structured support. Companies that recognise this distinction are better placed to design policies suited to each. By addressing such individual differences rather than imposing a single model, organisations can harness the advantages of remote work while mitigating its drawbacks.<br><b>Tự kiểm tra:</b> Có tham chiếu đa dạng (This shift, the former/the latter, this distinction, such individual differences)? Có lược bỏ/thay thế (the former group... the latter)? Dòng given-new (câu sau nối ý câu trước)? Từ nối tinh tế đúng chỗ, KHÔNG nhồi 'Moreover' đầu mỗi câu? Liên kết mượt, tự nhiên?"}]},
adv:{mcq:[
{q:"Vì sao Cohesion band 8 được mô tả là 'gần như không để ý được' (attracts no attention)?",opts:["Vì không có liên kết","Vì công cụ liên kết được dùng khéo và tự nhiên đến mức người đọc theo mạch ý trơn tru mà không bị 'vấp' vào từ nối phô trương hay lặp lại","Vì không dùng từ nối","Vì bài ngắn"],a:1,why:"<b>Đúng: B.</b> Mô tả band 7 nói cohesive devices đôi khi dùng 'mechanically'; band 8 dùng chúng khéo đến mức liên kết trở nên 'trong suốt' — người đọc lướt qua mạch ý mượt mà, không bị phân tâm bởi từ nối lộ liễu hay sự lặp. Đây là sự khác biệt giữa liên kết 'phô' (band 6-7) và liên kết 'ẩn, tự nhiên' (band 8)."},
{q:"Kỹ thuật cohesion nào TINH VI nhất và thường bị người band 6-7 bỏ qua?",opts:["Dùng 'Firstly, Secondly'","Liên kết từ vựng (lexical cohesion): dùng từ đồng nghĩa, thượng danh (hypernym), và chuỗi từ cùng trường nghĩa để nối ý mà không lặp và không cần từ nối","Lặp từ khóa","Dùng dấu phẩy"],a:1,why:"<b>Đúng: B.</b> Lexical cohesion — nối các câu bằng mạng lưới từ liên quan (đồng nghĩa, thượng danh, từ cùng chủ đề: 'car... vehicle... this mode of transport') — tạo mạch lạc ngầm rất mạnh mà không cần từ nối lộ liễu hay lặp từ. Người band 6-7 thường chỉ dựa vào từ nối đầu câu; band 8 dệt mạch lạc qua chính lựa chọn từ vựng."},
{q:"Về phân đoạn (paragraphing), lỗi tinh vi nào giới hạn Coherence ở band 7?",opts:["Có quá nhiều đoạn","Đoạn thiếu TÍNH THỐNG NHẤT (chứa nhiều ý không liên quan chặt) hoặc câu chủ đề không phản ánh đúng nội dung đoạn — logic tổng thể bị lung lay","Đoạn quá dài","Có câu chủ đề"],a:1,why:"<b>Đúng: B.</b> Ngay cả khi từ nối tốt, Coherence vẫn bị giới hạn nếu tổ chức đoạn yếu: một đoạn ôm nhiều ý rời rạc, hoặc câu chủ đề hứa một đằng nội dung đi một nẻo. Band 8 đòi hỏi mỗi đoạn là một khối logic thống nhất, câu chủ đề dẫn dắt chính xác, và trình tự các đoạn tạo nên một lập luận tổng thể chặt chẽ — đây là Coherence ở cấp độ toàn bài, không chỉ câu-với-câu."},
{q:"Dòng thông tin 'given-new' bị phá vỡ gây hậu quả gì?",opts:["Không sao","Câu bắt đầu bằng thông tin mới/không liên quan làm người đọc 'mất kết nối' với câu trước, mạch lạc bị đứt gãy dù ngữ pháp đúng","Câu dài hơn","Tăng điểm"],a:1,why:"<b>Đúng: B.</b> Khi mỗi câu mở đầu bằng thông tin mới toanh, không móc nối với câu trước, người đọc phải liên tục 'định vị lại' — mạch đọc bị giật cục dù từng câu đúng ngữ pháp. Duy trì dòng given-new (mở đầu bằng cái đã biết, nối vào cái mới) là cơ chế ngầm tạo cảm giác 'trôi' của văn band 8, thường vô thức với người đọc nhưng thiếu nó thì văn 'khựng'."},
{q:"Cân bằng tối ưu về từ nối ở band 8 là:",opts:["Càng nhiều càng tốt","Dùng ĐÚNG và ĐỦ — đa dạng, chính xác về chức năng logic, đặt đúng chỗ cần thiết; kết hợp với tham chiếu và liên kết từ vựng thay vì lệ thuộc từ nối đầu câu","Không dùng từ nối","Chỉ dùng 3 từ nối"],a:1,why:"<b>Đúng: B.</b> Band 8 không phải 'nhiều từ nối' hay 'không từ nối', mà là dùng ĐÚNG CHỖ, ĐA DẠNG, chính xác chức năng, và QUAN TRỌNG là kết hợp nhiều tầng liên kết (từ nối + tham chiếu + lexical cohesion + dòng given-new). Sự lệ thuộc một chiều vào từ nối đầu câu là dấu hiệu band thấp hơn; band 8 phân bổ 'gánh nặng liên kết' qua nhiều cơ chế tự nhiên."}],
writing:[{q:"Viết hai đoạn liền nhau (tổng 10-12 câu tiếng Anh) cho một đề Task 2 bạn chọn, thể hiện Coherence & Cohesion band 8: mỗi đoạn có tính thống nhất và câu chủ đề rõ, chuyển đoạn mượt, dùng đa tầng liên kết (tham chiếu, lexical cohesion/từ đồng nghĩa, dòng given-new, từ nối tinh tế đúng chỗ), và TRÁNH nhồi từ nối máy móc.",
model:"<b>Bài mẫu:</b> One of the most significant advantages of investing in public transport is its capacity to reduce urban congestion. When efficient bus and rail networks are available, commuters are far more willing to leave their cars at home, and the resulting decrease in traffic eases the daily gridlock that plagues so many cities. This reduction in private vehicle use brings a further, less obvious benefit: cleaner air. As emissions from individual cars fall, the overall quality of the urban environment improves, making cities healthier and more pleasant places to live.<br><br>Such environmental gains, however, are only part of the picture. Well-designed transport systems also promote social equality, since they grant those without cars — often the poorest members of society — reliable access to jobs, education and services. In this way, a single investment simultaneously tackles congestion, pollution and inequality, three challenges that might otherwise appear unrelated. It is precisely this ability to address multiple problems at once that makes public transport such a compelling priority for forward-thinking governments.<br><b>Tự kiểm tra:</b> Mỗi đoạn có tính thống nhất + câu chủ đề rõ? Chuyển đoạn mượt ('Such environmental gains, however, are only part of the picture')? Tham chiếu đa dạng (This reduction, Such environmental gains, this ability)? Lexical cohesion (congestion/traffic/gridlock; emissions/air quality)? Dòng given-new? Từ nối tinh tế đúng chỗ, không nhồi? Liên kết đa tầng, tự nhiên?"}]}
}},
/* ===== BÀI 53 ===== */
{id:"g53",stage:6,title:"Bài 53 · Lexical Resource band 8 — độ chính xác & tinh tế",
theory:`<h3>1. Khoảng cách band 7 → 8 về từ vựng</h3>
<p>Band 7: vốn từ đủ rộng, dùng một số từ ít phổ biến và collocation, đôi khi sai. Band 8: dùng từ vựng <b>rộng và linh hoạt</b> để truyền đạt nghĩa CHÍNH XÁC, dùng từ ít phổ biến và idiomatic thành thạo, lỗi từ vựng HIẾM.</p>
<h3>2. Ba trụ cột của Lexical Resource band 8</h3>
<ul>
<li><b>Độ CHÍNH XÁC (precision):</b> chọn đúng từ cho đúng sắc thái. 'a minor issue' vs 'a trivial issue' vs 'a negligible issue' — khác nhau tinh tế.</li>
<li><b>Collocation tự nhiên:</b> từ đi với từ đúng cách (a pressing concern, a compelling argument, deeply ingrained).</li>
<li><b>Từ ít phổ biến & idiomatic, dùng ĐÚNG:</b> không nhồi từ khó, mà dùng từ đắt giá đúng chỗ.</li>
</ul>
<h3>3. Độ chính xác: chọn từ theo SẮC THÁI</h3>
<div class="example"><b>'increase' (trung tính)</b> vs <b>'surge' (đột ngột mạnh)</b> vs <b>'escalate' (leo thang, thường tiêu cực)</b> vs <b>'proliferate' (lan nhanh về số lượng)</b><br><span class="vi">Band 8 chọn từ khớp CHÍNH XÁC ngữ cảnh và sắc thái, không chỉ 'đúng nghĩa chung'.</span></div>
<h3>4. Collocation tinh tế nâng band</h3>
<table><tr><th>Thay vì</th><th>Collocation band 8</th></tr>
<tr><td>a big problem</td><td>a pressing / pervasive problem</td></tr>
<tr><td>a strong argument</td><td>a compelling / cogent argument</td></tr>
<tr><td>very important</td><td>of paramount importance</td></tr>
<tr><td>deeply believe</td><td>firmly / staunchly believe</td></tr>
<tr><td>a firmly fixed habit</td><td>a deeply ingrained habit</td></tr></table>
<h3>5. Idiomatic language — dùng khéo, không gượng</h3>
<p>Idiomatic KHÔNG có nghĩa là thành ngữ 'cliché' (raining cats and dogs). Nó là cách diễn đạt TỰ NHIÊN của người bản ngữ: 'a double-edged sword', 'to strike a balance', 'at the expense of', 'a growing body of evidence', 'to pave the way for'. Dùng đúng ngữ cảnh mới tăng điểm.</p>
<p class="muted">⚠️ Bẫy band 7→8: (1) nhồi từ 'kêu' sai ngữ cảnh (tệ hơn dùng từ đơn giản đúng); (2) collocation sai ('do a mistake', 'make research'); (3) lặp từ (dùng 'important' 5 lần); (4) idiom sáo rỗng/sai. Nguyên tắc vàng: ĐÚNG NGHĨA và ĐÚNG SẮC THÁI trước, 'đắt' sau. Một từ đơn giản dùng chính xác luôn thắng một từ khó dùng sai.</p>`,
levels:{
basic:{mcq:[
{q:"Lexical Resource band 8 chú trọng nhất:",opts:["Dùng càng nhiều từ khó càng tốt","Truyền đạt nghĩa CHÍNH XÁC với từ đa dạng, lỗi hiếm","Từ dài","Nhiều thành ngữ"],a:1,why:"<b>Đúng: B.</b> Band 8 là dùng từ CHÍNH XÁC và linh hoạt, lỗi hiếm — không phải nhồi từ khó."},
{q:"Chọn collocation ĐÚNG:",opts:["do a mistake","make a mistake","take a mistake","have a mistake"],a:1,why:"<b>Đúng: make a mistake.</b> Collocation cố định. 'do a mistake' là lỗi phổ biến."},
{q:"Thay 'a big problem' bằng cụm band cao:",opts:["a large problem","a pressing problem","a huge problem","a fat problem"],a:1,why:"<b>Đúng: a pressing problem.</b> 'pressing' (cấp bách) là collocation tinh tế hơn 'big/large/huge'."},
{q:"Nhồi từ 'kêu' nhưng SAI ngữ cảnh thì:",opts:["Luôn tăng điểm","Còn TỆ HƠN dùng từ đơn giản đúng","Không ảnh hưởng","Band 9"],a:1,why:"<b>Đúng: B.</b> Từ khó dùng sai lộ điểm yếu; từ đơn giản dùng chính xác luôn tốt hơn. Đúng nghĩa trước, 'đắt' sau."},
{q:"'a double-edged sword' là ví dụ của:",opts:["Lỗi từ vựng","Ngôn ngữ idiomatic tự nhiên (con dao hai lưỡi)","Collocation sai","Từ hiếm vô nghĩa"],a:1,why:"<b>Đúng: B.</b> Cách diễn đạt idiomatic tự nhiên, dùng đúng ngữ cảnh sẽ nâng điểm Lexical Resource."}],
writing:[{q:"Luyện độ chính xác. Với mỗi cặp, viết 1 câu (tiếng Anh) cho thấy bạn hiểu SẮC THÁI khác nhau: (1) increase vs surge. (2) a minor issue vs a trivial issue. (3) important vs paramount.",
model:"<b>Bài mẫu:</b> (1) The company's profits <b>increased</b> steadily over the decade, but they <b>surged</b> unexpectedly after the new product launch. (2) Forgetting to reply was <b>a minor issue</b>, but he treated it as if it were serious, whereas the typo was genuinely <b>a trivial issue</b> that nobody noticed. (3) Communication skills are <b>important</b> in most jobs, but in diplomacy they are of <b>paramount</b> importance.<br><b>Tự kiểm tra:</b> 'surge' dùng cho tăng đột ngột mạnh (khác 'increase' đều đặn)? 'trivial' = tầm thường không đáng kể (nhẹ hơn/khác 'minor')? 'paramount' = tối quan trọng (mạnh hơn 'important')? Mỗi câu cho thấy bạn phân biệt được sắc thái?"}]},
mid:{mcq:[
{q:"Chọn từ CHÍNH XÁC sắc thái: 'Tensions between the two nations continued to ___.'",opts:["increase","escalate","grow","rise"],a:1,why:"<b>Đúng: escalate.</b> 'escalate' = leo thang (thường tiêu cực, căng thẳng) — khớp 'tensions' chính xác hơn 'increase/grow/rise' trung tính."},
{q:"Collocation band 8 cho 'a strong argument':",opts:["a big argument","a compelling argument","a hard argument","a heavy argument"],a:1,why:"<b>Đúng: a compelling argument.</b> 'compelling/cogent' (thuyết phục) là collocation tinh tế cho 'argument'."},
{q:"'a deeply ___ habit' (thói quen ăn sâu):",opts:["ingrained","planted","fixed","stuck"],a:0,why:"<b>Đúng: ingrained.</b> 'deeply ingrained habit' là collocation cố định (thói quen ăn sâu, khó bỏ)."},
{q:"Vấn đề với việc dùng 'important' 5 lần trong bài:",opts:["Không sao","Lặp từ — thiếu đa dạng từ vựng, hạ Lexical Resource; nên thay bằng crucial, vital, essential, significant","Tăng điểm nhấn mạnh","Đúng phong cách"],a:1,why:"<b>Đúng: B.</b> Lặp một từ nhiều lần lộ vốn từ hạn chế. Đa dạng hóa (crucial, vital, essential, paramount) là yêu cầu Lexical Resource band cao."},
{q:"Idiomatic 'to strike a balance between X and Y' nghĩa là:",opts:["Đánh nhau","Tìm sự cân bằng giữa X và Y","Chọn X bỏ Y","Phá vỡ cân bằng"],a:1,why:"<b>Đúng: Tìm sự cân bằng.</b> 'strike a balance between' là cụm idiomatic tự nhiên, rất hữu ích cho Writing/Speaking band cao."}],
writing:[{q:"Viết một đoạn (6-7 câu tiếng Anh) về một chủ đề xã hội, thể hiện Lexical Resource band 8: dùng từ CHÍNH XÁC theo sắc thái, ít nhất 4 collocation tinh tế (a pressing concern, a compelling case, of paramount importance, deeply ingrained...), và 1-2 cụm idiomatic tự nhiên (a double-edged sword, strike a balance, at the expense of...) — TRÁNH lặp từ và nhồi từ sai.",
model:"<b>Bài mẫu:</b> The rapid spread of misinformation online has become one of the most pressing concerns of the digital age. Social media platforms, while offering unprecedented access to information, have proved to be a double-edged sword, enabling falsehoods to proliferate as quickly as legitimate news. There is a compelling case for stricter regulation, yet governments must strike a delicate balance between curbing harmful content and safeguarding freedom of expression. This tension is particularly acute because the desire to control information can, at the expense of civil liberties, pave the way for censorship. Given how deeply ingrained social media has become in daily life, tackling this issue is of paramount importance. Ultimately, addressing misinformation without undermining democratic values remains a formidable challenge.<br><b>Tự kiểm tra:</b> Từ chính xác sắc thái (pressing, proliferate, acute, formidable)? Collocation tinh tế (pressing concerns, compelling case, deeply ingrained, paramount importance)? Cụm idiomatic tự nhiên (a double-edged sword, strike a balance, at the expense of, pave the way for)? KHÔNG lặp từ, KHÔNG nhồi từ sai ngữ cảnh?"}]},
adv:{mcq:[
{q:"Đặc điểm CỐT LÕI của Lexical Resource band 8 (khác band 7) là:",opts:["Dùng nhiều từ hiếm","Dùng từ vựng rộng LINH HOẠT để truyền đạt nghĩa chính xác và tinh tế, thành thạo cả từ ít phổ biến lẫn idiomatic, với lỗi từ vựng chỉ 'hiếm khi' xảy ra","Câu dài","Nhiều thành ngữ cliché"],a:1,why:"<b>Đúng: B.</b> Mô tả band 8: 'wide resource used fluently and flexibly to convey precise meanings', 'skilful use of uncommon and idiomatic items', chỉ 'occasional inaccuracies'. Điểm mấu chốt là ĐỘ CHÍNH XÁC và LINH HOẠT (chọn đúng từ cho đúng sắc thái, dùng thành thạo tự nhiên), không phải độ hiếm/khó của từ. Band 7 dùng được từ ít phổ biến nhưng còn 'some inaccuracies'; band 8 gần như luôn chính xác."},
{q:"Vì sao 'precision' (độ chính xác) quan trọng hơn 'độ khó của từ' ở band 8?",opts:["Không đúng, độ khó quan trọng hơn","Vì mục đích của từ vựng là truyền đạt nghĩa CHÍNH XÁC; một từ 'khó' dùng lệch sắc thái làm méo nghĩa, trong khi từ chính xác (dù đơn giản hơn) truyền đạt đúng ý — band 8 thưởng cho sự chính xác","Vì từ khó bị cấm","Vì giám khảo không biết từ khó"],a:1,why:"<b>Đúng: B.</b> Lexical Resource đánh giá khả năng dùng từ để truyền đạt nghĩa CHÍNH XÁC và tinh tế. Một từ 'đắt' nhưng sai sắc thái ('The problem escalated' khi ý chỉ là tăng nhẹ trung tính) làm lệch nghĩa và bị tính là thiếu chính xác. Band 8 ưu tiên chọn từ khớp chính xác ngữ cảnh/sắc thái — đôi khi đó là từ ít 'kêu' hơn nhưng đúng hơn. Sự tinh tế nằm ở CHỌN ĐÚNG, không phải chọn KHÓ."},
{q:"Cách dùng idiomatic language đạt band 8 (tránh phản tác dụng) là:",opts:["Nhồi càng nhiều thành ngữ càng tốt","Dùng các cách diễn đạt tự nhiên, đúng ngữ cảnh và văn phong (a growing body of evidence, to pave the way for, at odds with) — TRÁNH thành ngữ sáo rỗng/quá đời thường không hợp văn học thuật","Chỉ dùng thành ngữ cổ","Tránh hoàn toàn idiomatic"],a:1,why:"<b>Đúng: B.</b> Idiomatic band 8 là các cụm TỰ NHIÊN, hợp văn phong học thuật ('a growing body of evidence', 'to pave the way for', 'at odds with', 'to bear the brunt of'), dùng đúng ngữ cảnh. Thành ngữ sáo rỗng/quá khẩu ngữ ('raining cats and dogs', 'the ball is in their court') thường KHÔNG hợp văn nghị luận và nghe gượng. Nhồi nhiều idiom hoặc dùng sai ngữ cảnh phản tác dụng. Nguyên tắc: vài cụm idiomatic đắt giá, đúng chỗ, hợp văn phong."},
{q:"Một thí sinh dùng nhiều từ vựng học thuật cao cấp nhưng thỉnh thoảng sai collocation ('make a research', 'do a decision'). Ảnh hưởng band?",opts:["Không ảnh hưởng nếu từ khó","Lỗi collocation kéo Lexical Resource xuống vì nó cho thấy từ chưa được nắm vững ở mức 'tự nhiên'; band 8 đòi hỏi collocation gần như luôn đúng","Tăng điểm vì dùng từ khó","Chỉ mất 0.5"],a:1,why:"<b>Đúng: B.</b> Collocation là thước đo then chốt của Lexical Resource. Sai collocation ('make a research') cho thấy thí sinh biết TỪ nhưng chưa nắm cách nó KẾT HỢP tự nhiên — dấu hiệu vốn từ chưa 'chín'. Band 8 yêu cầu collocation gần như luôn tự nhiên và chính xác. Từ vựng cao cấp không bù được cho lỗi collocation cơ bản; ngược lại, dùng từ vừa phải nhưng collocation hoàn hảo còn ấn tượng hơn."},
{q:"Chiến lược mở rộng vốn từ hiệu quả nhất để lên band 8 là:",opts:["Học danh sách từ hiếm rời rạc","Học từ theo CỤM (collocation) và NGỮ CẢNH, nắm sắc thái và cách dùng tự nhiên qua đọc/nghe nhiều — thay vì học từ lẻ để 'nhồi' vào bài","Chỉ học thành ngữ","Dùng từ điển đồng nghĩa để thay từ máy móc"],a:1,why:"<b>Đúng: B.</b> Band 8 cần từ được dùng TỰ NHIÊN và CHÍNH XÁC, điều chỉ đạt được khi học từ trong CỤM và NGỮ CẢNH (biết nó đi với từ gì, dùng trong tình huống nào, sắc thái ra sao). Học từ lẻ rồi 'nhồi' vào bài dẫn đến sai collocation/sắc thái. Dùng từ điển đồng nghĩa thay từ máy móc đặc biệt nguy hiểm vì các 'từ đồng nghĩa' hiếm khi thay thế được nhau hoàn toàn (mỗi từ có sắc thái/collocation riêng). Đọc và nghe nhiều tài liệu chất lượng là cách tự nhiên hóa vốn từ."}],
writing:[{q:"Viết một đoạn thân bài BAND 8 (8-10 câu tiếng Anh) cho đề: 'Some argue that consumerism is damaging modern society. To what extent do you agree?' Tập trung thể hiện Lexical Resource band 8: từ chính xác theo sắc thái, collocation tinh tế phong phú, ngôn ngữ idiomatic hợp văn phong dùng đúng chỗ, TUYỆT ĐỐI tránh lặp từ và sai collocation.",
model:"<b>Bài mẫu:</b> There is a compelling argument that rampant consumerism has inflicted considerable damage on the fabric of modern society. The relentless pursuit of material possessions, fuelled by pervasive advertising, has fostered a culture in which self-worth is increasingly measured by wealth and status. This preoccupation with acquisition comes at a significant cost, as it often breeds dissatisfaction: no sooner has one desire been satisfied than another emerges, trapping individuals in a perpetual cycle of craving. Moreover, the environmental toll of this throwaway mentality is difficult to overstate, with the planet bearing the brunt of ever-escalating production and waste. A growing body of evidence also links excessive materialism to declining mental wellbeing, particularly among the young, who are especially susceptible to social pressures. Admittedly, consumer spending does play a vital role in sustaining economic growth and creating employment. Nevertheless, when the accumulation of goods takes precedence over genuine human connection and environmental stewardship, society pays a price that far outweighs any fleeting economic gain. Striking a healthier balance between material comfort and deeper sources of fulfilment is therefore of paramount importance.<br><b>Tự kiểm tra:</b> Từ chính xác sắc thái (rampant, relentless, pervasive, escalating, susceptible, fleeting)? Collocation tinh tế (a compelling argument, inflicted damage, comes at a cost, of paramount importance)? Idiomatic hợp văn phong (bear the brunt of, a growing body of evidence, take precedence over, difficult to overstate)? KHÔNG lặp từ (đa dạng cách nói 'materialism/consumerism/acquisition/materialism')? KHÔNG sai collocation?"}]}
}}
);

LESSONS.push(
/* ===== BÀI 54 ===== */
{id:"g54",stage:6,title:"Bài 54 · Grammatical Range & Accuracy band 8",
theory:`<h3>1. Khoảng cách band 7 → 8 về ngữ pháp</h3>
<p>Band 7: dùng nhiều cấu trúc phức, phần lớn câu không lỗi, nhưng còn lỗi rải rác. Band 8: dùng ĐA DẠNG cấu trúc, <b>PHẦN LỚN câu hoàn toàn không lỗi</b>, chỉ 'thi thoảng' có lỗi nhỏ không hệ thống. Cả RANGE (độ đa dạng) và ACCURACY (độ chính xác) đều phải cao.</p>
<h3>2. 'Range' band 8 gồm những cấu trúc nào?</h3>
<ul>
<li>Câu điều kiện các loại + hỗn hợp (ôn Bài 28)</li>
<li>Mệnh đề quan hệ (kể cả rút gọn) (Bài 26, 33)</li>
<li>Đảo ngữ & câu chẻ (Bài 34-35)</li>
<li>Bị động đa dạng, danh động từ/nguyên mẫu, phân từ (Bài 33)</li>
<li>Câu phức nhiều tầng: mệnh đề trong mệnh đề, kết hợp nhượng bộ + điều kiện</li>
</ul>
<h3>3. Nhưng: ĐỘ CHÍNH XÁC là 'người gác cổng'</h3>
<p>Nhồi cấu trúc phức mà sai nhiều KHÔNG lên band 8 — vì accuracy tụt. Band 8 = đa dạng VÀ gần như không lỗi. Tốt hơn là làm chủ vững một tập cấu trúc phức và dùng chính xác, rồi mở rộng dần.</p>
<h3>4. Các lỗi tinh vi cản band 8</h3>
<table><tr><th>Loại lỗi</th><th>Ví dụ SAI → ĐÚNG</th></tr>
<tr><td>Mạo từ (a/the)</td><td>He is <s>best</s> → <b>the best</b> student</td></tr>
<tr><td>Giới từ</td><td>depend <s>of</s> → depend <b>on</b>; discuss <s>about</s> → discuss</td></tr>
<tr><td>Hòa hợp chủ-vị</td><td>The number of cars <s>are</s> → <b>is</b> rising</td></tr>
<tr><td>Danh từ đếm được/không</td><td><s>many informations</s> → <b>much information</b></td></tr>
<tr><td>Song song (parallelism)</td><td>enjoy <s>reading and to write</s> → <b>reading and writing</b></td></tr></table>
<h3>5. Câu phức nhiều tầng — dùng có kiểm soát</h3>
<div class="example"><b>Although the policy, which was introduced to reduce congestion, initially met resistance, it eventually proved so effective that neighbouring cities adopted it.</b><br><span class="vi">Kết hợp nhượng bộ (although) + mệnh đề quan hệ (which) + kết quả (so...that). Nhiều tầng nhưng RÕ RÀNG và ĐÚNG — đó là band 8.</span></div>
<p class="muted">⚠️ Nguyên tắc band 8: 'complex but controlled'. Câu phức phải RÕ và ĐÚNG, không phải dài và rối. Nếu một câu phức khiến bạn dễ mắc lỗi, hãy tách thành hai câu đúng — hai câu đúng tốt hơn một câu phức sai.</p>`,
levels:{
basic:{mcq:[
{q:"Band 8 Grammar yêu cầu:",opts:["Chỉ câu đơn đúng","Đa dạng cấu trúc VÀ phần lớn không lỗi","Câu phức bất kể lỗi","Câu càng dài càng tốt"],a:1,why:"<b>Đúng: B.</b> Cần cả RANGE (đa dạng) lẫn ACCURACY (chính xác). Thiếu một trong hai đều không đạt band 8."},
{q:"Sửa: 'The number of students ___ increasing.'",opts:["are","is","were","have"],a:1,why:"<b>Đúng: is.</b> 'The number of' + danh từ số nhiều nhưng chủ ngữ là 'the number' (số ít) → is."},
{q:"Sửa giới từ: 'Success depends ___ hard work.'",opts:["of","on","in","at"],a:1,why:"<b>Đúng: on.</b> 'depend on'. 'depend of' là lỗi phổ biến."},
{q:"Sửa: 'She gave me many ___.' (thông tin)",opts:["information","informations","much information","a information"],a:2,why:"<b>Đúng: much information.</b> 'information' không đếm được → 'much information', không 'many informations'."},
{q:"Nếu câu phức khiến bạn dễ mắc lỗi, tốt hơn là:",opts:["Cứ viết dù sai","Tách thành hai câu ĐÚNG","Bỏ ý đó","Viết thật dài"],a:1,why:"<b>Đúng: Tách thành hai câu đúng.</b> Hai câu đúng tốt hơn một câu phức sai — accuracy là 'người gác cổng' band 8."}],
writing:[{q:"Sửa lỗi trong 5 câu: (1) He is best player in the team. (2) I look forward to meet you. (3) The informations are useful. (4) She enjoys swimming and to run. (5) It depends of the weather.",
model:"<b>Đáp án:</b> (1) He is <b>the</b> best player in the team. (mạo từ 'the' trước so sánh nhất) (2) I look forward to <b>meeting</b> you. ('look forward to' + V-ing) (3) The <b>information is</b> useful. (không đếm được, số ít) (4) She enjoys swimming and <b>running</b>. (song song: V-ing và V-ing) (5) It depends <b>on</b> the weather. (depend on)<br><b>Tự kiểm tra:</b> Mạo từ 'the' trước so sánh nhất? 'look forward to' + V-ing? 'information' không đếm được + động từ số ít? Cấu trúc song song? Giới từ đúng (depend on)?"}]},
mid:{mcq:[
{q:"Cấu trúc song song (parallelism) ĐÚNG:",opts:["The job requires patience, skill, and being creative.","The job requires patience, skill, and creativity.","The job requires to be patient, skilled, and creativity.","The job requires patient, skill, and creative."],a:1,why:"<b>Đúng: B.</b> Ba danh từ song song: patience, skill, creativity. Trộn danh từ với V-ing/tính từ phá vỡ tính song song."},
{q:"Sửa: 'Despite ___ hard, he failed.'",opts:["he worked","working","he works","work"],a:1,why:"<b>Đúng: working.</b> 'Despite' + V-ing (working). ('Despite he worked' sai — despite + mệnh đề cần 'the fact that'.)"},
{q:"Câu nào 'phức nhưng ĐÚNG' (band 8)?",opts:["Although he tired but he continued working.","Although he was tired, he continued working, which impressed everyone.","He tired, he continued, impressed everyone.","Despite he was tired, continued working."],a:1,why:"<b>Đúng: B.</b> Nhượng bộ (Although) + mệnh đề quan hệ (which) đúng, rõ ràng. A thừa 'but'; C thiếu liên kết; D sai (despite + mệnh đề)."},
{q:"Lỗi hòa hợp: 'Each of the students ___ a book.'",opts:["have","has","are having","were"],a:1,why:"<b>Đúng: has.</b> 'Each of' + số nhiều nhưng chủ ngữ 'each' là số ít → has."},
{q:"'Not only did she lead the team, ___ she also mentored newcomers.'",opts:["and","but","so","because"],a:1,why:"<b>Đúng: but.</b> 'Not only...but also' — cặp cố định. Đảo ngữ (did she lead) đúng band cao."}],
writing:[{q:"Viết một đoạn (5-6 câu tiếng Anh) về một chủ đề bạn chọn, cố ý dùng ĐA DẠNG cấu trúc phức MỘT CÁCH CHÍNH XÁC: một câu điều kiện, một mệnh đề quan hệ, một câu có đảo ngữ hoặc câu chẻ, một câu bị động, và cấu trúc song song — giữ mọi câu KHÔNG LỖI.",
model:"<b>Bài mẫu:</b> Education is widely regarded as the foundation of individual and social progress. If governments invested more in teacher training, the quality of schooling would improve significantly. Teachers, who play a crucial role in shaping young minds, deserve both respect and adequate support. Not only should their salaries be increased, but their working conditions should also be improved. A well-educated population is characterised by critical thinking, creativity, and adaptability — qualities essential in a rapidly changing world.<br><b>Tự kiểm tra:</b> Câu điều kiện đúng (If...invested...would improve)? Mệnh đề quan hệ (who play a crucial role)? Đảo ngữ (Not only should...but also)? Bị động (is regarded, is characterised)? Song song (critical thinking, creativity, and adaptability)? MỌI câu không lỗi?"}]},
adv:{mcq:[
{q:"Mô tả CHÍNH XÁC Grammatical Range & Accuracy band 8 là:",opts:["Chỉ dùng câu phức","Đa dạng cấu trúc; PHẦN LỚN câu không lỗi; chỉ 'occasional' lỗi nhỏ, không hệ thống","Không bao giờ mắc lỗi","Câu càng dài càng cao"],a:1,why:"<b>Đúng: B.</b> Band 8: 'wide range of structures', 'the majority of sentences are error-free', chỉ 'occasional errors or inappropriacies'. Điểm mấu chốt: KHÔNG cần hoàn hảo tuyệt đối (đó là band 9), nhưng lỗi phải HIẾM và KHÔNG hệ thống. Cân bằng range và accuracy — nhồi câu phức mà lỗi nhiều kéo accuracy xuống dưới band 8."},
{q:"Vì sao 'complex but controlled' quan trọng hơn 'càng phức tạp càng tốt'?",opts:["Vì câu phức bị cấm","Vì câu phức chỉ nâng band khi nó RÕ RÀNG và ĐÚNG; câu phức rối/sai vừa hạ accuracy vừa hạ coherence — kiểm soát được độ phức tạp mới là dấu hiệu làm chủ ngôn ngữ","Vì giám khảo thích câu ngắn","Vì câu dài khó đọc"],a:1,why:"<b>Đúng: B.</b> Band 8 thể hiện sự LÀM CHỦ: dùng cấu trúc phức khi cần và dùng ĐÚNG, RÕ. Một câu phức rối rắm, sai ngữ pháp hoặc khó hiểu vừa hạ Grammar (accuracy) vừa hạ Coherence (khó theo). 'Kiểm soát' nghĩa là biết khi nào cần phức tạp, giữ nó chính xác và rõ ràng, và biết tách câu khi cần. Độ phức tạp không kiểm soát là dấu hiệu band thấp hơn, không cao hơn."},
{q:"Lỗi ngữ pháp nào ở band 6.5-7 thường 'hóa thạch' (khó bỏ) và cản lên band 8?",opts:["Chỉ lỗi thì","Các lỗi nhỏ dai dẳng: mạo từ (a/the), giới từ, số nhiều/ít, hòa hợp chủ-vị — chúng lặp lại thành hệ thống và kéo accuracy xuống dù cấu trúc phức tốt","Câu quá dài","Dùng bị động"],a:1,why:"<b>Đúng: B.</b> Lỗi 'hóa thạch' (fossilised) là các lỗi nhỏ nhưng DAI DẲNG và HỆ THỐNG: mạo từ, giới từ, số nhiều/ít, hòa hợp chủ-vị. Chúng đặc biệt nguy hiểm vì (1) lặp đi lặp lại nhiều lần trong bài, khiến lỗi trở nên 'hệ thống' (điều band 8 không cho phép), và (2) người viết thường không tự nhận ra. Ngay cả khi cấu trúc phức tốt, các lỗi nhỏ hệ thống này 'đóng trần' accuracy ở band 7. Đây là lý do Bài 55 tập trung riêng vào chúng."},
{q:"Chiến lược mở rộng 'range' an toàn (không hy sinh accuracy) là:",opts:["Nhồi mọi cấu trúc phức ngay","Làm chủ vững từng cấu trúc phức đến mức dùng ĐÚNG tự động, rồi mở rộng dần; ưu tiên các cấu trúc bạn kiểm soát tốt trong bài thi","Chỉ dùng câu đơn","Học thuộc câu mẫu phức tạp"],a:1,why:"<b>Đúng: B.</b> Range và accuracy phải tăng SONG SONG. Cách an toàn: luyện từng cấu trúc phức (điều kiện, đảo ngữ, mệnh đề quan hệ rút gọn...) đến khi dùng chính xác một cách tự động, RỒI mới thêm cấu trúc mới. Trong bài thi, ưu tiên các cấu trúc bạn đã làm chủ vững. Nhồi cấu trúc chưa vững để 'trông đa dạng' làm tăng lỗi, hạ accuracy xuống dưới band 8. Học thuộc câu mẫu phức thì cứng nhắc và dễ dùng sai ngữ cảnh."},
{q:"Ở band 8, một vài lỗi nhỏ có được chấp nhận không, và điều gì mới thực sự quan trọng?",opts:["Không, phải hoàn hảo tuyệt đối","Có — band 8 cho phép 'occasional' lỗi nhỏ; điều quan trọng là lỗi KHÔNG hệ thống, KHÔNG gây khó hiểu, và phần lớn câu (kể cả câu phức) hoàn toàn đúng","Lỗi nào cũng làm rớt band 8","Chỉ lỗi thì mới tính"],a:1,why:"<b>Đúng: B.</b> Band 8 KHÔNG đòi hỏi sự hoàn hảo (đó là band 9). Nó cho phép lỗi 'thi thoảng' MIỄN LÀ: (1) không hệ thống (không phải cùng một loại lỗi lặp lại), (2) không gây khó hiểu (không ảnh hưởng giao tiếp), (3) phần lớn câu — bao gồm cả câu phức đa dạng — hoàn toàn chính xác. Hiểu điều này giúp giảm áp lực 'phải hoàn hảo' và tập trung đúng chỗ: loại bỏ lỗi HỆ THỐNG (fossilised) và giữ độ chính xác tổng thể cao, thay vì hoảng sợ vì một lỗi lẻ."}],
writing:[{q:"Viết một đoạn thân bài BAND 8 (8-10 câu tiếng Anh) cho đề: 'Some think that governments should invest in space exploration, while others believe the money should be spent on solving problems on Earth. Discuss.' Tập trung Grammatical Range & Accuracy band 8: đa dạng cấu trúc phức (điều kiện, đảo ngữ/câu chẻ, mệnh đề quan hệ rút gọn, bị động, song song, câu phức nhiều tầng) NHƯNG giữ mọi câu chính xác và rõ ràng.",
model:"<b>Bài mẫu:</b> Those who advocate investment in space exploration argue that it drives scientific innovation whose benefits extend far beyond space itself. Satellite technology, developed originally for space missions, now underpins global communication, weather forecasting, and disaster management. Were governments to abandon such research, they would risk forfeiting discoveries that could transform life on Earth. Opponents, however, contend that with millions still lacking food, clean water, and basic healthcare, spending vast sums on distant planets is difficult to justify. This argument is not without merit, for pressing humanitarian needs surely demand immediate attention. Yet the two goals need not be mutually exclusive. Not only can space research generate technologies that directly address earthly problems, but it can also inspire a generation of scientists and engineers. If resources were allocated wisely, humanity could pursue both ambitions simultaneously, reaping the rewards of exploration while alleviating suffering at home.<br><b>Tự kiểm tra:</b> Mệnh đề quan hệ (whose benefits, who advocate)? Rút gọn phân từ (developed originally)? Đảo ngữ điều kiện (Were governments to abandon)? Đảo ngữ nhấn mạnh (Not only can...but also)? Bị động (were allocated)? Song song (food, clean water, and basic healthcare)? Câu điều kiện (If resources were allocated...could pursue)? MỌI câu chính xác và RÕ RÀNG?"}]}
}},
/* ===== BÀI 55 ===== */
{id:"g55",stage:6,title:"Bài 55 · Sửa lỗi 'đóng trần band 7'",
theory:`<h3>1. Vì sao lỗi nhỏ lại 'đóng trần' band?</h3>
<p>Nhiều thí sinh có ý tưởng tốt, từ vựng ổn, nhưng mắc các lỗi nhỏ LẶP ĐI LẶP LẠI. Vì chúng hệ thống (không phải ngẫu nhiên), chúng kéo Accuracy xuống band 7, dù mọi thứ khác tốt. Sửa các lỗi 'hóa thạch' này là cách nhanh nhất để bứt lên band 8.</p>
<h3>2. Lỗi MẠO TỪ (a/an/the/zero) — phổ biến nhất với người Việt</h3>
<table><tr><th>Quy tắc</th><th>Ví dụ</th></tr>
<tr><td>the + so sánh nhất / danh từ xác định</td><td>the best, the government, the environment</td></tr>
<tr><td>a/an + danh từ đếm được số ít, lần đầu nhắc</td><td>a solution, an issue</td></tr>
<tr><td>Zero (không mạo từ) + danh từ không đếm/số nhiều nói chung</td><td>Education is important. Cars cause pollution.</td></tr></table>
<div class="example"><b>SAI:</b> Government should protect environment.<br><b>ĐÚNG:</b> <b>The</b> government should protect <b>the</b> environment.</div>
<h3>3. Lỗi GIỚI TỪ (đi kèm động từ/tính từ/danh từ)</h3>
<div class="example"><b>depend on, consist of, result in, lead to, responsible for, aware of, interested in, an increase in, an impact on, discuss (KHÔNG 'about'), emphasise (KHÔNG 'on')</b></div>
<h3>4. Lỗi SỐ NHIỀU/ÍT & danh từ không đếm được</h3>
<p>Không đếm được (không có số nhiều, đi với động từ số ít): information, advice, research, knowledge, equipment, furniture, money, progress, news.</p>
<div class="example"><b>SAI:</b> many informations, an advice, researches<br><b>ĐÚNG:</b> much information, a piece of advice, research</div>
<h3>5. Lỗi HÒA HỢP CHỦ-VỊ & danh động từ/nguyên mẫu</h3>
<ul>
<li>'The number of X <b>is</b>...' (số ít) vs 'A number of X <b>are</b>...' (số nhiều)</li>
<li>Sau giới từ → V-ing: 'good at <b>solving</b>', 'instead of <b>using</b>'</li>
<li>'look forward to / be used to / be committed to' + V-ing (to là giới từ)</li>
</ul>
<p class="muted">⚠️ Cách tự sửa: dành 2-3 phút cuối bài Writing để RÀ riêng từng loại lỗi (một lượt soát mạo từ, một lượt soát số nhiều/ít, một lượt soát giới từ). Ghi 'nhật ký lỗi' cá nhân — lỗi bạn hay mắc — và soát đúng chúng. Đây là cách hiệu quả nhất để 'khử' lỗi hóa thạch.</p>`,
levels:{
basic:{mcq:[
{q:"Sửa: 'Government should protect ___ environment.'",opts:["Ø ... Ø","The ... the","A ... an","The ... a"],a:1,why:"<b>Đúng: The government... the environment.</b> Cả hai là danh từ xác định → 'the'."},
{q:"'The results ___ in a major discovery.'",opts:["resulted of","resulted in","resulted to","resulted on"],a:1,why:"<b>Đúng: resulted in.</b> 'result in' = dẫn đến. Giới từ cố định."},
{q:"Danh từ nào KHÔNG đếm được (không có số nhiều)?",opts:["car","information","student","idea"],a:1,why:"<b>Đúng: information.</b> Không đếm được → không 'informations', đi với động từ số ít."},
{q:"'She is good at ___ problems.'",opts:["solve","to solve","solving","solved"],a:2,why:"<b>Đúng: solving.</b> Sau giới từ 'at' → V-ing (solving)."},
{q:"Cách hiệu quả nhất để khử lỗi 'hóa thạch':",opts:["Bỏ qua chúng","Ghi nhật ký lỗi cá nhân và rà soát riêng từng loại lỗi ở cuối bài","Viết nhanh hơn","Dùng câu đơn"],a:1,why:"<b>Đúng: B.</b> Biết lỗi mình hay mắc + soát riêng từng loại là cách khử lỗi hệ thống hiệu quả nhất."}],
writing:[{q:"Tìm và sửa lỗi trong 5 câu: (1) Pollution have negative impact on health. (2) I am interested in learn English. (3) He gave me an useful advice. (4) The number of tourist are increasing. (5) We discussed about the problem.",
model:"<b>Đáp án:</b> (1) Pollution <b>has a</b> negative impact on health. (chủ-vị 'pollution has'; mạo từ 'a' + impact) (2) I am interested in <b>learning</b> English. (sau 'in' → V-ing) (3) He gave me <b>a piece of useful advice</b> / some useful advice. (advice không đếm được, không 'an advice') (4) The number of <b>tourists is</b> increasing. (số nhiều 'tourists'; 'the number...is') (5) We discussed the problem. (discuss KHÔNG 'about')<br><b>Tự kiểm tra:</b> Hòa hợp chủ-vị (has, is)? Mạo từ (a impact)? V-ing sau giới từ (learning)? Danh từ không đếm được (advice)? Số nhiều đúng (tourists)? 'discuss' không 'about'?"}]},
mid:{mcq:[
{q:"Sửa: 'A number of students ___ absent today.'",opts:["is","was","are","has"],a:2,why:"<b>Đúng: are.</b> 'A number of' (= nhiều) + số nhiều → are. (Khác 'The number of...is'.)"},
{q:"'This policy will have a significant impact ___ the economy.'",opts:["in","on","to","of"],a:1,why:"<b>Đúng: on.</b> 'an impact on' — giới từ cố định. ('effect on' cũng vậy.)"},
{q:"Tìm câu ĐÚNG:",opts:["He is used to work late.","He is used to working late.","He used to working late.","He is use to work late."],a:1,why:"<b>Đúng: B.</b> 'be used to' + V-ing (working). 'to' là giới từ (ôn Bài 30)."},
{q:"'There was a significant increase ___ sales.'",opts:["of","in","on","to"],a:1,why:"<b>Đúng: in.</b> 'an increase in' — giới từ cố định. ('a decrease in', 'a rise in' cũng vậy.)"},
{q:"Sửa: 'Each student ___ their own laptop.'",opts:["have","has","are having","were"],a:1,why:"<b>Đúng: has.</b> 'Each student' = số ít → has. Lỗi hòa hợp chủ-vị phổ biến."}],
writing:[{q:"Viết một đoạn (6-7 câu tiếng Anh) về một chủ đề, sau đó TỰ RÀ và đánh dấu: bạn đã kiểm soát đúng mạo từ, giới từ, số nhiều/ít, hòa hợp chủ-vị và V-ing sau giới từ ở đâu. Chủ đề gợi ý: tác động của mạng xã hội.",
model:"<b>Bài mẫu (đã kiểm soát lỗi):</b> Social media has had a profound impact on the way people communicate. The rise in its popularity has brought both benefits and challenges. On the one hand, it allows users to stay connected with friends and to access a vast amount of information instantly. On the other hand, an increasing number of studies suggest that excessive use can lead to anxiety and isolation. Many young people, in particular, are becoming dependent on these platforms for validation. Governments and schools should therefore focus on raising awareness of the risks associated with social media.<br><b>Tự kiểm tra:</b> Mạo từ đúng (a profound impact, The rise, an increasing number)? Giới từ đúng (impact on, rise in, dependent on, associated with, awareness of)? V-ing sau giới từ (stay connected... to access — nguyên mẫu sau 'allows to'; raising awareness sau 'focus on')? Hòa hợp chủ-vị (has had, an increasing number...suggest)? Số nhiều/ít (studies, platforms)? Không đếm được (information, awareness)?"}]},
adv:{mcq:[
{q:"Vì sao lỗi 'hóa thạch' nguy hiểm hơn lỗi ngẫu nhiên đối với band?",opts:["Không khác nhau","Vì chúng LẶP LẠI thành hệ thống trong bài, khiến lỗi trở nên 'systematic' — điều band 8 không cho phép — trong khi lỗi ngẫu nhiên hiếm thì band 8 vẫn chấp nhận","Vì chúng khó sửa hơn","Vì giám khảo ghét chúng"],a:1,why:"<b>Đúng: B.</b> Band 8 cho phép lỗi 'occasional' (thi thoảng, ngẫu nhiên). Nhưng lỗi hóa thạch (mạo từ, giới từ, số nhiều/ít) LẶP nhiều lần trong một bài → trở thành 'systematic error', đúng thứ band 8 loại trừ. Một lỗi giới từ lẻ không sao; nhưng sai giới từ 8 lần trong bài cho thấy một lỗ hổng hệ thống. Vì thế khử lỗi hóa thạch (giảm TẦN SUẤT của một loại lỗi) tác động lên band mạnh hơn sửa một lỗi lẻ."},
{q:"Chiến lược tự-soát-lỗi (self-editing) hiệu quả nhất trong bài thi là:",opts:["Đọc lướt một lần","Rà nhiều LƯỢT, mỗi lượt soát MỘT loại lỗi (một lượt mạo từ, một lượt số nhiều/ít, một lượt giới từ) — vì soát tất cả cùng lúc dễ bỏ sót","Nhờ người khác","Viết lại cả bài"],a:1,why:"<b>Đúng: B.</b> Soát 'tất cả lỗi cùng lúc' không hiệu quả vì não không thể chú ý mọi thứ đồng thời — dễ bỏ sót. Kỹ thuật chuyên nghiệp: soát THEO LƯỢT, mỗi lượt tập trung MỘT loại lỗi mà bạn hay mắc (dựa trên nhật ký lỗi cá nhân). Ví dụ: lượt 1 chỉ kiểm mạo từ trước mọi danh từ; lượt 2 chỉ kiểm số nhiều/ít; lượt 3 chỉ kiểm giới từ đi kèm động từ. Với 2-3 phút cuối, soát 2-3 loại lỗi 'ruột' của bạn có tác động lớn nhất."},
{q:"Mạo từ 'the' hay bị THIẾU nhất trong trường hợp nào (với người Việt)?",opts:["Trước tên riêng","Trước danh từ XÁC ĐỊNH cụ thể (the government, the environment, the internet) và trước so sánh nhất (the best) — vì tiếng Việt không có mạo từ","Trước danh từ số nhiều chung chung","Không bao giờ thiếu"],a:1,why:"<b>Đúng: B.</b> Tiếng Việt không có hệ mạo từ, nên người Việt thường THIẾU 'the' ở nơi tiếng Anh bắt buộc: trước danh từ xác định/duy nhất (the government, the environment, the economy, the internet, the sun), trước so sánh nhất (the best, the most important), và trong các cụm cố định (the majority of, on the other hand, in the long run). Đây là lỗi hóa thạch số một. Ngược lại, cũng cần tránh THỪA 'the' trước danh từ số nhiều/không đếm nói CHUNG (Education is... KHÔNG 'The education is...' khi nói giáo dục nói chung). Soát mạo từ nên là lượt rà đầu tiên."},
{q:"Một thí sinh band 7 muốn lên 8 nên ưu tiên điều gì trước?",opts:["Học thêm thật nhiều cấu trúc phức mới","CHẨN ĐOÁN và loại bỏ các lỗi hóa thạch hệ thống của bản thân (thường là mạo từ/giới từ/số nhiều-ít) trước, vì chúng đang trực tiếp đóng trần accuracy","Học từ vựng hiếm","Viết dài hơn"],a:1,why:"<b>Đúng: B.</b> Nếu một thí sinh đã có range tốt (dùng được cấu trúc phức) nhưng kẹt ở band 7, thủ phạm thường là ACCURACY bị kéo xuống bởi lỗi hóa thạch hệ thống. Thêm cấu trúc phức mới không giúp — thậm chí thêm lỗi. Ưu tiên đúng: (1) chẩn đoán lỗi 'ruột' của mình (qua bài được chấm/nhật ký lỗi), (2) luyện khử chúng đến khi tự động đúng, (3) rèn thói quen tự-soát theo lượt. Loại bỏ lỗi hệ thống nâng accuracy — con đường ngắn nhất từ 7 lên 8 với người đã có range."},
{q:"Về 'nhật ký lỗi' (error log), giá trị lớn nhất của nó là:",opts:["Để nộp cho giám khảo","Giúp bạn NHẬN DIỆN mẫu lỗi lặp lại của riêng mình, biến việc sửa lỗi từ 'mò mẫm' thành có mục tiêu — bạn biết chính xác cần soát gì","Để học thuộc","Không có giá trị thực"],a:1,why:"<b>Đúng: B.</b> Nhật ký lỗi (ghi lại mọi lỗi được chỉ ra trong các bài viết/nói của bạn, phân loại: mạo từ, giới từ, thì, collocation...) biến việc cải thiện từ chung chung thành CÓ MỤC TIÊU. Sau vài tuần, bạn thấy rõ 3-4 loại lỗi chiếm phần lớn — đó chính là 'danh sách soát' cá nhân cho bài thi và trọng tâm luyện tập. Nó cũng tạo nhận thức: khi biết mình hay quên 'the', bạn bắt đầu tự bắt lỗi ngay khi viết. Đây là công cụ tự-cải-thiện mạnh nhất cho giai đoạn 7→8."}],
writing:[{q:"Viết một đoạn (8-10 câu tiếng Anh) cho một đề Task 2 bạn chọn, rồi TỰ BIÊN TẬP: bên dưới đoạn, liệt kê 4 loại lỗi hóa thạch (mạo từ, giới từ, số nhiều/ít, hòa hợp chủ-vị) và chỉ ra bạn đã kiểm soát đúng từng loại ở đâu trong đoạn. Mục tiêu: đoạn hoàn toàn không có lỗi hóa thạch.",
model:"<b>Bài mẫu:</b> The rapid growth of urban populations has placed enormous pressure on the infrastructure of many cities. As the number of residents continues to rise, governments are struggling to provide adequate housing, transport, and public services. One of the most serious consequences of this trend is the increase in traffic congestion, which leads to both air pollution and a decline in quality of life. If authorities invested more heavily in efficient public transport, they could reduce society's dependence on private cars. In addition, careful urban planning is essential for ensuring that growth remains sustainable. Governments that fail to address these challenges risk creating cities in which millions of people suffer from overcrowding and inadequate resources. Ultimately, tackling the problems associated with urbanisation requires a long-term commitment to investment and thoughtful policy.<br><br><i>Tự biên tập:</i><br>• Mạo từ: 'The rapid growth', 'the infrastructure', 'the number of residents', 'the increase in traffic congestion', 'the problems' — 'the' trước danh từ xác định; 'a decline', 'a long-term commitment' — 'a' trước danh từ đếm được số ít lần đầu.<br>• Giới từ: 'pressure on', 'consequences of', 'increase in', 'dependence on', 'essential for', 'associated with', 'commitment to' — đều đúng cặp cố định.<br>• Số nhiều/ít: 'populations', 'cities', 'residents', 'services', 'cars', 'millions of people' đúng số nhiều; 'housing', 'transport', 'pollution', 'investment' không đếm được (không -s).<br>• Hòa hợp chủ-vị: 'growth...has placed', 'the number of residents...rise' (the number... nhưng chủ ngữ ngầm ở đây là residents continues — 'the number of residents continues'), 'governments are struggling', 'careful urban planning is essential'.<br><b>Tự kiểm tra:</b> Đoạn của bạn có kiểm soát đúng cả 4 loại? Có tự chỉ ra được từng loại kiểm soát ở đâu? Nếu tìm thấy lỗi khi tự soát, đã sửa chưa?"}]}
}},
/* ===== BÀI 56 ===== */
{id:"g56",stage:6,title:"Bài 56 · Speaking band 8 — trôi chảy, mạch lạc & phát âm",
theory:`<h3>1. Fluency & Coherence band 8</h3>
<p>Band 7: nói khá dài không cần cố gắng đáng kể, một số do dự/lặp/tự sửa. Band 8: nói <b>TRÔI CHẢY, ít do dự</b>; do dự (nếu có) là để tìm NỘI DUNG chứ không phải tìm từ/ngữ pháp; phát triển chủ đề mạch lạc, đầy đủ, phù hợp.</p>
<h3>2. Bí quyết fluency band 8: nghĩ bằng Ý, không dịch</h3>
<p>Nguồn ngập ngừng lớn nhất là DỊCH trong đầu (Việt → Anh). Band 8 cần nghĩ TRỰC TIẾP bằng tiếng Anh, để năng lượng dồn vào NỘI DUNG (nói gì) chứ không phải ngôn ngữ (nói thế nào). Luyện: nói về chủ đề quen thuộc hằng ngày đến khi tự động.</p>
<h3>3. Discourse markers — 'chất bôi trơn' của lời nói tự nhiên</h3>
<p>Người nói band cao dùng các dấu hiệu diễn ngôn tự nhiên để nối ý và 'câu giờ' mượt mà:</p>
<div class="example"><b>Mở/dẫn:</b> Well, actually, you see, the thing is...<br><b>Nối ý:</b> and on top of that, having said that, that being said, which reminds me...<br><b>Câu giờ tự nhiên:</b> That's a really interesting question, let me think for a second... / I suppose it depends...<br><b>Nhấn:</b> to be honest, in fact, more importantly...</div>
<h3>4. Phát âm band 8 — 4 đặc điểm dùng HIỆU QUẢ</h3>
<ul>
<li><b>Trọng âm từ chính xác</b> (đặc biệt từ dài: com-FOR-table, ne-CE-ssary).</li>
<li><b>Trọng âm câu & nhịp điệu:</b> nhấn từ nội dung, lướt từ chức năng — tạo 'nhạc' tự nhiên.</li>
<li><b>Ngữ điệu (intonation):</b> lên xuống để thể hiện thái độ, nghi vấn, nhấn mạnh, liệt kê.</li>
<li><b>Nối âm & âm yếu (weak forms):</b> 'want to' → 'wanna' (tự nhiên), 'a' → /ə/, nối phụ âm-nguyên âm.</li>
</ul>
<h3>5. Chunking — nói theo CỤM Ý, không từng từ</h3>
<p>Người nói tự nhiên chia lời thành các cụm ý (thought groups), nghỉ ngắn giữa các cụm: 'When I was younger / I used to think / that success was all about money.' Chunking giúp lời nói dễ hiểu, có nhịp và nghe rất tự nhiên.</p>
<p class="muted">⚠️ Band 8 KHÔNG phải nói nhanh hay giọng Tây. Đó là nói TỰ NHIÊN, MẠCH LẠC, RÕ RÀNG với nhịp điệu và ngữ điệu tốt, năng lượng dồn vào ý tưởng. Ngập ngừng để nghĩ NỘI DUNG là bình thường (người bản ngữ cũng vậy); ngập ngừng vì bí TỪ mới là vấn đề.</p>`,
levels:{
basic:{mcq:[
{q:"Fluency band 8: do dự (nếu có) chủ yếu để:",opts:["Tìm từ/ngữ pháp","Tìm NỘI DUNG/ý tưởng (như người bản ngữ cân nhắc)","Nghỉ mệt","Nhớ bài học thuộc"],a:1,why:"<b>Đúng: B.</b> Band 8: do dự để nghĩ Ý (nói gì), không phải vật lộn với từ/ngữ pháp (nói thế nào)."},
{q:"Nguồn ngập ngừng LỚN nhất cần khắc phục là:",opts:["Nói to","DỊCH trong đầu (Việt→Anh) thay vì nghĩ trực tiếp bằng tiếng Anh","Dùng discourse markers","Nghỉ giữa cụm ý"],a:1,why:"<b>Đúng: B.</b> Dịch trong đầu gây chậm và ngập ngừng. Band 8 cần nghĩ trực tiếp bằng tiếng Anh."},
