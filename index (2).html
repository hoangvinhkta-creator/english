/* ============ BÀI 7 ============ */
{id:"g7",title:"Bài 7 · Danh từ số nhiều (thêm s/es) & danh từ không đếm được",
theory:`<h3>1. Vì sao quan trọng?</h3>
<p>Số nhiều quyết định động từ chia thế nào (is/are, works/work). Sai số nhiều → sai cả câu. Đây cũng là lỗi bị trừ điểm âm thầm suốt Writing.</p>
<h3>2. Quy tắc thêm s/es (giống thêm s cho động từ)</h3>
<table><tr><th>Trường hợp</th><th>Cách</th><th>Ví dụ</th></tr>
<tr><td>Đa số</td><td>+ s</td><td>book → books, phone → phones</td></tr>
<tr><td>Tận cùng s, x, ch, sh, o</td><td>+ es</td><td>box → boxes, watch → watches, tomato → tomatoes</td></tr>
<tr><td>Phụ âm + y</td><td>y → ies</td><td>city → cities, company → companies</td></tr>
<tr><td>Nguyên âm + y</td><td>+ s</td><td>day → days, boy → boys</td></tr>
<tr><td>Tận cùng f/fe</td><td>f → ves</td><td>knife → knives, leaf → leaves</td></tr></table>
<h3>3. Số nhiều BẤT QUY TẮC (phải thuộc lòng)</h3>
<table><tr><th>Số ít</th><th>Số nhiều</th></tr>
<tr><td>man (đàn ông)</td><td>men</td></tr><tr><td>woman (phụ nữ)</td><td>women</td></tr>
<tr><td>child (đứa trẻ)</td><td>children</td></tr><tr><td>person (người)</td><td>people</td></tr>
<tr><td>foot (bàn chân)</td><td>feet</td></tr><tr><td>tooth (răng)</td><td>teeth</td></tr>
<tr><td>fish / sheep</td><td>fish / sheep (không đổi)</td></tr></table>
<h3>4. Danh từ KHÔNG đếm được (uncountable)</h3>
<p>Một số thứ không đếm từng cái được → KHÔNG thêm s, luôn coi là số ít (dùng is):</p>
<p><b>water, rice, money, information, advice, furniture, news, knowledge, work, coffee, milk.</b></p>
<div class="example"><b>Đúng:</b> I need some information. / <b>Sai:</b> I need some informations.<br><b>Đúng:</b> The furniture is new. / <b>Sai:</b> The furnitures are new.</div>
<p class="muted">⚠️ 'information, advice, furniture, news' là những từ người Việt hay thêm 's' nhất vì tiếng Việt đếm được. Nhớ: KHÔNG có 'informations', 'advices', 'furnitures'.</p>`,
levels:{
basic:{mcq:[
{q:"Số nhiều của 'box' là:",opts:["boxs","boxes","boxies","box"],a:1,why:"<b>Đúng: boxes.</b> Tận cùng 'x' → thêm 'es'. 'boxs' sai vì sau x phải es."},
{q:"Số nhiều của 'city' là:",opts:["citys","cities","cityes","city"],a:1,why:"<b>Đúng: cities.</b> Phụ âm 't' + 'y' → đổi y thành 'ies' = cities."},
{q:"Số nhiều của 'child' là:",opts:["childs","childes","children","child"],a:2,why:"<b>Đúng: children.</b> Bất quy tắc — phải thuộc lòng. Không có 'childs'."},
{q:"Câu nào ĐÚNG?",opts:["I have three informations.","I have some information.","I have some informations.","I have a information."],a:1,why:"<b>Đúng: B.</b> 'information' KHÔNG đếm được → không thêm s, không dùng 'a/three'. Dùng 'some information'."},
{q:"There are five ___ in my family.",opts:["persons","people","peoples","person"],a:1,why:"<b>Đúng: people.</b> Số nhiều của 'person' là 'people' (bất quy tắc). 'persons' rất hiếm dùng; 'peoples' chỉ nghĩa 'các dân tộc'."}],
writing:[{q:"Viết số nhiều đúng của 10 từ: book, watch, company, knife, man, tomato, day, woman, foot, party. Sau đó viết 1 câu với 3 trong số đó.",
model:"<b>Đáp án:</b> books, watches, companies, knives, men, tomatoes, days, women, feet, parties.<br>Câu ví dụ: Two women are buying watches for three days.<br><b>Tự kiểm tra:</b> watch→es (sau ch), company→ies (phụ âm+y), knife→ves, man→men & woman→women (bất quy tắc), tomato→es (sau o), day→s (nguyên âm+y giữ nguyên), foot→feet."}]},
mid:{mcq:[
{q:"Chọn câu ĐÚNG:",opts:["The furnitures in the store are new.","The furniture in the store is new.","The furniture in the store are new.","The furnitures in the store is new."],a:1,why:"<b>Đúng: B.</b> 'furniture' không đếm được → không s, coi số ít → 'is'. Cả hai điều kiện phải đúng: không thêm s VÀ dùng is."},
{q:"My ___ are hurting after walking all day.",opts:["foots","feets","feet","foot"],a:2,why:"<b>Đúng: feet.</b> Số nhiều bất quy tắc của foot = feet (không 'foots' hay 'feets')."},
{q:"'The news ___ very good today.'",opts:["are","is","were","have"],a:1,why:"<b>Đúng: is.</b> 'news' có 's' nhưng là danh từ KHÔNG đếm được, luôn số ít → is. Bẫy thị giác kinh điển."},
{q:"How many ___ work in your department?",opts:["peoples","person","people","persons"],a:2,why:"<b>Đúng: people.</b> 'How many' cần danh từ đếm được số nhiều → people. Động từ 'work' (không s) cũng xác nhận chủ ngữ số nhiều."},
{q:"She gave me some good ___ about my career.",opts:["advices","advice","advise","an advice"],a:1,why:"<b>Đúng: advice.</b> 'advice' không đếm được → không s, không 'an'. ('advise' là ĐỘNG TỪ, viết khác.)"}],
writing:[{q:"Viết đoạn 5 câu về cửa hàng của bạn, dùng ít nhất 4 danh từ số nhiều (đếm được) và 2 danh từ không đếm được (money, information, furniture...).",
model:"<b>Bài mẫu:</b> Our store sells many products, including televisions, refrigerators, and washing machines. We have three salespeople and two technicians. Customers often ask for information about warranties. We also sell some furniture, like sofas and tables. The store makes good money during holidays.<br><b>Tự kiểm tra:</b> Danh từ đếm được số nhiều (products, televisions, salespeople) có s/bất quy tắc đúng? Danh từ không đếm (information, furniture, money) KHÔNG có s?"}]},
adv:{mcq:[
{q:"'The data ___ collected from 500 participants.'",opts:["was","were","is being","are being"],a:1,why:"<b>Đúng: were.</b> Trong văn phong học thuật, 'data' là số NHIỀU (số ít: datum) → were/are. Đây là quy ước band 7+ trong IELTS Writing khoa học. (Văn nói hằng ngày dần chấp nhận 'data is', nhưng academic writing nên dùng số nhiều.)"},
{q:"Chọn cụm SAI:",opts:["a piece of advice","two pieces of furniture","three luggages","a glass of water"],a:2,why:"<b>Đúng (sai): three luggages.</b> 'luggage' không đếm được → không thêm s. Muốn đếm phải dùng 'pieces of luggage'. Các cụm 'a piece of advice', 'pieces of furniture' là cách đếm danh từ không đếm được đúng chuẩn."},
{q:"'A number of students ___ absent, but the number of absentees ___ small.'",opts:["is / are","are / is","is / is","are / are"],a:1,why:"<b>Đúng: are / is.</b> 'A number of + danh từ số nhiều' = nhiều → are. 'The number of...' = con số (bản thân nó) → số ít → is. Cặp cấu trúc dễ nhầm, hay ra ở band cao."},
{q:"Trong Writing Task 1, cách diễn đạt nào ĐÚNG?",opts:["The amount of people increased.","The number of people increased.","The number of people increase.","The amounts of people increased."],a:1,why:"<b>Đúng: B.</b> 'people' đếm được → dùng 'number of' (không phải 'amount of', vốn dành cho danh từ KHÔNG đếm được như money, water). 'increased' đúng số ít theo 'The number'."},
{q:"Câu nào không có lỗi danh từ?",opts:["I bought two new furnitures and some equipments.","The research provides useful evidences.","Staff are required to wear uniforms.","She has many knowledges about electronics."],a:2,why:"<b>Đúng: C.</b> 'Staff' (tập thể nhân viên) đi với 'are' hợp lệ; 'uniforms' đếm được → có s. A sai (furniture, equipment không đếm được); B sai ('evidence' không đếm); D sai ('knowledge' không đếm). Ba từ evidence/equipment/knowledge là bẫy phổ biến."}],
writing:[{q:"Viết đoạn 6–7 câu (kiểu mô tả xu hướng IELTS) dùng chính xác cả danh từ đếm được số nhiều lẫn không đếm được, gồm ít nhất: number of, amount of, và 2 danh từ không đếm được học thuật (information, research, equipment, evidence).",
model:"<b>Bài mẫu:</b> In recent years, the number of online shoppers has risen sharply. A growing amount of information about products is now available on the internet. Research shows that customers rely heavily on reviews before buying electronics. Many stores have invested in new equipment to process orders faster. However, there is little evidence that traditional shops will disappear completely. Overall, both the number of customers and the amount of data collected continue to grow.<br><b>Tự kiểm tra:</b> 'number of' + đếm được số nhiều? 'amount of' + không đếm? information/research/equipment/evidence KHÔNG có s và đi với động từ số ít?"}]}
}},
/* ============ BÀI 8 ============ */
{id:"g8",title:"Bài 8 · Mạo từ a / an / the",
theory:`<h3>1. a / an — "một" (dùng cho danh từ đếm được SỐ ÍT, lần đầu nhắc đến)</h3>
<p><b>a</b> đứng trước từ bắt đầu bằng PHỤ ÂM: a book, a car, a phone.<br><b>an</b> đứng trước từ bắt đầu bằng NGUYÊN ÂM (a, e, i, o, u): an apple, an hour, an engineer.</p>
<p class="muted">Quan trọng: xét ÂM đọc, không phải chữ viết. 'hour' viết bằng h nhưng đọc /aʊə/ (âm nguyên âm) → an hour. 'university' viết u nhưng đọc /juː/ (âm 'y') → a university.</p>
<h3>2. the — "cái đó cụ thể" (cả người nói và người nghe đều biết đang nói về cái nào)</h3>
<table><tr><th>Dùng 'a/an' khi</th><th>Dùng 'the' khi</th></tr>
<tr><td>Lần đầu nhắc đến</td><td>Đã nhắc rồi, nhắc lại</td></tr>
<tr><td>I bought <b>a</b> phone.</td><td><b>The</b> phone is great.</td></tr>
<tr><td>Bất kỳ cái nào</td><td>Cái duy nhất / cụ thể</td></tr></table>
<div class="example"><b>I saw a dog. The dog was barking.</b><br><span class="vi">Lần đầu: 'a dog' (một con chó nào đó). Lần hai: 'the dog' (chính con chó vừa nhắc).</span></div>
<h3>3. the với những thứ DUY NHẤT</h3>
<p>the sun, the moon, the world, the internet, the same — vì chỉ có một.</p>
<h3>4. KHÔNG dùng mạo từ khi</h3>
<ul>
<li>Nói chung về danh từ số nhiều: <b>Dogs</b> are loyal. (Chó thì trung thành — nói chung mọi con chó)</li>
<li>Danh từ không đếm được nói chung: <b>Water</b> is essential.</li>
<li>Tên riêng, tên người, hầu hết tên quốc gia/thành phố: Vietnam, Ha Noi, Hiệp.</li>
</ul>
<p class="muted">⚠️ Đây là điểm KHÓ nhất với người Việt vì tiếng Việt không có mạo từ. Đừng nản — quy tắc cơ bản là: đếm được + số ít + lần đầu → a/an; cụ thể/đã biết → the; nói chung số nhiều → không mạo từ.</p>`,
levels:{
basic:{mcq:[
{q:"I need ___ pen to write.",opts:["a","an","the","(không)"],a:0,why:"<b>Đúng: a.</b> 'pen' bắt đầu bằng phụ âm /p/, đếm được số ít, nhắc lần đầu bất kỳ cây bút nào → a."},
{q:"She is ___ engineer.",opts:["a","an","the","(không)"],a:1,why:"<b>Đúng: an.</b> 'engineer' bắt đầu bằng nguyên âm /e/ → an. Nghề nghiệp số ít cần a/an."},
{q:"Look at ___ moon tonight!",opts:["a","an","the","(không)"],a:2,why:"<b>Đúng: the.</b> Mặt trăng là DUY NHẤT → the moon. Những thứ chỉ có một luôn dùng the."},
{q:"I bought a laptop. ___ laptop is very fast.",opts:["A","An","The","(không)"],a:2,why:"<b>Đúng: The.</b> Lần đầu 'a laptop', lần hai nhắc lại chính nó → The laptop. Người nghe giờ đã biết cái nào."},
{q:"___ are popular pets. (Chó là thú cưng phổ biến — nói chung)",opts:["A dog","The dog","Dogs","The dogs"],a:2,why:"<b>Đúng: Dogs.</b> Nói CHUNG về loài chó → danh từ số nhiều KHÔNG mạo từ. 'The dogs' ám chỉ những con chó cụ thể nào đó."}],
writing:[{q:"Điền a/an/the/(không) và viết lại 4 câu: (1) I have ___ car. ___ car is red. (2) ___ sun is hot. (3) She is ___ honest person. (4) ___ books are expensive (nói chung).",
model:"<b>Đáp án:</b> (1) I have a car. The car is red. (lần đầu a, nhắc lại the) (2) The sun is hot. (duy nhất) (3) She is an honest person. ('honest' đọc /ɒnɪst/, h câm → âm nguyên âm → an) (4) Books are expensive. (nói chung số nhiều → không mạo từ)<br><b>Tự kiểm tra:</b> Câu 3 bạn có bị 'a honest' không? Nhớ xét ÂM: h câm → an."}]},
mid:{mcq:[
{q:"He studies at ___ university in Ha Noi.",opts:["a","an","the","(không)"],a:0,why:"<b>Đúng: a.</b> 'university' viết bằng 'u' nhưng ĐỌC /juːnɪ.../ bắt đầu bằng âm 'y' (phụ âm) → a university. Bẫy chữ viết vs âm đọc."},
{q:"It takes ___ hour to get there.",opts:["a","an","the","(không)"],a:1,why:"<b>Đúng: an.</b> 'hour' có h CÂM, đọc /aʊə/ bắt đầu bằng nguyên âm → an hour. Ngược với 'university'."},
{q:"___ information you gave me was helpful.",opts:["A","An","The","(không)"],a:2,why:"<b>Đúng: The.</b> Dù 'information' không đếm được (không dùng a/an), vẫn dùng 'the' khi nói về thông tin CỤ THỂ đã được đưa. Không đếm được vẫn có thể đi với the."},
{q:"Chọn câu ĐÚNG:",opts:["Money is important in the life.","Money is important in life.","The money is important in a life.","A money is important in life."],a:1,why:"<b>Đúng: B.</b> 'Money' (không đếm, nói chung) và 'life' (nói chung) đều KHÔNG mạo từ. 'in life' = trong cuộc sống nói chung là cụm cố định. A thừa 'the'; C, D sai với danh từ không đếm."},
{q:"My father works as ___ manager. (một người quản lý — nghề nghiệp, nhắc lần đầu)",opts:["a","an","the","(không)"],a:0,why:"<b>Đúng: a.</b> 'manager' bắt đầu bằng phụ âm /m/, là nghề nghiệp đếm được số ít nhắc lần đầu → a. Quy tắc: nói nghề của ai đó luôn cần a/an (He is a doctor, She is an engineer)."},
],
writing:[{q:"Viết đoạn 6 câu kể về một lần mua sắm: giới thiệu món đồ (a/an lần đầu), nhắc lại nó (the), và 1 câu nói chung về loại sản phẩm đó (không mạo từ số nhiều).",
model:"<b>Bài mẫu:</b> Last week, I bought a new television. The television has a huge screen and excellent sound. I also got a soundbar to go with it. The soundbar was on sale, so I saved some money. In general, televisions are getting cheaper every year. I think good electronics are worth the investment.<br><b>Tự kiểm tra:</b> Lần đầu dùng a (a television, a soundbar)? Nhắc lại dùng the? Câu nói chung 'televisions/electronics' số nhiều không mạo từ?"}]},
adv:{mcq:[
{q:"'___ rich should help ___ poor.' (Người giàu nên giúp người nghèo)",opts:["A / a","The / the","(không) / (không)","The / a"],a:1,why:"<b>Đúng: The / the.</b> 'the + tính từ' = cả một NHÓM người: the rich (những người giàu), the poor, the elderly, the unemployed. Cấu trúc học thuật hữu ích cho Writing xã hội."},
{q:"'She plays ___ piano beautifully, and she wants to be ___ professional musician.'",opts:["the / a","a / the","the / the","a / a"],a:0,why:"<b>Đúng: the / a.</b> Nhạc cụ dùng 'the': play the piano/guitar/violin. Nghề nghiệp số ít lần đầu: a musician. Hai quy tắc khác nhau trong một câu."},
{q:"Câu nào ĐÚNG về mạo từ trong văn học thuật?",opts:["The nature is beautiful.","Nature is beautiful.","A nature is beautiful.","The natures are beautiful."],a:1,why:"<b>Đúng: B.</b> 'Nature' (thiên nhiên nói chung, khái niệm trừu tượng) KHÔNG mạo từ. 'The nature' chỉ dùng khi nghĩa 'bản chất của cái gì' (the nature of the problem). Lỗi 'the nature is beautiful' rất phổ biến."},
{q:"'___ number of tourists visiting ___ Vietnam has increased.'",opts:["A / the","The / (không)","The / the","A / (không)"],a:1,why:"<b>Đúng: The / (không).</b> 'The number of' (cụm cố định, dùng the). Tên quốc gia 'Vietnam' KHÔNG mạo từ (trừ vài ngoại lệ như the USA, the UK, the Philippines). Kết hợp hai quy tắc."},
{q:"Chọn câu KHÔNG có lỗi mạo từ:",opts:["I go to the work by the bus.","Internet has changed a society.","The unemployment is a serious problem in many countries.","The government should invest more in education and healthcare."],a:3,why:"<b>Đúng: D.</b> 'The government' (cụ thể, dùng the) + 'education/healthcare' (khái niệm chung, không mạo từ) — chuẩn. A thừa the (go to work, by bus là cụm cố định không mạo từ); B thiếu the ('The internet') và thừa a; C thừa the ('Unemployment' nói chung không mạo từ)."}],
writing:[{q:"Viết đoạn văn nghị luận ngắn 7–8 câu về một vấn đề xã hội (giáo dục, môi trường, hoặc công nghệ), chú ý dùng mạo từ chuẩn học thuật: khái niệm chung (không mạo từ), nhóm người (the + adj), danh từ cụ thể (the), cụm 'the number of'.",
model:"<b>Bài mẫu:</b> Education plays a vital role in the development of any country. The government should ensure that the poor have equal access to good schools. In recent years, the number of students attending university has risen significantly. However, technology is changing the way people learn. The internet now allows students to study online from home. In my opinion, both traditional schools and online platforms are important. Society benefits when knowledge is available to everyone.<br><b>Tự kiểm tra:</b> Education/technology/society/knowledge (khái niệm chung) → không mạo từ? the government/the internet/the poor → the? 'the number of' đúng? Không thừa 'the' trước khái niệm trừu tượng?"}]}
}}
);
LESSONS.push(
/* ============ BÀI 9 ============ */
{id:"g9",title:"Bài 9 · There is / There are (có...)",
theory:`<h3>1. Dùng để nói "CÓ cái gì đó ở đâu đó"</h3>
<p>Tiếng Việt: "CÓ một cái tivi trong phòng". Tiếng Anh dùng cấu trúc <b>There is / There are</b>.</p>
<div class="formula"><b>There is</b> + danh từ SỐ ÍT / không đếm được<br><b>There are</b> + danh từ SỐ NHIỀU</div>
<table><tr><th>Câu</th><th>Nghĩa</th></tr>
<tr><td>There is a TV in the room.</td><td>Có một cái tivi trong phòng.</td></tr>
<tr><td>There are three shops on this street.</td><td>Có ba cửa hàng trên phố này.</td></tr>
<tr><td>There is some water in the bottle.</td><td>Có một ít nước trong chai. (không đếm → is)</td></tr></table>
<p class="muted">Lưu ý: 'There' ở đây KHÔNG có nghĩa 'ở đó'. Nó chỉ là từ mở đầu cấu trúc. Nghĩa 'có' nằm ở 'is/are'.</p>
<h3>2. Phủ định & câu hỏi</h3>
<div class="example"><b>Phủ định:</b> There isn't a lift. (Không có thang máy.) / There aren't any chairs. (Không có cái ghế nào.)<br><b>Câu hỏi:</b> Is there a bank near here? — Yes, there is. / No, there isn't.<br>Are there any restaurants? — Yes, there are. / No, there aren't.</div>
<h3>3. some / any đi kèm</h3>
<ul>
<li><b>some</b> dùng trong câu khẳng định: There are some books.</li>
<li><b>any</b> dùng trong câu phủ định và câu hỏi: There aren't any books. / Are there any books?</li>
</ul>
<h3>4. Chia theo danh từ ĐẦU TIÊN sau đó</h3>
<div class="example"><b>There is a table and four chairs.</b><br><span class="vi">Danh từ ngay sau 'There' là 'a table' (số ít) → dùng 'is', dù phía sau có 'four chairs'.</span></div>`,
levels:{
basic:{mcq:[
{q:"___ a book on the table.",opts:["There is","There are","There am","Have"],a:0,why:"<b>Đúng: There is.</b> 'a book' số ít → There is. Tiếng Anh không nói 'Have a book on the table' để diễn tả 'có'."},
{q:"___ five people in the meeting.",opts:["There is","There are","There be","It is"],a:1,why:"<b>Đúng: There are.</b> 'five people' số nhiều → There are."},
{q:"There ___ some milk in the fridge.",opts:["is","are","am","be"],a:0,why:"<b>Đúng: is.</b> 'milk' không đếm được → luôn số ít → There is."},
{q:"Câu phủ định: 'There ___ any chairs here.'",opts:["isn't","aren't","not","doesn't"],a:1,why:"<b>Đúng: aren't.</b> 'chairs' số nhiều → aren't. Và dùng 'any' trong câu phủ định."},
{q:"'___ there a pharmacy near here?'",opts:["Is","Are","Do","Does"],a:0,why:"<b>Đúng: Is.</b> 'a pharmacy' số ít → Is there...? Câu hỏi đảo is lên trước there."}],
writing:[{q:"Viết 5 câu mô tả những gì có trong phòng làm việc của bạn (dùng cả There is và There are, ít nhất 1 câu phủ định).",
model:"<b>Bài mẫu:</b> There is a large desk in my office. There are two computers on it. There is some paper in the drawer. There are many products on the shelves. There isn't a window, so it can feel a bit dark.<br><b>Tự kiểm tra:</b> Số ít/không đếm → There is? Số nhiều → There are? Câu phủ định dùng isn't/aren't + any?"}]},
mid:{mcq:[
{q:"There ___ a sofa and two armchairs in the living room.",opts:["is","are","be","have"],a:0,why:"<b>Đúng: is.</b> Chia theo danh từ ĐẦU TIÊN 'a sofa' (số ít) → is, dù sau đó có 'two armchairs'. Quy tắc quan trọng."},
{q:"'Are there ___ good restaurants around here?'",opts:["some","any","a","much"],a:1,why:"<b>Đúng: any.</b> Câu HỎI dùng 'any', không dùng 'some'. 'a' sai vì 'restaurants' số nhiều."},
{q:"There ___ a lot of information on this website.",opts:["is","are","be","were"],a:0,why:"<b>Đúng: is.</b> 'information' không đếm được → is, dù 'a lot of' nghe như nhiều. Chia theo tính chất danh từ, không theo 'a lot'."},
{q:"Chọn câu ĐÚNG:",opts:["There are a problem with the delivery.","There is a problem with the delivery.","There have a problem with the delivery.","It has a problem with the delivery."],a:1,why:"<b>Đúng: B.</b> 'a problem' số ít → There is. Người Việt hay dùng 'There have' (dịch từ 'có') — SAI, phải dùng There is/are."},
{q:"'How many stores ___ there in the mall?'",opts:["is","are","do","does"],a:1,why:"<b>Đúng: are.</b> 'How many stores' số nhiều → are there. Câu hỏi số lượng với danh từ đếm được số nhiều."}],
writing:[{q:"Viết đoạn 6 câu mô tả khu vực quanh cửa hàng/nhà bạn (có gì gần đó): ngân hàng, quán ăn, trường học... Dùng đa dạng There is/are, phủ định, và some/any đúng.",
model:"<b>Bài mẫu:</b> There are many shops on my street. There is a big supermarket next to my store. There are two coffee shops nearby, which are always busy. However, there isn't a hospital in this area. There are some parking spaces, but there aren't any on weekends. Overall, there is everything you need within walking distance.<br><b>Tự kiểm tra:</b> is/are đúng theo số? some (khẳng định) vs any (phủ định)? Không dùng 'There have'?"}]},
adv:{mcq:[
{q:"Trong Writing Task 1/2, cách diễn đạt nào TRANG TRỌNG hơn 'There are many people who think that...'?",opts:["There is many people thinking...","Many people believe that... / It is widely believed that...","There are much people who think...","There have many people think..."],a:1,why:"<b>Đúng: B.</b> 'There is/are' hơi thiếu trang trọng khi lạm dụng trong essay. Câu học thuật ưa 'Many people believe' hoặc bị động 'It is widely believed'. Biết dùng There is/are ĐÚNG nhưng cũng biết khi nào nên thay bằng cấu trúc mạnh hơn."},
{q:"'There ___ little evidence to support this claim.'",opts:["is","are","be","were"],a:0,why:"<b>Đúng: is.</b> 'evidence' không đếm được → is. 'little' (rất ít) đi với danh từ không đếm được. Cụm 'There is little evidence' rất hữu ích cho lập luận học thuật."},
{q:"'There ___ a number of factors that ___ to this problem.'",opts:["is / contribute","are / contribute","is / contributes","are / contributes"],a:1,why:"<b>Đúng: are / contribute.</b> 'a number of factors' = nhiều yếu tố → are. 'factors' (số nhiều) làm chủ ngữ của mệnh đề quan hệ → contribute (không s). Câu tổng hợp nhiều quy tắc."},
{q:"Chọn câu tự nhiên và chính xác nhất:",opts:["There is no doubt that education is important.","There is not any doubt that education is important.","There isn't no doubt about education important.","It has no doubt that education is important."],a:0,why:"<b>Đúng: A.</b> 'There is no doubt that...' — cụm nhấn mạnh học thuật rất mạnh (Không còn nghi ngờ gì rằng...). B đúng nhưng kém trang trọng hơn; C phủ định kép sai; D dùng 'It has' sai cấu trúc."},
{q:"'Nowhere ___ such a variety of products.' (Không nơi nào có nhiều loại sản phẩm đến vậy)",opts:["there is","is there","there are","are there"],a:1,why:"<b>Đúng: is there.</b> Trạng từ phủ định 'Nowhere' đầu câu → ĐẢO NGỮ: is there (thay vì there is). 'a variety of' → số ít → is. Đây là cấu trúc band 7+, nhưng gốc rễ vẫn là There is bạn học hôm nay."}],
writing:[{q:"Viết đoạn nghị luận 7 câu về một vấn đề (ví dụ: lợi ích của công nghệ), dùng There is/are một cách đa dạng VÀ ít nhất 1 lần thay bằng cấu trúc học thuật mạnh hơn (Many people believe / It is clear that / There is no doubt that).",
model:"<b>Bài mẫu:</b> There is no doubt that technology has transformed modern life. There are many benefits, especially in communication and education. For example, there are countless online courses that allow people to learn new skills for free. However, there are also concerns about screen addiction. Many people believe that children spend too much time on their phones. There is little evidence, though, that technology alone causes these problems. It is clear that balance is the key.<br><b>Tự kiểm tra:</b> There is/are chia đúng số? Có ít nhất 1 cấu trúc thay thế trang trọng (There is no doubt / Many people believe / It is clear)?"}]}
}},
/* ============ BÀI 10 ============ */
{id:"g10",title:"Bài 10 · Sở hữu: 's, of, và tính từ sở hữu (my/your/his...)",
theory:`<h3>1. Tính từ sở hữu — "của ai" đứng trước danh từ</h3>
<table><tr><th>Chủ ngữ</th><th>Tính từ sở hữu</th><th>Ví dụ</th></tr>
<tr><td>I</td><td>my (của tôi)</td><td>my phone</td></tr>
<tr><td>You</td><td>your (của bạn)</td><td>your car</td></tr>
<tr><td>He</td><td>his (của anh ấy)</td><td>his job</td></tr>
<tr><td>She</td><td>her (của cô ấy)</td><td>her bag</td></tr>
<tr><td>It</td><td>its (của nó)</td><td>its price</td></tr>
<tr><td>We</td><td>our (của chúng tôi)</td><td>our store</td></tr>
<tr><td>They</td><td>their (của họ)</td><td>their orders</td></tr></table>
<p class="muted">⚠️ Phân biệt: <b>its</b> (của nó, sở hữu) ≠ <b>it's</b> (= it is). Và <b>their</b> (của họ) ≠ <b>there</b> (có/ở đó) ≠ <b>they're</b> (= they are). Ba từ 'there/their/they're' đọc giống nhau nhưng nghĩa khác — lỗi rất phổ biến.</p>
<h3>2. 's — sở hữu của NGƯỜI/động vật</h3>
<div class="formula">Người + <b>'s</b> + vật sở hữu</div>
<div class="example"><b>Nam's phone</b> = điện thoại của Nam<br><b>my sister's car</b> = xe của chị tôi<br><b>the manager's office</b> = văn phòng của quản lý</div>
<p>Nếu danh từ đã có 's' số nhiều → chỉ thêm dấu ' : <b>the students' books</b> (sách của các học sinh).</p>
<h3>3. of — sở hữu của VẬT</h3>
<div class="example"><b>the price of the TV</b> = giá của cái tivi (KHÔNG nói 'the TV's price' — vật thường dùng 'of')<br><b>the name of the company</b> = tên của công ty<br><b>the end of the month</b> = cuối tháng</div>
<h3>4. Đại từ sở hữu — thay thế cả cụm (mine, yours, his, hers, ours, theirs)</h3>
<div class="example"><b>This phone is mine.</b> (= my phone)<br><b>That car is theirs.</b> (= their car)<br><span class="vi">Dùng khi không muốn lặp lại danh từ.</span></div>`,
levels:{
basic:{mcq:[
{q:"This is ___ book. (của tôi)",opts:["me","my","mine","I"],a:1,why:"<b>Đúng: my.</b> 'my' + danh từ (my book). 'mine' đứng một mình (This book is mine). 'me' là tân ngữ, 'I' là chủ ngữ."},
{q:"___ car is very fast. (của anh ấy)",opts:["He","His","Him","He's"],a:1,why:"<b>Đúng: His.</b> 'his' + danh từ = xe của anh ấy. 'He's' = He is (khác nghĩa)."},
{q:"That is ___ phone. (của Lan)",opts:["Lan","Lans","Lan's","Lans'"],a:2,why:"<b>Đúng: Lan's.</b> Sở hữu của người → tên + 's = Lan's phone."},
{q:"Chọn cách nói đúng: 'giá của cái tivi'",opts:["the TV's price","the price of the TV","the price's TV","TV of price"],a:1,why:"<b>Đúng: the price of the TV.</b> Vật (TV) thường dùng 'of' để chỉ sở hữu, không dùng 's. ('the TV's price' nghe không tự nhiên.)"},
{q:"The dog wagged ___ tail. (đuôi của nó)",opts:["it's","its","his","their"],a:1,why:"<b>Đúng: its.</b> 'its' = của nó (sở hữu). 'it's' = it is (SAI ở đây). Đây là lỗi chính tả bị trừ điểm rất nhiều."}],
writing:[{q:"Viết 5 câu về đồ vật của các thành viên gia đình, dùng: tính từ sở hữu (my/his/her), 's của người, và of với vật.",
model:"<b>Bài mẫu:</b> My father's car is old but reliable. Her phone is newer than mine. The color of my house is blue. My sister's laptop is broken. Their store is bigger than ours.<br><b>Tự kiểm tra:</b> Người → 's (father's, sister's)? Vật → of (color of my house)? my/her/their + danh từ đúng? Không nhầm its/it's?"}]},
mid:{mcq:[

/* ================= UI ENGINE ================= */
const app=document.getElementById('app');
function go(v,arg){document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
 if(v==='home')renderHome();if(v==='lessons')renderLessons(arg);if(v==='tests')renderTests(arg);if(v==='progress')renderProgress();window.scrollTo(0,0)}

function stageOf(l){return l.stage||1}
function openStages(){return ROADMAP.map((s,i)=>({num:i+1,info:s})).filter(x=>x.info.open)}
function stagePercent(stage){const ls=LESSONS.filter(l=>stageOf(l)===stage);let done=0;const tot=ls.length*3;
 ls.forEach(l=>['basic','mid','adv'].forEach(lv=>{const s=progress.scores[l.id+'_'+lv];if(s&&s.correct/s.total>=0.6)done++}));
 return{done,tot,pct:tot?Math.round(done/tot*100):0}}
function c1Percent(){let done=0,tot=0;
 LESSONS.forEach(l=>['basic','mid','adv'].forEach(lv=>{tot++;const s=progress.scores[l.id+'_'+lv];if(s&&s.correct/s.total>=0.6)done++}));
 return{done,tot,pct:tot?Math.round(done/tot*100):0}}

function progSVG(pct,label){const r=62,cx=75,cy=75,circ=2*Math.PI*r;
 return `<svg class="dial" viewBox="0 0 150 150">
 <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#DDE2DA" stroke-width="12"/>
 <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#0E7C86" stroke-width="12" stroke-linecap="round"
  stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}" transform="rotate(-90 ${cx} ${cy})"/>
 <text x="75" y="72" text-anchor="middle" font-size="28" font-weight="700" fill="#17263B" font-family="Fraunces,serif">${pct}%</text>
 <text x="75" y="92" text-anchor="middle" font-size="10" fill="#4A5A70">${label||'Tổng'}</text></svg>`}

 app.innerHTML=`
 <div class="card"><div class="eyebrow">Lộ trình tự học · 0 → IELTS 9.0</div>

 <p class="muted">Website xây theo từng chặng để mỗi phần đủ dày và học được thật. Mỗi khi có chặng mới, bạn chỉ cần thay file trên GitHub — tiến độ cũ vẫn được giữ nguyên trong trình duyệt.</p></div>

}

function pick(i,j){if(cur.quiz.submitted)return;cur.quiz.answers[i]=j;

{id:"g11",stage:2,title:"Bài 11 · Quá khứ đơn của TO BE (was / were)",
theory:`<h3>1. Quá khứ của to be: chỉ có 2 từ</h3>
<p>Ở Chặng 1 bạn học am/is/are (hiện tại). Khi nói về QUÁ KHỨ ("đã là / đã ở"), am/is/are biến thành <b>was / were</b>.</p>
<table><tr><th>Chủ ngữ</th><th>Hiện tại</th><th>Quá khứ</th><th>Ví dụ</th></tr>
<tr><td>I</td><td>am</td><td><b>was</b></td><td>I was tired. (Tôi đã mệt.)</td></tr>
<tr><td>He / She / It</td><td>is</td><td><b>was</b></td><td>She was here. (Cô ấy đã ở đây.)</td></tr>
<tr><td>You / We / They</td><td>are</td><td><b>were</b></td><td>They were happy. (Họ đã vui.)</td></tr></table>
<div class="formula">Quy tắc: I / he / she / it → <b>was</b> · you / we / they → <b>were</b></div>
<h3>2. Phủ định & câu hỏi (giống hệt hiện tại, chỉ đổi từ)</h3>
<div class="example"><b>Phủ định:</b> I was not (wasn't) at work. / They were not (weren't) ready.<br><b>Câu hỏi:</b> Was she happy? — Yes, she was. / No, she wasn't.<br>Were you tired? — Yes, I was. / No, I wasn't.</div>
<h3>3. Dấu hiệu thời gian quá khứ</h3>
<p><b>yesterday</b> (hôm qua), <b>last night/week/year</b> (tối/tuần/năm trước), <b>two days ago</b> (2 ngày trước), <b>in 2020</b>, <b>when I was young</b>.</p>
<div class="example"><b>I was at the store yesterday.</b><br><span class="vi">Tôi đã ở cửa hàng hôm qua. — 'yesterday' báo hiệu quá khứ → dùng 'was'.</span></div>
<div class="example"><b>The prices were lower last year.</b><br><span class="vi">Giá đã thấp hơn hồi năm ngoái. — 'last year' + 'prices' (số nhiều) → were.</span></div>
<p class="muted">⚠️ Lỗi hay gặp: dùng 'was' cho you/they. Nhớ: you/we/they LUÔN đi với 'were', kể cả 'you' chỉ 1 người.</p>`,

{q:"My parents ___ born in the countryside, but I ___ born in the city.",opts:["was / were","were / was","were / were","was / was"],a:1,why:"<b>Đúng: were / was.</b> 'My parents' (số nhiều) → were; 'I' → was. 'be born' = được sinh ra, luôn dùng to be."},
{q:"There ___ many customers in the store yesterday.",opts:["was","were","is","are"],a:1,why:"<b>Đúng: were.</b> 'There were' + số nhiều (many customers). Quá khứ của 'There are'."},
{q:"'___ the delivery on time?' — 'No, it ___.'",opts:["Was / wasn't","Were / weren't","Was / weren't","Did / didn't"],a:0,why:"<b>Đúng: Was / wasn't.</b> 'the delivery' số ít → Was...? và trả lời No, it wasn't. Hai vế thống nhất số ít."},
{q:"When I ___ a child, my family ___ quite poor.",opts:["were / was","was / were","was / was","were / were"],a:1,why:"<b>Đúng: was / were.</b> 'I' → was; 'my family' — danh từ tập hợp, ở đây coi số nhiều (các thành viên) nên 'were' được chấp nhận; nghĩa 'gia đình tôi từng nghèo'."},

{q:"Chọn câu ĐÚNG về sắc thái:",opts:["Yesterday's meeting was productive; several key decisions were made.","Yesterday meeting was productive; several key decision was made.","Yesterday's meeting were productive.","Yesterday's meeting was productive; several key decisions was made."],a:0,why:"<b>Đúng: A.</b> 'meeting' (số ít) → was; 'decisions' (số nhiều) → were made (bị động quá khứ). Chủ ngữ và động từ phải khớp số ở CẢ HAI mệnh đề."},
{q:"'Little ___ I aware that the price had already changed.' (Tôi chẳng hề hay biết...)",opts:["was","were","did","had"],a:0,why:"<b>Đúng: was.</b> Đảo ngữ với 'Little' đầu câu: Little was I aware... = I was little aware. 'I' → was. Cấu trúc nhấn mạnh band 7+, gốc vẫn là was/were bạn học hôm nay."},
{q:"'The results ___ surprising, which ___ why we reviewed the data again.'",opts:["was / was","were / was","were / were","was / were"],a:1,why:"<b>Đúng: were / was.</b> 'The results' (số nhiều) → were; 'which' ở đây chỉ CẢ mệnh đề trước (coi số ít) → was. Phân biệt số của hai chủ ngữ khác nhau trong một câu."},

writing:[{q:"Viết đoạn 7–8 câu (kiểu IELTS Speaking Part 2) mô tả một nơi bạn từng sống hoặc từng đến khi còn nhỏ, dùng was/were nhuần nhuyễn, ít nhất 1 câu 'There was/were' và cụm 'When I was...'.",
model:"<b>Bài mẫu:</b> When I was a child, my family lived in a small town in Bac Ninh. Our house was old but cosy, and the neighbours were very friendly. There was a big market near our home, and it was always crowded on weekends. My favourite place was a small pond behind the house, where the water was clear and cool. Those days were simple but happy. I wasn't aware of it then, but that place shaped who I am today.<br><b>Tự kiểm tra:</b> was/were đúng ngôi và số? 'There was/were' khớp danh từ? Có dùng 'When I was...' làm mốc quá khứ?"}]}
