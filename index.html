/* ===== BÀI 44 ===== */
{id:"g44",stage:5,title:"Bài 44 · Reading — các dạng câu hỏi khó",
theory:`<h3>1. True / False / Not Given (T/F/NG) — dạng dễ mất điểm nhất</h3>
<p>Xét một NHẬN ĐỊNH so với thông tin bài đọc:</p>
<table><tr><th>Đáp án</th><th>Khi nào</th></tr>
<tr><td><b>TRUE</b></td><td>Bài đọc XÁC NHẬN nhận định (dù diễn đạt khác)</td></tr>
<tr><td><b>FALSE</b></td><td>Bài đọc NÓI NGƯỢC lại nhận định (mâu thuẫn trực tiếp)</td></tr>
<tr><td><b>NOT GIVEN</b></td><td>Bài KHÔNG có thông tin để xác định đúng/sai</td></tr></table>
<div class="example"><b>Bài:</b> "The library was built in 1920 and renovated in 2005."<br><b>Nhận định 1:</b> The library was built in 1920. → <b>TRUE</b><br><b>Nhận định 2:</b> The library was built in 1930. → <b>FALSE</b> (mâu thuẫn)<br><b>Nhận định 3:</b> The library is the oldest in the city. → <b>NOT GIVEN</b> (bài không nói gì về 'oldest')</div>
<p><b>Quy tắc sống còn:</b> chỉ dựa vào BÀI ĐỌC, KHÔNG dùng kiến thức/suy đoán bên ngoài. 'Có vẻ đúng theo hiểu biết của tôi' → vẫn NOT GIVEN nếu bài không nói.</p>
<h3>2. Yes / No / Not Given (Y/N/NG)</h3>
<p>Giống T/F/NG nhưng xét QUAN ĐIỂM/Ý KIẾN của tác giả (không phải sự thật). YES = tác giả đồng ý với nhận định; NO = tác giả phản đối; NOT GIVEN = không nêu quan điểm này.</p>
<h3>3. Matching Headings (nối tiêu đề với đoạn)</h3>
<p>Cho danh sách tiêu đề, nối mỗi đoạn với 1 tiêu đề. KHÔNG theo thứ tự. Chiến thuật:</p>
<ul>
<li>Đọc câu đầu + câu cuối mỗi đoạn để nắm Ý CHÍNH (không sa vào chi tiết).</li>
<li>Chọn tiêu đề khớp Ý CHÍNH cả đoạn, không phải một chi tiết nhỏ.</li>
<li>Làm đoạn chắc chắn trước, loại dần tiêu đề đã dùng.</li>
</ul>
<h3>4. Matching Information/Features (nối thông tin với đoạn)</h3>
<p>'Which paragraph contains X?' — quét tìm thông tin cụ thể. KHÔNG theo thứ tự, một đoạn có thể chứa nhiều đáp án.</p>
<h3>5. Sentence/Summary completion & Multiple choice</h3>
<ul>
<li><b>Completion:</b> điền từ LẤY TỪ BÀI (chép chính xác, đúng giới hạn từ, không đổi dạng).</li>
<li><b>Summary:</b> đôi khi có ô từ cho sẵn (word bank) — chú ý từ loại phù hợp.</li>
<li><b>Multiple choice:</b> đọc kỹ, loại trừ phương án sai; cảnh giác phương án 'đúng một nửa'.</li>
</ul>
<p class="muted">⚠️ Bẫy lớn nhất T/F/NG: nhầm FALSE với NOT GIVEN. FALSE = có bằng chứng NGƯỢC. NOT GIVEN = KHÔNG có bằng chứng. Bẫy khác: từ tuyệt đối trong nhận định (all, only, always) thường khiến nó thành FALSE nếu bài nói 'some/often'.</p>`,
levels:{
basic:{mcq:[
{q:"Bài: 'The museum opens daily except Mondays.' Nhận định: 'The museum is closed on Mondays.' →",opts:["TRUE","FALSE","NOT GIVEN","Không rõ"],a:0,why:"<b>Đúng: TRUE.</b> 'except Mondays' = đóng cửa thứ Hai. Bài xác nhận nhận định (diễn đạt khác nhưng cùng nghĩa)."},
{q:"Bài: 'The tower is 300 metres tall.' Nhận định: 'The tower is 250 metres tall.' →",opts:["TRUE","FALSE","NOT GIVEN","YES"],a:1,why:"<b>Đúng: FALSE.</b> Bài nói 300m, nhận định nói 250m — MÂU THUẪN trực tiếp → FALSE."},
{q:"Bài: 'The tower attracts many tourists.' Nhận định: 'The tower is the tallest in the world.' →",opts:["TRUE","FALSE","NOT GIVEN","NO"],a:2,why:"<b>Đúng: NOT GIVEN.</b> Bài không nói gì về việc 'cao nhất thế giới' → không đủ thông tin → NOT GIVEN."},
{q:"Trong T/F/NG, bạn được phép dùng:",opts:["Kiến thức cá nhân","Chỉ thông tin trong bài đọc","Suy đoán logic","Cả ba"],a:1,why:"<b>Đúng: Chỉ thông tin trong bài.</b> Tuyệt đối không dùng kiến thức ngoài — chỉ căn cứ vào những gì bài đọc nêu."},
{q:"Y/N/NG khác T/F/NG ở chỗ xét:",opts:["Sự thật khách quan","Quan điểm/ý kiến của tác giả","Số liệu","Ngày tháng"],a:1,why:"<b>Đúng: Quan điểm/ý kiến của tác giả.</b> Y/N/NG xét việc tác giả có ĐỒNG Ý với nhận định không (YES/NO), còn T/F/NG xét sự thật."}],
writing:[{q:"Đọc đoạn: 'Electric cars produce no exhaust emissions. However, the electricity used to charge them may come from fossil fuels. Their batteries are also expensive to replace.' Xác định T/F/NG cho 4 nhận định và GIẢI THÍCH: (1) Electric cars produce no exhaust emissions. (2) Electric cars are completely environmentally friendly. (3) Electric car batteries are cheap. (4) All electricity for electric cars comes from fossil fuels.",
model:"<b>Đáp án:</b> (1) TRUE — bài nói thẳng 'produce no exhaust emissions'. (2) NOT GIVEN — bài KHÔNG khẳng định chúng 'hoàn toàn thân thiện môi trường'; thực ra còn nêu mặt hạn chế, nhưng không có câu nào xác nhận/phủ nhận trực tiếp cụm 'completely environmentally friendly'. (3) FALSE — bài nói pin 'expensive to replace', mâu thuẫn với 'cheap'. (4) FALSE — bài nói điện 'may come from fossil fuels' (CÓ THỂ), không phải 'ALL' (tất cả). Từ tuyệt đối 'all' khiến nhận định sai.<br><b>Gợi ý:</b> Chú ý (2) và (4): từ tuyệt đối ('completely', 'all') là bẫy. Bài dùng ngôn ngữ thận trọng ('may') nên nhận định tuyệt đối thường FALSE hoặc NOT GIVEN."}]},
mid:{mcq:[
{q:"Nhận định chứa 'The method is the ONLY effective solution' nhưng bài nói 'one of several effective methods'. Đáp án:",opts:["TRUE","FALSE","NOT GIVEN","YES"],a:1,why:"<b>Đúng: FALSE.</b> 'ONLY' (duy nhất) mâu thuẫn với 'one of several' (một trong nhiều). Từ tuyệt đối bị bài phủ nhận → FALSE."},
{q:"Với Matching Headings, tiêu đề đúng phải khớp:",opts:["Một chi tiết trong đoạn","Ý CHÍNH của cả đoạn","Từ đầu tiên của đoạn","Câu dài nhất"],a:1,why:"<b>Đúng: Ý chính cả đoạn.</b> Bẫy thường gặp: tiêu đề khớp một chi tiết nhỏ nhưng không phải ý chính. Phải chọn tiêu đề bao quát cả đoạn."},
{q:"Trong Sentence completion (điền từ từ bài), bạn phải:",opts:["Dùng từ đồng nghĩa của mình","Chép CHÍNH XÁC từ trong bài, đúng dạng và giới hạn từ","Diễn giải lại","Viết hoa toàn bộ"],a:1,why:"<b>Đúng: Chép chính xác từ bài.</b> Đổi sang từ đồng nghĩa hoặc đổi dạng từ = sai, dù cùng nghĩa. Lấy đúng từ trong văn bản."},
{q:"Matching Information ('Which paragraph mentions X?') có đặc điểm:",opts:["Theo thứ tự bài","KHÔNG theo thứ tự, một đoạn có thể chứa nhiều đáp án","Mỗi đoạn 1 đáp án","Luôn ở đoạn cuối"],a:1,why:"<b>Đúng: B.</b> Không theo thứ tự; một đoạn có thể là đáp án cho nhiều câu, hoặc không câu nào. Phải quét cả bài."},
{q:"Nhận định về ý kiến tác giả, bài KHÔNG nêu quan điểm này. Đáp án Y/N/NG:",opts:["YES","NO","NOT GIVEN","FALSE"],a:2,why:"<b>Đúng: NOT GIVEN.</b> Tác giả không bày tỏ quan điểm về nhận định này → NOT GIVEN (không phải NO — NO cần tác giả phản đối rõ)."}],
writing:[{q:"Cho đoạn 3 câu tự chọn chủ đề bạn thích (viết bằng tiếng Anh), rồi TỰ TẠO 3 nhận định: một TRUE, một FALSE, một NOT GIVEN — kèm giải thích vì sao mỗi cái thuộc loại đó. Đây là bài luyện tư duy ngược giúp hiểu sâu dạng T/F/NG.",
model:"<b>Bài mẫu tham khảo:</b><br><i>Đoạn:</i> The Great Barrier Reef is the world's largest coral reef system. It stretches over 2,300 kilometres along the coast of Australia. In recent years, rising sea temperatures have caused significant coral bleaching.<br><i>TRUE:</i> The Great Barrier Reef is located near Australia. (Bài nói 'along the coast of Australia' → xác nhận.)<br><i>FALSE:</i> The reef is less than 1,000 kilometres long. (Bài nói 'over 2,300 km' → mâu thuẫn trực tiếp.)<br><i>NOT GIVEN:</i> The reef attracts millions of tourists every year. (Bài không đề cập gì về du khách → không đủ thông tin.)<br><b>Gợi ý:</b> Tự ra đề giúp bạn 'nhìn xuyên' cách người ra đề tạo bẫy. NOT GIVEN luôn là nhận định NGHE HỢP LÝ nhưng bài không hề nhắc tới — đó chính là bẫy khiến thí sinh chọn TRUE theo cảm tính."}]},
adv:{mcq:[
{q:"Nhận định: 'Scientists have proven that the treatment cures the disease.' Bài: 'Early trials suggest the treatment may reduce symptoms.' Đáp án và lý do:",opts:["TRUE — cùng ý","FALSE — bài dùng ngôn ngữ thận trọng ('suggest', 'may reduce symptoms'), mâu thuẫn với khẳng định chắc chắn 'proven...cures'","NOT GIVEN","YES"],a:1,why:"<b>Đúng: FALSE.</b> Bài dùng hedging: 'suggest' (gợi ý, chưa chắc), 'may reduce symptoms' (có thể giảm triệu chứng). Nhận định lại khẳng định tuyệt đối 'proven...cures' (đã chứng minh...chữa khỏi). Mức độ chắc chắn MÂU THUẪN → FALSE. Đây là bẫy tinh vi: phải so sánh cả SẮC THÁI CHẮC CHẮN, không chỉ nội dung."},
{q:"Vì sao NOT GIVEN là đáp án khó 'dám chọn' nhất với thí sinh?",opts:["Vì nó hiếm","Vì thí sinh có xu hướng dùng suy luận/kiến thức ngoài để 'lấp' khoảng trống thông tin, biến nó thành TRUE/FALSE sai","Vì nó luôn ở cuối","Vì khó đọc"],a:1,why:"<b>Đúng: B.</b> Não người tự động 'suy diễn' để lấp chỗ trống. Nhận định NOT GIVEN thường rất HỢP LÝ theo logic đời thường, khiến thí sinh chọn TRUE. Kỷ luật cốt lõi: nếu KHÔNG tìm được câu nào trong bài xác nhận/phủ nhận trực tiếp → đó là NOT GIVEN, bất kể nó 'nghe có vẻ đúng'."},
{q:"Chiến thuật loại trừ cho Matching Headings khi còn 2 đoạn và 3 tiêu đề khó:",opts:["Đoán ngẫu nhiên","Xác định tiêu đề nào khớp Ý CHÍNH (không phải chi tiết) của từng đoạn; loại tiêu đề chỉ khớp một ví dụ/chi tiết phụ trong đoạn","Chọn tiêu đề ngắn nhất","Chọn theo thứ tự"],a:1,why:"<b>Đúng: B.</b> Tiêu đề 'bẫy' thường nhặt đúng một từ/chi tiết XUẤT HIỆN trong đoạn nhưng không phải Ý BAO QUÁT. Phải hỏi: 'Đoạn này CHỦ YẾU nói về gì?' và chọn tiêu đề trả lời câu đó, chứ không phải tiêu đề chỉ 'có mặt' trong đoạn qua một chi tiết."},
{q:"Trong Multiple choice band cao, phương án 'đúng một nửa' được thiết kế để:",opts:["Giúp thí sinh","Bẫy người đọc lướt — nó chứa thông tin đúng từ bài nhưng bị thêm/đổi một chi tiết làm sai tổng thể","Làm dài đề","Không có mục đích"],a:1,why:"<b>Đúng: B.</b> Distractor tinh vi lấy thông tin CÓ THẬT trong bài rồi bóp méo một phần (đổi con số, thêm 'always/only', gán sai chủ thể). Người đọc lướt thấy 'quen quen' liền chọn. Phải đọc kỹ TỪNG phương án và đối chiếu CHÍNH XÁC với bài, loại trừ cái sai dù chỉ sai một chi tiết."},
{q:"Nhận định Y/N/NG: 'The author believes technology has done more harm than good.' Bài trình bày cả lợi và hại nhưng tác giả KHÔNG kết luận nghiêng về bên nào. Đáp án:",opts:["YES","NO","NOT GIVEN","FALSE"],a:2,why:"<b>Đúng: NOT GIVEN.</b> Tác giả nêu cả hai mặt nhưng KHÔNG bày tỏ quan điểm 'hại nhiều hơn lợi'. Không có bằng chứng về QUAN ĐIỂM này → NOT GIVEN. Bẫy: thí sinh thấy bài nói nhiều mặt hại liền suy ra tác giả 'chắc nghĩ vậy' — nhưng trình bày thông tin ≠ bày tỏ quan điểm. Y/N/NG đòi hỏi tìm CÂU thể hiện lập trường rõ của tác giả."}],
writing:[{q:"Viết một 'cẩm nang xử lý dạng câu hỏi khó' (8-10 câu, tiếng Anh) cho riêng bạn, tổng hợp: cách phân biệt TRUE/FALSE/NOT GIVEN (kể cả bẫy từ tuyệt đối và bẫy sắc thái chắc chắn), cách làm Matching Headings (ý chính vs chi tiết), và cách tránh distractor 'đúng một nửa' trong Multiple choice. Trình bày mạch lạc.",
model:"<b>Bài mẫu tham khảo:</b> The most challenging reading questions require careful discipline rather than speed. For True, False and Not Given tasks, I always remind myself that False means the text directly contradicts the statement, whereas Not Given means the information is simply absent, and I must never fill this gap with my own assumptions. I pay particular attention to absolute words such as 'all', 'only' and 'always' in the statements, since the passage often uses cautious language like 'some' or 'may', which can make an absolute claim false. I also compare the degree of certainty: a confident claim such as 'scientists have proven' may contradict a tentative statement such as 'early trials suggest'. When tackling Matching Headings, I focus on the central idea of each paragraph rather than a single detail, because misleading headings often echo a minor point instead of the main theme. I usually complete the paragraphs I am confident about first and eliminate the headings I have already used. In multiple-choice questions, I read every option closely and reject any that alters or adds a small detail, as these 'half-correct' distractors are designed to trap hasty readers. Above all, I base every answer strictly on the text and resist the temptation to rely on outside knowledge or intuition. This methodical approach helps me avoid the traps that cost the most marks.<br><b>Tự kiểm tra:</b> Có phân biệt rõ FALSE vs NOT GIVEN? Có nhắc bẫy từ tuyệt đối VÀ bẫy sắc thái chắc chắn? Có chiến thuật Matching Headings (ý chính vs chi tiết, loại trừ)? Có cách tránh distractor 'đúng một nửa'? Mạch lạc?"}]}
}},
/* ===== BÀI 45 ===== */
{id:"g45",stage:5,title:"Bài 45 · Writing Task 1 — mô tả biểu đồ & số liệu",
theory:`<h3>1. Task 1 Academic yêu cầu gì?</h3>
<p>Mô tả KHÁCH QUAN một biểu đồ/bảng/số liệu bằng ≥150 từ trong ~20 phút. KHÔNG nêu ý kiến cá nhân, KHÔNG giải thích nguyên nhân. Chỉ TƯỜNG THUẬT dữ liệu và làm nổi bật xu hướng chính.</p>
<h3>2. Cấu trúc 4 phần chuẩn</h3>
<table><tr><th>Phần</th><th>Nội dung</th></tr>
<tr><td>Introduction</td><td>Paraphrase lại đề bài (biểu đồ này thể hiện gì)</td></tr>
<tr><td>Overview</td><td>2-3 câu nêu XU HƯỚNG CHÍNH/đặc điểm nổi bật nhất — KHÔNG số liệu chi tiết</td></tr>
<tr><td>Body 1</td><td>Nhóm dữ liệu thứ nhất + số liệu minh họa</td></tr>
<tr><td>Body 2</td><td>Nhóm dữ liệu còn lại + số liệu minh họa</td></tr></table>
<p><b>Overview là phần QUAN TRỌNG NHẤT</b> — thiếu overview khó qua band 6. Nó tóm điểm nổi bật: cái gì cao nhất/thấp nhất, xu hướng chung tăng hay giảm.</p>
<h3>3. Ngôn ngữ mô tả XU HƯỚNG (thuộc lòng)</h3>
<table><tr><th>Loại</th><th>Động từ</th><th>Danh từ</th></tr>
<tr><td>Tăng</td><td>rise, increase, grow, climb, surge</td><td>a rise, an increase, growth, a surge</td></tr>
<tr><td>Giảm</td><td>fall, decrease, decline, drop, plunge</td><td>a fall, a decrease, a decline, a drop</td></tr>
<tr><td>Ổn định</td><td>remain stable, level off, stay constant</td><td>—</td></tr>
<tr><td>Dao động</td><td>fluctuate</td><td>a fluctuation</td></tr>
<tr><td>Đỉnh/đáy</td><td>peak (at), reach a low (of)</td><td>a peak</td></tr></table>
<h3>4. Mô tả MỨC ĐỘ & TỐC ĐỘ (kết hợp trạng từ/tính từ)</h3>
<div class="example"><b>Mạnh:</b> sharply, dramatically, significantly, rapidly (a sharp rise / a dramatic increase)<br><b>Nhẹ:</b> slightly, gradually, steadily, marginally (a slight fall / a gradual decline)<br><b>Cấu trúc:</b> 'Sales rose sharply' (động từ + trạng từ) = 'There was a sharp rise in sales' (there was + tính từ + danh từ)</div>
<h3>5. So sánh & ngôn ngữ số liệu</h3>
<div class="example"><b>The figure for X was twice as high as that for Y.</b><br><b>A accounted for 40% of the total, compared with 25% for B.</b><br><b>X was the highest, at 500 units, whereas Y was the lowest, at just 50.</b></div>
<p class="muted">⚠️ Task 1 (biểu đồ động - có mốc thời gian): dùng thì QUÁ KHỨ nếu là năm đã qua, tương lai nếu là dự báo. Task 1 tĩnh (bản đồ, quá trình, biểu đồ không thời gian): thì hiện tại. Sai lầm hàng đầu: thiếu overview, hoặc liệt kê MỌI số liệu như cái máy mà không nhóm/không nêu xu hướng.</p>`,
levels:{
basic:{mcq:[
{q:"Task 1 yêu cầu viết tối thiểu:",opts:["100 từ","150 từ","250 từ","200 từ"],a:1,why:"<b>Đúng: 150 từ.</b> Task 1 ≥150 từ trong ~20 phút."},
{q:"Trong Task 1, bạn có nên nêu ý kiến cá nhân không?",opts:["Có, càng nhiều càng tốt","KHÔNG — chỉ mô tả khách quan dữ liệu","Chỉ ở kết luận","Tùy đề"],a:1,why:"<b>Đúng: KHÔNG.</b> Task 1 chỉ tường thuật dữ liệu khách quan, không ý kiến, không giải thích nguyên nhân."},
{q:"Phần QUAN TRỌNG NHẤT của Task 1 là:",opts:["Introduction","Overview (nêu xu hướng chính)","Số liệu chi tiết","Kết luận"],a:1,why:"<b>Đúng: Overview.</b> Overview nêu đặc điểm nổi bật nhất; thiếu nó rất khó đạt band 6+."},
{q:"Danh từ của động từ 'increase' (tăng) dùng trong 'There was a ___' là:",opts:["increasing","an increase","increased","increasingly"],a:1,why:"<b>Đúng: an increase.</b> 'There was an increase in sales' = 'Sales increased'."},
{q:"'Sales rose ___' (tăng MẠNH). Chọn trạng từ:",opts:["slightly","sharply","gradually","marginally"],a:1,why:"<b>Đúng: sharply.</b> sharply/dramatically = tăng mạnh; slightly/marginally/gradually = tăng nhẹ/từ từ."}],
writing:[{q:"Luyện viết OVERVIEW. Dữ liệu: 'Biểu đồ đường thể hiện số lượng khách du lịch đến 3 thành phố (A, B, C) từ 2010-2020. A tăng đều từ 2 lên 8 triệu. B giảm từ 5 xuống 3 triệu. C dao động quanh 4 triệu.' Viết 2 câu overview (tiếng Anh) nêu xu hướng CHÍNH, KHÔNG dùng số liệu chi tiết.",
model:"<b>Bài mẫu:</b> Overall, the number of tourists visiting City A increased substantially over the period, whereas City B experienced a steady decline. City C, by contrast, remained relatively stable throughout, showing only minor fluctuations.<br><b>Tự kiểm tra:</b> Có nêu xu hướng chính của cả 3 thành phố (A tăng, B giảm, C ổn định)? KHÔNG dùng số liệu chi tiết (không '2 triệu', '8 triệu')? Bắt đầu bằng 'Overall'? Dùng từ so sánh/tương phản (whereas, by contrast)? Đây chính là phần ăn điểm quan trọng nhất."}]},
mid:{mcq:[
{q:"'The figure for cars was twice ___ that for motorbikes.'",opts:["as high as","higher as","as high than","so high as"],a:0,why:"<b>Đúng: as high as.</b> Cấu trúc so sánh bằng: 'twice as high as' (gấp đôi)."},
{q:"Chọn câu diễn đạt XU HƯỚNG đa dạng (dạng danh từ):",opts:["Sales increased sharply.","There was a sharp increase in sales.","Sales went up a lot.","Sales increased sharp."],a:1,why:"<b>Đúng: B.</b> 'There was a sharp increase in sales' — dạng danh từ (there was + tính từ + danh từ), giúp đa dạng cấu trúc so với 'Sales increased sharply'. Cả A cũng đúng, nhưng đa dạng hóa là điểm cộng band 7."},
{q:"Biểu đồ có mốc thời gian 1990-2000 (đã qua). Nên dùng thì:",opts:["Hiện tại đơn","Quá khứ đơn","Tương lai","Hiện tại hoàn thành"],a:1,why:"<b>Đúng: Quá khứ đơn.</b> Dữ liệu về các năm ĐÃ QUA → thì quá khứ. Nếu là dự báo tương lai → dùng 'will/is expected to'."},
{q:"Với bản đồ (map) hoặc quy trình (process) KHÔNG có mốc thời gian, dùng thì:",opts:["Quá khứ","Hiện tại đơn","Tương lai","Hiện tại tiếp diễn"],a:1,why:"<b>Đúng: Hiện tại đơn.</b> Quy trình/bản đồ mô tả trạng thái chung → hiện tại đơn (hoặc bị động hiện tại cho process)."},
{q:"Lỗi Task 1 khiến khó qua band 6 nhất là:",opts:["Viết quá dài","Thiếu overview / liệt kê mọi số liệu mà không nêu xu hướng","Dùng từ khó","Có kết luận"],a:1,why:"<b>Đúng: Thiếu overview / liệt kê máy móc.</b> Không có overview và chỉ 'đọc số' như cái máy là hai lỗi phổ biến nhất kéo điểm Task Achievement xuống."}],
writing:[{q:"Viết một đoạn BODY hoàn chỉnh (4-5 câu, tiếng Anh) mô tả nhóm dữ liệu sau, dùng đa dạng ngôn ngữ xu hướng và số liệu minh họa: 'Doanh số điện thoại của công ty: 2018: 10.000 chiếc; 2019: tăng mạnh lên 25.000; 2020: đạt đỉnh 40.000; 2021: giảm nhẹ xuống 35.000.'",
model:"<b>Bài mẫu:</b> In 2018, the company sold 10,000 phones. This figure then rose sharply to 25,000 units in 2019, before climbing further to reach a peak of 40,000 in 2020. However, sales subsequently experienced a slight decline, falling to 35,000 units in 2021. Despite this final dip, the overall figure remained considerably higher than at the start of the period.<br><b>Tự kiểm tra:</b> Có đa dạng động từ xu hướng (rose sharply, climbing, reach a peak, falling)? Có trạng từ mức độ (sharply, slight)? Có số liệu minh họa chính xác? Thì quá khứ (năm đã qua)? Có từ nối trình tự (then, before, subsequently)?"}]},
adv:{mcq:[
{q:"Vì sao overview KHÔNG nên chứa số liệu chi tiết?",opts:["Vì số liệu khó","Vì overview là bức tranh TỔNG QUÁT về xu hướng nổi bật; số liệu chi tiết thuộc phần body — trộn lẫn làm mất chức năng khái quát của overview","Vì không đủ chỗ","Vì cấm dùng số"],a:1,why:"<b>Đúng: B.</b> Overview trả lời câu hỏi 'Nhìn tổng thể, điều gì nổi bật nhất?' — nó khái quát hóa (cái nào cao nhất/thấp nhất, xu hướng chung). Số liệu cụ thể là để MINH HỌA trong body. Overview đầy số liệu chi tiết thất bại ở chức năng 'nhìn từ trên cao'. Giám khảo tìm một overview khái quát rõ ràng để cho band Task Achievement cao."},
{q:"Chọn câu mô tả xu hướng TINH TẾ và chính xác nhất (band 7+):",opts:["The number went up and down a lot.","The figure fluctuated markedly, peaking at 500 in 2015 before dropping to a low of 200.","The number changed.","The figure was high then low then high."],a:1,why:"<b>Đúng: B.</b> 'fluctuated markedly, peaking at..., before dropping to a low of...' — dùng động từ chính xác (fluctuate), trạng từ (markedly), và ngôn ngữ đỉnh/đáy (peak/low) kèm số liệu. Đây là mô tả dao động ở trình độ cao. A, C, D quá đơn giản/mơ hồ, thiếu chính xác định lượng."},
{q:"Cách nhóm dữ liệu (grouping) hiệu quả trong body giúp gì?",opts:["Làm bài dài hơn","Giúp bài MẠCH LẠC: nhóm các đối tượng cùng xu hướng lại với nhau thay vì mô tả rời rạc từng cái, thể hiện khả năng phân tích","Không giúp gì","Để dùng nhiều từ"],a:1,why:"<b>Đúng: B.</b> Thay vì tả lần lượt A, B, C, D rời rạc, thí sinh giỏi NHÓM: 'A và C đều tăng, trong khi B và D giảm'. Grouping thể hiện khả năng phân tích và làm bài mạch lạc (Coherence) — tiêu chí quan trọng. Đây là điểm khác biệt giữa 'đọc số như máy' (band 5-6) và 'phân tích dữ liệu' (band 7+)."},
{q:"Với biểu đồ có cả xu hướng quá khứ VÀ dự báo tương lai, cách xử lý thì đúng là:",opts:["Dùng một thì cho cả bài","Dùng quá khứ cho dữ liệu đã qua và 'is projected/expected to' hoặc 'will' cho phần dự báo","Chỉ dùng tương lai","Chỉ dùng hiện tại"],a:1,why:"<b>Đúng: B.</b> Biểu đồ hỗn hợp đòi hỏi chuyển thì linh hoạt: quá khứ cho năm đã qua ('rose'), tương lai/dự báo cho phần sau mốc hiện tại ('is projected to reach', 'is expected to rise'). Nhận diện đâu là dữ liệu thực, đâu là dự báo và chia thì tương ứng là dấu hiệu Grammatical Range band cao."},
{q:"Đâu là dấu hiệu một bài Task 1 đạt band 7 về Task Achievement?",opts:["Viết thật dài","Có overview rõ ràng nêu đúng xu hướng nổi bật, số liệu chọn lọc minh họa (không liệt kê hết), dữ liệu được nhóm logic, và mọi con số chính xác","Dùng nhiều từ khó","Có ý kiến cá nhân"],a:1,why:"<b>Đúng: B.</b> Band 7 Task Achievement yêu cầu: overview rõ ('clearly presents an overview'), làm nổi bật và minh họa các đặc điểm CHÍNH (không sa đà mọi chi tiết), dữ liệu chính xác. Chọn lọc số liệu tiêu biểu + nhóm logic quan trọng hơn liệt kê tất cả. Ý kiến cá nhân là lỗi (thuộc Task 2)."}],
writing:[{q:"Viết một bài Task 1 HOÀN CHỈNH (150-180 từ, tiếng Anh) đủ 4 phần cho đề sau: 'Biểu đồ cột thể hiện tỷ lệ phần trăm hộ gia đình sở hữu 4 thiết bị (tivi, tủ lạnh, máy giặt, máy tính) ở một quốc gia vào năm 2000 và 2020. TV: 90%→95%. Tủ lạnh: 70%→92%. Máy giặt: 40%→80%. Máy tính: 15%→75%.' Đủ: introduction (paraphrase đề), overview (xu hướng chính, không số liệu), 2 body có số liệu và nhóm dữ liệu, chia thì đúng.",
model:"<b>Bài mẫu (~175 từ):</b> The bar chart illustrates the percentage of households in a particular country that owned four types of appliances — televisions, refrigerators, washing machines and computers — in the years 2000 and 2020.<br><br>Overall, ownership of all four appliances rose over the two decades. The most striking feature is that computers and washing machines saw the largest increases, whereas televisions, already widespread in 2000, showed only marginal growth.<br><br>In 2000, televisions were by far the most common appliance, found in 90% of households, followed by refrigerators at 70%. By 2020, television ownership had risen slightly to 95%, while refrigerators had climbed considerably to 92%, making these two appliances almost equally prevalent.<br><br>The most dramatic changes occurred with the less common devices. Computer ownership surged from just 15% in 2000 to 75% in 2020, a fivefold rise. Similarly, the proportion of households with washing machines doubled, increasing from 40% to 80% over the same period.<br><b>Tự kiểm tra:</b> Introduction paraphrase đề (illustrates/percentage of households)? Overview nêu xu hướng chính KHÔNG số liệu chi tiết? Body có nhóm dữ liệu (TV+tủ lạnh / máy tính+máy giặt)? Số liệu chính xác và chọn lọc? Thì quá khứ + quá khứ hoàn thành (had risen)? Đủ ~150-180 từ?"}]}
}},
/* ===== BÀI 46 ===== */
{id:"g46",stage:5,title:"Bài 46 · Writing Task 1 — dạng đặc biệt (quá trình, bản đồ, bảng)",
theory:`<h3>1. Task 1 không chỉ có biểu đồ đường/cột</h3>
<p>Các dạng đặc biệt cần cách tiếp cận riêng: Process (quy trình), Map (bản đồ), Table (bảng), và biểu đồ kết hợp (mixed).</p>
<h3>2. PROCESS (sơ đồ quy trình / vòng đời)</h3>
<p>Mô tả các BƯỚC theo trình tự. Đặc điểm ngôn ngữ:</p>
<ul>
<li><b>Thì hiện tại đơn</b> (quy trình chung), thường dùng <b>BỊ ĐỘNG</b>: 'The beans are harvested, then they are dried.'</li>
<li><b>Từ nối trình tự:</b> first(ly), then, next, after that, subsequently, following this, finally.</li>
<li>Nêu tổng số bước và điểm đầu/cuối ở overview: 'The process consists of X main stages, beginning with... and ending with...'</li>
</ul>
<div class="example"><b>First, the raw materials are collected. They are then transported to the factory, where they are processed. Finally, the finished products are packaged and distributed.</b></div>
<h3>3. MAP (so sánh bản đồ 2 thời điểm / quy hoạch)</h3>
<p>Mô tả sự THAY ĐỔI về không gian. Đặc điểm:</p>
<ul>
<li>Nếu so 2 thời điểm (quá khứ→nay): dùng <b>quá khứ</b> và <b>bị động</b>: 'A new road was built.' 'The forest was replaced by houses.'</li>
<li><b>Ngôn ngữ thay đổi:</b> was built/constructed, was demolished/removed, was replaced by, was converted into, was expanded.</li>
<li><b>Ngôn ngữ vị trí:</b> in the north/south, to the east of, adjacent to, alongside, in the centre.</li>
</ul>
<h3>4. TABLE (bảng số liệu)</h3>
<p>Nhiều số liệu — phải CHỌN LỌC, không tả hết. Tìm: giá trị cao nhất/thấp nhất mỗi hàng/cột, xu hướng chung. Overview nêu điểm nổi bật tổng thể.</p>
<h3>5. MIXED (2 biểu đồ cùng lúc)</h3>
<p>Overview nên nêu điểm nổi bật của CẢ HAI biểu đồ. Mỗi body xử lý một biểu đồ, hoặc nối các thông tin liên quan giữa hai biểu đồ nếu có liên hệ.</p>
<p class="muted">⚠️ Lỗi phổ biến: Process — quên dùng bị động, dùng thì quá khứ sai chỗ. Map — chỉ liệt kê 'có cái này, có cái kia' mà không nêu SỰ THAY ĐỔI. Table — cố tả hết mọi ô số liệu → cháy giờ và rối. Luôn nhớ: overview + chọn lọc + nhóm.</p>`,
levels:{
basic:{mcq:[
{q:"Mô tả PROCESS (quy trình chung) thường dùng thì và thể:",opts:["Quá khứ chủ động","Hiện tại đơn, bị động","Tương lai","Hiện tại tiếp diễn"],a:1,why:"<b>Đúng: Hiện tại đơn, bị động.</b> 'The beans are dried, then they are roasted.' Quy trình chung → hiện tại đơn + bị động."},
{q:"Từ nối nào KHÔNG dùng để chỉ trình tự trong process?",opts:["First","Then","However","Finally"],a:2,why:"<b>Đúng: However.</b> 'However' chỉ tương phản, không phải trình tự. Trình tự dùng: first, then, next, after that, finally."},
{q:"So sánh bản đồ QUÁ KHỨ với HIỆN TẠI thường dùng thì:",opts:["Hiện tại","Quá khứ (và bị động)","Tương lai","Hiện tại hoàn thành"],a:1,why:"<b>Đúng: Quá khứ và bị động.</b> 'A new hospital was built.' 'The trees were removed.' Thay đổi đã xảy ra → quá khứ."},
{q:"'The old factory ___ into a shopping mall.' (chuyển đổi thành)",opts:["was replaced","was converted","was built","was demolished"],a:1,why:"<b>Đúng: was converted.</b> 'be converted into' = được chuyển đổi thành. (replaced by, demolished = phá bỏ, built = xây mới.)"},
{q:"Với bảng (table) nhiều số liệu, bạn nên:",opts:["Tả hết mọi ô","Chọn lọc số nổi bật (cao/thấp nhất, xu hướng)","Chỉ tả cột đầu","Không cần overview"],a:1,why:"<b>Đúng: Chọn lọc số nổi bật.</b> Table có quá nhiều số — chọn giá trị cao/thấp nhất và xu hướng chính, không liệt kê tất cả."}],
writing:[{q:"Luyện PROCESS. Mô tả quy trình sản xuất giấy đơn giản (viết 4-5 câu tiếng Anh, dùng bị động + từ nối trình tự): các bước là (1) chặt cây, (2) nghiền thành bột, (3) trộn với nước, (4) ép và sấy khô, (5) cắt thành tờ.",
model:"<b>Bài mẫu:</b> The process of making paper involves five main stages. First, trees are cut down and transported to a factory. The wood is then crushed into a pulp, which is subsequently mixed with water. After that, the mixture is pressed and dried to remove the moisture. Finally, the dried material is cut into sheets ready for use.<br><b>Tự kiểm tra:</b> Dùng BỊ ĐỘNG (are cut, is crushed, is mixed, is pressed, is cut)? Thì hiện tại đơn? Từ nối trình tự (First, then, subsequently, After that, Finally)? Câu overview nêu tổng số bước? Không dùng ý kiến cá nhân?"}]},
mid:{mcq:[
{q:"Overview tốt cho một PROCESS nên nêu:",opts:["Bước khó nhất","Tổng số bước + điểm bắt đầu và kết thúc","Ý kiến về quy trình","Số liệu"],a:1,why:"<b>Đúng: Tổng số bước + điểm đầu/cuối.</b> VD 'The process consists of six stages, beginning with... and ending with...'. Đó là cái nhìn tổng quát cho process."},
{q:"'In 2000 there was a forest. In 2020 there were houses.' Cách viết band cao hơn:",opts:["Giữ nguyên như vậy","The forest was cleared and replaced by residential housing.","There is a forest and houses.","Houses and forest exist."],a:1,why:"<b>Đúng: B.</b> 'was cleared and replaced by' nêu SỰ THAY ĐỔI (bị động, quá khứ) thay vì chỉ liệt kê 'có cái này, có cái kia'. Map phải nhấn vào biến đổi."},
{q:"'A new bridge was built ___ the river, connecting the two areas.'",opts:["across","between","among","along"],a:0,why:"<b>Đúng: across.</b> 'across the river' = bắc qua sông. Ngôn ngữ vị trí chính xác quan trọng trong map."},
{q:"Với biểu đồ MIXED (2 biểu đồ), overview nên:",opts:["Chỉ nói về biểu đồ 1","Nêu điểm nổi bật của CẢ HAI biểu đồ","Bỏ qua overview","Chỉ nói biểu đồ 2"],a:1,why:"<b>Đúng: Nêu điểm nổi bật của cả hai.</b> Overview phải bao quát cả hai biểu đồ để thể hiện cái nhìn tổng thể."},
{q:"Lỗi thường gặp khi tả MAP là:",opts:["Dùng bị động","Chỉ liệt kê những gì có mà không nêu sự THAY ĐỔI giữa hai thời điểm","Dùng từ chỉ vị trí","Có overview"],a:1,why:"<b>Đúng: Chỉ liệt kê mà không nêu thay đổi.</b> Map so 2 thời điểm là về BIẾN ĐỔI (xây mới, phá bỏ, chuyển đổi) — chỉ tả 'có gì' mà bỏ 'thay đổi thế nào' là thiếu trọng tâm."}],
writing:[{q:"Luyện MAP. Viết một đoạn (4-5 câu tiếng Anh) mô tả sự thay đổi của một thị trấn ven biển từ 1990 đến nay, dùng ngôn ngữ thay đổi (bị động, quá khứ) và ngôn ngữ vị trí: 1990 có một làng chài nhỏ và nhiều cây; nay: khách sạn thay cho làng chài, một bến du thuyền (marina) ở phía nam, đường lớn ở phía tây, cây bị chặt bớt.",
model:"<b>Bài mẫu:</b> The two maps reveal significant changes to the coastal town between 1990 and the present day. The small fishing village that once stood on the coast was demolished and replaced by a row of large hotels. To the south, a modern marina was constructed to accommodate yachts. In addition, a major road was built along the western edge of the town to improve access. As a result of this development, many of the trees that had covered the area were cleared.<br><b>Tự kiểm tra:</b> Dùng bị động + quá khứ (was demolished, was replaced, was constructed, was built, were cleared)? Ngôn ngữ vị trí (on the coast, To the south, along the western edge)? Nhấn vào SỰ THAY ĐỔI, không chỉ liệt kê? Có câu overview mở đầu?"}]},
adv:{mcq:[
{q:"Trong process có VÒNG LẶP (cyclical, VD vòng đời), ngôn ngữ nào cần thiết?",opts:["Chỉ 'first...finally'","Ngôn ngữ chu kỳ: 'the cycle then repeats', 'returns to the beginning', 'this stage leads back to...'","Số liệu","Ý kiến"],a:1,why:"<b>Đúng: B.</b> Process dạng vòng (như vòng đời bướm, chu trình nước) không có điểm 'kết thúc' tuyệt đối. Phải dùng ngôn ngữ chu kỳ: 'the cycle repeats', 'the process begins again', 'this leads back to the first stage'. Nhận diện process tuyến tính vs chu kỳ và dùng đúng ngôn ngữ là điểm tinh tế."},
{q:"Chọn cách xử lý TABLE nhiều số liệu ở trình độ band 7:",opts:["Tả tuần tự từng ô","Xác định xu hướng bao quát và các cực trị (cao/thấp nhất) cho overview, rồi chọn số liệu TIÊU BIỂU minh họa trong body, nhóm theo logic","Chỉ tả hàng đầu tiên","Tính trung bình mọi cột"],a:1,why:"<b>Đúng: B.</b> Table là dạng dễ 'ngợp số' nhất. Band cao đòi hỏi: overview nắm bức tranh lớn (cái gì luôn cao nhất/thấp nhất, xu hướng chung), body chọn số liệu ĐẠI DIỆN (không phải mọi ô), nhóm các mục có hành vi giống nhau. Tả hết mọi ô là dấu hiệu band 5-6 (liệt kê máy móc, thiếu chọn lọc)."},
{q:"Trong map, phân biệt 'was replaced by' và 'was converted into' thế nào?",opts:["Giống hệt nhau","'replaced by' = cái cũ bị dỡ, cái mới KHÁC hẳn thế chỗ; 'converted into' = cùng công trình được CẢI TẠO thành mục đích khác","'converted' mạnh hơn","Không dùng trong map"],a:1,why:"<b>Đúng: B.</b> Sắc thái khác nhau: 'The park was replaced by a car park' (công viên bị xóa, bãi xe mới thế chỗ). 'The warehouse was converted into apartments' (chính tòa nhà kho được cải tạo thành căn hộ — công trình vẫn đó, đổi công năng). Chọn đúng động từ phản ánh chính xác loại thay đổi là dấu hiệu vốn từ chính xác."},
{q:"Với process kết hợp cả sơ đồ VÀ có yếu tố tự nhiên/nhân tạo, cách viết overview tốt là:",opts:["Chỉ đếm số bước","Nêu tổng số giai đoạn, điểm đầu-cuối, VÀ đặc điểm bao quát (VD quy trình gồm cả công đoạn tự nhiên và do con người thực hiện)","Tả bước đầu tiên chi tiết","Nêu ý kiến"],a:1,why:"<b>Đúng: B.</b> Overview process band cao không chỉ đếm bước mà còn khái quát BẢN CHẤT quy trình: tuyến tính hay chu kỳ, có mấy giai đoạn chính, bắt đầu/kết thúc ở đâu, và đặc điểm nổi bật (VD 'the process combines both natural and manufactured stages'). Cái nhìn khái quát này là điều giám khảo tìm kiếm."},
{q:"Nguyên tắc chung XUYÊN SUỐT mọi dạng Task 1 (biểu đồ, process, map, table) là gì?",opts:["Viết càng dài càng tốt","Luôn có OVERVIEW rõ ràng nêu đặc điểm nổi bật nhất, CHỌN LỌC và NHÓM thông tin thay vì liệt kê máy móc, và mô tả KHÁCH QUAN không ý kiến","Dùng thật nhiều từ khó","Luôn dùng bị động"],a:1,why:"<b>Đúng: B.</b> Dù là dạng nào, ba nguyên tắc vàng không đổi: (1) overview khái quát rõ ràng — phần ăn điểm cốt lõi; (2) chọn lọc và nhóm thông tin tiêu biểu (không 'đọc' hết dữ liệu như máy); (3) khách quan, không ý kiến/nguyên nhân. Thì và ngôn ngữ thay đổi theo dạng, nhưng ba nguyên tắc này là bất biến."}],
writing:[{q:"Viết một bài PROCESS hoàn chỉnh (150-170 từ, tiếng Anh) đủ 4 phần cho quy trình sau (dạng có yếu tố tuần tự): 'Quy trình tái chế chai nhựa: (1) chai nhựa được thu gom, (2) phân loại theo màu, (3) rửa sạch, (4) nghiền thành mảnh nhỏ, (5) nấu chảy, (6) tạo thành hạt nhựa, (7) dùng sản xuất sản phẩm mới.' Đủ: introduction (paraphrase), overview (số giai đoạn + đầu/cuối), thân bài mô tả các bước bằng BỊ ĐỘNG + từ nối trình tự.",
model:"<b>Bài mẫu (~165 từ):</b> The diagram illustrates the various stages involved in recycling plastic bottles, from initial collection to the manufacture of new products.<br><br>Overall, the process consists of seven distinct stages. It is entirely linear, beginning with the gathering of used bottles and ending with the creation of brand-new plastic items.<br><br>At the first stage, used plastic bottles are collected from households and businesses. Once gathered, they are sorted according to their colour and then thoroughly washed to remove any dirt or residue. Following this cleaning stage, the bottles are crushed into small flakes.<br><br>In the subsequent phase, these plastic flakes are melted down at high temperatures. The molten plastic is then formed into small pellets, which serve as the raw material for the final stage. Finally, these pellets are used to manufacture a range of new plastic products, thereby completing the recycling process.<br><b>Tự kiểm tra:</b> Introduction paraphrase đề? Overview nêu số giai đoạn (seven) + tuyến tính + điểm đầu/cuối? Bị động xuyên suốt (are collected, are sorted, are washed, are crushed, are melted, are formed, are used)? Từ nối trình tự đa dạng (Once, then, Following this, In the subsequent phase, Finally)? ~150-170 từ?"}]}
}},
/* ===== BÀI 47 ===== */
{id:"g47",stage:5,title:"Bài 47 · Writing Task 2 — cấu trúc bài luận & các dạng đề",
theory:`<h3>1. Task 2 là gì và vì sao quan trọng?</h3>
<p>Viết một bài LUẬN ≥250 từ trong ~40 phút, trả lời một câu hỏi/quan điểm. Task 2 chiếm điểm CAO HƠN Task 1 (khoảng 2/3 điểm Writing). Đây thường là phần quyết định band Writing.</p>
<h3>2. Nhận diện 5 DẠNG ĐỀ (đọc kỹ đề để trả lời ĐÚNG câu hỏi)</h3>
<table><tr><th>Dạng</th><th>Dấu hiệu</th><th>Nhiệm vụ</th></tr>
<tr><td>Opinion (Agree/Disagree)</td><td>"To what extent do you agree or disagree?"</td><td>Nêu và bảo vệ QUAN ĐIỂM của bạn</td></tr>
<tr><td>Discussion</td><td>"Discuss both views and give your opinion."</td><td>Bàn CẢ HAI quan điểm + nêu ý kiến mình</td></tr>
<tr><td>Problem-Solution</td><td>"What problems...? What solutions...?"</td><td>Nêu vấn đề/nguyên nhân + giải pháp</td></tr>
<tr><td>Advantages-Disadvantages</td><td>"Advantages and disadvantages?"</td><td>Phân tích lợi và hại</td></tr>
<tr><td>Two-part (Direct question)</td><td>Hai câu hỏi trực tiếp</td><td>Trả lời CẢ HAI câu hỏi</td></tr></table>
<p><b>Lỗi chết người:</b> trả lời sai dạng (VD đề hỏi 'discuss both views' mà chỉ viết ý kiến một chiều) → điểm Task Response tụt mạnh.</p>
<h3>3. Cấu trúc 4 đoạn chuẩn (an toàn cho mọi dạng)</h3>
<table><tr><th>Đoạn</th><th>Nội dung</th></tr>
<tr><td>Introduction</td><td>Paraphrase đề + nêu luận đề (thesis: câu trả lời/lập trường của bạn)</td></tr>
<tr><td>Body 1</td><td>Ý chính 1 + giải thích + ví dụ</td></tr>
<tr><td>Body 2</td><td>Ý chính 2 + giải thích + ví dụ</td></tr>
<tr><td>Conclusion</td><td>Tóm tắt lại lập trường/các ý chính (không thêm ý mới)</td></tr></table>
<h3>4. Introduction 2 câu chuẩn</h3>
<div class="example"><b>Câu 1 (paraphrase đề):</b> It is often argued that university education should be free for all students.<br><b>Câu 2 (thesis - lập trường):</b> While this policy has certain drawbacks, I firmly believe that its benefits outweigh them. / This essay will discuss both perspectives before presenting my own view.</div>
<h3>5. Conclusion — tóm không thêm mới</h3>
<div class="example"><b>In conclusion, although free education places a burden on public finances, I maintain that the long-term social benefits justify the investment.</b><br><span class="vi">Bắt đầu 'In conclusion/To sum up', nhắc lại lập trường + các ý chính, KHÔNG đưa thông tin mới.</span></div>
<p class="muted">⚠️ Sai lầm hàng đầu: (1) không đọc kỹ dạng đề → trả lời lệch; (2) thiếu thesis rõ ràng ở mở bài; (3) đề yêu cầu nêu ý kiến ('give your opinion') mà quên nêu; (4) conclusion đưa ý mới. Luôn gạch chân TỪ KHÓA đề và xác định dạng TRƯỚC khi viết.</p>`,
levels:{
basic:{mcq:[
{q:"Task 2 yêu cầu tối thiểu:",opts:["150 từ","200 từ","250 từ","300 từ"],a:2,why:"<b>Đúng: 250 từ.</b> Task 2 ≥250 từ trong ~40 phút, chiếm điểm cao hơn Task 1."},
{q:"Đề 'Discuss both views and give your opinion' yêu cầu:",opts:["Chỉ nêu ý kiến của bạn","Bàn CẢ HAI quan điểm VÀ nêu ý kiến của bạn","Chỉ bàn một quan điểm","Nêu giải pháp"],a:1,why:"<b>Đúng: Bàn cả hai + nêu ý kiến.</b> Bỏ sót một trong hai (không bàn đủ 2 view, hoặc quên nêu opinion) là mất điểm Task Response."},
{q:"Thesis statement (luận đề) nằm ở:",opts:["Kết bài","Cuối phần mở bài","Thân bài","Không cần"],a:1,why:"<b>Đúng: Cuối phần mở bài.</b> Sau khi paraphrase đề, nêu thesis (lập trường/hướng trả lời) để định hướng cả bài."},
{q:"Kết bài (conclusion) KHÔNG nên:",opts:["Tóm tắt lập trường","Nhắc lại ý chính","Đưa ý tưởng MỚI","Bắt đầu bằng 'In conclusion'"],a:2,why:"<b>Đúng: Đưa ý tưởng mới.</b> Conclusion chỉ tóm tắt; thêm ý mới gây rối và bị coi là lỗi cấu trúc."},
{q:"Việc đầu tiên cần làm khi nhận đề Task 2:",opts:["Viết ngay mở bài","Đọc kỹ, gạch từ khóa, xác định DẠNG đề","Đếm từ","Viết kết bài trước"],a:1,why:"<b>Đúng: Xác định dạng đề.</b> Trả lời sai dạng là lỗi nghiêm trọng nhất. Phải nhận diện đề hỏi gì trước khi viết."}],
writing:[{q:"Luyện nhận diện dạng đề. Với mỗi đề sau, ghi ra DẠNG và nhiệm vụ chính (tiếng Việt hoặc Anh): (1) 'Some people think children should learn a foreign language at primary school. To what extent do you agree or disagree?' (2) 'Traffic congestion is a growing problem. What are the causes and what solutions can you suggest?' (3) 'Some prefer to work for a large company, others for a small one. Discuss both views and give your opinion.'",
model:"<b>Đáp án:</b> (1) OPINION (Agree/Disagree) — nêu và bảo vệ quan điểm cá nhân về việc trẻ học ngoại ngữ ở tiểu học. (2) PROBLEM-SOLUTION (dạng cause-solution) — nêu NGUYÊN NHÂN của ùn tắc + đề xuất GIẢI PHÁP. (3) DISCUSSION — bàn cả hai lựa chọn (công ty lớn vs nhỏ) VÀ nêu ý kiến cá nhân thích cái nào hơn.<br><b>Gợi ý:</b> Nhận diện đúng dạng quyết định cấu trúc bài và bạn phải trả lời gì. Đề (2) mà quên giải pháp, hay đề (3) mà quên nêu ý kiến, sẽ mất điểm Task Response nặng dù viết hay."}]},
mid:{mcq:[
{q:"Đề hỏi 'What are the problems and solutions?'. Cấu trúc thân bài hợp lý nhất:",opts:["Body 1: vấn đề; Body 2: giải pháp","Cả 2 body nói vấn đề","Cả 2 body nói giải pháp","Chỉ 1 body"],a:0,why:"<b>Đúng: Body 1 vấn đề, Body 2 giải pháp.</b> Chia rõ mỗi body một nhiệm vụ giúp bài mạch lạc và trả lời đủ cả hai phần đề hỏi."},
{q:"Với đề Agree/Disagree, cách tiếp cận nào rõ ràng và dễ đạt band cao?",opts:["Không nêu rõ lập trường","Nêu lập trường RÕ RÀNG ngay ở mở bài và bảo vệ nhất quán suốt bài","Đổi ý giữa bài","Nêu cả hai bên bằng nhau rồi không kết luận"],a:1,why:"<b>Đúng: B.</b> Lập trường rõ, nhất quán từ mở bài đến kết bài giúp điểm Task Response và Coherence cao. Mơ hồ hoặc 'ba phải' làm giám khảo không rõ quan điểm bạn."},
{q:"Câu paraphrase đề ở mở bài KHÔNG nên:",opts:["Dùng từ đồng nghĩa","Đổi cấu trúc câu","Chép NGUYÊN VĂN đề bài","Danh từ hóa"],a:2,why:"<b>Đúng: Chép nguyên văn đề.</b> Chép lại đề không được tính vào bài và cho thấy thiếu khả năng paraphrase. Phải diễn đạt lại bằng từ/cấu trúc khác (ôn Bài 39)."},
{q:"Đề Two-part: 'Why do people move to cities? Is this a positive or negative development?' Bạn phải:",opts:["Chỉ trả lời câu 1","Chỉ trả lời câu 2","Trả lời CẢ HAI câu hỏi","Nêu giải pháp"],a:2,why:"<b>Đúng: Trả lời cả hai câu.</b> Two-part có hai câu hỏi trực tiếp; bỏ sót một câu = task không hoàn thành, mất điểm Task Response."},
{q:"Một bài lạc đề (off-topic) hoặc trả lời sai dạng đề sẽ:",opts:["Vẫn được điểm cao nếu ngữ pháp tốt","Bị giới hạn điểm Task Response nghiêm trọng dù ngôn ngữ tốt","Được cộng điểm sáng tạo","Không ảnh hưởng"],a:1,why:"<b>Đúng: B.</b> Task Response là 25% điểm và trả lời sai đề 'đóng trần' band này, kéo cả điểm Writing xuống — dù ngữ pháp/từ vựng tốt. Đọc và trả lời đúng đề là ưu tiên số một."}],
writing:[{q:"Viết phần MỞ BÀI hoàn chỉnh (2-3 câu, tiếng Anh) cho đề sau, gồm câu paraphrase đề + thesis rõ ràng: 'Some people believe that governments should spend money on public services rather than on art and culture. To what extent do you agree or disagree?'",
model:"<b>Bài mẫu:</b> It is sometimes argued that public funds ought to be directed towards essential services such as healthcare and education instead of being invested in the arts and cultural activities. While I acknowledge the vital importance of public services, I firmly disagree with the view that cultural funding should be sacrificed, as I believe both are essential for a well-rounded society. This essay will explain my position.<br><b>Tự kiểm tra:</b> Câu 1 paraphrase đề (governments spend money on public services→public funds directed towards essential services; art and culture→the arts and cultural activities) KHÔNG chép nguyên văn? Câu 2 nêu THESIS rõ ràng (lập trường disagree)? Lập trường đủ rõ để định hướng cả bài?"}]},
adv:{mcq:[
{q:"Với đề Discussion ('Discuss both views and give your opinion'), cách tổ chức nào thể hiện Task Response band 7+?",opts:["Body 1 view A, Body 2 view B, ý kiến giấu ở kết bài mơ hồ","Nêu rõ ý kiến ở mở bài; mỗi body phân tích một view một cách công bằng, đồng thời làm rõ view nào bạn nghiêng về và VÌ SAO","Chỉ viết view mình đồng ý","Viết cả hai view nhưng không nêu ý kiến"],a:1,why:"<b>Đúng: B.</b> Band 7+ đòi hỏi: bàn CẢ HAI view một cách đầy đủ, công bằng (không hời hợt một bên), VÀ nêu ý kiến rõ ràng, nhất quán (tốt nhất từ mở bài). Ý kiến phải được TÍCH HỢP và bảo vệ, không chỉ 'nhét' vào kết bài. Bàn cả hai nhưng quên/mờ ý kiến là lỗi Task Response phổ biến khiến trần band 6."},
{q:"Vì sao thesis statement rõ ràng ở mở bài lại nâng cả điểm Coherence?",opts:["Vì nó dài","Vì nó báo trước hướng đi của cả bài, giúp người đọc biết lập trường và cấu trúc — tạo tính mạch lạc tổng thể","Vì dùng từ khó","Không liên quan"],a:1,why:"<b>Đúng: B.</b> Thesis là 'kim chỉ nam' cho cả bài: nó cho giám khảo biết bạn sẽ lập luận gì và theo hướng nào. Một bài có thesis rõ, các body phát triển đúng theo thesis, và kết bài khớp thesis sẽ mạch lạc (coherent) từ đầu đến cuối. Thiếu thesis khiến bài như 'đi lạc' — ảnh hưởng cả Task Response lẫn Coherence & Cohesion."},
{q:"Một thí sinh chọn cách trả lời Agree/Disagree kiểu 'balanced' (đồng ý một phần). Rủi ro là gì và cách xử lý?",opts:["Không có rủi ro","Rủi ro là lập trường trở nên MƠ HỒ; phải nêu rõ mức độ đồng ý và bảo vệ nhất quán (VD 'I largely agree, although with one reservation')","Luôn bị điểm thấp","Phải đổi sang cực đoan hoàn toàn"],a:1,why:"<b>Đúng: B.</b> Lập trường 'cân bằng'/đồng ý một phần là HỢP LỆ và có thể đạt band cao, NHƯNG dễ trở nên mơ hồ nếu không nêu rõ. Giải pháp: định lượng lập trường ('I largely agree', 'I agree to some extent but...') và duy trì nó nhất quán. Điều giám khảo phạt không phải sự cân bằng, mà là sự KHÔNG RÕ RÀNG về lập trường."},
{q:"Trong đề Problem-Solution, giải pháp đạt band cao cần đặc điểm gì?",opts:["Càng nhiều giải pháp càng tốt, mỗi cái một câu","Ít giải pháp nhưng được PHÁT TRIỂN sâu: giải thích cách nó hoạt động và vì sao hiệu quả, liên kết trực tiếp với vấn đề đã nêu","Giải pháp chung chung như 'raise awareness'","Không cần liên kết với vấn đề"],a:1,why:"<b>Đúng: B.</b> Band cao chuộng CHIỀU SÂU hơn số lượng: một, hai giải pháp được giải thích kỹ (cơ chế hoạt động + lý do hiệu quả + có thể kèm ví dụ) và gắn TRỰC TIẾP với vấn đề/nguyên nhân đã phân tích. Liệt kê nhiều giải pháp hời hợt, chung chung ('raise awareness', 'the government should act') là dấu hiệu band 5-6 (ý không được phát triển)."},
{q:"Đề: 'In some countries, the number of people choosing to live alone is rising. What are the causes and effects?' Một bài chỉ bàn CAUSES mà bỏ EFFECTS sẽ:",opts:["Vẫn ổn nếu causes hay","Bị giới hạn Task Response nặng vì chỉ hoàn thành một nửa nhiệm vụ, dù phần causes viết tốt","Được điểm sáng tạo","Chỉ mất 0.5"],a:1,why:"<b>Đúng: B.</b> Đề yêu cầu CẢ causes VÀ effects. Bỏ hẳn một phần = task hoàn thành một nửa → Task Response bị 'đóng trần' ở band thấp bất kể chất lượng phần còn lại. Đây là lỗi 'không đọc kỹ đề' nghiêm trọng. Luôn kiểm tra bài đã trả lời ĐỦ mọi phần đề hỏi chưa."}],
writing:[{q:"Viết một DÀN Ý CHI TIẾT (bằng tiếng Anh, dạng gạch đầu dòng) cho đề Discussion sau, thể hiện bạn nắm cấu trúc và trả lời đúng dạng: 'Some people believe that studying abroad gives students the best education, while others think it is better to study in their home country. Discuss both views and give your opinion.' Dàn ý cần: thesis (ý kiến của bạn), Body 1 (view 1 + lý do + ví dụ), Body 2 (view 2 + lý do + ví dụ), conclusion.",
model:"<b>Dàn ý mẫu:</b><br><i>Introduction:</i> Paraphrase đề (studying overseas vs studying domestically). Thesis: while both options have merit, I believe studying abroad offers greater overall benefits for most students.<br><i>Body 1 — View that studying at home is better:</i> Main idea: it is more affordable and emotionally comfortable. Explanation: students avoid high tuition and living costs, and stay close to family support. Example: many students in my country attend local universities and still succeed academically while saving money.<br><i>Body 2 — View that studying abroad is better (the view I favour):</i> Main idea: it develops independence, language skills and global perspective. Explanation: living in a foreign country forces students to adapt, communicate in another language, and experience different academic cultures. Example: graduates who studied overseas often have stronger cross-cultural skills that employers value.<br><i>Conclusion:</i> Restate that although studying at home is cheaper and more comfortable, the personal and professional growth gained from studying abroad, in my view, makes it the more rewarding choice.<br><b>Tự kiểm tra:</b> Thesis nêu rõ ý kiến ngay từ đầu? Mỗi body bàn MỘT view công bằng, có lý do + ví dụ? Có làm rõ view bạn nghiêng về? Conclusion tóm tắt cả hai + nhắc lập trường, không ý mới? Trả lời ĐÚNG dạng Discussion (cả hai view + opinion)?"}]}
}}
);

LESSONS.push(
/* ===== BÀI 48 ===== */
{id:"g48",stage:5,title:"Bài 48 · Writing Task 2 — phát triển ý & lập luận",
theory:`<h3>1. Điều tách band 5-6 khỏi band 7: PHÁT TRIỂN Ý</h3>
<p>Thí sinh band 5-6 thường nêu nhiều ý nhưng nông. Band 7 nêu ÍT ý hơn nhưng PHÁT TRIỂN sâu mỗi ý. Một đoạn thân bài tốt không phải là danh sách ý — mà là MỘT ý chính được đào sâu.</p>
<h3>2. Công thức đoạn thân bài: P-E-E-L</h3>
<table><tr><th>Thành phần</th><th>Chức năng</th></tr>
<tr><td><b>P</b>oint (câu chủ đề)</td><td>Nêu ý chính của đoạn — một câu rõ ràng</td></tr>
<tr><td><b>E</b>xplain (giải thích)</td><td>Vì sao? Cơ chế hoạt động thế nào? Mở rộng ý</td></tr>
<tr><td><b>E</b>xample (ví dụ)</td><td>Minh họa cụ thể (thực tế, giả định, hoặc số liệu)</td></tr>
<tr><td><b>L</b>ink (liên kết)</td><td>Chốt lại, nối về luận đề/câu hỏi</td></tr></table>
<div class="example"><b>Point:</b> One major benefit of public transport is the reduction of traffic congestion.<br><b>Explain:</b> When more people travel by bus or train instead of private cars, the total number of vehicles on the road decreases significantly, which eases the flow of traffic during peak hours.<br><b>Example:</b> For instance, after Seoul expanded its metro system, the city reported a noticeable drop in road congestion and commuting times.<br><b>Link:</b> This demonstrates how investment in public transport can directly improve urban mobility.</div>
<h3>3. Kỹ thuật ĐÀO SÂU một ý (đặt câu hỏi 'Tại sao? Rồi sao?')</h3>
<p>Sau mỗi câu, tự hỏi 'Why? So what? How?' để kéo dài chuỗi lập luận:</p>
<div class="example">Online learning is convenient. <b>(Why does that matter?)</b> → It allows people to study anytime, anywhere. <b>(So what?)</b> → This means working adults can gain new qualifications without leaving their jobs. <b>(Result?)</b> → As a result, more people can improve their careers, benefiting the wider economy.</div>
<h3>4. Ví dụ tốt trông thế nào?</h3>
<p>Ví dụ KHÔNG cần là số liệu thật (không ai kiểm chứng). Có thể là: tình huống thực tế phổ biến, kinh nghiệm chung, hoặc giả định hợp lý ('For example, a student who...'). Quan trọng là nó MINH HỌA đúng ý và cụ thể, không chung chung.</p>
<h3>5. Tư duy phản biện (nâng lên band 7-8)</h3>
<p>Thừa nhận mặt đối lập rồi phản bác (concession + rebuttal) làm lập luận sắc bén: 'Although some argue that X, this view overlooks the fact that Y.' Cho thấy bạn cân nhắc nhiều góc độ.</p>
<p class="muted">⚠️ Lỗi phổ biến: (1) 'liệt kê ý' — mỗi câu một ý mới, không đào sâu cái nào; (2) ví dụ chung chung ('for example, many people...'); (3) đoạn không có câu chủ đề rõ; (4) lạc khỏi ý chính giữa chừng. Nhớ: MỘT ý chính/đoạn, đào thật sâu.</p>`,
levels:{
basic:{mcq:[
{q:"Điều tách band 7 khỏi band 5-6 trong Task 2 chủ yếu là:",opts:["Viết nhiều ý hơn","Phát triển SÂU mỗi ý (ít nhưng sâu)","Dùng từ khó","Viết dài hơn"],a:1,why:"<b>Đúng: Phát triển sâu mỗi ý.</b> Band 7 nêu ít ý nhưng đào sâu (giải thích + ví dụ), thay vì liệt kê nhiều ý nông."},
{q:"'P' trong công thức P-E-E-L là:",opts:["Paragraph","Point (câu chủ đề)","Practice","Plan"],a:1,why:"<b>Đúng: Point.</b> Point = câu chủ đề nêu ý chính của đoạn, đặt đầu đoạn."},
{q:"Mỗi đoạn thân bài nên tập trung vào:",opts:["Nhiều ý chính","MỘT ý chính được đào sâu","Không ý nào cụ thể","Chỉ ví dụ"],a:1,why:"<b>Đúng: MỘT ý chính.</b> Một đoạn = một ý chính + giải thích + ví dụ. Nhồi nhiều ý làm đoạn nông và rối."},
{q:"Ví dụ trong Task 2:",opts:["Bắt buộc là số liệu thật","Có thể là tình huống thực tế phổ biến hoặc giả định hợp lý, miễn cụ thể","Không được dùng","Phải trích nghiên cứu"],a:1,why:"<b>Đúng: B.</b> Ví dụ không cần số liệu thật; có thể là tình huống chung/giả định hợp lý, miễn MINH HỌA đúng ý và cụ thể."},
{q:"Để đào sâu một ý, bạn tự hỏi:",opts:["Bao nhiêu từ?","'Why? So what? How?' để kéo dài chuỗi lập luận","Đề dài không?","Còn bao lâu?"],a:1,why:"<b>Đúng: 'Why? So what? How?'.</b> Đặt các câu hỏi này sau mỗi câu giúp mở rộng và làm sâu lập luận."}],
writing:[{q:"Luyện đào sâu MỘT ý. Cho câu chủ đề: 'Working from home improves employees' work-life balance.' Hãy phát triển thành đoạn hoàn chỉnh (4-5 câu tiếng Anh) theo P-E-E-L: giải thích VÌ SAO, cho một ví dụ, và chốt lại.",
model:"<b>Bài mẫu:</b> Working from home significantly improves employees' work-life balance. (Point) This is mainly because remote work eliminates the daily commute, giving people several extra hours each day to spend on family, exercise or rest. (Explain) For example, a parent who previously spent two hours travelling to the office can now use that time to take their children to school and share meals with them. (Example) Consequently, employees who work remotely often feel less stressed and more satisfied with their overall quality of life. (Link)<br><b>Tự kiểm tra:</b> Có câu chủ đề rõ (Point)? Có giải thích VÌ SAO/cơ chế (Explain)? Có ví dụ cụ thể (Example)? Có câu chốt nối lại ý (Link)? Cả đoạn xoay quanh MỘT ý (work-life balance), không lạc sang ý khác?"}]},
mid:{mcq:[
{q:"Đoạn nào thể hiện PHÁT TRIỂN ý tốt hơn?",opts:["Online shopping is cheap, convenient, fast, popular, and easy.","Online shopping is convenient because it allows people to buy products anytime without travelling, which saves time for busy workers.","Online shopping exists. People use it. It is modern.","Shopping online is good and bad."],a:1,why:"<b>Đúng: B.</b> B lấy MỘT ý (convenient) và đào sâu (vì sao → kết quả). A chỉ liệt kê tính từ không phát triển; C, D quá nông. Chiều sâu thắng số lượng."},
{q:"Câu chủ đề (topic sentence) tốt nên:",opts:["Rất dài và nhiều ý","Nêu rõ MỘT ý chính của đoạn, ngắn gọn","Là một ví dụ","Là câu hỏi"],a:1,why:"<b>Đúng: B.</b> Câu chủ đề nêu rõ một ý chính, định hướng cả đoạn. Người đọc biết ngay đoạn sẽ nói về gì."},
{q:"Kỹ thuật concession + rebuttal ('Although some argue X, this overlooks Y') giúp:",opts:["Làm bài dài","Thể hiện tư duy phản biện, cân nhắc nhiều góc độ → nâng band","Gây rối","Giảm điểm"],a:1,why:"<b>Đúng: B.</b> Thừa nhận mặt đối lập rồi phản bác cho thấy bạn xét nhiều góc độ và bảo vệ lập trường sắc bén — dấu hiệu band 7-8."},
{q:"Ví dụ nào CỤ THỂ và hiệu quả hơn?",opts:["For example, many people do this.","For example, a university graduate who learns coding online can double their salary within two years.","For example, it is good.","For example, some countries."],a:1,why:"<b>Đúng: B.</b> B cụ thể (ai, làm gì, kết quả gì). A, C, D chung chung, không minh họa rõ. Ví dụ càng cụ thể càng thuyết phục."},
{q:"'Online learning is flexible.' Câu tiếp theo nào ĐÀO SÂU tốt nhất?",opts:["Online learning is also cheap.","This flexibility means students can study around their work schedules, making education accessible to those who cannot attend fixed classes.","Many people learn online.","Flexibility is good."],a:1,why:"<b>Đúng: B.</b> B mở rộng chính ý 'flexible' (flexibility → kết quả cụ thể). A nhảy sang ý MỚI (cheap); C, D không phát triển. Đào sâu = ở lại và mở rộng cùng một ý."}],
writing:[{q:"Viết một đoạn thân bài HOÀN CHỈNH (5-6 câu tiếng Anh) theo P-E-E-L cho luận điểm sau, có dùng kỹ thuật concession + rebuttal: 'Governments should invest more in renewable energy.' Đoạn phải đào sâu MỘT ý chính, có ví dụ cụ thể, và thừa nhận-phản bác một ý đối lập.",
model:"<b>Bài mẫu:</b> Investing in renewable energy is essential for long-term environmental sustainability. By shifting away from fossil fuels towards sources such as solar and wind, governments can dramatically reduce the carbon emissions responsible for climate change. For instance, countries like Denmark now generate a large share of their electricity from wind power, significantly lowering their environmental impact while creating thousands of green jobs. Although some argue that renewable energy is too expensive to develop, this view overlooks the fact that the costs of solar and wind technology have fallen sharply in recent years and continue to decline. In the long run, therefore, the initial investment is far outweighed by both the environmental and economic benefits. This clearly shows why prioritising renewable energy is a wise decision for any forward-thinking government.<br><b>Tự kiểm tra:</b> Câu chủ đề rõ (Point)? Giải thích cơ chế (Explain)? Ví dụ cụ thể (Denmark)? Có concession + rebuttal ('Although some argue...this overlooks...')? Câu chốt (Link)? Cả đoạn xoay quanh MỘT ý (sustainability)?"}]},
adv:{mcq:[
{q:"Vì sao 'liệt kê nhiều ý nông' lại đóng trần band Task Response ở 6?",opts:["Vì viết ngắn","Vì band 7+ yêu cầu ý được PHÁT TRIỂN và MỞ RỘNG đầy đủ ('extended and supported'); liệt kê không phát triển = ý chưa được hỗ trợ đủ","Vì dùng từ dễ","Vì không có kết bài"],a:1,why:"<b>Đúng: B.</b> Mô tả band 7 Task Response yêu cầu các ý chính 'extended and supported' (được mở rộng và hỗ trợ). Liệt kê hàng loạt ý mà không cái nào được giải thích/minh họa đầy đủ khiến các ý 'underdeveloped' — đặc điểm điển hình của band 6. Chiều sâu lập luận, không phải số lượng ý, mới nâng Task Response."},
{q:"Chuỗi lập luận band 8 khác band 7 chủ yếu ở:",opts:["Số từ nối","Độ SÂU và LOGIC của chuỗi nhân-quả: mỗi bước dẫn dắt hợp lý đến bước sau, đi đến hệ quả sâu xa, không hời hợt","Số ví dụ","Độ dài câu"],a:1,why:"<b>Đúng: B.</b> Band 8 thể hiện lập luận được phát triển qua chuỗi logic chặt: A dẫn đến B, B dẫn đến C, đi đến một hệ quả có chiều sâu (thường là tác động rộng hơn: kinh tế, xã hội, dài hạn). Band 7 phát triển ý đủ nhưng nông hơn; band 8 'kéo' lập luận xa hơn và tinh vi hơn, cho thấy tư duy sắc sảo."},
{q:"Ví dụ trong Task 2 band cao nên tránh điều gì?",opts:["Sự cụ thể","Bịa số liệu/nghiên cứu giả gây phản tác dụng ('Studies show 87%...' không có thật); nên dùng ví dụ hợp lý, đáng tin thay vì số liệu ngụy tạo","Ví dụ giả định","Tình huống thực tế"],a:1,why:"<b>Đúng: B.</b> Bịa số liệu/nghiên cứu cụ thể ('A 2019 Harvard study found 73%...') không tăng điểm và có thể phản tác dụng vì thiếu tự nhiên/không đáng tin. Ví dụ tốt là tình huống hợp lý, cụ thể, đáng tin (một xu hướng có thật, một tình huống điển hình) — sức thuyết phục đến từ tính logic và cụ thể, không phải con số ngụy tạo."},
{q:"Kỹ thuật 'concession + rebuttal' đạt hiệu quả cao nhất khi:",opts:["Chỉ thừa nhận mà không phản bác","Thừa nhận ý đối lập một cách CÔNG BẰNG rồi phản bác bằng lý lẽ THUYẾT PHỤC, cho thấy bạn đã cân nhắc kỹ và vẫn giữ vững lập trường","Bỏ qua ý đối lập","Đồng ý hoàn toàn với ý đối lập"],a:1,why:"<b>Đúng: B.</b> Concession-rebuttal mạnh khi: (1) thừa nhận ý đối lập một cách công bằng, nghiêm túc (không dựng 'bù nhìn rơm' dễ đánh), (2) phản bác bằng lý lẽ vững, (3) qua đó CỦNG CỐ lập trường của mình. Nó thể hiện tư duy phản biện chín chắn — bạn hiểu cả hai phía nhưng có lý do vững để chọn phía mình. Thừa nhận suông mà không phản bác lại làm yếu lập trường."},
{q:"Một đoạn thân bài 'đi lạc' (bắt đầu ý A, giữa chừng chuyển sang ý B) ảnh hưởng tiêu chí nào nhất?",opts:["Chỉ Lexical Resource","Coherence & Cohesion (và Task Response): đoạn thiếu tính thống nhất (unity), người đọc mất mạch, ý không được phát triển trọn vẹn","Chỉ Grammar","Không ảnh hưởng"],a:1,why:"<b>Đúng: B.</b> Mỗi đoạn cần TÍNH THỐNG NHẤT (một ý xuyên suốt). Đoạn 'trôi dạt' sang ý khác giữa chừng phá vỡ mạch logic (Coherence & Cohesion) và khiến cả hai ý đều không được phát triển đầy đủ (Task Response). Band cao đòi hỏi mỗi đoạn có một câu chủ đề rõ và mọi câu sau đều phục vụ, phát triển ý đó."}],
writing:[{q:"Viết một đoạn thân bài BAND 8 (6-8 câu tiếng Anh) cho luận điểm dưới đây, thể hiện: câu chủ đề sắc bén, chuỗi lập luận nhân-quả có CHIỀU SÂU (đi đến hệ quả xã hội/kinh tế rộng), một ví dụ cụ thể đáng tin, và concession + rebuttal tinh tế. Luận điểm: 'Free access to university education benefits society as a whole.'",
model:"<b>Bài mẫu:</b> Providing free university education yields benefits that extend far beyond the individual student to society at large. When higher education is made accessible regardless of financial background, a wider pool of talented individuals is able to acquire advanced skills and qualifications. This, in turn, produces a more skilled workforce capable of driving innovation and economic growth, which ultimately raises living standards across the entire population. Countries such as Germany, where public universities charge little or no tuition, have cultivated highly educated citizens who contribute significantly to their advanced economies. Admittedly, critics contend that free education imposes an unsustainable burden on taxpayers, and this concern is not without merit. However, this argument fails to account for the long-term returns: a better-educated population generates higher tax revenues, relies less on social welfare, and fuels the industries of the future. Viewed in this light, free university education is not merely an expense but a strategic investment whose social dividends far exceed its initial cost.<br><b>Tự kiểm tra:</b> Câu chủ đề nêu rõ ý (lợi ích cho cả xã hội)? Chuỗi nhân-quả CÓ CHIỀU SÂU (giáo dục → lực lượng lao động → tăng trưởng → mức sống)? Ví dụ cụ thể (Germany)? Concession công bằng ('this concern is not without merit') + rebuttal thuyết phục ('However, this argument fails to account for...')? Hệ quả rộng (kinh tế, xã hội, dài hạn)?"}]}
}},
/* ===== BÀI 49 ===== */
{id:"g49",stage:5,title:"Bài 49 · Speaking — chiến thuật Part 1, 2, 3",
theory:`<h3>1. Cấu trúc phần Nói (11-14 phút, phỏng vấn trực tiếp với giám khảo)</h3>
<table><tr><th>Phần</th><th>Thời gian</th><th>Nội dung</th></tr>
<tr><td>Part 1</td><td>4-5 phút</td><td>Hỏi về bản thân, chủ đề quen thuộc (nhà, sở thích, công việc, quê)</td></tr>
<tr><td>Part 2</td><td>3-4 phút</td><td>Cue card: nói 1-2 phút về một chủ đề, có 1 phút chuẩn bị</td></tr>
<tr><td>Part 3</td><td>4-5 phút</td><td>Thảo luận sâu, trừu tượng liên quan chủ đề Part 2</td></tr></table>
<h3>2. Bốn tiêu chí chấm Speaking (mỗi cái 25%)</h3>
<ul>
<li><b>Fluency & Coherence:</b> nói trôi chảy, mạch lạc, ít ngập ngừng</li>
<li><b>Lexical Resource:</b> vốn từ đa dạng, chính xác, có collocation/idiom</li>
<li><b>Grammatical Range & Accuracy:</b> đa dạng cấu trúc, ít lỗi</li>
<li><b>Pronunciation:</b> phát âm rõ, có ngữ điệu, trọng âm đúng</li>
</ul>
<h3>3. Part 1 — chiến thuật: MỞ RỘNG câu trả lời</h3>
<p>Đừng trả lời cụt lủn 'Yes' hoặc một câu. Dùng công thức <b>Trả lời + Lý do + Chi tiết/Ví dụ</b>:</p>
<div class="example"><b>Hỏi:</b> Do you like cooking?<br><b>Cụt (kém):</b> Yes, I do.<br><b>Tốt:</b> Yes, I really enjoy cooking, especially on weekends. It helps me relax after a busy week, and I love experimenting with new recipes — recently I've been trying to master Vietnamese dishes like phở.</div>
<h3>4. Part 2 — chiến thuật cue card</h3>
<p>Có 1 phút chuẩn bị + giấy ghi. Cue card có các gợi ý (bullet). Chiến thuật:</p>
<ul>
<li>Ghi nhanh TỪ KHÓA cho mỗi bullet (không viết câu đầy đủ).</li>
<li>Bám các bullet làm dàn ý, nhưng thêm chi tiết, cảm xúc, câu chuyện.</li>
<li>Nói ĐỦ 1-2 phút — luyện để không hụt hơi sớm. Dùng phần mở đầu ('I'd like to talk about...') và kết ('So that's why this... is memorable to me').</li>
</ul>
<h3>5. Part 3 — chiến thuật thảo luận sâu</h3>
<p>Câu hỏi trừu tượng, cần lập luận. Dùng cấu trúc: <b>nêu quan điểm + lý do + ví dụ + (nhìn hai mặt)</b>. Ngôn ngữ hữu ích:</p>
<div class="example"><b>Nêu ý:</b> I would say that... / In my opinion...<br><b>Cân nhắc:</b> On the one hand... on the other hand... / It depends on...<br><b>Suy đoán:</b> It's likely that... / This could lead to...<br><b>So sánh quá khứ-nay:</b> In the past..., whereas nowadays...</div>
<p class="muted">⚠️ Sai lầm: (1) trả lời cụt ở Part 1; (2) học thuộc bài mẫu (giám khảo nhận ra ngay, phản tác dụng); (3) im lặng lâu khi bí — thà dùng câu 'câu giờ' tự nhiên ('That's an interesting question, let me think...') còn hơn im bặt; (4) nói quá nhanh khiến phát âm không rõ. Trôi chảy TỰ NHIÊN quan trọng hơn hoàn hảo.</p>`,
levels:{
basic:{mcq:[
{q:"Phần Nói có mấy phần?",opts:["Hai","Ba","Bốn","Một"],a:1,why:"<b>Đúng: Ba.</b> Part 1 (chủ đề quen thuộc), Part 2 (cue card), Part 3 (thảo luận sâu)."},
{q:"Ở Part 2, bạn có bao nhiêu thời gian chuẩn bị?",opts:["30 giây","1 phút","2 phút","Không có"],a:1,why:"<b>Đúng: 1 phút.</b> Có 1 phút chuẩn bị + giấy ghi, sau đó nói 1-2 phút."},
{q:"Ở Part 1, câu hỏi 'Do you like music?' nên trả lời:",opts:["Yes.","Yes, và mở rộng bằng lý do + chi tiết","No comment","Một từ"],a:1,why:"<b>Đúng: Mở rộng.</b> Dùng công thức Trả lời + Lý do + Chi tiết. Trả lời cụt làm mất điểm Fluency."},
{q:"Có nên học thuộc lòng câu trả lời mẫu không?",opts:["Nên, càng nhiều càng tốt","KHÔNG — giám khảo nhận ra ngay và điều đó phản tác dụng","Chỉ Part 2","Bắt buộc"],a:1,why:"<b>Đúng: KHÔNG.</b> Bài học thuộc nghe máy móc, thiếu tự nhiên. Giám khảo được huấn luyện nhận ra và điều đó hạ điểm."},
{q:"Khi bí ý ở Part 3, tốt hơn là:",opts:["Im lặng lâu","Dùng câu 'câu giờ' tự nhiên ('That's a good question, let me think...')","Bỏ cuộc","Nói tiếng Việt"],a:1,why:"<b>Đúng: Dùng câu câu giờ tự nhiên.</b> Giữ mạch nói còn hơn im bặt. Các cụm này rất tự nhiên và giúp bạn có thời gian nghĩ."}],
writing:[{q:"Luyện MỞ RỘNG câu trả lời Part 1. Viết câu trả lời đầy đủ (tiếng Anh, 3-4 câu mỗi câu hỏi) theo công thức Trả lời + Lý do + Chi tiết cho: (1) Where are you from? (2) Do you prefer tea or coffee?",
model:"<b>Bài mẫu:</b><br>(1) I'm from a small town in northern Vietnam, not far from Hanoi. It's a fairly quiet place surrounded by rice fields, which makes it very peaceful compared to the big cities. Although it's small, I really appreciate the strong sense of community there — everyone seems to know each other.<br>(2) I'd definitely say coffee, especially Vietnamese iced coffee with condensed milk. I usually have a cup every morning because it helps me feel alert and ready for the day. In fact, coffee culture is a big part of daily life where I live, so meeting friends at a café is one of my favourite things to do.<br><b>Tự kiểm tra:</b> Mỗi câu có Trả lời trực tiếp + Lý do + Chi tiết/ví dụ cụ thể? Nghe TỰ NHIÊN (không học thuộc máy móc)? Có dùng chi tiết cá nhân, cụ thể (northern Vietnam, iced coffee with condensed milk)?"}]},
mid:{mcq:[
{q:"Trong 1 phút chuẩn bị Part 2, bạn nên:",opts:["Viết câu đầy đủ để đọc","Ghi TỪ KHÓA cho mỗi bullet làm dàn ý","Không ghi gì","Viết cả bài"],a:1,why:"<b>Đúng: Ghi từ khóa.</b> Từ khóa làm dàn ý giúp bạn nói tự nhiên; viết câu đầy đủ để đọc khiến giọng máy móc và không kịp."},
{q:"Nếu nói hết ý trước khi hết 2 phút ở Part 2, bạn nên:",opts:["Dừng lại im lặng","Mở rộng thêm: cảm xúc, chi tiết, so sánh, hoặc vì sao nó quan trọng với bạn","Nói lại từ đầu","Xin đề khác"],a:1,why:"<b>Đúng: Mở rộng thêm.</b> Thêm cảm xúc, chi tiết, ý nghĩa cá nhân để lấp đủ thời gian. Luyện 'kéo dài' ý là kỹ năng quan trọng của Part 2."},
{q:"Part 3 câu hỏi trừu tượng ('Why do people value fame?') cần:",opts:["Trả lời một từ","Lập luận: quan điểm + lý do + ví dụ, có thể nhìn hai mặt","Kể chuyện cá nhân dài","Nói 'I don't know'"],a:1,why:"<b>Đúng: Lập luận.</b> Part 3 đòi hỏi tư duy: nêu quan điểm, giải thích, cho ví dụ, cân nhắc nhiều góc. Đây là nơi thể hiện vốn từ và ngữ pháp cao cấp."},
{q:"Cụm nào hữu ích để cân nhắc hai mặt ở Part 3?",opts:["Yes and no","On the one hand... on the other hand...","I like it","Maybe"],a:1,why:"<b>Đúng: On the one hand... on the other hand...</b> Cụm này giúp trình bày hai góc nhìn mạch lạc, thể hiện tư duy cân bằng và ngữ pháp tốt."},
{q:"Ngập ngừng tự nhiên ('well', 'you know', 'I mean') dùng vừa phải thì:",opts:["Luôn bị trừ điểm nặng","Là bình thường và tự nhiên trong lời nói; vấn đề chỉ khi ngập ngừng QUÁ NHIỀU làm gián đoạn mạch","Bị cấm","Phải tránh hoàn toàn"],a:1,why:"<b>Đúng: B.</b> Người bản ngữ cũng dùng filler tự nhiên. Chỉ khi ngập ngừng/lặp/tự sửa QUÁ NHIỀU mới hạ điểm Fluency. Mục tiêu là trôi chảy tự nhiên, không phải hoàn hảo như robot."}],
writing:[{q:"Luyện Part 2. Viết bài nói (tiếng Anh, khoảng 180-220 từ, đủ nói 1.5-2 phút) cho cue card: 'Describe a skill you would like to learn. You should say: what the skill is; why you want to learn it; how you would learn it; and explain how this skill would benefit you.' Bám các bullet nhưng thêm chi tiết và cảm xúc.",
model:"<b>Bài mẫu (~205 từ):</b> I'd like to talk about a skill I've always wanted to master, which is public speaking. It's the ability to present ideas confidently and clearly in front of an audience, and it's something I've admired in others for a long time.<br>The main reason I want to learn this skill is that I often feel nervous when speaking in front of groups, even though I usually have good ideas to share. At work, I sometimes have to present reports to my colleagues, and I know that becoming a more confident speaker would help me communicate much more effectively.<br>As for how I would learn it, I think the best approach would be a combination of practice and feedback. I'd probably join a local speaking club, where I could practise regularly in a supportive environment, and I might also watch videos of skilled speakers to learn techniques such as body language and pacing.<br>Ultimately, this skill would benefit me in many ways. Not only would it boost my confidence at work, but it would also help me in everyday situations, from job interviews to social events. That's why public speaking is a skill I'm genuinely determined to develop.<br><b>Tự kiểm tra:</b> Có mở đầu ('I'd like to talk about...') và kết ('That's why...')? Bám ĐỦ 4 bullet (what/why/how/benefit)? Thêm chi tiết, cảm xúc cá nhân? Đủ dài cho 1.5-2 phút? Có cấu trúc đa dạng (Not only...but also, even though) và collocation (boost my confidence)?"}]},
adv:{mcq:[
{q:"Điều gì phân biệt câu trả lời Part 3 band 8 với band 6.5?",opts:["Nói nhanh hơn","Lập luận trừu tượng sâu, ngôn ngữ suy đoán/giả định linh hoạt, ví dụ tinh tế, và khả năng khai triển ý một cách tự nhiên không gượng","Trả lời ngắn","Dùng từ vựng đơn giản"],a:1,why:"<b>Đúng: B.</b> Part 3 band 8 thể hiện: tư duy trừu tượng (bàn về xu hướng xã hội, giả định 'what if'), ngôn ngữ linh hoạt (suy đoán 'this might well lead to', nhượng bộ 'admittedly'), lập luận phát triển tự nhiên và mạch lạc, ví dụ sắc. Không phải nói nhanh hay dùng từ 'kêu', mà là chiều sâu tư duy + sự tự nhiên khi diễn đạt."},
{q:"Về Fluency band 8, đặc điểm quan trọng nhất là:",opts:["Nói không bao giờ ngừng","Nói trôi chảy, mạch lạc với rất ít nỗ lực rõ rệt; ngập ngừng (nếu có) là để tìm Ý chứ không phải tìm TỪ/ngữ pháp","Nói thật nhanh","Không dùng filler"],a:1,why:"<b>Đúng: B.</b> Mô tả Fluency band 8: nói trôi chảy với rất ít sự do dự đáng kể; khi ngừng, đó là để suy nghĩ về NỘI DUNG (giống người bản ngữ cân nhắc ý), không phải vì bí TỪ hay VẬT LỘN với ngữ pháp. Trôi chảy không có nghĩa nói liên tục không nghỉ, mà là mạch nói tự nhiên, không bị 'kẹt' vì ngôn ngữ."},
{q:"Chiến thuật dùng idiom/collocation trong Speaking band cao nên như thế nào?",opts:["Nhồi càng nhiều idiom càng tốt","Dùng idiom/collocation TỰ NHIÊN, đúng ngữ cảnh và vừa phải; dùng sai hoặc nhồi nhét gượng ép còn hại hơn không dùng","Tránh hoàn toàn idiom","Chỉ dùng idiom hiếm"],a:1,why:"<b>Đúng: B.</b> Lexical Resource band 7-8 yêu cầu dùng 'less common and idiomatic vocabulary' nhưng phải CHÍNH XÁC và tự nhiên. Nhồi idiom gượng ('It's raining cats and dogs' trong ngữ cảnh không hợp) hoặc dùng sai làm lộ điểm yếu. Mục tiêu: vài cụm idiomatic/collocation đắt giá, đúng chỗ, tự nhiên — chất lượng hơn số lượng."},
{q:"Về Pronunciation band 8, yếu tố nào quan trọng hơn 'giọng bản ngữ hoàn hảo'?",opts:["Phải có giọng Anh/Mỹ","Sự RÕ RÀNG và các đặc điểm ngữ âm (trọng âm từ/câu, ngữ điệu, nối âm, nhịp) được dùng hiệu quả để truyền đạt nghĩa; accent không phải vấn đề nếu dễ hiểu","Nói không có accent","Nói thật chậm"],a:1,why:"<b>Đúng: B.</b> IELTS KHÔNG yêu cầu giọng bản ngữ. Pronunciation band 8 đánh giá việc dùng hiệu quả các đặc điểm ngữ âm (trọng âm, ngữ điệu, nhịp điệu, nối âm) để truyền đạt nghĩa rõ ràng, và người nghe dễ hiểu xuyên suốt. Một người nói tiếng Anh với accent Việt vẫn có thể đạt band 8 nếu rõ ràng, có ngữ điệu tốt và dễ hiểu. Đừng ám ảnh 'xóa accent'."},
{q:"Vì sao học thuộc bài mẫu dài lại RỦI RO cao ở band cao?",opts:["Vì tốn thời gian","Vì giọng đọc thuộc lòng nghe khác hẳn lời nói tự nhiên (nhịp, ngữ điệu bất thường), giám khảo phát hiện và có thể hạ điểm Fluency/đánh giá là không đáng tin","Vì bài mẫu sai","Vì không được phép có ý tưởng trước"],a:1,why:"<b>Đúng: B.</b> Lời nói học thuộc có 'dấu vân tay' rõ: nhịp điệu đều bất thường, ngữ điệu 'đọc' thay vì 'nói', và thường lệch khỏi câu hỏi thực tế. Giám khảo được huấn luyện nhận ra và điều này hạ điểm Fluency & Coherence (vì nó không phải giao tiếp thật). Chuẩn bị Ý TƯỞNG và cụm từ linh hoạt thì tốt; học thuộc cả đoạn thì phản tác dụng."}],
writing:[{q:"Viết câu trả lời Part 3 BAND 8 (tiếng Anh, 6-8 câu) cho câu hỏi trừu tượng sau, thể hiện: lập luận sâu, ngôn ngữ suy đoán/nhượng bộ linh hoạt, nhìn nhiều góc, ví dụ tinh tế, và diễn đạt tự nhiên. Câu hỏi: 'Do you think technology has made people more or less connected to each other?'",
model:"<b>Bài mẫu:</b> That's a really thought-provoking question, and I'd say it's genuinely a double-edged sword. On the surface, technology has undoubtedly brought people closer together — we can now instantly connect with friends and family across the globe, which would have been unimaginable a few decades ago. Having said that, I think there's a strong argument that this connection is often quite superficial. People might have hundreds of online 'friends', yet feel increasingly isolated in their day-to-day lives, largely because face-to-face interaction has been replaced by screens. A good example is how families sometimes sit together at dinner but spend the whole time absorbed in their phones rather than talking. So while technology has certainly expanded the reach of our connections, it may well have weakened their depth. Ultimately, I suspect it comes down to how consciously people choose to use it, rather than the technology itself being inherently good or bad.<br><b>Tự kiểm tra:</b> Có nhìn nhiều góc (On the surface... Having said that...)? Ngôn ngữ suy đoán/nhượng bộ linh hoạt (undoubtedly, it may well have, I suspect, largely because)? Lập luận sâu (kết nối rộng nhưng nông)? Ví dụ tinh tế (bữa tối)? Diễn đạt tự nhiên (double-edged sword, it comes down to)? Kết luận cân nhắc?"}]}
