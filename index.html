/* ===== BÀI 70 ===== */
{id:"g70",stage:7,title:"Bài 70 · Tổng kết toàn khóa & duy trì tiếng Anh lâu dài",
theory:`<h3>1. Hành trình 70 bài — bạn đã đi qua những gì</h3>
<p>Từ nền tảng đến band 9, khóa học đã dẫn bạn qua 7 chặng:</p>
<table><tr><th>Chặng</th><th>Nội dung</th></tr>
<tr><td>1 — Ngữ pháp nền tảng A1</td><td>Thì cơ bản, câu, danh/động/tính từ (Bài 1-10)</td></tr>
<tr><td>2 — Ngữ pháp A2</td><td>Thì mở rộng, so sánh, modal, câu ghép (Bài 11-20)</td></tr>
<tr><td>3 — Ngữ pháp B1</td><td>Hoàn thành, bị động, mệnh đề quan hệ, điều kiện, tường thuật (Bài 21-30)</td></tr>
<tr><td>4 — B2 + từ vựng học thuật</td><td>Tương phản, đảo ngữ, câu chẻ, collocation, paraphrase (Bài 31-40)</td></tr>
<tr><td>5 — Kỹ năng IELTS</td><td>Chiến thuật 4 kỹ năng, dạng câu hỏi, cấu trúc bài (Bài 41-50)</td></tr>
<tr><td>6 — Tinh luyện 7.0→8.5</td><td>4 tiêu chí band 8, sửa lỗi, band 8 cả 4 kỹ năng (Bài 51-60)</td></tr>
<tr><td>7 — Về đích 9.0</td><td>Chuẩn band 9, độ chính xác tuyệt đối, ngày thi (Bài 61-70)</td></tr></table>
<h3>2. Những nguyên lý xuyên suốt cần nhớ mãi</h3>
<ul>
<li><b>Chính xác + tự nhiên hơn phô trương:</b> dùng đúng từ/cấu trúc cho đúng ý, tự nhiên — không 'kêu'.</li>
<li><b>Chiều sâu hơn số lượng:</b> ít ý đào sâu > nhiều ý nông (Writing/Speaking).</li>
<li><b>Nỗ lực đúng hướng hơn khối lượng:</b> chẩn đoán nút thắt, luyện trúng đích, phân tích lỗi.</li>
<li><b>Tiếp xúc sâu, lâu dài:</b> sự tự nhiên và band cao đến từ 'sống' trong tiếng Anh, không từ mẹo.</li>
</ul>
<h3>3. Sau kỳ thi: đừng để tiếng Anh 'nguội'</h3>
<p>Kỹ năng ngôn ngữ MAI MỘT nếu không dùng. Dù đạt mục tiêu, hãy duy trì để giữ và tiếp tục nâng cao — đặc biệt nếu bạn sẽ dùng tiếng Anh để học/làm việc.</p>
<h3>4. Cách DUY TRÌ & phát triển tiếng Anh lâu dài</h3>
<ul>
<li><b>Biến tiếng Anh thành thói quen đời sống:</b> đọc tin/sách tiếng Anh, nghe podcast, xem phim không phụ đề — về chủ đề bạn THÍCH (bền vững hơn 'học' gượng ép).</li>
<li><b>Dùng để giao tiếp thật:</b> viết, nói với người khác, tham gia cộng đồng — ngôn ngữ sống qua sử dụng.</li>
<li><b>Học liên tục qua nội dung thật:</b> ghi từ/cụm mới gặp trong ngữ cảnh, không học danh sách khô.</li>
<li><b>Đặt mục tiêu mới:</b> đọc một cuốn sách tiếng Anh, viết blog, thuyết trình — mục tiêu giữ động lực.</li>
</ul>
<h3>5. Lời kết</h3>
<p>Tiếng Anh không phải một 'kỳ thi để vượt qua' mà một KỸ NĂNG SUỐT ĐỜI mở ra tri thức, cơ hội và kết nối toàn cầu. IELTS chỉ là một cột mốc. Điều bạn thực sự xây được — khả năng hiểu, diễn đạt, tư duy bằng tiếng Anh — sẽ phục vụ bạn mãi. Chúc bạn tự tin chinh phục mục tiêu và tiếp tục hành trình!</p>
<p class="muted">🎓 Bạn đã hoàn thành toàn bộ 70 bài của khóa học. Hãy tự hào về hành trình này. Ngôn ngữ là món quà bạn tự trao cho mình — và nó sẽ tiếp tục lớn lên chừng nào bạn còn nuôi dưỡng nó. Good luck, and keep going!</p>`,
levels:{
basic:{mcq:[
{q:"Khóa học gồm bao nhiêu chặng?",opts:["5","6","7","8"],a:2,why:"<b>Đúng: 7 chặng.</b> Từ ngữ pháp nền tảng (Chặng 1) đến Về đích 9.0 (Chặng 7), tổng 70 bài."},
{q:"Nguyên lý xuyên suốt về Writing/Speaking là:",opts:["Số lượng ý hơn chiều sâu","Chiều SÂU hơn số lượng — ít ý đào sâu > nhiều ý nông","Từ càng khó càng tốt","Bài càng dài càng tốt"],a:1,why:"<b>Đúng: B.</b> Xuyên suốt khóa học: đào sâu ít ý tốt hơn liệt kê nhiều ý nông."},
{q:"Kỹ năng ngôn ngữ nếu không dùng sẽ:",opts:["Giữ nguyên mãi","MAI MỘT — cần duy trì để giữ và nâng cao","Tự tăng","Không đổi"],a:1,why:"<b>Đúng: B.</b> Ngôn ngữ mai một nếu không dùng; duy trì sau kỳ thi là cần thiết, nhất là nếu sẽ dùng để học/làm."},
{q:"Cách duy trì tiếng Anh bền vững nhất là:",opts:["Học danh sách từ khô","Biến thành thói quen đời sống qua nội dung bạn THÍCH (tin, podcast, phim)","Chỉ luyện đề IELTS","Ngừng hoàn toàn"],a:1,why:"<b>Đúng: B.</b> Gắn tiếng Anh với sở thích (chủ đề bạn thích) bền vững hơn 'học' gượng ép — ngôn ngữ sống qua sử dụng."},
{q:"Thông điệp cuối của khóa học:",opts:["IELTS là đích cuối cùng","Tiếng Anh là KỸ NĂNG SUỐT ĐỜI; IELTS chỉ là một cột mốc","Học xong thì dừng","Chỉ cần điểm số"],a:1,why:"<b>Đúng: B.</b> Tiếng Anh là kỹ năng suốt đời mở ra tri thức và cơ hội; IELTS chỉ là một cột mốc trên hành trình."}],
writing:[{q:"Nhìn lại hành trình. Viết một đoạn (6-8 câu tiếng Anh) tổng kết: bạn đã học được gì qua khóa học, nguyên lý nào tâm đắc nhất, và bạn dự định duy trì/phát triển tiếng Anh thế nào sau khi đạt mục tiêu.",
model:"<b>Bài mẫu tham khảo:</b> Looking back on this course, I have progressed from the fundamentals of grammar to an understanding of what mastery of English truly involves. Perhaps the principle that has stayed with me most is that accuracy and naturalness matter far more than showing off with rare words or complicated sentences — the best language serves meaning clearly. I have also come to appreciate that depth of thought outweighs quantity, and that targeted, well-analysed practice is far more effective than sheer volume. Above all, I now see that genuine fluency comes from immersing myself in English over the long term, not from quick tricks. After reaching my target, I intend to keep English alive by weaving it into my daily life — reading about topics I love, listening to podcasts, and using the language to communicate with others. Rather than treating the exam as a finish line, I will regard it as one milestone in a lifelong journey. In this way, the ability I have built will continue to grow and to open doors for me for years to come.<br><b>Tự kiểm tra:</b> Có nhìn lại hành trình học được gì? Nêu nguyên lý tâm đắc (chính xác/tự nhiên, chiều sâu, nỗ lực đúng hướng, đắm mình)? Kế hoạch duy trì qua đời sống? Coi IELTS là cột mốc không phải đích? Ngôn ngữ tự nhiên, mạch lạc?"}]},
mid:{mcq:[
{q:"Nguyên lý 'nỗ lực đúng hướng hơn khối lượng' nghĩa là:",opts:["Luyện càng nhiều càng tốt","Chẩn đoán nút thắt, luyện trúng đích, phân tích lỗi — chất lượng định hướng hơn số lượng","Chỉ luyện kỹ năng mạnh","Học thật nhanh"],a:1,why:"<b>Đúng: B.</b> Xuyên suốt: nỗ lực CÓ ĐỊNH HƯỚNG (chẩn đoán, luyện trúng đích, phân tích lỗi) hiệu quả hơn cày mù quáng."},
{q:"Vì sao gắn tiếng Anh với sở thích lại bền vững hơn?",opts:["Không bền hơn","Vì nội dung bạn THÍCH tạo động lực tự nhiên, biến việc học thành hoạt động thú vị, duy trì lâu dài","Vì dễ hơn","Vì nhanh hơn"],a:1,why:"<b>Đúng: B.</b> Học qua sở thích (phim/sách/podcast bạn thích) tạo động lực nội tại, bền vững hơn ép buộc 'học' khô khan."},
{q:"Học từ vựng lâu dài hiệu quả nhất qua:",opts:["Danh sách từ khô","Ghi từ/cụm mới gặp trong NGỮ CẢNH thật (đọc/nghe), nắm cách dùng tự nhiên","Từ điển đồng nghĩa","Học thuộc lòng"],a:1,why:"<b>Đúng: B.</b> Học từ trong ngữ cảnh thật giúp nắm sắc thái/collocation/cách dùng — bền và tự nhiên hơn danh sách rời."},
{q:"Sau khi đạt mục tiêu IELTS, nên:",opts:["Ngừng dùng tiếng Anh","Duy trì và phát triển — đặt mục tiêu mới (đọc sách, viết blog, giao tiếp thật)","Quên hết","Chỉ giữ điểm số"],a:1,why:"<b>Đúng: B.</b> Duy trì qua sử dụng thật và mục tiêu mới giữ kỹ năng sống và tiếp tục nâng cao."},
{q:"Ngôn ngữ 'sống' qua:",opts:["Học thuộc quy tắc","SỬ DỤNG — giao tiếp, đọc, nghe, viết thật với người khác","Làm đề","Ghi nhớ từ"],a:1,why:"<b>Đúng: B.</b> Ngôn ngữ sống và phát triển qua sử dụng thật (giao tiếp, tiếp nhận nội dung), không qua học thuộc thụ động."}],
writing:[{q:"Viết một 'kế hoạch duy trì & phát triển tiếng Anh sau kỳ thi' (7-8 câu tiếng Anh): cách bạn sẽ biến tiếng Anh thành thói quen đời sống, dùng nó để giao tiếp/tiếp nhận nội dung thật, học liên tục qua ngữ cảnh, và đặt mục tiêu mới để giữ động lực.",
model:"<b>Bài mẫu tham khảo:</b> Once I have achieved my target, I am determined not to let my English fade, so I will weave the language into my everyday life rather than treating it as a subject to be studied. I will read articles, follow podcasts and watch films about topics that genuinely interest me, since content I enjoy will keep me motivated far more effectively than forced exercises. To ensure the language stays active, I will use it to communicate for real — writing, speaking with others, and taking part in online communities where English is the shared language. Whenever I encounter a useful new word or expression in context, I will note it down together with the sentence in which it appeared, so that I learn its natural usage rather than an isolated definition. I will also set myself fresh goals, such as reading a full book in English or writing regularly, to give my learning direction and purpose. By making English a living part of my life instead of a finished task, I will not only preserve what I have gained but continue to improve. Ultimately, I see the exam not as a finish line but as one milestone in a lifelong journey with the language.<br><b>Tự kiểm tra:</b> Có biến tiếng Anh thành thói quen đời sống (nội dung yêu thích)? Dùng để giao tiếp/tiếp nhận thật? Học từ trong ngữ cảnh? Đặt mục tiêu mới? Coi IELTS là cột mốc? Mạch lạc?"}]},
adv:{mcq:[
{q:"Nguyên lý nào là 'sợi chỉ đỏ' quan trọng nhất xuyên suốt cả khóa học, từ ngữ pháp cơ bản đến band 9?",opts:["Dùng từ càng khó càng tốt","Ngôn ngữ phục vụ Ý — dùng đúng công cụ (từ/cấu trúc) cho đúng mục đích, một cách CHÍNH XÁC và TỰ NHIÊN; sự thành thạo biểu hiện qua sự phù hợp và rõ ràng, không qua phô trương","Viết càng dài càng tốt","Học càng nhiều quy tắc càng tốt"],a:1,why:"<b>Đúng: B.</b> Sợi chỉ đỏ xuyên suốt khóa học, từ bài ngữ pháp đầu tiên đến chuẩn band 9, là: NGÔN NGỮ PHỤC VỤ Ý. Mọi thứ được dạy — thì, cấu trúc câu, từ vựng, collocation, cấu trúc bài, chiến thuật — đều là CÔNG CỤ để truyền đạt ý nghĩa một cách chính xác, rõ ràng và hiệu quả. Sự tiến bộ qua các band không phải là tích lũy những từ khó hơn hay câu phức tạp hơn để 'gây ấn tượng', mà là khả năng ngày càng tinh tế trong việc CHỌN ĐÚNG công cụ cho đúng ý và ngữ cảnh, dùng chúng CHÍNH XÁC và TỰ NHIÊN. Đây là lý do các bài band cao liên tục nhấn mạnh: sự chính xác hơn phô trương, chiều sâu hơn số lượng, sự tự nhiên hơn 'kêu', đôi khi từ đơn giản là lựa chọn tốt nhất. Sự thành thạo thật (đỉnh cao là band 9) biểu hiện qua SỰ PHÙ HỢP, RÕ RÀNG và TỰ NHIÊN — ngôn ngữ trở nên 'trong suốt', phục vụ ý mà không thu hút sự chú ý về chính nó — chứ không qua sự phức tạp hay phô trương. Nội tâm hóa nguyên lý này là điều giá trị nhất khóa học mang lại."},
{q:"Vì sao 'tiếp xúc sâu, lâu dài' (immersion) lại là con đường bền vững nhất để đạt và duy trì trình độ cao?",opts:["Vì nó nhanh","Vì nó xây dựng năng lực ngôn ngữ THẬT ở mức phản xạ (tự nhiên, tức thì) mà mẹo/học thuộc không thể tạo ra; và vì nó bền vững — khi gắn với nội dung yêu thích, nó trở thành thói quen tự duy trì thay vì nỗ lực gượng ép dễ bỏ","Vì giám khảo yêu cầu","Vì nó dễ"],a:1,why:"<b>Đúng: B.</b> Tiếp xúc sâu, lâu dài (immersion) là con đường bền vững nhất vì hai lý do cốt lõi. Thứ nhất về CHẤT LƯỢNG năng lực: các phẩm chất của trình độ cao — sự tự nhiên, phản xạ tức thì, cảm giác về sắc thái/collocation/register, khả năng nghe hiểu mọi giọng, sự trôi chảy 'không nỗ lực' — là những năng lực SÂU chỉ có thể xây qua tiếp xúc rộng và lâu dài với ngôn ngữ thật. Chúng phải trở thành PHẢN XẠ (tự động, tức thì), điều mà mẹo làm bài hay học thuộc danh sách/mẫu KHÔNG thể tạo ra (chúng tạo kiến thức 'chết', cứng nhắc, dễ sụp dưới áp lực hoặc trong tình huống mới). Thứ hai về TÍNH BỀN VỮNG: khi việc tiếp xúc tiếng Anh được gắn với NỘI DUNG YÊU THÍCH (phim, sách, podcast về chủ đề bạn quan tâm), nó ngừng là 'việc học' gượng ép và trở thành một HOẠT ĐỘNG THÚ VỊ tự duy trì — bạn làm vì thích, nên duy trì được lâu dài mà không cần ý chí gồng ép (vốn dễ cạn). Đây là bí quyết vừa ĐẠT trình độ cao (qua khối lượng tiếp xúc lớn) vừa DUY TRÌ nó suốt đời (qua sự bền vững của thói quen thú vị). Ngược lại, chiến lược dựa vào mẹo/nhồi nhét vừa tạo năng lực nông, dễ mất, vừa không bền (chán, bỏ). Immersion là cách 'sống' trong ngôn ngữ, và ngôn ngữ chỉ thực sự thuộc về những người sống trong nó."},
{q:"Đâu là tư duy đúng nhất về vai trò của kỳ thi IELTS trong hành trình học tiếng Anh?",opts:["IELTS là mục đích cuối cùng, đạt điểm là xong","IELTS là một CỘT MỐC và công cụ đo lường hữu ích, nhưng mục tiêu thật sự là năng lực GIAO TIẾP và tư duy bằng tiếng Anh — một kỹ năng suốt đời có giá trị vượt xa con điểm; hướng tới năng lực thật (không chỉ 'điểm') vừa giúp thi tốt hơn vừa phục vụ bạn lâu dài","IELTS không quan trọng","Chỉ cần đủ điểm tối thiểu"],a:1,why:"<b>Đúng: B.</b> Tư duy đúng và giá trị nhất: IELTS là một CỘT MỐC và công cụ đo lường (chứng nhận trình độ cho mục đích du học/định cư/nghề nghiệp) — hữu ích và đáng để chinh phục nghiêm túc — NHƯNG nó không phải mục đích tự thân. Mục tiêu THẬT SỰ là năng lực GIAO TIẾP và tư duy bằng tiếng Anh: khả năng hiểu, diễn đạt, đọc, viết, nói và suy nghĩ bằng ngôn ngữ này. Đây là một KỸ NĂNG SUỐT ĐỜI có giá trị to lớn và lâu dài — nó mở ra tri thức (phần lớn kiến thức thế giới bằng tiếng Anh), cơ hội (học tập, nghề nghiệp toàn cầu), và kết nối (giao tiếp với hàng tỷ người). Con điểm IELTS sẽ hết hạn và bị quên; năng lực ngôn ngữ thật sẽ phục vụ bạn mãi. Tư duy này có hàm ý thực tiễn quan trọng: hướng tới NĂNG LỰC THẬT (không chỉ 'kỹ thuật lấy điểm') vừa là cách thi tốt hơn một cách bền vững (năng lực thật khó 'gãy' hơn mẹo), vừa đảm bảo những gì bạn xây được có giá trị vượt xa kỳ thi. Người coi IELTS là 'kỳ thi để vượt qua rồi quên' bỏ lỡ giá trị lớn nhất; người coi nó là cột mốc trên hành trình xây dựng một kỹ năng suốt đời sẽ vừa đạt điểm cao vừa gặt hái lợi ích lâu dài. Đây là thông điệp cuối và quan trọng nhất của toàn khóa học."},
{q:"Vì sao 'đặt mục tiêu mới' (đọc sách, viết blog, thuyết trình) lại quan trọng để duy trì tiếng Anh sau kỳ thi?",opts:["Không quan trọng","Vì mục tiêu tạo ĐỘNG LỰC và hướng đi cụ thể, biến việc duy trì từ 'nên làm' mơ hồ thành hành động có mục đích; nếu không có mục tiêu, người học dễ để tiếng Anh 'nguội' dần dù có ý định tốt","Vì bắt buộc","Chỉ để khoe"],a:1,why:"<b>Đúng: B.</b> Sau khi đạt IELTS, nhiều người có ý định tốt là 'sẽ duy trì tiếng Anh' nhưng thực tế để nó mai một dần, vì thiếu một lý do cụ thể để dùng nó hằng ngày. Đặt MỤC TIÊU MỚI cụ thể (đọc xong một cuốn sách tiếng Anh, viết blog đều đặn, thuyết trình, đạt chứng chỉ chuyên môn) tạo ĐỘNG LỰC (một đích để hướng tới) và HƯỚNG ĐI (biết cần làm gì), biến 'duy trì' từ ý định mơ hồ thành chuỗi hành động có mục đích, đồng thời nuôi dưỡng cảm giác tiến bộ. Nguyên lý này phản ánh bài học lớn của khóa học: học ngôn ngữ hiệu quả cần định hướng và mục đích, không phải nỗ lực vô định."},{q:"Kết hợp mọi nguyên lý của khóa học, điều gì phân biệt một người học tiếng Anh THÀNH CÔNG THỰC SỰ (không chỉ 'đạt điểm')?",opts:["Biết nhiều từ hiếm và quy tắc nhất","Họ xây năng lực THẬT qua nỗ lực đúng hướng và tiếp xúc sâu; ưu tiên sự chính xác, tự nhiên và chiều sâu; coi ngôn ngữ là công cụ phục vụ ý và giao tiếp; và duy trì, phát triển nó suốt đời","Làm nhiều đề nhất","Đạt band cao nhất một lần"],a:1,why:"<b>Đúng: B.</b> Đây là sự tổng hợp của toàn khóa học. Người học THÀNH CÔNG THỰC SỰ không được phân biệt bởi biết nhiều từ hiếm, làm nhiều đề, hay một band cao nhất thời, mà bởi: (1) xây NĂNG LỰC THẬT qua NỖ LỰC ĐÚNG HƯỚNG (chẩn đoán điểm yếu, luyện trúng đích, phân tích lỗi) và TIẾP XÚC SÂU lâu dài; (2) nội tâm hóa các nguyên lý chất lượng (chính xác & tự nhiên hơn phô trương, chiều sâu hơn số lượng, rõ ràng hơn phức tạp); (3) hiểu ngôn ngữ là CÔNG CỤ phục vụ ý và giao tiếp, không phải để trình diễn; (4) coi việc học là HÀNH TRÌNH SUỐT ĐỜI, duy trì và phát triển tiếng Anh như một phần của cuộc sống. Kết quả: họ vừa đạt điểm cao bền vững, vừa sở hữu một kỹ năng giá trị suốt đời — không chỉ một con điểm, mà một mối quan hệ lâu dài với tiếng Anh."}],
writing:[{q:"Bài viết cuối cùng của khóa học: viết một bài luận ngắn hoàn chỉnh (khoảng 250-300 từ, tiếng Anh) ở chất lượng cao nhất bạn có thể, phản ánh về chủ đề: 'What I have learned on this journey, and how I will continue growing with English.' Hãy để bài viết thể hiện tất cả những gì bạn đã rèn: lập luận có chiều sâu, cấu trúc mạch lạc, ngôn ngữ chính xác và tự nhiên, độ chính xác cao. Đây là cơ hội để bạn thấy chính mình đã tiến xa thế nào.",
model:"<b>Bài mẫu tham khảo (~285 từ):</b> When I began this journey, I regarded English largely as a series of rules to be memorised and a test to be passed. Reaching its end, I have come to understand something far more valuable: that true command of a language lies not in the accumulation of difficult words or elaborate structures, but in the ability to convey meaning with precision, clarity and naturalness.<br><br>Perhaps the most important lesson I have learned is that quality matters more than display. Time and again, this course has shown me that a single idea developed in depth is worth more than a dozen expressed superficially, and that the right word — even a simple one — communicates far better than an impressive word used carelessly. I have also learned that progress comes not from blind effort but from working intelligently: diagnosing my weaknesses, practising with purpose, and learning from my mistakes rather than merely repeating them.<br><br>Above all, I now appreciate that fluency is not conjured by tricks but cultivated through immersion — through living within the language until it becomes a natural extension of my own thought. This realisation has transformed how I intend to move forward. Rather than treating my exam result as a finish line, I will regard it as a single milestone in a lifelong relationship with English. I will keep the language alive by reading, listening and speaking about the things I love, and by continually setting myself new challenges.<br><br>In the end, what I have gained is far greater than a score. I have acquired a skill that will open doors to knowledge, opportunity and connection for the rest of my life — and a language that, so long as I continue to nurture it, will keep growing alongside me.<br><b>Tự kiểm tra:</b> Lập luận có chiều sâu (phản ánh thật về những gì học được)? Cấu trúc mạch lạc (mở-thân-kết, chuyển đoạn mượt)? Ngôn ngữ chính xác và tự nhiên? Độ chính xác cao (không lỗi)? Thể hiện các nguyên lý (chất lượng hơn phô trương, nỗ lực đúng hướng, đắm mình, IELTS là cột mốc)? Bạn có thấy mình đã tiến xa so với đầu khóa?"}]}
}}

 {q:"Để NHẤN MẠNH, band 9 có thể dùng:",opts:["Câu đơn thường","Đảo ngữ (Never had...) hoặc câu chẻ (It was X that...)","Bị động","Câu hỏi"],a:1,skill:"grammar9",why:"Đảo ngữ và câu chẻ tạo nhấn mạnh — dùng có chủ đích."},
 {q:"Một câu đơn ngắn có thể là lựa chọn band 9 khi:",opts:["Không bao giờ","Nó phục vụ mục đích diễn đạt (nhấn mạnh, tương phản nhịp) có chủ đích","Chỉ ở mở bài","Chỉ khi hết ý"],a:1,skill:"grammar9",why:"Câu đơn đúng chỗ thể hiện điều khiển cú pháp, không phải giới hạn."},
 {q:"Fluency band 9 nghĩa là:",opts:["Nói nhanh nhất","Trôi chảy hoàn toàn, tự nhiên; do dự (nếu có) chỉ để cân nhắc NỘI DUNG","Không bao giờ ngừng","Nói to"],a:1,skill:"speaking9",why:"Band 9 trôi chảy 'không nỗ lực', do dự chỉ để nghĩ Ý."},
 {q:"Pronunciation band 9 với accent (nếu còn):",opts:["Bị giới hạn band","Không cản trở — dùng ngữ âm biểu cảm, dễ hiểu hoàn toàn","Phải xóa accent","Chỉ đạt nếu giọng Tây"],a:1,skill:"speaking9",why:"Accent không giới hạn band 9 nếu dễ hiểu và ngữ âm dùng tinh tế."},
