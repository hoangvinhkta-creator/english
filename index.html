{q:"Phân biệt: 'I have known her for years' nghĩa là gì?",opts:["Tôi từng biết cô ấy (giờ không còn)","Tôi biết cô ấy đã nhiều năm và VẪN biết","Tôi sẽ biết cô ấy","Tôi mới biết cô ấy"],a:1,why:"<b>Đúng: B.</b> Present perfect với 'for years' = hành động/trạng thái bắt đầu trong quá khứ và VẪN tiếp tục đến hiện tại. Nếu nói 'I knew her' (V2) mới có nghĩa 'từng biết, giờ không'."},
{q:"'The company ___ its strategy several times since the new CEO ___.'",opts:["has changed / arrived","changed / has arrived","has changed / has arrived","changed / arrived"],a:0,why:"<b>Đúng: has changed / arrived.</b> Việc lặp lại đến hiện tại → 'has changed' (present perfect); mệnh đề 'since' chỉ MỐC bắt đầu cụ thể trong quá khứ → 'arrived' (past simple). Quy tắc: since + QUÁ KHỨ ĐƠN (mốc), mệnh đề chính + PRESENT PERFECT."}],
writing:[{q:"Viết đoạn 8 câu (kiểu Speaking Part 3 hoặc Writing) về việc một lĩnh vực (công nghệ/giáo dục/lối sống) ĐÃ THAY ĐỔI thế nào trong những năm gần đây, dùng present perfect nhuần nhuyễn với 'over the past years', 'since', 'one of the... I have ever...'.",
model:"<b>Bài mẫu:</b> Technology has transformed the way we live over the past two decades. Since smartphones became widespread, people have gained instant access to information. Online shopping has grown enormously, and it has changed how businesses like mine operate. I have personally seen how our store has adapted to these trends. This is one of the biggest shifts I have ever witnessed in my career. Many traditional jobs have disappeared, while new ones have emerged. However, technology has also created problems that we have not fully solved yet. Overall, the pace of change has been remarkable.<br><b>Tự kiểm tra:</b> Sau have/has là V3? 'over the past...', 'since + quá khứ đơn' đúng? 'one of the... I have ever + V3'? Diễn tả liên tục quá khứ→hiện tại?"}]}
}},
/* ===== BÀI 22 ===== */
{id:"g22",stage:3,title:"Bài 22 · Hiện tại hoàn thành vs Quá khứ đơn",
theory:`<h3>1. Đây là cặp thì gây nhầm lẫn NHẤT — nắm được là lên band</h3>
<p>Cả hai đều nói về quá khứ, nhưng khác nhau ở CHỖ NÀY:</p>
<table><tr><th></th><th>Quá khứ đơn (V2)</th><th>Hiện tại hoàn thành (have+V3)</th></tr>
<tr><td>Thời điểm</td><td>XÁC ĐỊNH, đã xong hẳn</td><td>KHÔNG xác định / còn liên quan hiện tại</td></tr>
<tr><td>Dấu hiệu</td><td>yesterday, last week, in 2020, ago, when...</td><td>ever, never, already, yet, just, for, since, recently</td></tr>
<tr><td>Ví dụ</td><td>I saw that film <b>last night</b>.</td><td>I have seen that film. (không rõ khi nào)</td></tr></table>
<h3>2. Nguyên tắc vàng</h3>
<div class="formula">Có mốc thời gian quá khứ CỤ THỂ → dùng QUÁ KHỨ ĐƠN.<br>Không rõ thời điểm / nối tới hiện tại → HIỆN TẠI HOÀN THÀNH.</div>
<div class="example"><b>I have visited Paris.</b> (kinh nghiệm — không nói khi nào)<br><b>I visited Paris in 2019.</b> (có mốc 'in 2019' → quá khứ đơn)<br><span class="vi">CÙNG một sự việc, nhưng thêm mốc thời gian là PHẢI đổi sang quá khứ đơn.</span></div>
<h3>3. Bẫy kinh điển với "when" và "ago"</h3>
<p><b>when</b> và <b>ago</b> LUÔN đi với quá khứ đơn (vì chúng hỏi/chỉ thời điểm cụ thể):</p>
<div class="example"><b>When did you arrive?</b> (KHÔNG 'When have you arrived') — 'when' hỏi thời điểm → quá khứ đơn.<br><b>I finished it two hours ago.</b> (KHÔNG 'have finished... ago') — 'ago' → quá khứ đơn.</div>
<h3>4. Kết hợp trong một mạch kể</h3>
<div class="example"><b>I have lost my keys. I lost them yesterday.</b><br><span class="vi">Câu 1 (present perfect): thông báo kết quả hiện tại (giờ không có chìa). Câu 2 (past simple): thêm chi tiết 'yesterday' → quá khứ đơn.</span></div>
<p class="muted">⚠️ Lỗi chết người trong IELTS: "I have seen him yesterday" — SAI vì 'yesterday' là mốc cụ thể, phải "I saw him yesterday". Hễ có mốc quá khứ rõ ràng thì KHÔNG dùng present perfect.</p>`,
levels:{
basic:{mcq:[
{q:"I ___ my phone yesterday.",opts:["have lost","lost","have lose","has lost"],a:1,why:"<b>Đúng: lost.</b> 'yesterday' = mốc cụ thể → quá khứ đơn 'lost'."},
{q:"She ___ to Japan three times.",opts:["went","has been","was","did go"],a:1,why:"<b>Đúng: has been.</b> Kinh nghiệm (số lần, không mốc cụ thể) → present perfect 'has been'."},
{q:"When ___ you buy this car?",opts:["have","did","has","do"],a:1,why:"<b>Đúng: did.</b> 'When' hỏi thời điểm → quá khứ đơn: When did you buy...?"},
{q:"They ___ already left when I arrived.",opts:["have","had","did","has"],a:1,why:"<b>Đúng: had.</b> Ở đây có hai mốc quá khứ; 'left' xảy ra TRƯỚC 'arrived' → quá khứ hoàn thành 'had' (xem Bài 24). Nhưng nếu bỏ mệnh đề when thì không dùng present perfect vì có mốc."},
{q:"We ___ this house in 2015.",opts:["have bought","bought","has bought","buy"],a:1,why:"<b>Đúng: bought.</b> 'in 2015' = mốc cụ thể → quá khứ đơn."}],
writing:[{q:"Viết 5 cặp câu: mỗi cặp gồm 1 câu present perfect (thông báo kinh nghiệm/kết quả) và 1 câu past simple (thêm mốc thời gian cụ thể). Ví dụ mẫu: 'I have been to Da Nang. I went there last summer.'",
model:"<b>Bài mẫu:</b> I have read that book. I read it two years ago. She has changed jobs. She changed jobs in March. We have met the supplier. We met him last Tuesday. They have finished the report. They finished it yesterday. He has passed his exam. He passed it last month.<br><b>Tự kiểm tra:</b> Câu present perfect KHÔNG có mốc cụ thể (have+V3)? Câu past simple CÓ mốc (ago, in..., last..., yesterday) và dùng V2?"}]},
mid:{mcq:[
{q:"Chọn câu ĐÚNG:",opts:["I have seen him last week.","I saw him last week.","I have saw him last week.","I did see him last week ago."],a:1,why:"<b>Đúng: B.</b> 'last week' = mốc cụ thể → past simple 'saw'. A sai (present perfect + mốc); C sai V3; D thừa 'ago'."},
{q:"'How long ___ you ___ English?' (bạn học được bao lâu rồi — vẫn đang học)",opts:["did / study","have / studied","have / study","do / study"],a:1,why:"<b>Đúng: have / studied.</b> 'How long...' + hành động kéo dài đến hiện tại → present perfect. Nếu đã ngừng học thì mới dùng quá khứ."},
{q:"He ___ in three different countries so far.",opts:["worked","has worked","works","did work"],a:1,why:"<b>Đúng: has worked.</b> 'so far' (cho đến nay) → present perfect. 'so far/up to now/until now' luôn đi với perfect."},
{q:"'I ___ my current job in 2021 and I ___ here ever since.'",opts:["started / have been","have started / was","started / was","have started / have been"],a:0,why:"<b>Đúng: started / have been.</b> 'in 2021' = mốc → past simple 'started'; 'ever since' (từ đó đến nay) → present perfect 'have been'. Câu kết hợp hai thì rất tự nhiên."},
{q:"'___ you ___ your homework yet?' — 'Yes, I ___ it an hour ago.'",opts:["Did / do / did","Have / done / did","Have / done / have done","Did / do / have done"],a:1,why:"<b>Đúng: Have / done / did.</b> Câu hỏi có 'yet' → present perfect (Have you done...yet?); câu trả lời có 'an hour ago' → past simple 'did'. Cùng việc nhưng đổi thì theo dấu hiệu."}],
writing:[{q:"Viết đoạn 6 câu kể về hành trình nghề nghiệp/học tập của bạn, kết hợp CÓ CHỦ ĐÍCH present perfect (tổng quan, kinh nghiệm, việc kéo dài đến nay) và past simple (sự kiện có mốc cụ thể).",
model:"<b>Bài mẫu:</b> I have worked in the electronics business for over five years. I started my current job in 2019, right after I finished school. Since then, I have learned a great deal about sales and data analysis. Last year, I built my first price-comparison tool, which impressed my manager. I have taken on more responsibility recently, and I have even started learning to code. Two years ago, I could barely write a formula, but now I manage several digital projects.<br><b>Tự kiểm tra:</b> Câu có mốc (in 2019, last year, two years ago) → past simple? Câu tổng quan/kéo dài đến nay (for over five years, since then, recently) → present perfect? Không có 'have + V3 + mốc quá khứ'?"}]},
adv:{mcq:[
{q:"Trong Writing Task 1 mô tả biểu đồ có mốc năm cụ thể, thì nào ĐÚNG?",opts:["Sales have risen sharply in 2020.","Sales rose sharply in 2020.","Sales have been rising in 2020.","Sales has risen in 2020."],a:1,why:"<b>Đúng: B.</b> 'in 2020' = mốc cụ thể trong quá khứ → past simple 'rose'. Biểu đồ quá khứ (có năm) luôn dùng past simple, KHÔNG present perfect. Đây là lỗi thì phổ biến làm tụt band Task 1."},
{q:"'Recently, there ___ a significant increase in remote work, which ___ the traditional office model.'",opts:["was / challenged","has been / has challenged","has been / challenged","was / has challenged"],a:1,why:"<b>Đúng: has been / has challenged.</b> 'Recently' + xu hướng đến hiện tại → present perfect cho cả hai. 'recently, lately, in recent years' là dấu hiệu mạnh của present perfect."},
{q:"Phân biệt sắc thái: câu nào ngụ ý người đó VẪN CÒN SỐNG?",opts:["Shakespeare wrote 37 plays.","My grandfather has written three novels.","Newton discovered gravity.","Einstein has developed relativity."],a:1,why:"<b>Đúng: B.</b> Present perfect ('has written') ngụ ý người còn sống/việc còn liên quan hiện tại. Với người đã mất (Shakespeare, Newton) phải dùng past simple. Đây là lý do D sai ('Einstein has developed' — ông đã mất). Sắc thái tinh tế band 7+."},
{q:"'It is the first time I ___ such a complex problem.'",opts:["faced","have faced","face","had faced"],a:1,why:"<b>Đúng: have faced.</b> Cấu trúc 'It is the first/second time (that) + present perfect': 'This is the first time I have seen/done...'. Rất hữu ích và hay bị dùng sai thành past simple."},
{q:"'Although the policy ___ in 2018, its effects ___ only recently.'",opts:["was introduced / have become clear","has been introduced / became clear","was introduced / became clear","has been introduced / have become clear"],a:0,why:"<b>Đúng: was introduced / have become clear.</b> 'in 2018' = mốc → past simple bị động 'was introduced'; 'only recently' → present perfect 'have become'. Một câu chứa cả hai thì, mỗi mệnh đề theo dấu hiệu riêng."}],
writing:[{q:"Viết đoạn nghị luận 8 câu (Writing Task 2 hoặc Speaking Part 3) về một thay đổi xã hội, phân biệt rạch ròi: dùng past simple cho sự kiện/mốc lịch sử cụ thể, present perfect cho xu hướng kéo dài đến hiện tại và hệ quả còn tồn tại.",
model:"<b>Bài mẫu:</b> Over the past twenty years, the internet has completely reshaped how people communicate. When social media first appeared in the early 2000s, few predicted its impact. Since then, billions of people have joined online platforms, and information has spread faster than ever before. This shift has brought many benefits, but it has also created new problems. For example, misinformation has become a serious concern in recent years. Governments introduced various regulations in the 2010s, yet these have not fully solved the issue. In my own experience, technology has changed my job dramatically. Overall, the digital revolution has transformed society in ways we are still trying to understand.<br><b>Tự kiểm tra:</b> Sự kiện có mốc (in the early 2000s, in the 2010s, first appeared) → past simple? Xu hướng/hệ quả đến nay (over the past..., since then, in recent years, has become) → present perfect? Không lẫn lộn mốc quá khứ với present perfect?"}]}
}},
/* ===== BÀI 23 ===== */
{id:"g23",stage:3,title:"Bài 23 · Hiện tại hoàn thành tiếp diễn & for / since",
theory:`<h3>1. Công thức</h3>
<div class="formula">Chủ ngữ + <b>have / has been</b> + <b>V-ing</b></div>
<p>Nhấn mạnh hành động BẮT ĐẦU trong quá khứ, KÉO DÀI liên tục và thường VẪN đang tiếp diễn (hoặc vừa dừng nhưng còn để lại dấu vết).</p>
<div class="example"><b>I have been studying English for three hours.</b><br><span class="vi">Tôi đã học liên tục suốt 3 tiếng (và có thể vẫn đang học). Nhấn vào quá trình/khoảng thời gian.</span></div>
<h3>2. Hoàn thành đơn vs Hoàn thành tiếp diễn</h3>
<table><tr><th>Hoàn thành ĐƠN (have + V3)</th><th>Hoàn thành TIẾP DIỄN (have been + V-ing)</th></tr>
<tr><td>Nhấn KẾT QUẢ / số lượng</td><td>Nhấn QUÁ TRÌNH / thời lượng</td></tr>
<tr><td>I have written 3 reports. (xong 3 cái)</td><td>I have been writing reports all day. (suốt cả ngày)</td></tr>
<tr><td>She has read the book. (đọc xong)</td><td>She has been reading for hours. (đang đọc, chưa xong)</td></tr></table>
<h3>3. for vs since — HỌC KỸ</h3>
<table><tr><th>Từ</th><th>Đi với</th><th>Ví dụ</th></tr>
<tr><td><b>for</b></td><td>KHOẢNG thời gian (bao lâu)</td><td>for two hours, for five years, for a long time</td></tr>
<tr><td><b>since</b></td><td>MỐC bắt đầu (từ khi nào)</td><td>since 2020, since Monday, since I was young</td></tr></table>
<div class="formula">for + độ dài (two years) · since + điểm mốc (2020)</div>
<h3>4. Động từ KHÔNG dùng tiếp diễn</h3>
<p>Động từ trạng thái (know, like, love, want, believe, own, understand) KHÔNG dùng dạng tiếp diễn — dùng hoàn thành ĐƠN:</p>
<div class="example"><b>I have known her for years.</b> (KHÔNG 'have been knowing') — 'know' là động từ trạng thái.</div>
<p class="muted">⚠️ Phân biệt: "I have been reading this book" (đang đọc, chưa xong — nhấn quá trình) vs "I have read this book" (đã đọc xong — nhấn kết quả). Với know/like/want... luôn dùng dạng đơn.</p>`,
levels:{
basic:{mcq:[
{q:"I have ___ waiting for an hour.",opts:["been","being","be","was"],a:0,why:"<b>Đúng: been.</b> have + been + V-ing (waiting). 'been' là V3 của be."},
{q:"She has been ___ all morning.",opts:["work","worked","working","works"],a:2,why:"<b>Đúng: working.</b> have/has been + V-ing → working."},
{q:"We have lived here ___ 2018.",opts:["for","since","from","in"],a:1,why:"<b>Đúng: since.</b> '2018' là MỐC → since."},
{q:"They have been studying ___ two hours.",opts:["since","for","from","during"],a:1,why:"<b>Đúng: for.</b> 'two hours' là KHOẢNG thời gian → for."},
{q:"He has been ___ football since he was ten.",opts:["play","played","playing","plays"],a:2,why:"<b>Đúng: playing.</b> has been + playing (V-ing); 'since he was ten' = mốc."}],
writing:[{q:"Viết 5 câu về những việc bạn đã và đang làm liên tục một thời gian (dùng have/has been + V-ing, phân biệt for và since đúng).",
model:"<b>Bài mẫu:</b> I have been learning English on this website for several weeks. My company has been growing steadily since 2019. I have been working on a new project since Monday. We have been selling electronics for over ten years. My colleague and I have been developing a price tool for a few months.<br><b>Tự kiểm tra:</b> have/has been + V-ing đúng? for + khoảng thời gian, since + mốc? Nhấn được tính liên tục?"}]},
mid:{mcq:[
{q:"Phân biệt: 'I ___ five emails this morning.' (nhấn kết quả — đã xong 5 cái)",opts:["have been writing","have written","am writing","write"],a:1,why:"<b>Đúng: have written.</b> Có SỐ LƯỢNG cụ thể (five emails) + nhấn kết quả → hoàn thành ĐƠN 'have written'. Tiếp diễn dùng khi nhấn quá trình, không đếm kết quả."},
{q:"'You look tired. What ___ you ___?'",opts:["have / done","have / been doing","did / do","are / doing"],a:1,why:"<b>Đúng: have / been doing.</b> 'You look tired' (dấu vết hiện tại của quá trình vừa diễn ra) → hoàn thành tiếp diễn: What have you been doing? Nhấn hoạt động gây ra sự mệt."},
{q:"She ___ that company since she graduated.",opts:["has owned","has been owning","owns","owned"],a:0,why:"<b>Đúng: has owned.</b> 'own' là động từ TRẠNG THÁI → KHÔNG dùng tiếp diễn, dùng hoàn thành đơn 'has owned'."},
{q:"'How long ___ you ___ for me?'",opts:["have / been waiting","did / wait","are / waiting","have / waited"],a:0,why:"<b>Đúng: have / been waiting.</b> 'How long' + hành động kéo dài đang diễn ra → hoàn thành tiếp diễn, nhấn thời lượng chờ đợi."},
{q:"Chọn câu ĐÚNG:",opts:["I have been knowing him for years.","I have known him for years.","I am knowing him for years.","I know him since years."],a:1,why:"<b>Đúng: B.</b> 'know' trạng thái → hoàn thành đơn 'have known' + for (khoảng). A sai (knowing); D sai (know + since years)."}],
writing:[{q:"Viết đoạn 6 câu mô tả một dự án/mục tiêu bạn đang theo đuổi, phân biệt: dùng hoàn thành TIẾP DIỄN cho quá trình đang diễn ra, hoàn thành ĐƠN cho kết quả đã đạt được, và dùng đúng for/since.",
model:"<b>Bài mẫu:</b> I have been working on my English seriously since the beginning of this year. So far, I have completed two full stages of grammar. I have been practising writing almost every day for the past two months. Recently, I have written over twenty short essays. I have also been reading English articles to build my vocabulary. Although I have not reached my goal yet, I have been making steady progress.<br><b>Tự kiểm tra:</b> Quá trình đang diễn ra → have been + V-ing? Kết quả/số lượng đã xong → have + V3? for + khoảng, since + mốc? Động từ trạng thái không dùng tiếp diễn?"}]},
adv:{mcq:[
{q:"'Scientists ___ this phenomenon for decades, but they ___ a full explanation yet.'",opts:["have been studying / haven't found","have studied / haven't been finding","studied / didn't find","have been studying / haven't been finding"],a:0,why:"<b>Đúng: have been studying / haven't found.</b> Quá trình nghiên cứu kéo dài → tiếp diễn 'have been studying'; kết quả (tìm ra lời giải) → hoàn thành đơn 'haven't found'. 'find' nhấn kết quả nên không dùng tiếp diễn ở đây."},
{q:"Trong Speaking Part 2, câu nào diễn tả TỰ NHIÊN nhất một sở thích lâu dài đang tiếp tục?",opts:["I have been collecting stamps since I was a child, and I still enjoy it.","I collect stamps since I was a child.","I am collecting stamps since child.","I have collected stamps since I was child and stopped."],a:0,why:"<b>Đúng: A.</b> 'have been collecting since...' + 'still enjoy it' diễn tả sở thích bắt đầu từ nhỏ và VẪN tiếp tục — đúng sắc thái và tự nhiên. Các đáp án khác sai thì hoặc sai nghĩa."},
{q:"'The results are impressive, considering they ___ only ___ on the project for three months.'",opts:["have / been working","has / been working","have / worked","did / work"],a:0,why:"<b>Đúng: have / been working.</b> 'they' → have; nhấn quá trình làm việc suốt 3 tháng → been working. 'for three months' + đang tiếp tục → hoàn thành tiếp diễn."},
{q:"Phân biệt: câu nào ngụ ý việc CÓ THỂ CHƯA hoàn tất?",opts:["I have painted the house.","I have been painting the house.","I painted the house.","I paint the house."],a:1,why:"<b>Đúng: B.</b> Hoàn thành tiếp diễn ('have been painting') nhấn QUÁ TRÌNH và thường ngụ ý CHƯA xong hẳn. Hoàn thành đơn ('have painted') ngụ ý ĐÃ xong. Sắc thái 'hoàn tất hay chưa' là điểm phân biệt tinh tế."},
{q:"'Prices ___ steadily ___ the start of the year, which ___ many small businesses.'",opts:["have / risen since / has affected","have been / rising since / has affected","have / been rising for / has affected","rose / since / affected"],a:1,why:"<b>Đúng: have been / rising since / has affected.</b> Xu hướng tăng liên tục → tiếp diễn 'have been rising'; 'the start of the year' = MỐC → since; hệ quả đến hiện tại → 'has affected'. Kết hợp tiếp diễn + since + hoàn thành đơn."}],
writing:[{q:"Viết đoạn 8 câu (Speaking Part 3 hoặc Writing) về một xu hướng đang diễn ra liên tục (giá cả, dân số, công nghệ, thói quen...), dùng thành thạo hoàn thành tiếp diễn cho quá trình + hoàn thành đơn cho kết quả/số liệu + for/since chính xác.",
model:"<b>Bài mẫu:</b> The cost of living has been rising steadily in my country for the past few years. Since 2021, prices of food and housing have increased significantly. Many families have been struggling to keep up with these changes. In my own business, we have been adjusting our prices almost every month. So far, we have raised them three times this year alone. Customers have been complaining, but they have also continued to buy essential products. The government has introduced some measures, yet inflation has remained high. People have been looking for cheaper alternatives, and shopping habits have clearly changed.<br><b>Tự kiểm tra:</b> Quá trình liên tục → have been + V-ing? Số liệu/kết quả (raised them three times, has increased) → have + V3? for + khoảng, since + mốc? Diễn tả được xu hướng đang tiếp diễn?"}]}
}},
/* ===== BÀI 24 ===== */
{id:"g24",stage:3,title:"Bài 24 · Quá khứ hoàn thành (past perfect)",
theory:`<h3>1. Công thức</h3>
<div class="formula">Chủ ngữ + <b>had</b> + <b>V3</b> (dùng chung cho MỌI chủ ngữ)</div>
<p>Diễn tả hành động xảy ra TRƯỚC một hành động/mốc khác trong quá khứ. Nói ngắn gọn: "quá khứ của quá khứ".</p>
<h3>2. Cách hình dung — hai mốc trên trục thời gian</h3>
<div class="example"><b>When I arrived, the meeting had already started.</b><br><span class="vi">Hai việc đều trong quá khứ: cuộc họp bắt đầu (had started) TRƯỚC → rồi tôi đến (arrived) SAU. Việc xảy ra trước dùng 'had + V3', việc sau dùng quá khứ đơn.</span></div>
<div class="formula">Việc xảy ra TRƯỚC: had + V3 · Việc xảy ra SAU: quá khứ đơn (V2)</div>
<h3>3. Dấu hiệu thường gặp</h3>
<p><b>before, after, when, by the time, already, just, until then</b> — nối hai sự kiện quá khứ.</p>
<div class="example"><b>The train had left before we got to the station.</b> (tàu đi TRƯỚC khi ta đến)<br><b>By the time she called, I had finished the work.</b> (xong việc TRƯỚC lúc cô ấy gọi)<br><b>He told me he had lost his job.</b> (mất việc trước lúc kể — dùng nhiều trong câu tường thuật)</div>
<h3>4. So sánh với hiện tại hoàn thành</h3>
<table><tr><th>Hiện tại hoàn thành (have + V3)</th><th>Quá khứ hoàn thành (had + V3)</th></tr>
<tr><td>Trước → HIỆN TẠI</td><td>Trước → một mốc QUÁ KHỨ</td></tr>
<tr><td>I have eaten. (giờ đã no)</td><td>I had eaten before he arrived. (no trước lúc anh ấy đến)</td></tr></table>
<p class="muted">⚠️ Chỉ dùng past perfect khi cần LÀM RÕ thứ tự hai sự kiện quá khứ. Nếu hai việc xảy ra nối tiếp rõ ràng (first... then...), có thể dùng past simple cả hai. Đừng lạm dụng 'had + V3' cho mọi câu quá khứ.</p>`,
levels:{
basic:{mcq:[
{q:"When we arrived, the film ___ already started.",opts:["has","had","have","was"],a:1,why:"<b>Đúng: had.</b> Phim bắt đầu TRƯỚC khi ta đến → had + started (V3)."},
{q:"She ___ eaten before she went out.",opts:["has","had","have","was"],a:1,why:"<b>Đúng: had.</b> Ăn TRƯỚC khi ra ngoài → had eaten."},
{q:"Chọn dạng đúng: 'By the time I called, he ___ home.'",opts:["had gone","has gone","had went","have gone"],a:0,why:"<b>Đúng: had gone.</b> had + gone (V3). 'had went' sai (went là V2)."},
{q:"They ___ never seen snow before they moved to Canada.",opts:["have","had","has","did"],a:1,why:"<b>Đúng: had.</b> Chưa từng thấy tuyết TRƯỚC khi chuyển đi (mốc quá khứ) → had never seen."},
{q:"After he ___ the report, he sent it.",opts:["had finished","has finished","finish","finishing"],a:0,why:"<b>Đúng: had finished.</b> Làm xong TRƯỚC khi gửi → had finished, rồi 'sent' (sau)."}],
writing:[{q:"Viết 5 câu dùng quá khứ hoàn thành để diễn tả việc xảy ra TRƯỚC một việc quá khứ khác (dùng before/after/when/by the time).",
model:"<b>Bài mẫu:</b> When I got to the office, my boss had already left. The customers had waited for an hour before the store opened. After she had checked all the prices, she updated the system. By the time we launched the sale, we had prepared everything. He had never used a computer before he started this job.<br><b>Tự kiểm tra:</b> Việc xảy ra trước dùng 'had + V3'? Việc sau dùng quá khứ đơn (V2)? Dấu nối (before/after/when/by the time) hợp lý?"}]},
mid:{mcq:[
{q:"'I couldn't get into my house because I ___ my keys.'",opts:["have lost","had lost","lost","have been losing"],a:1,why:"<b>Đúng: had lost.</b> Mất chìa TRƯỚC lúc không vào được nhà (cả hai quá khứ) → had lost. Giải thích lý do cho một việc quá khứ → thường dùng past perfect."},
{q:"'When the manager arrived, the staff ___ the problem.'",opts:["had already solved","have already solved","already solved","were solving"],a:0,why:"<b>Đúng: had already solved.</b> Nhân viên giải quyết xong TRƯỚC khi quản lý đến → had already solved."},
{q:"Chọn câu diễn tả ĐÚNG thứ tự: 'Cô ấy nhận ra mình đã quên ví.'",opts:["She realised she had forgotten her wallet.","She realised she has forgotten her wallet.","She had realised she forgot her wallet.","She realises she had forgotten her wallet."],a:0,why:"<b>Đúng: A.</b> 'realised' (quá khứ, việc sau) + 'had forgotten' (quên TRƯỚC đó). Việc nhận ra xảy ra sau việc quên → had forgotten."},
{q:"'It was the first time I ___ such a beautiful place.'",opts:["have seen","had seen","saw","have been seeing"],a:1,why:"<b>Đúng: had seen.</b> Trong ngữ cảnh QUÁ KHỨ ('It WAS'), cấu trúc 'the first time' dùng past perfect 'had seen'. (So với hiện tại 'It IS the first time I have seen' — Bài 22.)"},
{q:"'By 2020, the company ___ over a thousand employees.'",opts:["has hired","had hired","hired","have hired"],a:1,why:"<b>Đúng: had hired.</b> 'By 2020' = tính đến một mốc QUÁ KHỨ → past perfect 'had hired' (đã tuyển được... tính đến thời điểm đó)."}],
writing:[{q:"Viết đoạn 6 câu kể một câu chuyện quá khứ trong đó có việc xảy ra TRƯỚC làm nền cho việc sau (ví dụ: một lần đi trễ, một sai sót, một bất ngờ), dùng past perfect để làm rõ thứ tự.",
model:"<b>Bài mẫu:</b> Last month, I arrived at an important meeting completely unprepared. I had stayed up late the night before, so I had forgotten to review the sales figures. When my manager asked for the report, I realised I had left it at home. Everyone had already gathered in the room, and they were waiting for me. Fortunately, my colleague had prepared a backup copy. By the end of the meeting, I had learned an important lesson about preparation.<br><b>Tự kiểm tra:</b> Việc xảy ra trước (had stayed, had forgotten, had left, had prepared) dùng had + V3? Việc sau (arrived, asked, realised) dùng quá khứ đơn? Thứ tự thời gian rõ ràng?"}]},
adv:{mcq:[
{q:"'No sooner ___ the announcement been made than the stock price collapsed.'",opts:["had","has","did","was"],a:0,why:"<b>Đúng: had.</b> Đảo ngữ 'No sooner had + S + V3 than...' = vừa mới... thì đã... Cấu trúc band 7-8 diễn tả hai việc xảy ra sát nhau, gốc là past perfect (had been made)."},
{q:"'Hardly ___ we started the campaign when the competitor launched a similar one.'",opts:["had","have","did","were"],a:0,why:"<b>Đúng: had.</b> 'Hardly had + S + V3 when...' = vừa mới... thì... Cùng họ với 'No sooner had'. Diễn tả sự kiện A vừa xong thì B xảy ra ngay. Nhấn mạnh trang trọng."},
{q:"Chọn câu diễn đạt ĐÚNG và tinh tế nhất:",opts:["After I finished the analysis, I had sent it to the client.","After I had finished the analysis, I sent it to the client.","After I have finished the analysis, I sent it.","After I finish the analysis, I had sent it."],a:1,why:"<b>Đúng: B.</b> 'After I HAD finished (trước), I SENT (sau)'. Việc xảy ra trước dùng past perfect. A đảo ngược thứ tự (sai logic); C, D sai thì."},
{q:"'The negotiations failed because neither side ___ willing to compromise.'",opts:["had been","has been","have been","was being"],a:0,why:"<b>Đúng: had been.</b> Lý do (không bên nào chịu nhượng bộ) TỒN TẠI TRƯỚC khi đàm phán thất bại → past perfect 'had been'. Giải thích nguyên nhân của một kết quả quá khứ."},
{q:"'She admitted that she ___ a mistake, which ___ the whole project.'",opts:["had made / had delayed","made / delayed","had made / had delayed... ","has made / delayed"],a:0,why:"<b>Đúng: had made / had delayed.</b> Trong câu tường thuật quá khứ ('admitted'), việc thừa nhận diễn ra SAU, nên lỗi và hậu quả đều dùng past perfect 'had made / had delayed'. Lùi thì trong reported speech (Bài 29)."}],
writing:[{q:"Viết đoạn kể chuyện 8 câu (Speaking Part 2: kể về một lần mắc lỗi/một bất ngờ/một quyết định khó) dùng past perfect thành thạo để dựng nền quá khứ, kèm ít nhất 1 cấu trúc đảo ngữ 'No sooner had... than' hoặc 'Hardly had... when'.",
model:"<b>Bài mẫu:</b> A few years ago, I made a decision that completely changed my career. I had been working in the same routine job for years, and I had grown bored and unmotivated. One day, I realised that I had never truly challenged myself. No sooner had I decided to learn programming than I felt a new sense of purpose. Before that moment, I had assumed that coding was beyond my ability. However, once I had started, I discovered that I enjoyed solving problems. By the time I completed my first project, I had gained real confidence. Looking back, I am glad I had taken that risk, because it opened many doors.<br><b>Tự kiểm tra:</b> Nền quá khứ (had been working, had grown, had never challenged, had assumed, had started) dùng had + V3? Việc sau dùng quá khứ đơn? Có đảo ngữ 'No sooner had... than'? Thứ tự thời gian mạch lạc?"}]}
}}
);

LESSONS.push(
/* ===== BÀI 25 ===== */
{id:"g25",stage:3,title:"Bài 25 · Câu bị động (passive voice)",
theory:`<h3>1. Chủ động vs bị động</h3>
<p><b>Chủ động:</b> chủ ngữ LÀM hành động. <b>Bị động:</b> chủ ngữ NHẬN hành động (bị/được làm gì).</p>
<div class="example"><b>Chủ động:</b> Someone cleans the office every day.<br><b>Bị động:</b> The office <b>is cleaned</b> every day. (văn phòng ĐƯỢC dọn)<br><span class="vi">Ta chuyển tân ngữ (the office) lên làm chủ ngữ; người làm (someone) không quan trọng nên bỏ đi.</span></div>
<h3>2. Công thức chung</h3>
<div class="formula">Chủ ngữ + <b>be</b> (chia theo thì) + <b>V3</b> (+ by + người làm)</div>
<p>Chỉ 'be' đổi theo thì, còn động từ chính LUÔN ở dạng V3:</p>
<table><tr><th>Thì</th><th>Chủ động</th><th>Bị động</th></tr>
<tr><td>Hiện tại đơn</td><td>make(s)</td><td>am/is/are made</td></tr>
<tr><td>Quá khứ đơn</td><td>made</td><td>was/were made</td></tr>
<tr><td>Hiện tại tiếp diễn</td><td>is making</td><td>is being made</td></tr>
<tr><td>Hiện tại hoàn thành</td><td>has made</td><td>has been made</td></tr>
<tr><td>Tương lai</td><td>will make</td><td>will be made</td></tr>
<tr><td>Modal</td><td>must make</td><td>must be made</td></tr></table>
<h3>3. Khi nào dùng bị động?</h3>
<ul>
<li>Không biết/không cần nói AI làm: My car was stolen. (bị trộm — không biết ai)</li>
<li>Người làm không quan trọng bằng hành động: The bridge was built in 1990.</li>
<li>Văn phong khách quan, học thuật (rất quan trọng cho IELTS Writing): The data was collected over six months.</li>
</ul>
<h3>4. 'by' — chỉ dùng khi cần nêu người làm</h3>
<div class="example"><b>This novel was written by a famous author.</b> (cần nêu tác giả → dùng by)<br><b>English is spoken here.</b> (không cần nêu ai → bỏ by)</div>
<p class="muted">⚠️ Lỗi phổ biến: (1) quên 'be' ("The office cleaned every day" → phải "IS cleaned"); (2) dùng V2 thay V3 ("was wrote" → "was WRITTEN"); (3) lạm dụng bị động làm câu nặng nề. Chỉ bị động hóa động từ có tân ngữ (ngoại động từ).</p>`,
levels:{
basic:{mcq:[
{q:"The report ___ every month.",opts:["writes","is written","write","written"],a:1,why:"<b>Đúng: is written.</b> Bị động hiện tại đơn: is + written (V3)."},
{q:"This house ___ in 2010.",opts:["built","was built","is built","builds"],a:1,why:"<b>Đúng: was built.</b> Bị động quá khứ: was + built (V3)."},
{q:"English ___ all over the world.",opts:["speaks","is spoken","spoke","speaking"],a:1,why:"<b>Đúng: is spoken.</b> Bị động hiện tại: is + spoken (V3 của speak)."},
{q:"Chọn dạng bị động của 'They make cars here.':",opts:["Cars are made here.","Cars are make here.","Cars is made here.","Cars made here."],a:0,why:"<b>Đúng: Cars are made here.</b> 'Cars' số nhiều → are + made (V3)."},
{q:"The problem will ___ soon.",opts:["be solved","solved","is solved","solve"],a:0,why:"<b>Đúng: be solved.</b> Bị động tương lai: will + be + solved (V3)."}],
writing:[{q:"Chuyển 5 câu chủ động sau sang bị động: (1) Someone cleans this room daily. (2) They built the school in 1995. (3) The company will launch a new product. (4) People speak Vietnamese in Vietnam. (5) A famous chef cooked this meal.",
model:"<b>Đáp án:</b> (1) This room is cleaned daily. (2) The school was built in 1995. (3) A new product will be launched. (4) Vietnamese is spoken in Vietnam. (5) This meal was cooked by a famous chef.<br><b>Tự kiểm tra:</b> 'be' chia đúng thì (is/was/will be)? Động từ chính là V3 (cleaned, built, launched, spoken, cooked)? Chỉ giữ 'by' khi người làm quan trọng?"}]},
mid:{mcq:[
{q:"The new bridge ___ at the moment.",opts:["is built","is being built","builds","was built"],a:1,why:"<b>Đúng: is being built.</b> Bị động hiện tại TIẾP DIỄN (at the moment): is + being + built."},
{q:"The results ___ yet.",opts:["haven't announced","haven't been announced","aren't announcing","didn't announce"],a:1,why:"<b>Đúng: haven't been announced.</b> Bị động hiện tại hoàn thành + 'yet': have/has been + V3 → haven't been announced."},
{q:"All products ___ before delivery.",opts:["must check","must be checked","must checked","are must checked"],a:1,why:"<b>Đúng: must be checked.</b> Bị động với modal: must + be + checked (V3)."},
{q:"Chọn câu bị động ĐÚNG của 'They are repairing the road.':",opts:["The road is repaired.","The road is being repaired.","The road repairs.","The road being repaired."],a:1,why:"<b>Đúng: The road is being repaired.</b> Tiếp diễn bị động: is + being + repaired."},
{q:"'Where ___ this phone ___?'",opts:["was / made","did / made","was / make","is / making"],a:0,why:"<b>Đúng: was / made.</b> Câu hỏi bị động quá khứ: Where was this phone made? (be + V3)."}],
writing:[{q:"Viết đoạn 6 câu mô tả một quy trình hoặc cách vận hành (ví dụ: sản phẩm được kiểm tra/giao/bán thế nào ở cửa hàng bạn), dùng bị động ở nhiều thì khác nhau (hiện tại, tiếp diễn, hoàn thành, modal).",
model:"<b>Bài mẫu:</b> At our store, every product is checked carefully before it is sold. New items are delivered by suppliers twice a week. At the moment, a new inventory system is being installed to improve accuracy. All prices must be updated daily, because they are affected by supplier changes. Recently, our website has been redesigned to make online shopping easier. Damaged goods will be returned to the supplier within seven days.<br><b>Tự kiểm tra:</b> 'be' chia đúng thì? Động từ chính V3? Có ít nhất 3 thì bị động khác nhau (is checked, is being installed, has been redesigned, will be returned, must be updated)?"}]},
adv:{mcq:[
{q:"Trong IELTS Writing Task 1 (mô tả quy trình), câu bị động nào CHÍNH XÁC nhất?",opts:["First, the raw materials collect and clean.","First, the raw materials are collected and cleaned.","First, the raw materials collected and cleaned.","First, someone collects and cleans the raw materials."],a:1,why:"<b>Đúng: B.</b> Mô tả quy trình (process) dùng bị động hiện tại đơn: 'are collected and cleaned'. Bị động làm câu khách quan, tập trung vào các bước — chuẩn văn phong Task 1 process."},
{q:"'It ___ that the new policy will reduce unemployment.'",opts:["is believed","believes","is believing","believed"],a:0,why:"<b>Đúng: is believed.</b> Cấu trúc bị động khách quan 'It is believed/said/thought/argued that...' = người ta cho rằng... Rất mạnh cho Writing Task 2 để nêu quan điểm chung một cách khách quan."},
{q:"Chọn câu bị động HOÀN THÀNH đúng: 'Người ta đã tìm ra giải pháp.'",opts:["A solution has found.","A solution has been found.","A solution had found.","A solution is found."],a:1,why:"<b>Đúng: B.</b> Bị động hiện tại hoàn thành: has + been + found (V3). A thiếu 'been'; câu hoàn thành cần 'have/has been + V3'."},
{q:"'The company ___ to have violated several regulations.'",opts:["is said","says","said","is saying"],a:0,why:"<b>Đúng: is said.</b> Cấu trúc 'S + is said/believed/reported/known + to + V' = được cho là... 'The company is said to have violated...' — văn phong báo chí/học thuật trang trọng, biến thể nâng cao của bị động."},
{q:"Vì sao câu 'The results were analysed and several patterns were identified' phù hợp văn học thuật?",opts:["Vì nó dùng bị động để tập trung vào hành động/kết quả thay vì người thực hiện, tạo giọng khách quan","Vì bị động luôn tốt hơn chủ động","Vì nó ngắn hơn","Vì nó tránh dùng động từ"],a:0,why:"<b>Đúng: A.</b> Bị động trong văn học thuật giúp tập trung vào QUY TRÌNH và KẾT QUẢ ('the results were analysed', 'patterns were identified') thay vì cái tôi người nghiên cứu → giọng khách quan, chuyên nghiệp. Nhưng lưu ý: không nên lạm dụng, cần cân bằng chủ động/bị động."}],
writing:[{q:"Viết đoạn học thuật 8 câu (Writing Task 2) về một vấn đề xã hội, sử dụng bị động một cách có chủ đích để tạo giọng khách quan: gồm 'It is believed/argued that...', 'S is said to...', bị động hoàn thành, và bị động với modal — nhưng vẫn cân bằng với vài câu chủ động.",
model:"<b>Bài mẫu:</b> It is widely believed that education is the key to reducing poverty. In many countries, however, quality schooling is not equally distributed, and rural areas are often neglected. Millions of children are still denied access to proper learning resources. This problem has been discussed for decades, yet little real progress has been made. Governments are said to prioritise economic growth over social investment. In my view, more funding must be allocated to underprivileged schools. If teachers are trained properly and facilities are improved, outcomes will change. Ultimately, education should be treated as a fundamental right rather than a privilege.<br><b>Tự kiểm tra:</b> 'It is believed that', 'are said to' đúng cấu trúc? Bị động hoàn thành (has been made/discussed)? Bị động modal (must be allocated, should be treated)? Có cân bằng vài câu chủ động? 'be' + V3 chính xác?"}]}
}},
/* ===== BÀI 26 ===== */
{id:"g26",stage:3,title:"Bài 26 · Mệnh đề quan hệ (relative clauses)",
theory:`<h3>1. Mệnh đề quan hệ là gì?</h3>
<p>Là mệnh đề bắt đầu bằng who/which/that... dùng để BỔ NGHĨA cho danh từ đứng trước, giúp GỘP hai câu thành một câu phức — kỹ năng cốt lõi để viết câu dài, mạch lạc (band 6→7).</p>
<div class="example"><b>Hai câu:</b> I know a man. He speaks five languages.<br><b>Gộp:</b> I know a man <b>who</b> speaks five languages.<br><span class="vi">'who speaks five languages' bổ nghĩa cho 'a man'.</span></div>
<h3>2. Chọn đại từ quan hệ</h3>
<table><tr><th>Đại từ</th><th>Thay cho</th><th>Ví dụ</th></tr>
<tr><td><b>who</b></td><td>NGƯỜI (làm chủ ngữ/tân ngữ)</td><td>the woman who called me</td></tr>
<tr><td><b>which</b></td><td>VẬT / sự việc</td><td>the phone which broke</td></tr>
<tr><td><b>that</b></td><td>người HOẶC vật (thân mật)</td><td>the book that I bought</td></tr>
<tr><td><b>whose</b></td><td>SỞ HỮU (của ai/của cái gì)</td><td>the man whose car was stolen</td></tr>
<tr><td><b>where</b></td><td>NƠI CHỐN</td><td>the city where I was born</td></tr>
<tr><td><b>when</b></td><td>THỜI GIAN</td><td>the day when we met</td></tr></table>
<h3>3. Hai loại mệnh đề quan hệ</h3>
<p><b>a) Xác định (defining)</b> — cung cấp thông tin CẦN THIẾT để hiểu danh từ nào; KHÔNG có dấu phẩy:</p>
<div class="example"><b>The employee who works hardest gets a bonus.</b><br><span class="vi">Không có mệnh đề này thì không biết nhân viên NÀO → thông tin thiết yếu, không phẩy.</span></div>
<p><b>b) Không xác định (non-defining)</b> — thông tin THÊM, có thể bỏ; PHẢI có dấu phẩy; KHÔNG dùng 'that':</p>
<div class="example"><b>My boss, who is very kind, gave me a raise.</b><br><span class="vi">'who is very kind' chỉ là thông tin thêm; bỏ đi câu vẫn đủ nghĩa → có phẩy.</span></div>
<h3>4. Lược bỏ đại từ quan hệ</h3>
<p>Khi đại từ quan hệ làm TÂN NGỮ (theo sau là chủ ngữ mới), có thể LƯỢC BỎ:</p>
<div class="example"><b>The book (that) I bought is great.</b> — 'that' làm tân ngữ (I bought it) → bỏ được.<br>Nhưng: <b>The man who called</b> — 'who' làm chủ ngữ → KHÔNG bỏ được.</div>
<p class="muted">⚠️ Lỗi phổ biến: (1) dùng 'that' trong mệnh đề có phẩy (sai — phải who/which); (2) lặp tân ngữ ("the book that I bought IT" — thừa 'it"); (3) dùng 'which' cho người. Trong văn học thuật, 'which/who' trang trọng hơn 'that'.</p>`,
levels:{
basic:{mcq:[
{q:"The man ___ called you is my boss.",opts:["which","who","whose","where"],a:1,why:"<b>Đúng: who.</b> Chỉ NGƯỜI làm chủ ngữ → who."},
{q:"The phone ___ I bought is broken.",opts:["who","which","whose","when"],a:1,why:"<b>Đúng: which.</b> Chỉ VẬT (the phone) → which (hoặc that)."},
{q:"That's the woman ___ car was stolen.",opts:["who","which","whose","where"],a:2,why:"<b>Đúng: whose.</b> Sở hữu (xe CỦA người phụ nữ) → whose."},
{q:"This is the restaurant ___ we had dinner.",opts:["which","who","where","whose"],a:2,why:"<b>Đúng: where.</b> Chỉ NƠI CHỐN (nhà hàng) → where."},
{q:"I like people ___ are honest.",opts:["which","who","whose","where"],a:1,why:"<b>Đúng: who.</b> Chỉ người (people) làm chủ ngữ → who."}],
writing:[{q:"Gộp mỗi cặp câu thành 1 câu dùng mệnh đề quan hệ: (1) I met a woman. She works at your company. (2) This is the laptop. I bought it yesterday. (3) That's the house. I grew up there. (4) He's the man. His son is famous. (5) I like the shirt. It's on the shelf.",
model:"<b>Đáp án:</b> (1) I met a woman who works at your company. (2) This is the laptop (that/which) I bought yesterday. (3) That's the house where I grew up. (4) He's the man whose son is famous. (5) I like the shirt which/that is on the shelf.<br><b>Tự kiểm tra:</b> who (người), which/that (vật), whose (sở hữu), where (nơi chốn) đúng? Không lặp lại tân ngữ (không viết 'I bought it yesterday' sau 'that')?"}]},
mid:{mcq:[
{q:"My sister, ___ lives in Ha Noi, is a doctor.",opts:["who","that","which","whose"],a:0,why:"<b>Đúng: who.</b> Mệnh đề KHÔNG xác định (có phẩy, thông tin thêm về 'my sister') → who. KHÔNG dùng 'that' trong mệnh đề có phẩy."},
{q:"Câu nào có thể LƯỢC BỎ đại từ quan hệ?",opts:["The man who lives next door is friendly.","The book that I read was boring.","The woman who called is my aunt.","The car which broke down is old."],a:1,why:"<b>Đúng: B.</b> 'that' làm TÂN NGỮ (I read IT) → bỏ được: 'The book I read'. Các câu khác đại từ làm CHỦ NGỮ (who lives, who called, which broke) → không bỏ được."},
{q:"Chọn câu ĐÚNG:",opts:["The book, that is on the table, is mine.","The book which is on the table is mine.","The book who is on the table is mine.","The book where is on the table is mine."],a:1,why:"<b>Đúng: B.</b> Mệnh đề xác định (không phẩy) cho vật → which/that. A sai (that + phẩy); C sai (who cho vật); D sai (where cho vật)."},
{q:"'2020 was the year ___ everything changed.'",opts:["which","where","when","who"],a:2,why:"<b>Đúng: when.</b> Chỉ THỜI GIAN (the year) → when."},
{q:"'The company ___ products we sell is based in Japan.'",opts:["who","which","whose","that"],a:2,why:"<b>Đúng: whose.</b> Sở hữu (sản phẩm CỦA công ty) → whose. 'whose' dùng được cho cả người và vật/tổ chức."}],
writing:[{q:"Viết đoạn 6 câu giới thiệu về công ty/công việc/quê hương bạn, dùng ít nhất 4 loại mệnh đề quan hệ khác nhau (who, which, where, whose), gồm cả 1 mệnh đề KHÔNG xác định (có phẩy).",
model:"<b>Bài mẫu:</b> I work for a company which sells consumer electronics. My manager, who has over twenty years of experience, is someone I really respect. Our main store is located in a district where property prices are quite high. We serve many customers whose main concern is finding reliable products at fair prices. The suppliers that we work with are based across Vietnam. This is a job which has taught me a great deal about business and technology.<br><b>Tự kiểm tra:</b> who/which/where/whose đúng chức năng? Mệnh đề không xác định có phẩy và KHÔNG dùng 'that'? Không lặp tân ngữ?"}]},
adv:{mcq:[
{q:"Chọn câu học thuật dùng 'which' bổ nghĩa cả MỆNH ĐỀ trước:",opts:["Sales increased by 30%, which surprised everyone.","Sales increased by 30% which surprised everyone.","Sales increased by 30%, that surprised everyone.","Sales increased by 30%, who surprised everyone."],a:0,why:"<b>Đúng: A.</b> 'which' + phẩy bổ nghĩa cho CẢ Ý 'sales increased by 30%' (không phải riêng danh từ nào). Cần dấu phẩy; KHÔNG dùng 'that' cho loại này. Cấu trúc band 7 để bình luận về cả một sự việc."},
{q:"'The extent ___ technology affects our lives is often underestimated.'",opts:["which","to which","where","that"],a:1,why:"<b>Đúng: to which.</b> Giới từ + which: 'the extent to which' = mức độ mà... Cụm học thuật cao cấp. Trong văn trang trọng, giới từ đứng TRƯỚC 'which' (the way in which, the degree to which)."},
{q:"Rút gọn mệnh đề quan hệ: 'The report which was written by the team...' rút gọn thành:",opts:["The report writing by the team","The report written by the team","The report wrote by the team","The report which written by the team"],a:1,why:"<b>Đúng: The report written by the team.</b> Mệnh đề quan hệ bị động rút gọn bằng V3 (past participle): 'which was written' → 'written'. Rút gọn mệnh đề làm câu gọn, trang trọng — kỹ năng band 7."},
{q:"Rút gọn chủ động: 'People who live in cities...' rút gọn thành:",opts:["People live in cities","People living in cities","People lived in cities","People which living in cities"],a:1,why:"<b>Đúng: People living in cities.</b> Mệnh đề quan hệ CHỦ ĐỘNG rút gọn bằng V-ing: 'who live' → 'living'. (Bị động → V3; chủ động → V-ing.)"},
{q:"Chọn câu phức trang trọng và ĐÚNG nhất:",opts:["The students, many of who failed, will retake the exam.","The students, many of whom failed, will retake the exam.","The students, many of which failed, will retake the exam.","The students, many of them failed, will retake the exam."],a:1,why:"<b>Đúng: B.</b> 'many of whom' — sau giới từ 'of' chỉ người dùng 'whom' (dạng tân ngữ của who). Cấu trúc 'some/many/most/all of whom/which' rất giá trị cho câu phức band 7-8."}],
writing:[{q:"Viết đoạn nghị luận 8 câu (Writing Task 2) về một chủ đề (giáo dục/công nghệ/môi trường), dùng mệnh đề quan hệ đa dạng và nâng cao: 'which' bổ nghĩa cả mệnh đề, mệnh đề rút gọn (V-ing/V3), 'the extent to which' hoặc 'many of whom/which', và cả mệnh đề xác định lẫn không xác định.",
model:"<b>Bài mẫu:</b> Social media, which has become an inseparable part of modern life, affects young people in complex ways. Teenagers who spend hours online every day are particularly vulnerable to its influence. The extent to which these platforms shape opinions is often underestimated. Many users, most of whom are unaware of how algorithms work, are shown only content that confirms their existing views. This creates echo chambers, which further deepen social divisions. People raised in this environment may struggle to think critically. Governments have proposed regulations, some of which have already been introduced. Ultimately, a society that fails to address these issues risks long-term consequences.<br><b>Tự kiểm tra:</b> who/which đúng chức năng? 'which' bổ nghĩa cả mệnh đề (có phẩy)? Rút gọn mệnh đề (raised, shown)? 'the extent to which', 'most/some of whom/which'? Phân biệt mệnh đề có/không phẩy?"}]}
}},
/* ===== BÀI 27 ===== */
{id:"g27",stage:3,title:"Bài 27 · Câu điều kiện loại 0 & loại 1",
theory:`<h3>1. Câu điều kiện là gì?</h3>
<p>Diễn tả: NẾU điều kiện xảy ra, THÌ kết quả xảy ra. Gồm 2 mệnh đề: mệnh đề <b>if</b> (điều kiện) và mệnh đề chính (kết quả).</p>
<h3>2. Loại 0 — sự thật hiển nhiên, quy luật luôn đúng</h3>
<div class="formula">If + hiện tại đơn, ... hiện tại đơn</div>
<div class="example"><b>If you heat water to 100°C, it boils.</b><br><span class="vi">Đun nước tới 100°C thì nó sôi — quy luật luôn đúng. Cả hai vế đều hiện tại đơn.</span></div>
<p>Dùng cho: chân lý khoa học, thói quen, hướng dẫn. Có thể thay 'if' bằng 'when' mà nghĩa không đổi.</p>
<h3>3. Loại 1 — điều kiện CÓ THẬT ở tương lai (có thể xảy ra)</h3>
<div class="formula">If + hiện tại đơn, ... <b>will</b> + động từ nguyên mẫu</div>
<div class="example"><b>If it rains tomorrow, we will cancel the trip.</b><br><span class="vi">Nếu mai mưa (có khả năng thật), chúng ta sẽ hủy chuyến đi. Điều kiện có thể xảy ra thật.</span></div>
<p><b>ĐIỂM QUAN TRỌNG:</b> Sau 'if' dùng HIỆN TẠI ĐƠN, KHÔNG dùng 'will'. Lỗi kinh điển: "If it will rain" — SAI, phải "If it rains".</p>
<h3>4. Biến thể của loại 1</h3>
<p>Mệnh đề chính có thể thay 'will' bằng: <b>can, may, might, should, must</b> hoặc câu mệnh lệnh:</p>
<div class="example"><b>If you finish early, you can go home.</b> (được phép)<br><b>If you see him, tell him to call me.</b> (mệnh lệnh)<br><b>If prices rise, we may lose customers.</b> (may = có thể)</div>
<h3>5. Vị trí hai mệnh đề</h3>
<p>Đảo được thứ tự. Nếu 'if' đứng đầu → có dấu phẩy. Nếu 'if' đứng sau → không phẩy:</p>
<div class="example"><b>If you study hard, you will pass.</b> = <b>You will pass if you study hard.</b></div>
<p class="muted">⚠️ Lỗi số 1 của người học: dùng 'will' sau 'if' trong loại 1. Nhớ: <b>if + hiện tại, will + tương lai</b>. Vế 'if' không bao giờ có 'will' (trừ vài trường hợp lịch sự đặc biệt học sau).</p>`,
levels:{
basic:{mcq:[
{q:"If you heat ice, it ___.",opts:["will melt","melts","melt","melting"],a:1,why:"<b>Đúng: melts.</b> Điều kiện loại 0 (quy luật): if + hiện tại, ... hiện tại. 'ice' = it → melts."},
{q:"If it rains tomorrow, we ___ at home.",opts:["stay","will stay","stayed","staying"],a:1,why:"<b>Đúng: will stay.</b> Điều kiện loại 1: if + hiện tại (rains), ... will + stay."},
{q:"If you ___ hard, you will succeed.",opts:["will work","work","worked","works"],a:1,why:"<b>Đúng: work.</b> Sau 'if' dùng HIỆN TẠI ĐƠN, KHÔNG 'will'. ('you' → work.)"},
{q:"If you don't hurry, you ___ the bus.",opts:["will miss","miss","missed","missing"],a:0,why:"<b>Đúng: will miss.</b> Loại 1: mệnh đề chính will + nguyên mẫu (will miss)."},
{q:"Water freezes if the temperature ___ below 0°C.",opts:["will drop","drops","drop","dropping"],a:1,why:"<b>Đúng: drops.</b> Loại 0 (quy luật): cả hai vế hiện tại đơn; 'temperature' → drops."}],
writing:[{q:"Viết 5 câu điều kiện: 2 câu loại 0 (quy luật/sự thật) và 3 câu loại 1 (điều kiện tương lai có thật liên quan công việc/cuộc sống bạn).",
model:"<b>Bài mẫu:</b> If you don't save a file, you lose your work. (loại 0) If customers pay in cash, they get a small discount. (loại 0) If we lower our prices next month, we will sell more units. (loại 1) If I pass the IELTS exam, I will apply for a better job. (loại 1) If the supplier delivers late, we will lose some customers. (loại 1)<br><b>Tự kiểm tra:</b> Sau 'if' dùng HIỆN TẠI ĐƠN (không will)? Loại 0: cả hai vế hiện tại? Loại 1: mệnh đề chính will + nguyên mẫu? Dấu phẩy khi 'if' đứng đầu?"}]},
mid:{mcq:[
{q:"If you ___ me, I ___ you the answer.",opts:["ask / will tell","will ask / will tell","ask / tell","will ask / tell"],a:0,why:"<b>Đúng: ask / will tell.</b> Loại 1: if + hiện tại (ask), ... will + tell. Vế if KHÔNG có will."},
{q:"'You ___ pass the test if you ___ enough.'",opts:["will / practise","will / will practise","practise / will","won't / practise"],a:0,why:"<b>Đúng: will / practise.</b> Mệnh đề chính (will pass) đứng trước, vế if (practise — hiện tại) đứng sau, không phẩy."},
{q:"If the weather ___ nice, we ___ have a barbecue.",opts:["is / might","will be / might","is / might to","be / might"],a:0,why:"<b>Đúng: is / might.</b> Loại 1 biến thể: mệnh đề chính dùng 'might' (có thể) thay 'will'; vế if hiện tại 'is'."},
{q:"Chọn câu ĐÚNG:",opts:["If it will be sunny, we will go out.","If it is sunny, we will go out.","If it is sunny, we go out.","If it sunny, we will go out."],a:1,why:"<b>Đúng: B.</b> Loại 1 chuẩn: if + is (hiện tại), will go. A sai ('if it will be'); D thiếu 'is'."},
{q:"'If you ___ any problems, please ___ me immediately.'",opts:["have / contact","will have / contact","have / will contact","having / contact"],a:0,why:"<b>Đúng: have / contact.</b> Loại 1 với mệnh lệnh: if + have (hiện tại), + câu mệnh lệnh 'contact me' (nguyên mẫu). Rất thông dụng trong email công việc."}],
writing:[{q:"Viết đoạn 6 câu về kế hoạch/dự định có điều kiện cho công việc hoặc học tập của bạn, dùng điều kiện loại 1 đa dạng (will/can/may/might/mệnh lệnh), chú ý KHÔNG dùng will sau if.",
model:"<b>Bài mẫu:</b> If I improve my English this year, I will have more career opportunities. If our store adopts a new inventory system, we can reduce errors significantly. If sales increase next quarter, the company may hire more staff. If a customer is not satisfied, we should offer a refund or exchange. If you ever need help with the price tool, just ask me. If we don't adapt to online trends, we might lose our competitive edge.<br><b>Tự kiểm tra:</b> Sau 'if' luôn HIỆN TẠI ĐƠN (không will)? Mệnh đề chính dùng will/can/may/might/should hoặc mệnh lệnh? Dấu phẩy đúng vị trí?"}]},
adv:{mcq:[
{q:"'Unless we act now, the situation ___ worse.'",opts:["will get","gets","will gets","get"],a:0,why:"<b>Đúng: will get.</b> 'Unless' = 'if...not' (trừ khi/nếu không) → thay cho 'if we don't act'. Cấu trúc loại 1: unless + hiện tại, will + nguyên mẫu. 'Unless' là cách diễn đạt band 6.5+."},
{q:"'___ you should have any questions, please do not hesitate to contact us.'",opts:["If","Should","When","Unless"],a:1,why:"<b>Đúng: Should.</b> Đảo ngữ điều kiện trang trọng: 'Should you + V' = 'If you should...'. 'Should you have any questions' — mẫu câu email/thư trang trọng band 7. Đảo 'should' lên đầu, bỏ 'if'."},
{q:"Trong Writing Task 2, câu điều kiện nào diễn đạt giải pháp MẠNH nhất?",opts:["If governments will invest in education, poverty decreases.","If governments invest in education, poverty will decrease significantly.","If governments invest in education, poverty decrease.","Governments invest in education, poverty will decrease."],a:1,why:"<b>Đúng: B.</b> Loại 1 chuẩn: if + invest (hiện tại), poverty WILL decrease. A sai ('if...will invest'); C sai (thiếu will/s); D thiếu 'if'. Điều kiện loại 1 dùng để đề xuất giải pháp thực tế có khả năng thành hiện thực."},
{q:"'As long as prices ___ stable, customers ___ loyal.'",opts:["remain / will stay","will remain / will stay","remain / stay","will remain / stay"],a:0,why:"<b>Đúng: remain / will stay.</b> 'As long as' (miễn là/chừng nào) = biến thể của 'if' → theo quy tắc loại 1: as long as + hiện tại (remain), will + nguyên mẫu (stay). 'As long as / provided that / on condition that' là các liên từ điều kiện nâng cao."},
{q:"'If demand continues to grow, the company ___ to expand its production.'",opts:["will need","needs","will needs","need"],a:0,why:"<b>Đúng: will need.</b> Loại 1: if + continues (hiện tại), will + need. Lưu ý 'demand' số ít → 'continues' (có s) ở vế if; mệnh đề chính 'will need' (nguyên mẫu sau will)."}],
writing:[{q:"Viết đoạn nghị luận 8 câu (Writing Task 2) đề xuất giải pháp cho một vấn đề, dùng điều kiện loại 1 đa dạng và nâng cao: 'unless', 'as long as', 'provided that', đảo ngữ 'Should...', kèm modal (may/might/will) — chú ý tuyệt đối không dùng will sau if/unless.",
model:"<b>Bài mẫu:</b> Traffic congestion will only get worse unless cities take decisive action. If governments invest in reliable public transport, more people will leave their cars at home. As long as buses and trains remain affordable and punctual, commuters will choose them over private vehicles. Provided that proper cycling lanes are built, many short journeys can be made by bike. However, these measures will fail if they are not supported by public awareness campaigns. Should citizens refuse to change their habits, even the best infrastructure may prove useless. If both authorities and individuals cooperate, real progress will be achieved. Ultimately, unless we rethink urban mobility, our cities will become increasingly unliveable.<br><b>Tự kiểm tra:</b> Sau if/unless/as long as/provided that luôn HIỆN TẠI (không will)? Mệnh đề chính will/may/can? 'Unless' = if not (đúng nghĩa)? Đảo ngữ 'Should citizens...'? Dấu phẩy đúng?"}]}
}}
);

LESSONS.push(
/* ===== BÀI 28 ===== */
{id:"g28",stage:3,title:"Bài 28 · Câu điều kiện loại 2 & loại 3",
theory:`<h3>1. Ôn nhanh: loại 0 & 1 nói về điều CÓ THẬT. Loại 2 & 3 nói về điều KHÔNG CÓ THẬT (giả định).</h3>
<h3>2. Loại 2 — giả định TRÁI với hiện tại (không có thật bây giờ)</h3>
<div class="formula">If + <b>quá khứ đơn</b>, ... <b>would</b> + động từ nguyên mẫu</div>
<div class="example"><b>If I had a lot of money, I would start my own business.</b><br><span class="vi">Sự thật: tôi KHÔNG có nhiều tiền. Đây là giả định trái hiện tại → 'had' (quá khứ) + 'would start'.</span></div>
<p><b>Đặc biệt với to be:</b> dùng <b>were</b> cho MỌI chủ ngữ (kể cả I/he/she): "If I <b>were</b> you, I would accept." (Nếu tôi là bạn — nhưng tôi không phải bạn.)</p>
<h3>3. Loại 3 — giả định TRÁI với quá khứ (đã không xảy ra rồi, không sửa được)</h3>
<div class="formula">If + <b>had + V3</b>, ... <b>would have + V3</b></div>
<div class="example"><b>If I had studied harder, I would have passed the exam.</b><br><span class="vi">Sự thật quá khứ: tôi ĐÃ không học chăm → nên ĐÃ trượt. Tiếc nuối về điều không thể thay đổi. 'had studied' + 'would have passed'.</span></div>
<h3>4. Bảng so sánh 4 loại</h3>
<table><tr><th>Loại</th><th>Mệnh đề if</th><th>Mệnh đề chính</th><th>Ý nghĩa</th></tr>
<tr><td>0</td><td>hiện tại</td><td>hiện tại</td><td>quy luật luôn đúng</td></tr>
<tr><td>1</td><td>hiện tại</td><td>will + V</td><td>tương lai CÓ THẬT</td></tr>
<tr><td>2</td><td>quá khứ đơn</td><td>would + V</td><td>giả định trái HIỆN TẠI</td></tr>
<tr><td>3</td><td>had + V3</td><td>would have + V3</td><td>giả định trái QUÁ KHỨ</td></tr></table>
<h3>5. would có thể thay bằng could / might</h3>
<div class="example"><b>If I had more time, I could learn a new language.</b> (could = có thể)<br><b>If she had left earlier, she might have caught the train.</b> (might have = có lẽ đã)</div>
<p class="muted">⚠️ Lỗi phổ biến: (1) dùng 'would' trong vế if ("If I would have money" — SAI, phải "If I had money"); (2) lẫn loại 2 với loại 3; (3) quên 'have' trong loại 3. Nhớ: vế if KHÔNG BAO GIỜ có would.</p>`,
levels:{
basic:{mcq:[
{q:"If I ___ rich, I would travel the world.",opts:["am","was","were","will be"],a:2,why:"<b>Đúng: were.</b> Loại 2 (giả định trái hiện tại): 'If I were...' — dùng 'were' cho mọi chủ ngữ. ('was' bị coi là kém chuẩn trong câu giả định.)"},
{q:"If I had more time, I ___ read more books.",opts:["will","would","would have","had"],a:1,why:"<b>Đúng: would.</b> Loại 2: if + quá khứ (had), ... would + nguyên mẫu."},
{q:"If she ___ harder, she would have passed.",opts:["studied","had studied","studies","would study"],a:1,why:"<b>Đúng: had studied.</b> Loại 3 (trái quá khứ): if + had + V3."},
{q:"If I had known, I ___ you.",opts:["would tell","will tell","would have told","told"],a:2,why:"<b>Đúng: would have told.</b> Loại 3: mệnh đề chính would have + V3 (told)."},
{q:"If I were you, I ___ accept the offer.",opts:["will","would","would have","had"],a:1,why:"<b>Đúng: would.</b> Loại 2 với 'If I were you' → would + nguyên mẫu. Mẫu câu khuyên bảo kinh điển."}],
writing:[{q:"Viết 5 câu điều kiện: 3 câu loại 2 (giả định trái hiện tại về cuộc sống/công việc bạn) và 2 câu loại 3 (tiếc nuối về quá khứ). Gồm ít nhất 1 câu 'If I were you...'.",
model:"<b>Bài mẫu:</b> If I had more free time, I would learn to play the guitar. (loại 2) If I were the manager, I would change our marketing strategy. (loại 2) If I spoke English fluently, I would apply for international jobs. (loại 2) If I had started learning English earlier, I would have progressed faster. (loại 3) If we had prepared better, we would not have lost that big client. (loại 3)<br><b>Tự kiểm tra:</b> Loại 2: if + quá khứ đơn (were/had/spoke), would + nguyên mẫu? Loại 3: if + had + V3, would have + V3? Vế if KHÔNG có 'would'? 'If I were you' đúng?"}]},
mid:{mcq:[
{q:"If we ___ the deadline, we would lose the contract.",opts:["miss","missed","had missed","would miss"],a:1,why:"<b>Đúng: missed.</b> Loại 2 (giả định trái hiện tại/tương lai không chắc): if + quá khứ đơn 'missed', ... would lose."},
{q:"'If you ___ me yesterday, I would have helped you.'",opts:["called","had called","call","would call"],a:1,why:"<b>Đúng: had called.</b> 'yesterday' + would have helped → loại 3 (trái quá khứ): if + had + V3 (had called)."},
{q:"Chọn câu ĐÚNG (loại 2):",opts:["If I would have a car, I would drive to work.","If I had a car, I would drive to work.","If I have a car, I would drive.","If I had a car, I will drive to work."],a:1,why:"<b>Đúng: B.</b> Loại 2: if + had (quá khứ), would drive. A sai ('would have' trong vế if); D sai ('will' thay 'would')."},
{q:"'If he ___ more careful, the accident ___ have happened.'",opts:["had been / wouldn't","was / wouldn't","had been / would","were / wouldn't"],a:0,why:"<b>Đúng: had been / wouldn't.</b> Loại 3: if + had been (V3), wouldn't have happened. Tai nạn ĐÃ xảy ra rồi → giả định trái quá khứ."},
{q:"'I ___ you if I ___ your number.'",opts:["would call / had","will call / have","would call / would have","called / had"],a:0,why:"<b>Đúng: would call / had.</b> Loại 2: mệnh đề chính 'would call' + vế if 'had' (quá khứ đơn). Đảo vị trí, vế if vẫn dùng quá khứ."}],
writing:[{q:"Viết đoạn 6 câu tưởng tượng về một cuộc sống/sự nghiệp khác (loại 2) và bày tỏ tiếc nuối về vài quyết định quá khứ (loại 3), liên quan đến bản thân bạn.",
model:"<b>Bài mẫu:</b> If I lived in a big city like Ho Chi Minh City, I would have access to more career opportunities. If I were more confident in English, I would speak up more in meetings. Sometimes I think that if I had gone to university abroad, my life would have been very different. If I had learned to code five years ago, I would have built many useful tools by now. Still, if I focused only on the past, I would miss the chances in front of me. If I keep improving, I know good things will come.<br><b>Tự kiểm tra:</b> Loại 2: if + quá khứ đơn, would + nguyên mẫu (trái hiện tại)? Loại 3: if + had + V3, would have + V3 (trái quá khứ)? Vế if không có would? Phân biệt rõ hai loại?"}]},
adv:{mcq:[
{q:"Câu điều kiện HỖN HỢP: 'If I had saved money then, I ___ financially secure now.'",opts:["would be","would have been","will be","had been"],a:0,why:"<b>Đúng: would be.</b> Điều kiện HỖN HỢP: vế if loại 3 (had saved — quá khứ) nhưng kết quả ở HIỆN TẠI → 'would be' (loại 2). Nguyên nhân quá khứ → hệ quả hiện tại. Cấu trúc band 7-8."},
{q:"Đảo ngữ loại 3 (trang trọng): 'Had I known the truth, I ___ differently.'",opts:["would act","would have acted","will act","had acted"],a:1,why:"<b>Đúng: would have acted.</b> Đảo ngữ loại 3: 'Had I known' = 'If I had known' (bỏ if, đảo had lên đầu). Mệnh đề chính vẫn 'would have + V3'. Đảo ngữ điều kiện là dấu hiệu band cao."},
{q:"'___ it not been for your help, we would have failed.'",opts:["If","Had","Were","Should"],a:1,why:"<b>Đúng: Had.</b> 'Had it not been for...' = 'If it had not been for...' (nếu không nhờ...). Đảo ngữ loại 3 dạng phủ định, trang trọng. Diễn đạt lòng biết ơn/giả định trang nhã."},
{q:"Đảo ngữ loại 2: 'Were I in your position, I ___ reconsider.'",opts:["will","would","would have","had"],a:1,why:"<b>Đúng: would.</b> 'Were I...' = 'If I were...' (đảo ngữ loại 2, bỏ if, đảo were lên đầu). Mệnh đề chính 'would + nguyên mẫu'. Trang trọng hơn 'If I were'."},
{q:"Trong Writing Task 2, câu giả định nào lập luận tinh tế nhất?",opts:["If governments would invest more, education would improve.","If governments invested more in education, long-term social outcomes would improve significantly.","If governments invest more, education will improve.","If governments had invested more, education improves."],a:1,why:"<b>Đúng: B.</b> Loại 2 chuẩn: if + invested (quá khứ đơn), would improve. Dùng để lập luận về một giả định/đề xuất chưa thành hiện thực. A sai ('would' trong vế if); C là loại 1 (khác sắc thái); D lẫn lộn thì."}],
writing:[{q:"Viết đoạn nghị luận 8 câu (Writing Task 2 hoặc Speaking Part 3) bàn về một giả định xã hội ('điều gì sẽ xảy ra nếu...' hoặc 'lẽ ra xã hội đã... nếu...'), dùng loại 2, loại 3, ít nhất 1 câu điều kiện HỖN HỢP và 1 đảo ngữ ('Had... / Were...').",
model:"<b>Bài mẫu:</b> If more countries had taken climate change seriously decades ago, the planet would be in a far better state today. Had governments invested in renewable energy earlier, we would have avoided many of the crises we now face. If people were more willing to change their daily habits, emissions would fall considerably. Unfortunately, if individuals continue to ignore the problem, future generations will suffer the consequences. Were world leaders truly committed to cooperation, meaningful agreements would be much easier to reach. If I had the power to change one thing, I would make environmental education compulsory. Had this been done long ago, public awareness would be much higher now. Ultimately, if we act decisively today, we can still prevent the worst outcomes.<br><b>Tự kiểm tra:</b> Loại 2 (if + quá khứ, would + V)? Loại 3 (if + had V3, would have V3)? Hỗn hợp (nguyên nhân quá khứ → hệ quả hiện tại 'would be...now')? Đảo ngữ 'Had.../Were...'? Vế if không có would?"}]}
}},
/* ===== BÀI 29 ===== */
{id:"g29",stage:3,title:"Bài 29 · Câu tường thuật (reported speech)",
theory:`<h3>1. Câu tường thuật là gì?</h3>
<p>Là cách thuật lại lời người khác nói mà KHÔNG dùng dấu ngoặc kép. Khi chuyển từ lời nói trực tiếp sang gián tiếp, thường phải LÙI THÌ và đổi đại từ.</p>
<div class="example"><b>Trực tiếp:</b> She said, "I am tired."<br><b>Gián tiếp:</b> She said (that) she <b>was</b> tired.<br><span class="vi">'am' (hiện tại) lùi thành 'was' (quá khứ); 'I' đổi thành 'she'.</span></div>
<h3>2. Quy tắc LÙI THÌ (khi động từ tường thuật ở quá khứ: said, told...)</h3>
<table><tr><th>Trực tiếp</th><th>Gián tiếp (lùi 1 bậc)</th></tr>
<tr><td>hiện tại đơn (do/does)</td><td>quá khứ đơn (did)</td></tr>
<tr><td>hiện tại tiếp diễn (am doing)</td><td>quá khứ tiếp diễn (was doing)</td></tr>
<tr><td>quá khứ đơn (did)</td><td>quá khứ hoàn thành (had done)</td></tr>
<tr><td>hiện tại hoàn thành (have done)</td><td>quá khứ hoàn thành (had done)</td></tr>
<tr><td>will</td><td>would</td></tr>
<tr><td>can</td><td>could</td></tr>
<tr><td>must / may</td><td>had to / might</td></tr></table>
<h3>3. Đổi đại từ & trạng từ thời gian/nơi chốn</h3>
<table><tr><th>Trực tiếp</th><th>Gián tiếp</th></tr>
<tr><td>now → then · today → that day · tomorrow → the next day</td><td>yesterday → the day before</td></tr>
<tr><td>here → there · this → that · these → those</td><td>ago → before</td></tr></table>
<h3>4. Câu hỏi & mệnh lệnh tường thuật</h3>
<p><b>Câu hỏi Yes/No:</b> dùng <b>if/whether</b>, trả về trật tự câu kể (không đảo):</p>
<div class="example">"Are you busy?" → He asked <b>if</b> I <b>was</b> busy. (không 'was I busy')</div>
<p><b>Câu hỏi Wh-:</b> giữ từ hỏi, trả về trật tự câu kể:</p>
<div class="example">"Where do you live?" → She asked where I <b>lived</b>.</div>
<p><b>Mệnh lệnh:</b> dùng <b>tell/ask + tân ngữ + to + V</b> (phủ định: not to + V):</p>
<div class="example">"Close the door." → He told me <b>to close</b> the door.<br>"Don't be late." → She told me <b>not to be</b> late.</div>
<p class="muted">⚠️ Lưu ý: nếu lời nói là SỰ THẬT LUÔN ĐÚNG hoặc động từ tường thuật ở hiện tại (says), KHÔNG cần lùi thì. Ví dụ: He says he is tired. / The teacher said the Earth is round (chân lý → giữ nguyên).</p>`,
levels:{
basic:{mcq:[
{q:"She said, \"I am happy.\" → She said she ___ happy.",opts:["is","was","were","had been"],a:1,why:"<b>Đúng: was.</b> Lùi thì: 'am' (hiện tại) → 'was' (quá khứ); 'I' → 'she'."},
{q:"He said, \"I will call you.\" → He said he ___ call me.",opts:["will","would","can","could"],a:1,why:"<b>Đúng: would.</b> Lùi thì: will → would."},
{q:"\"I can swim,\" she said. → She said she ___ swim.",opts:["can","could","would","must"],a:1,why:"<b>Đúng: could.</b> Lùi thì: can → could."},
{q:"He told me, \"Close the door.\" → He told me ___ the door.",opts:["close","to close","closing","closed"],a:1,why:"<b>Đúng: to close.</b> Mệnh lệnh tường thuật: tell + tân ngữ + to + V."},
{q:"She asked, \"Are you tired?\" → She asked if I ___ tired.",opts:["am","was","were","had been"],a:1,why:"<b>Đúng: was.</b> Câu hỏi Yes/No → 'if' + trật tự câu kể; 'am' → 'was'."}],
writing:[{q:"Chuyển 5 câu trực tiếp sang gián tiếp: (1) She said, \"I work here.\" (2) He said, \"I will help you.\" (3) \"Don't touch it,\" she said to me. (4) He asked, \"Where do you live?\" (5) \"I have finished,\" she said.",
model:"<b>Đáp án:</b> (1) She said (that) she worked there. (2) He said (that) he would help me. (3) She told me not to touch it. (4) He asked where I lived. (5) She said (that) she had finished.<br><b>Tự kiểm tra:</b> Lùi thì đúng (work→worked, will→would, have finished→had finished)? Đổi đại từ (I→she/he, you→me)? Mệnh lệnh dùng 'to V / not to V'? Câu hỏi Wh- về trật tự câu kể?"}]},
mid:{mcq:[
{q:"\"I saw him yesterday,\" she said. → She said she ___ him ___.",opts:["saw / yesterday","had seen / the day before","has seen / before","saw / the day before"],a:1,why:"<b>Đúng: had seen / the day before.</b> Lùi thì: saw (quá khứ) → had seen; 'yesterday' → 'the day before'."},
{q:"He said, \"I am studying now.\" → He said he ___ studying ___.",opts:["is / now","was / then","was / now","had been / then"],a:1,why:"<b>Đúng: was / then.</b> Hiện tại tiếp diễn → quá khứ tiếp diễn (was studying); 'now' → 'then'."},
{q:"She asked, \"Have you finished?\" → She asked ___ I ___ finished.",opts:["that / have","if / had","if / have","whether / has"],a:1,why:"<b>Đúng: if / had.</b> Câu hỏi Yes/No → if/whether; 'have finished' → 'had finished'."},
{q:"\"Don't worry,\" he told her. → He told her ___.",opts:["don't worry","to not worry","not to worry","to not worrying"],a:2,why:"<b>Đúng: not to worry.</b> Mệnh lệnh phủ định: not + to + V. Trật tự đúng là 'not to worry' (không 'to not worry')."},
{q:"He said, \"Water boils at 100°C.\" → He said water ___ at 100°C.",opts:["boiled","had boiled","boils","would boil"],a:2,why:"<b>Đúng: boils.</b> Sự thật/chân lý khoa học → KHÔNG lùi thì, giữ 'boils'."}],
writing:[{q:"Viết đoạn 6 câu tường thuật lại một cuộc trò chuyện gần đây (với khách hàng, đồng nghiệp, hoặc sếp): gồm câu kể, câu hỏi, và mệnh lệnh/lời khuyên được tường thuật.",
model:"<b>Bài mẫu:</b> Yesterday, my manager told me that the company was planning a big sale. He said that we would need to update all the prices by Friday. He asked me whether I had finished the supplier report. I told him that I had already sent it that morning. He also advised me not to worry about the technical issues, because the IT team would handle them. Finally, he asked where the new stock was being stored.<br><b>Tự kiểm tra:</b> Lùi thì đúng (is→was, will→would, have finished→had finished)? Câu hỏi Yes/No dùng if/whether + trật tự câu kể? Mệnh lệnh/lời khuyên dùng 'to V / not to V'? Đổi đại từ và trạng từ (that morning)?"}]},
adv:{mcq:[
{q:"Chọn động từ tường thuật CHÍNH XÁC cho: \"You should rest,\" the doctor said.",opts:["The doctor said me to rest.","The doctor advised me to rest.","The doctor told that I rest.","The doctor asked me rest."],a:1,why:"<b>Đúng: The doctor advised me to rest.</b> Dùng động từ tường thuật ĐÚNG SẮC THÁI: advise/recommend/suggest cho lời khuyên. Dùng động từ phong phú (advised, warned, reminded, insisted) thay vì chỉ 'said/told' là dấu hiệu band 7."},
{q:"\"I'm sorry I broke it,\" he said. → He ___ breaking it.",opts:["apologised for","said sorry to","told for","refused"],a:0,why:"<b>Đúng: apologised for.</b> Tường thuật theo CHỨC NĂNG: apologise for + V-ing. Các động từ tường thuật + giới từ: apologise for, insist on, admit + V-ing, accuse sb of. Nâng cao và cô đọng."},
{q:"\"Let's start the meeting,\" she said. → She ___ starting the meeting.",opts:["told","suggested","asked","ordered"],a:1,why:"<b>Đúng: suggested.</b> 'Let's...' → suggested + V-ing (suggested starting) hoặc suggested that we start. Tường thuật theo chức năng lời nói (gợi ý)."},
{q:"\"I didn't take the money,\" he said. → He ___ taking the money.",opts:["admitted","denied","refused","promised"],a:1,why:"<b>Đúng: denied.</b> Phủ nhận việc đã làm → deny + V-ing (denied taking). So với 'admit' (thừa nhận). Chọn động từ tường thuật phản ánh đúng ý nghĩa lời nói là kỹ năng cao cấp."},
{q:"Chọn câu tường thuật cô đọng và tự nhiên nhất (band cao):",opts:["He said that he would definitely come to help us and he promised it.","He promised to help us.","He told that he will help us.","He said to help us."],a:1,why:"<b>Đúng: B.</b> 'He promised to help us' — dùng động từ tường thuật hàm chức năng (promise to + V) để nén cả ý 'said he would + hứa' vào một cụm gọn. Văn band cao ưu tiên sự cô đọng và động từ chính xác."}],
writing:[{q:"Viết đoạn 8 câu tường thuật một cuộc họp hoặc thảo luận quan trọng, dùng ĐA DẠNG động từ tường thuật thay vì chỉ said/told: advised, suggested, admitted, denied, promised, warned, insisted, apologised for, complained about — mỗi cái phản ánh đúng chức năng lời nói.",
model:"<b>Bài mẫu:</b> At last week's meeting, our director admitted that sales had fallen in the previous quarter. She warned us that the situation would get worse unless we acted quickly. One manager complained that the marketing budget was too small. Another suggested launching an online campaign to reach younger customers. The finance team insisted on cutting unnecessary costs first. I promised to prepare a detailed report by the following week. My colleague apologised for missing the earlier deadline and explained what had gone wrong. In the end, the director reminded everyone that teamwork would be essential for recovery.<br><b>Tự kiểm tra:</b> Dùng ít nhất 5 động từ tường thuật khác nhau (admitted, warned, complained, suggested, insisted on, promised, apologised for, reminded)? Cấu trúc đúng (suggest + V-ing, insist on + V-ing, promise to + V, warn that...)? Lùi thì hợp lý (had fallen, would get)?"}]}
}},
/* ===== BÀI 30 ===== */
{id:"g30",stage:3,title:"Bài 30 · used to / be used to & ôn tập Chặng 3",
theory:`<h3>1. used to + V — thói quen/trạng thái QUÁ KHỨ (giờ không còn)</h3>
<div class="formula">used to + động từ nguyên mẫu</div>
<div class="example"><b>I used to smoke, but I quit last year.</b><br><span class="vi">Trước kia tôi hút thuốc (giờ không còn). 'used to' diễn tả thói quen quá khứ đã chấm dứt.</span></div>
<p>Phủ định: didn't use to. Câu hỏi: Did you use to...? (bỏ 'd' khi có did).</p>
<h3>2. be used to + V-ing / danh từ — ĐÃ QUEN với việc gì (khác hẳn!)</h3>
<div class="formula">be used to + V-ing / danh từ</div>
<div class="example"><b>I am used to working late.</b><br><span class="vi">Tôi đã QUEN với việc làm khuya (không thấy khó nữa). Chú ý: 'to' ở đây là giới từ nên theo sau là V-ing, KHÔNG phải nguyên mẫu.</span></div>
<p><b>PHÂN BIỆT CỐT LÕI:</b> 'used to + V' = thói quen QUÁ KHỨ. 'be used to + V-ing' = QUEN với hiện tại. Đừng nhầm!</p>
<div class="example"><b>I used to live alone.</b> (trước sống một mình, giờ không)<br><b>I am used to living alone.</b> (tôi quen sống một mình rồi)</div>
<h3>3. get used to + V-ing — ĐANG DẦN QUEN</h3>
<div class="example"><b>I'm getting used to my new job.</b> (đang dần quen công việc mới)</div>
<h3>4. Bạn đã học gì trong Chặng 3?</h3>
<ul>
<li>Hiện tại hoàn thành & phân biệt với quá khứ đơn (Bài 21–22)</li>
<li>Hiện tại hoàn thành tiếp diễn + for/since (Bài 23)</li>
<li>Quá khứ hoàn thành — quá khứ của quá khứ (Bài 24)</li>
<li>Câu bị động ở mọi thì (Bài 25)</li>
<li>Mệnh đề quan hệ who/which/whose/where + rút gọn (Bài 26)</li>
<li>Câu điều kiện loại 0, 1, 2, 3 + đảo ngữ (Bài 27–28)</li>
<li>Câu tường thuật + động từ tường thuật đa dạng (Bài 29)</li>
</ul>
<p class="muted">⚠️ Nhớ mẹo phân biệt: sau 'used to' (thói quen quá khứ) là NGUYÊN MẪU; sau 'be/get used to' (quen) là V-ing. Nếu thấy 'am/is/are/get + used to' thì phía sau chắc chắn là V-ing hoặc danh từ.</p>`,
levels:{
basic:{mcq:[
{q:"I ___ play football when I was young.",opts:["used to","am used to","use to","was used to"],a:0,why:"<b>Đúng: used to.</b> Thói quen quá khứ (khi còn trẻ) → used to + nguyên mẫu (play)."},
{q:"She ___ working night shifts now; it doesn't bother her.",opts:["used to","is used to","use to","did use to"],a:1,why:"<b>Đúng: is used to.</b> ĐÃ QUEN (hiện tại) → be used to + V-ing (working)."},
{q:"Chọn dạng đúng: 'I am used to ___ early.'",opts:["get up","getting up","got up","gets up"],a:1,why:"<b>Đúng: getting up.</b> Sau 'be used to' là V-ing (getting up), vì 'to' là giới từ."},
{q:"___ you use to live in Ha Noi?",opts:["Did","Do","Are","Were"],a:0,why:"<b>Đúng: Did.</b> Câu hỏi thói quen quá khứ: Did you use to...? (bỏ 'd' của used khi có did)."},
{q:"I'm slowly ___ to the new software.",opts:["used","getting used","use","being used"],a:1,why:"<b>Đúng: getting used.</b> 'getting used to' = đang dần quen. Sau đó là danh từ (the new software) hoặc V-ing."}],
writing:[{q:"Viết 5 câu về bản thân: 3 câu 'used to' (điều bạn từng làm/từng thế nào trong quá khứ nhưng giờ không còn) và 2 câu 'be/get used to' (điều bạn đã quen hoặc đang dần quen ở hiện tại).",
model:"<b>Bài mẫu:</b> I used to be very shy when I was a teenager. I used to spend hours playing video games instead of studying. My city used to be much quieter than it is now. These days, I am used to handling many tasks at once at work. I am gradually getting used to speaking English with customers.<br><b>Tự kiểm tra:</b> 'used to' + NGUYÊN MẪU (thói quen quá khứ đã chấm dứt)? 'be/get used to' + V-ing/danh từ (quen ở hiện tại)? Không nhầm hai cấu trúc?"}]},
mid:{mcq:[
{q:"Phân biệt: 'When I moved to Japan, I wasn't used to ___ on the left.'",opts:["drive","driving","drove","to drive"],a:1,why:"<b>Đúng: driving.</b> 'be used to + V-ing' → driving. 'wasn't used to driving' = chưa quen việc lái (bên trái)."},
{q:"'He ___ a lot of coffee, but now he drinks tea.'",opts:["is used to drinking","used to drink","used to drinking","is used to drink"],a:1,why:"<b>Đúng: used to drink.</b> Thói quen quá khứ đã đổi (giờ uống trà) → used to + nguyên mẫu (drink)."},
{q:"Chọn câu ĐÚNG:",opts:["I used to studying every night.","I am used to study every night.","I am used to studying every night.","I use to studying every night."],a:2,why:"<b>Đúng: C.</b> 'be used to + V-ing' → 'am used to studying'. A sai (used to + nguyên mẫu); B sai (be used to + V-ing chứ không nguyên mẫu)."},
{q:"'It took time, but she finally ___ living in a big city.'",opts:["used to","got used to","was used to get","use to"],a:1,why:"<b>Đúng: got used to.</b> 'It took time...finally' → quá trình DẦN QUEN → got used to + V-ing (living)."},
{q:"'I ___ think English was impossible, but now I'm quite confident.'",opts:["am used to","used to","get used to","was used to"],a:1,why:"<b>Đúng: used to.</b> Suy nghĩ/trạng thái quá khứ đã thay đổi → used to + think (nguyên mẫu)."}],
writing:[{q:"Viết đoạn 6 câu so sánh con người/cuộc sống bạn TRƯỚC ĐÂY với BÂY GIỜ, dùng 'used to' cho quá khứ và 'be/get used to' cho sự thích nghi hiện tại, kết hợp với các thì đã học ở Chặng 3.",
model:"<b>Bài mẫu:</b> A few years ago, I used to feel nervous whenever I had to speak English. I used to avoid conversations with foreign customers because I was afraid of making mistakes. However, things have changed a lot since then. Now I am used to communicating in English almost every day at work. It took several months, but I have finally got used to thinking in English rather than translating. Looking back, I realise how much I have grown, and I am proud of the progress I have made.<br><b>Tự kiểm tra:</b> 'used to + nguyên mẫu' cho thói quen quá khứ? 'be/get used to + V-ing' cho thích nghi hiện tại? Có kết hợp hiện tại hoàn thành (have changed, have got, have made)? Phân biệt rõ hai cấu trúc?"}]},
adv:{mcq:[
{q:"Chọn câu diễn đạt TINH TẾ nhất về sự thích nghi dần với thay đổi công nghệ:",opts:["People used to adapt technology.","People are getting used to adapting to constant technological change.","People use to adapting technology.","People are used to adapt technology."],a:1,why:"<b>Đúng: B.</b> 'are getting used to adapting to' — diễn tả quá trình đang dần quen với việc thích nghi, cấu trúc chính xác (get used to + V-ing). Các đáp án khác sai dạng."},
{q:"'Whereas people ___ rely on printed maps, they now depend entirely on GPS.'",opts:["are used to","used to","get used to","were used to"],a:1,why:"<b>Đúng: used to.</b> Đối lập quá khứ với hiện tại ('Whereas...now') → used to + rely (thói quen quá khứ). 'Whereas/While' + used to là cấu trúc so sánh quá khứ-hiện tại band cao."},
{q:"Kết hợp Chặng 3: 'By the time she retired, she ___ in the same company for thirty years and ___ to its routines.'",opts:["worked / used","had worked / was used","has worked / is used","had worked / used"],a:1,why:"<b>Đúng: had worked / was used.</b> 'By the time she retired' (mốc quá khứ) → quá khứ hoàn thành 'had worked'; 'was used to (its routines)' = đã quen (ở thời điểm quá khứ đó). Kết hợp past perfect + be used to."},
